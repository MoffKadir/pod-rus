 glossary_fera: "[Glossary('Фера', 'glossary_fera_tt')]"
 glossary_fera_tt: "#bold Фера#! - одухотворённый народ, обладающий способностью превращаться в животных. Вервольфы - самые многочисленные и известные, но есть и много других видов.\n\nСогласно мифологии фера, они были созданы Геей, богиней-матерью всего живого, и каждому из них была отведена своя роль в защите её творений. Однако многие из них уклонились от выполнения своей задачи, будь то из-за апатии, цинизма или кровавых межплеменных конфликтов, и Гея становится всё более отдалённой.\n\nСледующие фера доступны для игры в [princes_of_darkness|E]:\n$BULLET_WITH_TAB$#TOOLTIP:GAME_TRAIT,werewolf,[GetNullCharacter] #L;bold Гару#!#! #weak (Вервольфы)#!\n$BULLET_WITH_TAB$#bold [GetTrait('bastet').GetName(GetNullCharacter)]#! #weak (Оборотни-коты)#!\n$BULLET_WITH_TAB$#bold [GetTrait('mokole').GetName(GetNullCharacter)]#! #weak (Оборотни-крокодилы и оборотни-драконы)#!"

 glossary_triat: "[Glossary('Triat', 'glossary_triat_tt')]"
 glossary_triat_tt: "The Triat are three of the greatest entities in the spiritual hierarchy: the [Glossary('Вильд', 'glossary_wyld_tt')], the [Glossary('Weaver', 'glossary_weaver_tt')], and the [Glossary('Wyrm', 'glossary_wyrm_tt')].\n\nOriginally the Triat were in balance. The Wyld created raw matter, life, and spirit while the Weaver gave these creations form and function, and the Wyrm destroyed them to make room for new creations.\n\nThe Triat however are no longer in balance. The Weaver draws on the strength of humanity - its cities, technology, industry, and science - and is stronger than ever before. The Wyld's influence retreats as natural resources are plundered, the wild places of the world destroyed, and nature forced to do man's bidding. Most dangerous of all, however, is the Wyrm - it feeds on evil and destroys without distinction. "

 glossary_wyld: "[Glossary('Wyld', 'glossary_wyld_tt')]"
 glossary_wyld_tt: "The #bold Wyld#! is one of the three incalculably powerful spirits comprising the [Glossary('Triat', 'glossary_triat_tt')].\n\nThe Wyld is a generative force: it creates absolute Chaos, which is given order by the [Glossary('Weaver', 'glossary_weaver_tt')] before it is destroyed and returned to chaos by the [Glossary('Wyrm', 'glossary_wyrm_tt')]. Where the other two of the Triat went insane, the Wyld is diminishing, being squashed out by the Weaver, and destroyed recklessly by the Wyrm.\n\nThe Wyld's domain is nature and its rampant growth, which is slowly being destroyed by mankind."

 glossary_weaver: "[Glossary('Weaver', 'glossary_weaver_tt')]"
 glossary_weaver_tt: "The #bold Weaver#! is one of the three incalculably powerful spirits comprising the [Glossary('Triat', 'glossary_triat_tt')].\nThe Weaver's function was to make order from the creations of the [Glossary('Вильд', 'glossary_wyld_tt')], giving them form and function for the duration of their existence before they were destroyed by the [Glossary('Wyrm', 'glossary_wyrm_tt')], maintaining a balance between creation and destruction.\n\nIt is believed that the Weaver is primarily to blame for the imbalance in the Triat; the Weaver grew tired of its order being destroyed by the Wyrm, and spun its webs to imprison the Wyrm and end its destruction. This imprisonment drove the Wyrm mad, and caused it to begin destroying everything, rather than just those things whose time had ended.\n\nThe Weaver's avatars and children often take the form of spiders, or sometimes insects. It is a patron of law, order, science, and technology. As humanity advances, so too does the Weaver."

 glossary_wyrm: "[Glossary('Wyrm', 'glossary_wyrm_tt')]"
 glossary_wyrm_triatic: "[Glossary('Triatic Wyrm', 'glossary_wyrm_tt')]"
 glossary_wyrm_apep: "[Glossary('Apep', 'glossary_wyrm_tt')]"
 glossary_wyrm_apophis: "[Glossary('Apophis', 'glossary_wyrm_tt')]"
 glossary_wyrm_tt: "The #bold Wyrm#! is one of the three incalculably powerful spirits comprising the [Glossary('Triat', 'glossary_triat_tt')].\n\nThe Wyrm's purpose was to cleanse and rectify all of Creation, furthering its descent into Entropy. It achieved this by eliminating that which the [Glossary('Вильд', 'glossary_wyld_tt')] creates and the [Glossary('Weaver', 'glossary_weaver_tt')] structures, completing the eternal cycle of birth to death. It was the second member of the [Glossary('Triat', 'glossary_triat_tt')] to go insane. When the [Glossary('Weaver', 'glossary_weaver_tt')] went mad and began encasing everything in webs to prevent the destruction of its creations, the Wyrm was progressively constrained until it could no longer fulfil its purpose as it wished. Denied the opportunity to do as it had been created to do, it was driven into a state of pure rage and madness, hellbent on destroying everything regardless of whether it's appointed time had come or not.\n\nNow, the Wyrm exists as a Dark God of [Glossary('Calamity', 'glossary_wyrm_calamity_tt')], [Glossary('Consumption', 'glossary_wyrm_consumption_tt')], and [Glossary('Corruption', 'glossary_wyrm_corruption_tt')]."

 glossary_wyrm_calamity: "[Glossary('Beast of War', 'glossary_wyrm_calamity_tt')]"
 glossary_wyrm_calamity_tt: "The #bold Beast of War#! or #bold Wyrm of Calamity#! is the first of the three heads of the [Glossary('Triatic Wyrm', 'glossary_wyrm_tt')].\n\nIt is a monster of senseless rage, ready to destroy all in its path. Limitless rage fuels it, and destructive instincts guide it. Its minions range from self-destructive shock troops that hurl themselves into battle to hulking brutes who delight in overpowering and annihilating their victims.\n\nThis head is analogous to the [Glossary('Вильд', 'glossary_wyld_tt')]'s love of chaos, but here it is a chaos achieved via destructive terror."

 glossary_wyrm_consumption: "[Glossary('Eater of Souls', 'glossary_wyrm_consumption_tt')]"
 glossary_wyrm_consumption_tt: "The #bold Eater of Souls#! or #bold Wyrm of Consumption#! is the second of the three heads of the [Glossary('Triatic Wyrm', 'glossary_wyrm_tt')].\n\nIt is the embodiment of the gnawing hungers of greed, lust, and gluttony. Some of its minions have surrendered all willpower; others are single-minded murderers who stalk what they foolishly think will complete them. The Eater of Souls' hatred festers as virulently as a disease that inexorably ravages infected flesh and erodes troubled sanity.\n\nThis head is analogous to the [Glossary('Weaver', 'glossary_weaver_tt')]'s desire to unify, but that which is done here is little more than unification through consumption and eventual digestion."

 glossary_wyrm_corruption: "[Glossary('Defiler Wyrm', 'glossary_wyrm_corruption_tt')]"
 glossary_wyrm_corruption_tt: "The #bold Defiler Wyrm#! or #bold Wyrm of Corruption#! is the third of the three heads of the [Glossary('Triatic Wyrm', 'glossary_wyrm_tt')].\n\nIt is a manifestation of every corrupting impulse and instinct in existence. Insidiously, the Defiler Wyrm seduces its victims silently from within, whispering temptations that lead its prey willingly into its maw. It's the serpent in the Garden of Eden, the foolish ambition of a fallen angel, the hubris of a [GetTrait('mage').GetName(GetNullCharacter)] who summons up more power than he can control, or the arrogance of a $glossary_fera$ who thinks he can master the very spiritual forces that will inevitably condemn him to damnation.\n\nThis head is analogous to the Wyrm's original purgative function, but in the mortal world it is a being that is restricted to only being able to eat away at its victims intangibly, subtly, and from within, until all that remains is a darkened husk too corrupted to live."



