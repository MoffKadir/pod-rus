 ####### POD glossary

 glossary_clan_curse: "[Glossary('Проклятие клана', 'glossary_clan_curse_tt')]"
 glossary_clan_curse_tt: "Клановое проклятие - это сверхъестественная слабость, с которой сталкивается вампир в зависимости от принадлежности к [Glossary('клану','game_concept_Clan_desc')].\n\nЭти недостатки оказывают глубокое психологическое воздействие на нового вампира и часто заставляют его полностью изменить свое ночное существование. Однако некоторые кланы находят рациональное объяснение своему проклятию. Другие интерпретируют его как скрытый дар или побочный эффект великого просветления, или преимущество, позволяющее ввести себя в заблуждение.\n\nСогласно «Книге Нод», клановые проклятия являются результатом гнева Каина на #TOOLTIP:GAME_TRAIT,vampgeneration3,[GetNullCharacter] #L третье поколение#!#! после уничтожения #TOOLTIP:GAME_TRAIT,vampgeneration2,[GetNullCharacter] #L второго поколения#!#!."

 glossary_courts_of_love: "[Glossary('Дворы любви', 'glossary_courts_of_love_tt')]"
 glossary_courts_of_love_tt: "Дворы любви - это #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампирские#!#! владения и феодальный институт, который был создан французскими #TOOLTIP:GAME_TRAIT,toreador,[GetNullCharacter] #L тореадорами#!#!. Он состоит из множества Дворов любви, каждый из которых является владением могущественного тореадора.\n\nСамыми известными и влиятельными из этих дворов и их историческими владельцами были:\n$BULLET_WITH_TAB$Валуа, принадлежащая матриарху Салианне\n$BULLET_WITH_TAB$Шампань, принадлежащая королеве Элен «ла Жюст»\n$BULLET_WITH_TAB$Пуатье, принадлежащая королю Этьену де Пуатье\n$BULLET_WITH_TAB$Анжу, принадлежащая королеве Изуде де Блез\n$BULLET_WITH_TAB$Тулуза, принадлежащая королеве Эсклармонде"

 glossary_osirian_league: "[Glossary('Осирианская лига', 'glossary_osirian_league_tt')]"
 glossary_osirian_league_tt: "Осирианская лига - общество, посвятившее себя борьбе с [Glossary('Сетом','game_concept_antediluvian_desc')].\n\nВ него входят:\n$BULLET_WITH_TAB$[GetTrait('mokole').GetName(GetNullCharacter)] под властью Собека.\n$BULLET_WITH_TAB$#TOOLTIP:GAME_TRAIT,werewolf,[GetNullCharacter] #L Гару#! из племени Безмолвных странников.\n$BULLET_WITH_TAB$#TOOLTIP:GAME_TRAIT,bastet,[GetNullCharacter] #L Оборотни-коты#! Бубасти.\n$BULLET_WITH_TAB$#TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L Вампирские#! Дети Осириса и последователи Анубиса.\n$BULLET_WITH_TAB$Смертные жрецы-чародеи из культа Исиды.\n$BULLET_WITH_TAB$Странствующие [GetTrait('eshu').GetName(GetNullCharacter)|l].\n$BULLET_WITH_TAB$Сами [GetTrait('shemsuheru').GetName(GetNullCharacter)|l]."


 glossary_khitta: "[Glossary('Хитта', 'glossary_khitta_tt')]"
 glossary_khittas: "[Glossary('Хитты', 'glossary_khitta_tt')]"
 glossary_khitta_tt: "В Каире проживает несколько фракций, объединённых в хитты - районы с нечётким определением, которые являются владениями определённого [Glossary('клана','game_concept_Clan_desc')] или рода. Эти районы обычно самоуправляемы, но в конечном итоге все они подчиняются султану или князю. Хотя в Каире преобладают мусульмане, лишь некоторые хитты связаны с [Glossary('Аширрой','game_concept_ashirra_desc')].\n\nХитты Аширры:\n$BULLET_WITH_TAB$Бану аль-Лам'а: Квартал Ласомбра.\n$BULLET_WITH_TAB$Бану Яшкур: Квартал Ассамитов.\n$BULLET_WITH_TAB$Бану аль-Хаджж: Квартал Носферату.\n$BULLET_WITH_TAB$Бану аль-Фен: Квартал Тореадоров. Эта хитта исторически известна как Бану Дюваль и была основана только после того, как тореадоры прибыли вместе с Наполеоном в Каир в 1798 году.\n\nДругие хитты:\n$BULLET_WITH_TAB$Бану аль ар-Райя: Квартал Истинных Бруха.\n$BULLET_WITH_TAB$Бану аль ас-Са'иди: Квартал Сетитов.\n$BULLET_WITH_TAB$Бану Замалек: Свободный квартал, где обосновались различные другие вампиры.\n$BULLET_WITH_TAB$Бану аль-Азрак: Квартал Вентру, возглавляемый Антонием и его потомками.\n$BULLET_WITH_TAB$Бану аль-Гиза: Квартал последователей Анубиса, расположенный недалеко от Каира."

