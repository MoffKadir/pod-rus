 POD_request_pact_interaction: "Подписать демонический договор"
 POD_request_pact_interaction_desc: "Составить демонический [Concept('demonic_pact', 'договор')|E] с персонажем [recipient.GetFirstName], чтобы получить доступ к [Concept('investiture_lifestyle', 'пути инвеституры')|E]."

 POD_banish_demon_interaction: "Изгнать демона"
