 POD_summon_demon_demonology_interaction_desc: "Принести в жертву жизни ваших [Concept('prisoners', 'пленников')|E] в надежде призвать #TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L демона#!#! из [UmbraGlossaryLocalized('abyss','Бездны')]."
