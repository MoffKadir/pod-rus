 POD_summon_demon_demonology_interaction_success: "Призыв прошёл успешно!"

 POD_bind_demon_interaction: "Связать демона"
 POD_bind_demon_interaction_desc: "Связать персонажа [recipient.GetFirstName] силой [recipient.GetHerHis] [Glossary('истинного имени','podgloss.truename')]."

 POD_weaken_demon_interaction: "Ослабить демона"
