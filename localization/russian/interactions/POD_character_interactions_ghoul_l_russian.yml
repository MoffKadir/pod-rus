l_russian:

 POD_ghoul: "Манипулировать [Concept('ghoul', 'гулем')|E]"
 POD_manipulate_bound_ghouls: "Манипулировать [Concept('ghoul', 'гулями')|E]"
 recipient_secondary_POD_manipulate_bound_ghouls: "[Concept('ghoul', 'Гуль')|E]-раб"
 POD_manipulate_bound_ghouls_desc: "Выберите, что сделать со своими [Concept('ghoul', 'гулями')|E]-рабами."
 POD_manipulate_bound_ghouls_heal_option: "Исцелить раба"
 POD_manipulate_bound_ghouls_goldreward_option: "Вознаградить раба"
 POD_manipulate_bound_ghouls_demandgold_option: "Потребовать золото"
 POD_manipulate_bound_ghouls_giveblood_option: "Даровать кровь"
 POD_manipulate_bound_ghouls_traindiscipline_option: "Обучить [Glossary('дисциплине','game_concept_discipline_desc')]"
 POD_manipulate_bound_ghouls_divorce_option: "Потребовать развода"
 POD_manipulate_bound_ghouls_release_option: "Освободить раба"

 POD_ghoulify_mortal_interaction_limit: "Количество [Concept('ghoul', 'гулей')|E]-рабов ограничено! (3 плюс любые бонусы из других источников)"
 POD_ghoulify_mortal_interaction_bp_one: "Вампиры должны иметь силу крови не ниже единицы, чтобы создать [Concept('ghoul', 'гуля')|E]."
 POD_ghoulify_mortal_interaction: "Гулифицировать #weak (Происки)#!"
 POD_ghoulify_mortal_interaction_desc: "Задумать превратить [Select_CString(recipient.IsFemale, 'эту смертную', 'этого смертного' )] в [Concept('ghoul', 'гуля')|E]-раба, [Select_CString(recipient.IsFemale, 'верную служанку', 'верного слугу' )].\nОбратите внимание: у гулей резко снижен резонанс, и они плохо подходят для роли членов [Concept('POD_herd', 'стада')|E]."
 POD_ghoul_ghoulify_interaction: "Предложить дар витэ #weak (Происки)#!"
 POD_ghoul_ghoulify_interaction_desc: "Предложить этому персонажу [Glossary('витэ','game_concept_vitae_desc')], взятую у пленника по [recipient.GetHerHis] выбору."
 I_have_no_bloodbag: "В темнице нет вампира, у которого можно взять кровь."
 recipient_secondary_POD_ghoul_ghoulify_interaction: "\n \n \n Использовать этого пленника как источник витэ."

 POD_ghoul_ghoulify_prisoner_interaction: "Предложить дар витэ пленнику"
 POD_ghoul_ghoulify_prisoner_interaction_desc: "Насильно превратить персонажа [recipient.GetFirstName] в гуля."
 POD_ghoul_ghoulify_prisoner_interaction.tt: "[recipient.GetFirstName] становится гулем."
 recipient_secondary_POD_ghoul_ghoulify_prisoner_interaction: "Пленник"

 POD_beg_for_vitae_interaction: "Попросить о силе витэ"
 POD_beg_for_vitae_interaction_desc: "Попросить персонажа [recipient.GetShortUIName] превратить вас в своего [Concept('ghoul', 'гуля')|E]. Требования для этого взаимодействия основаны на [Glossary('поколении','game_concept_vampgeneration_desc')] вампира"
 POD_beg_for_vitae_interaction_needed_total_skills: "Сумма ваших [Concept('skills', 'навыков')|E] (за исключением [Concept('prowess', 'доблести')|E]) должна превышать [SCOPE.GetValue('needed_total_skills')|0V] #weak ([THIS.Char.MakeScope.ScriptValue('sum_of_all_skills_value')])#!"

 POD_consume_vitae_of_prisoner_interaction: "Поглотить витэ пленника"
 POD_consume_vitae_of_prisoner_interaction_desc: "Испить от персонажа [recipient.GetShortUIName], чтобы получить [Glossary('витэ','game_concept_vitae_desc')]. В зависимости от [recipient.GetHerHis] способностей вы рискуете стать [recipient.GetHerHis] [Concept('bound_ghoul', 'связанным гулем')|E]"

 POD_runaway_from_blood_bond_interaction: "Сбежать от уз крови"
 POD_runaway_from_blood_bond_interaction_desc: "Ясность вернулась, и вы видите, до какого состояния вас [Select_CString(recipient.IsFemale, 'довела ваша «хозяйка»', 'довёл ваш «хозяин»' )]. Вы должны бежать."

 POD_ghoul_mission_bribe_officials_interaction: "Подкупить чиновников"
 POD_ghoul_mission_bribe_officials_interaction_desc: "Потратить немного [Concept('gold', 'золота')|E] чтобы снизить [Concept('tyranny', 'тиранию')|E] и повысить [Concept('legitimacy', 'легитимность')|E] персонажа [recipient.GetShortUIName]."

 POD_ghoul_mission_indoctrinate_plant_interaction: "Внушить свои взгляды контакту"
 POD_ghoul_mission_indoctrinate_plant_interaction_desc: "Внушить свои взгляды персонажу [recipient.GetShortUIName] и отправить [recipient.GetHerHis] в логово [Select_CString(domitor.IsFemale, 'вашей хозяйки', 'вашего хозяина' )]."

 POD_ghoul_mission_send_desirable_mortal_interaction: "Отправить желанного смертного"
 POD_ghoul_mission_send_desirable_mortal_interaction_desc: "Послать персонажа [recipient.GetShortUIName] в логово [Select_CString(domitor.IsFemale, 'вашей хозяйки', 'вашего хозяина' )]."

 POD_ghoul_mission_damage_rivals_image_interaction: "Испортить репутацию соперника"
 POD_ghoul_mission_damage_rivals_image_interaction_desc: "Пожертвовать своей репутацией, чтобы ещё сильнее унизить персонажа [recipient.GetShortUIName]."

 POD_ghoul_mission_slander_rival_interaction: "Оклеветать соперника"
 POD_ghoul_mission_slander_rival_interaction_desc: "Пожертвовать своим благочестием, чтобы ещё сильнее унизить персонажа [recipient.GetShortUIName]."

 POD_ghoul_mission_give_relative_away_interaction: "Выдать родственника"
 POD_ghoul_mission_give_relative_away_interaction_desc: "Отослать персонажа [recipient.GetShortUIName] к [Select_CString(domitor.IsFemale, 'вашей хозяйке', 'вашему хозяину' )], зная, что вы больше никогда не увидитесь."

 POD_help_bound_ghoul_interaction: "Помочь связанному узами гулю"
 POD_help_bound_ghoul_interaction_desc: "Помочь другому [Concept('ghoul', 'гулю')|E] вырваться из-под власти домитора — неважно, желает он этого или нет."

 POD_request_mission_from_domitor_interaction: "Запросить миссию"
 POD_request_mission_from_domitor_interaction_desc: "Я [Select_CString(ROOT.Char.IsFemale, 'выполнила', 'выполнил' )] @ghoul_icon![Concept('bound_ghoul_mission', 'миссию')|E], выданную [Select_CString(recipient.IsFemale, 'моей хозяйкой', 'моим хозяином' )], и начинаю беспокоиться из-за отсутствия нового."
 POD_request_mission_from_domitor_interaction_current_mission: "У вас уже есть @ghoul_icon![Concept('bound_ghoul_mission', 'миссия')|E]"
 POD_request_mission_from_domitor_interaction_failure_cooldown: "Вы провалили @ghoul_icon![Concept('bound_ghoul_mission', 'миссию')|E] в течение последних [EmptyScope.ScriptValue('POD_cooldown_months_after_failing_mission')] месяцев (недоступно до [GetCurrentDateWithDiff(GetVarTimeRemaining(THIS.Char.MakeScope,'recently_failed_ghoul_mission'))])"
 POD_request_mission_from_domitor_interaction_effect: "Вы получите случайную @ghoul_icon![Concept('bound_ghoul_mission', 'миссию')|E]"