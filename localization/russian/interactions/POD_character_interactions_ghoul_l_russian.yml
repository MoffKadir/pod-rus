 POD_manipulate_bound_ghouls_divorce_option: "Demand Divorce"
 POD_manipulate_bound_ghouls_release_option: "Release Thrall"
 
 POD_ghoulify_mortal_interaction_limit: "[ghoul|E] thrall amount is capped! (3 plus any bonuses from other sources)"
 POD_ghoulify_mortal_interaction_bp_one: "Vampires must have a blood potency of at least one to create a [ghoul|E]."
 POD_ghoulify_mortal_interaction: "Ghoulify #weak (Scheme)#!"
 POD_ghoulify_mortal_interaction_desc: "Plot to transform this mortal into a [ghoul|E] thrall, a loyal retainer.\nTake notice that ghouls have drastically reduced resonance and make for poor [POD_herd|E] members."
 POD_ghoul_ghoulify_interaction: "Bestow the Gift of Vitae #weak (Scheme)#!"
 POD_ghoul_ghoulify_interaction_desc: "Offer this person $pod_vitae$ drained from a prisoner of [recipient.GetHerHis] choosing."
 I_have_no_bloodbag: "No vampire in the dungeon to drain of blood."
 recipient_secondary_POD_ghoul_ghoulify_interaction: "\n \n \n Use this prisoner as a source of vitae."

 POD_ghoul_ghoulify_prisoner_interaction: "Bestow the Gift of Vitae to a Prisoner"
 POD_ghoul_ghoulify_prisoner_interaction_desc: "Forcibly make [recipient.GetFirstName] a ghoul."
 POD_ghoul_ghoulify_prisoner_interaction.tt: "[recipient.GetFirstName] becomes a ghoul."
 recipient_secondary_POD_ghoul_ghoulify_prisoner_interaction: "Prisoner"
 
 POD_beg_for_vitae_interaction: "Beg for the Power of Vitae"
 POD_beg_for_vitae_interaction_desc: "Beg [recipient.GetShortUIName] to make you [recipient.GetHerHis] [ghoul|E]. The requirements for this interaction are based on the Vampire's [Glossary('Generation','game_concept_vampgeneration_desc')]"
 POD_beg_for_vitae_interaction_needed_total_skills: "The sum of your [skills|E] (excluding [prowess|E]) must exceed [SCOPE.GetValue('needed_total_skills')|0V] #weak ([THIS.Char.MakeScope.ScriptValue('sum_of_all_skills_value')])#!"

 POD_consume_vitae_of_prisoner_interaction: "Consume Vitae of Prisoner"
 POD_consume_vitae_of_prisoner_interaction_desc: "Drink from [recipient.GetShortUIName] to gain $pod_vitae$. Depending on [recipient.GetHerHis] abilities, you might risk becoming [recipient.GetHerHis] [bound_ghoul|E]"

 POD_runaway_from_blood_bond_interaction: "Runaway from the Blood Bond"
 POD_runaway_from_blood_bond_interaction_desc: "Clarity has returned, and you can see the state your 'master' has brought you to. You have to run."

 POD_ghoul_mission_bribe_officials_interaction: "Bribe Officials"
 POD_ghoul_mission_bribe_officials_interaction_desc: "Spend some [gold|E] to decrease the [tyranny|E] and increase the [legitimacy|E] of [recipient.GetShortUIName]."

 POD_ghoul_mission_indoctrinate_plant_interaction: "Indoctrinate a Contact"
 POD_ghoul_mission_indoctrinate_plant_interaction_desc: "Indoctrinate [recipient.GetShortUIName] and send them to your master's lair."

 POD_ghoul_mission_send_desirable_mortal_interaction: "Send Desirable Mortal"
 POD_ghoul_mission_send_desirable_mortal_interaction_desc: "Send [recipient.GetShortUIName] to your master's lair."

 POD_ghoul_mission_damage_rivals_image_interaction: "Damage Rival's Image"
 POD_ghoul_mission_damage_rivals_image_interaction_desc: "Sacrifice your image to bring [recipient.GetShortUIName] even lower."

 POD_ghoul_mission_slander_rival_interaction: "Slander Rival"
 POD_ghoul_mission_slander_rival_interaction_desc: "Sacrifice your piety to bring [recipient.GetShortUIName] even lower."

 POD_ghoul_mission_give_relative_away_interaction: "Give away Relative"
 POD_ghoul_mission_give_relative_away_interaction_desc: "Send [recipient.GetShortUIName] to your master, knowing you will never see them again."

 POD_help_bound_ghoul_interaction: "Help Bound Ghoul"
 POD_help_bound_ghoul_interaction_desc: "Help a fellow [ghoul|E] in becoming free from their domitor, no matter if they want it or not"

 POD_request_mission_from_domitor_interaction: "Request a Mission"
 POD_request_mission_from_domitor_interaction_desc: "I completed the [bound_ghoul_mission_with_icon|E] issued by my master, and I am growing restless from not having a new one."
 POD_request_mission_from_domitor_interaction_current_mission: "You already have a [bound_ghoul_mission_with_icon|E]"
 POD_request_mission_from_domitor_interaction_failure_cooldown: "You failed a [bound_ghoul_mission_with_icon|E] within the last [EmptyScope.ScriptValue('POD_cooldown_months_after_failing_mission')] months (unavailable until [GetCurrentDateWithDiff(GetVarTimeRemaining(THIS.Char.MakeScope,'recently_failed_ghoul_mission'))])"
 POD_request_mission_from_domitor_interaction_effect: "You will gain a random [bound_ghoul_mission_with_icon|E]"