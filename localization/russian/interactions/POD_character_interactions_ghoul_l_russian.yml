 POD_manipulate_bound_ghouls_desc: "Choose what to do with your [ghoul|E] thralls."
 POD_manipulate_bound_ghouls_heal_option: "Heal Thrall"
 POD_manipulate_bound_ghouls_goldreward_option: "Reward Thrall"
 POD_manipulate_bound_ghouls_demandgold_option: "Demand Gold"
 POD_manipulate_bound_ghouls_giveblood_option: "Give Blood"
