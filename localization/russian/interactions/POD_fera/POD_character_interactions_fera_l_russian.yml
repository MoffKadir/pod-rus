 POD_spawn_flaying_plague_interaction: "Высвободить свежующую чуму"
 POD_spawn_flaying_plague_interaction_desc: "В вашем распоряжении ужасная свежующая чума. При наличии некоторых специфических ингредиентов для ритуала вы сможете вновь обрушить её на ничего не подозревающих люпинов."
 POD_spawn_flaying_plague_interaction.tt: "Наслать свежующую чуму на местонахождение персонажа [recipient.GetFirstName]."
 POD_spawn_flaying_plague_actor_toast: "В местонахождении персонажа [recipient.GetFirstName] свирепствует свежующая чума."
 POD_spawn_flaying_plague_actor_toast.desc: "Остаётся лишь надеяться, что вы не пожалеете об этом"
 POD_spawn_flaying_plague_failure_toast: "Вам не удалось распространить свежующую чуму в местонахождении персонажа [recipient.GetFirstName]"
 POD_spawn_flaying_plague_failure_toast.desc: "Но в будущем появится ещё больше возможностей..."
 POD_spawn_flaying_plague_interaction_success: "Свежующая чума вспыхнет в местонахождении персонажа [recipient.GetFirstName] и будет распространяться оттуда с течением времени."
 POD_spawn_flaying_plague_interaction_failure: "Свежующая чума не смогла закрепиться."
 POD_inflict_flaying_plague_interaction: "Наслать свежующую чуму"
 POD_inflict_flaying_plague_interaction_desc: "Заразить персонажа [recipient.GetFirstName] свежующей чумой, ослабив [Select_CString(recipient.IsFemale, 'её', 'его' )] защиту. Если [Select_CString(recipient.IsFemale, 'она', 'он' )] сможет превратиться в #TOOLTIP:GAME_TRAIT,abomination,[GetNullCharacter] #L мерзость#!#!, это обеспечит успех [Glossary('объятий','game_concept_Embrace_desc')]."


 ###Planetary Gifts interactions
 POD_ebon_binding_interaction: "Эбеновые узы"
 POD_ebon_binding_interaction_desc: "Привязать к персонажу [recipient.GetFirstName] подходящее наказание. [recipient.GetFirstName] будет испытывать невыносимую боль, когда [recipient.GetSheHe] подумает о том, чтобы побаловать себя запретным действием."
 ebon_binding_modifier: "Эбеновые узы"


 POD_savagery_of_the_taloned_hunter_interaction: "Дикость когтистого охотника"
 POD_savagery_of_the_taloned_hunter_interaction_desc: "Потратить 1 ед. @gnosis_icon!гнозиса и силы воли, чтобы получить 2 ед. @gnosis_icon!гнозиса."

 POD_burden_of_knowledge_interaction: "Бремя знаний"
 POD_burden_of_knowledge_interaction_desc: "Наслать на персонажа [recipient.GetFirstName] модификаторы [GetModifier('murderous_frenzy_modifier').GetNameWithTooltip], [GetModifier('change_for_better_modifier').GetNameWithTooltip] или заставить покончить с собой."

 POD_essential_transformation_interaction: "Трансформация сущности"
 POD_essential_transformation_interaction_desc: "Ухудшить раны, чтобы получить @gnosis_icon!гнозис."