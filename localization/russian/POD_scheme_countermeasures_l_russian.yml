l_russian:
 # Boilerplate copy for the standard countermeasures.
 scheme_countermeasure_type_all_seeing_eye: "Всевидящее око"
 scheme_countermeasure_type_all_seeing_eye_desc: "#WEAK Сверхъестественные способности к предвидению могут во многом помочь защитить от ненужного внимания.#!"

