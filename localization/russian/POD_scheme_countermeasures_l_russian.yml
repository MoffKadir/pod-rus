 scheme_countermeasure_type_all_seeing_eye_t3_desc: "$scheme_countermeasure_type_all_seeing_eye_desc$"

 countermeasures_unlocks_t1_all_seeing_eye: "Улучшает [Concept('scheme_countermeasure_countermeasure', 'способ противодействия заговорам')|E] «#V $scheme_countermeasure_type_all_seeing_eye$#!» #weak (Ур. 1)#!"
 countermeasures_unlocks_t2_all_seeing_eye: "Улучшает [Concept('scheme_countermeasure_countermeasure', 'способ противодействия заговорам')|E] «#V $scheme_countermeasure_type_all_seeing_eye$#!» #weak (Ур. 2)#!"
