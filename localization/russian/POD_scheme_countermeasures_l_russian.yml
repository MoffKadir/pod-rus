 scheme_countermeasure_type_all_seeing_eye_t1_desc: "$scheme_countermeasure_type_all_seeing_eye_desc$"
 scheme_countermeasure_type_all_seeing_eye_t2: "$scheme_countermeasure_type_all_seeing_eye$"
 scheme_countermeasure_type_all_seeing_eye_t2_desc: "$scheme_countermeasure_type_all_seeing_eye_desc$"
