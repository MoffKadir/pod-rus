 asmodeus_throne_lord_of_anthropomancy_domicile_building: "Lord of Anthropomancy"
 asmodeus_throne_lord_of_anthropomancy_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('asmodeus_throne_01').GetName])#!\nFirst summoned by a cabal of Sumer royal magicians, Asmodeus promises visions of the future to the artists and scholars that pledge themselves to him."
 asmodeus_throne_fear_humanity_domicile_building: "Fear of Humanity"
 asmodeus_throne_fear_humanity_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('asmodeus_throne_01').GetName])#!\nIt was Asmodeus' fear of humanity surpassing the host of Heaven that led him to try to collar them with the Nephilim's experiments. He soon realized the grave mistake he made."
 domicile_building_parameter_improved_nephilim_parameters: "Your [GetTrait('nephilim').GetName(GetNullCharacter)] will now get a positive physical trait at birth if they don't already have one"
 asmodeus_throne_rome_china_domicile_building: "From Rome to China"
 asmodeus_throne_rome_china_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('asmodeus_throne_01').GetName])#!\nWith his influence over the Roman Empire, Asmodeus became the pre-eminent Archduke for a time. His cult was unrivaled by his "brothers"."
 domicile_building_parameter_unlock_nephilim_parameter: "Your [GetTrait('laham').GetName(GetNullCharacter)] children will now be [GetTrait('nephilim').GetName(GetNullCharacter)] instead, which are immortal, stronger and can use demonic [Concept('lore_lifestyle','Lores')|E] #weak (if you are a $POD_splat_demon$)#!"
 domicile_building_parameter_increased_thrall_cap_parameter: "Your maximum number of [thralls|E] increases by #V 1#!"

 azrael_throne_01_domicile_building: "Throne of Azrael"
