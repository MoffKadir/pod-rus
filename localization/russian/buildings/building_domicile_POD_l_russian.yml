 dagon_throne_lord_of_genhinnom_domicile_building: "Lord of Genhinnom"
 dagon_throne_lord_of_genhinnom_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('dagon_throne_01').GetName])#!\nDagon and his legion built great Bastions, including Genhinnom itself. The Black Cathedral was the greatest fortress of the rebels and home to Lucifer himself."
 dagon_throne_lord_of_shanmukha_domicile_building: "Lord of the Shanmukha"
 dagon_throne_lord_of_shanmukha_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('dagon_throne_01').GetName])#!\nDagon's followers in Mohenjo-Daro were known as the Shanmukha. He blessed them with knowledge, turning them into a cult of insane architects."
 dagon_throne_that_withstands_lightning_domicile_building: "He Who Withstands the Lightning"
 dagon_throne_that_withstands_lightning_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('dagon_throne_01').GetName])#!\nDagon's reliquary is a massive blasphemous strange stone machinery, with grinding rock gears and igneous levers that are carved with blasphemous prayers. Machinery is his domain, and the future he prepares for humanity."
