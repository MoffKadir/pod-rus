 asmodeus_throne_01_domicile_building: "Throne of Asmodeus"
 asmodeus_throne_01_domicile_building_desc: "The Archduke of the Silver Legion was the one behind the desperate and horrifying acts that led to the creation of the Nephilim. His fall from grace was brutal and absolute."
