 servant_quarters_torturers_tools_domicile_building: "Пыточная камера"
 servant_quarters_torturers_tools_domicile_building_desc: "#weak (Требуется [GetDomicileBuilding('servant_quarters_01').GetName])#!\nЭту камеру боятся как враги, так и слуги. Иногда грань между этими двумя категориями очень тонка."
 servant_quarters_stocked_supplies_domicile_building: "Складские запасы"
 servant_quarters_stocked_supplies_domicile_building_desc: "#weak (Требуется [GetDomicileBuilding('servant_quarters_01').GetName])#!\nВаши люди не сидят сложа руки, пока вы занимаетесь более важными делами. Они готовятся к тому моменту, когда вы снова отправитесь в путь."
