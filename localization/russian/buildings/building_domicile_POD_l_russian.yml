 belial_throne_shang_cultists_domicile_building: "Virtue of the Boundless Depth"
 belial_throne_shang_cultists_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('belial_throne_01').GetName])#!\nFirst summoned by magicians of the Shang dynasty, Belial grew accustomed to highly skilled and prestigious thralls serving him."
 belial_throne_elite_cults_domicile_building: "Elite Cults"
 belial_throne_elite_cults_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('belial_throne_01').GetName])#!\nBelial always preferred quality over quantity. His cults, while small, were highly capable and dedicated."
 belial_throne_unlimited_hatred_domicile_building: "Eternal Hatred"
 belial_throne_unlimited_hatred_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('belial_throne_01').GetName])#!\nBelial's hatred of Lucifer is legendary. In his eyes, all of Creation could burn if it meant the destruction of the Morningstar."
