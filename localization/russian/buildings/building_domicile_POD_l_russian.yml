 azrael_throne_heitsi_eibib_domicile_building: "Heitsi-Eibib"
 azrael_throne_heitsi_eibib_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('azrael_throne_01').GetName])#!\nAzrael's cult was known for its scholarly bent, delving into necromancy and other forbidden practices to please their patron."
