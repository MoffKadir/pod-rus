 servant_quarters_01_domicile_building: "Квартал слуг"
 servant_quarters_01_domicile_building_desc: "Неважно, в пути или нет, вампиру всегда нужна кровь. А что может быть лучше, чем обзавестись группой смертных, готовых в любой момент отдать свою драгоценную алую жизненную силу?"
