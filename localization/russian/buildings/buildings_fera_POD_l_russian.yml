 building_type_sun_glory_01: "Каэрн Славы солнца"
 building_type_sun_glory_01_desc: "#F Расположенный на вечно замерзшём озере, этот каэрн является, пожалуй, самым важным местом встреч разных племён в Европе.#!"
 building_sun_glory_01: "Зарождающийся каэрн Славы солнца"
 building_sun_glory_01_desc: "Основанный как каэрн Великих гор, он был переименован в знак признания подвигов Гийома Славы солнца в регионе."
 building_sun_glory_02: "Растущий каэрн Славы солнца"
 building_sun_glory_02_desc: "Следуя примеру Гийома, каэрн Славы солнца посвятил себя уничтожению вампиров, чем заслужил грозную репутацию."
 building_sun_glory_03: "Впечатляющий каэрн Славы солнца"
 building_sun_glory_03_desc: "Гелиос защищает каэрн, его смертоносные лучи гарантируют, что ни один вампир не сможет войти внутрь без неприятного сюрприза."

 building_type_white_sea_01: "Каэрн Белого моря"
 building_type_white_sea_01_desc: "#F Каэрн выносливости, где собираются финские Дети Геи. Он обладает мощной защитой, благодаря чему заслужил уважение соседних племён.#!"
 building_white_sea_01: "Зарождающийся каэрн Белого моря"
 building_white_sea_01_desc: "Каэрн выносливости, где собираются финские Дети Геи. Он обладает мощной защитой, благодаря чему заслужил уважение соседних племён."
 building_white_sea_02: "Растущий каэрн Белого моря"
 building_white_sea_02_desc: "Каэрн выносливости, где собираются финские Дети Геи. Он обладает мощной защитой, благодаря чему заслужил уважение соседних племён."
 building_white_sea_03: "Впечатляющий каэрн Белого моря"
 building_white_sea_03_desc: "Каэрн выносливости, где собираются финские Дети Геи. Он обладает мощной защитой, благодаря чему заслужил уважение соседних племён."

 building_type_wild_sea_01: "Каэрн Дикого моря"
 building_type_wild_sea_01_desc: "#F В центре каэрна находится старое языческое кладбище, на котором обитают призраки людей, живших на этом побережье до прихода кельтов.#!"
 building_wild_sea_01: "Зарождающийся каэрн Дикого моря"
 building_wild_sea_01_desc: "Каэрн - место тихого отдыха, но приём беженцев от разрушительной свежующей чумы выжал из него все ресурсы."
 building_wild_sea_02: "Растущий каэрн Дикого моря"
 building_wild_sea_02_desc: "Немая скорбь призраков языческого кладбища проникает сквозь завесу между мирами и позволяет теургам Фианна черпать гнозис из [Concept('umbra', 'Умбры')|E]."
 building_wild_sea_03: "Впечатляющий каэрн Дикого моря"
 building_wild_sea_03_desc: "Последний оплот Фианна, уцелевший после свежующей чумы. Место, достаточно сильное, чтобы восстановить всё их племя?"

 building_type_fimbul_winter_01: "Каэрн Зимней ночи Фимбул"
 building_type_fimbul_winter_01_desc: "#F Самый грозный каэрн Отпрысков Фенрира в Скандинавии, где собрались герои после страшной битвы с Вотаном.#!"
 building_fimbul_winter_01: "Зарождающийся каэрн Зимней ночи Фимбул"
 building_fimbul_winter_01_desc: "Самый грозный каэрн Отпрысков Фенрира в Скандинавии, где собрались герои после страшной битвы с Вотаном."
