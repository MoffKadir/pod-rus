 building_type_bright_promise_01: "Каэрн Светлого обещания"
 building_type_bright_promise_01_desc: "#F Редкий городской каэрн в центре Акры. Невозможность вампиров проникнуть в город позволила процветать этому многокультурному и мирному каэрну.#!"
 building_bright_promise_01: "Зарождающийся каэрн Светлого обещания"
 building_bright_promise_01_desc: "Редкий городской каэрн в центре Акры. Невозможность вампиров проникнуть в город позволила процветать этому многокультурному и мирному каэрну."
 building_bright_promise_02: "Растущий каэрн Светлого обещания"
 building_bright_promise_02_desc: "Редкий городской каэрн в центре Акры. Невозможность вампиров проникнуть в город позволила процветать этому многокультурному и мирному каэрну."
 building_bright_promise_03: "Впечатляющий каэрн Светлого обещания"
 building_bright_promise_03_desc: "Редкий городской каэрн в центре Акры. Невозможность вампиров проникнуть в город позволила процветать этому многокультурному и мирному каэрну."

 building_type_winter_forest_01: "Каэрн Зимнего леса"
 building_type_winter_forest_01_desc: "#F Каэрн, подаренный самим Оленем Красным когтям, где доминирует это племя, но также допускает люпусов Чёрных фурий благодаря взаимопониманию с Пегасом.#!"
 building_winter_forest_01: "Зарождающийся каэрн Зимнего леса"
 building_winter_forest_01_desc: "Каэрн, подаренный самим Оленем Красным когтям, где доминирует это племя, но также допускает люпусов Чёрных фурий благодаря взаимопониманию с Пегасом."
 building_winter_forest_02: "Растущий каэрн Зимнего леса"
 building_winter_forest_02_desc: "Каэрн, подаренный самим Оленем Красным когтям, где доминирует это племя, но также допускает люпусов Чёрных фурий благодаря взаимопониманию с Пегасом."
 building_winter_forest_03: "Впечатляющий каэрн Зимнего леса"
 building_winter_forest_03_desc: "Каэрн, подаренный самим Оленем Красным когтям, где доминирует это племя, но также допускает люпусов Чёрных фурий благодаря взаимопониманию с Пегасом."

 building_type_night_sky_01: "Каэрн Ночного неба"
 building_type_night_sky_01_desc: "#F Свидетельство стойкости Теневых владык: эта пещера не пала, несмотря на свежующую чуму и нападения проклятых Цимисхи.#!"
 building_night_sky_01: "Зарождающийся каэрн Ночного неба"
 building_night_sky_01_desc: "Свидетельство стойкости Теневых владык: эта пещера не пала, несмотря на свежующую чуму и нападения проклятых Цимисхи."
 building_night_sky_02: "Растущий каэрн Ночного неба"
 building_night_sky_02_desc: "Свидетельство стойкости Теневых владык: эта пещера не пала, несмотря на свежующую чуму и нападения проклятых Цимисхи."
 building_night_sky_03: "Впечатляющий каэрн Ночного неба"
 building_night_sky_03_desc: "Свидетельство стойкости Теневых владык: эта пещера не пала, несмотря на свежующую чуму и нападения проклятых Цимисхи."

 building_type_wheel_ptah_01: "Каэрн Колеса Пта"
 building_type_wheel_ptah_01_desc: "#F Загадочный каэрн, дарованный Безмолвным странникам в качестве нового дома после их изгнания из Египта. С тех пор он служит племени верой и правдой.#!"
 building_wheel_ptah_01: "Зарождающийся каэрн Колеса Пта"
 building_wheel_ptah_01_desc: "Загадочный каэрн, дарованный Безмолвным странникам в качестве нового дома после их изгнания из Египта. С тех пор он служит племени верой и правдой."
 building_wheel_ptah_02: "Растущий каэрн Колеса Пта"
 building_wheel_ptah_02_desc: "Загадочный каэрн, дарованный Безмолвным странникам в качестве нового дома после их изгнания из Египта. С тех пор он служит племени верой и правдой."
 building_wheel_ptah_03: "Впечатляющий каэрн Колеса Пта"
 building_wheel_ptah_03_desc: "Загадочный каэрн, дарованный Безмолвным странникам в качестве нового дома после их изгнания из Египта. С тех пор он служит племени верой и правдой."

 building_type_crescent_moon_01: "Каэрн Полумесяца"
 building_type_crescent_moon_01_desc: "#F Средоточие власти Серебряных клыков в России и, возможно, их величайший каэрн во всём мире.#!"
 building_crescent_moon_01: "Зарождающийся каэрн Полумесяца"
 building_crescent_moon_01_desc: "Основанный во времена Владычества, каэрн Полумесяца расположен в скрытой долине в глубине Урала."
 building_crescent_moon_02: "Растущий каэрн Полумесяца"
 building_crescent_moon_02_desc: "Изначально здесь обитал чудовищный Змей, и многие легендарные герои Серебряных клыков погибли, чтобы захватить контроль над этой территорией для племени."
 building_crescent_moon_03: "Впечатляющий каэрн Полумесяца"
 building_crescent_moon_03_desc: "Изгнав Змея, могущественные теурги очистили землю, позаботившись о том, чтобы Полумесяц на долгие века стал свидетельством доблести Серебряных клыков."

 building_type_snow_leopard_01: "Каэрн Снежного барса"
 building_type_snow_leopard_01_desc: "#F Самый известный в мире каэрн Звездочётов, центр обучения и сотрудничества, не имеющий себе равных.#!"
 building_snow_leopard_01: "Зарождающийся каэрн Снежного барса"
 building_snow_leopard_01_desc: "Основанный византийским Звездочётом Юстинианом, этот каэрн был создан совместно с таинственным вампиром по имени Миларепа."
 building_snow_leopard_02: "Растущий каэрн Снежного барса"
 building_snow_leopard_02_desc: "Именно здесь Юстиниан в последний раз сразился с мощным нексусным ползуном. Хотя он погиб во время битвы, каэрн был защищён."
 building_snow_leopard_03: "Впечатляющий каэрн Снежного барса"
 building_snow_leopard_03_desc: "После победы Юстиниана над нексусным ползуном слава каэрна быстро росла, и вскоре он стал важным центром культуры Звездочётов."

 building_type_field_stars_01: "Каэрн Звёздного поля"
 building_type_field_stars_01_desc: "#F Мощный каэрн лидерства у истоков реки. Очень уязвимый, этот каэрн видел больше, чем свою долю сражений и потерь, породив расу выживших из своих защитников.#!"
 building_field_stars_01: "Зарождающийся каэрн Звёздного поля"
 building_field_stars_01_desc: "Мощный каэрн лидерства у истоков реки. Очень уязвимый, этот каэрн видел больше, чем свою долю сражений и потерь, породив расу выживших из своих защитников."
 building_field_stars_02: "Растущий каэрн Звёздного поля"
 building_field_stars_02_desc: "Мощный каэрн лидерства у истоков реки. Очень уязвимый, этот каэрн видел больше, чем свою долю сражений и потерь, породив расу выживших из своих защитников."
 building_field_stars_03: "Впечатляющий каэрн Звёздного поля"
 building_field_stars_03_desc: "Мощный каэрн лидерства у истоков реки. Очень уязвимый, этот каэрн видел больше, чем свою долю сражений и потерь, породив расу выживших из своих защитников."

 building_type_thunder_blade_01: "Caern of the Thunder Blade"
 building_type_thunder_blade_01_desc: "#F The Caern of the Inoue Clan stands proud of its legacy.#!"
 building_thunder_blade_01: "Burgeoning Caern of the Thunder Blade"
 building_thunder_blade_01_desc: "Many Hakken spend their time in the Caern honing their skills with the blade. The Caern is filled with the sounds of clashing blades so long as the Hakken draw breath."
 building_thunder_blade_02: "Growing Caern of the Thunder Blade"
 building_thunder_blade_02_desc: "$building_thunder_blade_01_desc$"
 building_thunder_blade_03: "Imposing Caern of the Thunder Blade"
 building_thunder_blade_03_desc: "$building_thunder_blade_01_desc$"

 building_type_emerald_palace_01: "Emerald Palace"
 building_type_emerald_palace_01desc: "#F $building_emerald_palace_01_desc$ #!"
 building_emerald_palace_01: "Emerald Palace"
 building_emerald_palace_01_desc: "The Hengeyokai's seat of power in Nippon. The Hakken's code of honor means all allies of the Beast Courts are welcome in these halls, for whatever purpose."


 ####Bastet
 building_type_hanshii_arena_01: "Арена ханши"
 building_type_hanshii_arena_01_desc: "#F Основной элемент культуры бастет, ханши - это ритуальные поединки, используемые для развлечения или определения территориальных прав. Это могут быть игры с загадками, официальные поединки или война на клыках и когтях.#!"
 building_hanshii_arena_01: "Небольшая арена ханши"
 building_hanshii_arena_01_desc: "Небольшая площадка, предназначенная для испытаний ханши."
 building_hanshii_arena_02: "Достойная арена ханши"
 building_hanshii_arena_02_desc: "В этом защищённом месте проводятся самые разные испытания."
 building_hanshii_arena_03: "Большая арена ханши"
 building_hanshii_arena_03_desc: "Бастет собираются здесь, чтобы с нетерпением наблюдать за тем, как участники со всего мира делают ставки в предлагаемых испытаниях."
 POD_needs_hanshii_arbiter: "#X У вас должен быть нанят [GetCourtPositionType('hanshii_arbiter_court_position').GetName()].#!"
 POD_needs_hanshii_arbiter_2: "#X У вас должен быть нанят [GetCourtPositionType('hanshii_arbiter_court_position').GetName()] с хорошей пригодностью или выше.#!"
 POD_needs_hanshii_arbiter_3: "#X У вас должен быть нанят [GetCourtPositionType('hanshii_arbiter_court_position').GetName()] с отличной пригодностью или выше.#!"

 building_type_altar_seline_01: "Алтарь Селин"
 building_type_altar_seline_01_desc: "#F Сочувствующая сестра Геи, Луна, явно благоволит к оборотням-котам и считает их своими лучшими творениями. Она родила меняющих облик как дар Земле, и ее тело считается последним прибежищем для всех бастет.#!"
 building_altar_seline_01: "Небольшой алтарь Селин"
 building_altar_seline_01_desc: "Мать кошачьего рода с нежностью наблюдает за своими гордыми детьми даже в самом маленьком жилище."
 building_altar_seline_02: "Достойный алтарь Селин"
 building_altar_seline_02_desc: "Немногие по-настоящему понимают капризную богиню Луны, но бастет все равно чувствуют ее тепло, когда стоят в этом священном месте."
 building_altar_seline_03: "Большой алтарь Селин"
 building_altar_seline_03_desc: "Да здравствует Лунная госпожа, истинная покровительница кошек во всем мире. Многие из ее детей собираются здесь, чтобы отдать ей дань уважения."
 POD_needs_seline_oracle: "#X У вас должен быть нанят [GetCourtPositionType('seline_oracle_court_position').GetName()].#!"
 POD_needs_seline_oracle_2: "#X У вас должен быть нанят [GetCourtPositionType('seline_oracle_court_position').GetName()] с хорошей пригодностью или выше.#!"
 POD_needs_seline_oracle_3: "#X У вас должен быть нанят [GetCourtPositionType('seline_oracle_court_position').GetName()] с отличной пригодностью или выше.#!"

 building_type_taghairm_gathering_01: "Форум тагейрма"
 building_type_taghairm_gathering_01_desc: "#F Тагейрм - это кошачье собрание, которое часто созывается для обмена информацией или любезностями. Обычно проводится в разгар полнолуния.#!"
 building_taghairm_gathering_01: "Небольшой форум тагейрма"
 building_taghairm_gathering_01_desc: "Небольшое помещение, где бастет собираются, чтобы неформально пообщаться и поиграть."
 building_taghairm_gathering_02: "Достойный форум тагейрма"
 building_taghairm_gathering_02_desc: "В этих местах, специально отведенных для тагейрма, часто собираются кошки."
 building_taghairm_gathering_03: "Большой форум тагейрма"
 building_taghairm_gathering_03_desc: "Грандиозное и хорошо обставленное помещение, куда приходят бастет из дальних регионов, чтобы обменяться информацией и знаниями со своими местными собратьями."
 POD_needs_master_taghairm: "#X У вас должен быть нанят [GetCourtPositionType('master_taghairm_court_position').GetName()].#!"
 POD_needs_master_taghairm_2: "#X У вас должен быть нанят [GetCourtPositionType('master_taghairm_court_position').GetName()] с хорошей пригодностью или выше.#!"
 POD_needs_master_taghairm_3: "#X У вас должен быть нанят [GetCourtPositionType('master_taghairm_court_position').GetName()] с отличной пригодностью или выше.#!"

 building_type_taklah_training_01: "Тренировочные площадки такла"
 building_type_taklah_training_01_desc: "#F Такла - это элитная свита оборотней-котов, собранная воедино ради общей цели.#!"
 building_taklah_training_01: "Небольшая тренировочная площадка такла"
 building_taklah_training_01_desc: "Воины бастет менее известны, чем их родичи-гару, но только глупец мог бы недооценить их."
 building_taklah_training_02: "Достойная тренировочная площадка такла"
 building_taklah_training_02_desc: "Бастет - уединенные существа, но, когда их объединяет общая цель, они удивительно хорошо работают вместе."
 building_taklah_training_03: "Большая тренировочная площадка такла"
 building_taklah_training_03_desc: "Великие кошачьи внушают смертным благоговение и уважение. Эта такла бастет сделает то же самое со своими врагами."
 POD_needs_warleader_taklah: "#X У вас должен быть нанят [GetCourtPositionType('warleader_taklah_court_position').GetName()].#!"
 POD_needs_warleader_taklah_2: "#X У вас должен быть нанят [GetCourtPositionType('warleader_taklah_court_position').GetName()] с хорошей пригодностью или выше.#!"
 POD_needs_warleader_taklah_3: "#X У вас должен быть нанят [GetCourtPositionType('warleader_taklah_court_position').GetName()] с отличной пригодностью или выше.#!"

 building_type_yava_court_01: "Двор ява"
 building_type_yava_court_01_desc: "#F Ява - это тайна племени, скрытая от всех посторонних, которая, если ее узнать, якобы дает другому существу власть над вами. Наиболее тщательно охраняемый из всех секретов бастет, он раскрывается только при самых крайних обстоятельствах, если вообще раскрывается.#!"
 building_yava_court_01: "Небольшой двор ява"
 building_yava_court_01_desc: "Небольшой уголок, где ученые бастет размышляют о ява, а более практичные - о том, как наказать чужаков, укравших эти тайны племени."
 building_yava_court_02: "Достойный двор ява"
 building_yava_court_02_desc: "Суд над глупцами, раскрывающими величайшие тайны племени, будет быстрым и беспощадным."
 building_yava_court_03: "Большой двор ява"
 building_yava_court_03_desc: "Члены племени со всего мира съезжаются сюда, чтобы обсудить последние события, связанные со священной ява."
 POD_needs_guardian_yava: "#X У вас должен быть нанят [GetCourtPositionType('guardian_yava_court_position').GetName()].#!"
 POD_needs_guardian_yava_2: "#X У вас должен быть нанят [GetCourtPositionType('guardian_yava_court_position').GetName()] с хорошей пригодностью или выше.#!"
 POD_needs_guardian_yava_3: "#X У вас должен быть нанят [GetCourtPositionType('guardian_yava_court_position').GetName()] с отличной пригодностью или выше.#!"

 building_type_den_realm_01: "Царство-логово"
 building_type_den_realm_01_desc: "#F Царство-логово - это участок [Concept('umbra', 'Умбры')|E], который привязан к $glossary_fera$ и служит его личным убежищем. Большинство царств-логов привязаны к областям физической реальности и обеспечивают туннель в Ближнюю Умбру, так что шаг в сторону или другие подобные способы проникновения в [Concept('umbra', 'Умбру')|E] становятся проще. Царства-логова хорошо защищены, и прорвать их оборону непросто.#!"
 den_realm_effect_desc: "#help Если это ваша столица:#!\nСнижает затраты #L $POD_energy_gnosis|l$а#! на вход в [Concept('umbra', 'Умбру')|E]:\n#P -25%#!/уровень постройки"
 building_den_realm_01: "Малое царство-логово"
 building_den_realm_01_desc: "Маленький, но функциональный портал в крошечный карман [Concept('umbra', 'Умбры')|E]."
 building_den_realm_02: "Растущее царство-логово"
 building_den_realm_02_desc: "Портал в небольшое царство [Concept('umbra', 'Умбры')|E], защищенное надежной обороной."
 building_den_realm_03: "Впечатляющее царство-логово"
 building_den_realm_03_desc: "Туннель в большое царство [Concept('umbra', 'Умбры')|E], защищенное сильной обороной, идеально подходящее для спокойного уединения его владельца."


 building_type_bush_retreat_01: "Пристанище в зарослях"
 building_type_bush_retreat_01_desc: "#F Свара - очень одинокие существа. В сочетании с идеальным знанием окружающей обстановки и огромной скоростью их практически невозможно поймать врагам.#!"
 building_bush_retreat_01: "Малое пристанище в зарослях"
 building_bush_retreat_01_desc: "Свара - очень одинокие существа. В сочетании с идеальным знанием окружающей обстановки и огромной скоростью их практически невозможно поймать врагам."
