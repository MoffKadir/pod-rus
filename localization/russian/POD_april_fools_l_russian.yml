 POD_april_fools.102.t: "Paradoxical Days"
 POD_april_fools.102.desc: "All you wanted was a moment of quiet. You went for a walk outside, and there it was, the first sign of the madness to come: a tree made of solid gold.\n\nAmazed, you reached out to touch it. The tree burst into a cloud of fluttering moths, each of them shouting \"Congratulations! Congratulations! Congratulations!\" while orbiting your head like the most obnoxious halo imaginable. When you swatted at the swarm, it dispersed and reformed back into a completely normal tree.\n\nYou hurried back to your court and found it in chaos. Furniture was melting, or floating, or stuck to the ceiling. Someone's clothes had turned into centipedes. The air was scintillating in impossible rainbow colors.\n\nIf this is an illusion, you shudder to think who'd be powerful enough to create one of this scale. But if it isn't..."
 POD_april_fools.102.a: "How would I even begin to find the one responsible?"
 POD_april_fools.102.tt.1: "Your [skills|E] will get randomized every month."
 POD_april_fools.102.tt.2: "Your [personality_traits|E] will get randomized every year."
 POD_april_fools.102.tt.3: "Surely this is just temporary, and you should just wait for it all to blow over."

# reused
 POD_april_fools.103.desc.intro: "Your [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('courtier'))] [courtier.GetFirstName] comes to you with news about the unfolding chaos."

 POD_april_fools.103.desc: "\"I found this. Isn't it a sweet little baby? We must take good care of it, and raise it to be a proper member of this household.\"\n\nThe \"sweet little baby\" in question is a dragon."
 POD_april_fools.103.a: "Sweet, I've always wanted a dragon."

 POD_april_fools.104.desc: "Not that you needed [courtier.GetHerHim] to, because it's obvious what happened. [courtier.GetSheHe|U]'s golden. So are you. So is everyone in this [ROOT.Char.Custom('GetCourt')|l], and all your furniture, and all your weapons."
 POD_april_fools.104.a: "We can profit off of this, but too bad about the weapons."

 POD_april_fools.105.desc: "\"I was checking on our prison cells this morning and found [prisoner.GetName]. No idea how [prisoner.GetSheHe] got there. [prisoner.GetSheHe|U] doesn't know either. Not to look a gift horse in the mouth though, eh?\""
 POD_april_fools.105.a: "I should decide what to do with [prisoner.GetHerHim]."

 POD_april_fools.106.desc: "\"My hair is gone.\" There is a deep melancholy in [courtier.GetHerHis] eyes, which takes you by surprise. You never knew [courtier.GetFirstNameNoTooltip] to care too much about [courtier.GetHerHis] appearance."
 POD_april_fools.106.a: "Yeah, I noticed. Mine is gone, too."
 POD_april_fools.106.a.alreadybald: "Uh-huh. Must be terrible."

 POD_april_fools.107.desc: "\"Cheese.\" Refusing to elaborate further, [courtier.GetSheHe] hands you the aforementioned cheese."
 POD_april_fools.107.a: "Um. Thanks?"

 POD_april_fools.108.desc: "\"Yeah, so, er, big news.\" [courtier.GetSheHe|U] fidgets nervously. \"You know about that huge explosion the other day? That pillar of green flame reaching up into the sky, screaming like a choir of damned souls?\"\n\nYeah, you saw. It was kind of hard to miss. Not that you cared much at the time. With everything else going on, it felt like just another Tuesday.\n\n\"Well, it left quite the impression on the local $POD_splat_hunter_plural$. They sent it all the way up the chain and now the Holy See is mobilizing its resources to eradicate the 'devils among us.'\"\n\n\"They're calling it the Inquisition.\""
 POD_april_fools.108.a: "As if we didn't have enough trouble already."
 POD_april_fools.108.a.hunter: "I suppose that's good for us."
 POD_april_fools.108.a.premature: "ANOTHER ONE??"
 POD_april_fools.108.a.premature.hunter: "Another one? Hallelujah."

 POD_april_fools.109.desc: "\"It's a madhouse out there. The inquisitors are moving out and torching havens all over the place. At this rate, they're going to eradicate us.\"\n\nYou rub your temples. \"Does that mean we can finally put our differences behind us and rally against a common foe?\"\n\n\"What? No, that's crazy. Look, you're not thinking like an entrepreneur. This is a golden opportunity to rob everyone else blind. No one will expect us to stab them in the back while they're occupied with bigger issues.\""
 POD_april_fools.109.desc.hunter: "\"It's a madhouse out there. The inquisitors are moving out and torching havens all over the place. The bloodsuckers are getting antsy. They know they're not long for this world.\"\n\nYou sigh. \"Yes, and? The Vatican is taking care of this. We can sit this one out. No need to risk our lives when their twice-blessed thrice-anointed motherfuckers-in-chief are willing to die on the frontlines.\"\n\n\"What? No, that's crazy. Look, you're not thinking like an entrepreneur. This is a golden opportunity to rob everyone else blind. No one will expect us to stab them in the back while they're occupied with other issues.\""
 POD_april_fools.109.a: "That's the stupidest thing I ever heard."
 POD_april_fools.109.tt: "EVERYONE can [raid|E] now."
 
 POD_april_fools.110.desc: "\"Aboeisrd moieaon kstlbv og. Goob broncpsdz ib? Plib e bib. Zbilbrekwlommbiorbeon aglonmeqwas eorleor ir immnimnim plembaf, nor limnon leqbaf, nor zeblorneqis rirghhb nekbaf. Ya bib?\""
 POD_april_fools.110.a: "Hor hor hor! Sik nempis irliq nempo bib."
 POD_marauder_mode_tongues: "Speaking the Language of the Gods"
 POD_marauder_mode_tongues_desc: "Ha blemqas nirtuilzvkkir tiglpvnmbonan giruen bib. Giruen? Og pilnis? Hor hor hor."
 
 POD_april_fools.111.desc: "\"I hate you. Just wanted to let you know.\""
 POD_april_fools.111.a: "What?"
 
 POD_april_fools.112.t: "The One Responsible"
 POD_april_fools.112.desc: "A low hum heralds its arrival. Floor and ceiling break into thousands of colorful shards, then reform into spiraling crystal lattices. The light in your chambers bends at nauseating angles. Reality weeps, and admits defeat.\n\nAt the nexus of this storm sits a black hole, its silhouette shaped like a man. You think it's a man, at least. There are no discernible features. The entity is only visible by its outline and the gravity it exerts on its surroundings, like something that is both integral to the existence of this world, yet cannot exist within it.\n\nYou managed to survive this long by knowing when to fight and when to fold. This fight is one you cannot win. All you can do is observe, and hope for the best."
# ellipsis
 
 POD_april_fools.113.t: "Maraudeur"
 POD_april_fools.113.desc: "The thing greets you with a reverberating noise straight from hell.\n\nIt sounds a bit like, \"Bonjour\".\n\nAside from that, it seems quite amenable to polite conversation. It is very apologetic for all the trouble it's caused, and gives you a lengthy justification full of scientific jargon you can't even begin to understand, about \"spheres\" and \"instruments\" and \"marauder reality zones\". You gather that it is on the run from \"that wrinkly #italic fils de pute#!\" and that its visit to these parts was \"too soon\", but that you may meet others like it one day, \"when the time is right\". Then it opens a swirling portal and makes to leave.\n\nYou call out to the entity, still confused. \"Who are you?\"\n\nIt says, \"You may call me Jean\"."
 POD_april_fools.113.a: "And I guess that's that."