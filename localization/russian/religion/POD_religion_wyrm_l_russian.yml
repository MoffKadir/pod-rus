 hellcats: "Адско-котск"
 hellcats_adj: "Адские коты"
 hellcats_adherent: "Адский кот"
 hellcats_adherent_plural: "Адские коты"
 hellcats_desc: "Когда Танцоры Черной Спирали напали на ежегодный сход бастет из племени Цейликан в Шотландии, они заточили некоторых из них в [UmbraGlossary('black_spiral_labyrinth')], чтобы обратить их к [Glossary('Вирму', 'glossary_wyrm_tt')]. Те, кто выжил, стали Адскими котами, их обычное искреннее безумие превратилось в саморазрушение и бездумную агрессию. Ожидая Апокалипсиса, чтобы почтить своего Темного отца, эти запятнанные существа принесли с собой мощные связи с иллюзорными дарами фей и различными фетишами Вирма, которые они сконструировали с любопытством, подобным любопытству бастет."

 holy_order_eyes_cahlash: "Глаза Кахлаша"


 mnetics: "Мнетическ"
 mnetics_adj: "Мнетики"
 mnetics_adherent: "Мнетик"
 mnetics_adherent_plural: "Мнетики"
 mnetics_desc: "Мнетики - пожиратели тайн. Им открылась истина о том, что воспоминания эфемерны и податливы. В то время как другие моколе годами переживают прошлое с помощью Мнезиса, мнетики знают, что всё это ложь. Если все моколе помнят прошлое, то почему у всех оно такое разное? Пожиратели тайн наслаждаются искажением памяти с помощью своей лжи и обмана. Многие моколе попались на удочку [Glossary('Расплетателя', 'glossary_wyrm_tt')], поверив в его ложь, и в результате мнетики становятся всё сильнее."

 holy_order_forgotten_nightmares: "Забытые кошмары"