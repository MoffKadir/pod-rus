 ebon_centipede_high_god_name_alternate_possessive: "$ebon_centipede_high_god_name_possessive$"
 ebon_centipede_creator_god_name: "$ebon_centipede_high_god_name$"
 ebon_centipede_creator_god_name_possessive: "$ebon_centipede_high_god_name_possessive$"

 holy_order_blackened_blades: "Почерневшие клинки"

 #Silent Striders
 eatersofthedead: "Пожирательск"
 eatersofthedead_adj: "Пожиратели мертвецов"
 eatersofthedead_adherent: "Пожиратель"
 eatersofthedead_adherent_plural: "Пожиратели"
 eatersofthedead_desc: "Лагерь Безмолвных странников, загнанный под землю другими Странниками, где, по слухам, они проводят свои нечестивые обряды среди теней. Поглотить мозг своего врага и узнать все его секреты: мерзкий, но полезный ритуал. Однако все, кто поглощает чужую плоть, постепенно сходят с ума и источают зловоние [Glossary('Вирма', 'glossary_wyrm_tt')]. У некоторых даже развивается зависимость от свежих мозгов, и они будут убивать как невинных, так и виновных, чтобы полакомиться."

 holy_order_children_ammit: "Дети Аммит"

 #Star Gazers
 metasticbirth: "Метастическ"
 metasticbirth_adj: "Метастическое рождение"
 metasticbirth_adherent: "Повитуха"
 metasticbirth_adherent_plural: "Повитухи"
 metasticbirth_desc: "Эти Звездочёты верят, что [Glossary('Вирм', 'glossary_wyrm_tt')] не заточён в клетке, а находится в коконе, в котором он проходит метаморфозы, готовясь к новой реальности, рождаемой [Glossary('Ткачихой', 'glossary_weaver_tt')]. Как только метаморфоза завершится, он вырвется из своей хризалиды и откроет новый мир. Звездочеты, которые следуют за этим лагерем, считают, что это хорошо, и что племя должно помогать другим готовиться к этому, а не бороться с ним."

 #Star Gazers
 ouroboroans: "Уроборейск"
 ouroboroans_adj: "Уроборейцы"
 ouroboroans_adherent: "Уробореец"
 ouroboroans_adherent_plural: "Уроборейцы"
 ouroboroans_desc: "Они стремятся освободить [Glossary('Вирма', 'glossary_wyrm_tt')] Равновесия из Паутины. Вместо того чтобы бороться с [Glossary('Ткачихой', 'glossary_weaver_tt')], они тратят свою энергию на поиски Вирма во всех его проявлениях в надежде открыть секрет его освобождения. Только следуя за Вирмом в его пещеру, а не сражаясь с его приспешниками, они считают, что могут по-настоящему повлиять на исход Последней войны. Поэтому некоторые из этих монахов считают, что пути Вирма нужно использовать, а не избегать."

 holy_order_unshacklers_corruption: "Искоренители скверны"


 #Warders of Men
 boli_zouhisze: "Цзоухицзск"
 boli_zouhisze_adj: "Боли цзоухицзе"
 boli_zouhisze_adherent: "Верный"
 boli_zouhisze_adherent_plural: "Верные"
 boli_zouhisze_desc: "Китайское ответвление Стражей людей, отделившееся примерно в 2000 году до н.э., хотя они сохранили некоторые аспекты культуры своего родительского племени, такие как уважение к человеческой культуре и почитание духа Таракана. Последнее стало причиной того, что местные [Glossary('фера', 'glossary_fera_tt')] в Китае стали сторониться Боли цзоухицзе и исключать их из Звериных дворов, поскольку у хенгейокай образы насекомых сильно ассоциируются с Вирмом."

 holy_order_chaos_spinners: "Прядильщики хаоса"

