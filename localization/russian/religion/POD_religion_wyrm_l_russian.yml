 blackspiraldancer: "Чёрно-спиральск"
 blackspiraldancer_adj: "Танцоры Черной Спирали"
 blackspiraldancer_adherent: "Танцор Черной Спирали"
 blackspiraldancer_adherent_plural: "Танцоры Черной Спирали"
 blackspiraldancer_desc: "Известные также как Потерянное племя, ужасные Танцоры Черной Спирали - это гару, обратившиеся к [Glossary('Вирму', 'glossary_wyrm_tt')]. Когда-то они были известны как Белые завыватели, но после того, как племя попыталось в одиночку справиться с Вирмом, они исказились до неузнаваемости."

 cluithi: "Клуйтийск"
 cluithi_adj: "Клуйти"
 cluithi_adherent: "Клуйт"
 cluithi_adherent_plural: "Клуйти"
 cluithi_desc: "В племени Черной Спирали, однако, есть один лагерь, который сделал все возможное, чтобы сохранить наследие Белых завывателей. Клуйти до сих пор бродят по самым пустынным болотам и лесам Шотландии, имитируя облик своих предков много веков назад. Они срывают с себя одежду, с гордостью мажут себя синей краской для тела и демонстрируют пиктские татуировки. Правители этого лагеря также придерживаются элитарных взглядов, считая себя дворянами племени. Название лагеря - это отсылка к первоначальным правителям пиктских королевств. Многие Клуйти считают себя верными детьми Клуйда, героя, который первым привел пиктов в Каледонию."

 princesofruin: "Разрушенск"
 princesofruin_adj: "Князья разрушения"
 princesofruin_adherent: "Князь разрушения"
 princesofruin_adherent_plural: "Князья разрушения"
 princesofruin_desc: "Князья разрушения утверждают, что война за Апокалипсис закончена. Они проповедуют самообольщение, утверждая, что умирающий труп мира теперь принадлежит им, чтобы править им и обращаться с ним, как им заблагорассудится. Триумфальные поборники Разрушителя, они утверждают, что потакание своим низменным инстинктам - это категорическое поклонение [Glossary('Вирму', 'glossary_wyrm_tt')]."

 seekersoftheancient: "Искательск"
 seekersoftheancient_adj: "Искатели древних"
 seekersoftheancient_adherent: "Искатель"
 seekersoftheancient_adherent_plural: "Искатели"
 seekersoftheancient_desc: "Темные друиды земли, стремящиеся к общению с атмосферой и геомантией, окружающей Древних. Они не восхваляют сам дух, но взывают к достоинствам его элементов, вызывая его косвенно, чтобы он действовал через природу. Это наделяет их проницательностью и силой, позволяя им развивать и направлять Яму, связанную с окружающим ландшафтом. Они служат шаманами, рискуя попасть в плен и лишиться рассудка, чтобы общаться с немыслимыми духами и получать знания напрямую."


 ##############
 #### Wyrm ####
 ##############


 wyrmbound: "Узо-вирмск"
 wyrmbound_adj: "Узы Вирма"
 wyrmbound_adherent: "Осквернённый"
 wyrmbound_adherent_plural: "Осквернённые"
 wyrmbound_desc: "У [Glossary('Вирма', 'glossary_wyrm_tt')] много слуг. Кто-то служит сознательно, кто-то неосознанно. Но все их действия служат высшей цели Вирма - вызвать Апокалипсис, конец Геи. Таким образом, все существа, которые причиняют страдания, предаются разврату и/или участвуют в разрушении, вольно или невольно, сознательно или неосознанно, являются слугами Вирма."

 
 #Bone Gnawers
 maneaters: "Людоедск"
 maneaters_adj: "Людоеды"
 maneaters_adherent: "Людоед"
 maneaters_adherent_plural: "Людоеды"
 maneaters_desc: "Этот лагерь Костегрызов обретает силу, нарушая догмат Литании, запрещающий каннибализм с человеческой плотью. Большинство «новообращенных» из этого лагеря были гару, которые слишком часто поддавались ярости. Сегодня их мало, а многие из оставшихся объединились с аналогичным лагерем Пожирателей мертвых среди Безмолвных странников.\nСлучайные жуткие истории о прожорливых оборотнях также подтверждают существование Людоедов - в конце концов, в голодные времена для Грызущего слишком заманчиво накормить себя и заодно избавить от лишнего голодный рот или три."

 holy_order_butchers_men: "Палачи людей"

 #Shadowlords
 masks: "Маскск"
 masks_adj: "Маски"
 masks_adherent: "Маска"
 masks_adherent_plural: "Маски"
 masks_desc: "Тайное общество Теневых владык, посвятившее себя внушению страха своим врагам. Преданность Масок своим тёмным искусствам настолько фанатична, что они якобы практикуют ритуальные увечья над собой, чтобы внушить больший ужас своим жертвам. Поскольку неизвестность - это игровая площадка страха, ни одна истинная Маска никогда не раскрывает свою принадлежность к лагерю чужакам, за исключением тех, кого выбирают для индоктринации в их ряды."

 #Shadowlords
 societyofnidhogg: "Нидхёггск"
 societyofnidhogg_adj: "Общество Нидхёгга"
 societyofnidhogg_adherent: "Нидхёггист"
 societyofnidhogg_adherent_plural: "Нидхёггисты"
 societyofnidhogg_desc: "Все Теневые владыки понимают силу тьмы, но никто из них не осознает ее так глубоко, как члены этого тайного мистического лагеря. Их фанатизм настолько силен, что они утверждают, будто солнечный свет сам по себе представляет угрозу для сил Грома, и стремятся погрузить мир в вечную тьму."

 holy_order_writhing_shadows: "Извивающиеся тени"

 #Hakken
 ebon_centipede: "Многоножск"
 ebon_centipede_adj: "Чёрная многоножка"
 ebon_centipede_adherent: "Искатель лабиринта"
 ebon_centipede_adherent_plural: "Искатели лабиринта"
 ebon_centipede_desc: "Когда тени становятся слишком глубокими, и отчаяние или жестокость овладевают одним из Хаккен, он может отправиться в Чёрный лабиринт и посвятить себя [Glossary('Многоножке', 'glossary_wyrm_tt')]. Одинокие, несчастные и склонные к насилию существа, они являются проклятием для всего духовно хорошего, очень похожие на упадочных #ONCLICK:FAITH,blackspiraldancer #TOOLTIP:FAITH,blackspiraldancer оборотней-разрушителей#!#! с запада."

