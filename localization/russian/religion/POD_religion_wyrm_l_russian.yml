 blackspiraldancer_religion: "Чёрно-спиральск"
 blackspiraldancer_religion_adj: "@werewolf_icon! Танцоры Черной Спирали"
 blackspiraldancer_religion_adherent: "Танцор Черной Спирали"
 blackspiraldancer_religion_adherent_plural: "Танцоры Черной Спирали"
 blackspiraldancer_religion_desc: "Известные также как Потерянное племя, ужасные Танцоры Черной Спирали - это гару, обратившиеся к Вирму. Когда-то они были известны как Белые завыватели, но после того, как племя попыталось в одиночку справиться с [Glossary('Вирмом', 'glossary_wyrm_tt')], они исказились до неузнаваемости."

 holy_order_death_spiral: "Спираль Смерти"
 holy_order_heralds_hydra: "Глашатаи Гидры"
 holy_order_bringers_apocalypse: "Вестники Апокалипсиса"
