 POD_wyrm.1.t: "Общение с Рубином"
 POD_wyrm.1.desc: "По мере того как вы вливаете в Рубин души энергию, его гудение становится громче. Вскоре в вашем сознании раздаётся голос танцора Чёрной спирали, который спрашивает, чего вы хотите в обмен на всю эту энергию. Вы уверены, что дух ценит вашу энергию, но его явно раздражает сложившаяся ситуация."
 POD_wyrm.1.option.a: "Даруй мне силу!"
 POD_wyrm.1.option.b: "Научи меня своему [Concept('ancestral_tongue', 'наречию предков')|E]."
 POD_wyrm.1.option.c: "Благослови меня силой [Glossary('Вирма', 'glossary_wyrm_tt')]!"
 POD_wyrm.1.option.d: "Расскажите мне подробнее об этом рубине."
 POD_wyrm.1.option.e: "На данный момент ничего."

 POD_wyrm.101.t: "[Select_CString(ROOT.Char.IsFemale, 'Порабощённая', 'Порабощённый' )] Вирмом"
 POD_wyrm.101.desc: "С того момента, как вы начали понимать мир, вас учили, что [Glossary('Вирм', 'glossary_wyrm_tt')] - это зло. Каждый день вам говорили бороться с его приспешниками, остерегаться его агентов и сопротивляться его влиянию.\nКажется, вы потерпели сокрушительное поражение.\n\n#I Эти глупцы были неправы. [Glossary('Вирм', 'glossary_wyrm_tt')] - это истина, и ваши глаза наконец-то открылись.#!"
 POD_wyrm.101.option.a: "Я служу Тёмному..."


 temple_obscura_rooms_intro: "Храм Обскура — это колоссальное сооружение из тёмного мрамора с зелёными прожилками. Внешний вид сооружения представляет собой странную и диссонирующую смесь искажённых и аномальных символов, а также резных изображений, символизирующих боль и упадок. Внутри храма свет исходит от небольших жертвенных ламп, установленных в живых канделябрах, сделанных из отрубленных рук пленников, а также от тусклого зелёного свечения витражей на потолке. Сам храм состоит из девяти залов, расположенных друг за другом. В каждой комнате есть статуи и фрески, изображающие муки и испытания, которые ждут любого, кто осмелится войти. Некоторые возвращаются в относительно ясном сознании, многие — в более-менее работоспособном. Но никто не возвращается в здравом уме."

 POD_wyrm.501.t: "Зал Личных неудач"
 POD_wyrm.501.desc: "$temple_obscura_rooms_intro$\n\nПеред вами первый зал храма. Как только вы входите, вас начинают одолевать воспоминания о прошлом. Вы вспоминаете каждую неудачу, каждое неверное решение и все последствия своих прошлых поступков. Истоки депрессии начинают пускать корни, но вы должны сопротивляться."
 POD_wyrm.501.option.a: "Воспоминания, которые я пытаюсь забыть..."
 POD_wyrm.501.option.b: "Слабость нужно искоренять."

 POD_wyrm.502.t: "Зал Ярости"
 POD_wyrm.502.desc: "$temple_obscura_rooms_intro$\n\nВойдя во второй зал, вы чувствуете, как вас охватывает ярость. Вы не можете понять, ваша ли это ярость или наваждение [Glossary('Вирма', 'glossary_wyrm_tt')]. Вы не понимаете, зачем вы здесь и почему злитесь, знаете только, что должны уничтожить что-либо."
 POD_wyrm.502.option.a: "Мне нужно что-то сломать!"
 POD_wyrm.502.option.list1: "Вы бьёте кулаком по одной из колонн"
 POD_wyrm.502.option.list2: "Вы атакуете жаровню [Concept('balefire', 'жертвенного пламени')|E]"

 POD_wyrm.503.t: "Зал Страданий"
 POD_wyrm.503.desc: "$temple_obscura_rooms_intro$\n\nКогда вы входите в третий зал, вас пронзает боль. Пока ваше тело выдерживает атаку, ваш разум снова наполняется видениями ваших прошлых неудач. Только на этот раз видения открывают вам, что [Glossary('Вирм', 'glossary_wyrm_tt')] - ваше спасение, только с его помощью вы сможете одержать победу."
 POD_wyrm.503.option.a: "Эти видения дают мне понимание."
 POD_wyrm.503.option.b: "Я посвящаю себя великому [Glossary('Вирму', 'glossary_wyrm_tt')]."
 POD_wyrm.503.option.c: "[Glossary('Вирма', 'glossary_wyrm_tt')] благословил меня!"

 POD_wyrm.504.t: "Зал Хитрости"
 POD_wyrm.504.desc: "$temple_obscura_rooms_intro$\n\nВ четвёртом зале вас поджидает бэйн. Этот бэйн особенно коварен, и вы должны победить его в битве умов, прежде чем он позволит вам продолжить."
 POD_wyrm.504.option.a: "Мой ум против твоего."
 POD_wyrm.504.option.b: "Правда - это ложь."
 POD_wyrm.504.option.list1: "Сокрушительная победа"
 POD_wyrm.504.option.list2: "Тяжёлая победа"

 POD_wyrm.505.t: "Зал Сражений"
 POD_wyrm.505.desc: "$temple_obscura_rooms_intro$\n\nЗвуки битвы доносятся до вас ещё до того, как вы успеваете войти в пятый зал. Перед вами стоит легион бэйнов, фоморов и других слуг [Glossary('Вирма', 'glossary_wyrm_tt')]. Ясно, что вы должны сделать."
 POD_wyrm.505.option.a: "В бой!"

 POD_wyrm.506.t: "Зал Осквернения"
 POD_wyrm.506.desc: "$temple_obscura_rooms_intro$\n\nС того момента, как вы входите в шестой зал, вас захлёстывает волна осквернения. Ваши чувства переполняются чистой злобой, а тело наполняется тёмной энергией. [Glossary('Вирм', 'glossary_wyrm_tt')] наделил вас своим даром, теперь вам нужно только выжить."
 POD_wyrm.506.option.a: "Мощь переполняет..."

 POD_wyrm.507.t: "Зал Верности"
 POD_wyrm.507.desc: "$temple_obscura_rooms_intro$\n\nВ седьмом зале нет сложных испытаний, загадок или врагов. В центре стоит только одна табличка.\nДокажите свою преданность [Glossary('Вирму', 'glossary_wyrm_tt')] великой жертвой.\nИтак, что вы предложите?"
 POD_wyrm.507.option.a: "[sacrifice.GetFirstName] отдаст свою жизнь."
 POD_wyrm.507.option.b: "Моя собственная плоть."
 POD_wyrm.507.option.c: "Моё материальное богатство."
 POD_wyrm.507.option.d: "Жизни моих подданных."

 POD_wyrm.508.t: "Зал Загадок"
 POD_wyrm.508.desc: "$temple_obscura_rooms_intro$\n\nВосьмой зал погружён в темноту. В нём ничего не видно и не слышно, даже ваших собственных шагов. Жуткую тишину нарушает только голос, нашёптывающий вопросы в ваш разум. Вы отвечаете по мере того, как вопросов становится всё больше, и постепенно ваше сознание начинает отключаться."
 POD_wyrm.508.option.a: "Так много интересных вопросов..."
 POD_wyrm.508.option.b: "Мне нужно бежать!"
 POD_wyrm.508.tooltip: "@warning_icon!#X Вам придётся повторно зайти в этот зал позже, чтобы перейти в последний зал.#!"

 POD_wyrm.509.t: "Зал Тайн"
 POD_wyrm.509.desc: "$temple_obscura_rooms_intro$\n\nНаконец-то перед вами последний зал храма. В центре зала на тёмном скакуне восседает огромный оборотень. Дизайн его доспехов, кажется, противоречит реальности, его меч и конь опалены великим жертвенным пламенем [Glossary('Вирма', 'glossary_wyrm_tt')]. Он произносит всего одну фразу, прежде чем броситься на вас.\n«Вы не готовы»."
 POD_wyrm.509.option.a: "Моё последнее испытание..."
 POD_wyrm.509.option.b: "Я не [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )]. Бежим!"
 POD_wyrm.509.tooltip: "#help [Glossary('Вирм', 'glossary_wyrm_tt')] смеётся над вашей слабостью.#!\n@warning_icon!#X Вам придётся повторно войти в этот зал позже.#!"

 POD_wyrm.510.t: "Танец жертвенного пламени"
 POD_wyrm.510.desc.a: "После битвы, которая, казалось, длилась несколько дней, вам, наконец, удаётся сразить чудовище. Когда его тело рассыпается в прах, его конь телепортируется на небольшое расстояние позади трупа. На мгновение вам кажется, что пылающий конь собирается отомстить за своего хозяина. Вместо этого он окутывает труп бушующим жертвенным пламенем, а затем медленно приближается к вам.\nЭтот устрашающий конь, исполненный силы [Glossary('Вирма', 'glossary_wyrm_tt')], похоже, принимает вас как [Select_CString(ROOT.Char.IsFemale, 'свою новую хозяйку', 'своего нового хозяина' )]."
 POD_wyrm.510.desc.b: "Ваш противник говорил правду, вы не были готовы. Большинство ваших атак были отбиты, а некоторые и вовсе пропущены. С другой стороны, его атаки были точными, мощными и разрушительными. Теперь ваша единственная надежда - спастись бегством.\nГрех не в том, что вас превзошли, а в том, что вы не осознаёте этого."
 POD_wyrm.510.option.a: "Теперь я - [Select_CString(ROOT.Char.IsFemale, 'хозяйка', 'хозяин' )]."
 POD_wyrm.510.option.b: "Я не могу умереть здесь..."
 POD_wyrm.510.tooltip: "@warning_icon!#X Вам придётся повторно войти в этот зал позже... если вы выживете.#!"