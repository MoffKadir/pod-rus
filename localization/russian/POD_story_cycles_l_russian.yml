l_russian:
 POD_story_pact: "#glow_color:{0.5,0,0,1} Демонический договор#!"
 POD_story_pact_desc: "Вы заключили сделку в обмен на могущество.\nСтоило ли оно того?"

 #POD_story_pact_demon: "@demon_icon! Demon"
 POD_story_pact_custom_string: "#font:TitleFont;size:19;glow_color:{0.5,0,0,1} Договор, заключённый с персонажем [Story.MakeScope.Var('demon').Char.GetFirstName]#!\n#glow_color:{0.25,0,0,75} [demonic_pact_obligation|E]: [Localize(Concatenate('POD_obligation_', Story.MakeScope.GetVariable('obligation').GetFlagKey))|U]\n[GuiScope.SetRoot(Story.GetOwner.MakeScope).AddScope('story',Story.MakeScope).Custom('PODPactFrequencyAndStatus')]\nЕсли вы #X нарушите#! договор:\n[GetScriptedGui('POD_sidebar_show_demonic_pacts').BuildTooltip(GuiScope.SetRoot(Story.GetOwner.MakeScope).AddScope('obligation', MakeScopeFlag(Story.MakeScope.GetVariable('obligation').GetFlagKey)).AddScope('consequence', MakeScopeFlag(Story.MakeScope.GetVariable('consequence').GetFlagKey)).End)]\nЭтот [Concept('demonic_pact', 'договор')|E] стоит [Story.MakeScope.GetVariable('perk_points_gained').GetValue|0V] [Select_CString( EqualTo_CFixedPoint( Story.MakeScope.GetVariable('perk_points_gained').GetValue, '(CFixedPoint)1' ), 'оч.', 'оч.' )] [Concept('perk', 'достоинств')|E] [Concept('investiture_lifestyle', 'пути инвеституры')|E]#!"

 POD_story_pact_prohibitory: "Статус: #X Запрещено#!"
 POD_story_pact_frequency_completed: "[demonic_pact_frequency|E]: Каждые [story.MakeScope.GetVariable('frequency').GetValue|0V] лет#!\nСтатус: #P Завершено#!"
 POD_story_pact_frequency_notcompleted: "[demonic_pact_frequency|E]: Каждые [story.MakeScope.GetVariable('frequency').GetValue|0V] лет#!\nСтатус: #N В стадии выполнения#!"