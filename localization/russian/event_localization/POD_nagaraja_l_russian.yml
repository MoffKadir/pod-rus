l_russian:

 # Nickname
 nick_scourge_of_sutekh: "Бич Сутеха"

 # Character Interaction
 podnagaraja_send_childe_to_enoch_interaction: "Отправить в Енох"
 podnagaraja_send_childe_to_enoch_interaction_desc: "Отправить этого члена династии Нагараджа в одностороннее путешествие в призрачный город Енох в Загробном мире, где он будет служить интересам нашего клана из-за Вуали."
 send_childe_to_enoch_effect_tooltip: "Ваше дитя отправится в Загробный мир и никогда не вернётся. Вы получите модификатор и признание."
 send_childe_to_enoch_not_primary_heir: "Нельзя отправить в Енох первого наследника"

 # ============================
 # Feature 1 Events
 # ============================

 podnagaraja.1.t: "Змеиная чистка"
 podnagaraja.1.desc: "Дело сделано. Последние Дайтья и их родичи-сетиты изгнаны из дворов Индии и высокогорий Тибета. Дети Сутеха больше не будут нашёптывать свои лживые речи правителям субконтинента. Для Нагараджа наступает новая эра — эра, когда мы станем бесспорными властителями ночи на нашей исконной родине."
 podnagaraja.1.a: "Пусть об этой победе говорят века напролёт."

 podnagaraja.2.desc: "До вас дошли вести о том, что [Select_CString(serpent_purger.IsFemale, 'правительница', 'правитель' )] Нагараджа [Select_CString(serpent_purger.IsFemale, 'изгнала', 'изгнал' )] последних представителей Сетитов и Дайтья из Индии и Тибета. Баланс сил в регионе резко изменился."
 podnagaraja.2.a: "Ночи меняются."

 # ============================
 # Feature 2 Events (Journey)
 # Events 10-21: Pilgrimage to Enoch
 # ============================

 # --- Event 10: Arrival/Setup ---
 podnagaraja.10.t: "Вуаль раздвигается"
 podnagaraja.10.desc: "Ритуалы завершены, приготовления сделаны. Когда Вуаль раздвигается перед вами, словно завеса холодного тумана, Загробный мир раскрывает свою пасть. Воздух сгущается от шёпотов, а температура опускается до чего-то куда более холодного, чем просто мороз. Впереди лежит путь в Енох — коварный, непознаваемый и полный существ, которых следует бояться даже Нагараджа."
 podnagaraja.10.a: "Начать спуск."
 podnagaraja.10.a.tt: "Ваше паломничество через Загробный мир начинается..."

 # --- Event 12: Entering the Shadowlands (Pool) ---
 podnagaraja.12.t: "Вход в Загробный мир"
 podnagaraja.12.desc: "[UmbraGlossaryLocalized('shadowlands','Загробный мир')] простирается перед вами — серое зеркало мира, который вы оставили позади, населённое беспокойными мертвецами и существами куда страшнее. Граница между миром живых и глубинами Загробного мира здесь тонка. Ваша кровь Нагараджа поёт в узнавании."
 podnagaraja.12.a: "Сосредоточиться на пути."
 podnagaraja.12.b: "Открыть свои чувства мёртвым."
 podnagaraja.12.b.success: "Ваши чувства расширяются. Мёртвые шепчут полезные истины"
 podnagaraja.12.b.failure: "Поток призрачных ощущений на мгновение ошеломляет вас"

 # --- Event 13: The Tempest (Pool) ---
 podnagaraja.13.t: "Буря"
 podnagaraja.13.desc: "Между [UmbraGlossaryLocalized('shadowlands','Загробным миром')] и его глубинами лежит [UmbraGlossaryLocalized('tempest','Буря')] - воющий водоворот спектральной энергии, поглотивший бесчисленные души. Она бьёт вас ветрами, несущими крики проклятых. Есть пути сквозь неё, но ни один из них не будет приятным."
 podnagaraja.13.a: "Пробиться вперёд, используя дисциплину."
 podnagaraja.13.a.success: "Вы проталкиваетесь сквозь худшую часть бури"
 podnagaraja.13.a.failure: "Буря безжалостно терзает вас"
 podnagaraja.13.b: "Использовать некромантию, чтобы усмирить мёртвые ветры."
 podnagaraja.13.b.tt: "Мастерство некромантии гарантирует успех"
 podnagaraja.13.b.success: "Ваше власть над мёртвыми успокаивает бурю вокруг вас."
 podnagaraja.13.b.failure: "Ваших навыков некромантии недостаточно, чтобы укротить Бурю."
 podnagaraja.13.c: "Дождаться, пока она пройдёт."

 # --- Event 14: Whispers of the Drowned (Pool) ---
 podnagaraja.14.t: "Шёпот утопленников"
 podnagaraja.14.desc: "Призраки собираются на границах вашего восприятия, привлечённые теплом вашей украденной жизненной силы. Призраки тех, кого Нагараджа поглотили за столетия, — они помнят, что с ними сделали. Они предлагают знания, предупреждения, ложь. Невозможно сказать, что есть что."
 podnagaraja.14.a: "Приказать им вести меня."
 podnagaraja.14.a.success: "Призраки подчиняются вашей воле и указывают полезные пути"
 podnagaraja.14.a.failure: "Призраки с злобой сопротивляются вашим приказам"
 podnagaraja.14.b: "Игнорировать их и идти дальше."
 podnagaraja.14.c: "Поглотить их эктоплазму для обретения силы."
 podnagaraja.14.c.tt: "Утолить голод спектральной сущностью"

 # --- Event 15: The False Necropolis (Pool) ---
 podnagaraja.15.t: "Ложный некрополь"
 podnagaraja.15.desc: "Из спектрального тумана возникает огромный город — башни, стены, ворота, выглядящие невероятно древними. На мгновение ваша кровь вскипает от узнавания. Енох? Нет. Что-то не так. Пропорции слегка искажены, архитектура — убедительная подделка. Это ловушка, созданная, чтобы заманить паломников, не знающих истинного города."
 podnagaraja.15.a: "Осмотреть осторожно — возможно, найдётся что-то полезное."
 podnagaraja.15.a.success: "Среди обломков вы находите дневник, оставленный предыдущим паломником"
 podnagaraja.15.a.failure: "Защитные механизмы ложного города застают вас врасплох"
 podnagaraja.15.b: "Обойти его стороной."
 podnagaraja.15.c: "Уничтожить его, чтобы ни один Нагараджа больше не попался на эту уловку."

 # --- Event 16: A Spectral Anomaly (Pool) ---
 podnagaraja.16.t: "Спектральная аномалия"
 podnagaraja.16.desc: "Карман сырой энергии Загробного мира преграждает путь впереди — бурлящий вихрь спектральной силы, искажающий саму ткань Теневых земель вокруг себя. Мёртвые избегают этого места. Даже призраки обходят его стороной."
 podnagaraja.16.a: "Пройти сквозь него."
 podnagaraja.16.a.success: "Энергия очищает вас, но делает сильнее"
 podnagaraja.16.a.failure: "Аномалия терзает вашу сущность"
 podnagaraja.16.b: "Обойти стороной."
 podnagaraja.16.c: "Изучить аномалию с безопасного расстояния."
 podnagaraja.16.c.success: "Вы получаете понимание природы Загробного мира"
 podnagaraja.16.c.failure: "Аномалия не поддаётся осмыслению"

 # --- Event 17: The Wraith Market (Pool) ---
 podnagaraja.17.t: "Призрачный базар"
 podnagaraja.17.desc: "Собрание призраков торгует между собой в ложбине между ветрами Бури. Они обмениваются воспоминаниями, сожалениями и фрагментами живого мира. Некоторые из них находятся здесь ещё со времён до падения Рима. Они смотрят на вас со смесью страха и голода — Нагараджа известны мёртвым."
 podnagaraja.17.a: "Обменять золото на сведения."
 podnagaraja.17.b: "Поглотить одного из них."
 podnagaraja.17.b.tt: "Утолить голод, но мёртвые запомнят этот поступок"
 podnagaraja.17.c: "Игнорировать их и идти дальше."

 # --- Event 18: Echoes of the Silk Road (Pool) ---
 podnagaraja.18.t: "Эхо Шёлкового пути"
 podnagaraja.18.desc: "Путь пролегает через призрачное эхо разрушенного города на Шёлковом пути. Призрачные торговцы всё ещё раскладывают свои товары в бесконечном цикле, не осознавая, что они и их город погибли столетия назад. Здания мерцают угасшим величием, а где-то глубоко в руинах ждёт нечто древнее."
 podnagaraja.18.a: "Обыскать руины в поисках скрытых знаний."
 podnagaraja.18.a.success: "Вы обнаруживаете забытые предания среди призрачных руин"
 podnagaraja.18.a.failure: "Руины не дают ничего, кроме пыли и разочарования"
 podnagaraja.18.b: "Изучить призрачных обитателей."
 podnagaraja.18.b.success: "Призраки делятся воспоминаниями о давно забытых династиях"
 podnagaraja.18.b.failure: "Призраки отшатываются от вашего присутствия"
 podnagaraja.18.c: "Зафиксировать увиденное и двигаться дальше."

 # --- Event 19: A Fellow Traveler (Pool) ---
 podnagaraja.19.t: "[Select_CString(intrigue_duelist.IsFemale, 'Другая путница', 'Другой путник' )]"
 podnagaraja.19.desc: "Из призрачного тумана появляется фигура — ещё [Select_CString(intrigue_duelist.IsFemale, 'одна', 'один' )] Нагараджа, [Select_CString(intrigue_duelist.IsFemale, 'возвращающаяся', 'возвращающийся' )] из Еноха с миссии Тал’махе’Ра. [Select_CString(intrigue_duelist.IsFemale, 'Она истощена', 'Он истощён' )], глаза ввалились после путешествия, но держится с тихой уверенностью [Select_CString(intrigue_duelist.IsFemale, 'той', 'того' )], кто выжил в глубинах Загробного мира. [Select_CString(intrigue_duelist.IsFemale, 'Она', 'Он' )] предлагает поделиться сведениями."
 podnagaraja.19.a: "Поделиться сведениями безвозмездно — мы родня."
 podnagaraja.19.a.tt: "Есть небольшой риск, что [Select_CString(intrigue_duelist.IsFemale, 'она не та', 'он не тот' )], за кого себя выдаёт"
 podnagaraja.19.b: "Обменяться информацией."
 podnagaraja.19.b.success: "Честный обмен. Вы узнаёте ценные вещи"
 podnagaraja.19.b.failure: "[Select_CString(intrigue_duelist.IsFemale, 'Она', 'Он' )] не даёт вам ничего полезного"
 podnagaraja.19.c: "Отклонить [Select_CString(intrigue_duelist.IsFemale, 'её', 'его' )] компанию — я путешествую [Select_CString(ROOT.Char.IsFemale, 'одна', 'один' )]."
 podnagaraja.19.d: "[Select_CString(intrigue_duelist.IsFemale, 'Она выглядит голодной', 'Он выглядит голодным' )] — предложить поделиться запасами вискуса."
 podnagaraja.19.d.tt: "Ваша щедрость будет запомнена кланом"

 # --- Event 20: Gates of Enoch (Final) ---
 podnagaraja.20.t: "Врата Еноха"
 podnagaraja.20.desc: "Перед вами возвышаются невероятно древние врата Еноха, Первого города, ныне — призрака былого величия глубоко в Загробном мире. Воздух гудит силой, более древней, чем зафиксированная история. Это место, где стираются границы между жизнью и смертью, знанием и безумием. Вы стоите на пороге величайшей тайны, которую когда-либо знали Нагараджа. Слуги Дель’Рох наблюдают из теней, оценивая вашу ценность."
 podnagaraja.20.a: "Войти и отдать дань уважения Дель’Рох."
 podnagaraja.20.a.tt: "Вы получите свойство «Енохианский паломник», престиж и признание династии"
 podnagaraja.20.b: "Войти и изучить библиотеки Бруха."
 podnagaraja.20.c: "Остаться в Енохе и служить."
 podnagaraja.20.c.tt: "Вы войдёте в торпор, получите свойство «Енохианский паломник» и значительное признание династии"

 # --- Event 21: Fellow Traveler Spy Follow-up ---
 podnagaraja.21.t: "Предательство в тенях"
 podnagaraja.21.desc: "Что-то не так. Сведения, которыми вы поделились с [Select_CString(intrigue_duelist.IsFemale, 'попутчицей', 'попутчиком' )], появились там, где их быть не должно. Либо [Select_CString(intrigue_duelist.IsFemale, 'она была не той', 'он был не тем' )], за кого себя [Select_CString(intrigue_duelist.IsFemale, 'выдавала', 'выдавал' )], либо [Select_CString(intrigue_duelist.IsFemale, 'продала', 'продал' )] ваши секреты другим. Ущерб, возможно, уже нанесён."
 podnagaraja.21.a: "Расследовать предательство."
 podnagaraja.21.a.success: "Вы раскрываете обман до того, как был нанесён реальный вред"
 podnagaraja.21.a.failure: "Ваши секреты уже распространились. Ущерб реален"
 podnagaraja.21.b: "Забыть об этом — некоторые сведения несущественны."

 # ============================
 # Feature 4 Events
 # ============================

 podnagaraja.100.t: "Приготовления"
 podnagaraja.100.desc: "Безмолвный конклав требует тщательной подготовки. Сообщения должны быть отправлены по каналам, которые не смогут отследить даже другие вампиры, ритуальные материалы собраны в [UmbraGlossaryLocalized('shadowlands','Загробный мир')], а безопасное место — определено. Работа утомительна, но необходима."
 podnagaraja.100.a: "Начать приготовления."
 podnagaraja.100.a.tt: "Конклав соберётся через месяц"

 podnagaraja.101.t: "Собрание"
 podnagaraja.101.desc: "Они прибывают один за другим, выходя из теней и ступая сквозь саму Вуаль. Ваши собратья-нагараджа, каждый несёт секреты и знания из своих владений. Безмолвный конклав созван. Вопрос в том: чему будет посвящено его заседание?"
 podnagaraja.101.a: "Сосредоточиться на вопросах интриг и защиты."
 podnagaraja.101.a.tt: "Конклав обсудит методы обороны и хитростей"
 podnagaraja.101.b: "Сосредоточиться на некромантических исследованиях и ритуалах."
 podnagaraja.101.b.tt: "Конклав исследует более глубокие тайны смерти"

 podnagaraja.102.t: "Подношение"
 podnagaraja.102.desc: "В сердце каждого Безмолвного конклава лежит Подношение — ритуал, задействующий уникальную связь Нагараджа с Загробным миром. Чтобы подпитать обряд, нужно принести в жертву плоть — таков обычай нашего клана."
 podnagaraja.102.a: "Пожертвовать щедро и безвозмездно."
 podnagaraja.102.b: "Сделать лишь символическое подношение."

 podnagaraja.103.t: "Открытие"
 podnagaraja.103.desc: "Конклав привлёк внимание. Кто-то — смертный или иной — заметил собрание и мог увидеть то, что должно оставаться скрытым. С уликами нужно разобраться, прежде чем Маскарад окажется под ещё большей угрозой."
 podnagaraja.103.a: "Заплатить, чтобы замести следы."
 podnagaraja.103.a.tt: "Потратить золото, чтобы уничтожить улики"
 podnagaraja.103.b: "Броситься врассыпную и надеяться на лучшее."

 # ============================
 # Feature 6 Events
 # ============================

 podnagaraja.200.t: "Практик Итараджаны"
 podnagaraja.200.desc: "Весть о ваших поисках колдуна Итараджаны принесла плоды. Практик древней традиции индуистского кровавого чародейства [Select_CString(new_sorcerer.IsFemale, 'обнаружена и доставлена', 'обнаружен и доставлен' )] к вам. [new_sorcerer.GetHerHis|U] знания мистических искусств, коренных для субконтинента, могут оказаться бесценными."
 podnagaraja.200.a: "Принять [new_sorcerer.GetHerHis] на службу."
 podnagaraja.200.a.tt: "[new_sorcerer.GetShortUIName|U] станет вашим связанным [Concept('ghoul', 'гулем')|E] и присоединится к вашему двору"

 podnagaraja.201.t: "Исследования [Select_CString(sorcerer.IsFemale, 'колдуньи', 'колдуна' )]"
 podnagaraja.201.desc: "[Select_CString(sorcerer.IsFemale, 'Ваша колдунья', 'Ваш колдун' )] Итараджаны [sorcerer.GetFirstName] [Select_CString(sorcerer.IsFemale, 'проводила', 'проводил' )] исследования при дворе, углубляясь в точку пересечения индуистского мистицизма и некромантических искусств. [sorcerer.GetSheHe|U] подходит к вам со своими находками."
 podnagaraja.201.a: "Поощрить [sorcerer.GetHerHis] продолжить исследования."
 podnagaraja.201.b: "Использовать [sorcerer.GetHerHis] знания для немедленной выгоды."

 # ============================
 # Feature 3 Events
 # ============================

 podnagaraja.300.t: "Путешествие без возврата"
 podnagaraja.300.desc: "Перед вами [Select_CString(recipient.IsFemale, 'предстала', 'предстал' )] [recipient.GetFirstNameNoTooltip], ваше дитя, которое готовится к отправке на выполнение самого торжественного долга — одностороннего паломничества в призрачный город Енох. Там [Select_CString(recipient.IsFemale, 'она', 'он' )] будет служить интересам клана за пределами Вуали, поддерживая связи, недоступные живым."
 podnagaraja.300.a: "Ступай и служи нашему клану в мире за гранью."
 podnagaraja.300.a.tt: "[recipient.GetFirstNameNoTooltip] отправится в Загробный мир и никогда не вернётся. Вы получите престиж и будете почтены своей династией."
 podnagaraja.300.b: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]."
 podnagaraja.300.b.tt: "[recipient.GetFirstNameNoTooltip] останется при вашем дворе"

 # ============================
 # Feature 5 Events
 # ============================

 podnagaraja.400.t: "Риск Пожирателей плоти"
 podnagaraja.400.desc: "Голод терзает. Не просто жажда крови, поражающая низших вампиров, а более глубокая, более ужасная тяга, определяющая Нагараджа, — потребность в живой плоти. Проклятие требует утоления, и чем дольше вы сопротивляетесь, тем опаснее становится последующее кормление."
 podnagaraja.400.a: "Кормиться осторожно, выслеживая жертву с точностью."
 podnagaraja.400.b: "Кормиться безрассудно и полностью утолить голод."
 podnagaraja.400.b.tt: "Существует риск, что улики вашего кормления будут обнаружены"
 podnagaraja.400.c: "Вместо этого кормиться одним из моих гулей."
 podnagaraja.400.c.tt: "Безопасно, но ваш гуль это не оценит"
 podnagaraja.400.d: "Перетерпеть голод силой воли."

 podnagaraja.401.t: "Обнаружены улики"
 podnagaraja.401.desc: "Ваше безрассудное кормление оставило следы. Кто-то нашёл улики — возможно, останки, возможно, свидетелей, возможно, что-то похуже. Улики угрожают раскрыть вашу чудовищную природу тем, кому никогда не следовало бы об этом знать."
 podnagaraja.401.a: "Заплатить, чтобы улики уничтожили."
 podnagaraja.401.a.tt: "Потратить золото, чтобы решить проблему"
