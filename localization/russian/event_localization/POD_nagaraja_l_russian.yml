 # ============================
 # Feature 1: Purge the Serpent
 # ============================

 purge_serpent_india_decision: "Искоренить змей из Индии"
 purge_serpent_india_decision_tooltip: "Изгнать всех правителей из числа Сетитов и Дайтья из дворов Индии и Тибета, чтобы утвердить господство над субконтинентом"
 purge_serpent_india_decision_desc: "Последователи Сутеха — Сетиты и Дайтья — давно пустили корни своего влияния через дворы Индии и монастыри Тибета. Как Нагараджа, мы обязаны очистить нашу родину от их развращающего присутствия и установить своё господство над субконтинентом."
 purge_serpent_india_decision_confirm: "Дайтья познают страх"
 purge_serpent_capital_requirement: "Ваша столица должна находиться в регионе [GetGeographicalRegion('world_india').GetName] или [GetGeographicalRegion('world_tibet').GetName]"
 purge_serpent_no_setite_india: "Ни один сетит или дайтья не должны владеть графством или титулом более высокого ранга в регионе [GetGeographicalRegion('world_india').GetName]"
 purge_serpent_no_setite_tibet: "Ни один сетит или дайтья не должны владеть графством или титулом более высокого ранга в регионе [GetGeographicalRegion('world_tibet').GetName]"
 purge_serpent_effect_tooltip: "Вас провозгласят «Бичом Сутеха» и вы получите великие награды"

 # ============================
 # Feature 2: Pilgrimage to Enoch
 # ============================

 pilgrimage_to_enoch_decision: "Паломничество в Енох"
 pilgrimage_to_enoch_decision_tooltip: "Отправиться через Загробный мир в призрачный город Енох и вернуться с запретным знанием"
 pilgrimage_to_enoch_decision_desc: "Призрачный город Енох лежит глубоко в [UmbraGlossaryLocalized('shadowlands','Загробном мире')], месте ужасной силы и запретных знаний. Овладев некромантией и заручившись поддержкой верной [Concept('coterie', 'котерии')|E], вы сможете совершить опасное путешествие туда и вернуться с мудростью, превосходящей человеческое понимание."
 pilgrimage_to_enoch_decision_confirm: "В Загробный мир"
 pilgrimage_to_enoch_effect_tooltip: "Начать [Concept('journey', 'странствие')|E] в призрачный город Енох в Загробном мире"

 # ============================
 # Feature 4: Silent Conclave
 # ============================

 convene_silent_conclave_decision: "Созвать Безмолвный конклав"
 convene_silent_conclave_decision_tooltip: "Устроить тайное собрание старейшин Нагараджа для обмена знаниями и проведения тёмных ритуалов"
 convene_silent_conclave_decision_desc: "Безмолвный конклав — это тайное собрание Нагараджа, где обмениваются запретными знаниями и проводят тёмные ритуалы на благо клана. Такие собрания редки, опасны и чрезвычайно ценны."
 convene_silent_conclave_decision_confirm: "Пора собраться вместе"
 convene_silent_conclave_effect_tooltip: "Устроить тайное собрание Нагараджа для обмена знаниями и проведения тёмных ритуалов"

 # ============================
 # Feature 6: Recruit Sorcerer
 # ============================

 recruit_itarajana_sorcerer_decision: "Нанять колдуна Итараджаны"
 recruit_itarajana_sorcerer_decision_tooltip: "Найти практика кровавого чародейства Итараджаны и привязать его как гуля в услужении"
 recruit_itarajana_sorcerer_decision_desc: "Традиция кровавого чародейства Итараджаны опирается на индуистские мистические практики и коренятся на Индийском субконтиненте. Умелый практик, должным образом привязанный как гуль, может стать бесценным подспорьем для нашего двора."
 recruit_itarajana_sorcerer_decision_confirm: "Их знания послужат нам"
 recruit_itarajana_region_requirement: "Ваша столица должна находиться в регионе [GetGeographicalRegion('world_india').GetName], [GetGeographicalRegion('world_tibet').GetName], [GetGeographicalRegion('world_middle_east').GetName] или [GetGeographicalRegion('world_steppe').GetName]"
 recruit_itarajana_max_cap: "Вы не можете иметь более 3 #TOOLTIP:GAME_TRAIT,itarajana_sorcerer,[GetNullCharacter] #L чародеев Итараджаны#!#! при своём дворе"
 recruit_itarajana_ghoul_cap: "У вас уже максимальное количество [Concept('ghoul','гулей')|E] ([SCOPE.GetValue('ghoul_amount')|0])"
 recruit_itarajana_effect_tooltip: "[GetTrait('ghoul').GetName(GetNullCharacter)]-практик #TOOLTIP:GAME_TRAIT,itarajana_sorcerer,[GetNullCharacter] #L чародейства Итараджаны#!#! присоединится к вашему двору"