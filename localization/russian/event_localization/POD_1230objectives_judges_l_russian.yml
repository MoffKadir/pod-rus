l_russian:
 pod_judges_promised_land: "Земля обетованная"

 e_judges_title: "Судьи"
 e_judges_title_adj: "Судейск"

 judge_reclaim_promised_land_objective_decision: "Объединить Судей"
 judge_reclaim_promised_land_objective_decision_desc: "Судьи — это децентрализованная организация, и каждый из них в основном защищает собственное сообщество. Мы могли бы взять пример с Теневой инквизиции и объединиться под общим знаменем, чтобы действовать куда эффективнее. Для этого нам нужен лишь объединяющий лидер и первая победа, которая послужит фундаментом."
 judge_reclaim_promised_land_objective_decision_confirm: "Новое начало."
 judge_reclaim_promised_land_objective_decision_tooltip: "Стражи народа, объединяйтесь."

 judge_get_mystic_decision: "Изучить пути Мудрых"
 judge_get_mystic_decision_desc: "Чтобы достойно исполнять свои обязанности, мне следует изучать древние и мистические обычаи моих предков. Я обрету пользу от их мудрости и стану истинным мудрецом."
 judge_get_mystic_decision_confirm: "Начнём."
 judge_get_mystic_decision_tooltip: "Я изучу древние обычаи, чтобы стать мудрецом"

 judge_verify_christian_claim_objective_decision: "Вопрос Креста"
 judge_verify_christian_claim_objective_decision_desc: "Прежде чем мы сможем полностью посвятить себя помощи христианской Церкви в её охоте на Проклятых, мы должны уладить наши богословские разногласия с ней."
 judge_verify_christian_claim_objective_decision_confirm: "Решения должны основываться на прагматизме"
 judge_verify_christian_claim_objective_decision_tooltip: "Отдалившиеся потомки нашей веры."

 judge_contact_magi_objective_decision: "Установить контакт с Волхвами"
 judge_contact_magi_objective_decision_desc: "Следуя традициям, заложенным пророком Даниилом, Волхвы издавна практикуют более линейную форму низшей магии. Кроме того, они — одни из немногих оставшихся мизрахитских Судей в эти тёмные времена. Нужно восстановить с ними контакт, пока мы стремимся скоординировать действия различных ячеек."
 judge_contact_magi_objective_decision_confirm: "Поговорим с ними"
 judge_contact_magi_objective_decision_tooltip: "Мы будем учиться у мизрахитов и Волхвов"

 judge_contact_ashkenazic_objective_decision: "Установить контакт с ашкеназскими Судьями"
 judge_contact_ashkenazic_objective_decision_desc: "В большей степени, чем кто-либо, ашкеназские Судьи исследовали и изучали Сефер Йециру. Способность их раввинов Баал Шем создавать живые конструкции широко известна и позволила им выжить среди Проклятых. Кроме того, они добились покровительства двух Проклятых в этом регионе. Нужно восстановить с ними контакт, пока мы стремимся скоординировать действия различных ячеек."
 judge_contact_ashkenazic_objective_decision_confirm: "Поговорим с ними"
 judge_contact_ashkenazic_objective_decision_tooltip: "Мы будем учиться у ашкеназим"
 judge_contact_ashkenazic_objective_decision_befriend_josef: "Защитник Праги, [GetScriptedCharacterByHistoryID('505089').GetFirstName], должен быть вашим [Concept('friend', 'другом')|E], [Concept('lover', 'любовником')|E], [Concept('soulmate', 'родственной душой')|E] или членом группы ([GetPlayer.Custom('PODCoterie')]) если он всё ещё жив и активен"
 judge_contact_ashkenazic_objective_decision_befriend_yitzhak: "Пепельный раввин, [GetScriptedCharacterByHistoryID('790246').GetFirstName], должен быть вашим [Concept('friend', 'другом')|E], [Concept('lover', 'любовником')|E], [Concept('soulmate', 'родственной душой')|E] или членом группы ([GetPlayer.Custom('PODCoterie')]) если он всё ещё жив и активен"
 judge_contact_ashkenazic_objective_decision_know_theurgist: "Запрещено изучать Сефер Йециру в одиночку. Её можно изучать только группами по два-три человека. Найдите других #TOOLTIP:GAME_TRAIT,theurgist,[GetNullCharacter] #L каббалистов#!#!, которые будут вашими [Concept('friend', 'друзьями')|E], [Concept('lover', 'любовниками')|E], [Concept('soulmate', 'родственными душами')|E], или членами группы ([GetPlayer.Custom('PODCoterie')]), чтобы они могли изучать её вместе с вами."
 judge_contact_ashkenazic_objective_decision_popular_in_prague: "Графство [GetTitleByKey('c_praha').GetNameNoTier] должно входить в ваши владения и [Concept('county_opinion', 'мнение графства')|E] о владельце должно быть 35 или выше."

 judge_contact_esraelawi_objective_decision: "Установить контакт с есраэлавитскими Судьями"
 judge_contact_esraelawi_objective_decision_desc: "Чтобы защитить своих братьев, все Судьи вынуждены быть солдатами и воинами. Однако есраэлавитские Судьи специально сохранили воинские традиции колена Дана. Если мы докажем им свою состоятельность, они, возможно, согласятся обучить нас своим традициям."
 judge_contact_esraelawi_objective_decision_confirm: "Поговорим с ними"
 judge_contact_esraelawi_objective_decision_tooltip: "Мы будем учиться у есраэлавитов"

 judge_contact_kochinim_objective_decision: "Установить контакт с кохинитскими Судьями"
 judge_contact_kochinim_objective_decision_desc: "За определённую плату и ценой того, что мы станем более публичной фигурой, мы можем связаться с нашими братьями в Индии. Кохиниты известны своей торговой сетью и построенной вокруг неё разведывательной сетью. Установление контакта с ними позволит нам воспользоваться обоими этими преимуществами."
 judge_contact_kochinim_objective_decision_confirm: "Поговорим с ними"
 judge_contact_kochinim_objective_decision_tooltip: "Мы будем учиться у кохинитов"

 judge_contact_sephardim_objective_decision: "Установить контакт с сефардскими Судьями"
 judge_contact_sephardim_objective_decision_desc: "Наши братья из Иберии и Северной Африки славятся своим пониманием вне-Танахских писаний и умением выживать в тех неспокойных регионах. Если мы сможем связаться с ними и помочь решить некоторые из стоящих перед ними проблем, то они, в свою очередь, смогут оказать нам помощь в наших будущих начинаниях."
 judge_contact_sephardim_objective_decision_confirm: "Поговорим с ними"
 judge_contact_sephardim_objective_decision_tooltip: "Мы будем учиться у сефардов"

 judge_research_origins_mummies_objective_decision: "Определить происхождение Бессмертных"
 judge_research_origins_mummies_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Нам следует выяснить происхождение #TOOLTIP:GAME_TRAIT,mummy,[GetNullCharacter] #L Бессмертных#!#!, более известных как мумии. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_mummies_objective_decision_confirm: "Найдём истину"
 judge_research_origins_mummies_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_mummies_objective_decision_benefit: "Мы раскроем происхождение #TOOLTIP:GAME_TRAIT,mummy,[GetNullCharacter] #L Бессмертных#!#!"
 judge_research_origins_mummies_objective_decision_befriend_cabirus: "Независимая мумия, [GetScriptedCharacterByHistoryID('792600').GetFirstName],  должен быть вашим [Concept('friend', 'другом')|E], [Concept('lover', 'любовником')|E], [Concept('soulmate', 'родственной душой')|E] или членом группы ([GetPlayer.Custom('PODCoterie')]) если он всё ещё жив и активен"

 judge_research_origins_demons_objective_decision: "Определить происхождение Падших"
 judge_research_origins_demons_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Нам следует выяснить происхождение #TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L Падших#!#!, более известных как демоны. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_demons_objective_decision_confirm: "Найдём истину"
 judge_research_origins_demons_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_demons_objective_decision_benefit: "Мы раскроем происхождение #TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L Падших#!#!"

 judge_research_origins_fae_objective_decision: "Определить происхождение фей"
 judge_research_origins_fae_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Нам следует выяснить происхождение #TOOLTIP:GAME_TRAIT,fae,[GetNullCharacter] #L фей#!#!, хотя отсутствие текстов на эту тему вынудит нас обратиться к альтернативным источникам информации. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_fae_objective_decision_confirm: "Найдём истину"
 judge_research_origins_fae_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_fae_objective_decision_benefit: "Мы раскроем происхождение #TOOLTIP:GAME_TRAIT,fae,[GetNullCharacter] #L фей#!#!"

 judge_research_origins_wraiths_objective_decision: "Определить происхождение призраков"
 judge_research_origins_wraiths_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Нам следует выяснить происхождение #TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призраков#!#!, возможно, даже вступив с ними в контакт посредством наших медитаций. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_wraiths_objective_decision_confirm: "Найдём истину"
 judge_research_origins_wraiths_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_wraiths_objective_decision_benefit: "Мы раскроем происхождение #TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призраков#!#!"

 judge_research_origins_kueijin_objective_decision: "Определить происхождение куэй-дзин"
 judge_research_origins_kueijin_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Нам следует выяснить происхождение [Glossary('куэй-дзин','game_concept_kuei_jin_desc')] или ван-сянь. Возможно, мы найдём их изначальный способ возвращения — до их порчи. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_kueijin_objective_decision_confirm: "Найдём истину"
 judge_research_origins_kueijin_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_kueijin_objective_decision_benefit: "Мы раскроем происхождение [GetTrait('kueijin').GetName(GetNullCharacter)|l]"

 judge_research_origins_therianthropes_objective_decision: "Определить происхождение териантропов"
 judge_research_origins_therianthropes_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Нам следует выяснить происхождение [Glossary('териантропов', 'glossary_fera_tt')]. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_therianthropes_objective_decision_confirm: "Найдём истину"
 judge_research_origins_therianthropes_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_therianthropes_objective_decision_benefit: "Мы раскроем происхождение [Glossary('териантропов', 'glossary_fera_tt')]"

 judge_research_origins_mortal_magic_objective_decision: "Определить происхождение магии смертных"
 judge_research_origins_mortal_magic_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Нам следует выяснить происхождение всей магии смертных, отчасти — путём изучения каждой из них. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_mortal_magic_objective_decision_confirm: "Найдём истину"
 judge_research_origins_mortal_magic_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_mortal_magic_objective_decision_benefit: "Вы получите доступ к способностям хекау, тан и цяо."

 judge_research_origins_vampires_3rdgen_objective_decision: "Изучить происхождение третьего поколения"
 judge_research_origins_vampires_3rdgen_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Прежде всего — это Проклятые. Первый шаг — исследование деяний [Glossary('допотопных','game_concept_antediluvian_desc')]  вскоре после Великого Потопа. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_vampires_3rdgen_objective_decision_confirm: "Найдём истину"
 judge_research_origins_vampires_3rdgen_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_vampires_3rdgen_objective_decision_benefit: "Мы раскроем историю Второго города [Glossary('допотопных','game_concept_antediluvian_desc')] после Великого Потопа"

 judge_research_origins_vampires_2ndgen_objective_decision: "Изучить происхождение второго поколения"
 judge_research_origins_vampires_2ndgen_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Прежде всего — это Проклятые. Следующий шаг — исследование происхождения так называемого второго поколения и их родного города, существовавшего до Великого Потопа. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_vampires_2ndgen_objective_decision_confirm: "Найдём истину"
 judge_research_origins_vampires_2ndgen_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_vampires_2ndgen_objective_decision_benefit: "Мы раскроем историю второго поколения и Первого города до Великого Потопа"

 judge_research_origins_vampires_lilith_n_disciplines_objective_decision: "Изучить происхождение дисциплин"
 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Прежде всего — это Проклятые. Следующий шаг — исследование происхождения дисциплин Проклятых и их взаимодействия с нашей ненавистной противницей, Лилит. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_confirm: "Найдём истину"
 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_benefit: "Мы раскроем происхождение дисциплин Проклятых"

 judge_research_origins_vampires_caine_n_abel_objective_decision: "Изучить происхождение Каина"
 judge_research_origins_vampires_caine_n_abel_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Прежде всего — это Проклятые. Следующий шаг — исследование происхождения самого Каина. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_vampires_caine_n_abel_objective_decision_confirm: "Найдём истину"
 judge_research_origins_vampires_caine_n_abel_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_vampires_caine_n_abel_objective_decision_benefit: "Мы раскроем происхождение самого Каина"

 judge_research_origins_vampires_golconda_objective_decision: "Изучить возможности для искупления"
 judge_research_origins_vampires_golconda_objective_decision_desc: "Мы знаем, что ЯХВХ сотворил всё сущее и избрал нас быть Его народом. Однако во Его творении есть многое, чего мы пока не понимаем. Прежде всего — это Проклятые. Последний шаг — исследование возможностей искупления для Проклятых. Мы запишем наши находки в едином труде под названием Хавана."
 judge_research_origins_vampires_golconda_objective_decision_confirm: "Найдём истину"
 judge_research_origins_vampires_golconda_objective_decision_tooltip: "Во славе Божией — сокрывать суть вещей, но во славе царей — исследовать их."
 judge_research_origins_vampires_golconda_objective_decision_benefit: "Мы раскроем возможности искупления"
 judge_research_origins_vampires_golconda_objective_decision_befriend_nahum: "Мудрый советник, [GetScriptedCharacterByHistoryID('790237').GetFirstName], должен быть вашим [Concept('friend', 'другом')|E], [Concept('lover', 'любовником')|E], [Concept('soulmate', 'родственной душой')|E] или членом группы ([GetPlayer.Custom('PODCoterie')]) если он всё ещё жив и активен"

 judge_reclaim_promised_land_objective_decision_effect1: "Вы получите титулы Судей"
 judge_reclaim_promised_land_objective_decision_effect2: "Вы становитесь главой #L [GetFaithByKey('judge').GetName|l]их#! конфессий"
 judge_reclaim_promised_land_objective_decision_effect3: "Каждое графство в Земле обетованной получит модификатор «[GetModifier('undone_diaspora_modifier').GetNameWithTooltip]» и присоединится к Судьям"
