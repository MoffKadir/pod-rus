 magi_modifier: "Глава Волхвов"
 magi_modifier_desc: "Ваши знания мистических сил в сочетании с учениями Волхвов многому вас научили."
 ashkenazic_modifier: "Авра К'давра"
 ashkenazic_modifier_desc: "Ваша династия познала секреты, необходимые для преобразования языка и создания жизнеподобных конструкций из простой пыли."
 esraelawi_modifier: "Традиции данитян"
 esraelawi_modifier_desc: "Вашей династии были переданы некоторые воинские традиции колена Данова теми немногими Судьями, что ещё помнят их."
 kochinim_modifier: "Закен Роши"
 kochinim_modifier_desc: "Как главные старейшины Кохиним, ваша династия теперь курирует их торговые и разведывательные сети."
 sephardim_modifier: "Королевский раввин"
 sephardim_modifier_desc: "Сефарды направили административных раввинов, чтобы помогать и консультировать вашу династию."
 second_city_modifier: "Уроки Второго города"
 second_city_modifier_desc: "Второй город был местом, кишащим интригами: каждый его житель участвовал в Великой игре и пытался свергнуть своих вышестоящих, зачастую прибегая к убийствам или диаблери."
 first_city_modifier: "Уроки Первого города"
 first_city_modifier_desc: "Несмотря на все прочие недостатки и грехи, Каин был компетентным и умелым правителем. Мы можем извлечь некоторые уроки из его действий и того, как он управлял Убаром, Первым городом."
 lilith_and_disciplines_modifier: "Магия Лилит и Каина"
 lilith_and_disciplines_modifier_desc: "Каин получил определённые магические способности от Лилит перед тем, как покинуть её. Наше исследование этой темы дало несколько полезных выводов, которые можно применить в исследованиях других областей."
 caine_and_abel_modifier: "Распространение истории Каина"
 caine_and_abel_modifier_desc: "После того как мы обнаружили и распространили полную историю Каина, мы заручились дополнительной поддержкой в борьбе с Проклятыми и объединили множество союзников."

 mashiach_cometh_name: "Общая иудео-христианская история"
 special_doctrine_mashiach_cometh_name: "Общая иудео-христианская история"
 special_doctrine_mashiach_cometh_desc: "Хотя мы расходимся во мнениях по многим вопросам с нашими христианскими братьями, мы всё же можем теснее сотрудничать с Теневой инквизицией Церкви и поддерживать их усилия."

 mummy_origins_modifier: "Понимание Бессмертных"
 mummy_origins_modifier_desc: "Изучив Бессмертных, мы смогли объединить их алхимические способности с нашей каббалистикой, что дало дополнительные средства для охоты."
 demon_origins_modifier: "Понимание Падших"
 demon_origins_modifier_desc: "Изучив Падших, мы стали лучше подготовлены к тому, чтобы противостоять их натиску."
 fae_origins_modifier: "Понимание фей"
 fae_origins_modifier_desc: "Изучив фей, мы получили возможность едва заметно изменять реальность с помощью нашей веры и сновидений, улучшая способность возводить новые сооружения."
 kueijin_origins_modifier: "Понимание куэй-дзин"
 kueijin_origins_modifier_desc: "Изучив куэй-дзин и первоначальных Десять тысяч героев, мы смогли продлить срок своей жизни, улучшив способность к охоте."
 therianthrope_origins_modifier: "Понимание териантропов"
 therianthrope_origins_modifier_desc: "Изучив териантропов, мы, возможно, сможем укрепить себя так же, как это делали они."

 undone_diaspora_modifier: "Возвращающиеся Судьи"
 undone_diaspora_modifier_desc: "От Британских островов до берегов Китая Судьи возвращаются домой и приносят с собой великое процветание, знания и рабочие руки. Между различными традициями и теми, кто в настоящее время проживает на Обетованной земле, наблюдается некоторое беспокойство, но мы научимся адаптироваться — как всегда учились."

 doctrine_origins_improvements_name: "Преимущества исследований"
 wraith_origins_name: "Понимание призраков"
 wraith_origins_desc: "Изучив Бессмертных, мы повысили нашу способность действовать за кулисами."
 mortal_magic_origins_name: "Понимание всей магии смертных"
 mortal_magic_origins_desc: "После обширных — а некоторые сказали бы, чрезмерных — исследований мы обнаружили истоки всей магии смертных. С нашим новообретённым пониманием мы освоили многие базовые навыки, связанные с каждой формой."

 doctrine_prioritized_hunting_name: "Приоритетная охота"
 golconda_repentance_name: "Истина о Проклятых"
 golconda_repentance_desc: "После столь тщательных исследований мы достигли истинного понимания природы Проклятых, что позволит нам работать вместе с теми, кого коснулась милость Б-га, в погоне за отродьем Лилит. Кроме того, все наши еврейские братья — Проклятые и смертные — теперь могут работать сообща для достижения наших истинных целей."
 doctrine_parameter_hostility_override_golconda_repentance: "Другие [Concept('faiths', 'конфессии')|E], как [Glossary('каинитские','game_concept_cainite_desc')], так и охотнические, имеющие [Concept('doctrine', 'доктрину')|E] «[GetFaithDoctrine('golconda_repentance').GetBaseName]», воспринимаются как [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V], а не $hostility_evil_tooltippable$"

 judge_research_origins_mummies_objective_decision_osiris_flail: "[GetPODArtifact('osiris_flail_link').GetName], в котором записана вся история мумий, принадлежит вам"
 judge_research_origins_mummies_objective_decision_book_thoth: "[GetPODArtifact('book_thoth_link').GetName], которая даёт понимание магии мумий, как её преподал Исиде Тот, принадлежит вам"
 judge_research_origins_mummies_objective_decision_isis_fragments: "[GetPODArtifact('isis_fragments_link').GetName], в которых записана история египетских мумий с точки зрения культа Исиды, принадлежат вам"
 judge_research_origins_mummies_objective_decision_writings_cabirus: "[GetPODArtifact('writings_cabirus_link').GetName] — плохо переведённая копия его версии заклинания Жизни, принадлежат вам"

 judge_research_origins_demons_objective_decision_dreams_angra: "[GetPODArtifact('dreams_angra_link').GetName], которые дают понимание древних ритуалов Баала, принадлежат вам"
 judge_research_origins_demons_objective_decision_incunabulum_kupalam: "[GetPODArtifact('incunabulum_kupalam_link').GetName], который даёт понимание природы демона Купалы и ритуалов, позволяющих призвать и связать его, принадлежит вам"
 judge_research_origins_demons_objective_decision_book_tobit: "[GetPODArtifact('book_tobit_link').GetName], в которой описаны способы, которыми Б-г использовал демонов для испытания верных, а также инфернальные знания древних [Glossary('кланов','game_concept_Clan_desc')], принадлежит вам"
 judge_research_origins_demons_objective_decision_control_tunis: "Вы контролируете [GetTitleByKey('c_tunis').GetNameNoTier], где Баали принесли в жертву множество детей и распространили своё безумие"
 judge_research_origins_demons_objective_decision_control_chandax: "Вы контролируете [GetTitleByKey('c_chandax').GetNameNoTier], где до сих пор покоится тело Намтару"

 judge_research_origins_fae_objective_decision_mayo: "Вы контролируете [GetTitleByKey('c_mayo').GetNameNoTier] — родину Серебряных врат, где когда-то собирался двор Всех королей, и центр их противостояния"
 judge_research_origins_fae_objective_decision_atholl: "Вы контролируете [GetTitleByKey('c_atholl').GetNameNoTier] — нынешнее пристанище Туата Хронос, где многие феи, включая некоторых провидцев, укрываются от бури"
 judge_research_origins_fae_objective_decision_aviovara: "Вы контролируете [GetTitleByKey('c_aviovara').GetNameNoTier], известную среди фей как Хрустальная крепость и центр их противостояния"
 judge_research_origins_fae_objective_decision_ailech: "Вы контролируете [GetTitleByKey('c_ailech').GetNameNoTier], древнюю обитель Балора Злобоглаза, короля фоморов"
 judge_research_origins_fae_objective_decision_monmouthshire: "YВы контролируете [GetTitleByKey('c_monmouthshire').GetNameNoTier],  — место, где находится сердце мифического Камелота и откуда можно заглянуть в [UmbraGlossaryLocalized('dreaming','Грёзы')]"
 judge_research_origins_fae_objective_decision_lennox: "Вы контролируете [GetTitleByKey('c_lennox').GetNameNoTier], известный как Тропа крови фей"
 judge_research_origins_fae_objective_decision_reval: "Вы контролируете [GetTitleByKey('c_reval').GetNameNoTier] — обитель Янтарного дворца"
 judge_research_origins_fae_objective_decision_bayeux: "Вы контролируете [GetTitleByKey('c_bayeux').GetNameNoTier] — обитель Источника фей"
 judge_research_origins_fae_objective_decision_warwickshire: "Вы контролируете [GetTitleByKey('c_warwickshire').GetNameNoTier] — обитель Доблестной кузни, где феи создают удивительные вещи"
 judge_research_origins_fae_objective_decision_black_torc_of_carniog: "[GetPODArtifact('black_torc_of_carniog_link').GetName], который может позволить нам заставить фей помочь в наших усилиях, принадлежит вам"
 judge_research_origins_fae_objective_decision_tapestry_of_fate: "[GetPODArtifact('tapestry_of_fate_link').GetName], который даёт понимание [Glossary('истинных имён','podgloss.truename')] и судьбы [UmbraGlossaryLocalized('dreaming','Грёз')], принадлежит вам"

 judge_research_origins_demons_objective_decision_book_of_the_spirits_secrets: "[GetPODArtifact('book_of_the_spirits_secrets_link').GetName], которая содержит теургическую информацию о царстве духов, известном как [Concept('umbra', 'Умбра')|E], принадлежит вам"
 judge_research_origins_demons_objective_decision_khazar_diary: "[GetPODArtifact('khazar_diary_link').GetName], который был написан одним из наших братьев и описывает границы между нашим миром и [UmbraGlossaryLocalized('shadowlands','Лимбом')], принадлежит вам"
 judge_research_origins_demons_objective_decision_book_going_night: "[GetPODArtifact('book_going_night_link').GetName], которая даёт понимание определённых ритуалов и заклинаний для входа в загробный мир — хотя и с точки зрения египетского Проклятого, принадлежит вам"
 judge_research_origins_demons_objective_decision_ignace_notes: "[GetPODArtifact('ignace_notes_link').GetName], которые могут предоставить нам карту духовных миров, принадлежит вам"
 judge_research_origins_demons_objective_decision_black_torc_of_carniog: "[GetPODArtifact('black_torc_of_carniog_link').GetName], который традиционно позволяет владельцу захватывать души и может дать нам некоторое понимание того, как [UmbraGlossaryLocalized('shadowlands','Лимб')] захватил своих обитателей, принадлежит вам"

 judge_research_origins_kueijin_objective_decision_lhasa: "Вы контролируете #ONCLICK:TITLE,c_lhasa #TOOLTIP:LANDED_TITLE,c_lhasa #L Лхасу#!#!#! — столицу Тибета и ключевой священный объект"
 judge_research_origins_kueijin_objective_decision_purang: "Вы контролируете [GetTitleByKey('c_purang').GetNameNoTier] — место, где когда-то находился Меру, мифическое обиталище ван-сянь"
 judge_research_origins_kueijin_objective_decision_baizetu: "Вы должны собрать 5 фрагментов Бай Цзэ Ту — легендарного гримуара, написанного Жёлтым императором, который содержит секреты всех 11.520 видов сверхъестественных существ"

 judge_research_origins_therianthropes_objective_decision_torture_therian: "Из-за их опоры на устные традиции вы должны захватить по меньшей мере пять [Glossary('териантропов', 'glossary_fera_tt')] которых можно подвергнуть допросу"
 judge_research_origins_therianthropes_objective_decision_torture_fallen: "Захватите и допросите #TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L Падших#!#!, поскольку их страх перед [Glossary('териантропами', 'glossary_fera_tt')] указывает на то, что они могут обладать некой подсказкой о происхождении териантропов"

 judge_research_origins_mortal_magic_objective_decision_origins_mummies: "Вы должны раскрыть происхождение #TOOLTIP:GAME_TRAIT,mummy,[GetNullCharacter] #L Бессмертных#!#!"
 judge_research_origins_mortal_magic_objective_decision_origins_wraiths: "Вы должны раскрыть происхождение #TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призраков#!#!"
 judge_research_origins_mortal_magic_objective_decision_origins_kueijin: "Вы должны раскрыть происхождение [GetTrait('kueijin').GetName(GetNullCharacter)|l]"
 judge_research_origins_mortal_magic_objective_decision_origins_fallen: "Вы должны раскрыть происхождение #TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L Падших#!#!"
 judge_research_origins_mortal_magic_objective_decision_origins_therians: "Вы должны раскрыть происхождение [Glossary('териантропов', 'glossary_fera_tt')]"
 judge_research_origins_mortal_magic_objective_decision_origins_fae: "Вы должны раскрыть происхождение #TOOLTIP:GAME_TRAIT,fae,[GetNullCharacter] #L фей#!#!"

 judge_research_origins_vampires_3rdgen_objective_decision_promised_land: "Ваша [Concept('capital', 'столица')|E] находится в регионе [GetGeographicalRegion('pod_judges_promised_land').GetName]"
 judge_research_origins_vampires_3rdgen_objective_decision_sargon_codex: "Вы должны обнаружить тринадцать осколков Кодекса Саргона"
 judge_research_origins_vampires_3rdgen_objective_decision_tale_of_the_first_city: "[GetPODArtifact('tale_of_the_first_city1').GetName] или [GetPODArtifact('tale_of_the_first_city2').GetName], в которой рассказывается о времени как до, так и после Великого потопа, принадлежит вам"
 judge_research_origins_vampires_3rdgen_objective_decision_biblia_negra: "[GetPODArtifact('biblia_negra_link').GetName], в которой говорится о 67 заточённых сущностях, предназначенных для уничтожения или захвата мира, тринадцать из которых — [Glossary('допотопные','game_concept_antediluvian_desc')], принадлежит вам"
 judge_research_origins_vampires_3rdgen_objective_decision_chronicles_heartblood: "[GetPODArtifact('chronicles_heartblood_link').GetName] — история Бану Хаким, принадлежит вам"
 judge_research_origins_vampires_3rdgen_objective_decision_karalavanisha_vrana: "[GetPODArtifact('karalavanisha_vrana_link').GetName], в которой рассказывается о происхождении индийских Равнос, принадлежит вам"
 judge_research_origins_vampires_3rdgen_objective_decision_canticle_japhet: "[GetPODArtifact('canticle_japhet_link').GetName], в которой утверждается, что Каин мёртв, принадлежит вам"
 judge_research_origins_vampires_3rdgen_objective_decision_book_enoch: "[GetPODArtifact('book_enoch_link').GetName], которая содержит некоторые из древнейших каинитских пророчеств, саг и преданий, принадлежит вам"

 judge_research_origins_vampires_2ndgen_objective_decision_chronicle_of_caine: "Вы должны обладать Хрониками Каина, которые содержат дополнительные сведения о временах Первого города"
 judge_research_origins_vampires_2ndgen_objective_decision_codex_damned: "[GetPODArtifact('codex_damned_link').GetName], в котором описывается правление в Первом и Втором городах, принадлежит вам"
 judge_research_origins_vampires_2ndgen_objective_decision_ubar_chronicles: "[GetPODArtifact('ubar_chronicles_link').GetName], которые разрешают противоречия в историях об Енохе и Убаре, принадлежат вам"
 judge_research_origins_vampires_2ndgen_objective_decision_gospels_irad: "[GetPODArtifact('gospels_irad_link').GetName], в которых рассказывается об истории Ирада и другого дитя Каина по имени Ада, принадлежат вам"

 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_tablet_of_destiny: "[GetPODArtifact('tablet_of_destiny').GetName], которая описывает все кровавые магические искусства, освоенные Енохом, принадлежит вам"
 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_tapestry_noir: "[GetPODArtifact('tapestry_noir_link').GetName], на котором изображена Хроника Каина из Книги Нод, принадлежит вам"
 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_chronicle_of_caine: "Вы должны обладать Хрониками Каина, которые дают представление о том, как Каин получил свои способности"
 judge_research_origins_vampires_lilith_n_disciplines_objective_decision_cycle_lilith: "[GetPODArtifact('cycle_lilith_link').GetName] — сборник устных песен, излагающих ноддистскую историю с мерзкой точки зрения Лилит, принадлежит вам"

 judge_research_origins_vampires_caine_n_abel_objective_decision_book_of_nod: "Вы должны обладать Книгой Нод, которая рассказывает полную историю Каина и его потомков"
 judge_research_origins_vampires_caine_n_abel_objective_decision_gospel_laodice: "[GetPODArtifact('gospel_laodice_link').GetName], в которой объясняется взгляд каинитов на их отношения с Б-гом, принадлежит вам"
 judge_research_origins_vampires_caine_n_abel_objective_decision_erciyes_fragments: "[GetPODArtifact('erciyes_fragments').GetName], в которых описывается каинитская история сотворения мира и другие апокрифические сказания, принадлежат вам"

 judge_research_origins_vampires_golconda_objective_decision_book_sun: "[GetPODArtifact('book_sun_link').GetName], — рассказ о Проклятом, который искал [Concept('golconda', 'Голконду')|E], принадлежит вам"
 judge_research_origins_vampires_golconda_objective_decision_consolation_philosophy: "[GetPODArtifact('consolation_philosophy_link').GetName], в которой обсуждается природа проклятия Б-га и возможность покаяния, принадлежит вам"

 judge_verify_christian_claim_objective_decision_byzantion: "Графство [GetTitleByKey('c_byzantion').GetNameNoTier] должно находиться в пределах ваших владений и управляться вашим единоверцем. В качестве альтернативы подойдёт, если им управляет персонаж из числа Акритов."
 judge_verify_christian_claim_objective_decision_jerusalem: "Графство [GetTitleByKey('c_jerusalem').GetNameNoTier] должно находиться в пределах ваших владений и управляться вашим единоверцем."
 judge_verify_christian_claim_objective_decision_rome: "Графство [GetTitleByKey('c_roma').GetNameNoTier] должно находиться в пределах ваших владений и управляться кем-то вашей веры. В качестве альтернативы подойдёт, если им управляет персонаж из Теневой инквизиции."

 POD_perfect_world_judge_interaction: "Идеальный мир"