 pod1230objectives_judges.1.t: "Волхвы Пророка"
 pod1230objectives_judges.1.desc: "Во время служения царям Вавилона и Персии пророк Даниэль стал главой среди Волхвов. Благодаря своему знанию колдовства и мудрости Б-га Даниэль занял пост главы Волхвов и обучил их тайнам Танаха, чтобы направлять в их ремесле. Они изучали звёзды в поисках знаков будущего и более линейных путей традиционной теургии, которой учили по тайному Талмуду.\n\nС появлением в регионе Проклятых и Падших Волхвы повсеместно перестали быть придворными советниками и были вынуждены укрыться в геонических академиях. Их силы могут быть для нас загадкой, но явно берут начало в учениях пророка Даниэля, что делает их нашими союзниками. После того как мы вернули себе центр их деятельности, нам впервые за столетия удалось установить с ними контакт. С их мудростью и помощью Судей-мизрахимов мы сможем передать секреты, прежде хранившиеся немногими, и укрепить нашу вечную борьбу с теми, кто скрывается в тени."
 pod1230objectives_judges.1.a: "Вместе мы учимся."

 # Menahemite special content for Magi decision
 # Subevent so event number is a bunch of 1s
 pod1230objectives_judges.111.t: "Наставники Менахема"
 pod1230objectives_judges.111.desc: "Отвоевав Багдад у отродья Лилит, мы восстановили контакт с Волхвами. Они — мастера Талмуда, как общедоступной, так и скрытой его версии, поскольку были основаны пророком Даниэлем во время Первого изгнания. Часто один из их числа носил титул Рош-ешивы или Гаона. Это наследие даровало им глубокое понимание каббалистических и колдовских искусств, сделав бесценными союзниками Судей.\n\nТак Волхвы впервые встретили Менахема, когда он отправился в Багдад в поисках знаний. Они обучили его правильному использованию сверхъестественных даров, дарованных ему Адон Оламом. Они открыли ему существование Детей Лилит и других существ, крадущихся в тени. С их помощью он стал могущественным и мудрым человеком, который возглавил нас после смерти своего отца и освободил нас из-под власти тьмы.\n\nВолхвы слышали слухи о наших деяниях, но формальный контакт не мог быть установлен. Теперь они предлагают возродить старый союз и обучить нас тому, чему когда-то учили Менахема. Всё, что они просят взамен, — помощь в их усилиях понять тёмных созданий, чтобы эффективнее с ними бороться.\n\nТеперь, когда Багдад наш и Волхвы на нашей стороне, нет сомнений, что Иерусалим будет освобождён из тьмы."
 pod1230objectives_judges.111.a: "Пойдём по стопам Менахема, а затем шагнём дальше"
 pod1230objectives_judges.111.b: "Менора горит ярче"
 house_menahemites_improved_menahem_modifier: "По стопам Менахема"
 house_menahemites_improved_menahem_modifier_desc: "Хотя некоторые когда-то сомневались, действительно ли Менахем был Сыном Давида, теперь в этом не может быть сомнений. Возможно, он не полностью принял наследие Давида в своё время, но мы уже воплотили многие его обещания и готовы исполнить его предназначение. Он научил нас распознавать наших истинных врагов и бороться с ними — цель, в которой нам теперь помогают его учителя. Мы обрели силу и готовы отбросить ночь."
 house_menahemites_menahem_teachers_modifier: "Наставники Менахема"
 house_menahemites_menahem_teachers_modifier_desc: "Как когда-то они учили Менахема, теперь Волхвы передают свои учения нам, даруя понимание того, с чем мы сражаемся. С их помощью менора Судей горит всё ярче, отбрасывая тьму."

 pod1230objectives_judges.2.t: "Создатели големов"
 pod1230objectives_judges.2.desc: "После долгих усилий мы установили контакт с ашкеназскими Судьями и Проклятыми в этом регионе. Проклятые не желают участвовать в нашей охоте — они лишь защищают наших смертных собратьев. Хотя некоторые более рьяные Судьи могут с этим не согласиться, мы благодарны за их помощь в защите наших братьев.\nИх раввины Баал Шем, так называемые «владыки имени», в десятки раз расширили наши познания в создании конструкций. Давайте используем этих големов для защиты всех наших общин и искоренения тех, кто охотится на нас из тени."
 pod1230objectives_judges.2.a: "Вместе мы защищаем."

 pod1230objectives_judges.3.t: "Традиции Дана"
 pod1230objectives_judges.3.desc: "Хотя мы и хотели бы быть учёными или раввинами, все Судьи вынуждены быть солдатами и воинами — ведь защита нашего народа должна стоять на первом месте. Однако израэлавские Судьи в Абиссинии сохранили древние воинские традиции нашего народа, в особенности племени Дана. Сетиты, Бессмертные, Лайбон и Аширра постоянно пытаются истребить наших собратьев в Бета-Исраэле, вынуждая израэлавских Судей совершенствовать искусство войны.\nТеперь, когда мы установили с ними контакт и доказали, что способны им помочь, они передали нам свои древнейшие учения. С этой основой мы можем гарантировать сохранение традиций в нашей династии, что поможет нам в стремлении уничтожить отродье Каина и Лилит."
 pod1230objectives_judges.3.a: "Вместе мы сражаемся."

 pod1230objectives_judges.4.t: "Мастера торговли"
 pod1230objectives_judges.4.desc: "Из-за изоляции от большинства еврейских общин потребовалось немало усилий, чтобы связаться с Кохиним. У них множество корней. Некоторые из них когда-то были торговцами под началом царя Соломона, отправлявшимися к неведомым берегам. Другие пришли сюда, спасаясь от одного из двух Изгнаний. Их Судьи сталкиваются с не меньшим числом угроз — будь то индийские Проклятые, Проклятые с запада или Голодные мертвецы с дальнего востока.\n\nКохиним освоили две сферы, позволившие им выжить, и теперь передали это мастерство нам. Они контролируют обширную торговую сеть, охватывающую Индию и близлежащие регионы, чтобы снабжать Судей, а поверх торговли они создали разведывательную сеть, помогающую Судьям в их охоте."
 pod1230objectives_judges.4.a: "Вместе мы наблюдаем."

 pod1230objectives_judges.5.t: "Дипломаты и богословы Иберии"
 pod1230objectives_judges.5.desc: "Сефардские евреи веками совершенствовали понимание наших священных текстов и учились выживать во враждебной среде, где один правитель может их терпеть, а следующий — пытаться истребить. Эти навыки перешли к их местным Судьям и сделали их одними из самых эффективных среди наших собратьев.\n\nПотребовалось время и усилия, но нам удалось привлечь Сефардим на свою сторону и облегчить их положение. В благодарность за наши старания они послали раввинов, чтобы помочь нам в войне против того, что скользит в тени."
 pod1230objectives_judges.5.a: "Вместе мы стоим."

 pod1230objectives_judges.6.t: "Происхождение Бессмертных"
 pod1230objectives_judges.6.desc: "Осирис был древним Проклятым, обращённым одним из детей Каина и, вероятно, принадлежал к третьему или четвёртому [Glossary('поколению','game_concept_vampgeneration_desc')] [Glossary('каинитов','game_concept_cainite_desc')]. Его [Glossary('сир','game_concept_Sire_desc')] неизвестен, хотя Ильес (прародитель [Glossary('клана','game_concept_Clan_desc')] Бруха)  распространённый кандидат в кругах некоторых наших учёных, отчасти из-за теории, помещающей Исиду (жену Осириса) в число потомков Лилит.\n\nКто-то (наши учёные указывают на Ильеса, Лилит или мага по имени Тот) позже вернулся, чтобы помочь Исиде и Нефтиде в их стремлении к магическим знаниям, расширив познания, уже известные самой Исиде.\n\nС помощью своих чар (и, возможно, воспользовавшись отсутствием Бене Элохим, должным образом провожающих мёртвых?) Бессмертные навечно привязали души к собственным телам, так что душа могла в итоге вернуться в физический мир после восстановления сил в [UmbraGlossaryLocalized('shadowlands','Лимб')].\n\nХотя египетские Бессмертные, или мумии, часто воюют с Проклятыми (возможно, будучи использованы Лилит?), другие Бессмертные сумели избежать втягивания в этот конфликт и, похоже, открыли иные способы достижения аналогичного результата — даже алхимические способности.\n\nОтрывки из предварительного черновика Хаваны, т. 21, гл. 1 и 2"
 pod1230objectives_judges.6.a: "Только отродье Лилит заслуживает нашего внимания."

 pod1230objectives_judges.7.t: "Происхождение Падших"
 pod1230objectives_judges.7.desc: "... и так случилось, что одна треть Бене Элохим присоединилась к Люциферу в его восстании, движимая жадностью и гордыней. Одни считали, что их план мудрее замысла ЯХВХ. Другие стремились к верховной власти над человечеством, к власти самого ЯХВХ или просто желали уничтожить всё, что считали нечистым или соперничающим с любовью Б-га. Третьи нашли новые концепции войны и насилия, привнесённые Каином, увлекательными. Вне зависимости от личных причин, они восстали против ЕГО совершенного замысла и, к удивлению никого, проиграли войну с ЕГО верными.\nЗа свои деяния они были изгнаны из Третьего Неба, навечно привязаны к Земле, которую так вожделели, и к Первому Небу. Они оказались заперты в земле, называемой Бездной, и могли вырваться лишь через грех и гордыню смертных. На Земле и в Бездне они будут ждать Последнего Суда, когда их обрекут на Гехинном...\n\nЗа преступление подстрекательства к восстанию Люцифер получил дополнительное проклятие. Подобно тому как Земля была отдана Падшим на время, так и Падшие были отданы во власть своих пороков. Люцифер останется нетронутым Бездной и худшими искажениями греха, дабы он мог наблюдать, как все, кого он сплотил вокруг себя, медленно искажаются и поддаются порождению собственной порчи, не желая ничего, кроме собственного разрушения...\n\nУже дважды Асмодей и Абаддон пытались заменить людей искажёнными рабами, которых они называли нефилимами, и дважды Б-г вмешивался в их планы. В первом случае Великий Потоп стёр все следы этих осквернённых родословных. В ответ на второе событие из нашей собственной веры возникла новая — та, что будет названа христианством.\n\nОтрывки из Хаваны, т. 11, гл. 2 и т. 18, гл. 7"
 pod1230objectives_judges.7.a: "Интересно, как ОН ответит в следующий раз, когда они попытаются."

 #pod1230objectives_judges.8.t: "Was Yeshua the Ha-mashiach?"
 #pod1230objectives_judges.8.desc: "After carefully studying the matter, there is evidence indicating that Yeshua of Nazareth may be Mashiach ben Yosef. However, the matter is not conclusive so we could choose to rule against it. Is the evidence sufficient to proclaim Yeshua as the Ha-mashiach?"
 #pod1230objectives_judges.8.a: "It is."
 #pod1230objectives_judges.8.b: "It is not."
 #
 #pod1230objectives_judges.9.t: "The Ha-mashiach Has Come!"
 #pod1230objectives_judges.9.desc: "In the ninth chapter of his book, Daniel began a count from Mar 14, 445BC, as the Gentiles reckon it, when we received the order to rebuild the Second Temple. He said that the Mashiach would come 483 of our years later. As it was said, so it was done for Yeshua passed through the gates of Jerusalem on the Tenth of Nisan precisely 483 years later to be cut off and left with nothing. As Daniel warned us, our city and G-d's temple were cast down as punishment for missing this sign.\n\nLet it now be known across the land that Mashiach ben Yosef has come! Let us worship His holy name and celebrate the grace of G-d for truly thine is the kingdom and the glory forever!"
 #pod1230objectives_judges.9.a: "Hallelujah and amen!"

 pod1230objectives_judges.9.t: "Истина о Йешуа"
 pod1230objectives_judges.9.desc: "Человек, широко известный как Йешуа из Назарета, долгое время оставался для нас загадкой. Некоторые из наших учёных полагают, что на самом деле он — Бессмертный по имени Мельхиседек. Как и многие Бессмертные, он обладал бы способностью имитировать воскресение, пробуждаясь в собственном теле спустя определённое время. Эту точку зрения подтверждают сообщения о том, что его гробница была найдена пустой, за исключением погребальных пелен, — характерная черта Бессмертных...\n\nЭто несколько смелое предположение по-прежнему не имеет достоверных источников, и наш орден согласился оставить его лишь гипотезой, чтобы не вызвать гнев наших собратьев из числа охотников-христиан. Сотрудничество с ними неоднократно оказывалось плодотворным в прошлом, а сохранение наших богословских разногласий в тайне при сосредоточении на истинной угрозе — куда более прагматичный и эффективный подход.\n\nЧерновик из Хаваны, т. 21, гл. 16, никогда не публиковался за пределами кругов высших Судей."
 pod1230objectives_judges.9.a: "Мы можем согласиться не соглашаться."

 pod1230objectives_judges.11.t: "Происхождение фей"
 pod1230objectives_judges.11.desc: "Все люди созданы по образу и подобию Б-га. Поскольку Он — Творец всего сущего, так и люди желают и способны творить. Будучи Его меньшими отражениями, человечество может воплощать свои мечты и кошмары. Феи возникают, когда человечество буквально создаёт существ из своих грёз и кошмаров, отражая идеалы и страхи всех, кто находится поблизости...\n\nИх связь с верой означает, что реальность, пессимизм, отсутствие удивления и отсутствие хаоса способны физически ранить их или ограничивать их силы...\n\nХолодное железо, выкованное в порядок чистой силой воли, как известно, легко уничтожает этих существ из грёз...\n\nВ настоящее время феи — злые существа, отражения дикой природы и её зверей, поскольку они стремятся уничтожить цивилизацию. Однако достаточные изменения в общих убеждениях, ценностях и страхах могут привести к изменению природы фей и превратить их в полезных союзников в охоте. Исключением будут те, кто называет себя Шедим, так называемые джинны, которые, как мы полагаем, родились из грёз Лилит и её отродья. Они навсегда сохранят её скверну.\n\nОтрывки из Хаваны, т. 51, гл. 1 и 3 и т. 52, гл. 20"
 pod1230objectives_judges.11.a: "Могут ли наша вера и грёзы изменить реальность, чтобы помочь нашей охоте?"

 pod1230objectives_judges.12.t: "Происхождение призраков"
 pod1230objectives_judges.12.desc: "Призраки — самый фундаментальный тип сверхъестественных существ, строительный блок, из которого происходят многие другие, особенно когда они привязываются к телу. В этом эссе я продемонстрирую, как...\n\nБез Падших, служивших психопомпами и провожавших мёртвых в загробную жизнь, души начали скапливаться на Земле и даже начали подавлять живых. Хуже того, некоторые Падшие активно стремились собирать души мёртвых в земле, окутанной Завесой боли и страданий...\n\nСо временем верные Бене Элохим прорвали эту Завесу, захватили Падших и привели их пред лицо Б-га для суда...\n\nНе желая осуждать множество душ, попавших в ловушку этого места, просто уничтожив царство, Б-г произнёс слово — и океаны расступились, а Завеса была помещена между двумя океанами. Одна сторона была отдана живым, а другая сторона, [UmbraGlossaryLocalized('shadowlands','Лимб')], была отдана беспокойным мёртвым, которые пока не желали уходить...\n\nБ-г наделил Еву, первую женщину и мать, всё ещё стремившуюся примириться со своим сыном, выбрать защитника для беспокойных мёртвых. Чтобы бороться с тёмной скверной, оставшейся в [UmbraGlossaryLocalized('shadowlands','Лимбе')], она выбрала териантропа, одного из оборотней, который стал известен как Анубис — по крайней мере, среди Бессмертных, которым он помогал. Эта скверна развращает все души, запертые в этом царстве, вечно нашептывая им поддаться всему тёмному...\n\nВ том же столетии, когда Моисей рассек Красное море (хотя неизвестно, есть ли здесь связь), Ева вернулась, чтобы выбрать правителя для беспокойных мёртвых. Имя создателя [UmbraGlossaryLocalized('shadowlands','Лимба')] было дано микенцу, передав ему часть власти Падшего над царством и позволив отделять живых от мёртвых и помогать мёртвым достичь загробной жизни. Он стал известен как Харон...\n\nВсё, что не создано самим Б-гом, должно в конце концов прийти к концу, ибо все творения не могут быть совершенными творцами. То, что известно как [UmbraGlossaryLocalized('oblivion','Забвение')], суть этого. Это неизбежный конец, разрушение и разложение этой странной земли, изначально созданной Падшими. Здесь нет воли или разума, лишь энтропия, делающая всю информацию бессвязной, а всю энергию бесполезной — явленная через зло Падших и страхи Призраков, запертых в этой странной земле.\n\nОтрывки из Хаваны, т. 23, гл. 1, 2, 5 и 6"
 pod1230objectives_judges.12.a: "Странные существа, которых следует пожалеть."

 pod1230objectives_judges.13.t: "Происхождение куэй-дзин"
 pod1230objectives_judges.13.desc: "Из-за отсутствия наших собратьев в регионе до недавних времён трудно определить, когда впервые были замечены Голодные мертвецы. Однако их происхождение, похоже, связано с тем, что они называют Третьей эпохой. Согласно их системе наименований, Первая эпоха относится ко времени, когда Земля была бесформенна и пуста, и тьма была над бездной. И Дух Б-га носился над водами. Вторая эпоха началась, когда Б-г отделил свет от тьмы и разделил воды. Она завершилась Падением, породившим всевозможные злые существа, лишь некоторые из которых были Падшими. В ответ на Падение Б-г, известный на Востоке как Нефритовый император, избрал ангела, чтобы тот выбрал десять тысяч героев, защитников и наставников для человечества...\n\nЗапятнанные, как и все люди, Первородным грехом, эти герои были развращены своей властью: они крали жизнь тех, кто находился под их опекой, чтобы усилить себя, и заключали сделки с Падшими ради ещё большей власти. Бене Элохим едва успевали восполнять тех, кто погиб в их внутренних конфликтах, разжигаемых гордыней и жаждой славы...\n\nИх злодеяния достигли кульминации в Войне Позора, когда они убили собственных детей, осквернили святые места, благословлённые Б-гом и охраняемые драконами и оборотнями, и создали Девять Ложных Солнц...\n\nПо какой-то странной иронии Небесами было решено, что лишь отягощенные злом могли стать одними из них...\n\nНе в силах дольше сдерживать суд или даровать им милость, Б-г наложил проклятие на десять тысяч бывших героев, пощадив лишь четверых, один из которых впоследствии присоединился к тому, с чем когда-то боролся. Это проклятие дало им проблеск мук, ожидающих их в загробной жизни, и лишило их дарованных ранее сил, вынудив высасывать энергию из людей, если они хотели сохранить эти силы. Эти бывшие герои были не единственными существами в той области, запертыми в физическом мире, и не все остались в заточении, ибо Б-г милостив, всегда оставляя путь к воссоединению для тех, кто готов по нему идти...\n\nСуществует распространённое заблуждение, что те, кого теперь называют куэй-дзин, ограничены восточными регионами Азии и Океании. На самом деле эти бывшие герои и сбежавшие преступники могут возникать где угодно. Однако Проклятые истребляют их в регионах, где они распространены, считая их просто презренными духами или необычно сильными призраками. Исторически териантропы считали себя более верными, поэтому развили ненависть и отвращение к куэй-дзин.\nХотя причины были забыты, ненависть осталась, поэтому териантропы аналогичным образом истребляют любых новорождённых куэй-цзинь на своей территории. Только на Востоке встречались достаточно немногочисленные либо непредубеждённые Проклятые и териантропы, чтобы куэй-дзин смогли укорениться, после чего они смогли облегчить переход и внедрение будущих куэй-дзин.\n\nОтрывки из Хаваны, т. 46, гл. 1, 3 и 9 и т. 50, гл. 4"
 pod1230objectives_judges.13.a: "Сможем ли мы воспроизвести силы тех, кто некогда был наделён ими Б-гом?"

 pod1230objectives_judges.14.t: "Происхождение териантропов"
 pod1230objectives_judges.14.desc: "После Падения Б-г избрал ангела, чтобы тот выбрал десять тысяч героев и защитников для человечества. Этот ангел избрал души верных смертных, погибших от рук Падших, и дал им второй шанс на жизнь. Перерождённые как Малхим, эти души отвечали той же жестокостью, которую когда-то испытали на себе, вселяя страх в сердца всех Падших своей готовностью их истреблять. Они могли преследовать и охотиться на свою добычу в любом уголке творения, даже проникая в царство [UmbraGlossaryLocalized('shadowlands','Лимба')]. Благословлённые своим покровителем, они могли требовать помощи природы — как флоры, так и фауны. Фактически, они могли даже превращаться в различных животных, чтобы помогать себе на охоте и в битвах, причём медведи-оборотни были старейшими и мудрейшими среди них...\n\nВ то время они были разделены по тому, на кого охотились, или по своей роли в поддержке Небесного воинства. Например, те, кого сейчас называют рокеа, в основном охотились на дом Ламмасу, а хан из бастет были сгруппированы с другими териантропами как тяжёлые бойцы...\n\nКак и многие другие, эти герои поддались искушениям своего положения и власти. Они поработили человечество, держа его как скот, подобно тому, как это делали Проклятые. За свои преступления они были прокляты природой тех животных, с которыми работали и на которых походили. Со временем некогда могучие Малхим выродились в существ, которых мы сегодня знаем как териантропов...\n\nНекоторые учёные полагают, что Война Ярости вызвала окончательный распад Малхим в териантропов. Было много территориальных конфликтов, состязаний за лучшие стада людей, попыток определить сильнейшую расу и предполагаемых предательств их Матери-Покровительницы. Всё достигло кульминации, когда заражённый Падшими нага убил важного гару, который нёс важное послание, и возложил вину на другие племена. Когда гурали отказались воскресить гонца-гару, гару напали на гуралей, которые нанесли ответный удар со своими союзниками из числа грондр. Когда война началась, гару воспользовались ею, чтобы удовлетворить все свои желания: свою гордыню, свою жадность к чужим секретам и свою веру в право властвовать над всеми другими племенами...\n\nИнтересный факт о териантропах — их уникальная связь с определёнными телами, видимыми на Втором небе. Основываясь на наших исследованиях [UmbraGlossaryLocalized('shadowlands','Лимба')], [UmbraGlossaryLocalized('dreaming','Грёз')], и других умбральных миров, кажется, что большинство, если не все небесные тела — это проявления человеческих грёз и верований, так что эти тела, возможно, не существовали до тех пор, пока человечество не решило, что эти звёзды должны отличаться от других. Пожалуйста, обратитесь к следующей главе и тому 52 для дальнейшего обсуждения...\n\nОтрывки из Хаваны, т. 31, гл. 1 и 2, т. 39, гл. 2"
 pod1230objectives_judges.14.a: "Сможем ли мы воспроизвести силы тех, кто некогда был наделен ими Б-гом?"

 pod1230objectives_judges.15.t: "Происхождение магии смертных"
 pod1230objectives_judges.15.desc: "Человечество много раз отворачивалось от Б-га. Все сыновья Адама и дочери Евы несут печать Первородного греха. Каин создал Проклятых через свои многочисленные преступления — от убийства до изнасилования и даже отказа покаяться. Многие люди присоединились к Падшим в их восстании против Б-га...\n\nХотя Он ныне отвернул от нас Свой лик, Он никогда не забывал о человечестве. Обсуждение Ха-Машиаха и избранного характера детей Израиля выходит за рамки этой работы — пожалуйста, обратитесь к соответствующим томам и раввинским текстам. Что касается текущего обсуждения, Б-г оставил после себя множество служителей, чтобы помочь человечеству, таких как Ева и два Бене Элохим по имени Зиана из дома Рабису и Разиэль из дома Ламмасу. Последние именуются Посланниками...\n\nВскоре после Падения и ещё до Великого Потопа Разиэль выбрал десять тысяч героев, которые сражались своей красотой и знаниями, постоянно помогая человечеству двигаться вперёд. Эти герои вдохновили истории о ван-сянь, и большая часть их знаний была передана ву-тянь, позволив им создать эликсир Вечной жизни и каким-то образом быть связанными с Восемью бессмертными, которые даже сейчас работают на Б-га на Третьем Небе. Восемь бессмертных до сих пор общаются с ву-тянь, давая им задания по смягчению проблем. Аналогично Зиана выбрала десять тысяч героев, которые боролись с самой природой, управляя и принимая аспекты флоры и фауны. Они могли повелевать растениями, чтобы те помогали им, и принимать форму духа животного, который их избрал. Из грёз этих героев, наделённых уникальной магией, произошли существа, известные как Феи. Хотя современные грёзы могут изменять фей, именно эти первые грёзы породили истинных первородных фей...\n\nПосле неудачи с отдельными героями эти два посланника решили объединить усилия и изменить способ своей работы. Больше такие силы не будут доверяться одному человеку — вместо этого они будут разделены. Некоторые способности будут изучаться: Посланники поощряют людей стремиться к скрытым знаниям через стремление. Другие способности будут дароваться при рождении — их предстоит раскрывать со временем. Третьи силы будут дароваться в награду за перенесённые испытания или в помощь при их прохождении, часто сопровождаясь посланием с наставлением. (Примечание переводчика: Почему Посланники так запутанно дают наставления? Почему нельзя просто сказать: «Иди туда и сделай это»?) Эти способности позволяют людям слышать, видеть и говорить о тайнах, недоступных плотскому уху, желеобразному глазу и глиняному языку. Каждый благословенный может подходить к своему дару и использовать его разными способами и формами: через эзотерику, мистику, алхимию, ритуалы, заклинания, молитвы, медитацию и ментальные способности...\n\nИз героев Разиэля лишь восемь когда-либо обрели истинный покой и были приняты обратно в объятия Б-га. Вдохновлённые новыми усилиями Разиэля и Зианы, эти Восемь бессмертных передали часть своих знаний ву-тянь, позволив ву-тянь создать эликсир Вечной жизни без опоры на извращённую магию отродья Лилит. Восемь бессмертных активно общаются с ву-тянь, поручая им кажущиеся случайными и несвязанными заданиями...\n\nЦель Посланников и других служителей Б-га в конечном счёте неизвестна, хотя некоторые говорят, что они смягчают ущерб, прежде чем он станет слишком серьёзным. Возможно, они испытывают нас? Время покажет...\n\nОтрывки из Хаваны, т. 22, гл. 1; т. 31, гл. 1 и т. 46, гл. 4"
 pod1230objectives_judges.15.a: "Изучим искусства тех первых героев."

 pod1230objectives_judges.16.t: "Сказания о Втором городе"
 pod1230objectives_judges.16.desc: "В Своей мудрости Б-г увидел способ разом искупить множество грехов и потому наслал Великий потоп, чтобы смыть мерзости Падших, развращённых среди Его бывших слуг и гордыню Проклятых...\n\nПосле Великого потопа Каин удалился в изгнание. Он создал так много, и всё это было уничтожено за один год — лишь горстка из более чем 200 Проклятых пережила Великий потоп. Впрочем, это не имело значения. Несмотря на все его труды, ничего не улучшилось — лишь немного изменилось...\n\nБез Каина, сдерживавшего их, третье поколение получило возможность предаваться своим худшим порокам и приступам паранойи. В сочетании с ограниченным запасом пищи, по мере распространения потомков Ноя, третье поколение быстро решило выступить против выживших сиров, ввергнув их в торпор, но не сумев полностью их убить. Некоторые говорят, что Ирад помогал им в этом, прежде чем они обратились и против него. Другие утверждают, что Зилла пала последней, взывая о помощи Каина, когда видела, как гибнут её братья. Он услышал её мольбы и смилостивился над ней, превратив её в камень, чтобы её не нашли и не убили. Кроме того, Каин пообещал своей возлюбленной Зилле, что они снова будут вместе бродить ночами, когда всё уладится. Третьи же говорят, что Джабалу удалось полностью спастись, сопровождая Каина в изгнании как вечно верный слуга...\n\nВдохновив множество мифов о мстительном божестве, гнев Каина не знал удержу, когда он узнал о том, что случилось с его советником, полководцем и женой от рук их собственных чад. Ворвавшись в их так называемый Второй город, он наложил три проклятия на каждого из тринадцати представителей третьего поколения: одно — личное, усиливающее величайшие недостатки или страхи цели, и два общих проклятия, наложенных на всех. Каждое [Glossary('поколение','game_concept_vampgeneration_desc')], удалённое от Каина, будет слабее предыдущего, и ни одно [Glossary('поколение','game_concept_vampgeneration_desc')] никогда не познает покоя, ибо все будут заперты в вечной борьбе за то, чтобы вытеснить своих предшественников. Фактически, третье поколение могло обладать силой наравне с прямыми отпрысками Каина до того, как он наложил свои проклятия. Наконец, Каин вселил врождённое недоверие и страх перед Падшими, побуждая своих потомков избегать Падших или истреблять их последователей. Это потенциально объясняет, почему войны Баали и штурм Карфагена — одни из очень немногих примеров, когда многочисленные кланы действовали сообща. Подобно тому, как пыталось третье поколение, каждое [Glossary('поколение','game_concept_vampgeneration_desc')] будет пытаться истребить тех, кто был до них, вечно опасаясь того, что более могущественные предыдущие [Glossary('поколения','game_concept_vampgeneration_desc')] могут с ними сделать. Эти проклятия также усиливали напряжённость между членами одного [Glossary('поколения','game_concept_vampgeneration_desc')], создавая постоянно присутствующий страх друг перед другом ...\n\nЕщё до того, как Каин проклял их, третье поколение стремилось воссоздать славу города Каина. Они обращали новых членов четвёртого поколения. Они собирали потомков Ноя, чтобы те поклонялись им и служили пищей...\n\nОднако они так и не смогли избавиться от проклятий Каина. Они истребляли любого, кто пытался обратить собственных чад. Они превратили каждого жителя своего города в пешки, не более чем фигуры в невообразимой игре...\n\nПогрязнув в своих играх, они не заметили, как их город состарился и умер вокруг них. Когда они наконец бежали, было почти слишком поздно, и многие из них погибли во время бегства...\n\nКаин смеялся, когда использовал своё мастерство Доминирования, чтобы изменить все воспоминания об этом Втором городе, даже стерев его название. В умах выживших почти ничего не осталось, кроме воспоминаний о падении их города и осознания собственных неудач.\n\nОтрывки из Хаваны, т. 1, гл. 14 и 17"
 pod1230objectives_judges.16.a: "По обыкновению, они сами себя погубили и обрекли на проклятие."

 pod1230objectives_judges.17.t: "Сказания о Первом городе"
 pod1230objectives_judges.17.desc: "Во время своих странствий Каин развил в себе две вещи: жажду власти и желание новой семьи. Возможность исполнить оба желания появилась, когда его нашёл человек по имени Енох. Король и королева Убара (но разве это не делает Убар Первым городом?) послали Еноха, своего величайшего подданного, найти городу стража и бога. Каин оказался тем, кого Енох привёл обратно...\n\nВпервые Каин обратил трёх людей: Еноха — за то, что тот привёл его в Убар, и короля с королевой Убара (предположение из арабского тома!) — чтобы сохранить их любовь и мудрость. В отношении последних двух Каин надеялся, что их любовь сможет начать смягчать его поступки. Однако они пошли навстречу солнцу, чтобы умереть, узнав, что больше не могут рожать истинных детей. Каин поклялся больше никогда никого не обращать — клятва, которая продержалась до тех пор, пока слова Еноха и собственное одиночество Каина не изменили его решения...\n\nИрад был величайшим полководцем того времени, избранным Каином для защиты города Убар. Хотя его новая природа улучшила его навыки лидера, она также усилила кровожадность Ирада...\n\nЗилла пробудила в Каине желание иметь жену, которая сопровождала бы его сквозь вечность, но она оказалась устойчива к его чарам, поэтому он искал иные способы завоевать её расположение. В отчаянии Каин разыскал вторую жену своего отца, Леватель, которая была изгнана из сада Адамом из-за его отвращения, вызванного наблюдением за её созданием. Обещая научить его секрету, она связала Каина узами крови с собой, превратив его в своего раба и слугу. Через эти узы она заставила Каина обратить её (маловероятно, нет каинитских источников, подтверждающих это) и украла некоторых из его чад из второго и третьего поколений. Однако, находясь под властью уз, Каин узнал её секреты и приготовился убить Леватель. Через год и один день после того, как он впервые был порабощён, узы ослабли достаточно, чтобы Каин смог пронзить Леватель колом и оставить её на растерзание солнцу. Его чада, которых она забрала, и её собственные чада не смогли её спасти, создав вечную ненависть к каинитам, которая продолжилась через немногих, переживших Великий потоп, и привела их к присоединению к отродью Лилит. С помощью уз крови Каин связал с собой Зиллу, хотя неизвестно, создали ли узы крови иллюзию любви или же она со временем действительно полюбила его...\n\nВместо того чтобы обратить его, Каин превратил главу своих слуг в первого гуля или ревенанта. Обладая силой наравне с третьим поколением, Джабал был самым высокопоставленным смертным в Первом городе...\n\nКаин правил Убаром железной рукой, изгоняя или убивая любых Проклятых, нарушавших его правила, например, вступавших в связь с Падшими или убивавших друг друга. Учитывая, сколько представителей третьего поколения были обращены без его разрешения, интересно, что он никогда не пресекал этого. Кроме того, он был добрее к смертным, чем его чада. Некоторые говорят, что он не хотел рисковать своим источником пищи, в то время как другие утверждают, что он всё ещё искал искупления за свои поступки, хотя последнее маловероятно, учитывая историю Зиллы и его религиозные запреты. В частности, Каин запрещал кому-либо поклоняться Б-гу и запретил все храмы, которые не были посвящены ему самому или другим Проклятым. В своём собственном храме он часто провозглашал, что все его чада обречены вечно гнить, страдать в Аду, если они когда-либо умрут, и быть проигнорированными Б-гом, когда наконец наступит Апокалипсис...\n\nНеизвестно, как Еноху удалось убедить всех, что Каин переименовал Убар в честь Еноха (сделал ли он это или же мы имеем дело с догадками, призванными объединить предания об Убаре и Енохе?). Возможно, он использовал Доминирование, чтобы переписать воспоминания, или, возможно, его чада, самые многочисленные из трёх групп, сумели перекричать всех остальных.\n\nОтрывки из архивного черновика Хаваны, т. 1, гл. 5–12"
 pod1230objectives_judges.17.a: "И впрямь мрачная история."

 pod1230objectives_judges.18.t: "Сказания о Лилит и дисциплинах"
 pod1230objectives_judges.18.desc: "Лилит была первой женой Адама и была изгнана по двум причинам: за неповиновение приказам Адама и за неверность с одним из Бене Элохим до Первородного греха и до Падения. Скитаясь по диким краям творения Б-га, она вернулась в Сад Эдема и убедила своего ангельского возлюбленного предоставить ей доступ. Используя странную магию, украденную у Бене Элохим, она превратилась в Змия, который искушал наивную Еву и подтолкнул к Первородному греху...\n\nВо время своих странствий Каин встретил Лилит в её подобии Сада Эдема. Её привлекла метка Б-га, обозначавшая его как убийцу, и сила, которую она олицетворяла. Она пригласила его в свой дом, накормила, перевязала его раны и стала его возлюбленной. Со временем Каин осознал, что у Лилит есть странная магия, и умолял её даровать её ему — будь то из любви или чтобы он мог смягчить проклятие Б-га. И тогда Лилит подготовила особый обряд и дала Каину часть своей жизненной крови. После того, как он вкусил её крови, Каина посетили четверо Хайот Бене Элохим и архангелов, несущих божественную Меркаву, — каждый предлагал шанс покаяться и каждый проклинал его всё сильнее, чем предыдущий, поскольку он отвергал их. Когда Каин отверг его, Михаэль (Кто как Б-г?) проклял Каина страхом перед его живым огнём. Когда Каин отверг его, Рафаэль (исцеление от Б-га) проклял Каина страхом перед рассветом, ибо слава солнца будет жечь, как живой огонь Михаэля. Когда Каин отверг его, Ауриэль (Б-г — мой свет) проклял Каина цепляться за тени, пить кровь, как он делал в этом обряде, и как кровь его брата, которую он пролил; вкушать пепел, оставленный огнём Михаэля; замирать на грани смерти; и чтобы всё, к чему он прикоснется, рассыпалось в прах, из которого созданы все вещи. Гавриэль (Б-г — моя сила) предложил последний шанс, от которого нельзя было отказаться и который никогда не исчезнет, — единственный оставшийся путь получить милость Б-га и снять проклятие. Когда он очнулся от этих видений, Каин получил девять магических способностей, которые легли в основу современных дисциплин. После этого он покинул Лилит по неизвестным причинам, тем самым породив ненависть, которую Лилит и её отродье до сих пор питают к каинитам. Некоторые предполагают, что Б-г теперь усилил своё проклятие в отношении Лилит за её участие в Первородном грехе, гарантируя, что её чудовищное отродье никогда не будет сотрудничать с Проклятыми...\n\nНынешнее местоположение Лилит неизвестно, поскольку Великий потоп стёр многие следы её деятельности, включая её сад. Некоторые источники утверждают, что она удалилась в [UmbraGlossaryLocalized('shadowlands','Лимб')] или [UmbraGlossaryLocalized('dreaming','Грёзы')], где восстановила свой сад, чтобы ждать дня, когда она сможет уничтожить все угрозы своим «детям» и свершить свою ужасную месть против Каина. Определённые события в каинитской истории также могут быть прослежены до неё как попытка ослабить своих врагов в подготовке к...\n\nОтрывки из Хаваны, т. 1, гл. 2–4"
 pod1230objectives_judges.18.a: "Каин был глупцом, но Б-г был мудр."

 pod1230objectives_judges.19.t: "Сказания о Каине"
 pod1230objectives_judges.19.desc: "После того как Каин стал возделывать землю, а Авель — пасти овец, Каин и Авель решили принести жертвы ЙХВХ. ЙХВХ был доволен жертвой Авеля, но не жертвой Каина. Каин не принёс первых плодов и не принёс лучших из своих плодов. Хуже того, Каин приносил жертвы по неверным причинам — чтобы показать своё процветание и заслужить внимание своей сестры-близнеца, на которой он хотел жениться. Каин исполнился ярости из-за того, что Б-г проигнорировал его жертву. Тот, кто вскоре станет Падшим, всегда ненавидевшим благочестие Авеля, разжёг гнев и зависть Каина, подарив ему вдохновляющее видение. Явились два существа, напоминавшие Каина и Авеля. Одно порицало другое. Тот, кого порицали, разгневался на другого и взял потёртый лемех плуга.\n\nНе обращая внимания на все мольбы о пощаде, порицаемый перерезал горло другому и убил его. Поддерживая уголёк гнева и не позволяя ему угаснуть, Каин убедил себя, что нет ни суда, ни всемогущего судьи, ни награды для праведных, ни возмездия для нечестивых. Его зависть к брату только усиливалась, когда их родители устроили так, чтобы Авель женился на сестре-близнеце Каина. Каин взял свой плуг, выковал из него клинок, подошёл к брату в поле и перерезал Авелю горло. Так Каин пролил кровь своего брата Авеля на землю, и кровь Авеля струилась по земле, а его живот был вскрыт на глазах у стада.\n\nБ-г услышал крики Авеля и увидел будущие последствия, поэтому наказал Каина. Земля больше не будет отдавать свою силу Каину. Он будет вечно скитальцем и изгнанником. Однако Б-г понимал влияние других на эту ситуацию и то, что, будучи первым убийцей, Каин не до конца осознавал последствия своего поступка. Поэтому Каин был лишь проклят и получил защиту от любого, кто мог бы на него напасть.\n\nОтрывки из Хаваны, т. 1, гл. 1"
 pod1230objectives_judges.19.a: "Но наш Б-г даёт вторые шансы. Есть ли продолжение у этой истории?"

 pod1230objectives_judges.20.t: "Искупление даже для проклятых"
 pod1230objectives_judges.20.desc: "На фундаментальном уровне Проклятые, широко известные как вампиры, — это призраки, вселившиеся в собственные тела, где и их тело, и проклятие Каина служат оковами. В Своём вечном милосердии, несмотря на отказ Каина принять дар, Б-г дал Каину и его потомкам путь, ныне называемый Голкондой, — чтобы снять проклятие и спасти свои души от вечного проклятия. Хотя с определённой долей уверенности можно утверждать, что Каин не достиг Голконды до Великого потопа, с тех пор прошли тысячелетия, и учёные выдвинули весьма убедительные аргументы в пользу того, что Каин, скорее всего, достиг Голконды, но ещё не перешёл в загробную жизнь, поскольку сперва должен уладить дела со своими потомками. Для дальнейшего обсуждения нынешнего статуса Каина, пожалуйста, обратитесь к комментариям и статьям в главе 18...\n\nСаулот утверждал, что достиг Голконды после того, как похитил часть знаний, дарованных потомкам ван-сянь Разиэлем. Он передал эти учения клану Салюбри, даровав им их знаковый третий глаз и приведя многих из них к Голконде. Однако недавние открытия местных Судей указывают на то, что сам Саулот так и не достиг Голконды. Кроме того, Тремеры приложили огромные усилия, стремясь истребить Салюбри в целом и тех, кто достиг Голконды, в частности...\n\nСаулот даже позаимствовал это название у восточных мистиков: термин поэтически отсылает к великому духовному богатству, которым обладают такие трансцендентные существа. По иронии, эти мистики ненавидят термин «Голконда», потому что он не самый точный — это просто тот термин, который Саулот взял и популяризировал среди западных Проклятых...\n\nЧтобы достичь Голконды, Проклятый должен найти наставника, сохранить или восстановить свою человечность и искупить все свои грехи. После достаточных исследований и медитаций он может обрести некое особое прозрение. С этим прозрением он наконец может начать суспир — поиск видения во снах и в своей душе. Во время суспира он открывает для себя смысл существования, истоки своего внутреннего Зверя и свою связь с Каином. Если ему не удастся достичь Голконды во время суспира, у него больше не будет шанса — если его тело и разум вообще выживут. То же самое верно и в случае, если он утратит Голконду, совершив хоть один грех...\n\nЕсли Голконда достигнута, она устраняет риск того, что Проклятый будет поглощён своим внутренним Зверем, почти устраняет его потребность в крови и отменяет проклятия, которые Каин наложил на своих потомков, включая клановые проклятия и ограничения [Glossary('поколения','game_concept_vampgeneration_desc')]. По сравнению с отродьем Лилит, каиниты — это те, на кого мы охотимся скорее из-за их жестокости, чем по какой-либо иной причине. Таким образом, те, кто достиг Голконды, освобождаются от нашей охоты, позволяя нам направлять ресурсы на устранение куда более серьёзных угроз для наших собратьев.\n\nОтрывки из архивного черновика Хаваны, т. 1, гл. 3, помеченный как «не хватает серьёзных источников»."
 pod1230objectives_judges.20.a: "Лилит всегда будет нашим приоритетом."

 #pod1230objectives_judges.21.t: "The Wandering Sage"
 #pod1230objectives_judges.21.desc: "A strange man, completely wrapped in a cloak and his face obscured with more than simply cloth, has appeared in our most secure of inner sanctums. Identifying himself as the Wandering Sage, he called me by name and asked to meet me face-to-face. Oddly, he seemed to speak in the native tongue of all that were present, even though they came from different lands. Should I go?"
 #pod1230objectives_judges.21.a: "Let's hear him out."
 #pod1230objectives_judges.21.b: "It's a trap. Purge it with fire!"
 #
 #pod1230objectives_judges.22.t: "Caine Lives in Death"
 #pod1230objectives_judges.22.desc: "Once alone with us, he names himself Caine, first of the Cursed Ones commonly called vampires. In our quest for the truth, we drew his attention during his wanderings. He sees a chance in us to redeem himself before YHWH and to judge his twisted offspring so he offers me two choices: his blessing or his touch. He urges me to choose quickly for he is not yet permitted to rest and must soon continue his wanderings. After all, he still has many affairs to wind up and a few matters to resolve.\n\nI desire ..."
 #pod1230objectives_judges.22.a: "His Blessing."
 #pod1230objectives_judges.22.b: "His Touch."
 #
 #pod1230objectives_judges.23.t: "Purging It With Fire"
 #pod1230objectives_judges.23.desc: "Using our greatest theurgists and sorcerers, we purged the sanctum with fire, eliminating everything alive within it. However, the so-called Wandering Sage simply walked out of the fire, untouched. With a wave of his hand, not even the strongest among us could move to stop his exit from our sanctum. Over his shoulder, he said \"I sympathize with your decision, but this will be the end of our business together. Do not fear though, I am no longer the vengeful man that I once was. Good health and the L-rd's blessing be upon you.\""
 #pod1230objectives_judges.23.a: "Shall we ever hear from him again, and do we want to?"

 pod1230objectives_judges.24.t: "Распространи Слово"
 pod1230objectives_judges.24.desc: "Судьи, как и сообщества, которые они защищают, разбросаны по всему миру. Хотя такое положение дел считалось приемлемым (а в некоторых случаях даже благом — например, когда удавалось узнать о сверхъестественных чудовищах издалека), оно также является слабостью. Есть предел того что децентрализованная группа способна сделать.\n\nВаши недавние победы и открытия поставили вас в центральное положение с беспрецедентным авторитетом среди Судей. Ваше слово имеет вес и достаточно, чтобы привлечь охотников со всего мира в вашу растущую организацию.\n\nС Святой землёй, очищенной от чудовищ, в качестве вашей базы операций надежда на окончательную победу над детьми Лилит никогда не была столь высока."
 pod1230objectives_judges.24.a: "Слава Всевышнему!"

 #pod1230objectives_judges.25.t: "Hebrew Culture Arises Once More"
 #pod1230objectives_judges.25.desc: "With the Promised Land once more under the control of the Israelites, they have set about reforming their culture into a cohesive group. All those within the Promised Land will be joining them."
 #pod1230objectives_judges.25.a: "We are reunited."
 #pod1230objectives_judges.25.b: "Can't beat 'em, join 'em."

