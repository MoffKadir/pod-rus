l_russian:
 POD_sorcery_events.1000.t: "More Beast than Man"
 POD_sorcery_events.1000.desc: "Even among primal magics, the ability to change into an animal stands out as exceptional. Many monsters haunting the night have the power of transformation, including those who are true shapeshifters. Hedge magicians who study the Path of Shapeshifting mimic a certain amount of their power, transforming first pieces of themselves and later their entire body in dramatic ways.\n\nYour expertise in the Path of Shapeshifting has grown large enough for you to further your personal Bestial Form."
 POD_sorcery_events.1000.a: "That is enough."
 
 POD_sorcery_events.1000.no_points: "You have maxed out your Bestial Form to the utmost of your current experience!"

 POD_sorcery_events.1000.claws: "$POD_shapeshift_bestial_form_claws_modifier$"
 POD_sorcery_events.1000.claws.upgrade: "You will upgrade [GetModifier('POD_shapeshift_bestial_form_claws_modifier').GetNameWithTooltip] to level [SCOPE.GetValue('new_level')|0V]"
 POD_sorcery_events.1000.claws.buy: "You will introduce [GetModifier('POD_shapeshift_bestial_form_claws_modifier').GetNameWithTooltip] into your Bestial Form"

