l_russian:
 POD_sorcery_events.1000.t: "Более зверь чам человек"
 POD_sorcery_events.1000.desc: "Даже среди примитивных магических искусств способность превращаться в животное выделяется как нечто исключительное. Многие чудовища, что бродят по ночам, владеют силой преображения, в том числе истинные перевёртыши. Маги-самоучки, изучающие Путь превращений, подражают части их могущества: сперва преображают отдельные части тела, а позже — целиком меняют облик, и перемены эти впечатляют.\n\nВаше мастерство на Пути превращений достигло уровня, позволяющего усовершенствовать вашу личную звериную Форму."
 POD_sorcery_events.1000.a: "Этого достаточно."
 
 POD_sorcery_events.1000.no_points: "Вы развили свою звериную Форму до предела, доступного при нынешнем опыте!"

 POD_sorcery_events.1000.claws: "$POD_shapeshift_bestial_form_claws_modifier$"
 POD_sorcery_events.1000.claws.upgrade: "Вы улучшите «[GetModifier('POD_shapeshift_bestial_form_claws_modifier').GetNameWithTooltip]» до [SCOPE.GetValue('new_level')|0V] уровня"
 POD_sorcery_events.1000.claws.buy: "Вы добавите «[GetModifier('POD_shapeshift_bestial_form_claws_modifier').GetNameWithTooltip]» в свою звериную форму"

