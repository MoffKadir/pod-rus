l_russian:

 pod_vampire_flavor.1000.t: "Воспоминания о солнечном свете"
 pod_vampire_flavor.1000.desc: "Удивительно, чего не хватает человеку после объятий. Вы понимаете, что вам не хватает солнечного света. Вы пытаетесь вспомнить, как выглядит мир в солнечный день, с голубым небом и яркими, мягкими облаками. Неужели эти маленькие радости навсегда потеряны для вас?"
 pod_vampire_flavor.1000.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] нанять художника."
 pod_vampire_flavor.1000.b: "Если я смогу вселиться в животное, то смогу увидеть солнце."
 pod_vampire_flavor.1000.c: "Один взгляд не повредит..."
 pod_vampire_flavor.1000.d: "Возьми себя в руки! Ты - сородич! Веди себя соответственно!"
 pod_vampire_flavor.1001.t: "Воспоминания о солнечном свете"
 pod_vampire_flavor.1001.desc: "Художник представляет свою картину на ваше одобрение. На ней изображён прекрасный местный пейзаж в солнечный день. Когда вы смотрите на неё, вам кажется, что вы действительно находитесь на улице под солнечными лучами! То, что заказ этого шедевра укрепил вашу репутацию, играет вам на руку"
 pod_vampire_flavor.1001.a: "Это как раз то, что мне было нужно."

 #pod_mass.100.t: "Ghouls, Ghouls Everywhere!"
 #pod_mass.100.desc: "There are accusations of you having given your blood to many many locals to feed your war machine with ghouls soldiers, which is shunned by the Traditions of the Cainites and many of the roads. This is also ill considered by most as a grave breach of Masquerade waiting to happen since so many ghouls are hard to hide.\nWhat is your answer?"
 #pod_mass.100.a: "Pay someone to cover it."
 #POD_massregnant_event_repeat.tt: "This event will repeat if you still have $POD_ghoul_maa$ regiments in the future."
 #pod_mass.100.b: "It is true, so what?"
 #pod_mass.200.t: "Vampires, Vampires Everywhere!"
 #pod_mass.200.desc: "There are accusations of you having given your blood to many many locals to feed your war machine with newly created vampire soldiers, which is shunned by the Traditions of the Cainites and many of the roads. This is also ill considered by most as a grave breach of Masquerade waiting to happen since so many new vampires are hard to hide.\nWhat is your answer?"
 #pod_mass.200.a: "Pay someone to cover it."
 #POD_masssire_event_repeat.tt: "This event will repeat if you still have vampire men at arms regiment in the future."
 #pod_mass.200.b: "It is true, so what?"

### ==========================================
 ### BOMKAZI CULTIVATION EVENTS
 ### ==========================================

 ### Event 1: Cultivation Initiation
 POD_impundulu.1001.t: "The Call of the Bomkazi"
 POD_impundulu.1001.desc: "The ancient covenant between our blood and the Bomkazi witches demands renewal. A new companion must be found — one whose veins carry the spark of life-magic, who can walk beside us as partner and sustenance both.\n\nThe search will take time and effort, but without a Bomkazi at our side, we are diminished."
 POD_impundulu.1001.a: "Begin the search at once."
 POD_impundulu.1001.b: "The time is not yet right."
 POD_impundulu.1001.c: "I have no need of a witch."
 POD_impundulu_bomkazi_start_cultivation_tt: "You will begin seeking a mortal with life-magic potential to cultivate as a Bomkazi companion."
 POD_impundulu_bomkazi_delay_cultivation_tt: "You will be reminded of this opportunity in 20-40 years."
 POD_impundulu_bomkazi_refuse_cultivation_tt: "You refuse the cultivation. The covenant weakens."

 ### Event 2: Quality Selection
 POD_impundulu.1002.t: "The Shape of the Gift"
 POD_impundulu.1002.desc: "What manner of Bomkazi do we seek? The life-magic manifests differently in each mortal who carries its seed. Some channel it through intellect and study, others through the body's own resilience, and a rare few see beyond the veil itself.\n\nThe search must be guided by our needs."
 POD_impundulu.1002.a: "Seek a scholar — one whose mind burns bright."
 POD_impundulu.1002.b: "Seek a healer — one whose touch mends flesh."
 POD_impundulu.1002.c: "Seek a seer — one who peers beyond the veil."
 POD_impundulu_bomkazi_seek_scholar_tt: "The cultivation will favor intellect and learning. Your search will take 5-15 years."
 POD_impundulu_bomkazi_seek_healer_tt: "The cultivation will favor health and resilience. Your search will take 5-15 years."
 POD_impundulu_bomkazi_seek_seer_tt: "The cultivation will favor mystic sight and intuition. Your search will take 5-15 years."

 ### Event 3: Hidden creation (option text never shown)
 #POD_impundulu.1003.a: "The search continues..."

 ### Event 4: Success
 POD_impundulu.1004.t: "A Bomkazi Found"
 POD_impundulu.1004.desc: "The search has borne fruit. A young [bomkazi_candidate.Custom('WomanManGirlBoy')] stands before us, [bomkazi_candidate.GetHerHis] blood singing with the old power. [bomkazi_candidate.GetSheHe|U] has been tested and trained, and the life-magic runs true in [bomkazi_candidate.GetHerHis] veins.\n\n[bomkazi_candidate.GetSheHe|U] will be our companion, our anchor to the living world. The covenant endures."
 POD_impundulu.1004.a: "Welcome, [Select_CString( bomkazi_candidate.IsFemale, 'sister', 'brother' )] of the covenant."
 POD_impundulu_bomkazi_witch_arrives_tt: "A fully cultivated Bomkazi witch joins your court as a friend and companion."

 ### Event 5: Partial Success
 POD_impundulu.1005.t: "An Apprentice's Promise"
 POD_impundulu.1005.desc: "The candidate shows promise, but the life-magic within [bomkazi_candidate.GetHerHim] is dim — a guttering flame where there should be a bonfire. [bomkazi_candidate.GetSheHe|U] could serve as a Bomkazi apprentice, learning the old ways, though [bomkazi_candidate.GetSheHe] may never reach the full power of the witches of old.\n\nIt is something. It may have to be enough."
 POD_impundulu.1005.a: "[bomkazi_candidate.GetSheHe|U] will grow in time. Welcome [bomkazi_candidate.GetHerHim]."
 POD_impundulu.1005.b: "Not good enough. I will wait."
 POD_impundulu_bomkazi_apprentice_arrives_tt: "A Bomkazi apprentice joins your court. [bomkazi_candidate.GetHerHis|U] powers are weaker than a full Bomkazi witch."

 ### Event 6: Failure
 POD_impundulu.1006.t: "The Search Falters"
 POD_impundulu.1006.desc: "Years of searching have yielded nothing. Every candidate tested, every mortal examined — none carry the spark of life-magic strongly enough to be cultivated. The Bomkazi bloodline thins with each generation.\n\nPerhaps the next search will prove more fruitful. Or perhaps the old ways are truly dying."
 POD_impundulu.1006.a: "We will try again. The covenant demands it."
 POD_impundulu.1006.b: "The Bomkazi line is failing..."

 ### ==========================================
 ### TRAIT LOCALIZATION
 ### ==========================================

 trait_bomkazi_witch: "Bomkazi Witch"
 trait_bomkazi_witch_desc: "A mortal life-witch cultivated by the Impundulu. The Bomkazi carry the spark of life-magic in their blood, serving as spiritual companions and sustenance for their undead partners."
 trait_bomkazi_witch_character_desc: "[ROOT.Char.GetFirstNameNoTooltip|U] carries the full power of the Bomkazi life-witches, cultivated through ancient rites to serve as companion to the Impundulu."

 trait_bomkazi_apprentice: "Bomkazi Apprentice"
 trait_bomkazi_apprentice_desc: "A mortal with some life-magic potential, but not fully cultivated. The power in their blood is dim compared to a true Bomkazi witch."
 trait_bomkazi_apprentice_character_desc: "[ROOT.Char.GetFirstNameNoTooltip|U] shows traces of life-magic talent, though the power has not fully manifested. An apprentice in the Bomkazi tradition."

 ### ==========================================
 ### ARTIFACT CRAFTING EVENTS
 ### ==========================================

 ### Shew-Stone
 POD_impundulu.3001.t: "The Shew-Stone Rite"
 POD_impundulu.3001.desc: "The stone is polished smooth and laid upon a grave. With bird's blood we paint the name of the one we would watch. The spirits stir, drawn to the stone like moths to flame.\n\nWhen the rite is complete, the stone hums faintly in our palm. Wherever the named one goes, the whispers will follow."
 POD_impundulu.3001.a: "The dead see all. Now, so do I."
 POD_impundulu_shewstone_crafted_tt: "You have crafted a Shew-Stone. It grants bonuses to Intrigue and scheme discovery."

 ### Nightmare Drums
 POD_impundulu.3002.t: "The Drums of Dread"
 POD_impundulu.3002.desc: "Human skin stretched over bone. The drumsticks carved from a hanged man's ribs. When struck, no living ear perceives the sound — but the dead hear, and they obey.\n\nThe spirits bound to these drums will carry nightmares to any sleeper we name."
 POD_impundulu.3002.a: "Let the living know the terror of the dead."
 POD_impundulu_nightmare_drums_crafted_tt: "You have crafted Nightmare Drums. They generate dread and boost hostile scheme power."

 ### Witch Eye
 POD_impundulu.3003.t: "The Price of Sight"
 POD_impundulu.3003.desc: "The corpse's eye has been prepared — soaked in grave dirt, inscribed with signs of death, enchanted with the full weight of our necromantic knowledge. Now comes the hardest part.\n\nWith steady hands, we remove our own eye and press the dead one into the socket. The pain is extraordinary. And then — we see. Everything. The spirits, the lingering dead, the lies hiding behind every living face.\n\nThe world will never look the same again."
 POD_impundulu.3003.a: "The price is paid. The sight is mine."
 POD_impundulu_witch_eye_crafted_tt: "You have implanted the Witch Eye. It grants necromancy and scheme detection bonuses, but permanently marks your appearance."

 ### Artifact Names and Descriptions
 artifact_shewstone_name: "Shew-Stone"
 artifact_shewstone_description: "A consecrated polished stone painted with bird's blood. Spirits whisper the secrets of those named upon it."

 artifact_nightmare_drums_name: "Nightmare Drums"
 artifact_nightmare_drums_description: "Drums of human skin and bone. Inaudible to the living, they command ghosts to torment a rival's dreams."

 artifact_witch_eye_name: "Witch Eye"
 artifact_witch_eye_description: "An enchanted eye from a restless corpse, implanted in the necromancer's own socket. It grants permanent Deathsight at a terrible cost."

 ### Artifact Decision Tooltips
 imp_requires_cenotaph_path_tt: "Requires knowledge of the Cenotaph Path #italic ([GetPerk('ns_a_touch_of_death_perk').GetName(GetPlayer)] [perk|E])#!"
 imp_requires_haunting_path_3_tt: "Requires Haunting Path level 3 #italic ([GetPerk('ns_harrowing_perk').GetName(GetPlayer)] [perk|E])#!"

 ### Artifact Modifier Localization
 artifact_shewstone_modifier: "Shew-Stone"
 artifact_shewstone_modifier_desc: "Spirits whisper secrets of the named."
 artifact_nightmare_drums_modifier: "Nightmare Drums"
 artifact_nightmare_drums_modifier_desc: "The dead obey the drums' silent call."
 artifact_witch_eye_modifier: "Witch Eye"
 artifact_witch_eye_modifier_desc: "The dead eye sees what the living cannot."
 imp_witch_eye_scarred_modifier: "Scarred by the Witch Eye"
 imp_witch_eye_scarred_modifier_desc: "The self-mutilation required by the Witch Eye ritual has left permanent marks."

 ### ==========================================
 ### FLAVOR EVENTS
 ### ==========================================

 ### Event 1: The Blood Runs Thin
 POD_impundulu.1.t: "The Blood Runs Thin"
 POD_impundulu.1.desc: "Your Bomkazi brings troubling news. The younger generation of mortal witches shows weaker talent than their mothers. The life-magic that once burned in their bloodline is guttering, fading like a candle in the wind.\n\nEach decade, fewer candidates show the spark. The covenant that sustains us — that has sustained us for centuries — may be dying."
 POD_impundulu.1.a: "This troubles me greatly. We must find a solution."
 POD_impundulu.1.b: "I will not let the covenant fail. Not while I endure."
 POD_impundulu.1.c: "The Bomkazi have survived this long. They will endure."

 ### Event 2: A Bomkazi's Passing
 POD_impundulu.2.t: "A Bomkazi's Passing"
 POD_impundulu.2.desc: "The Bomkazi witch is dead. Their life-magic, which sustained us and anchored us to the living world, has gone dark.\n\nThe old rites demand that we guide their soul through the passage between worlds. It is the least we owe to those who give us everything."
 POD_impundulu.2.a: "I will perform the funeral rites. The covenant demands it."
 POD_impundulu.2.b: "I mourn in silence. The dead keep their own counsel."

 ### Event 3: The Necromancer's Offer
 # (note: unused)
 POD_impundulu.3.t: "The Necromancer's Offer"
 POD_impundulu.3.desc: "Word has reached us of a fellow scholar of death — [imp_necromancer_contact.GetFirstNameNicknamed], whose approach to necromancy differs from our own. [imp_necromancer_contact.GetSheHe|U] has expressed curiosity about our Cenotaph and Haunting paths, knowledge unique to the Impundulu.\n\nPerhaps an exchange of knowledge could benefit us both."
 POD_impundulu.3.a: "I should approach them. Knowledge is power."
 POD_impundulu.3.b: "I am not ready for such an exchange."
 POD_impundulu_necromancer_offer_hint_tt: "The 'Exchange Necromantic Knowledge' interaction may be available with this character."

 ### Event 4: Grief of the Founder
 POD_impundulu.4.t: "Grief of the Founder"
 POD_impundulu.4.desc: "In the deep watches of the night, a memory surfaces unbidden — Bomkazi, the first witch-wife. Her face. Her voice. The ritual that bound us together, living and dead, in a covenant neither fully understood.\n\nShe refused the Embrace. She chose mortality, chose to age and wither while we remained unchanged. And yet she stayed. Until the end.\n\nThe centuries have not dulled the grief. Perhaps nothing ever will."
 POD_impundulu.4.a: "I remember you, Bomkazi. I will always remember."
 POD_impundulu.4.b: "The grief has become a companion. Familiar, if not welcome."