l_russian:
 POD_negotiation.4000.t: "[Select_CString(ROOT.Char.IsFemale, 'Падшая охотница', 'Падший охотник' )]"
 POD_negotiation.4000.desc: "Что в итоге вами двигало? Жадность? Страх? Жажда власти? Или, быть может, вы убедили себя, что это предательство собственных принципов служило некоему благородному, высшему замыслу?\n\nЧто сделано, то сделано. Возможно, вы и смирились со своим решением, но вот ваши собратья-#TOOLTIP:GAME_TRAIT,supehunter,[GetNullCharacter] #L охотники#!#! нет. Весть о вашем падении разнесётся быстро.\n\nДействуйте решительно — пока за вами не пришли."
 POD_negotiation.4000.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] порвать связи с бывшими товарищами и залечь на дно."
 POD_negotiation.4000.b: "К счастью, ни один из моих вассалов не посмеет мне перечить."
 POD_negotiation.4000.c: "Я откажусь от своих владений."
 POD_negotiation.4000.d: "Значит, они хотят со мной сразиться? Пусть попробуют."

 POD_negotiation.4010.t: "[Select_CString(ROOT.Char.IsFemale, 'Смертная, которая знала', 'Смертный, который знал' )] слишком много"
 POD_landed_mortal_warning: "#N;bold Вы владеете землёй как [Select_CString(ROOT.Char.IsFemale, 'слабая смертная', 'слабый смертный' )], не [Select_CString(ROOT.Char.IsFemale, 'связанная', 'связанный' )] ни с одной из существующих фракций. Поэтому вы не можете ничего строить в своих владениях.#!"
 POD_negotiation.4010.desc: "Вы чувствуете себя кровоточащей рыбёшкой в озере озлобленных акул."
 POD_negotiation.4010.desc.diabolist: "Тот факт, что вы подчинили себе #TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L демона#!#! теперь кажется не таким впечатляющим. У вас нет союзников, нет дохода, нет влияния. И никаких перспектив — если только вы не найдёте того, кто сможет вас поддержать. Не считая кипящего злобой дьявола у вас за плечом, разумеется."
 POD_negotiation.4010.desc.exghoul: ""
 POD_negotiation.4010.desc.fallenhunter: "Когда-то вы могли рассчитывать на поддержку своих собратьев-#TOOLTIP:GAME_TRAIT,supehunter,[GetNullCharacter] #L охотников#!#!. Теперь это кажется какой-то другой жизнью. Вы одни. И вы слишком хорошо знаете о тварях, что скрываются в ночи, и о том, что они сделают с такой угрозой, как вы."
 POD_negotiation.4010.desc.mortal: "#italic Каким-то образом#! вы завладели незанятыми землями в [Glossary('мире Тьмы','game_concept_world_of_darkness_desc')]. Обитатели этих владений считают вас ошибкой. И скоро они её исправят. Будучи [Select_CString(ROOT.Char.IsFemale, 'одинокой смертной', 'одиноким смертным' )] без сил и связей, вы не имеете права голоса в этом вопросе."
 POD_negotiation.4010.desc.end: "Вы никогда ещё не были в столь отчаянном положении. Вы делаете глубокий вдох и обдумываете варианты. "
 POD_negotiation.4010.a: "Всё, что я могу — бежать далеко-далеко."
 POD_negotiation.4010.b: "Я рискну."
 POD_negotiation.4010.b.tt: "Если вы не найдёте какую-либо поддержку #italic ОЧЕНЬ#! быстро, конец может быть только один."
 POD_negotiation.4010.c: "Инквизиция наверняка примет нового рекрута."
 POD_negotiation.4010.d: "Я присоединюсь к Ши."
 POD_negotiation.4010.e: "Я найду тех, кто тоже хочет бороться с тьмой."
 POD_negotiation.4010.f: "Вампиры ведь хорошо относятся к своим слугам, верно?"
 POD_negotiation.4010.f.tt: "Нет, не относятся."
 POD_negotiation.4010.f.tt2: "" # TODO MORTAL: bound ghoul explanation with game_concept
 POD_negotiation.4010.g: "К счастью, у меня есть пленник, у которого можно взять витэ."
 POD_negotiation.4010.g.tt: "" # TODO MORTAL: masterless ghoul explanation with game_concept
 POD_negotiation.4010.h: "Мой единственный выбор — продать душу новому хозяину."
 POD_negotiation.4010.i: "Мумии на стороне праведности."
 POD_negotiation.4010.j: "Может, кто-то из фей меня зачарует?"

 POD_negotiation.4020.t: "Конец"
 POD_negotiation.4020.desc: "Однажды ночью вы ложитесь спать — и просто никогда не просыпаетесь.\n\nУ вас нет способа выяснить, кто ответственен за это невыразительное событие. Возможно, невидимый носферату перерезал вам горло, пока вы были без сознания. Возможно, нефанди проклял вас издалека, считая, что спонтанные акты жестокости — верх комедии. А может, это был кто-то совсем другой. Было бы занятным мысленным экспериментом, если бы у вас ещё оставалась способность мыслить или ставить эксперименты.\n\nПо крайней мере, теперь вы избавлены от сожалений о своих решениях, которые испытывали бы прямо сейчас."
 POD_negotiation.4020.a: "Я [Select_CString(ROOT.Char.IsFemale, 'прожила', 'прожил' )] хорошую жизнь?"
 POD_negotiation.4020.b: "Я [Select_CString(ROOT.Char.IsFemale, 'прожила', 'прожил' )] едва ли не самую худшую жизнь."
 POD_negotiation.4020.c: "У меня остались незавершённые дела."