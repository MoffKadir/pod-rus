 mokole_3_pulse_title: "Mokolé"




 POD_mokole.100.t: "Dreaming your Form"
 POD_mokole.100.desc: "Unlike most [Glossary('Фера', 'glossary_fera_tt')] whose war forms look near identical among themselves, you will never find two Mokolé with the same Archid form.\nThe Archid's shape is taken from the dreaming, which comes at the Mokolé's First Change. Through Mnesis, they dream about the reptiles, birds, and dinosaurs of the past, which determines the characteristics of their new Archid form. In this mystical experience, the Mokolé actually experiences the lives of her remembered ancestors and her Archid form creates itself from their body shapes.\nThe form usually resembles a crocodile, dinosaur or dragon, although there are pterosaur and sea-serpent Mokolé. These forms generally have body parts that in nature don't occur on the same animal, such as wings on a crocodile - the forms are dreamed, not strictly remembered.\n\nWhat is your form?"
 POD_mokole.100.option.a: "My dreams have shaped me."
 POD_mokole.100.tooltip1: "@warning_icon!#warning You must pick all available options to continue#!"
 POD_mokole.100.tooltip2: "Your selected options will be added to your [GetModifier('POD_mokole_form_archid_modifier').GetNameWithTooltip]"


