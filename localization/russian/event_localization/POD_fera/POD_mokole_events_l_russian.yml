 POD_ARCHID_REMAINING_OPTIONS: "Remaining Options:"




 POD_mokole.101.t: "Lord of Beasts"
 POD_mokole.101.desc: "After years of constant search through the Umbra and forgotten places of the world, you have found the last survivors of the Dragon Kings' kinfolk. After your cataloging, they may yet be returned to the world, safe and healthy in your care."
 POD_mokole.101.option.a: "Life found a way..."


 POD_mokole.300.t: "Beneath the Sands"
 POD_mokole.300.desc: "As you get reports of the completion of the current stage of the restoration of Crocodilopolis, you get a more curious report. Two ancient mummified 'dead' were found, but upon being brought to the surface, they stirred from their reliquaries and transformed. As you greet them, the two ancient Mokolé reveal to you in their shared tongue that they were once the children of a greater champion, but in the fall of the city, they all fell into slumber. They are thankful for you awakening them, and have joined your collection of champions. They however ask you go deeper, as there is a chance their stronger parent was in a state similar to them."
 POD_mokole.300.option.a: "If they are students, what lies deeper still?"


 POD_mokole.301.t: "Ancient Warrior"
 POD_mokole.301.desc: "As you oversee the final steps of the restoration of Crocodilopolis, the words of the sibling echo in your head, as a final tomb is discovered. As soon as the tomb is opened and the sun shines on the interior, a colossal, milky eyed crocodile bursts from it. It stretches, before shifting back into the shape of a human. You stride towards him, as they recognize the Elder of the people that awakened him. Despite his blindness, you can tell from their movement alone that the sharpness of instincts in him is second to none. Dressed in the regalia of a Champion of Anubis, he is a true newt out of water. After a few days, he understands the world to the best of your knowledge, and for restoring his home, he has decided to join you. Given the countless corpses of ancient Setites in his tomb, this was a tremendously valuable find."
 POD_mokole.301.option.a: "Anubis has granted you another great gift."


 POD_mokole.502.t: "Four were One"
 POD_mokole.502.desc: "Once, all the Mokolé were of a single Stream. To the Dragon Kings, there were no Mokolé-mbembe, Gumagan, Makara, or Zhong Lung, but simply Kings. As you dream of those times, your own Stream begins to converge, as new Gifts open up to you."
 POD_mokole.502.option.a: "Dream of the Mokolé-mbembe"
 POD_mokole.502.option.b: "Dream of the Gumagan"
 POD_mokole.502.option.c: "Dream of the Makara"
 POD_mokole.502.option.d: "Dream of the Zhong Lung"




 mnesis_quest_message_title: "Mnesis"
 

 POD_mokole.600.desc: "You dream of more relaxing times."
 POD_mokole.601.desc: "You dream of dead Mokolé."
 POD_mokole.602.desc: "You dream of peaceful times."
 POD_mokole.603.desc: "You dream of dark confusing nightmares."
 POD_mokole.604.desc: "You dream of being bathed in Gnosis."
 POD_mokole.605.desc: "You dream of a long lost Clutch, huddling together for warmth and safety."
 POD_mokole.606.desc: "You dream of Ambalasokei's jungles, fierce and savagely beautiful."
 POD_mokole.607.desc: "You dream of war and broken remnants, strife and fear unending."
 POD_mokole.608.desc: "You dream of Gendasi, the endless plains soothing your sleep."
 POD_mokole.609.desc: "You dream of the River Pact, of the unprecedented hope of peace between lizards and wolves."
 POD_mokole.610.desc: "You dream of friendships souring, birthing the bitter rivalries."
 POD_mokole.611.desc: "You dream of the mighty Brazentusk Mightyhoof, the last Grondr king falling to Garou claws."
 POD_mokole.612.desc: "You dream of the last Apis of Krete, maligned in Garou and mortal memory."
 POD_mokole.613.desc: "You dream of ancient Khem, where Mokolé kinsmen made sure the Sun received proper worship."
 POD_mokole.614.desc: "You dream of the start of life in Entoban, long before everything, and everyone else existed."
 POD_mokole.615.desc: "You dream of sun scorched Bandaiyan, forever free of taint."
 POD_mokole.616.desc: "You dream of you dreaming during the Age of Sleep."
 POD_mokole.617.desc: "You dream of men paving cities with gold, before flooding them with rivers of blood."
 POD_mokole.618.desc: "You dream of Oannes, where wisdom was shared and stolen."
 POD_mokole.619.desc: "You dream of lost dreams, and lose them."
 POD_mokole.620.desc: "You dream of Gaia's goals, but cannot grasp them."
 POD_mokole.621.desc: "You dream of the Dinosaur Kings, roaring ferociously and unaware of the fate awaiting them."
 POD_mokole.622.desc: "You dream of the Last Times, where it all begun and ended."
 POD_mokole.623.desc: "You dream of crowns and scepters, turning to dust as time grinds them all to nothingness."
 POD_mokole.624.desc: "You dream of the serpentine judges, and they try to steal your dream as they steal your form."
 POD_mokole.625.desc: "You dream of the Wani, giving their eggs to the Queen Mother to bring to the Middle Kingdom."
 POD_mokole.626.desc: "You dream of the Hakken, as they exile themselves to the islands of Nihon."
 POD_mokole.627.desc: "You dream of the ancient temples of the Lizard Kings, dedicated to Helios, father Sun."
 POD_mokole.628.desc: "You dream of the War of Shame and the establishment of the Beast Courts."
 POD_mokole.629.desc: "You dream of the Mokolé's failure, and Gaia's solution of creating the other [Glossary('Фера', 'glossary_fera_tt')] breeds."
 POD_mokole.630.desc: "You dream of great dinosaurs and their Lizard King handlers."












 POD_mokole.681.t: "Lost Dreams"
 POD_mokole.681.desc: "While most Mokolé consign themselves and hide within their dreams, there is always a threat in nostalgia. For the Mokolé, it is the Dreamhunters, umbral stalkers scourged and twisted by their dreams that seek to silence their longing. Unfortunately, in your own slumber, one has begun to invade your thoughts, seeking your destruction."
 POD_mokole.681.option.a: "Convince it to leave."
 POD_mokole.681.option.b: "Drive it away."

 POD_mokole.682.t: "An Invader"
 POD_mokole.682.desc: "Hiding within the comforting memories of Mnesis is a luxury unique to the Mokolé, but it is not without risk. Dreamhunters, umbral stalkers that harass the Mokolé in all their personal escapes, has come to seek you out in your own respite in Mnesis, eager to add your death to the Mnesis' ancestral memory."
 POD_mokole.682.option.a: "Outmaneuver it."
 POD_mokole.682.option.b: "Drive it away."




 POD_mokole.689.good: "You managed to learn something from the defeated Dream Hunter."




 POD_mokole.690.t: "Awake Again"
 POD_mokole.690.desc: "As the Mnesis quest's conclusion comes to an end, the world of the living and mortal calls to you again. You stir, as the recollections come with you, more of the shared memory of the Mokolé now your own. You awaken from memory, the choice for what to do with it now up to you."
 POD_mokole.690.option.a: "To sleep, perchance to dream."

 mokole_mnesis_quest_widget_tt: "You will immediately start another #bold Mnesis#! [journey|E]."
 mokole_mnesis_quest_widget_desc: "Go on another #bold Mnesis#! [journey|E]?"







 POD_mokole.torment: "Torment!"
 POD_mokole.torment_desc: "One of your [tormentors|E] is acting against you!"

 POD_mokole.700.t: "Innocent Attack"
 POD_mokole.700.desc: "An [innocent|E] has attacked you!"
 POD_mokole.701.t: "Being Followed"
 POD_mokole.701.desc: "Something sinister is following you in the Umbra."
 POD_mokole.702.t: "Drained"
 POD_mokole.702.desc: "A hidden [innocent|E] has drained your strength."
 POD_mokole.703.t: "Assault"
 POD_mokole.703.desc: "A pair of [innocents|E] attacked you!"
 POD_mokole.704.t: "Silver Ambush"
 POD_mokole.704.desc: "An [innocent|E] imbued with silver ambushed you!"
 POD_mokole.705.t: "Terror"
 POD_mokole.705.desc: "The dreadful sounds of [innocents|E] have managed to intimidate you."
 POD_mokole.706.t: "Broken Body"
 POD_mokole.706.desc: "[innocents|E] have ravaged your body!"


 POD_mokole.720.t: "Darkness Approaches"
 POD_mokole.720.desc: "Many Mokolé fail to restrain their emotions when they encounter dark memories during their Mnesis, the [innocents|E] are the result. These negative emotions coalesce into a malignant spirit that seeks to destroy both its creator and all other Mokolé. Unfortunately, as they feed on Gnosis, one of the Innocent has taken to stalking you, with a desire to turn you into dinner."
 POD_mokole.720.a: "I must resist!"
 POD_mokole.720.b: "Protect me!"
 POD_mokole.720.c: "I can't hold on any longer..."

 POD_mokole.721.t: "Nightmare Incarnate"
 POD_mokole.721.desc: "Many Mokolé fail to restrain their emotions when they encounter dark memories during their Mnesis, the [innocents|E] are the result. These negative emotions coalesce into a malignant spirit that seeks to destroy both its creator and all other Mokolé. Unfortunately, one of them has stolen the shape of another Mokolé, and has decided it wants to take your own Archid form for itself."
 POD_mokole.721.a: "To battle!"
 POD_mokole.721.b: "This will distract it!"
 POD_mokole.721.c: "I must flee!"