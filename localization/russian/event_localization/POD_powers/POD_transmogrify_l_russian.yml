l_russian:


 POD_transmogrify.100.t: "Избавляя «материал» от влияния времени"
 POD_transmogrify.100.desc: "Сделать ли так, чтобы [recipient.GetFirstName] [Select_CString(recipient.IsFemale, 'выглядела', 'выглядел')] моложе или старше?"
 POD_transmogrify.100.option.a: "Я больше не буду менять возраст персонажа [recipient.GetFirstNameNoTooltip]."
 POD_transmogrify.100.widget: "Визуальный возраст: [Character.MakeScope.ScriptValue('POD_effective_age')]"


 POD_transmogrify.500.t: "Знание любой ценой"
 POD_transmogrify.500.desc: "Какое [Concept('trait', 'свойство')|E] вы хотите изучить?"
 POD_transmogrify.500.a: "Я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал')] свой выбор."
 POD_transmogrify.500.a.trigger: "Сначала необходимо выбрать черту"
 POD_transmogrify.500.b: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал')]. Сегодня никаких экспериментов."

 POD_transmogrify.501.t: "Анатомия: [GetPlayer.MakeScope.Var('current_journey').Var('target_trait').Trait.GetName(GetPlayer)]"
 POD_transmogrify.501.desc: "Прошло уже некоторое время с тех пор, как вы в последний раз практиковались в подземелье, но прошлые опыты остались с вами.\n\nПосле размышлений и обучения вы теперь понимаете, как применить полученные знания."
 POD_transmogrify.501.a: "Кто станет моей следующей подопытной персоной?"
 POD_transmogrify.501.a.tt: "Вы получили понимание [Concept('trait', 'свойства')|E] «[GetPlayer.MakeScope.Var('current_journey').Var('target_trait').Trait.GetName(GetPlayer)]», что позволяет использовать её во [Concept('character_interaction', 'взаимодействии')|E] [Concept('fleshcrafting', 'ваяния плоти')|E]."