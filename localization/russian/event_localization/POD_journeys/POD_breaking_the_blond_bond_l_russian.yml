l_russian:
 POD_breaking_the_blond_bond.1.t: "Ослабление уз крови"
 POD_breaking_the_blond_bond.1.desc: "Вы сделали это. То, что когда-то было безмерной любовью и привязанностью, свелось к лёгкой симпатии. Теперь вы можете причинить вред тому, кого прежде считали своим бессмертным господином. Впрочем, это будет непросто: подобную зависимость не преодолеть за один день, но вы, по крайней мере, смело сделали первый шаг.\n\n#weak Вам остаётся лишь игнорировать грызущую пустоту в сердце...#!"
 POD_breaking_the_blond_bond.1.a: "Я чувствую себя [Select_CString(ROOT.Char.IsFemale, 'потерянной', 'потерянным' )]..."
 POD_breaking_the_blond_bond.1.a.tooltip: "В течение следующих #V 10#! лет вы сможете использовать [Concept('character_interaction', 'взаимодействие персонажа')|E] чтобы освободиться от своего хозяина ценой [Concept('modifier', 'модификатора')|E], либо напрямую убить своего [Glossary('домитора','game_concept_domitor_desc')]. #X Если вы завершите любую @ghoul_icon![Concept('bound_ghoul_mission', 'миссию')|E], всё это странствие мгновенно аннулируется.#!"

 POD_breaking_the_blond_bond.2.t: "Узы крови вновь обрели силу"