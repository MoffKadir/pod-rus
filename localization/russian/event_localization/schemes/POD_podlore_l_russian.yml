 POD_persistentpodlore.desc.793278: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nНа протяжении всей монгольской истории ссылка в изгнание в соседние империи была обычным делом для многих из их менее ценных представителей. Для многих это было ужасно - быть изгнанным из своего дома. Но для Батбайбара он не мог быть счастливее. С юности Батбайбар высоко ценил искусство. Начав с изготовления луков и оперения, он предпочитал проводить время за ткачеством гобеленов и резьбой по дереву, а не за охотой. Он был настолько поглощён своим искусством, что, когда на его общину напали, один воин вломился в его юрту, чтобы убить его, битва проиграна, но он был настолько погружён в своё ремесло, что даже не заметил этого. Ему удалось спастись, и он бежал на юго-запад, в сторону Иранского нагорья. Там он был очарован их работами и с энтузиазмом демонстрировал своё мастерство ремесленника. Именно здесь он привлёк внимание Бану Хаким и был принят в их ряды в качестве одного из визирей.\n\nБатбайбар - это картина творческого безумия, охватившего визирей. Но теперь его творчеству помешали. По мере того, как монголы продвигаются вглубь Ирана, он приходит в ужас от разрушений, которые несут некоторые из их полководцев. И, что ещё хуже, [Glossary('Анда','podgloss.anda')] находятся в их тени. Батбайбар ненавидит их поход и хочет сохранить эти великие творения. Поэтому он решил держать оборону от имени клана, решив умереть, прежде чем позволит [Glossary('Анда','podgloss.anda')] уничтожить то, что он так долго защищал."
 POD_persistentpodlore.desc.793279: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nИ в жизни, и в смерти Навнит и дорога были близкими подругами. Аглайя, родившаяся среди далитов-изгнанников из Индии, путешествовавших на запад, была одной из первых из своего народа, кто увидел стены Константинополя. Сразу же ставшая нежеланной и с готовностью закованная в цепи, Навнит планировала бежать со своим народом дальше в глубь Европы, если бы ночью её не встретила женщина и не попросила обсудить с ней философию. Несмотря на то, что Навнит провела много времени в разъездах, она мечтала о родине. Она мечтала о мире, в котором она и её семья могли бы жить легко и свободно, без оков и обременений. Она говорила о местах, на которые надеялась, и сокрушалась, что если бы только у неё были силы, она бы воплотила это в жизнь.\nЖенщина решила, что из неё получилась бы идеальная бруха, когда Навнит рассказала о своём идеальном мире.\n\nС тех пор, как Навнит была обращена, она много путешествовала, ища место, где она могла бы попытаться возродить надежду своего народа, которую теперь смягчила и прояснила утопия Карфагена, о которой рассказывал ей её сир. Однако после возвышения Монгольской империи у неё появились новые возможности. Она видит в этом потенциал, место, где она может построить рай глубоко в степях, синкретизм Карфагена и святилище своей мечты для народа, который впоследствии будет называться романи."
 POD_persistentpodlore.desc.793280: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nРодившийся в империи Хань в Цинъяне, Фу был образованным юношей, но позже начал действовать, стремясь к известности и славе на службе у Хань. Он обрёл свою славу, когда луланьский король Аньгуй убил нескольких дипломатов. Несмотря на то, что в то время Фу был конюхом, его послали заколоть короля, но вместо этого он предложил другой план и убил Аньгуя, одурачив его подарками и напоив, после чего его стражники немедленно избавились от короля. Фу был горд своим званием, полученным за службу, и позаботился о своей новой должности.\nНо что-то в нём оставалось. Он скучал по учёбе. Он обрёл свою славу, но что-то всё ещё не давало ему покоя. Он хотел узнать больше, он хотел учиться, и он хотел расширить свои знания.\nК своему большому удивлению, он нашёл родственную душу, которая всегда приходила по ночам, чтобы поговорить с ним о природе смерти под тяжёлыми одеяниями. В последние годы смертной жизни они были близкими друзьями. И когда он начал стареть, путешественник предложил ему дар, который позволил бы ему жить той жизнью, которую он оставил позади, в новом состоянии. Фу согласился и был объят каппадокийцем.\n\nС тех пор Фу в основном занимался своими исследованиями самостоятельно. Однако недавний всплеск смертности, вызванный ростом численности монголов, заставил его предпринять более активные действия. Монголы во многом напоминают ему Лулань из его собственной жизни, и из-за того, что они причиняют огромное беспокойство мертвым, он решил действовать. В конце концов, он всегда хотел быть чем-то большим, чем просто книжным червем. И что такое второй король, если его уже можно так легко убить?"
 POD_persistentpodlore.desc.793281: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nРодившийся в походе через Урал, Темюлен был болезненным и невзрачным человеком. С самого рождения его жизнь в степях была постоянной борьбой. Вечно больной, с открытой неприязнью относившийся к своим товарищам, Темюлен всегда был в стороне и открыто высмеивался остальными членами своей большой семьи. В то время как его семья участвовала в налётах по Европе, он часто был слишком слаб физически, чтобы правильно пользоваться луком, и поэтому в таких походах к нему относились как к бесполезному существу.\nОднако во время одного из вторжений они совершили ошибку, напав не на ту церковь. Ночью в темноте произошел взрыв, поглотивший всех, кто находился внутри. Темюлен бежал изо всех сил, и та ночь стала худшей и последней в его жизни. Несмотря на невозможное, он встретил это так, как всегда. Борясь перед лицом невозможного и отказываясь сдаться и умереть. И это произвело впечатление на нападавшего, который затем объял Темюлена в клан Ласомбра.\nЕго «воспитание» лишь укрепило волю Темюлена к выживанию, но также и его ненависть. Больше всего на свете Темюлен ненавидел систему, которая всегда считала его слабым. А теперь он силен. Для смертных он как бог, и он наслаждается чувством объективного превосходства, которое он теперь имеет над ними. Он наслаждается короной тьмы, возложенной на его голову, и больше ничего не хочет, чтобы сделать ее вечной, чтобы показать всем, кто отверг его, что он силен."
 POD_persistentpodlore.desc.793282: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nСреди тореадоров есть много видов искусства, которые они стремятся защищать. Гобелены, музыка, скульптуры, картины, музыкальные инструменты, архитектура и бесчисленное множество других видов искусства, как физического, так и эмоционального, являются обычным делом. Но Отгонбаяр видит в хорошо воспитанном животном гораздо больше красоты, чем просто в картине.\nВ смертной жизни Отгонбаяр была главным помощником своего клана по уходу за лошадьми и домашним скотом. Каждая пара была её выбором, и она испытывала огромное удовлетворение, наблюдая, как стада и поголовье скота её клана улучшаются в течение нескольких поколений. И так великолепен был ее собственный чистокровный конь, что во время торговой поездки в город ночная фигура была настолько очарована ее работой, что они не могли позволить такой художнице умереть, прежде чем она успеет создать свой шедевр.\nВ целом, объятия не сильно изменили Отгонбаяр, потому что теперь у нее есть все время, чтобы совершенствоваться в науках и искусстве. Ее собственные стада являются одними из лучших в мире, и на протяжении веков спаривание контролировалось для получения идеального потомства. Однако, глядя на свои прекрасные стада, она хочет перейти к следующему шагу. Она оглядывается на людей, которые ее окружают, и, возможно, задается вопросом, можно ли в это время раздора сделать то же самое с человеком..."
 POD_persistentpodlore.desc.793283: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nОдно из самых загадочных созданий ям гаргулий йеориса, Дельта, вместе с другими гаргульями, которые составляли ее кладку, была в составе экспедиции, отправленной на восток для изучения монголов от имени клана Тремер. Однако во время путешествия их проводник-тремер встретил окончательную смерть, и Дельта вместе со своим выводком отвела их в безопасное место на Урале, прежде чем отправиться дальше на восток.\nТеперь, освободившись от уз крови и сбежав со своими заклятыми спутниками, Дельта ревностно охраняет их новую свободу. Мир ночи в степях - это хаос, и они обладают уникальными навыками выживания в этих регионах, благодаря своим крыльям и способности сливаться с землей. Но еще больше она боится, что тремеры будут искать эту потерянную кладку, независимо от того, насколько напрасными будут их поиски. Поэтому она ревниво охраняет их общее убежище, охотясь вместе и никогда не расставаясь. И по мере того, как хаос [Glossary('Анда','podgloss.anda')] приближается, она вынуждена делать выбор.\nОни продолжат прятаться? Или пытаются создать что-то прочное, чтобы защитить себя изнутри?"
 POD_persistentpodlore.desc.793287: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nОмега, одна из самых загадочных гаргулий Цеориса, была особенно странным созданием и по причинам, недоступным ее пониманию, работала в паре с Дельтой. Отправленная со своей стаей на Восток, она освободилась после смерти их наставника-тремера во время вторжения монголов, и, поскольку ей больше некуда было идти, она держалась поближе к Дельте, уходя с ней все глубже в степи.\nОмега - сердце своей стаи, но, прежде всего, она наиболее фанатично предана Дельте. Помимо того, что она была защитницей Омеги в ямах гаргулий, Дельта позволяла Омеге оставаться рядом. Она предана своему делу, и в отсутствие уз крови Омега все глубже погружается в объятия Дельты, чтобы ощутить еще большую ясность и защиту, которые она предлагает.\nНо Омега беспокоится за свою стаю. Поскольку [Glossary('Анда','podgloss.anda')] и другие каиниты степей окружают их, Омега умоляет Дельту построить место, где они смогут прятаться не как животные, а править так, как когда-то правили их хозяева. Она жаждет увидеть корону на голове Дельты и готова на все ради вожака своей стаи. Она просто хочет, чтобы Дельта смотрела на это так же."
 POD_persistentpodlore.desc.793289: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nДжайиндра родился в странное для Индии время. Будучи сыном Шашигупты из Паропамисады, Джайиндра увидел, что его дом оказался под угрозой из-за необычайно успешного и неуравновешенного завоевателя, пришедшего с дальнего запада. Но Джайиндра всегда знал, что, когда его отец проявлял крайнюю враждебность по отношению к Александру, это не могло принести ничего хорошего. Идя против воли отца, он немедленно повел своих людей против греков, вступая с ними в бой там, где Александра не было. По большей части, он добивался успеха. Однако, когда он начал продвигаться вперед, ночью на него внезапно напало из засады ужасное безумное существо, использовавшее ужасающую магию и саму манию, чтобы разгромить его армию. Однако он отказался бежать и вместо этого бросился на существо сквозь адское пламя и поток безумия. Однако его удар не достиг цели, и он был сражен ими.\nДжайиндра умер бы там, если бы не поразил другого человека, наблюдавшего за ним.\n\nЧеловек, который объял Джайиндру, немедленно применил свои навыки на практике. Служа дипломатом и генералом, Джайиндра регулярно и успешно сражался в Вечной войне, но часто из-за своего недовольства начальством он постоянно ссорился со своим сиром. Итак, когда до кшатриев дошла весть о экспансии Великого монгольского улуса и о собственном походе [Glossary('Анда','podgloss.anda')], Чандрапутра отправил Джайиндру в качестве посланника и военного советника.\nПо мнению Джайиндры, это было к лучшему, так как он хотел сменить темп борьбы с Голодными мертвецами. Он надеется научиться многим новым стратегиям на своем нынешнем посту, где он с нетерпением ждет, в какую сторону подует ветер."
 POD_persistentpodlore.desc.793290: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nРодившаяся на Тибетском нагорье в маленькой деревушке, Церинг, по всем меркам, была обречена на скромную и небогатую событиями жизнь, где каждый день был похож на предыдущий. Однако даже в детстве в ней явно горела бунтарская жилка, то самое пламя, которое однажды изменит ее навсегда.\nНачав с мелочей, таких как мамины ленты для волос и обувь деревенского мастера, она поднималась все выше и выше, пока не добилась самого высокого результата, когда, пробравшись в храм, который считался заброшенным, украла нефритовый талисман, охраняемый стариком, который превратился в демона и сбежала так быстро, как только позволяли ноги, она убегала с места кражи. Когда она скрылась в своей родной деревне, то вздохнула с облегчением. Но она действительно сделала это, потому что после этого демоны ворвались в деревню, разыскивая ее. Поэтому она использовала все свои воровские навыки, чтобы скрыться в дикой местности, но была остановлена кем-то, кто на самом деле преследовал её по пятам.\nДругой вор предложил обучить её и сделать так, чтобы она стала лучше, чем могла мечтать. Церинг приняла это предложение всем сердцем и стала одной из воровок салюбри Ву Цзао.\n\nЦеринг хороша в своем деле, и ей это нравится. Став вампиром, она теперь стремится к все большим и большим достижениям, всегда превосходя свои прежние. Теперь она нацелилась на Монголию, поскольку единственной вещью, которую она никогда не крала, был трон, и [Glossary('Анда','podgloss.anda')] марширует по всему миру. Возможно, пришло время для нового вида ограбления, гораздо более дерзкого.\nВ конце концов, что может быть ценнее трона?"
 POD_persistentpodlore.desc.793291: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nПо всем меркам Цзян должна была остаться лишь сноской в истории. Родившись во времена упадка и последующего краха династии Хань, Цзян на собственном опыте узнала, что значит жить в падающей империи. У её родной деревни отобрали всё продовольствие, а когда её отец и братья, чтобы прокормиться, занялись разбоем, полевые командиры схватили их и казнили. Когда деревня возмутилась расправой, подчёркивая, что они никогда не разоряли своих сюзеренов, военачальник велел предать всю деревню огню. Выжили немногие, и среди них была Цзян. Всё пережитое глубоко радикализовало её: она решила уничтожить военачальников и империю, из-за которых её семью зарезали, а дом разрушили.\n\nВместе со своей названой сестрой Чжэн они отправились в путь. Но их силы были малы; о них говорили в основном как о диковинке — женщинах, командующих разбойниками, — и, потерпев поражение в бою от Цао Пи, они были приговорены к смерти.\nОднако кто-то присматривал за ними обеими. После особенно жестокого «испытания» с участием тюремного стража Цзян проснулась от крика — трёхглазая фигура открыла её камеру. Существо по имени Цзао-Зэй приблизилось и приняло её в Ву Цзао. Но Цзян была в ярости: этот претенциозный вор читал ей нотации, убил её, стоял в стороне, пока её калечили, и позволял злу мира твориться безнаказанно.\nПри первой возможности Цзян вместе с Чжэн, которую обратили похожим образом, бежали в ночь. В странствиях они встретили другого странника, проповедовавшего путь, близкий их собственному, — мира без богов и хозяев. Тогда трое поклялись, что их новое племя крови добьётся осуществления их утопии.\nЧто бы ни случилось, Цзян будет стремиться к своей революции. Во что бы то ни стало."
 POD_persistentpodlore.desc.793292: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nИз хаоса рождаются перемены. Из суматохи своей жизни Чжэн усвоила этот урок. Чжэн, родившаяся в маленькой деревушке на севере Китая в период упадка династии Хань, делала все возможное, чтобы прокормить свою общину, в то время как местные военачальники выжимали из нее все, что могли. Однако этому не суждено было сбыться, так как несколько других жителей деревни, чтобы выжить, обратились к разбою, и в результате ужасной цепочки событий, однажды, когда она была на охоте, она вернулась в свою деревню, спасаясь бегством в горы, когда она поднялась на вершину холма и увидела, что он охвачен пламенем. Охваченная ужасом и яростью, она решила взять в руки лук и любой ценой восстановить справедливость в своем разрушенном доме. Итак, она присоединилась к одной из выживших, Цзянь, в её собственной яростной кампании против ханьцев.\nОднако, несмотря на то, что Чжэн хорошо знала этот регион, они были небольшой группой бандитов, выступавших против растущего могущества Цао Пи. У них не было ни единого шанса, и, попав в плен, Чжэн была приговорена к смерти. Внутренне разбитая, она ждала этого, переживая последние несколько дней с монотонностью робота. Однажды ночью, после особенно жестокого поворота событий с одним из стражников, в её узилище ворвался трехглазый мужчина, и, к большому ужасу Чжэн, он убил её и воскресил в виде вампира.\nЧжэн была в невероятном ужасе. Она хотела умереть, ее дом был разрушен, ее дело разрушено, а теперь у нее украли саму жизнь. И у ее убийцы хватило наглости назвать это даром, а затем наказать ее за горе. Поэтому она сбежала со своим другом из своей смертной жизни в поисках чего-нибудь, чего угодно, что могло бы заполнить пустоту в ее пустом сердце. Только когда она встретила странствующую чужеземку из Японии, которая стремится к ночному обществу без господ и повелителей, она снова обрела огонь. Тот, который она теперь отчаянно хочет сохранить."
 POD_persistentpodlore.desc.793293: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nРожденная в семье лактанского всадника и русской пленницы, Сати была ничем не примечательным ребенком, обреченным на ничем не примечательную жизнь. Племя было надменным и иногда суровым по отношению к ней из-за ее происхождения, но она все равно была в основном довольна своей жизнью, поскольку видела гораздо худшие судьбы в раздираемых войной степях.\nВсе это изменилось в мгновение ока, когда русские Вентру отправились в экспедицию, чтобы «получить знания» о восточных захватчиках, вторгшихся на ее родину. Сати была захвачена в плен во время налёта и удостоилась сомнительной чести, в основном потому, что благодаря своей матери она немного говорила на ломаном русском, быть избранной для обращения, чтобы обучать свою новую хозяйку-нежить обычаям своего народа.\n\nСати занималась этим пару лет, прежде чем ее сир почти забыла о ней, у которой не было никаких дальнейших планов на её счет. Однажды ночью, когда Сати ушла, никто ее не остановил и даже не заметил.\nНесмотря на то, что юная вентру была едва сведуща в вопросах вампиризма, она знала, что по всей России и дальше на запад водятся монстры, еще более могущественные, чем её собственная дама. Однако она вспомнила, что в ее маленьком племени лактан, похоже, никогда не было ни одного такого вампира, и поэтому решила выследить их. Пребывание в знакомой обстановке без других вампиров показалось ей лучшим решением.\n\nК ее удивлению, план Сати сработал, учитывая все обстоятельства. Она нашла остатки своего племени и, используя свои новые способности, была легко принята обратно.\nВ последующие годы Сати впервые начала наслаждаться жизнью (или нежизнью), используя свое влияние, чтобы поддержать свое племя, защитить себя от других и попытаться обуздать его худшие наклонности.\n\nКогда орда [Glossary('Анда','podgloss.anda')], следуя за монголами, послала эмиссаров к меньшим племенам (включая ее племя) требуя подчинения или смерти, Сати обнаружила, что впервые за многие годы разговаривает с другими повелителями нежити. Она сделала единственный разумный выбор и преклонила колено перед могущественными захватчиками, спасая свой народ от полного уничтожения.\nСейчас она ждет в своем маленьком уголке степи, надеясь, что она и ее народ переживут продолжающийся шторм."
 POD_persistentpodlore.desc.793294: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nРодившаяся в месте с чистой водой и выросшая в Бурхан-Халдуне, Алана была такой же девушкой, как и все остальные, только отличалась в своем клане необычайной красотой и еще большей мудростью. Дважды выйдя замуж, она родила пятерых детей, которые часто ссорились между собой. Не желая, чтобы ее сыновья покончили с собой или погибли в одиночестве, она пригласила их на обед и велела каждому сломать по стреле. Когда они это сделали, она дала им связку из 5 связанных вместе стрел и попросила их попробовать сделать то же самое. Когда они потерпели неудачу, она подчеркнула важность единства. Сыновья усвоили это и впоследствии стали предками монгольского народа, как сказано в «Тайной истории монголов». Но другая слушательница приняла ее урок близко к сердцу.\n\nЙесира из племени [Glossary('Анда','podgloss.anda')] подошла к Алане и спросила, готова ли она применить свою мудрость, чтобы защищать своих сыновей и их родословную ночью, в то время как они защищали ее днем. Не видя более высокой чести быть матерью, Алан согласилась и присоединилась к [Glossary('Анда','podgloss.anda')]. И в этом она нашла для себя дело, которому могла посвятить себя умом, телом и духом. Каждое ее действие, каждый курс и каждая директива были бы направлены на благо семей ее сыновей, и со временем она заняла бы свое место личной телохранительницы Добрула, призрака в степи, даже среди тех, кто прячется во тьме.\nОна ничего не боялась, наслаждалась ночным небом и стремилась к еще большим высотам для людей, которые произошли от нее. Она сформирует Авангард Чёрного ветра, орден воинов Анда, который станет бичом всех демонов, охотившихся на монголов.\n\nДальнейшая судьба\nАлана была успешна в битвах, но не смогла бы выиграть войну. Когда ван-куэй позже взяли штурмом место упокоения Добрула, её собственное местонахождение в глубине территории ван-куэй сделало невозможным спасение ее прасира.\nВместо того чтобы принять смерть, она бежала со своим Авангардом Чёрного ветра в Сибирь, где они исчезли, и их больше никогда не видели, если только не ходили пугающие слухи о том, что они снова будут рядом с Добрулом, когда наступит Шестая эпоха."
 POD_persistentpodlore.desc.793295: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nВсе великое когда-нибудь заканчивается - аксиома, с которой Дилай знакома с обеих сторон.\n\nВоспитанная как шаманка народа массагетов, Дилай была более восприимчива к сверхъестественному миру, чем большинство смертных, и в разгар войны между персами и массагетами ее положение при дворе массегетов открыло ей доступ ко всевозможным тайнам и ужасам. Но вместо того, чтобы бежать от этого, Дилай встретилась с этим лицом к лицу. Один из таких убийц, пришедший за своей царицей, был встречен тем, что из его груди была выпущена ветка дерева, а Дилай взяла его кровь, чтобы обрести силу. Жрица днем и убийца ночью, она делала все, что могла, чтобы попытаться изгнать ассасинов из своего народа, но она была одна, а их было много.\nИз-за их влияния она впала в немилость при дворе и была отправлена в изгнание в степи. В своей борьбе и желании выстоять, никогда не смиряться с подобными унижениями, она привлекла внимание Аланы, которая объяла ее, когда Дилай стала жертвой разоблачения.\n\nКогда Алана предложила способ отомстить таким же кровожадным монстрам, Дилай воспользовалась шансом, чтобы убедиться, что все те, кто насытился кровью сердца, подавились ею. В Авангарде Чёрного ветра ассасины и судьи Ирана не нашли бы убежища перед Королевой-воительницей, возродившейся под бескрайним небом."
 POD_persistentpodlore.desc.793296: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nВ то время как многие гангрелы заявляют, что они хозяева дикой природы, лишь немногие из них принадлежат к тем, чья жизнь была связана с борьбой со стихиями. Будучи роднёй Сиберах и происходя из глубин Сибири, Виртьяна гораздо больше привыкла к этому, чем многие из рода Каина.\n\nВиртьяна выросла, сосредоточившись в основном на выживании и обеспечении. Сиберах ведут жестокий образ жизни, намеренно живя в самых негостеприимных уголках короны мира, и при этом отдают почти всё, что собирают, немногочисленным бесценным оборотням своего племени.\nПо большей части, Виртьяна старалась изо всех сил. Но у каждого есть пределы. И однажды ночью, когда пьяный Сиберах попытался найти себе пару в Виртьяне и отказался слушать её призывы остановиться, к большому удивлению обоих, ярости, охватившей родню в тот момент, было достаточно, чтобы ему повезло с чужеземной безделушкой - серебряной вилкой, проткнувшей его челюсть насквозь в его голову, убив его на месте.\nЗная, что теперь её ждёт только смерть, Виртьяна быстро сбежала, сделав всё возможное, чтобы скрыть свой запах и скрыться. Но даже для тех, кто родился там, Сибирь может сломить любого, и на пороге степей она обессилела, умирая от истощения, голода и переохлаждения.\nНа этом её история закончилась бы, если бы [Glossary('анда','podgloss.anda')] Дилай не изучала её. И когда Дилай показала ей мир, где она могла бы стать достаточно сильной, чтобы жить за пределами своего племени, она приняла каинитскую натуру, дарованную ей природой.\n\nСреди Чёрных ветров Виртьяна зарекомендовала себя как убийца Свирепого народа. Это чрезвычайно опасная должность для любого, но её опыт родни Сиберах открывает ей больше правды об их положении, чем слухов, что делает её уникальной кандидатурой на эту роль. И, приходя от этого в восторг, она получала удовольствие от того, что была Чёрной волчицей, губительницей Сиберах."
 POD_persistentpodlore.desc.793297: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nМногие из её старых товарищей сказали бы, что Сорхагтани пала. Но, хотя её средства изменились, её цель осталась прежней. Она убивает демонов. Независимо от методов, гибель демонов Ся всегда справедлива.\n\nСорхагтани была одной из немногих охотников на демонов хунну, рождённых в одной из их вассальных культур и обученных мастером из династии Хань. Осознав, что в мире царит тьма, Сорхагтани решила бороться с ней огнём. Но учение расстраивало её, заставляло оставаться в одиночестве и не объединять других в этом деле.\nТак что, даже если она и была ревностной убийцей демонов, методы её современников расстраивали её. Поэтому она нарушила учение и начала обучать свой клан искусству уничтожения демонов. Это оскорбило её хозяина, который затем устроил резню на собрании. Оставив Сорхагтани напоследок, он посмеялся над её усилиями и повторил, как важно побыть одному. Но в своём злорадстве он не заметил приближающуюся к нему сзади фигуру, и Сорхагтани была спасена Аланой, разорвавшей её бывшего хозяина пополам. Затем Алана сделала простое предложение. Присоединяйся к ней и сражайся с демонами после смерти. Выбор был очевиден.\n\nСорхагтани - один из самых рьяных представительниц Авангарда [Glossary('Анда','podgloss.anda')], выступающих против [Glossary('куэй-дзин','game_concept_kuei_jin_desc')]. Она ненавидит их всеми фибрами души, с детства обученная убивать их. Будучи специалистом в этой области, она превратила уничтожение Тысячи демонов в вид искусства. И хотя охотники на демонов могут искать её сейчас, она готова позволить им прийти.\nОна превзошла их."
 POD_persistentpodlore.desc.793298: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nДля большинства, кто знает, что такое маги, мысль о том, чтобы специализироваться на их убийстве, звучит безумно. К счастью для Самги, у неё это неплохо получается.\n\nВыросшая в довольно маленьком клане, семья Самги жила под тиранией мага с комплексом божественности. Обладая правом первой ночи, имея право первого выбора в отношении всех молодых людей клана, имея небольшую группу наложниц и предаваясь многим порокам, которые заставили бы замолчать даже закоренелых тиранов, Самга росла в тени постоянного ужаса и страха. Её отцу вывернули голову наизнанку за то, что он переварил сурка, а маме отрезали все конечности и пересадили ослиную шею за то, что она проявила недостаточный энтузиазм в постели тирана.\nИ для большинства членов клана этот ужас держал их в узде. Но не для Самги. После смерти своих родителей она оставалась в тени, оставаясь никем, ожидая момента, когда сможет отомстить. И, наконец, когда он призвал молнию, чтобы уничтожить другое племя, она увидела свой шанс. Из-за холма она выпустила стрелу в глаз тирана с помощью металлической стрелы, в результате чего молния ударила в голову мага и разнесла его на месте.\nА потом, когда у неё ничего не осталось, она просто легла и стала ждать, что будет дальше.\n\nКогда она проснулась, она была другой, и создание ночи ждало её рядом. Когда ей пообещали возможность уничтожить всех врагов, которые угрожали их народу, она сочла это благородным делом и встала на их сторону. Став Чёрным ветром, она стала проклятием для многих магов, применяя правила ведения боя против искажателей реальности, чтобы гарантировать, что они никогда больше не смогут представлять угрозу."
 POD_persistentpodlore.desc.793299: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nШайладжа, родившаяся в землях династии Махамегавахана, жила в тени падения Маурьев. Проведя большую часть своей смертной жизни так же, как и любой другой житель её деревни, она уделяла много времени уходу за пожилыми. Будь то приносить им воду, помогать готовить еду или даже быть тем, кого можно выслушать, она была весьма искусна в том, чтобы обеспечить им комфорт, когда они были брошены. Её любовь к ним была так велика, что однажды ночью, когда на одного из ее подопечных напал молодой тигр, она без колебаний выхватила саблю у стражника и одним ударом раскроила ему голову.\nТакая наглая и прямолинейная, она привлекла внимание одного из последних греческих завоевателей, а также некоторых существ, скрывавшихся в его тени. Одна из таких фигур решила бы, что эта сиделка за пожилыми и истребительница тигров идеально подходит для её родословной. И в ту ночь Шайладжа стала ламией.\n\nШайладжа восприняла эти объятия не так хорошо, как ожидал её сир. Её воспитание в клане было трудным, особенно потому, что она в основном отказывалась отринуть свои собственные верования в шакти ради поклонения Лилит. Её сир пытался настоять на своём, но однажды ночью у Шайладжи вспыхнул гнев и появились клыки, и она была вынуждена бежать.\nОна просто путешествовала туда, куда считала нужным, и в конце концов остановилась у дверей убежища каппадокийца Фу Цзецзы. Увидев проблески своего призвания в потенциальной защите этого знатока смерти, она с готовностью предложила стать его телохранителем, на что он с готовностью согласился. И по мере того, как мир вокруг них становится все более бурным, Проклятие хотанцев не будет найдено без его Погибели тигров."
 POD_persistentpodlore.desc.791510: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nБельгутей - далеко не лучший пример из того, что могут предложить [Glossary('Анда','podgloss.anda')]. На самом деле, он в значительной степени противоположен. Как хвастливый монгольский наездник, он обладал достаточными боевыми навыками, которые заинтриговали его потенциального сира, который надеялся, что бессмертие позволит развить эти навыки ещё больше. Увы, этому не суждено было сбыться.\nС тех пор как Бельгутей стал вампиром, он очень мало делал для того, чтобы произвести впечатление на старейшин, но ровно настолько, чтобы не быть наказанным за свою лень. В тот день, когда его нежизнь стала наихудшей, он бежал с поля боя во время трудного столкновения с [Glossary('куэй-дзин','game_concept_kuei_jin_desc')]. Подобная трусость должна была быть наказана быстрой казнью, но Белгутею повезло, поскольку понадобился «посол» для свежеиспечённых данников [Glossary('Анда','podgloss.anda')], племени лактан. Белгутея отправили служить на эту малозначимую и неблагодарную должность до дальнейших распоряжений.\nВскоре он вернулся к своим худшим привычкам и, поскольку он является представителем гораздо более могущественной силы, считает себя законным правителем племени. Сати, настоящая вампирская правительница этого сообщества, вряд ли сможет что-то сделать против него, поскольку она рискует навлечь на себя гнев [Glossary('Анда','podgloss.anda')]. Она решила надеяться, что трусость Бельгутея послужит гарантией того, что он никогда на самом деле не попытается выступить против неё."
 POD_persistentpodlore.desc.793300: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nКак и большинство его соплеменников, Беглук вырос, думая, что Сати была единственной в своём роде, бессмертной защитницей и проводником их общины. Его умение считать снискало ему расположение Сати, и он был рад работать на благо Сати (и своего племени). Всё изменилось, когда появился Бельгутей.\nЭтот высокомерный монгол вскоре доказал всем, что Сати была всего лишь бессмертной среди многих других и к тому же довольно слабой, поскольку, похоже, не желала рисковать и вступать в конфронтацию с хозяевами Бельгутея. Монгол вскоре заметил Беглука и обратил его, очевидно, в основном для того, чтобы продемонстрировать свою «власть» над Сати. Беглук был напуган в свои первые ночи в качестве вампира, особенно потому, что его сир не собирался обучать его и помогать понять его новое состояние. К счастью, Сати объяснила ему, что делать, а чего не делать, в основном для того, чтобы защитить его от племени (и наоборот).\nБеглук медленно приходит в себя после этого травмирующего события, и, хотя он страстно ненавидит Бельгутея за то, что тот сделал, он также негодует на Сати за то, что она не смогла лучше защитить их от монгола. Его негодование может подтолкнуть его к совершению критической ошибки в будущем."
 POD_persistentpodlore.desc.793301: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nВолк не должен преклонять колени. Это удел собак. А Илкер больше всего возмущён тем, что его превратили в одну из собак [Glossary('Анда','podgloss.anda')].\nРождённый в золотой век Кимекского ханства, Илкер в своей смертной жизни был охотником. И у него это получалось превосходно. В частности, он неплохо зарабатывал, охотясь на волков и медведей, выслеживая зверей и людоедов, от которых многие охотники уклонились бы, опасаясь такой угрозы. Набравшись смелости, он в конце концов нашёл довольно странного людоеда. Во время этой охоты он откусил больше, чем мог прожевать, и встретил своего будущего сира. Однако, впечатлённый тем, как он с самого начала мог охотиться на него, он решил не упускать перспективное дитя. И внутренний монстр Илкера появился на свет, выставленный на всеобщее обозрение.\nИлкер презирал свою нынешнюю форму и пытался убить своего сира из чувства стыда и унижения. Но, будучи не в состоянии поймать его ещё раз, всё, что он мог сделать, - это прийти в ярость. С помощью гулифицированных зверей он создал своё собственное владение в Кимекском ханстве, цепляясь за последние остатки гордости, которые у него были как у хана ночи. Только для того, чтобы потом воспользоваться этим, когда его загонят в угол и заставят подчиниться угрозам [Glossary('Анда','podgloss.anda')]. Илкер ждёт уязвимости, отчаянно желая отомстить, чего бы это ему ни стоило.\n\nДальнейшая судьба\nКогда могущество [Glossary('Анда','podgloss.anda')] начало слабеть, Илкер нанёс удар, стремясь получить больше власти в Квинконсе. Он присоединился к чистке [Glossary('Анда','podgloss.anda')], охотно передав их на милость [Glossary('куэй-дзин','game_concept_kuei_jin_desc')]. И за его действия его вознаградили по заслугам - проткнули колом, заперли в гробу и выбросили за борт в глубины самых глубоких океанских впадин, откуда его с тех пор никто не видел."
 POD_persistentpodlore.desc.793125: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nМавар больше, чем кто-либо другой из соратников Пияу, была рядом с ней в трудную минуту. Даже в самом начале.\nКогда-то, в своей смертной жизни, Мавар была простой домохозяйкой. Она заботилась об очаге своего мужа, растила их детей и покорно помогала им, когда они в этом нуждались. И всё же, какая-то часть её никогда не чувствовала себя по-настоящему счастливой, как будто что-то всегда ускользало от неё. Её жизнь была застойной, и она ненавидела это. И одна из её величайших ироний заключается в том, что она никогда по-настоящему не чувствовала себя живой до того дня, когда умерла, когда её муж, устав от своей стареющей жены, напал на неё, изрубил на куски и бросил в море на съедение рыбам. А в следующей жизни она оказалась в Аду Пылающих морей.\nНо Мавар чувствовала себя живой в насилии. Причинять боль и быть уязвлённой, убивать и быть убитой, сражаться и быть сражённой - этот адреналин наполнял её жизнью и рвением. Она стала настоящим хищником, прокладывая себе путь к жизни через горы трупов. Вернувшись, она сразилась с другим дьяволом в упор. Её собственной безумной ярости, вызванной выпитым адреналином, было как раз достаточно, чтобы противостоять упорству и воле её противника. И там они оба обрели рассудок и поклялись друг другу в том, что они станут кровными сёстрами.\nС тех пор Мавар всегда была на стороне Пияу.\n\nДальнейшая судьба в каноне\nМавар станет самой известной [Glossary('пенангаллан','podgloss.penangallan')] после восхождения Пияу к [Glossary('Сотне облаков','podgloss.hundredclouds')]. Она станет неофициальным голосом Золотых дворов и привлечёт к своему двору самых искусных бойцов (и гуляк). В начале 2000-х она будет очень близка к своему восхождению."
 POD_persistentpodlore.desc.793124: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nИнтан была обречена с самого начала, при большинстве обстоятельств. Родившаяся через 9 месяцев после того, как её деревню разграбили пираты, Интан была брошена в джунглях маленькой девочкой, которая ещё даже не умела говорить. Живя в этих джунглях, она изо дня в день боролась за выживание. Покинутая цивилизацией и оставшаяся одна, постоянно подвергаясь охоте и испытывая голод, она каждый день боролась за выживание.\nВсе остальные люди, с которыми она встречалась, видели в ней просто существо, покрытое коркой грязи, бродящее по лесу и поедающее всё, что попадалось под руку. Однако однажды она поймала не ту добычу, и отряд деревенских жителей начал выжигать в погоне за ней целые участки джунглей. Когда они поймали тогда ещё молодую женщину, у неё не было слов, чтобы понять, что происходит, когда они притащили её в центр деревни и подвесили к потолку, а она билась, как пойманная тигрица. Она завыла, когда они начали забрасывать её камнями, пока, наконец, она тоже не потеряла силы, и свет не погас в её глазах, прежде чем они бросили её труп обратно в джунгли.\n\nНо Интан не изменилась. Всё, что она знала, - это как выжить. Даже когда она оказалась в Аду Перевёрнутых грешников, странность этого постепенно была преодолена её чувством уверенности. И благодаря своему непоколебимому упорству она нашла выход. И она вернулась в джунгли своей юности, убивая всех и каждого на своём пути.\nПока её не нашла одна женщина, гораздо более сильная и обладающая такой же дьявольской мощью. Поняв, что она попалась, Интан подчинилась. Женщина по имени Пияу привела её в свой храм и дала Интан своё имя и язык. Это был долгий роман, но со временем Интан смогла по-настоящему влиться в мир своей приёмной матери. И, как всегда, она выживала, но теперь у неё наконец появился шанс преуспеть."
 POD_persistentpodlore.desc.793126: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nРодившаяся в маленькой деревушке на побережье, Мелати по большей части вела довольно обыденную жизнь. Работая рыбачкой и помогая своей семье, Мелати просто жила тихо и предпочитала не показываться на глаза. И, возможно, такой была бы её жизнь, если бы два дворянина с других концов её деревни не начали враждовать из-за того, кому она на самом деле принадлежит. Когда пришли солдаты, деревня попыталась просто прогнать их, но один-единственный брошенный фрукт и раздражённый стражник привели к тому, что деревня была разграблена и сожжена дотла. Мелати была среди многих людей, подвергшихся жестокости, а затем убитых солдатами, одной из многих незначительных жертв, сваленных в кучу в центре деревни и подожжённых.\n\nМелати оказалась в Яме Соли и Железа, и её последние мгновения жизни стали ужасающе повторяться. Но гнев внутри неё всё равно превратился в жестокий кинжал. Она ждала своего часа. Наконец, когда пришло время, она проложила себе путь из железных борделей и быстро сбежала обратно в мир живых, так быстро, как только могли нести её ноги. И, наконец, она снова была свободна. И когда Пияу нашла её, у неё появилась цель.\n\nМелати всё ещё очень зла. Но, в отличие от своих спутников, она терпелива. Она методична. Она - следопыт. Она на собственном опыте узнала, что такое дерзость. И она не переживёт этого снова."
 POD_persistentpodlore.desc.793127: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nБудучи дочерью зажиточного фермера, Сити родилась в условиях, сравнимых с роскошью её современных сверстниц. Но, конечно, её жизнь всё ещё была далека от желанной. Обручённая и выданная замуж за другого богатого землевладельца в возрасте 14 лет, за мужчину, который был в 3 раза старше её, она быстро обнаружила, что её утешение - это не что иное, как клетка, выкрашенная в золотой цвет. Несмотря на её интерес к управлению, каждая попытка научиться читать или обращаться с монетами наталкивалась на насилие. И однажды ночью, после нескольких лет бездетного брака, её муж просто отрубил ей голову и женился на другой. И Сити пробудилась в Городе демонов, прижатая к бандам и попавшая в круговорот насилия, ставшего метафизически реальным.\n\nСити была совершенно не на своём месте на Ланке, но, несмотря на причинённое ей зло, то, что произошло, не могло стать концом её истории. Она неохотно стала сильной, стала порочной, ища причину того, что с ней произошло. И со временем она проложила бы себе путь, используя уязвимые места в стенах преисподней, нашла бы трещину и выскользнула наружу, и в конце концов её нашла Пияу. И в её будущих начинаниях женщина, разбирающаяся в мельчайших деталях сооружений и инфраструктуры, была бы бесценна.\n\nХотя Сити теперь признаёт, что должна бороться, она наконец-то может осуществить мечты, в которых ей так долго было отказано."
 POD_persistentpodlore.desc.793128: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nУати олицетворяет собой не только две крайности, но и два лика женственности. Головорез и хранительница. Демон и защитница. Чудовище и мать. И всё это от человека, который изначально не был рождён ни для того, ни для другого.\n\nКогда-то Уати был просто маленьким мальчиком, который ненавидел своё отражение. Который ненавидел свою собственную физическую слабость. Который почитал свою мать, видя в её спокойной силе нечто удивительное, трансцендентно прекрасное, который ничего так не хотел, как быть похожим на неё. Однажды, поговорив с своей матерью, она разрешила ему примерить свои платья, и он не нашёл ничего более раскрепощающего. Однако такому счастью не суждено было сбыться в долгосрочной перспективе.\nОднажды он вышел в них на улицу, и проходящий мимо патруль увидел то, что они поначалу приняли за прекрасную молодую девушку, одиноко прогуливающуюся в одиночестве. И когда они обнаружили несоответствие своих предположений, они жестоко убили его, содрав с него кожу заживо, прежде чем оставить истекать кровью в джунглях на съедение кабанам.\n\nКогда Уати пробудилась в Аду живодёрства, её прежняя мягкость сменилась всепоглощающей яростью. Агония и мучения укрепили её решимость. Она отомстит, несмотря ни на что. Она бродила по этим бесплодным пустошам, убивая всех, кого могла найти, выкрикивая имена своих убийц, чтобы запомнить их.\nНаконец, она смогла найти пещеру, ведущую в мир живых, нашла своих убийц и съела их живьём. За ней гнались дьяволы, и она их тоже съела. Она упивалась своим гневом, гордым и властным.\nИ когда Пияу нашла её, с ней было нелегко справиться. Но Пияу всё поняла. И после некоторого раздумья она предложила Уати завести ребёнка. Нерешительно согласившись, этот младенец открыл Уати глаза так же сильно, как и её веселье. Будучи одновременно матерью и монстром, она довольна и цельна. И она более чем жаждет наконец-то стать счастливой."
 POD_persistentpodlore.desc.795048: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nЯо Вэй была одной из многих деревенских жительниц в землях Северной Юань в Китае, недалеко от Кореи. Изначально она мечтала о таких вещах, как обильный урожай, которым можно было бы наполнить стол, и надеялась на хорошую погоду, но её молитвы испортились, когда в ответ на её деревню налетели пираты. Они разграбили её дом, убив большую часть её семьи и всех, кого она знала, и забрали её в качестве одного из нескольких новых «призов».\nКогда пираты начали совершать набеги, один из них заметил, что через несколько месяцев после того, как они захватили её в плен, она уже забеременела. Пираты, не желая иметь дело с ребёнком, просто связали её так крепко, как только могли, привязали к камню и выбросили за борт.\n\nКогда Яо потеряла сознание после того, как утонула, к своему большому ужасу, она обнаружила, что находится в том же состоянии, но теперь уже в Аду Кипящих морей, постоянно тонет. Но камень, который однажды убил её странным образом, оказался её спасением, поскольку он вёл её всё дальше вниз, пока, в конце концов, она снова не очнулась без необходимости дышать под водой, но с дьявольской формой, которая легко разорвала её веревки и выплыла обратно в мир живых.\nИ когда её нашёл [Glossary('цивилизатор демонов-младенцев','podgloss.infantdevilcivilizer')], она была принята в лоно Лепестков добродетели.\n\nВесь этот опыт потряс её до глубины души. Жизнь так быстротечна, а её собственная так мала и так банально легко угасла. Она не могла допустить, чтобы это повторилось. Нет, она никогда больше не сможет быть маленькой.\nОна должна быть великолепной, блистательной, злой и слишком сильной, чтобы когда-нибудь снова утонуть. И для такой юной девушки, нет, она должна быть лучезарной. Она станет злодейкой, которую стоит помнить, которой стоит бояться. Она никогда больше не осмелится стать маленькой.\n\nДальнейшая судьба в каноне\nЭнтузиазм и усердие Яо Вэй сослужили ей хорошую службу. Её успех на пиратском поприще в конечном итоге привёл к тому, что в будущем Квинконс возвысил её, и она стала чрезвычайно успешным пиратом-нежитью. Даже несмотря на мощь британского флота, она одерживала победу за победой и стала сказочно богатой в современные ночи."
 POD_persistentpodlore.desc.795052: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nВ ночном мире Вечная война на Индийском субконтиненте - это то, что очень немногим посторонним удавалось успешно преодолеть. Несмотря на успех их смертных современников, мусульманские завоевания Индии увенчались меньшим успехом среди вампиров, подавляющее большинство из них погибло от мощи иллюзионистов Равнос или от демонических искусств Проклятых. Но можно было бы остаться в тени одного из величайших завоевателей этого региона.\n\nШуджа была дочерью Махмуда Газни, некогда правой руки государства, а затем султана Газневидов. Однако, получив всё необходимое образование для женщины её положения, Шуджа должна была стать женой другого властителя, но первые попытки Аширры пробиться на Индийский субконтинент коснулись её первой.\nОтделённая от своих родителей и братьев, но образованная и способная, она была совершенным дитя. Обращённая и воспитанная в традициях Аширры, она недолго пользовалась их поддержкой, поскольку они быстро бежали обратно на запад перед лицом могущества Равнос.\nНо Шуджа не собиралась покидать свой дом без боя. Пользуясь преимуществами своей жизни и привилегиями нежити, она отразила первое нападение Равнос на её владения и быстро возвысилась, став аширритской султаной. Несмотря на одиночество, Шуджа была упорной и непреклонной, смелой и хваткой. Она не сломалась, даже когда империя, для которой она была рождена, рухнула. Нет, она выстояла.\n\nДальнейшая судьба в каноне\nНесмотря на ярость Равнос, а позже и гнев Голодных мертвецов, Шуджа не сломалась, как многие другие будущие аширритские султаны. Хотя в конечном счёте она была изгнана из Афганистана, ей удалось отбить Бомбей, а затем и Мумбаи, у Равнос и создать и укрепить главный центр власти Аширры на Индийском субконтиненте."
 POD_persistentpodlore.desc.795055: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nГуйин - один из самых давних, стойких и преданных слуг Ван Хунбэня. Энергичный и жизнерадостный, он всегда стремится сделать для своего господина всё больше и больше. И с какой целью? Не из чувства долга. Но скорее потому, что Гуйин просто желает Вана и готов сделать всё, что в его силах, чтобы привлечь его внимание, что крайне вредит здоровью двора Жёлтого императора.\n\nГуйин был представителем одного из народов южных джунглей Китая, которые впоследствии стали бандунами. Он мало рассказывает о своей смертной жизни, за исключением того, что был растерзан тигром и остался жив, когда тот слизал мясо с его костей и, таким образом, отправил его в Ад живодёрства. А когда он сбежал, то обрёл новую, дикую любовь к жизни. И через это - к вожаку своей [Glossary('ву','podgloss.wu')], Вану.\nОн был ярым сторонником его возвышения при дворе, умело выполняя указы Бьющихся драконов. И когда Ван возглавил двор Жёлтого императора, он расставил своих сторонников на ключевые посты, в частности, поместил Гуйина на юге Китая.\n\nГуйин, однако, стал бедствием для региона. Ненасытный и алчный, он извлекает новые удовольствия и впечатления из предков, стоящих ниже его по положению, в то же время постоянно оскорбляя двор Алого феникса, принижая достоинства женщин в угоду благородству облика мужчин.\nА когда его нет рядом, он всегда что-то шепчет Гуйину, неустанно пытаясь добиться его расположения. Он враждует с остальными членами своей бывшей [Glossary('ву','podgloss.wu')] за внимание Вана, в то время как Юг разлагается и страдает от его жажды плоти, еды и денег.\n\nДальнейшая судьба в каноне\nУбийство Вана чуть не уничтожило Гуйина. Он удалился к своему двору, где в течение нескольких месяцев слышали, как он причитал и оплакивал свою потерю. Наконец, рыдания прекратились, и когда его сопровождающие заглянули к нему, его уже не было. И больше его никто не видел."
 POD_persistentpodlore.desc.795056: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nИз Маджиаюаня происходит та, кто когда-то была настоящей повелительницей смерти. Но это солнце давно зашло, а старая тигрица теперь мурлычет у ног своего императора, требуя всё больше и больше внимания не за то, чтобы просто обладать им.\n\nБай пришла с запада, при дворе Жёлтого императора, из Маджиаюаня, принадлежащего к народу Сиронг. По её свидетельству, она была человеком малоизвестным, умерла от лихорадки и попала в Ад Роящихся личинок, но ей повезло спастись, и ещё больше ей повезло попасть в [Glossary('ву','podgloss.wu')] Вана Хунбэня.\nЕё смирение и терпение, наряду с её собственными навыками обращения со смертью, очень располагали к ней, и какое-то время она была превосходной Певицей теней, и особенно среди [Glossary('ву','podgloss.wu')] было обнадеживающе, что восхождение Вана ко двору Жёлтого императора будет означать укрепление отношений между ними при дворе Белого тигра. Но, к сожалению, этому не суждено было случиться.\n\nБай была невыносимо осторожной, вялой и чрезмерно почтительной по отношению к Вану. Его собственные странности ещё более усугублялись Бай, которая хотела только того, что приказывал её сюзерен. Даже когда кочевые захватчики вторгаются ко двору, она ждёт только приказа Вана, чтобы вмешаться, всегда боится переступить черту и никогда не желает проявлять инициативу. И всё это ради того, чтобы привлечь к себе всё больше внимания своего господина.\n\nДальнейшая судьба в каноне\nУбийство Вана уничтожило Бай. Она просто сидела в своих покоях неподвижно в течение многих лет, только пила ци и просто смотрела в никуда. И после долгих лет бездействия она просто ушла в Гималаи, и больше её никто никогда не видел."
 POD_persistentpodlore.desc.795057: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nВ то время как Цзинь горит, многие в этих землях стараются не говорить о том, насколько серьёзной становится ситуация. Потому что они знают, что, поступая так, Ли без колебаний заставит всё замолчать.\n\nЛи родился среди ди, северного народа, населявшего земли непосредственно к северу от Китая. Один из первых мертвецов, попавших в [Glossary('Ад Шипастых цепей','podgloss.hellspikedchains')], после своего побега Ли, казалось, преобразился после пережитого и с готовностью воспринял китайскую культуру, активно отказываясь от той, из которой он родом.\nВидя в предводителе своей [Glossary('ву','podgloss.wu')] Ван Хунбэне образец этого, он испытывал огромное удовлетворение от того, что был его пылким, не задающим вопросов и неустанным сторонником. Собственная ненависть Ли к кочевым народам сделала дипломатические отношения с двором Чёрной черепахи... по меньшей мере, трудными, но он нашёл большое удовлетворение в том, что отправил целые воинства [Glossary('ву','podgloss.wu')] противостоять [Glossary('Анда','podgloss.anda')].\nК сожалению, он совершенно ужасен в боевых действиях, безрассудный и дерзкий силовик, поскольку война против [Glossary('Анда','podgloss.anda')] всё больше и больше оборачивается против Голодных мертвецов, он поддерживает оборону, останавливая всех нападающих своим топором.\n\nОн должен победить, потому что именно этого требует Ван. И на меньшее он не согласится.\n\nДальнейшая судьба в каноне\nУбийство Вана шокирует Ли, и сразу же, без угрозы со стороны большей части двора Жёлтого императора, стоящего за его спиной, многие северные [Glossary('ву','podgloss.wu')] открыто восстанут против его жёсткой и дерзкой тактики.\nЛи приходит в ярость и активно разыскивает их, чтобы сделать пример из [Glossary('ву','podgloss.wu')], посланных против [Glossary('Анда','podgloss.anda')], лояльных или нет. К счастью для них, Ли бесследно исчез, когда одна [Glossary('ву','podgloss.wu')], которую он выслеживал, попала в засаду, устроенную оперативной группой [Glossary('Анда','podgloss.anda')], известной как Авангард Чёрных ветров, с той встречи о нём никогда ничего не было слышно."
 POD_persistentpodlore.desc.795058: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nС одной стороны, стремление к просветлению - благородное занятие для [Glossary('куэй-дзин','game_concept_kuei_jin_desc')]. С другой стороны, редко бывает приятно наблюдать, как это делает Тигр-дьявол. Особенно тот, кто находится на побегушках у такого вспыльчивого властителя, как Ван. А Цин, конечно, не кто иная, как преданная. Она бы не хотела, чтобы её воспринимали как-то по-другому.\n\nЦин родилась на восточном побережье Китая, среди Дуньи. Родом из рыбацкой общины, она была в какой-то момент убита, как она сама это описывает, ужасающим человеком, который вынырнул из глубин, преследуемый по пятам акулами, выпив всю кровь из её вен и оставив её мумифицированную оболочку под волнами. И когда её душа оказывалась в Аду Кипящих морей, она спасалась не хитростью, а тем, что схватила ближайшего дьявола, содрала с него шкуру и использовала его кости как проводник к спасению.\nЕё рьяная жестокость обеспечила ей достойное место среди Тигров-дьяволов, где было особенно отмечено, что у неё была довольно ужасающая жажда власти. И с этой целью она обычно всегда готова слушать Вана, чтобы добиться большего.\n\nЦин никогда не чувствовала себя более жизнерадостной, наказывая грешников, доводя их до новых и ужасающих крайностей, от которых даже другие старейшины Тигров-дьяволов замолкают перед её произведениями искусства. И она не отличается разборчивостью, поскольку часто спрашивает Вана, есть ли «грешники», которых нужно наказать. И хотя многие говорят о том, что она строит козни за его спиной, она, похоже, в какой-то степени довольна тем, что ей отдали всех пленников Вана, независимо от их добродетели.\n\nДальнейшая судьба в каноне\nКогда Ван был убит, большинство взоров переключилось на Цин. Она пытается сохранить свою власть в качестве назначенной им правительницы Восточного двора Жёлтого императора, но в конце концов её изгнали, и она попытается бежать на юг к тем, кого считала единомышленниками. Однако, по словам её сопровождающих, в последний раз, когда её видели, она упала за борт и ушла под воду, крича что-то вроде «только не он, пожалуйста, нет, кто угодно, только не он!», и больше её никто не видел."
 POD_persistentpodlore.desc.793302: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nКогда Аширра прибыла вслед за смертными торговцами и имамами, первоначальные надежды на земли Индокитая и острова Южно-Китайского моря были для многих аширритов чрезмерно амбициозными и обречёнными на провал. Смелость и решительность были встречены яростным сопротивлением со стороны обитателей его ночей, поскольку бледные повелители зверей и призраков, зверинец голодных мертвецов, выходящий из глубин и крадущийся глубоко под волнами, подавляющее большинство аширритов, отправленных в этот регион, встретили окончательную смерть.\n\nДо сих пор Хафиз шёл по натянутому канату смертоносной политики к большому успеху, не превращаясь в мясной паштет.\n\nХафиз при жизни был торговцем, и профессия ему очень нравилась. Но когда он путешествовал по новым торговым путям в Аравийском море, один индийский купец нанял его. И когда он отправился в путь, почти всё, что могло пойти не так, пошло не так. Сбившиеся с курса паруса, сбои в навигации, штормы, странно враждебные животные, которые, казалось, жаждали крови, и обычные пираты - добраться до порта было тяжёлым испытанием, которое едва не убило Хафиза. Но он справился, и партнёр был впечатлён. И за своё упорство он был вознаграждён Объятиями и узнал о своей истинной цели.\nЧтобы привести Аширру в новые земли, чтобы распространить слово там, где многие другие потерпели неудачу. Выжив, его сир Шуджа был уверен, что сможет добиться успеха там, где потерпели неудачу многие. И, не видя другого выбора, он снова отправился в плавание.\n\nДальнейшая судьба\nХафизу удалось добиться успеха там, где погибло так много других. Тщательно управляя своими отношениями с местными сородичами и стараясь не раздражать Золотые дворы, ему было разрешено распространять влияние Аширры в регионе. По сей день он правит как султан-аширрит, даже находясь в тени Золотых дворов, что, честно говоря, является именно тем местом, где хотят быть Ласомбра."
 POD_persistentpodlore.desc.795059: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nВ то время как упадок двора Алого феникса позволил многим инферналистам, еретикам и прочему отродью нечисти пустить корни в ночи Южно-Китайского моря, есть один ужас, который скрывается в этих глубинах с незапамятных времён, такой же древний, как древнейшие из [Concept('akuma', 'акума')|E], и среди них самые ужасные.\nДаже при самых отдалённых дворах Чёрной черепахи ходят слухи об Осквернённом, обладающем поистине ужасной силой, который может бросить вызов [Glossary('повелителям Яма','podgloss.yamaking')]. Грозный Завоеватель, Всепробуждённый, но обладающий ужасным прозрением, которое поставит мир на колени. Просто и красноречиво названный Зверем, Пожиратель пламени более чем заслуживает этого титула.\n\nПроисхождение Пожирателя пламени неизвестно, но считается, что он в некотором роде был учеником Маханаги, одного из первых, кто прошёл по пути Тысячи криков. Вечный обуглившийся след на её теле заставляет некоторых думать, что она из Ада Кипящего масла, но это всего лишь предположение, поскольку никто не спрашивал её об этом и не выжил. Известно лишь, что у неё поистине ненасытный аппетит ко всему, и она ищет самую опасную добычу. Другие [Glossary('куэй-дзин','game_concept_kuei_jin_desc')], редкие вампиры, [Glossary('фера', 'glossary_fera_tt')], маги, духи, дьяволы и бесчисленное множество других существ, которые, хотя и способны пить ци из окружающей среды, предпочитают сочную сладость из свежей плоти.\nОна заработала прозвище на том, что её тезка съела предка Тигра-дьявола, которого она медленно разрывала на части в агонии, пока он пытался сжечь её с помощью божественного тела Огня, и всё, что, казалось, требовалось, - это приготовить для неё еду. Она снова нарушила свой покой, создав культ огня и армию пиратов-грабителей.\nИ всё это ради её извращённого, порочного просветления. Будь то мясо для её стола, тёплые тела для её удовольствия, восхитительные крики её жертв или сотня других вещей, она исторгнет из них тысячи криков.\n\nДальнейшая судьба в каноне\nНесмотря на устрашающую мощь монстра, численное превосходство позволило остаткам двора Алого феникса сокрушить его.\nНо они не смогли убить её, поэтому вместо этого закопали глубоко под землю, где она и находится по сей день. Но, к сожалению, Гонконг невольно возвышается над её тюрьмой, где жизненная сила города начинает просачиваться в её тайную тюрьму, где она снова начинает мечтать о таких прелестях, как огонь и убийства, пробуждаясь по мере приближения Шестой эпохи."
 POD_persistentpodlore.desc.795061: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nИногда, несмотря на то, что они делают что-то, что на бумаге всегда казалось бы правильным, обстоятельства могут привести их к большим неприятностям.\n\nТитква была одной из таких учениц достопочтенной Пияу, ревностной и яркой последовательницей её пути. Встретив свою смерть от рук человека, пришедшего с моря и цивилизованная после своего побега из Ада Пылающих морей, Титква приняла философию освобождения Пияу, упиваясь ею с таким рвением и постоянством, что это бросало вызов даже некоторым из её любимых учеников.\nОднако Титква, возможно, была слишком усердна, во многом в ущерб политическим реалиям, в которых оказались Кровавые цветы. Титква, сама того не желая, часто охотилась на призраков и убивала их, невзирая на их прошлые жизни, чтобы упокоить их и защитить мир от присутствия смерти. Даже те, кто находится под покровительством Пияу, включая довольно странную коллекцию «призраков» в Индонезии.\nОдин из них, которого она попыталась сразить, оказался гораздо более способным, чем она предполагала, избив её на волосок от смерти с помощью мощной некромантии, абсолютного командования зверями и уклонения от нее на каждом шагу. Разъяренная дипломатическим инцидентом, Пияу отправила Титкву на север, чтобы проявить себя и сразить ужасное чудовище - Пожирателя пламени. Титква, взбешенная тем, что Пияу пощадила призраков, решила проявить себя в этом начинании, а затем, в случае успеха, подать прошение об уничтожении призрака.\n\nДальнейшая судьба в каноне\nТитква добилась частичного успеха. Используя контакты других предков и отрицая культ Пожирателя пламени, она смогла победить Пожирателя пламени, но не убить его. Но к тому времени, когда она это сделала, Пияу уже переключилась на духовные проблемы, и Мавар не собиралась мириться со взрывным характером Титквы.\nОбиженная и разгневанная, она незаметно обратилась к жертвоприношениям Железной королеве, желая быть первой, кому удастся заманить ее в ловушку, в то же время намеренно сопротивляясь, чтобы досадить Золотым дворам, позволяя другим Кровопийцам, которые, по ее мнению, могли бы позже разрушить Золотые дворы. Вся эта череда глупых поступков привела к её окончательной гибели в 1913 году, когда она оказалась запертой в горящем здании, подожженном её преемником на посту предка Гонконга Ангуо Чуном."
 POD_persistentpodlore.desc.795101: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nFor the most part, the Order of the Bitter Ashes has seen the threat that the [Glossary('Anda','podgloss.anda')] and, by and large, the Mongol Empire pose, and for the most part, have little ability (or quite frankly, desire) to act against them until they begin to actively threaten the holdings of the Order. However, one knight has taken it upon himself the uncover the true extent and nature of the Mongolian Shadow over the world.\n\nTancred is a knight of rather meek blood, that despite his diligence and bravery, has not gone far in most Cainite Military Orders since his embrace due to his origin among not the nobility, but of the common folk. Among the Toreador of the Courts of Love, he felt truly out of place, and the gnawing coldness of the Beast perturbed him greatly.\nHis own sire a monstrous flesh shaper amongst artists, he eventually forsook the decadence of his homeland's world of night. And among the Grail Knights, he took to them with a determined tenacity that impressed many, even to the extent that he volunteered to investigate the Mongolian Empire first hand, and judge what kind of response the [Glossary('Anda','podgloss.anda')] would need. Some among the Order suspect that his pride is the main force acting rather than duty, but time will tell what becomes of Tancred's Expedition.\n\nДальнейшая судьба\nTancred's intentions would later prove to be... less than noble. Tancred's goals would become less scouting force and more 'conquer and defeat the [Glossary('Anda','podgloss.anda')] on his lonesome for the sake of his own pride'.\nHe would eventually lose the blessings of the Grail, and respond to it by turning to infernalism, disappearing within Russia. The Order would disavow Tancred, and scrub him from their histories."
 POD_persistentpodlore.desc.795102: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nIn 1229, the Court of the Black Tortoise, the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] institution that oversaw the northern reaches of the world was thrown into a bit of confusion, as a woman with little resemblance to the man who set into motion the conquest of the world came before the Ancestors of the Court and made a truly bold claim. That she was once he, the Oceanic Lord, Genghis Khan once Temujin.\nThey claimed that on his funeral pyre her body was destroyed, and in their escape from Hell they were forced to take a new body and a new name. And so he had moved on from one breath into the next.\n\nDespite the absurdity of the claim, the Ancestor of the Court that Tömörbaatar presented themself too has not chosen to truly verify their claims, and thus instead had Tömörbaatar continue along with the standard initiation rituals that is considered standard. Tömörbaatar rankles against this, feeling snubbed and denied what should be their proper place.\nBut their boldness has always known little bounds, in some shape or another. And they long for an empire as great as one they held in life, at least so they believe.\n\nДальнейшая судьба в каноне\nUnfortunately for Tömörbaatar's story, among the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] was Bortai the Fair, one of Genghis Khan's consorts. Publicly shaming Tömörbaatar for the farce of posing as the Khan of Khans and credibly shredding Tömörbaatar of their title, Tömörbaatar was quietly moved to the front against the [Glossary('Anda','podgloss.anda')], where she disappears utterly from the record.\nBut they would establish a tradition among many newly dead who would claim to be Temujin returned. While the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] would be more thorough for future claimants, it would be hard to forget the first one to do so."
 POD_persistentpodlore.desc.793303: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nLong, long ago, there was a Jōmon scholar and a Jōmon witch. Both seekers of wisdom at heart, the Scholar went to schools of magic and steel, while the the witch went afar seeking rumors of creatures in the night. The witch traveled far at the behest of the scholar, finally reaching a terrible figure of roiling flesh and veracious terror.\nThe witch however came seeking not conflict, but an exchange of power. She professed loyalty to the flesh shaping demon, and requested they embrace her. The flesh shaper, wanting to see what would happen to a mage transformed by their curse, readily did so. And then, as the witch was slain and tasted the monster's blood, the scholar's magic whisked her away back to their shared home. And when she returned, she found the scholar was no longer a mere mage, but a king of devils.\nShe gave herself back to her true master, as both laughed beneath the stars out of pride for their ambition. And so Kagaseo became the first [Concept('akuma', 'акума')|E] of the one who would become [Glossary('Yama King','podgloss.yamaking')] [Glossary('Mikaboshi','podgloss.mikaboshi')].\n\nSince then, Kagaseo has been setting plans into motions for millenia. Carefully waiting, she selected three mortals to take into her own embrace, and have them kneel before [Glossary('Mikaboshi','podgloss.mikaboshi')]. Her Great Clan was a tool of her lord, and to that end she would shape her lineage to act where her master cannot. She has received ample rewards for her enduring loyalty, including the forbidden knowledge allowing her to grow closer to Caine.\nAnd now, as the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] Azure Dragon Court recedes from Japan and the next Age draws near, she begins to galvanize her lineage in their adherence to her master. She aims to remake Japan in her master's image, and be the one to crown him the [Glossary('Demon Emperor','podgloss.demonemperor')]."
 POD_persistentpodlore.desc.793304: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMiyako saw her world end.\n\nMiyako was one among many of the myriad peoples who lived in Japan, before the rise of the Yamato rule. But as a girl, she had seen them begun to march into her land. Her own lord claimed to be a descendant of Susanno-o, and led her people against the Yamato.\nThey lost, horribly.\nMany of the soldiers under her lord were put to the sword, and the enemy soldiers began to trample through their lands. So Miyako, just a village girl, prayed and prayed for deliverance, for power, for the strength to resist. But not a single god answered. And the night her village was burnt, some soldiers turned to her.\nThey laughed as they pressed her face into hot coals, but then, in a blur, they were silenced. All she looked up and saw was a storm, lightning in his eyes.\nShe was dying, her face beginning to char off her face in chunks. She begged him to help. So he leaned down, and opened his mouth. And the next night, Miyako woke up, her skin cold, her heart still, and a furious rage in her chest.\n\nHer savior was nowhere to be found. But on that day, she swore an oath. The rage that now howled and shook inside of her would be turned tempered and turn into a furious blade. She would be the honorable blade in the dark that others like her had once lacked. The first of the Bushi Cainites, the Childer of the Storm.\n\nSince that night, Miyako wandered Japan alone, a phantom in the night striking down abusive lords and killing soldiers that would strike at the conquered. In time she would discover that a byzantine system of courts ruled the night, and she vowed that their tolerance of the evils of the day would be punished in blood.\nShe would center herself in Amakusa, where other outcasts of the night would flock to her cause.\nHer childer would be picked to stand with her in their zeal, steadfast and a fire against tyranny burning in their breast. And now, as her Blood Tribe stands strong as the Courts wane, she will have her reckoning."
 POD_persistentpodlore.desc.793305: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe Seventh Son of Emperor Kanmu and Court Lady Ki no Wakako, Asuka was never going to inherit the throne. However, he was still afforded the comprehensive and extensive education of the imperial palace, and grew into a capable and competent young man, a powerful voice at court who could spin many a tale and tell a hundred more.\nIt was here that he caught the attention of of an enigmatic figure who called himself Hiruko. When Hiruko met Asuka in the night, he asked to tell him a tale. Asuka obliged, and spun him a story so immaculate and enrapturing that Hiruko sat there all through the night.\nHowever, as morning dawned, Hiruko begged Asuka hide him in his room, away from sunlight. A noble sort, Asuka obliged. And when night fell again, so impressed by Asuka's honor, that Hiruko 'shared' with him his gift before he departed, and ordained that while Asuka would never rule Japan like his brothers in the day, he could rule it in the night. All he had to do was wrest it from the hands of foreign interlopers.\n\nAsuka soon found that the world around him was filled with other things that stalked the night, but uniquely he held the power to make his stories real. Perception, Illusion, even the very Soul could all be shaped by Blood. And it would be a wonderful tale, were the Seventh Son of an Emperor to claim a birthright he could never have and become an Emperor in his own right.\nSo, he began to spread his reach, and play his cards. A smiling face in the shadows, with ambitions of a throne and the world he sought to make. All he would need is allies.\n\nOr so the story goes, as Asuka tells it. And it is a mighty fine story."
 POD_persistentpodlore.desc.793306: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe founders of the Ika and Koga are tied, just as much in life as they are in death. Yasu and Yū are identical twin brothers, and originally competing heirs to a minor clan whose name has been lost to history. Where Yasu was cunning, Yū was brash. However, both brothers would come to violently resist the introduction of the Taihō Code, an initiative by Prince Osakabe to try and make Japan more Confucian.\n\nBoth brothers violently resisted what they saw as foreign influence. Both were captured and designated for death, but the intervention of strange beasts delivered them to safety. Kagaseo offered them a similar deal - violently tear out the influences in Japan from foreign shadows and serve her, and be rewarded by her and her master with life everlasting. Both brothers accepted.\n\nEarly in his unlife, Yū began to use eternity hone his skill as a weaponmaster. Unlike his more subtle brother, he found a great deal of fulfillment as [Glossary('Mikaboshi','podgloss.mikaboshi')]'s sword. Placed in the more present roles of the Great Clan's ambitions, Yū swiftly became feared by the few [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] who knew of the Great Clan [Concept('akuma', 'акума')|E].\nHowever, his growing frustrations with his brother and the other childer of Kagaseo, Michiko, led to rifts beginning to grow within the Great Clan. While he knows that acting against them when Kagaseo is around is functional suicide, he longs for the chance to strike at Michiko for her pretension and at his brother for his shadow loving cowardice.\n\nAnd perhaps soon, that time may finally present itself..."
 POD_persistentpodlore.desc.793307: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe founders of the Ika and Koga are tied, just as much in life as they are in death. Yasu and Yū are identical twin brothers, and originally competing heirs to a minor clan whose name has been lost to history. Where Yasu was cunning, Yū was brash. However, both brothers would come to violently resist the introduction of the Taihō Code, an initiative by Prince Osakabe to try and make Japan more Confucian.\n\nBoth brothers violently resisted what they say as foreign influence. Both were captured and designated for death, but the intervention of strange beasts delivered them to safety. Kagaseo offered them a similar deal - violently tear out the influences in Japan from foreign shadows and serve her, and be rewarded by her and her master with life everlasting. Both brothers accepted.\n\nEarly in his unlife, Yasu excelled as [Glossary('Mikaboshi','podgloss.mikaboshi')]'s assassin. A phantom, he struck at any loose ends that began to become aware of the Great Clan's true nature, and was by and far the most competent user of fleshcrafting among Kagaseo's childer. And for that, he and his lineage were feared as a horror that goes bump in the night.\n\nHowever, the sneers from Michiko and brashness of his brother aggravate him immensely. He is not stupid though, and knows that Kagaseo is watching them. So, he instead bides his time and waits. Quite eagerly for the moment that, when the monster is away, the assassin will play."
 POD_persistentpodlore.desc.793387: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMichiko of the Soga Clan, founder of the [GetTrait('chibo').GetName(GetNullCharacter)], was a daughter of Soga no Emishi. Alive to see the fall of her clan firsthand in the Isshi incident, she would have disappeared into obscurity along with her family, had she not, as she was fleeing the Isshi Incident, run into a silver haired woman with bloody eyes in the night. The woman was [GetScriptedCharacterByHistoryID('793303').GetFirstName].\n\nKagaseo offered her a choice. Die in obscurity like she was doomed to, or finish the work of her family, and work to uproot the traditions of Japan in the shadows. Michiko, angry and spiteful, accepted. Kagaseo embraced her, and bade her to create a line of progeny all her own. Michiko would then found the Chibo of the Great Clan from her line.\n\nMichiko takes her role as the eldest of the Great Clan after Kagaseo deeply seriously. She is a master of Hoshi No Ryōiki, second only to Kagaseo, and her childer carry on its practice.\nAn intense presence on the clan, Michiko accepts nothing less than perfection. And it is for that reason she cannot fathom why Kagaseo would embrace [GetScriptedCharacterByHistoryID('793307').GetFirstName] and [GetScriptedCharacterByHistoryID('793306').GetFirstName]. As far as Michiko is concerned, she is all that Kagaseo needed, and Yasu's untrustworthiness and Yū's headstrong zeal is dangerous when they need to stay hidden and not break from the path.\nBut she knows her sire will not listen to her when she begs for their death, so she instead waits and continues guiding her sages. Because she knows, in due time, Yasu and Yū's time will come."
 POD_persistentpodlore.desc.793334: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nСреди зверинца ужасов, который используют культы сородичей [Glossary('Микабоши','podgloss.mikaboshi')], одна отвратительная казнь остаётся самой страшной как для перебежчиков, так и для врагов клана. Акт, когда берут двух существ, калечат их, разрывают на части и превращают в нового измученного монстра. В залах Цитадели чудищ чужеземка, владеющая этими искусствами, отстранённая от самоубийственной миссии и получившая новую цель, трудится в блаженном неведении ради созидания.\n\nХанна родом из Нортумбрии, из деревни Слаггифорд. Изначально Ханна была призвана присматривать за капеллой, но была в некотором роде глупой, поэтому вместо того, чтобы просто уничтожить ее, [Glossary('клан','game_concept_Clan_desc')] #TOOLTIP:GAME_TRAIT,tremere,[GetNullCharacter] #L Тремер#!#! предложил ей отправиться в одну из многочисленных экспедиций на Восток. В отличие от других, которых сопровождали #TOOLTIP:GAME_TRAIT,gargoyle,[GetNullCharacter] #L гаргульи#!#!, Ханна была послана одна. Несмотря на то, что это была почти самоубийственная миссия, ей всё же удалось добраться до Китая благодаря чистой случайности, прежде чем она попала в плен во время вторжения дьявола. Но тогда вдохновительница вторжения, [GetScriptedCharacterByHistoryID('793303').GetFirstName], увидела возможность. Кагасё видела другие экспедиции и возжелала их гаргулий. Поэтому вместо этого она предложила Ханне служить ей и Микабоши, и Микабоши поведал Ханне о своём увлечении. Ханна, не до конца понимая, что это за собой влечёт, согласилась без колебаний, готовая и взволнованная. Её привезли в Японию вместе с Кагасё, где она немедленно подвергла испытанию свои дьявольские знания, создав несколько совершенно новых каст гаргулий из местных кровопийц Восточной Азии. #TOOLTIP:STATIC_MODIFIER,POD_gargoyle_caste_bingmayong_modifier #P;L Бинмайон#!#!, #TOOLTIP:STATIC_MODIFIER,POD_gargoyle_caste_kintsugi_modifier #P;L кинцуги#!#!, #TOOLTIP:STATIC_MODIFIER,POD_gargoyle_caste_rogata_modifier #P;L рогата#!#! и #TOOLTIP:STATIC_MODIFIER,POD_gargoyle_caste_totai_modifier #P;L тотай#!#! были её творениями и должны были стать стандартными гаргульями, которых сформировала её родословная. Так была построена новая пирамида под дьявольским Королём звёзд.\n\nДальнейшая судьба:\nПоложение Ханны в культе Микабоши было её спасительной милостью. Всегда окружённая многочисленными гаргульями и в безопасном отдалении от основного клана Тремер, её родословная процветала среди [GetTrait('chibo').GetName(GetNullCharacter)], [GetTrait('monomi').GetName(GetNullCharacter)] и [GetTrait('kishu').GetName(GetNullCharacter)] как маги и трансцендентные ваятели плоти. Однако наступают современные ночи, когда основная масса тремеров начинает осознавать, насколько большой ошибкой было отправить её на Восток, и, возможно, пройдёт совсем немного времени, прежде чем тремеры решат свести концы с концами и помешать Ханне разрушить пакты и союзы, о существовании которых она даже не подозревала."
 POD_persistentpodlore.desc.793309: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nNgải has always stalked the South China Sea.\nHis mortal life is largely a mystery to his lineage. He is one of the oldest [Concept('cainites', 'каиниты')|E] in East Asia, and his own sire is equally mysterious. He speaks of her as she rose from the sand as he was fishing in the night, and pulled him beneath the waves. When Ngải returned to shore, he descended upon his fellow fishermen in a crazed bloodlust, and drained them dry.\nHe disappeared back into the ocean, stalking the seas as a scourge in the night. However, on occasion, he would lurk near the shore. He always felt a special affinity with fishermen, and watched a few. On a hunch, he drained one underwater, bit open his own wrist, and let the corpse drink it. When it stirred and became like him, he understood.\nHe embraced several more, as he began to direct them across the seas. The sharks in these waters stalked his favorite people, and he would not tolerate it.\nHis line would stalk the shores, and return to the waves to fight these monstrous man sharks. And so Ngải founded the [GetTrait('anh').GetName(GetNullCharacter)] Bloodline of [GetTrait('gangrel').GetName(GetNullCharacter)], a lineage of Mariners that stalk the South China sea and make war against the Same-Bito."
 POD_persistentpodlore.desc.793310: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nNaja was told she was a lord. Even if in life she never felt the part.\n\nNaja was the daughter of a minor Khitan Chieftain under a name now lost to time, originally born in the western reaches of where her people dwell. One night, her clan was attacked, their holdings sacked in the night. She took her horse and rode hard in flight, but as she passed through the wilderness, one night she finally collapsed of exhaustion in her flight.\nA strange woman of red hair and pale complexion took her, and embraced her. She educated Naja on what she was, the history of their kind. This explorer then invested in her own destiny, a fierce wanderlust that then gripped Naja.\nNaja then skulked in the shadows of influential Khitans, urging them to ascend and become kings. But when the Liao Dynasty rose, as she traveled, she resolved she would build something for herself. Quietly directing the construction of a stronghold in the Hamgyong Mountains, there she would choose folk of a mindset such as herself, and surround themselves.\nHere her lineage would thrive, sequestered and the architects of their own path. And here she would take a name from the tongue of the locals, Naja.\n\nCome these modern nights, Naja greatly worries about the portents on the wind regarding the [Glossary('Anda','podgloss.anda')]. She had begun to consolidate further, calling her lineage to take a firm grip on the mountains. She contemplates if now is the time to end their isolation, and become kings not through conquest, but diplomacy, and throw the [Glossary('Anda','podgloss.anda')] back."
 POD_persistentpodlore.desc.793311: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIndah is a phantom, but all that dwells in the night around her knows her work.\n\nIndah was once just the pretty daughter of an Indonesian farmer, notable only for being quite beautiful in her village. One evening though, she found a shrouded woman fleeing from something in the night. When the thing asked her where the woman went, Indah lied, suspecting they may mean her harm. But when she turned around, the obscured figure thanked her, but then apologized that it was so hungry.\nShe was overwhelmed, and she died there. But for helping her, the mysterious woman gifted her blood. And Indah rose from death, as her body twisted in agony. Her entire body became translucent, as if she were a physical ghost, as well as a craving for blood and revulsion of the sun.\n\nIndah was cursed to stalk Indonesia, but she did so as a phantom. Always weak, she relied not on strength, but on disappearance and animals.\nThe dead were also her friends, seeing kinship in her. And when she drank too deeply and panicked, she learned she could make others like herself, with the same gifts and curses. They became the [GetTrait('kuntilanak').GetName(GetNullCharacter)], the $POD_splat_vampire_plural$ of Indonesia, the White Men and Women in the hills, where they commune with the dead and beasts in secret."
 POD_persistentpodlore.desc.793174: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nA trapped goddess, the bastard daughter of sages, a dragon in mortal form, Ahn has claimed to be all these things and more, but the truth of such matters eludes even herself.\n\nAhn has no memory of her mortality. All she knows is her memories only go as far back as the Thousand Hells. She remembers waking up in the depths of the Hell of Boiling Oil, a chain around her neck as her soul was cooked over and over again in human fat. Every scream filled her lungs with boiling oil, every tear cooked her flesh, and every spasm deprived her undying muscles of the oxygen they craved.\nBut she thrashed, oh how she thrashed. In her spasms and agony throes the water churned several relics to her. And finally, in the haze of the hells, she finally broke her chains with a single black scale, and swam as hard as she could to the surface, breaching it with a burning feather in hand, that whisked her back to the world of the living, and into the world of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\n\nAhn has been meditating on her two relics since her escape deeply and intensely. She knows not where she found this black scale or burning feather, but she is convinced they are gifts from the Ebon Dragon and Scarlet Phoenix. Why she has them and no one else does eludes her, but she feels a great sense of duty from this gift.\nShe will find the truth of herself, for all her tall tales may pale before what she actually is.\n\nДальнейшая судьба в каноне\nShe will become something of a legend among Korean supernaturals, her eagerness to share her many adventures (though most are doubtful of the truth behind said tales) and her strict neutrality in politics will make her the most favored peaceful meeting grounds of the region.\nSome will still be convinced that she holds the key to a great mystery that perhaps she chose to forget."
 POD_persistentpodlore.desc.793153: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nWhere there is great power, one would hope there is great wisdom. And while Xiao may claim to have both, both claims are easier said than proven.\n\nOriginally a minor magistrate who hoarded wealth in his mortal life on such a scale he accidentally caused a famine, Xiao had seen the end of his first life when the peasants stormed his manor and force fed him to death on his hoarded raw grain, thusly sending him hurtling into the Hell of Boiling Oil. How he escaped is unknown, however he was educated quite well in the Yellow Emperor Courts.\nAn eager student who became obsessed with austerity and reservation, Xiao was seen as model paragon of piety. So, when the former Ancestor of the Azure Dragon Courts had left for the [Glossary('Hundred Clouds','podgloss.hundredclouds')], the Yellow Emperor Court had petitioned heavily for Xiao to take the reigns.\nDespite the protest of the local [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], threats of conflict largely brought them into line as Xiao took court.\n\nHowever, Xiao's trauma from the Hell of Boiling Oil doomed his reign from the start. Dismantling his authority and oversight over the Courts of the Azure Dragon and his lack of direct action in mitigating the damage the Genpei Wars had on the Court's ancestors, the Azure Dragon Court has entered an unfortunately predictable downward spiral.\n\nFuture Fate\n\n Xiao wouldn't change. A last ditch effort to bring Japan's disobedient Ancestors in line would fail miserably and he would eventually be ousted by his remaining vassals from his holdings, and would disappear into obscurity, only his edicts of decentralization and his name remembered."    
 POD_persistentpodlore.desc.795103: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nIt is said the road to hell is paved in good intentions, a truth that Ru understands on a deeply personal level.\n\nAn attendant of the early Han in life, Ru grew up into a servant role within the Imperial Court, going day to day the same without any change for most of his life. But one day, a foreign delegation from another nation claiming to be an empire arrived, with a fleet of gifts, soldiers, and attendants of their own. One of the slaves of these foreigners, a man named Lucien however caught Ru's attention, as Ru likewise caught his.\nHowever, the impeding scandal of a slave and palace attendant was something neither empire wished to have, so Lucien was crucified and Ru was buried alive. Ru, in the terror of his death, would awaken in the Hells of Being Skinned Alive.\nHe tore through its wastes in a crazed delirium, seeking the touch of his beloved. However, when he found his way into the Hell of Upside Down Sinners, he found his beloved in the palace of [Glossary('Tou Mu','podgloss.toumu')].\nSeeing an interesting opportunity, it is said that Ru was forced to contend with some kind of impossible choice\n\nWhen Ru returned to the mortal world, he was able to reclaim his sanity by force of will. He would go onto found the Jade Court, where he became renowned for his ferocious zeal in tormenting sinners and incredibly diligence in collecting texts and literature.\nBut in spite of it all, strange rumors surround Ru, and his readings. Some Ancestors have even claimed that perhaps he went to far in his encounter with [Glossary('Tou Mu','podgloss.toumu')], but few dare voice that.\nFuture fate in Canon\nQiang's being revealed as an [akuma|E] would be what many consider to be the turn to the Fifth Age. By the time Piyau Piyung tore her way through the southern courts to battle Qiang Ru in Changan, it will be discovered that the vast majority of the Jade Court had already fallen to corruption, horrifying the other [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] to their core."    
 POD_persistentpodlore.desc.793336: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMany of the Dhampyr across the Nusantara speak in hushed whispers of a terror that stalks the jungles, hunting them specifically. A [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] infernalist of the Hell of Burrowing Maggots who had developed a particularly virulent taste for the children of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. And Bachtiar would personally have his reputation no other way.\n\nIn life, Bachtiar was his village's healer, the primary backbone of their health in safety. However, while his mentor was teaching him, Bachtiar was instead fooling around with the younger girls of his home, paying no mind to his studies.\nHowever, when the time came for him to get to work, he put his limited experience to work not to heal, but give the illusion of relief. Using oils pressed from snakes, random herbs, and well known alleviators of pain, many would die under his care, but not until they left it.\nHis due would come though, as he would later die a lonely and horrible death from Lover's Pox. And he would be rightly sent to the Hell of Burrowing Maggots.\n\nBachtiar was weak. He would escape, but largely through begging and quack medicine. And when Rangda would eventually recapture him, rather than either attempt to fight his way out or flee, he instead begged her to spare him and offering her anything in return.\nShe took the opportunity to gain another [akuma|E], and sent him back out, where he immediately began over indulging himself again. He would find his favorite targets would be Dhampyr, specifically the younger ones, both to slake his lust and his hunger.\nAt his throne is littered the bones of countless devoured Dhampyr, while he gorges himself on their essence after death, deliriously content in his power."    
 POD_persistentpodlore.desc.793337: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWithin the Indonesian Jungles, there is a shaman preaching a radically divergent doctrine. He speaks of an enigmatic god who will show them all the path to salvation by giving themselves over to the those who willingly failed so as to enlighten the world on earth.\nMany die in ritual suicides, feeding their prophet. And it is in that power base one would find the [akuma|E] named Cahaya.\n\nCahaya was always a man of faith, in both life and death. Originally a follower of traditional Javanese religion, his wild spirituality however burned with an intense fury. He found the presence of outside religions to be a threat, so from the age of 14, he began seeking out foreign holy men, and killing them in the wilderness in acts of spiritual cleansing violence, as he saw it.\nHis zeal was off-putting though, as many found the man utterly insane, even among his family. So he had to kill them too so they would not stop him in his seeking of revelations.\nEventually though, the problem would fix itself, as in a test of his faith he mediated in the hills for a week, where he finally met his end after being devoured by a crocodile.\n\nBut his death only emboldened him. In the Hell of Upside-Down Sinners, Cahaya embraced it, professing himself to the god that ruled it, unaware or simply not caring. Through embracing it, he accidentally escaped the Hell.\nHe naturally interpreted it as being a prophet of the master of the Hell, and began preaching once more, and killing again."    
 POD_persistentpodlore.desc.793339: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThey say money is the root of all evil. Harta is one of many to prove such an assertion.\n\nIn life, Harta was a merchant, and an unrepentant miserly one. Every worker had to be worked to the bone, every deal had to be gouged, every poor farmer had to be extorted, and every bribe doled out to the authorities in order to continue. Choosing mainly to ply his trade in foodstuffs and using hired muscle to extort the farmers, Harta became fantastically wealthy.\n\nAnd in spite of all of his wealth, it did nothing for him when he was ran through with a spear in an alleyway and thrown into a river, where he died vacating his bowls face down in sewage.\n\nHarta however applied all his arts as he went spiraling into Hell. While it took awhile, he was eventually able to steal enough to bribe his way out. He realized though that he would have nothing, and such a state of existence was worse than death. So instead, he went to the Unnamable Lord of the Hell of Boiling Oil, requesting power in return for being an agent of hers.\nWhen he returned with infernal investiture, he immediately put his pact obtained resources to use. He swiftly cornered several local markets, and then made sure the man who killed him was found, his entire family killed, him being forced into poverty, and then skinned alive. His revenge fulfilled, Harta returns to what has always been what he sees as the highest purpose in life.\n\nMaking more money, as much as possible, no matter the cost."    
 POD_persistentpodlore.desc.793340: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMany would say that power can be expressed in ways beyond just control. Intrigue, Influence, Coin, Religion, are countless means to control people. Purnama finds that all a farce. The only power is strength, pure and simple. And she wants to rule, and she has the power to do so, so if someone wants to stop her, they just need to kill her.\nSurely the mortals she has conquered would be happy with this, right?\n\nPurnama's mortal life has been rendered a haze in the process of her death. To the best of her knowledge, she was always a seeker of power, until men who could not handle her unjustly killed her with a clean decapitation. Within Lanka, she saw Ravana's pure expression of power, and in that moment understood the way of the world. She made a series of pacts to many [Glossary('Yama Kings','podgloss.yamaking')], seeking to keep her own soul free, for the day she can claim a Hell of her own, and then her ordained place as the [Glossary('Demon Emperor','podgloss.demonemperor')].\nTo this end, she used her new power as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] to abduct numerous men, and once she had a son, she dealt away with all of them, and would use only which she created to obtain power. And to that end, she would ensure her children are cowed into line.\nIn those who resisted, it was easy enough to make them into Demons.\n\nThe world will be a beautiful thing to claim."    
 POD_persistentpodlore.desc.793341: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile Dhampyr are said to overrun the jungles of Nusantara by the reckoning of the Yellow Emperor Court, when many on the mainland think of the follies of their Dhampyr, it is often Putra that comes to mind.\n\nPutra was the son of an unnamed man and Purnama, and from birth, he was groomed to be the ideal husband, a perfectly servile general, and obedient yet fearsome warrior. And to that end, Purnama is highly pleased with her son, and for his virility. However, to say that Putra is unstable as a result of it is an understatement.\nHe is utterly reliant on his mother's praise, willing to indulge in greater and greater acts of terror for even a single sentence of praise. Willing to follow any order no matter how foul or profane just for a touch.\n\nA boy just wants to make his mother proud is all.\n\nFuture Fate\nPutra was by and far more terrible an opposition than his mother was to Piyau's conquests.\nWhile his name was forgotten, he would become the greatest incarnation of the folly of male weakness in Dhampyr, and reinforce the [Glossary('Penangallan','podgloss.penangallan')] practice of not breathing life into their sons, and to a greater extent their usual restraint from having children. As while the world has forgotten Putra himself, the Golden Courts have not forgotten his Crusades of Consternation."    
 POD_persistentpodlore.desc.793342: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe son from some of the earliest Muslim arrivals in Malaysia, the King of Ashes remembers little past that. He remembers he had died young, and violently. His memories of the of the Demon City are similarly foggy, although he remembers he was good at fighting there.\nSo much that the Raksha for a brief time had to track his movements and report to Ravana. Yusuf cared little. He simply wanted to fight.\n\nThings changed when the Raksha stopped engaging him. He began to grow bored, aggravated, desperate. Finally, in a crazed rage, he stormed into Ravana's palace, and was promptly trounced.\nRavana gave him a single choice, either he could strip him from his limbs and reduce him to a chew toy for the Raksha, or be given an endless number of enemies to fight as one of his [akuma|E].\n\nAs Yusuf marches at the host of his devils, his choice is abundantly clear. He wants war. And only war."    
 POD_persistentpodlore.desc.793343: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSometimes you can put a Devil in a sheep, but it doesn't stop it from being a sheep. And Wira is the perfect encapsulation of that line of wisdom.\n\nWira was a simple shoemaker in life, but by and large he was always skittish and isolationist. Most of his work was sold on behalf of his sister, while he hid making his shoes. He was good at it, and dedicated himself quite fervently to his work, but all that came to an end when a gang of thugs attacked his shop.\nWira, in this hour of need, instead offered to sell them his sister, give them his little store, and do whatever they asked of him if they didn't hurt him. Much to everyone's shock, his sister, so horrified by it all, grabbed one of the thug's spears and put it through his eye.\n\nEven when he ended up in the Hells, he was frightful and fearful and hid from everything, willingly giving up numerous others to final death for the sake of ensuring his own hide was never touched.\nWhen he was finally caught, he immediately folded, begging to be made an [akuma|E] for the sake of being spared. Seeing him largely as harmless and a potential additional issue for any [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], he was sent back to the world of the living, where he hides and sends out devils to try and kill any threat to him."    
 POD_persistentpodlore.desc.793344: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nVoracity incarnate, several isolated villages tucked away around a temple bring sacrifices before a horrible creature at a host of demons demands offerings of both great amounts of food and maidens, lest they be sacked in the night. At at the temple, desecrated in blood, spoiling food, and mortal women and captured [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] alike, is the hated [akuma|E] Sabri.\n\nIn his mortality, Sabri was a womanizing monster of a nobleman, caring for little past what he could achieve and how fast he could get it. He would make a habit of touring his fiefs, and taking any woman he took a liking too as a consort, happily killing their husbands or fathers if they protested, and their sisters and mothers as more consorts if they resisted.\nBut as was due, a miserable life warranted a miserable death, so he died of sepsis, alone on his couch, after he, too obese to get up, was left to rot to death in his own excrement.\n\nHowever, his depravities would not end there. As a devil, he swiftly began exercising his will once more with demonic strength, and several other ones he broke to his service were bad to sacrifice themselves for his own way out.\nAnd even then, with labor so alien to him, he immediately began to broker with the [Glossary('Yama Kings','podgloss.yamaking')], wanting women and treats in exchange for being their hand in the world of the living. All he had to do was increase the suffering of those around him, which given the kind of man he is, he was more than happy to oblige."    
 POD_persistentpodlore.desc.793345: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong women of the night, there are rumors of a secret master, taking their fair share of coin to protect them from terrible clients. Some are granted greater gifts, from greater beauty, weapons to protect themselves, or even stranger boons. And at the heart of it all, the secret spider at the center of that web, is Nurhayati, transmitting devils through her networks of sex workers and brothels.\n\nNurhayati is extremely close lipped about her path, and by her own version of the story she was simply a wife who happened to die of infection, a quite common death for peasants. However, her extensive knowledge of the lifestyle and administration of sex workers speaks to a more grim mortal life, a fate not altogether unknown to many [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\nNonetheless, her own flight from the Pit of Salt and Iron and her time in the Iron Brothels changed her into who she is now regardless. Upon escape, she immediately forwent the [Glossary('Dharma','podgloss.dharma')], and instead clung to mortality, and to that end, threw her lot in with the [Glossary('Yama Kings','podgloss.yamaking')] for bodyguards.\n\nTo her own ends, Nurhayati uses her sex workers to spread devil spirits into their clients, turning them into loyal Bakemono. It is slow going, but Nurhayati's experience and patience has shown a strong basis for success.\n\nAnd if she has the time, she may be the [akuma|E] to unite Nusantara."    
 POD_persistentpodlore.desc.793346: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile it is standard doctrine among the august courts that the [akuma|E] are without failure those utterly broken into madness by their infernal masters, few embody it as much as Kasih.\nWherever she appears from her hidden retreats populated by the mad and devils, she is always cackling, maddened by whatever transpired in the Hells. Through pain and pleasure, weal and woe, fanaticism and fatalism, Kasih greets it as she greets everything - eyes wild, mouth agape, dripping with gore, and frenzied in the ecstasy of slaughter. Beyond that, she is a mystery.\n\nIn her lucid moments in her retreats, she is always whispering, always speaking of times to come. Of flesh and blood, of femininity crowned in gore. Perhaps she sees herself in it.\nOr perhaps she sees another force beginning to rise out of the jungles..."    
 POD_persistentpodlore.desc.793313: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nHideaki remembers his mortal service fondly, even if it was doomed. Considered the far more presentable of Miyako's original childer, he is august, tactful, and respectable. But a shadow hangs over him, a smoldering fire that refuses to go out.\n\nHideaki was one of the Emishi people. He was a soldier under the Emishi chief of the Isawa, considered barbarians by the Yamato.\nThrough thick and thin, Hideaki fought with his lord loyally and proudly. However, when Aterui surrendered, Hideaki was horrified and furious. He sought out his lord, to beg him to reconsider.\nBut the night he did so, as he was making his way to his lord's camp, he was ambushed by a terrifyingly skilled weaponmaster and warrior. The weaponmaster known only to him as 'the Sword of the Great Clan' thoroughly humiliated and trounced Hideaki, who rendered him in a hundred cuts before seizing on him to drain him of blood.\nBut as Hideaki lay dying, a bolt of lighting struck the Sword of the Great Clan back, and he fled before a masked warrior. The warrior offered him a deal, to either die and move on, or embrace the night and fight tyrants evermore. Hideaki accepted, and Miyako Embraced her second childer.\n\nDeath changed Hideaki. He learned that directness was dangerous, and reserved it for when it was needed. He was charismatic, proud, and dominated the room.\nBut this was all to advance the aims of the Blood Tribe. The same fire for revenge for the people trampled by conquerors burns in him, albeit more subtly.\nHe aspires to win, by any means he can, beyond just that of the more direct methods of his sire."    
 POD_persistentpodlore.desc.793312: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nGiven her sire, Yoshino is a sharp turn from what one would expect. Lecherous, impulsive, and headstrong, the Eldest childe of the Founder of the Bushi is often considered an impertinent cow, but beneath it is an anger all too familiar to her sire.\n\nYoshino was one born to Emishi parents among a Yamato city in Miyagi. Born to nothing and treated as an outsider, Yoshino out of necessity became a sex worker from a young age, every day a struggle to be fed time and time again.\nHowever, when the Yamato began to crack down on wider Emishi resistance, Yoshino was called out by the guards as a potential Emishi spy. Stolen and dragged away in the night, she was beaten repeatedly by the guards, who had demanded she unveil any secrets she was believed to have had.\nAs she had nothing to tell them, they kept going until death was all but assured.\nBut as she was dying, a strange storm began to blow in, and as soon as the rain began to fall, she noticed how strange it was that it was red.\nShe lost consciousness, and when she awoke, her lips were blooded and her sire Miyako was over her.\n\nSince being given a second chance at life, Yoshino has used it to indulge herself in the things she had always been denied. Fighting and killing sword in hand, sex on her own terms, and the power to not take shit was hers.\nShe relished her gift, and treasured the second chance she was given."    
 POD_persistentpodlore.desc.793314: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMasami was mostly a nobody. Just a young woman who was once in the way of a far more powerful woman. Once a shrine maiden, originally part of an early delegation sent to the recently conquered Emishi lands following the Thirty Eight Years War.\nIn that time, she and the rest of the temple staff sent there had hired a rather strange warrior, who never left at day and instead watched over them diligently in the night. Some of the attendants who poorly treated the Emishi disappeared in the night, but Masami's own tired kindness to them endeared the warrior to her.\n\nHowever, one night, as she was preparing a rite, she heard a scream, as a horrifying figure with horrifying elemental magic was tearing through the shrine. This shrine had somehow offended her, so the woman, calling herself the Sage of the Great Clan, was rendering all the attendants there to blood.\nMasami was the last, as she begged and pleaded for anyone to save her. The Sage merely laughed, and simply drained Masami of blood, and left her dying on the altar. But as she pleaded to anyone who would listen to save her, the warrior crawled in, wounded but still standing.\nThe warrior heard her prayer, and raised a wound to Masami's lips, and Embraced her into the Bushi.\n\nMasami's study had proved useful. Among the leaders of the Blood Tribe, she had come to become the primary arcane specialist. In part because of the routines and rituals coming comfortably for her, but also out of a desire to overcome her attempted killer.\nThe same fire that burned them in all did so in her too, just differently.\nAnd she will have her revenge, or die trying."    
 POD_persistentpodlore.desc.795014: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nIndra, from the moment she drew her second breath, was not to be afforded anything but the storm.\n\nThe second 'child' of Sita and fellow disciple to Shiva-Ohm, Indra-gha was among the founding members of the Face of the Gods, there from the start. Remembering little from her mortal life, and even less from her time in the Thousand Hells beyond a horrible flaying wind and storms of iron, she would come to deeply treasure the new family she was brought into.\nBut where her fellow disciples isolated themselves in their pursuit of enlightenment, she chose to ingrain herself into the center of their collective. This is where many would have faltered, either from the lack of presence, lack of will, and lack of skill to bring a path centered around exultation of the self above all.\n\nBut Indra-gha found herself at home in the Storm's Eye. So much so it became the divinity she sought.\n\nShe would eventually become the center of temporal power within the Celestial Tribe. Through a combination of ambition, tenacity, and charisma, she would manage to keep them together. While she was not a general, her ability to balance those who were and those who wanted to be and picking and choosing battles allowed the Celestial Tribe to withstand assaults on all sides within the Eternal War.\nAnd as the world moves ever onward to the next Age, she continues this wild dance as titans clash in the storm around her, as she continues chasing its heart for the sake of her new family and her own grandeur.\n\nFuture Fate in Canon\nndra-gha's arrogance within the heart of the storm that is the Eternal War was at least not without merit.\nEven through the tumult of the Long Night, Scourge of the [Glossary('Anda','podgloss.anda')], formation of the Quincunx, and even the Week of Nightmares, Indra-gha would lead the Celestial Tribe into modernity, with enough political power and diplomatic savviness to send envoys to their traditional enemies for the sake of uniting against the threats of the Final Nights."    
 POD_persistentpodlore.desc.793335: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite being born as a means to an end, a mere means to enlighten her mother, sometimes all it takes is the right pushes to elevate a person to a greater cause.\n\nBorn to Wati and an unnamed and not particularly important man, Nidhi was, from the moment her mother first cradled her, showered with endless love and affection. Despite her mother's reputation as a blood drenched berserker dripping in the entrails of any [akuma|E] Piyau throws her way, she would become a radically different person when holding her daughter, who she vowed to give the world too.\nNidhi was raised among the Flaying Monkeys, and taught their ways. Despite most of their own reservations about children, Nidhi became a daughter to them all. She was cared for, knew none of the pains her mother or her sworn companions faced, and despite being of no noble blood, lived like a princess.\nTutored in enchantment and given the best education her mother could manner, she was groomed for the best life that Wati could give her.\n\nAnd it was for that reason she found the notion of a preacher, telling of the fallen nature of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], and that the Dhampyr were wretched reflections of a higher power, that Nidhi finally learned of the rage that burned in her mother's heart.\nWho were these impudent wretches to dare question their parents? What madness did they preach that the people who gave her a perfect world were corrupt degenerates of some more noble power? What an insult that they dared to call such beloved children degenerates? What profanity to say her mother never loved her?\nNo, once Nidhi heard this, she sought out the preacher with an axe, seeking to split their head open then and there. And when they fled, they swore to find them and strangle them with their own tongue for such an insult.\nIn time, Nidhi's rage evolved, to see the Golden Children the Dhampyr once were as self righteous fools, the echoes of which needed to be expunged for the sake of saving them in the now.\n\nAnd if she would need to chase them into the bowels of hell to end their lies, then she will split, tear, maim, kill, burn, and butcher, until it is done."    
 POD_persistentpodlore.desc.795030: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nWu Zetian is a woman who needs no introduction. Born the daughter of a timber official and a noble woman, the girl encouraged to read and write, through guile, ambition, ruthlessness, and drive claim the whole of the Empire. Not just through a son or husband, but in her own name. And then in a string of poor choices and political winds, she was removed from power in the twilight of her life, and died after years of struggling against illness.\nBut that is not where her path ended. And for upending her place as a concubine turned Emperor, the Hell of Upside Down Sinners awaited her. \n\nAfter her entire life of struggle, the madness of the Hell shattered her and remade her a thousand times in the agony of that Hell. Millennia in moments, a moment in decades, a throne of paupers, a dumpster of crowns, armies of pacifists, unhampered sages, lies in truths, plummets only a single step and single steps a fall from the heavens.\nEvery worry made centuries of trauma, every doubt a paralysis of terror. And a realization. And once she realized, she couldn't stop. And in a moment, begged to go home.\n\nSo the master of the Hell sent her back to the world of the Living, awake in her tomb with still lungs, a rejuvenated body, and all that she had learned. And a rage that was beyond her body to contain.\n\nWu was found by the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], and with her anger, she was sent to the Devil Tigers. The anger in her became a crucible. To see all she accomplished, all she did rendered to a blank monument, on top of the suffering she endured became a white hot crucible of vengeance.\nShe would make a new greatness, a masterpiece of spite and she would take power on her own terms without kneeling. Riding her demon as a chariot, the blinding light and darkness that follows, a twice born Emperor, who if they could not rule all under the Sun, she would rule all beneath the stars.\n\nNo matter how long it takes. Wu Zetian will have her Empire again."    
 POD_persistentpodlore.desc.793347: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAt the foot of the throat of the world, there is said to be a song. Many of the Hungry Dead seek it, but few tend to the land that leads there.  One of the lucky few who would be content would be the venerable Tenzing, Keeper of Shigatse. However, as the winds from the north begin to howl, he has found himself forced to action.\n\nTenzing was born during the decline of the Yarlung Dynasty, surrounded by the chaos that naturally comes with an empire in decline. While most of his homeland was thrown into panic with the assassination of King Darma U Dum Tsen, Tenzing saw in that chaos space to profit. Transforming his small village into a supposed 'refuge' he would actually pay thugs to assault and kill people on their way to safety at choice mountain passes, using the chaos of the age as cover.\nHe became fabulously wealthy, but that did little to protect him when during this Era of Fragmentation one of the survivors of the raid managed to uncover his treachery, kidnapped him, and left him to die of exposure in the Himalayas and send his soul hurtling into the Hell of Being Skinned Alive.\n\nThe experience was intensely sobering, as Tenzing was stripped of all that he had and that he was. While he did eventually escape, he became an ascetic, detesting wealth and devoting himself to learning. He would rise among the Shigatse monks, and proposed numerous critical theories and would spearhead their demon hunts.\nHowever, when Fan retired and Da assumed leadership of the White Tiger Court, the fool had the audacity to try and push deeper oversight on the Shigatse Monks. As such, they rejected Da's pleas for aid when the [Glossary('Anda','podgloss.anda')] began to gnaw on the Court, and Tenzing, the leader of the monks at the time, watched as it crumbled. But now, Tenzing moves once more into chaos, seeking to rebuild the White Tiger Court into something more as what the Shigatse envisioned when they joined.\nAll he must do is succeed where he had once failed, and thrive in the chaos.\n\nFuture Fate\nThe Shigatse Monks, while strong, were too isolated to do much to oppose the [Glossary('Anda','podgloss.anda')]. But while most of the other exiles fled East, he ordered they go to ground and fortify the Himalayas against the [Glossary('Anda','podgloss.anda')].\nTenzing would simply retire to his research after that final order, to dedicate himself once more to his research on the Defiled and Half-Devils."    
 POD_persistentpodlore.desc.793348: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEven if Fan would retire from her empire, among her companions there are those who would try to ensure all that she built does not fall away. And among the Horns of Ice, Fu Hao stands where she has always done so, at the vanguard.\n\nIn life Fu Hao was one of the 64 wives of Wu Ding of the Shang, married as part of an alliance between the Shang and one of the outlying tribes of their domain. Fu Hao stood out among her husband's wives as a capable and intelligent leader, with a brilliant mind for military matters. She would rise through them, eventually become Wu Ding's second wife, priestess, and a military officer and general, holding land in her own name.\nHer campaigns elevated her to Wu Ding's greatest general at the command of his largest army, and while she did die before her husband, she was buried with honors within his capital.\n\nBut for Fu Hao, she awoke from death in Lanka, made a devil for her conquests. But through the torments, she persevered, and the prayers of her husband asking for her guidance guided her back to the living. And as Wu Ding died, his warrior wife paid him one last final visit, ensuring she would be there no matter what.\nAnd when he moved onto whatever came next, she joined the society of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] with deference and respect.\n\nFu Hao's military experience, temperance, diligence, and unflinching resolve in battle brought her into the sphere of Fan, where the large and daunting woman accepted a place within their [Glossary('Wu','podgloss.wu')] as their warrior. A study of the Ten Seasons Sect and cold resolve gave her a foundational position in Fan's court, and when she retired, Fu tried to respect her wishes and knelt to Da. But when the [Glossary('Anda','podgloss.anda')] began to arrive and she tried to rally an army, Da refused to send her men, leading to several Courts being sacked.\nTolerating it no longer, she broke from the Courts and rallied a host of her own, setting the dissolution of the Court into motion. Now, she rallies the forces to rebuild Fan's Court, and to take the fight to the [Glossary('Anda','podgloss.anda')] and see them scattered.\n\nFuture Fate\nWhat forces she could muster was not enough to stop the [Glossary('Anda','podgloss.anda')]. With the White Tiger Court divided, it was easy prey for the invaders. Loyal to her [Glossary('Wu','podgloss.wu')] to the very end, Fu Hao disappeared without a trace, last being seen fighting the [Glossary('Anda','podgloss.anda')] back while the rest of the Horns of Ice fled to places unknown."    
 POD_persistentpodlore.desc.793349: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMany Dhampyr are living a lie. They suffer, they bleed, they cry, they beg, they pray, all to no avail. Sometimes though, one too many straws breaks the pack animal. And where some collapse, some fight back. And Reyhangül wants a pound of flesh.\n\nReyhangül was the daughter of a kidnapped mortal woman and a flesh eating monster. Called a 'Shadewalker' from her birth, it was instilled into that all her life was to be a thing of amusement for her father, and for her agony to be the power of their true god. Growing up alone with only her father, she needed no stories of Hell to pray too, because there was not a day she didn't live it.\nHer dreams were haunted by light and subservience, of a death replayed a thousand times in her mind. And when she was old enough, her father took her as a wife, to fulfill the purpose she was born for.\nMore she begged and prayed in secret to the light that once struck down the monsters in her dreams. Unfortunately that is not what answered. Other blood drinking devils found her father, and after a battle, took them both into the mountains.\nThere she was tortured day and night, told she was a monster by her captors. Sinful, wicked, and deserving of pain, all while all Reyhangül could manage was confusion and terror. She began to find solace in the burning devils of her dream, relishing the moments where they died in agony, wishing for it dearly.\nFinally, one night her dream was interrupted with a whip, and in the haze of pain and slumber, she took her untrimmed nails and wicked fangs and tore them apart. She gathered more damned souls and took them and fled back to lands she remembered.\n\nAfter taking the books they held, things make a bit more sense. Reyhangül knows she is one of the Golden Children, betrayed and butchered and reborn in a lower state. So too are all the other Dhampyr she fled with.\nSome are content with their parents but she knows the truth. She knows she must spare them their parents' tyranny. No, the looming wickedness of the dead must be expunged and torn out.\nThe [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] are damned. They all must be swept away for their once murdered children to set things right. That has to be it.\n\nIt has too.\n\nIt has too."    
 POD_persistentpodlore.desc.793350: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong many within the Courts of the Hungry Dead, it is a common stereotype that most every [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] from India is a heretic of some kind. Among those detractors in the White Tiger Court, the Boar is there to... eloquently show them the fault in their wisdom.\n\nNarayan in his mortal life lived on the banks overlooking the Bay of Bengal. A fisherman his whole life, he lived by the principle that if his life was fine, there was little reason to change it. Boring and steadfast, he had a very mundane life, up until one day, when he went fishing, he accidentally snagged a swimming tiger, and was promptly drowned and eaten by the irate Khan. And for the sin of striking one of the Emerald Mother's champion, he was thrown into the Hell of Boiling Seas.\nDespite the injustice of it all, he accepted his hell, and sank to the bottom, falling through a cave, and then waking up in the mortal world on the shores. When the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')] found him, he was simply fishing once more.\n\nNarayan would be brought to the Court, where he was, after a single argument with his [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')], immediately sent to the Courts of the Eight Lotus Blooming. Despite his temper, Narayan took to it like a fish to water, and at times even arguing with his mentors for at times changing their minds on topics or subjects.\nHis determined and angry fortitude did make him an easy representative of the Resplendent Cranes, and his predictability and loyalty made him fast friends with Fan, and easily a Keeper within the [Glossary('Wu','podgloss.wu')] of the Horns of Ice. And while he would give her no relief from admonishment for her retirement, he did eventually come around by convincing him little was going to change.\nBut the disruption of the arrival of the [Glossary('Anda','podgloss.anda')] was such a rile to him, that when Fu Hao began to rally forces against them, he joined with her, determined to put those trouble makers to the calm of the grave and make order once more."    
 POD_persistentpodlore.desc.793351: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEven in a court as loose as Fan's was, given the seditious and hideous nature of their enemies, one would be a fool not to have a spymaster. And always in the shadows of Fan's court, the Millipede was there.\n\nErke-kara was born on the steppes a long time ago, but he speaks little of that time in his existence. One of countless lost to a fever, he was found by the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')] still coated in the vermin of the Hell of Burrowing Maggots, still shaking them off as a feral beast. But when he was brought forward, he always stayed out of sight.\nQuickly going to his lords, he whispered among the small things and looked through a web of spies to stay ever wary, constantly watchful for any and all threats. Slowly rising through promotions and recommendations, he found his favored place among Fan's court, as he adored the general trust she put in him.\nNot asking too many questions when [akuma|E] disappeared, not looking too deeply when potential threats arose. And when she retired, none of those who had any grievances with her had much ground to last.\n\nHowever, in the chaos that followed, Erke-kara found himself quite liking Tenzing's methods. Even more hands off than Fan, with her blessing he went to join his court.\nEven despite him standing opposed to his [Glossary('Wu','podgloss.wu')] member Fu Hao, he does prefer the more lax structure Tenzing cultivates. But despite his cold exterior, he dearly hopes he will never be ordered to turn the blade against his companions..."    
 POD_persistentpodlore.desc.793352: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the many forces that once were common place in the White Tiger Court, among the most out of place it seemed was that of a pretty faced among a court of warriors, sages, philosophers, and spymasters. But behind the honeyed voice, mastery of songs, and alluring of forms, was a lethal embrace that snuffed out the light of foes with hearts that could not be swayed.\n\nYahui in his mortal life was an orphan of the Warring States period of Chinese history, in the state of Wei. Early on, all he had was his charm, his wits, and his beauty with little else. He put all of them to as good a use as he could, but in such a time, the fate of men of the night was often brutal, and when the period was coming to an end, Yahui was just one of the countless nameless dead from the Qin Conquests. And in death he found himself stripped of identity in the horrors of the Iron Brothels of the Hell of Salt and Iron.\nStripped of the tools of life, he shaved his teeth into viper fangs and chewed off his hands and ankles to escape, pulling himself from the Hell a serpent. When he was found by the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')], they were astounded to find the face of the Devil Viper one that could stun them all.\n\nYahui was civilized and trained as an Iron Talon, using his incredible charm and guile to strike down [akuma|E] too blinded to see the fangs that lay beneath. Once given the choice though, he rushed to Fan's court, and swore fealty to her.\nHe served her intensely, faithful to the Court she shaped. Even if he could not win the person who had his heart, he would at least safeguard their work. When Fan retired though, Yahui was lost.\nRather than break apart like most of their [Glossary('Wu','podgloss.wu')] had, Yahui instead simply went with Fan as she retired, and continues as he always had."    
 POD_persistentpodlore.desc.793353: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWithin Tashi, there are whispered rumors among the spirits of secret meetings and dealings. Of some of them, there is word of a thief, of a corpse with the tell tale eye of the soul arts.\n\nThey are in part correct. But it would be silly for Jetsun to set the story right.\n\nJetsun, in his mortal life, was just a town guard. He was pretty good at it, and even despite their small town being out of the way, he was able to catch a fair number of thieves. But one night, a thief was running through his town, one that stumped all of his fellow guards. Jetsun devoted himself to catching them red handed.\nWith careful baiting, he set a prize too good for the thief to pass up, and was sure that he had them. And the moment the string it was held upon twitched, he sprung upon them, laughing in victory.\n\nHe had caught the Salubri methuselah Zao-zei, and was embraced for his troubles. And promptly brought into the fold of the Wu Zao.\n\nSince his embrace and training, Jetsun, while great at catching thieves was terrible at being one himself, so he was instead moved to another critical position. The Wu Zao instead needed access to China through Tashi, so Jetsun was sent to make sure those roads stayed open.\nThere, he waited and patiently ingratiated himself into the Ancestor Jiang Shahua's court, finally getting the audience he needed. There, he remains, keeping those gates open while playing the waiting game. So while he once caught thieves, he now opens the door for them."
 POD_persistentpodlore.desc.793354: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt is the duty of a doctor to heal and protect. Even if it isn't always on people, Yangwa has never erred in his purpose, either as a mortal or as a vampire.\n\nLiving as a doctor within the city that would come to be known as Tashgar, Yangwa's trade as a physician and doctor was incredibly important at the threshold to China. He was good at it too, growing old and saving hundreds in their travels. And it was for his skills that he was watched for an extended period of time, and another healer visited him as he slept, and granted him [Glossary('витэ','game_concept_vitae_desc')] so as to elevate his capacity to heal.\n\nWhile death took some getting used to for Yangwa, he was a local in the city, which the Wu Zao needed to further secure it remained open to them. His skills as a healer opened him up to its ruler in the night, Jiang Shahua. Outwardly, he presented himself to and aided the court with his 'soul arts', while he quietly opened his shop to other Wu Zao, a haven and sanctuary into China proper.\nHe knows not fully what they do, but it is his duty to protect. And so he remains steadfast, keeping that road open.\n\nSurely nothing bad will come of it."
 POD_persistentpodlore.desc.793355: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the few trusted visitors of Jiang Shahua, one stands out. A woman always clothes in fine silks, eyes bleeding red, yet not an [akuma|E] nor a Devil Tiger. Something other, still a user of soul arts of a kind. While her third eye is typically hidden, when it appears, all feel a crawl up their spine. Something old and ancient, with a terrible gaze that inspires fear where she walks.\n\nAkari was born far further East, but is a cultural chameleon, adapting where she goes. Her mortal life was brief, embraced before her 20th year, and by a force of terror and darkness. It educated her, teaching her of the horrors of their master, and most strangely, instilling in her how important it is that those with three eyes and drink blood are able to go where they're needed.\nIf she did that, her sire would not interfere with whatever she did.\n\nAkari found this perfect, and hearing the thrum of that which dreamed beneath the earth, smiled and went to the gates. Charming and cunning, moving her way into main throat of the world she knew, she built her power there, playing nice and waiting, And when the watchers came, she ensured they could go through unchecked with the right words and right gifts to the ancestor.\n\nAll according to plan of course. It's what those that dream below would want."
 POD_persistentpodlore.desc.793356: "This character was created for the Relentless Age fan supplement and is used with permission. They are not an official part of the [Glossary('Мир Тьмы','game_concept_world_of_darkness_desc')].\n\nMa Hai-Lan was the daughter of a minor official of Zhongdu and lived an uneventful life until the Mongols came and destroyed the city, killing countless people in the process including her and her childhood friend Lin Xiao. They were both sent hurling into the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] and it was there that Ma Hai-Lan revealed herself, leading a group of fellow prisoners to escape. They would become her [Glossary('Wu','podgloss.wu')], the Demons of Zhongdu.\n\nShe sees the breaking of the Five August Courts as disappointing, but not surprising. When she joined the Hungry Dead, falling in with the warrior Cranes who would eventually found the charter cities of the Yellow Emperor Court, she’d heard more than her share of whining and bitching– always from the most unworthy immortals, bamboo princes who acted like they deserved the world. To “General Ma,” a proud and militant believer in the Eightfold Lotus Path, the truth is simple: You take what you deserve with bloody, battered hands, and only then can you say you’ve earned it.\n\nAs General Ma sees it, the night world of mainland China has reverted to the banditry and lawlessness of ancient times– which, to her, represents the returned opportunities of her misty youth. China is ripe for the taking once again, if there are Hungry Dead willing to follow her.\n\nThere is no room for bitterness. The old August Courts may have lost, but so what? They’d lost heaven’s favor, grown fat and indolent in a beautiful world that they thought would last forever. The [Glossary('Anda','podgloss.anda')] and their allies in the heretical sects are not the inheritors of heaven; they have not built a polity from the chaos they sowed.\nThey are merely a test, which the next worthy champions must face and defeat. Ma Hai-Lan fully intends to be that champion, building an army to take cities one by one.\n\nThere was once an empire of the dead, righteous and pure… and now China is ready for the next one.\n\nFuture Fate\nDespite the death sentence that directly opposing the [Glossary('Anda','podgloss.anda')] often was, through Ma Hai-Lan's leadership and tenacity she and her [Glossary('Wu','podgloss.wu')] would survive this threat, and outlasted the Hell she once belonged too.\nShe would become an isolated ancestor of the early Quincunx, and would tend to her court dutifully until her dispute with the more conservative ancestors will become a schism at the start of the 20th century."
 POD_persistentpodlore.desc.793357: "This character was created for the Relentless Age fan supplement and is used with permission. They are not an official part of the [Glossary('Мир Тьмы','game_concept_world_of_darkness_desc')].\n\nTelling tall tales and capable of spinning a thousand stories about her past, Lin Xiao hides the truth behind the veil of misdirection and myth in the making. All to suppress her anger.\n\nLin Xiao was the daughter of established merchants in Zhongdu, and was raised in their profession. But all the way from a child, she loved nothing more than stories. She adored the legends of great heroes and the gods, and often threw herself into them.\nPerhaps the greatest gift her parents gave her was teaching her how to read and write, as soon she was composing stories all her own. Rarely ever going out unless it was to play with her friend Ma Hai-Lan, Lin Xiao always envied the founder of dynasties, who rose from humble origins to ruling the whole of the known world.\nSo caught up in it all, she hadn't even realized the walls of Zhongdu had fallen until a Mongolian sword was already cleaving her head from her shoulders and sending her into the depths of the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')].\n\nThe experience broke Lin Xiao. She saw flickers of her home ablaze as she fell into hell, the smoking embers of her stories both composed by her and ones she adored following her.\nFor the most part, she simply accepted her fate. Even when her childhood friend rescued her, she was quiet and morose, all the way through their escape and collection.\nShe never spoke, and simply doddered about unlike a shadow of herself. At least until she saw the ruins of Zhongdu. Something inside of her sparked, a conflagration of anger and sorrow, that consumed her being.\nThe Howl of the Devil Tiger called to her, and she would let the [Glossary('Anda','podgloss.anda')] hear her roar alongside her [Glossary('Wu','podgloss.wu')]. In a storm of lies and tricks, she would turn all her strengths to the support of her [Glossary('Wu','podgloss.wu')].\n\nFuture Fate\nLin Xiao would survive the war against the [Glossary('Anda','podgloss.anda')], and see the rise of the Quincunx take ahold of the Night World.\nShe quietly receded back to her home, and lingered as it was rebuilt. During the overstepping of the Blood Court and the Century Rebellion at the chaos of the turn of the millennia, after centuries of waiting, the now Grandmaster Lin assumed control of the night in the city that arose over her home, Beijing.\nShe would align herself with her childhood friend once more, but this time, she will be equal to the tall tales she tells her students. She will be greater than them all."
 POD_persistentpodlore.desc.793358: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt is a sad thing to be born into a military life in the closing days of an empire's life. And perhaps if Yanxiang had lived in a different time, he could have been a truly decorated soldier. Now, he will have to content himself with it in death.\n\nYanxiang was one of many soldiers in the last years of the Jin Dynasty, stationed at Zhongdu as a reward for his earlier success in his career for repelling the earliest raids from the nation that would become the Mongol Empire.\nHowever, this appointment would later kill him, as the eventual siege and destruction of Zhongdu would see him slain on Zhongdu's walls, dying in defense of the city and finding himself in the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')]. Struggling against the chains, he merely had his essence sapped to its lord's foul ends.\nHowever, by sheer luck, he was one of the lucky few close to another escapee, who in her flight, helped them escape, and in turn, Yanxiang helped fight alongside of them as they fought their way back to the world of the living.\n\nUpon their discovery by the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')], Yanxiang was placed among the other escapees as the moral heart of his [Glossary('Wu','podgloss.wu')], as despite being a soldier, he was actually among the most tame among them when it came to combat.\nHowever, standing by them ardently, his experience from his life will be critical in the war against the [Glossary('Anda','podgloss.anda')].\n\nFuture Fate\nYanxiang's practiced wisdom would see that every member of his [Glossary('Wu','podgloss.wu')] would survive to see the formation of the Quincunx. He would go to become an Ancestor of the town that would become Zhuhai, and as the Quincunx falls into decline, he would reconnect with his old [Glossary('Wu','podgloss.wu')], eager to aid in Ma Hai-Lan's ambitions to restore the Quincunx, using his position as the Ancestor of Zhuhai to aid the Demons of Zhongdu."
 POD_persistentpodlore.desc.793359: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhen one sees the [Glossary('Wu','podgloss.wu')] of the Demons of Zhongdu, few come to any conclusion other than that Tai is a beast of a man, tall in form and wide in figure, with strength and fury to match. Given how he is known, his mortal life comes as a thing of irony to those who knew it.\n\nTai was the son of butchers, and raised a butcher. Strong from meat hauling and skilled with a knife from cutting, he was actually quite happy with his life, and got to marry his childhood sweetheart Shufen.\nHe would have loved nothing more than to grow old as a butcher with his life. But that would not come to pass, as his home would be destroyed by the Mongols in their early conquest, one of the many dead in Zhongdu's sack who would find themselves falling into the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')].\n\nDespite the awfulness of it all, losing his beloved Shufen incited an immense rage in Tai. His wrath became something of horror, as even Demons would avoid the newly made devil in his crazed thrashing in the Spiked Chains.\nAnd when he was released by another escapee, he immediately rushed to his beloved like a crazed bull, and split her chains apart with his bare hands. They would escape together, alongside their liberator and a few other devils back to the world of the living.\nCollected together, they were put into a shared [Glossary('Wu','podgloss.wu')] after their training. Tai himself was eager to fight alongside them for revenge, as they were positioned as a [Glossary('Wu','podgloss.wu')] to fight the [Glossary('Anda','podgloss.anda')].\n\nFuture Fate\nTai's fury would see him through the war against the [Glossary('Anda','podgloss.anda')], and he would become one of few Dynasty Toppling Ancestors.\nHowever, as the Quincunx began to wane in the early 20th century, at Ma Hai-Lan's recommendation he would seek out to position himself as Grandmaster Ancestor. As he hears whispers of a potential return of Dobrul the Brave, he agrees more than ever with his fellows.\nThe Quincunx must be restored, and the Heaven and Hell Legion is the best one to do so."
 POD_persistentpodlore.desc.793360: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce upon a time, Shufen would have been happy to grow old as a wife. Now though, she longs for so much more.\n\nShufen was born to minor palace servants within Zhongdu, the capital of the late Jin Dynasty. Her parents were frequent customers to a local butcher, and it was there she met the man who would become her best friend, love of her life, and then husband.\nOverjoyed to be one of the rare few lucky enough to marry someone they loved and desired, she happily married Tai and helped tend to his butchery when his parents died.\nBut unfortunately, her happy ending was cut short by the Mongol sack of Zhongdu, leveling it to the ground and burning it away, Shufen one of many to be scoured away into the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')]. Taken from Tai and serving as mere fuel to its master, she was lashed apart as she struggled endlessly to break free, calling out endlessly to Tai to save her.\nAgainst all odds, he answered thanks to a devil breaking free, and they escaped together alongside several others back into the world of the living.\n\nAnd with this second breath, she would not be helpless again. The whole affair of merely being a damsel upended the order in Shufen's soul, and she would never tolerate being weak again. No, she would take all power she could, strike down the wicked who would threaten her again. And now, that is clearly the [Glossary('Anda','podgloss.anda')].\nThe other escapees are at her side, and Tai has his own wrath now. Her beauty now a tool, her charm now a dagger. She would fight now. To make sure she would never suffer the same fate again.\n\nFuture Fate\nShufen would survive the war against the [Glossary('Anda','podgloss.anda')], alongside the rest of the Demons of Zhongdu.\nNeither her or Tai would be content with retirement, so they became wandering Ancestors. But as the Blood Court threatened the stability of the Quincunx and they received word from Ma Hai-Lan that they would fight once more.\nShufen readily affirmed her loyalty to the new Heaven and Hell Legion, and sought to become the Grandmaster of the Iron Talons of Shenzhen to that end. She would then join in on Ma Hai-Lan's new war, eagerly and with all her heart once more."
 POD_persistentpodlore.desc.793361: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAcross Asia, there are whispers of men and women that wear the shape of snakes. Among the night world that they are secret agents and enforcers of the Beast Courts, their mighty and fearsome assassins subservient to the inscrutable will of their mother goddess. And among their kin, there are many who live and die forgotten and unsung.\n\nAmphai would not tolerate the same fate. If Gaia would toss him aside, he will break her, and leave her shattered at his feet.\n\nAmphai was a Nagah Kinfolk born in the Indochinese wilderness. Not blessed with the First Change, Amphai was promptly set up with a Nagah wife three times his age. When he protested, and asked for some other way to be useful, his legs were instead broken by his Nagah father, who told him on no uncertain terms that if he didn't have children, he would kill him. Unfortunately for Amphai, his sterility would be a death sentence, and he was executed for the unforgivable crime of being unwilling and unable to conceive a child. And for that, his soul was sent to the Hell of Wretched Magic.\nBut unlike so many others, he simply accepted his fate, earning the curiosity of Grandmother Witch, the Hell's [Glossary('Yama King','podgloss.yamaking')]. When she questioned him on what he would do when he escaped, he merely told her he would kill the soul of the earth, and if she had nothing else, to leave him alone. Impressed by his answer, she took him in, trained him, and then released him back into the world of living vested with infernal power.\nSlowly, his desire for more and more power behind a deceit of weakness for the sake of destroying Gaia has yielded fruit, as the Scarlet Phoenix Court wanes, and an entire archipelago ripe for conquest lies before him. And at his side is finally the lovers of his own choice brought into his coils, to spite the estranged family that killed him.\n\nFuture Fate\nAmphai would be among one of very few Defiled in Indochina to not meet death before Piyau's campaign, holing up deep in the mainland and waiting.\nBy the time of modern nights, he has perfected rites of invulnerability and espionage with numerous enthralled Nagah below him, alerting him of all intruders in his domain of Vientiane.\nHere, he nears another final precipice, to take on the full power of a [Glossary('Yama King','podgloss.yamaking')] himself, and use that power to launch his own campaign to conquer Gaia."
 POD_persistentpodlore.desc.793362: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWithin the haven of the Serpent Sovereign, at the master's side, there is always one beast of a Devil. Tall, built like an ox, and with a skill to match such strength, to be the most honored one among the many men at the Sovereign's throne.\nBut despite the air about it all, Vixay has what he always wanted most. A guiding light. No matter where it leads him, even into the depths of damnation.\n\nVixay was simply a soldier in life, to one of the many city states in Indochina. He was a good one, incredibly skilled with a spear, and peerless in form.\nFor his service, he was the pride of his city. However, he was just as expendable as any other man, so he was spent like one, and died unmourned on a forgotten battlefield. And in the Demon City, the pointlessness of it all broke him. He accepted his place as a soldier in the city, a hollow shell of what he was.\nHowever, he would eventually find a light of a kind. A man with the bearing of a serpent came to him like a light from the heavens, offering to him a cause to fight for, one everlasting, where he would have someone that appreciates him. Someone to love him. Someone to take him and never let him go.\n\nAnd even as it damned him, Vixay took it eagerly, a loyal spear for his serpent king. And however his king would need him, Vixay would be there for him."
 POD_persistentpodlore.desc.793363: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhat good is a serpent without its venom? No matter the shape, no matter the size, it is a poor snake that lacks the means to slay its foes in agony. And yet, such venom can also heal, and in the world of the night, there are countless means of pain that can be alleviated.\nAnd at Amphai's side, Sengdeuane is his master of both, in such a wonderful shared package.\n\nSengdeuane was originally a rural doctor, dealing primarily in snake bite antidotes but a pretty good doctor nonetheless. One day however, a woman came to him asking for a medicine that could undo a horrible wrong done to them.\nEven despite the adamant demands from his mentor not to, Sengdeuane prepared the draught for her. Despite the good deed, he was caught however, and killed by the would be father for denying him his 'claim' over his victim, locking him in a box and burying him alive after knocking him unconscious.\nAnd Sengdeuane would be cursed to [Glossary('Kakuri','podgloss.kakuri')]. And there, he cursed the world endlessly for its cruelty, begging for some means to shatter it and grind it away as he howled in that insensate plain. And it was there that, as he crawled through the caves and out the colds, his arrival to the world of the living was met by a half-serpent, vested in the power of hell.\nIt told him they could do all that and more. If only he served.\n\nIt was the easiest decision of Sengdeuane's existence. And even if he wasn't the favorite, knowing what may come, knowing that the terrors and pains of the world may finally be ended, he would do so happily.\nUntil the day that he may see the [Glossary('Demon Emperor','podgloss.demonemperor')] arise and wash it all away."
 POD_persistentpodlore.desc.793364: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn an ever changing world, even the most zealous of lunatics will fall before the might of logistics and supply. Part of the success behind the Serpents was not due to their own individual power or skill in battle, or zeal for their master in the Hell of Wretched Magic, but rather, due simply to having someone who can properly manage the flow of coin.\nAnd such an art is one Oudom finds comes naturally.\n\nOudom in his mortal life was simply a merchant, taking the dangerous profession of moving goods throughout the potentially pirate or bandit rich wilderness to reach isolated towns and hamlets. The wealth of abundance that his homeland had offered many opportunities for him though, so he took the dangerous routes.\nAnd all for the sake of his home village on the Mekong. Unfortunately for them though, as Oudom plied his trade, he made the mistake of insulting the wrong man. Seeking to humiliate him utterly for the slight on his pride, he had every caravan and every line Oudom had attacked, so he could watch and mock him as he fell into poverty.\nAnd finally, as Oudom made one final trek with goods, he was ambushed and captured, and beaten to death with lead coins to mock him. And such a death would send him into the Hell of No Money.\n\nThe experience broke Oudom, who simply laid in the dirt and accepted his place as a new begging devil. And for an unfathomable time to him, finally, he had enough scraps to crawl free. But the first to find him was the Serpent Sovereign, who recognized the intellect he had and took him in. He offered him a place he could actually use his mind, manage all the coin and trade of a new world, have the comfort of a liege who would protect him, and a lover who would never abandon him.\nOudom, having endured the shame of poverty made hell, simply never wanted to suffer that, and readily accepted."
 POD_persistentpodlore.desc.793365: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAs a boy, all Khamxay wanted to do was raise animals and make friends. And the world would break him for it, all for a single sin.\n\nKhamxay was born to a small village, as the son of the family that often tended to the majority of the oxen. From his youth, he was a cheerful and honest soul, and loved to care and play with animals.\nHe never wanted the spotlight, and was simply content with what he had. However, his life would sent into a spiral when a man wanting his family's oxen offered to marry Khamxay to his daughter.\nHowever, Khamxay simply wasn't interested. He didn't want to potentially worry about losing his animals.\n\nUnfortunately, the man took the refusal as a slight, and in the night, as Khamxay was tending to the pens, set fire to it killing Khamxay along with most of his family's animals. And in the confusion of death, he found himself in the horrors of the Hell of Upside Down Sinners.\nTerrified and simply wanting it to stop, he begged and prayed to anything that would listen. He would slowly learn the inverted rules of the hell though, and defying all mortal logic, trusted a snake.\nHe followed it back to the world of the living, to a master. The pale snake that found him properly brought him back to a degree of lucidity, where it offered him a deal - serve him in mind and body, and he would have his soul's rewards in the next world. Use his candor and friendliness for him, and know greatness.\nJoin his haven and his consorts, and never know the threat of danger again.\n\nKhamxay took the offer the moment Amphai had finished the proposal."
 POD_persistentpodlore.desc.793366: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nHer homeland overrun, the ancestors waning, and new blasphemies running rampant. Its enough to drive men and women mad. But all of them forsake that which may elevate them to greater heights. And Thiri will not forsake those who stand with her, in life or death.\n\nOnce a disciple of Dyanang, Thiri was, once upon a time, an Acolyte of the Thrashing Dragons. However, her path was at many times fraught with going too far into the world of the living.\nThiri at her core still deeply cared for the echoes of her mortal life, and the more rampant excesses of other Thrashing Dragons disturbed her greatly. Their aspirations of turning her quiet home into a grisly whirlwind of sex and violence, the decay of the courts, and at times deeper introspection into paths called heretical by the foreign overlords, Thiri had finally had enough.\n\nBreaking contact with the Scarlet Phoenix Court, she called upon all disciples she could. Their ambition was to set their home right, to throw off the chains of outside dominance and restore the family to the center. Such was her ambition. Such would be her path. And so it would be done.\n\nFuture Fate\nDespite some initial success, the decline of the Scarlet Phoenix Court and rise of the Golden Courts would see Thiri forced into exile, fleeing before Piyau's forces, who lumped her in with the [akuma|E].\nBut Thiri would bide her time in exile, before finally returning to try and pick up where she left off in Final Nights."
 POD_persistentpodlore.desc.793367: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nHad they simply let things be, Nanda would have been content to leave things be. However, as his home lies endangered and Devils and Tyrants alike scratch at the door, how could he not be driven to act?\n\nNanda was a man who came from nowhere when he was found by the Devil [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')] of the Scarlet Phoenix Court. His past a haze, only guided his morals and the traumas of the Hell of Boiling Oil, he tried to adopt the Thrashing Dragons as was expected of him, but a part of him simply just didn't get it. None of it made sense, to forsake the gift that was humanity.\n\nIf the Hungry Dead were damned, why should they forsake humanity then? All these questions haunted him, and when he made these questions, they responded not with reason, but rebuke. It is little wonder then that he immediately threw in with Thiri in her campaign to restore proper rule under the embrace of family.\n\nThe two became incredibly close, and chose to affirm their dedication to family by building one of their own. Where she guards and leads the house, he takes the arms and leads their new family to war against the foreign demagogues and wicked devils that assail their homes.\nUntil the stain is wiped clean, he will fight."
 POD_persistentpodlore.desc.795041: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nEven among the Hells, the Hell of Being Skinned Alive is a particularly nasty one. All who escaped its wastes have special enmity from their former jailer. And so Wu Lishan, since her flight from its horrors, has hidden behind a web of connections at the heart of Chang'an, using the apparatus of the Yellow Emperor Court as the ultimate shield.\n\nIn life, Wu Lishan was the wife of a minor noble, who in particular loved all the benefits that came to being the wife of a man of wealth. Extravagant and loving things of beauty, she hungrily squeezed his lands dry of more luxuries to enrich herself with.\nBut such things bring enemies of course. When her husband drove a family to homelessness, their cook, the brother of the mother of the family, poisoned them all, and Wu Lishan was humbled and stripped of all her nothingness of wealth by iron laced sands.\nBut death imparted lessons, and through skilled use of poisons, was able to poison her jailers in escape.\n\nBut that was long ago, and now Wu Lishan is an Ancestor among the Yellow Emperor Court. She was the driving force behind the Amber Wren's shift to mercantile pursuits, acting as the main financial arm of the Court.\nShe promises more and more as various ventures enrich them, but her attention is spreading thin. She will have to be canny and capable to be able to balance the finer details of the court while avoiding the omnipresent fear of Hell coming back for her.\n\nFuture Fate\nMuch to her horror, the Yellow Emperor Court was only a single assassination away from imploding. The ensuing chaos destroyed her chains of supply, and as she was unable to foot the bills, numerous debtors came to collect.\nAnd such, in all her fear of the Hell of Being Skinned Alive, she was sent into the final void, stripped of all her wealth once more."    
 POD_persistentpodlore.desc.793368: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the Amber Wren within the Yellow Emperor Court, one of their members is rarely seen. Their supposed center, the ties that bind them all. A core that never leads, a guiding force that lends them their heart, and uniter who seems to shunt the open areas.\nAnd yet, the kind Hungry Dead with the face of the old lady is the foundation upon which the accomplishments of the Amber Wren stand.\n\nJingyi was always old at heart. Quiet and kind, yet meek and supportive, she is the friend everyone wants yet never sees. Overworking herself in life straight into the [Glossary('Wicked City','podgloss.wickedcity')], she moved on further into the world of undeath with the same degree of earnest support for her new companions, the locus of her purpose.\nShe was fast friends with all of them, the shoulder they could cry on and the ear that could never turn them away. And even if she was often enabling, she was a critical source of advice for them all, and the binding glue that held them all together.\nAnd as the [Glossary('Anda','podgloss.anda')] draw closer, her ironclad support of her [Glossary('Wu','podgloss.wu')] will be needed now more than ever.\n\nFuture Fate\nThe ensuing chaos of the eventual crumbling of the Yellow Emperor Court would strike the Amber Wren harder than most of the old ruling class.\nAnd as Jingyi traveled to try and rally her companions, a Black Wind fell upon her, and she was sent to the final void as ash on the wind."
 POD_persistentpodlore.desc.793369: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn a time of warriors, it is little wonder that so many [Glossary('Wu','podgloss.wu')] are assembled for war against the [Glossary('Anda','podgloss.anda')]. And yet, to just send Devils to battle against the scourge would see their numbers bled away. So they are outfitted, armed, and connected through a complex military logistics network that could put many to shame.\nTaking the teachings of the sages before him, Xue has mastered those lines.\n\nHis mortal life shredded by the torments of [Glossary('Kakuri','podgloss.kakuri')], Xue remembers little of mortality. When he escaped the Hell, he did so into the teachings of Sun Li.\nInternalizing her teachings, his own placement among the logistics network of the Amber Wren was obvious. While they handled messengers and information, it was Xue who handled the military side of things.\n\nAs the Yellow Emperor Court rallied forces against the [Glossary('Anda','podgloss.anda')] and [akuma|E], they were armed and threaded together by Xue's networks. His intense attention to detail with his furious demeanor for ensuring the enemies of the returned devils were destroyed saw him rise far.\nAnd in times like these, men with the zeal to punish the wicked and mentality to organize them can go far.\n\nFuture Fate\nThe collapse of the Yellow Emperor Court and ensuing chaos of its northern forces caused many of Xue's information networks and logistics chains to be pushed to their breaking points.\nHowever, he held firmly to them out of a dogged desire to keep the fight going. And while the [Glossary('Anda','podgloss.anda')] would find his hiding place and see him destroyed, his robust systems and institutions would survive the war and be reborn among the Quincunx."
 POD_persistentpodlore.desc.793370: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the Dhampyr of the Yellow Emperor Court, many speak of a Godfather, a figure of immense wealth who approached all their mothers, offered them the chance to be something greater, and then came back to breath life back into their children 9 months later.\nThese are a storm of rumors Lian is quite proud of. Especially when nearly all of those Dhampyr are actually his.\n\nBoth in life and death, Lian has always listened to the baser whims of his body, so much so that the Hell of Salt and Iron was all but a certainty to him.\nAnd when he escaped and was brought to the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')], even as a Devil, they knew he would be a Thrashing Dragon.\nAnd within a year of his return, he had already fathered many Dhampyr. And in time, he would actually put his children to use for the Court, not as retainers, bodyguards, or other vanities, but as couriers.\nThe foundation of the Amber Wren's information network is the fruit of Lian's loins. And as more and more couriers are needed as the influence and need of the Yellow Emperor Court's services, Lian finds further purpose in making more eyes and ears for the Amber Wren.\n\nFuture Fate\nDue to the personal loyalties he cultivated, among the Amber Wren his contacts remained rather secure when the Yellow Emperor Court crumbled.\nIn fact, as the disparate elements of the Courts united, they did so on the foundation of his children.\nAnd when the Quincunx was formed, Lian for the most part stepped away from power, becoming a respected ancestor, and eventually ascending to the [Glossary('Hundred Clouds','podgloss.hundredclouds')]."
 POD_persistentpodlore.desc.793371: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nGiven the massive volume of both established and forbidden works of literature that are known to the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], it is little wonder they have entire markets within their world of night dedicated to them. And among the most time honored seller, is the venerable Jianhong of the Amber Wren.\n\nJianhong was the second one of his [Glossary('Wu','podgloss.wu')] to escape Hell, where he seemed to have a fanatic desire to cling to knowledge. Seeking every book he had and committing them to memory, there were few things he didn't read among the known great works among the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\nAnd as his [Glossary('Wu','podgloss.wu')] began to focus on communications, his own blatant candor earned him a great deal of trust among prospective book buyers. And as more and more esoteric works found their way into his collections and exchanges, he also earned something of an unspoken reputation to be willing to transport any kind of material, including infernalist texts taught by [akuma|E].\n\nAs a follower of the Song of Shadows [Glossary('Dharma','podgloss.dharma')], he was granted a greater deal of leeway and trust. And despite the ongoing war, now more than ever many [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] seek enlightenment and wisdom among their forebears. And Jianhong is more than willing to supply them.\n\nFuture Fate\nDespite his own archives being largely ignored by the [Glossary('Anda','podgloss.anda')], the destruction of the Yellow Emperor Court also shredded his protections as well.\nEventually, a single mistake by taking an order for a copy of the Broken Winged-Crane to the Golden Courts would prove his demise, as he was eaten whole by the Devil-Eater, a disciple of Piyau, for 'spreading Infernalism'."
 POD_persistentpodlore.desc.795042: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nAs the precious printing blocks of the literary foundation of the Yellow Emperor Court is threatened, there does exist a protector. Frail and anemic, they simply sit at a chair in the back, lost in thought. But the moment a devil dare sets to mischief, the pale Bone Flower rises, and sends them back to hell with a vengeance.\n\nTan Xuan is a very old member of the Wan Xian, and overall a rather studious disciple of the ways of the Bone Flowers. Quiet, contemplative, and by and far incredibly possessive of his things, he seems to have walked away from the Hell of Being Skinned Alive with a fanatic covetousness of that which he sees as his and wanting to immortalize his works.\n\nHe was an easy choice to be put in charge of the [Glossary('Wu','podgloss.wu')] that oversaw the literature and reproduction of the foundational works of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. But as more and more attacks are plaguing them, Tan Xuan is beginning to refuse to speak to Hongben's sycophants, and wants nothing to do with the other Courts unless they do something about the people ransacking their archives.\n\nFuture Fate\nInitially, Tan Xuan would celebrate Hongben's assassination, seeing it as a kind of justice for doing nothing. However, the chaos of the collapse would prove to be his undoing, as he was eventually found dead, every printing block he owned shoved into every orifice he had with great difficulty by an unknown assailant."    
 POD_persistentpodlore.desc.793372: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nHuai has seen a great deal of work in this age, especially among his field of expertise. As the Black Tortoise Court burns with its [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] scattered in flames, and the [Glossary('Anda','podgloss.anda')] thrash on the northern door of the Yellow Emperor Court, Huai simply details and reports, records and delivers. Without judgment, without thought, he is the perfect reporter and scribe as the North burns.\n\nHuai is... strange, even among the more focused Illustrious Scribes. With little interests past writing, calligraphy, and documentation, he seems to have little fire for anything.\nAnd yet, when it comes to his printing blocks and documents, he approaches it with such fervor and vigor it would make it seem he was a passion bloodflower in an orgy. And then, once finished, he goes back to meditation.\nIn one instance, he didn't even flinch when an arrow was shot through his legs to get his attention, as he just kept writing, blissfully unaware as he composed his reports on the destruction of a Black Tortoise Ancestor and a reproduction on the Commentaries of the Footprints in Blood.\n\nFuture Fate\nHuai would not be long for the world without the Yellow Emperor Court. As organized opposition against the [Glossary('Anda','podgloss.anda')] crumbled, a coterie of [Glossary('Anda','podgloss.anda')] warriors would find Huai in his writings.\nUnlike jeering courtiers, their arrow wouldn't miss."
 POD_persistentpodlore.desc.793373: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt is a common hypothetical, that if a tree falls in the wood, does it make a sound? And for Zhizhou, he often asks himself the same thing. Or at least, if a scribe writes something that is never read, is it even written at all.\n\nZhizhou is the primary member of the Illustrious Scribe charged with transcribing, replicating, and forming printing blocks for the works written in the Scarlet Phoenix Court for the Yellow Emperor Court's reading.\nAnd yet, despite the immense worries he feels for the borderline infernalist writings, blatantly erotic and violent fiction, and heretical local traditions bleeding into things, for every book he has copied, he has written five inquiries and requests to send a force to bring them into line.\nAnd yet every time he tries to reach the Court, it just leads to the report being taken and set next to the growing pile.\n\nMore and more he feels he may need to act, may need to intervene directly. And as the Scarlet Phoenix Court crumbles more and more to ash, he feels that the time for reports may now have passed.\n\nFuture Fate\nSuch notions would come to be his doom. As Piyau begins her crusade through Nusantara, Zhizhou storms out of the Yellow Emperor Court in the chaos of Hongben's death, and directly challenges a local ancestor to oppose her.\nUnfortunately, in his haste, he ran right into the jaws of the Serpent King's Court.\n\nHis body was never found."
 POD_persistentpodlore.desc.793374: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite the assumptions of those less studious, there is a great deal of literature being composed by the Hungry Dead within the domain of the White Tiger Court. And given the complex process of sorting through the heresy and orthodoxy is an immense task that has broken many a scribe.\nBut the current one, Feishan, has broken a record in her position for the longest time served in her position without leaving it, going mad from overwork, or succumbing to the heretical works floating through the Eternal War.\n\nOriginally, Feishan was just one of many younger scribes working under the previous Tiger Scribe, before he had a mental breakdown and defenestrated himself into a canyon. Chosen by the rest of the [Glossary('Wu','podgloss.wu')] for her skill in making printing blocks, she was moved to the tedious task in his place.\n\nHappy to have a place, she took to it with studiousness and steadfastness. She would in addition add numerous commentaries in them, which became respected works in their own right. But as the situation becomes more complex with the [Glossary('Anda','podgloss.anda')], the work is slowly growing more and more overwhelming even for her.\nAnd in this coming storm, the willow tree itself may be uprooted in the wind.\n\nFuture Fate\nDespite the immense stress, complexity of the coming age, and chaos of the [Glossary('Anda','podgloss.anda')], Feishan would endure against the odds. In fact, her own work was critical in preserving the works of the August Courts into the Quincunx."
 POD_persistentpodlore.desc.793375: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThere is a threat in the Azure Dragon Court. From translating and copying their texts, it is obvious. But contrary to the beliefs of the main court that it is somehow the Uji, Junko knows better.\nSomething else, that they insist is of no issue. Those three eyed demons, flesh shaping monsters, nightmare wielders, shy shapeshifters, all of them.\nThey're a threat, Junko is trying to tell them. If only they'd listen.\n\nJunko is an oddity in the Yellow Emperor Court, as she isn't actually from the mainland. Rather, she was one of many to die in the Yamato War against the Emishi, slain by some horrifying relic of the barbarians who slew her in the night. It took her a long time to escape [Glossary('Kakuri','podgloss.kakuri')] Yomi and when she did she immediately got as far from them as she could.\n\nHer determination and zeal though earned her a place in the Scribes, where she seemed to be proficient especially in copying texts on the destruction of the Scions of the Thief. But as of late, as the [Glossary('Anda','podgloss.anda')] draws closer, Junko seems to be getting more and more agitated.\nShe spouts nonsense that they're connected to the same things that originally killed her, that they may also be connected to the strange dead in the South as well.\nWhile such theories are largely dismissed out of hand, she may be onto something...\n\nFuture Fate\nShe was. And for that, when the Yellow Emperor Court fell apart and she was no longer protected, a particular woman of the night from the same people she called barbarians paid her a visit, and taught her that even dragons may be eaten."
 POD_persistentpodlore.desc.795043: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nDespite the general lethargy of the Yellow Emperor Court, the [Glossary('Anda','podgloss.anda')] have yet to break it even despite their triumph in the Black Tortoise Court. One would wonder, how could they resist the fury of the [Glossary('Anda','podgloss.anda')].\n\nThe First Oni is why.\n\nWei Anzang is old even among the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. But he desired not power or a court, but violence. He was a killer and life and killer and death, and not even the Hell of Upside Down Sinners could change his nature.\n\nHis devils guard the interior, pressing the criminals in the night into service against that which scourges them. Numerous Hell Incursions were broken by his hand, and he has turned the [Glossary('Anda','podgloss.anda')] away many times.\nBut even he pushes his luck. He holds Hongben's court in near constant martial law, and while his weak willed patsies do little to stop him, blatantly securing artillery and impounded Bakemonos in hordes is at times a step too far.\nBut Wei remains resolute.\nThe center will hold. It must not fall.\n\nFuture Fate\nThe center fell.\nWei would try to maintain power at the court, but his own desperate bid for power would backfire horribly.\nThe intense concentration of his [Glossary('Wu','podgloss.wu')] and devils would draw the attention of the Demon Hunters, and Wei was slain by a single warrior armed with the fury of the divine with the demon slaying arts on his fists."    
 POD_persistentpodlore.desc.793376: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile most eyes fall on the leader of such an esteemed devil hunting force, within the Bronze Pennant itself, most of its junior members answer not to Wei Anzang. Rather, they see his second in command, his voice and his fury.\nA short man with an expression of a willingness to put his head through a brick wall if it means victory, Da'an is the foundational glue that binds them together.\n\nDa'an's mortal life was simple. An estate guard for a minor lord, and to the Demon City on his death. He escaped by tearing his way out, where he then adjusted quickly to being Wei's first and most fervent disciple.\n\nLess a warrior and more a manager, the Bronze Pennant is organized, armed, and supplied by Da'an. To speak to Wei, it is often through him.\nAnd in times like this, men like Da'an are always needed.\n\nFuture Fate\nDespite his position among the loathed Bronze Pennant, Da'an's skill in organizing [Glossary('Wu','podgloss.wu')] and combat parties would serve him well and earn him a place within the Quincunx, and he would recede quietly into the shadows, and ascend to the [Glossary('Hundred Clouds','podgloss.hundredclouds')] unsung but his work foundational."
 POD_persistentpodlore.desc.793380: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nNorthern China remains contested. The Black Tortoise Court had traditionally claimed it, the [Glossary('Anda','podgloss.anda')] run across it with wild abandon, and now the Yellow Emperor Court just now amasses a force to reclaim it.\nBut there was a collection of Courts always there. And Maedaeri cares not for who claims it. She is the one who rules it in truth.\nBut now they threaten her home. And this she will not tolerate.\n\nBorn among the Jurchen people, and dying and returning from [Glossary('Kakuri','podgloss.kakuri')], Maedaeri was considered strange among the Courts, as she did not align herself with the Black Tortoise Court, as many expected a nomadic woman to do so. Rather, she seemed to crave the more cosmopolitan South.\n\nBeginning as a warrior against Devils, she would become the Ancestor of the Hebei Plains, an interchange and gateway between the Black Tortoise and Yellow Emperor Court. But yet, despite her civic nature, she was a warrior, first and foremost.\n\nAssembling her [Glossary('Wu','podgloss.wu')] among other hardened souls of the Jurchen, she turned her home into a threshold. In truth, she did not trust the long term longevity of the Black Tortoise Court. Rather, she expected it would eventually fall to its decentralized nature.\nAnd ominously, she seems to be right. As Hongben's 'Lord of the North' orders them to fight, Maedaeri waits at the flanks of his impulsive armies.\nShe waits for when the time is right, using her goodwill as an ancestor to buy time. She waits for something. And the gates are about to swing open.\n\nFuture Fate\nHongben's death shakes the Yellow Emperor Court into its collapse, but all it does is unshackle Maedaeri.\nAs Li throws dozens of [Glossary('Wu','podgloss.wu')] to their death, Maedaeri becomes a force of wisdom and power in the Northern Wu of the Yellow Emperor Court and remnants of the Black Tortoise Court. When the time comes, she leads the vanguard against Dobrul's resting place, in an all or nothing attack.\nWhile she perishes earlier in the battle, her movements successfully punch open Dobrul's resting place, securing victory for the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] and eventual birth of the Quincunx."
 POD_persistentpodlore.desc.793381: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEvery visionary needs a right hand. And at the gates of what many [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] consider to be the army of the [Glossary('Demon Emperor','podgloss.demonemperor')], Wugunai holds that line for Maedaeri.\n\nOnce, Wugunai was just one of many countless Jurchen riders. He lived and died as one, an uneventful life without much of substance.\nBut the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] seemed to strike something in the marrow of his soul. His escape would lead him south, where he sought a visionary from his people. Maedaeri, the warrior, was the one he came to, and became her first disciple. And for that, he has become her trusted hand.\n\nWithin their domain, Wugunai oversees all who come through. The two, even within their [Glossary('Wu','podgloss.wu')], are sworn brothers and sisters.\nMaedaeri has made it clear for anything to be done to him, she will repay fourfold. And now, as the [Glossary('Anda','podgloss.anda')] draw closer, Li becoming more impulsive, and the Black Tortoise Court begins to descend into violence, Wugunai is tested.\nBut he cannot fail. Not when he serves under his best friend. He will see her cause through.\n\nFuture Fate\nWugunai would survive the collapse of the Yellow Emperor Court and later strike against the [Glossary('Anda','podgloss.anda')], but at great cost.\nMaedaeri giving her life for victory destroyed him, and even as the Quincunx formed, he simply waited at her court. Eventually, the hole in life became too much. He bid his goodbyes to his [Glossary('Wu','podgloss.wu')], and went outside, and waited to see the morning sun one last time."
 POD_persistentpodlore.desc.793382: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the Yellow Emperor Court, the North under Li has become disconnected, even from the [Glossary('Wu','podgloss.wu')] of the Amber Wren. But for that reason, the powerful Ancestors of Hebei have a personal courier at their disposal.\nAnd in a time such as the current nights, to be a courier in lands as divided and chaotic as these is often a death sentence. But the Warriors of Hebei have an exceptional one. And even among the Dhampyr couriers of the Amber Wren, Mutawuta is respected above all.\n\nA Jurchen courier in life, Mutawuta had died in a way many couriers do, as with the deliverance of bad news, he was boiled alive in anger by that lord. But the execution gave him a message of his own to deliver, and that Hell would not hold him.\nAnd he delivered it in blood to the lord that killed him.\n\nLater civilized by the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], he became a student of Maedaeri, serving as her voice even without access to the wider Yellow Emperor Court. Mutawuta became an utterly superb messenger.\nAnd now, at her request, he has been discreetly moving throughout the Northern [Glossary('Wu','podgloss.wu')], preparing for a united force in the coming storm. As she tells him, a confrontation with the [Glossary('Anda','podgloss.anda')] in China is inevitable. And they must be ready.\n\nFuture Fate\nMutawuta would enable the northern Chinese [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] to unite against the [Glossary('Anda','podgloss.anda')], his missives reaching all the right ears.\nHowever, his skill and reputation would make him threatening, and in time, he will be assassinated among the Quincunx, supposedly by the Dhampyr that once respected him, their father ordering this threat to them removed."
 POD_persistentpodlore.desc.793383: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt is a common stereotype among the Yellow Emperor Courts that everyone on the steppes is a horseman. While it is true it is helpful, not everyone prefers to fight on horseback, and some are just as dangerous as a mounted horseman on foot.\nAmong the Hebei Warriors, Mapo is proof of that claim. The beast of a man with his axe is feared among the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] of the north, his reputation and appetite for destruction preceding him.\n\nBut in life, his story was far less eventful. The spare son after the heir to a Jurchen chieftain, Mapo was a quiet, heavy, and shy kid.\nHe initially hated fighting, and largely was afraid of hurting others. And even as an adult, he was quite reclusive, and instead managed resources. But an accident while out riding led to Mapo's death, drowning in a river after a strike to the head. And in the Hell of Boiling Seas, being a bloated buoy for what felt like centuries was agony, before a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] saved him and brought him to Maedaeri for training.\n\nScared of being weak again, Mapo took to fighting like a fish to water. His hunger for battle and sustenance grew, until he became the titan he is now. Often, he is the muscle in Maedaeri's court, the one people think of when they hear of the Warriors of Hebei.\n\nFuture Fate\nMapo would ride with Maedaeri when she set into motion the destruction of the [Glossary('Anda','podgloss.anda')]. But much to his dismay, she demanded he stay and guarded their homes in case she failed.\nWhen he heard of her death, he was devastated, but fought to preserve her legacy as one of the founding voices of the Quincunx."
 POD_persistentpodlore.desc.793384: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the warrior courts of Hebei, many assume that they face every problem head on. And it is true, among their court, all are warriors. The political situation they find themselves in demands nothing less. And it makes those that die on unsafe roads from a single well placed arrow all the more tragic.\n\nSurely the whistling from afar is just the winds.\n\nSain is an enigma among the Warriors. A superbly skilled archer and falconer even among the Warriors, he is rarely ever on the front. Rather, he is always at the backline among his [Glossary('Wu','podgloss.wu')], his well placed specialized arrows slaying numerous threats, some even said to be tipped with the venom of the Emerald Mother's assassins.\n\nSome suspect he may have even been their kin in life. But the truth of the matter is between him and Maedaeri. In truth, he is an assassin, simple and plain.\nThe visage of a warrior is a convenient face. And in times like this, the subtle arrow is the deadliest one.\n\nFuture Fate\nIt is unknown what happened to Sain. Maedaeri gave him special orders to lead away an [Glossary('Anda','podgloss.anda')] deathsquad from their master's fortress.\nBut they could never find his spirit, so it is assumed he died. But in the end, he was successful in diverting the [Glossary('Anda','podgloss.anda')]'s black riders from interfering in Maedaeri's gambit. Mapo is sure that if he died, he died with a smile on his face and defiance on his lips, knowing they had succeeded."
 POD_persistentpodlore.desc.560126: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDữu Thúy, long in the shadows, watches as a Dragon dances in the clouds at the detriment to all below them, and another rises from the jungle in a thrash that threatens to bring the wrath of the earth upon them. As the Courts around her fall, what is a disciple even to do?\n\nDữu Thúy in life was a sex worker along the Vietnamese Coast, murdered in a payment dispute by her 'handler'. In the Pit of Salt and Iron, she was set to just more of her mortal life pushed to extremes.\nBut she was patient, and good with a whip both on her clients and on herself. In Hell, she learned that even in death, she was never more alive when awash with pain.\n\nUsing her enthusiasm as cover, she was able to convince a devil to let them do a session in the living world, where she promptly escaped to her freedom.\nFound and then civilized by Dyanang as one of her disciples, Dữu Thúy was a devout, if scary, follower of the Thrashing Dragons.\n\nBut that was then. And now, she stands at a crossroads. Her mentor has grown aloof and largely left the world behind, and [akuma|E] now run rampant.\n\nBut yet, a fellow disciple, Piyau, is more radical than even she. Dữu Thúy is torn, as the situation demands action. So she must act, lest she also fall victim to the Devils around her.\n\nThe question is, which Dragon should she side with?"
 POD_persistentpodlore.desc.793386: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] of the Echizen, few arts are as respected as that of the shaping of the tapestry of essence and life. Talismans leave their holdings in great supply. Mortal artisans find great work and respect among their members, and at the start of it all, lay its founder, the Life Sage.\n\nKasumi was born in the Asuka period, the daughter of blacksmiths in the Yamato Province. Her family was relatively well off... at least until the institution of the Taihō Code. Her father, despite being a locally respected figure, was not of noble birth, and thus under the new edict, he was stripped of his influence and acclaim he had.\nFor a time, he did resist against this, but the state wouldn't have it. When the capital was moved, he tried to bring his family to the new one to keep pressing his claim, but an altercation with the guards escalated, and Kasumi was stabbed in the throat by a guard.\n\n[Glossary('Kakuri','podgloss.kakuri')] was horrible for Kasumi. When she escaped, she found herself desperately seeking to and clinging to life. She wanted nothing more than to live, to make, to shape. The cold of death scared her more than any other. While most of her clan would be noble Cranes or resolute Shadows, Kasumi would thrash out of fear of [Glossary('Kakuri','podgloss.kakuri')]. She maintained contact with the mainland, shaped and made, and soon others gathered around her.\n\nIn her dance of artifice, she built a whole clan. And in her interest in visitors, a cold skinned rebel would take her heart. Unknown to most, the Echizen tolerance of the other Blood Drinkers in Japan was not born of practicality but of love.\n\nFuture Fate\nKasumi would elevate her Clan further, but her time would run out. During the rise of the Tokugawa Shogunate, while she was dancing with her lover Yoshino, assassins of [Glossary('Mikaboshi','podgloss.mikaboshi')] would ambush her.\n\nShe was struck down but her lover, knowing Kasumi's fear of final death, gave her a mercy. Kasumi used her mastery of soul shaping, and coached Yoshino through a profane act, as Yoshino ate Kasumi whole, soul and all, tearing out her eyes and replacing them with Kasumi's, and finally, consuming her own eyes and taking Kasumi into herself.\n\nThus, the first act of a Kindred eating the soul of a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] was done not out of lust of power, but for love. And the new being would come to lead their lineage into a new night."
 POD_persistentpodlore.desc.793219: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nAmong the most feared servants of the [Glossary('Yama Kings','podgloss.yamaking')] are those that belong to [Glossary('Emma-O','podgloss.emmao')], the [Glossary('Shikome','podgloss.shikome')] Assassins. Inspiring slavish lust in those susceptible to a woman's charms and murderous rage in those with no attraction to them, with fearful mastery of bone arts and methods of assassination. Barring those that fled after hearing the words of a wandering monk in [Glossary('Kakuri','podgloss.kakuri')], none have broken free of [Glossary('Emma-O','podgloss.emmao')]. All save one.\n\nIn her mortal life, Yukio was a traditional actress of the precursor to Noh, renowned in her village for her voice. However, her life was short, and she was laid low in the night by a patron who drank the breath from her. And in [Glossary('Kakuri','podgloss.kakuri')], her singing to ground herself caught [Glossary('Emma-O','podgloss.emmao')]'s attention, who promptly sent his [Glossary('Shikome','podgloss.shikome')] to collect her and press her into his harem.\n\nShaping her to his desires, having her sing for his leisure and act as a siren to damned souls, and gratifying his baser desires for the [Glossary('Shikome','podgloss.shikome')], for a time, she was just another monster in [Glossary('Emma-O','podgloss.emmao')]'s militant harem. But however, Yukio hid the pieces of her soul in her voice, and when tasked to guard the Cave of Maidens, she slew her fellows and fled.\nFew trusted a former [Glossary('Shikome','podgloss.shikome')], but Kuro-sama, respected mentor of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] assassins, chose to take a chance on Yukio.\nHe saw in her eyes that rage, a hidden desire of vengeance for the defilement [Glossary('Emma-O','podgloss.emmao')] put upon her. And so, she has come under his wing, and is swiftly identifying herself as one of his best students.\n\nFuture Fate\nYukio would, in time, come to be the best assassin among a clan of assassins. Her drive for revenge becomes an unerring arrow of resolve, forming a [Glossary('Wu','podgloss.wu')] of similarly skilled assassins around her as the Koga's hidden hand.\nWhile a bad mission in Shanghai would tarnish her image, she learned from it and tempered her will further. She would strive to restore her reputation, having forgotten her drive. So she once again walks the path of the master assassin, seeking the final confrontation and liberating revenge that [Glossary('Emma-O','podgloss.emmao')]'s death will bring her."    
 POD_persistentpodlore.desc.793388: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite the long claims to the contrary, the Scarlet Phoenix Court has never been unified. No, that was merely just a claim by Dyanang. The riverlands have always opposed the Court's rule, and at the forefront of the various Shan, Karen, and Mon Courts, was the ancient Ancestor Solyna, the venerable master of the arts of fire.\n\nSolyna is from the far distant past of the Mon. Born in the city of Pegu shortly after its founding, Solyna for the most part had an average life, but a stray cooking fire cut it short when she was killed when her house collapsed in flames and sent her to the Hell of Burning Seas.\nDespite this however, Solyna embraced her death, and instead used the pitch of the burning seas as the means of her liberation, searing the flame into her soul and escaping back into the world as part of a wildfire. She was collected by the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')], but always found her an incredibly dauntless and stubborn soul to civilize. Far less concerned with enlightenment, she instead cared for protecting her home from outside influences, and would return to the place of her birth and become instrumental in building the first Mon Courts, where she rules from to this day.\n\nFuture Fate\nSolyna's dogged will for independence would come to be her grand war. While she would briefly accept pacification by Piyau, she knew Piyau was close to ascent.\nAs soon as Piyau reached the [Glossary('Hundred Clouds','podgloss.hundredclouds')], Solyna immediately resumed her war against the Burmese, this time in the form of Golden Courts Ancestor of Mandalay. The coming of the British will present her with an opening to finally seize the advantage."
 POD_persistentpodlore.desc.793389: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTypically, among the eldest ancestors of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], it is assumed that once they stand on the doors of salvation, they cross it. Those that stay behind are rare and borderline alien things to the mindsets of mortals and undead alike.\nAnd yet, within the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] offices of the Shaolin Monastery, there is one who has long stood at that pass, and yet refuses to cross, serving as a light at the end of the tunnel for aspirants.\n\nWuji is ancient, and from no renown in life or death. He doesn't even remember what Hell he is from, and some young aspirants whisper he may have even been one of the original Thousand Immortals. Wuji dissuades them from this, but nonetheless his tenure as one of the supreme authorities on the Fivefold Way since the ascent of Xue has been a central pillar of the Yellow Emperor Court's authority. Wuji has always had the ears of the leading ancestors of every court, and especially from within China he has always stood next Yellow Emperor Court.\nAnd even now, in these times of troubles, he holds the course. He does this because he knows if he panics, everyone will. So he remains a resolute lighthouse in this storm of chaos.\n\nFuture Fate\nWuji however can read the room. With Wang Hongben's assassination and the collapse of the Yellow Emperor Court, the ensuing chaos is so profound and terrible, that Wuji, seeing all of this, then closes himself off, and ascends to the [Glossary('Hundred Clouds','podgloss.hundredclouds')], leaving this the mortal world behind for good."
 POD_persistentpodlore.desc.793390: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn one wing of the Shaolin Monasteries, in the highest reaching tower, it scrapes high enough that the native Dragon Nests cause a regular soft falling snow. Facing north, it is ominous, as the Sage Lübing watches a storm that he feels may spell doom for the Courts.\n\nLübing is the second oldest of the Sages of the Fivefold Way, and the most enigmatic of them. A contemporary of Wuji, he and Wuji stood side by side as young [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], and Lübing even attests that Wuji rescued him from [Glossary('Kakuri','podgloss.kakuri')].\nUnlike many though, Lübing found an odd comfort in the cold, and found the cold bite of winter as a familiar friend and crucible of wisdom. And like Wuji, he remained even despite being fully capable of ascending further.\nTo that end, he preaches and gives sermons mainly on temperance and piety, factored in with stoic resolve and quiet patience. He is a paragon of all of these, and even with his even tempered sermons barely louder than a whisper, many students have found his ways intensely inspiring.\nHe has a darkness in him, but one that has made him all the stronger and to his students far more noble. And in times like these, that strength of will is in short supply.\n\nFuture Fate\nThe Sage of Snow would react to Wang Hongben's death with his classic resolute will. When Wuji ascended, Lübing simply set their affairs in orders, prepped the other Sages, and then retired to his balcony. And when the morning came, he was gone, having gone with his blood brother into whatever worlds lie beyond."
 POD_persistentpodlore.desc.793391: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor the vast majority of people, fire is a terrible thing, something that chars and maims, a thing that destroys and takes. But within the Sages, the Sage Hongjian is adamant that people remember what Fire is also used for - cooking meat, keeping you warm in the cold, making more fuel, and, to a more hidden extent, renourishing the land, as ashed fields are more fertile than ones unburnt.\nThat is his lesson. One that he learned quite directly in the Thousand Hells.\n\nHongjian's mortal life was once that of a pirate, but his time in the Hell of Burning Seas taught him many hard lessons. Leaving that life behind in his death, he was quickly noted as a prodigy of the Godbody of Flame, and his own wisdom and sagacity earned him a fast place among the Fivefold Sages.\n\nHe is destructive, but never in a way that annihilates. Rather, he creates to let new things rise, to be the grounds of other things of greatness. His passion is readily visible, as in his sermons, he tests his students by doing it while on fire, standing in a great brazier to show them his resolve.\nAnd now, as it feels like the whole world is on fire, he is quickly becoming a fast point of inspiration and piety.\n\nFuture Fate\nHongjian was shocked by Wang Hongben's death, but after his time to grieve and preparation before Wuji and Lübing, he faced this challenge head on.\nMany would have expected he would do well, but that came to an abrupt end, when one day, while conducting a mission to the degenerate lesser undead of Japan, one of them tackled him on the pyre, and scoured him away in a tempest of blood-flecked lightning."
 POD_persistentpodlore.desc.793392: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTo those who know only of the Sages of the Fivefold Way from how others speak of them, Renyuan seems like an impossible member. A handsome young man often seen lounging surrounded by his daughters fed choice cuts of meat and other delicacies and delights, he seems like the picture of hedonism, and not of sagacity. And yet this too is an assumption.\nAs of the Thrashing Dragons, few embody it more than Renyuan.\n\nRenyuan's mortal life was originally that of a monk, but that life never worked for him. His tenure in the Hell of Being Flayed Alive made him strangely... drunk on the sensations of pain and experience.\nBut with his escape, he seemed more eager to just be the body that always got torn to ribbons just to stagger back. But the teacher Kang Cho-lu took a chance on him, and found that his monastic training wasn't wasted. Renyuan chronicled every experience, in profound detail. He was a covetous, gluttonous and lustful cretin at times, but he did genuinely meditate on the experiences of life lived to the fullest, with the same degree of criticism and reflection of a Sage.\nAs such, he would be sent as an envoy to the Fivefold Sages, who actually elevated to one of their own as Sage of the Thrashing Dragons. And more practically, his numerous Dhampyr children became quite adept staff for their Monastery. His writings would become key pieces of study for young Dragons, assuming they could at least tolerate the smells, of course.\n\nFuture Fate\nRenyuan took the death of Wang Hongben with a strange degree of certainty and direct action, wasting no time having his lineage fortify their holdings.\nThey weathered the [Glossary('Anda','podgloss.anda')], and when the Quincunx reformed, Renyuan took pains to rebuild the great works of the Sages to their full splendor. However, as the Long Night turned to Modern Nights, he died as he lived, when a student turned out to be an assassin, and ate him in his procreational bed down to the last scrap of flesh."
 POD_persistentpodlore.desc.793393: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the four more well known Sages, there is always mentions of a fifth, albeit one rarely seen. Theorized by those who never see them to be a Devil Tiger to complete the auspices of their [Glossary('Wu','podgloss.wu')], many think they are an assassin who rarely teaches their ways to others unless worthy.\n\nIn truth, the Fifth Sage is most often doing the honest work of Infant Devil Civilizing. As they know a Xianbei Woman would be a walking scandal, Pusuwan hides from sight, even if she is no less equal to the rest of her [Glossary('Wu','podgloss.wu')].\n\nSeeking feral devils to civilize and be brought for training, she rarely does sermons because to her, meditation is action in it of itself. She doesn't meditate in a room for salvation, she does it by saving the existences of feral devils from destruction or falling into the hands of the Devil Kings.\nOne does not achieve heaven by sitting in a room doing nothing, it is done by tearing out the rot in the world by killing [akuma|E]. And from her offices in the Shaolin Monastery, Pusuwan organizes the various offices of the Devil Tigers to her war against the Devil Kings, having been changed forever by the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] from her mortal life as a forgotten Xianbei Chieftain's wife.\n\nHer sermons are not something preached, they are missions. Her books are not dusty texts, they are combat manuals for fighting Defiled. Such is what No-Shadow Raven taught her. Such is what she will teach her students.\n\nFuture Fate\nPusuwan would be the only one of the Sages to survive to Modern Nights. Protecting the monastery and organizing more and more missions, not even the troubled Modern Nights could break her. But now, as [Glossary('Mikaboshi','podgloss.mikaboshi')] rises higher and higher to that throne, the condition of the world disturbs her greatly. So she has begun investing to better mortal lives with welfare and support networks, opening a new battlefield in her everlasting war against the Devil Kings."
 POD_persistentpodlore.desc.793394: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn as a traditional worker of medicine in the days of Gaozu, Xilie's mortal life was defined by war. Forced to live through the fallout of the death of the Xin Dynasty and violence of the Eighteen Kingdoms period, Xilie's life was fraught with violence. All he wanted was an end to it.\nHowever, his life would be in vain, as over the course of the war, he was just one of many to die in the tide of violence.\n\nAnd in Lanka, realizing his fate was just unending violence, it broke him. He fled readily and as fast as his legs would carry him, begging for anyone who would listen. And someone did answer after a very long time. Qiang Ru, a young but canny devil, saw Xilie's intelligence as useful.\nSo, he offered him a deal, on behalf of... something else. Whatever it was, Xilie accepted readily and wholeheartedly. And brought to the world of the living, the quiet doctor labors in the shadows for his [Glossary('Wu','podgloss.wu')], avoiding the spotlight.\nSuch is his wish. Such was the nature of his deal."
 POD_persistentpodlore.desc.793395: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest of the Emerald Biers, Hemavati is the one that stands out the most. From the very edge of the lands where the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] dwell, Hemavati was born in the Kashmir region, the daughter of Dalits. Set out into exile as a child by the Ghaznavid invasions, she was among those displaced and sent into a long exile into Europe. But Hemavati died early, perishing just before the Wall.\nAnd for that crime, she found herself by some twisted joke in Lanka, where she was cursed to constantly live as a refugee in the violence of the Demon City.\n\nHemavati was always desperate for escape. Willing to do whatever it takes for the sake of liberation. And to that end, she found someone seeking others willing to do whatever it takes. The foreigner Qiang Ru found the desperate devil and offered her a deal.\n\nHemavati does not discuss the nature of that deal. But she took it. She needed her freedom back, she missed the open sky. She missed community, she longed for an escape from constant violence. And Qiang Ru gave that too her.\n\nSince then, Hemavati has been the Emerald Biers' prophet. She divines and labors as a storyteller, an agent of fate and destiny for the sake of the Biers.\nHow she has learned this is unknown, but the Wise Woman dares not tell. She doesn't want to endanger her lost freedom."
 POD_persistentpodlore.desc.793396: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nQun, like his sister Youwu, is a terrifying figure for those who meet with Qiang Ru. Standing at his side like an inverted shadow, Qun merely glowers at all those entreat in court.\nA terror with an implicit air of malice.\n\nIn life, he was radically different. Qun and Youwu were Semi-Identical Twins. And the both of them simply wanted a normal life. And yet, for the rest of their village, they were two freakish children that looked like ghosts, hated the sun, and were uncannily close, far more than a brother and sister should be.\nAnd eventually, as adults, when they showed no course of becoming more normal, the twins were accused of witchcraft. The twins tried to deny it, but their own panicked pain and sunburning from the sun for their albinism condemned them, so both were murdered.\n\nAnd for the anguish of their death as witches, they found themselves in the Hell of Wretched Magic. So both twins huddled together, doing the best they could to outlast it. And when Qiang Ru found them offering a deal, they took it. Readily and instantly.\n\nNow, Qun is content. As a bodyguard, he can have as close to possible normal life with his sister. Even as a corpse, and whatever his deal was, now he can at least be respected, valued, and treasured.\nAnd his loyalty will not go by with even a single stain on it."
 POD_persistentpodlore.desc.793397: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nYouwu, like her brother, is a menacing figure for those who meet with Qiang Ru. Standing at his side like a mirrored shadow, Youwu simply stares at all those who come to his court.\nA scourge with unspoken punishment for those who defy him.\n\nIn life, she was radically different. Youwu and Qun were Semi-Identical Twins. And the both of them simply wanted a normal life. And yet, for the rest of their village, they were two freakish children that looked like ghosts, hated the sun, and were uncannily close, far more than a brother and sister should be.\nAnd eventually, as adults, when they showed no course of becoming more normal, the twins were accused of witchcraft. The twins tried to deny it, but their own panicked pain and sunburning from the sun for their albinism condemned them, so both were murdered.\n\nAnd for the anguish of their death as witches, they found themselves in the Hell of Wretched Magic. So both twins huddled together, doing the best they could to outlast it. And when Qiang Ru found them offering a deal, they took it. Readily and instantly.\n\nYouwu has since readily and overjoyously been Qiang Ru's Master of Shadow War. She delights in this, having power and a sense of belonging in war and planning.\nAnd now with her brother, she has all she ever wanted in life. As the Emerald Biers elevate the Jade Court, she does so always smiling out of sight. And while within it, she readily wears the mask of assumed carnage."
 POD_persistentpodlore.desc.793398: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the Courts of the Night, one [Glossary('Wu','podgloss.wu')] existed at a precisely unique position of controlling the hands of mortal power. All of this [Glossary('Wu','podgloss.wu')], the Blissful Ice Daggers, actually come from Court Eunuchs. And oldest among them is one who transcended what 'he' once was to become the Goddess That Turns the Hands of State.\n\nYi'an was once an unimportant Eunuch in the service the Han Empire, but they had the mistake of being born in the worst time for such an occupation. While they entered the service young, so much so they never grew a beard, they were always just a figure in the background.\nBut when a different group of Eunuchs began to seize power, the cascading chain of events would lead to the vast majority of them being executed despite not even being responsible, Yi'an included, during the Massacre of the Ten Attendants.\n\nAnd when they woke up from death, they found themselves turned into a sex slave in the Pit of Salt and Iron. But, despite what so many would have considered the worst possible fate, the Eunuch felt strangely... liberated.\nPosing as a woman, they were able to convince several other enslaved to conspire, and they used that as a springboard for escaping Hell. And when the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')] asked for their name, Yi'an chose a new one, and embraced their assumptions of her femininity.\n\nYi'an would, over the course of her unlife, build her power in the structures she knew. She never bothered to heal away the changes she suffered, and embraced her new identity.\n\nThe Blissful Ice Daggers would become the main [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] bridge to mortal politics, as hidden sponsors of Eunuchs and using them for their Screens. However, as the Song wavers in the face of the Khan's march, Yi'an may lose her great works.\n\nFuture Fate\nYi'an's base of power would be destroyed by the Mongols, but not her influence. Despite the decline of the Eunuch class, Yi'an would reposition herself among sex workers and become a Madame, before, after millennia of patience and influence, she would ascend to the [Glossary('Hundred Clouds','podgloss.hundredclouds')]."
 POD_persistentpodlore.desc.793399: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn to the ethnic Qiang, Yuanheng was, in his youth, a rebel. And then, when that failed, a eunuch as punishment for his crimes. And then, in adulthood, an adept servant of state. And since he died from a bowel infection and his return from the Hell of Burrowing Maggots, the Financier of the Blissful Ice Daggers.\n\nYuanheng's life existed in the shadow of the Northern Wei. Born to the Qiang, his family frequently joined with rebels against them, and then later on he himself joined in with them.\n\nBut Yuanheng was just one of them who was caught and punished with castration. But unlike many other rebels, Yuanheng seemed to react to the ordeal as a kind of penance, and he tried his best to serve the state that, in his mind, rightfully conquered him.\nAnd when he died, he would have tolerated it, but the ensuing fate of Hell was not something he could stand. Storing as many special maggots as he could tolerate to barter for his freedom, he did eventually escape the Hell, and was then Civilized among the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\n\nYuanheng fell into Yi'an and the Blissful Ice Dagger's orbit soon after. He was canny with coin and quite good at controlling the flow of it, finding the Mercantile Devil Tigers to be an immense comfort to him.\nStudious and even tempered, he managed it quite well, alongside his cold disregard for his fellow man. And as he began to worm his way into the offices of the Empress' eunuchs, he used those veins of power to keep constant tabs on mortal politics, even in times as chaotic as these.\n\nFuture Fate\nYuanheng would see the destruction of the Song as a message, and he instead pivoted his stored wealth to mercantile pursuits.\nA relentless capitalist as he delved deeper into [Glossary('Dharma','podgloss.dharma')], he continues his money crunching to the modern day, his past as a Qiang Eunuch of the Northern Wei now all but forgotten in his mind."
 POD_persistentpodlore.desc.793400: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEven among the former Eunuchs of the Blissful Ice Daggers, in terms of their mortal accomplishments, few among them could surpass what Jiru had accomplished. A soft faced eunuch that had won the attention of the first Emperor of the Han, Emperor Gaozu.\nDespite the Emperor's own coarse attitude, the elegance and beauty of Jiru endeared him, and elevated him highly. And when Jiru went to death, for a brief moment, he was content with what he had accomplished.\n\nHowever, for a Eunuch who seduced and charmed his way to power, he was rewarded with the Hell of Boiling Oil. Only by offering to be the bed slave of a passing Rakshasa had he escaped after centuries of torment, this experience leaving him finding the touch of a woman foul.\nAnd when civilized, he was simply ecstatic to be free and have a chance to talk to others. And with his charisma, care for others, and willingness to let the past stay the past, he became the voice of the [Glossary('Wu','podgloss.wu')] that would become the Blissful Ice Daggers.\nWhich would be a place he'd excel in, as if his charisma could win emperors, it could surely win over their mortal attendants.\n\nFuture Fate\nJiru would view the destruction of the Song and their Eunuch Class with grief, as he did genuinely view most of the mortals within as friends.\nBut he would eventually try to move on. He would move along into modern nights trying more and more to smile, before fading into obscurity as the ancestor of a small town in Xuzhao, where he would disappear from the Quincunx's records."
 POD_persistentpodlore.desc.793401: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the Blissful Ice Daggers are known for their talents and connections as the controllers of Eunuchs, some bold [akuma|E] have assumed they are defenseless. Much to their dismay, one of their number has broken a great many number of devils. And all of this without sight.\n\nAnqi, unlike many Eunuchs, was not punished as one or took the position. Rather, Anqi was originally a buddhist monk, and a rather devout one.\nHowever, one day, as he was attending to his duties, he felt a sudden immense pain in his groin, and woke up to a man in the shape of a snake spraying venom in his eyes. And yet, in that sudden panic, he focused himself and threw himself against this monster unarmed, and against all odds, felled it before he succumbed to his wounds, and found himself in the Demon City of Lanka.\n\nWhen there, he still found himself mutilated and blind, but then, seeing it as a trial, returned to his meditations. Despite the Rakshasa's best efforts, they could not force him to violence. So, eventually, they simply gave him his freedom, by throwing this dogged pacifist out of the Hell of Violence.\nAnd then, with some initial assumptions by the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')], they simply placed him among the Eunuch [Glossary('Wu','podgloss.wu')], not caring that he lost his 'staff' to a snakeshifter.\n\nAnqi's role within his [Glossary('Wu','podgloss.wu')] is that of a protector. Having once used Martial Arts as a form of meditation, now it is supremely useful in protecting his [Glossary('Wu','podgloss.wu')] from Devils.\nAnd while he still does not kill, his presence alone protects them. And even despite his blindness, he is a terror without compare when forced to fight.\n\nFuture Fate\nAnqi largely was unbothered by the loss of his [Glossary('Wu','podgloss.wu')]'s main means of power. His meditation and duties to them held precedence.\nAnd eventually, through his dogged focus on his [Glossary('Dharma','podgloss.dharma')], he would ascend to the [Glossary('Hundred Clouds','podgloss.hundredclouds')]."
 POD_persistentpodlore.desc.793402: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nGiven the Blissful Ice Daggers' intense and thorough connection into the Eunuch Court culture, one would assume them for the most part to largely abstain from anything involving 'what they lost'. But to those who interacted with him, Rangneng feels like a tempest of anger and frustration over what he no longer has.\n\nRangneng in life was a palace guard, but very rarely was he doing his job. A serial womanizer and unrepentant playboy, Rangneng routinely romped and slept his way through the concubines. However, he was not a man of subtlety, and eventually, he was found out and sentenced to castration for his crime and put into the Eunuch service.\n\nTo Rangneng, this fate was actual hell, and within a month he would take his own life to escape it. Only to then find himself in the Hell of Salt and Iron, where his new tormentors relished in pushing him further into anger. And for centuries, he was there.\nUntil finally, after one too many torments, he snapped and bashed his way out, screaming for the world of the living, and finally caught by the Blissful Ice Daggers and brought into the fold.\n\nRangneng is an angry man. Incredibly so. Cruel, lustful with no outlet, and a man legendary for his grudges, he largely oversees the more subtle arts of the Blissful Ice Daggers, letting him have some outlet in tying off loose ends and silencing threats.\nAnd as more and more Eunuchs panic before the approach of the Mongol Forces, he at the very least has no shortage of outlets for his anger.\n\nFuture Fate\nRangneng largely didn't care when the Song Eunuch class was destroyed. Rather, as soon as he heard that [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] in Southeast Asia had discovered new flesh arts, he immediately ran as fast as he could for them, appearing before their leader and demanding they teach him how to restore his manhood.\nHis story ended as just yet another dinner for the [Glossary('Penangallan','podgloss.penangallan')] Wati."
 POD_persistentpodlore.desc.793403: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAcross the many toll roads and checkpoints across China, some of them have odd figures who collect various 'court taxes' and the like. Payments for protections, and punishments for those who don't pay it. Balanced out between key junctures but not enough to catch imperial attention.\nScattered throughout and within, extorting out a massive amount of coin. And as it flows, it enters the hands of the master of the Silver Lock.\n\nXinfu was always gifted with money. And always just as incredibly ruthless. Setting up various protection rackets as a teenager and then becoming the picture of a landlord. When his tenants could pay more, he always had reasons for them to pay it. When they failed, his thugs were always there to collect.\n\nHe only cared that their rent was paid. And when they complained that they couldn't afford food, he was generously offer them dirt. Needless to say, when he died of old age, he found himself in the Hell of Being Skinned Alive, stripped of everything and rendered bare.\nBut this did not sway him. He flayed off bits of his soul to bribe his way out, where he returned to the world of the living in short order, and promptly went back to collecting his rent.\nAnd from that base of power, he would found the Silver Lock [Glossary('Wu','podgloss.wu')], the main financial [Glossary('Wu','podgloss.wu')] of the Yellow Emperor Court. Xinfu paid what was due, and did so well. And thus, without much reason to question him, he is left to his own devices.\n\nFuture Fate\nThe demise of the Song, despite the upheaval, didn't disrupt Xinfu and his [Glossary('Wu','podgloss.wu')] that much. However, while his [Glossary('Wu','podgloss.wu')] would be scattered, he kept to his work.\nHowever, during the Chinese Communist Revolution, a mass of soldiers came to kill him. And he died just like any other landlord, and was sent screaming into final death."
 POD_persistentpodlore.desc.793404: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe havens of the Silver Lock are some of the heaviest and loaded vaults in China. Centuries of exploitation and tax harvesting is a tricky thing to protect, and yet, the Silver Lock has for the most part held.\nAnd to that end, they owe most of their success to Huaizhen.\n\nHuaizhen in his mortal life was a simple village guard, but died during a Jurchen raid into China. Horrified by the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')], he quietly bid his time and eventually escaped by posing as a range guard, before he fled out a gate into the world of the living, where he met his future [Glossary('Wu','podgloss.wu')] at the behest of the Ancestors.\n\nGiven his mortal life, Huaizhen was an easy choice to protect their wealth, and as it grew, he had to get better. Organizing their mortal screens, coordinating Dhampyr, and then later younger [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], he did all of that and more to protect their numerous hidden caches and vaults of wealth and money.\n\nFuture Fate\nDespite his incredible long term success, Huaizhen would perish for a mistake. When a Mongol raid took one of the caches, much to his shock, Xinfu was furious.\nConfused, he tried to get further questions, only for Xinfu to knock over a brazier and burn Huaizhen to death."
 POD_persistentpodlore.desc.793405: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAn important part of the Silver Lock's 'services' is protection. Armed guards on paying caravans, road patrols, and other means of control are fundamental to their long term success.\nFor the most part, this is done well and through an incredibly structured system, with well financed military grade protection, all financed by Juyuan.\n\nIn his mortal life, Juyuan was a treasurer for a guard post. Managing military finances was always something he did, and did well. Logistics was his strength, and even with poor funding, he worked small miracles through well usage of supply chains and foraging.\nHowever, such a role comes with dangerous hazards, and in a war he has long since forgotten, he was one of many casualties when the fort was pillaged, and one of the few who found themselves in Lanka.\n\nHowever, Juyuan could smell the pain on the wind, and while they were being corralled, he exploited errors in their counting, and slipped back to the world of the living. Collected and civilized, his mind for logistics made him selected by the Silver Locks, a role he would excel in. And to that end, his services are important now more than ever, especially as the [Glossary('Anda','podgloss.anda')] draw closer to China.\n\nFuture Fate\nJuyuan's destiny would not last long after that. When the [Glossary('Anda','podgloss.anda')] grew more present and Chinese trade shuddered with fear, Xinfu responded to Juyuan's warnings of needing to slow down by ripping off Juyuan's jaw and beating him into a smear of muscle and pulp."
 POD_persistentpodlore.desc.793406: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor a master of assassins, being unnoticed is a boon. In the hidden caches and bases of the Silver Lock, there are people who speak of a fifth member, but few see them. In truth, Fengji just sees little need to interact with others. He hates conversation anyways.\n\nFengji has been angry his whole life. Born of incredibly short stature and made a mockery of by his own parents, he envied the love his sister got. He wanted it desperately.\nAnd yet, when they grew up and she was married off, his parents treated Fengji horribly despite being the heir. Never marrying due to his inability to find a wife, he became deeply bitter and angry, lashing out regularly while shutting himself away.\n\nAnd so that was his life, dying old, alone, and unloved, to then wake up in [Glossary('Kakuri','podgloss.kakuri')]. At least for his sake, his contempt for the world was so powerful not even the unnatural beauty of the [Glossary('Shikome','podgloss.shikome')] could stoke his lust. So he instead captured one, forced her to show him out, and then cut her to pieces and force fed them to another sorry devil before escaping.\nAnd with his anger and subtlety, his Ancestors put him in the Silver Lock [Glossary('Wu','podgloss.wu')]. Now, at least, he has outlets for his anger, organizing murders and abductions for enemies of the Yellow Emperor Court and the Silver Locks, for the first time in his life happy to at least be valued and respected.\n\nFuture Fate\nUnlike his contemporaries, Fengji thrived in the plethora of targets that the [Glossary('Anda','podgloss.anda')] invasion provided, and his services as a spymaster in the post Yellow Emperor Court world.\nAnd in time, his transcendent understanding of assassinations would see him ascend to the [Glossary('Hundred Clouds','podgloss.hundredclouds')] through the path of the Talons."
 POD_persistentpodlore.desc.793407: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt is said that war is a crucible for innovation. Such has been seen through countless points by the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], where centuries pass with nothing happening and years where centuries happen. And to that end, in this time of war, they have recruited a former engineer to help guide their investments.\n\nChujun was, from a young age, a rather bright, if naive, soul. Earnestly finding things like mathematics and engineering fascination, he longed and treasured investment.\nHowever, he died young, one of many to perish in the earlier phases of the Mongol Conquests. But his time in the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] was short, following a massive prisoner escape.\n\nConfused and disoriented, he was swiftly found with the others, but recruited even faster into the Silver Lock seeking someone to help them decide what projects to invest in. To that end, he is a young and earnest sage, hopeful for what the future entails.\n\nFuture Fate\nChujun would not be a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] for long. On his first venture, his lack of understanding in finance made him invest in a useless gunpowder smith, which cost the Silver Lock greatly. Chujun was punished accordingly, by being forced to eat as much gunpowder that could fill him and then lit on fire."
 POD_persistentpodlore.desc.793408: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn the village Yingmei was from, there were terrified whispers of the Broken Glass Harlot, a serial killer who was an artist with using broken glass to make the pain of her victims as drawn out as they could be. Eventually, the city guard found a single unifying thread, that all the victims had turned down the attentions of a minor serving woman. When they investigated further, they found in her house countless implements of surgery and glass panes.\nYingmei was rewarded as she deserved, going to death laughing.\n\nBut the Hell of Being Flayed Alive taught Yingmei a hard lesson. Being rendered and flayed for what felt like centuries, even a hardened serial killer could be made to repent. And when, entirely by chance, her bounds broke when she had fully relented, she had escaped.\nAnd found her way back to the world of the living.\n\nYingmei knows she deserved Hell. She was a monster. She was an attention seeking fiend who would kill for the sake of being ignored. Now, as the founder and leader of the Eternal Ice [Glossary('Wu','podgloss.wu')], she has become a renowned physician, seeking enlightenment through Healing.\nAnd in Ages like these, healers are in ever short supply."
 POD_persistentpodlore.desc.793409: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn times of troubles, the world has been no stranger to bandits. While many are forced to it out of desperation, few are more vile than those who do so for the sake of enjoyment. The rush on plundering the weak. The pleasure of taking from the weak and being strong. And Yu'er is adamant that she was one of the worst.\n\nBorn during the Warring States Period, Yu'er lived in a great time to be a bandit. As a child she loathed being weak, and was a bully though and through. When she was taken in by a local practitioner of traditional martial arts to try and temper her, Yu'er played the long game and instead used it as a means to grow strong.\nOnce she could beat her fellow students, she murdered them all in the night, slashed out her master's heels and left him to bled to death. She then took up the road of banditry, and enjoyed it immensely. At least until she was captured and executed by the Qin. And that is where her new story began, as she learned just what she had done when she was now the victim in Lanka.\n\nYu'er's memory of the time is hazy, but she knew she spent centuries in Lanka and ending up hating the mortal life that threw her there. Now, she has turned her martial skill into seeking enlightenment through attacking bandits in this time of chaos, and fighting in the Underworld to try and free it from its dictator's cruelty.\nShe knows she can only atone through action, so she fights now. Her path to redemption is long, but she is certain to walk it as best she can."
 POD_persistentpodlore.desc.793410: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile finding the actions of the conqueror Piyau to be madness is not an uncommon sentiment among the Yellow Emperor Court, for the most part, Piyau's disciples pay little mind to the more conservative central Court. However, one critic cuts deeper. Enough to sting.\n\nHuitong in her mortal life would have had every reason to follow their path. Born destitute, forced into sex work from a young age, and treated horribly, she by all means should see Piyau's path as a means of liberation.\nAnd yet, Huitong is also clear that such bitterness made her a hateful and empty shell. She poisoned indiscriminately, hated any she could punch down, and at times wished to simply reverse the situation and make a new kind of hell.\n\nAnd in the Pit of Salt and Iron, she saw the truth. Men forced to be monsters. Making men deny their humanity, making love a weakness, making tenderness a farce. The pains may be different, but for the [Glossary('Penangallan','podgloss.penangallan')] to say men have nothing but benefit is erroneous and false.\n\nSo she instead advocates to all. The voice of the Eternal Ice and the most bitter critic, her treatises are beginning to make waves, especially among the Kinfolk of the Beast Courts and men who wish to be soft and gentle. And as the influence of the Eternal Ice grows larger, even frost may potentially overtake passionate flowers."
 POD_persistentpodlore.desc.793411: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt is quite common among the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] for them to have done horrible things or be involved in things of great evil, either as a victim or actor. They all went to Hell of course. But upon hearing what Fumihito did, many could barely stomach to be around him. And only in the Eternal Ice did he find those that trusted that he earnestly wishes for redemption.\n\nIn his mortal life, Fumihito was a terrible bastard of a man. Angry, hostile, and violent, all of the village could tell how vile he was from the sounds from his house that were coming from his wife. If anything was imperfect, he responded with the same bloodied cane.\nAnd when she had a daughter, Fumihito was so furious to be denied a son, he drowned the child and sealed his wife in a cellar, where she perished. His death was equally miserable at least, as he died alone in the winter, as the rest of his village refused to shelter him out of fear for what he might do to them.\n\nAnd he was rewarded for his life with [Glossary('Kakuri','podgloss.kakuri')]. And it was there he found his wife again, now as a [Glossary('Shikome','podgloss.shikome')] consort of the Lord of [Glossary('Kakuri','podgloss.kakuri')], smiling holding that same bloodied cane.\n\nHow long Fumihito spent in [Glossary('Kakuri','podgloss.kakuri')] is unknown to him, but when Yellow Emperor Court [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')] found him, he was a blithering wreck, every ounce of cruelty beaten out of him.\nWhen interrogated, he was taken by the Eternal Ice, despite the protests of a visiting [Glossary('Penangallan','podgloss.penangallan')], who demanded he should be killed. But the Eternal Ice wouldn't budge, demanding that the cause they stood for demanded nothing less.\n\nFumihito has since taken to communing with the dead, doing all he could to resolve their lingering regrets and woes for the sake of atonement. And every day he remains haunted. And in these trying times, he knows he will be tested as he deserves."
 POD_persistentpodlore.desc.793412: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn times of chaos, it is not uncommon for one of the most worst trades to take place. That of the sale of the common man to others, in using the chaos of war to abduct those most vulnerable, to take them from their homes, put them in iron, and sell them to places unknown to be used for who knows what.\nAnd the men made collecting this 'commodity' extremely rich. And Benli was one such man.\n\nBenli made his mortal career as a state sponsored collector of slaves, routinely leading raids into foreign lands and collecting 'savages' to be taken as prisoners and captives either for chattel work or other dubious lifestyles slaves could be pushed into.\nBenli however realized that taking adults could be a hassle, so he specialized in abducting children, and became good at it. Some clients would want them for things he never bothered to question, and eventually, began taking jobs at abducting the children of rivals, marking them and disfiguring them so that they could never be traced, and sold away.\n\nSuch was Benli's life, until one furious mother found him when she recognized a birthmark on a girl with full facial burns when she was passing by a brothel to be her own child daughter. And Benli was punished properly for his crimes within the Hell of Upside Down Sinners, oscillating between madness and despair. His own self inverted, from a cold, greedy, and vain monster into a warm, giving, and overflowing with humility devil.\nBut he remembers what he did. He can't forget it. Now, he is a secret sponsor to slaves seeking to break free, making allies for his [Glossary('Wu','podgloss.wu')] among them so they have eyes and ears everywhere.\nMost of them don't know the soft and gentle person he is now would have in his mortal life exploited them so utterly. But he would have it that way. He likes himself far more now than he ever did as a bastard."
 POD_persistentpodlore.desc.793413: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\n "I am the Queen, the gatherer-up of treasures, most thoughtful, first of those who merit worship. Thus Gods have established me in many places with many homes to enter and abide in.\nThrough me alone all eat the food that feeds them, – each man who sees, breathes, hears the word outspoken. They know it not, yet I reside in the essence of the Universe. Hear, one and all, the truth as I declare it."\n\nSuch is what Shodashi teaches that the Descended would deny, that the spawn of Zapathasura would torment, and that the lofty heretics of the North would deny.\nThe self evident and radiant light of the goddess that they would deny.\n\nShodashi is old for the Hungry Dead, a contemporary of Shiva-Ohm. But where Shiva-Ohm would claim to be the son of the liar Sita, Shodashi does not deny she was mortal. She was born in Bengal, to a mortal man and woman, and lived her life as a mundane nobody, barely pious, overfocusing on the mortal world. And for that she was enlightened by the Hell.\nAnd for her wisdom, the divine essence of Mahavidya inspired her. A piece of divinity. A chance to be more. A chance to be greater. A chance to be as Gods, made righteous by the flawed understanding of morality.\n\nAs such, she took the name of Tripura Sundari, that which made her whole. And since returning to the world of the living, she has preached to unite the Goddess and make whole of humanity. Hell is broken. And by her hands it will be fixed.\nBut the lies must be ended, the sinners must be brought to wisdom, and the devils that plague the center of the world must be expunged. Reject duality and limitation, rise above it all and be as gods to set the world right. Such is her cause. Such will be her will."
 POD_persistentpodlore.desc.793414: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFrom the moment they first emerged from the Hells, the Chen family caught the eyes and ears of local ancestors. Rare was it that people escaped Hell in groups. Rarer still is it when people of the same family escape Hell in general. But a family that escaped Hell together? That is another thing altogether.\n\nThe eldest of the siblings, Chen Ming was outwardly cold, but held within her immense bravado and unflinching resolve. Tutored under Sun Li, the [Glossary('Infant Devil Civilizers','podgloss.infantdevilcivilizer')] initially were hopeful Ming would become a general like her mentor, but Ming was a quarreling student.\nTaking every opportunity to defy her teachings, they would have a falling out. However, Ming was still a student of one of the finest military minds, and her audacity to lead her [Glossary('Wu','podgloss.wu')] not as a Crane but a Centipede was a minor scandal, but Ming's skill in holding the South Western regions of the Yellow Emperor Court from Ravnos incursion earned her a great deal of respect.\n\nAt the moment, she is very much the head of the Sovereigns of Virtue, but largely by force of will. And in these trying times, those bonds of family will be tested.\n\nFuture Fate\nMing would eventually, after the war against the [Glossary('Anda','podgloss.anda')], be emboldened to folly. Seeing the success against the [Glossary('Anda','podgloss.anda')], she tried leading a similar initiative against the Kshatriya.\nAnd even as a student of one of the finest masters of war, she was not her teacher, and she was broken before the might of Chandraputra."
 POD_persistentpodlore.desc.793415: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFrom the moment they first emerged from the Hells, the Chen family caught the eyes and ears of local ancestors. Rare was it that people escaped Hell in groups. Rarer still is it when people of the same family escape Hell in general. But a family that escaped Hell together? That is another thing all together.\n\nThe second child of the family, Jiang is a personable but thoughtful soul. Having wanted to be a doctor in his mortal life, his second breath has revealed in him an incredible gift for the soul arts. Factoring in his skill for coin, he became the backbone of the Sovereigns of Virtue, financing their missions and objectives from their shared haven.\nDespite not being the oldest, he is often assumed to be in his candor. Given he is the emotional core of the family, he guides them and consoles his siblings where they struggle, reminding them of their shared flight from Hell to push them further.\nAnd to that end, here he remains to support his family.\n\nFuture Fate\nGiven the potential threat the Sovereigns of Virtue posed to [Glossary('Anda','podgloss.anda')] invasion channels, they were a special target. As he was overseeing new students, an [Glossary('Anda','podgloss.anda')] assassin force known as the Black Winds ambushed him, and ended his story there."
 POD_persistentpodlore.desc.793416: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFrom the moment they first emerged from the Hells, the Chen family caught the eyes and ears of local ancestors. Rare was it that people escaped Hell in groups. Rarer still is it when people of the same family escape Hell in general. But a family that escaped Hell together? That is another thing all together.\n\nA middle child, Hui seemed remarkably content with it. A scholar with a love for the sciences and stars, he also had a quick mind for chemistry and engineering. As he was civilized, he seemed to absorb himself in similar mysteries of the universe, studious to a rather uncanny degree.\nEven to his siblings, he rarely leaves his room in their haven, leaving his siblings to make sense of his studies and plans. But when they can, they show an underpinning brilliance and sagacity that has saved them many a time.\nHowever though, as the world thrashes around them, Hui may soon be forced to take action in a world that will force him to face it.\n\nFuture Fate\nWith Jiang's death, Hui was left incredibly lost in the world. He sought out the closest [Glossary('Wu','podgloss.wu')] he had seen reports of in his siblings' works, and went to the Emerald Biers.\nHowever, this proximity would later damn him, as when a horrible truth was uncovered about them, he would die like so many others in their court, as yet another dinner for the Devil-Eater."
 POD_persistentpodlore.desc.793417: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFrom the moment they first emerged from the Hells, the Chen family caught the eyes and ears of local ancestors. Rare was it that people escaped Hell in groups. Rarer still is it when people of the same family escape Hell in general. But a family that escaped Hell together? That is another thing all together.\n\nZhihao, among his siblings, has always been the biggest problem child among them. The second youngest, he responded to his [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')] restoring his sanity by breaking their noses, punching his teacher in the throat, and then trying to gouge the eyes of the Dhampyr attending him.\nA temper wild even for a Devil Tiger, Zhihao rages from one thing to another with all the grace of a wildfire, all the restraint of an explosion, and all the humility of an emperor with something to prove. His boldness at least makes him effective, but even his ferocity can be dangerous.\nAt the very least, his siblings can point him at the [Glossary('Anda','podgloss.anda')] for now, but once that threat runs out, there are genuine worries about whether or not they can direct their brother.\n\nFuture Fate\nZhihao would die shortly after Jiang would. With the core of their family gone, Zhihao charged after his killers like a beast possessed, deep into the heart of [Glossary('Anda','podgloss.anda')] territory, where he met his predictable end."
 POD_persistentpodlore.desc.793418: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFrom the moment they first emerged from the Hells, the Chen family caught the eyes and ears of local ancestors. Rare was it that people escaped Hell in groups. Rarer still is it when people of the same family escape Hell in general. But a family that escaped Hell together? That is another thing all together.\n\nYong, the youngest of the siblings, was assumed by the [Glossary('Infant Devil Civilizer','podgloss.infantdevilcivilizer')] to be a shoe in for the Thrashing Dragons for her beauty, but to their surprise, Yong wanted nothing to do with the pursuits of flesh or love.\nA quintessential student of the Eight Lotus Blooming, she is above all a sage, the spiritual advisor and compass of her family.\n\nShe is the only one that all can concur with, that can make the whirlwind of emotion that they are into a cohesive whole. And especially now, as they confide in her their worries and woes as the [Glossary('Anda','podgloss.anda')] draw close and China burns, she is tested more than ever. But she takes it in stride as best she can.\n\nFuture Fate\nYong would outlive all her siblings, but only for something much more tragic. Yong would briefly champion the Quincunx, but then withdraw to her meditations.\nBut in modern nights, she saw omens of a great threat, an army of demons marching. So she went to confront the one eyed devil she saw leading it. She simply ordered them to stand down. The Devil, the veteran of the [Glossary('Anda','podgloss.anda')] War and General of the Heaven and Hell Legion would not stand for it, and the now Great Ancestor of the Eight Lotus Blooming tried to strike down the General for her impudence.\n\nYong's corpse would become the first step on Ma Hai-Lan's rise to power."
 POD_persistentpodlore.desc.793419: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest disciple of Dyanang has been a wondrous ray of hope to many in the current time of decline of the Scarlet Phoenix Court. Despite being a man in the matriarchal Court, Sokkate has been embracing the Laughing Rainbow [Glossary('Dharma','podgloss.dharma')] with open arms and made it his own in record time.\nHis compassionate, curious and easygoing behavior make him a paragon of the teachings of the Thousand Crane Mother, the founder of this philosophy. This has made him an easy choice for Dyanang to handle the western reaches of the Scarlet Phoenix as he was a native of Burma.\n\nHis tenure as Ancestor has been less perfect than his Dharmic education as his laidback nature has left more ambitious regional Ancestors slip from his grasp. Still, for those more interested in exploring the passion of the Thrashing Dragons than in politics, there is no better place than Sokkate's court.\n\nFuture fate\nOffering no real resistance to Piyau's conquest, Sokkate will be presented with the same choice she gave to every male Ancestor. He will choose abdication instead of betraying his [Glossary('Dharma','podgloss.dharma')].\nRespecting his reputation (and his unconditional surrender instead of bloody resistance), Piyau will let him and his court leave unharmed. Sokkate will never be seen again after passing for the last time through the door of his palace, though his followers will swear that he ascended to the [Glossary('Hundred Clouds','podgloss.hundredclouds')] at that moment."
 POD_persistentpodlore.desc.793420: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhen hearing she would become the disciple of rising star of the Scarlet Court, Sokkate, Linlun was overjoyed. She saw a great opportunity to elevate quickly her own station, perhaps becoming an Ancestor herself way before her time. She was quickly disparaged of these notions. While Sokkate is certainly a diligent and kind teacher, he is a joke when it comes to politics.\nLinlun saw the Burmese Court splinters into pieces before her very eyes, her every suggestion to take decisive action being ignored by her indolent teacher.\n\nFuming at seeing her chances for power being wasted, Linlun has become the only true voice of dissent in Sokkate's court. Not that it means much, as said court is basically entirely composed of zealous Dharmic students that sneer at her "baser" concerns.\n\nFuture fate\nLinlun won't shed a tear when her teacher is ousted by Piyau Piyung. In fact, she will eagerly embrace the Passion Bloodflowers ideology, leading Piyau to appoint her as Golden Queen of Burma.\nLinlun overestimated her own political abilities however and she will never be able to completely subdue the regional courts. While moving her seat of power to Mandalay in the future will be a shrewd move, she will be blindsided by the coming of the British and lose her remaining political capital by that point."
 POD_persistentpodlore.desc.793421: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhen first chosen by Sokkate as a student, Wanna couldn't believe his ears. As a shy and unassuming young [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] still reeling from his time in the Hells, he thought the vibrant and exuberant Thrashing Dragons [Glossary('Dharma','podgloss.dharma')] would never fit him.\nHe was mostly right... but not as much as he feared. Truth be told, he still doesn't understand why Sokkate choose him as it's still obvious that this [Glossary('Dharma','podgloss.dharma')] doesn't come naturally at all to him. Progress is made however, and he is thankful for having been pulled out of the worst pains of early Dharmic experience.\n\nOutside of his own enlightenment, Wanna has become the unofficial administrator of his teacher's court as Sokkate himself has no interest in politics. While Wanna is happy to have something to do, he is concerned to see that his efforts basically bear no fruits as the regional Courts become more and more unruly. To his continued surprise however, Sokkate doesn't seem to care at all that Wanna is basically ruining his domain to the ground despite his best efforts.\n\nFuture fate\nAfter Sokkate's abdication, Wanna will ponder staying with his fellow disciple (and now queen), Linlun. Finding her to have become way too extreme for his taste however, he will instead focus on his [Glossary('Dharma','podgloss.dharma')] for the following centuries.\nWhile he will never reach the [Glossary('Hundred Clouds','podgloss.hundredclouds')], he will go as far as to join the esteemed Thousand Crane Mother's entourage and learn directly from her, something Wanna hope would have made Sokkate proud."
 POD_persistentpodlore.desc.793422: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nNarasingha was no one in his mortal life, even he would agree to this. He isn't even sure why he ended up in the [UmbraGlossaryLocalized('yomi_wan','Yomi Hells')] since he only committed small time larceny and never killed anyone. Whatever the case might be, his insignificance was his strength. The Yomi Guardians didn't even really register him and, as long as he didn't do anything stupid, they were happy to let him be and focus on more prestigious prisoners.\nNarasingha's escape was thus fairly uneventful, a far cry from the heroic tales of some other [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. His first nights back however were all but that.\n\nFound by the servitors of the "Goddess" Shodashi, Narasingha was suddenly taught that he was a god himself... and he didn't believe a word of it. He was however far too cunning to let it show and played the part of the eager student. He isn't sure if Shodashi believed his act but his willingness to listen and obey at least gave him a passing grade.\nNow Narasingha is learned enough in the ways of his [Glossary('Dharma','podgloss.dharma')] to rule his court full of sycophants and servitors eager to cater to his every whim.\n\nAnd so, while his Dharmic enlightenment is basically shunted, Narasingha's life has never been better. It is good to be a god."
 POD_persistentpodlore.desc.791542: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBy her own recollection, Eindra was content with her mortal life. A caring husband, many healthy children and a small remote village to live in. Thus, she felt a strong sense of injustice when she ended up in a [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')], thinking that she did not deserve this sentence at all.\nEindra wasn't prepared for the experience but she found something in her she didn't expect, stubbornness. She repeated herself (and to anyone who would listen) that her sentence wasn't fair and so never lowered herself to feel anything from her captors' torture. Finally, bored of this inflexible woman, they simply let her go.\n\nTo no one's surprise, Eindra didn't exactly thrive when she was pushed to become a Thrashing Dragon (like most Scarlet Phoenix Courtiers are expected to become). Too random and too fickle of a [Glossary('Dharma','podgloss.dharma')] for her tastes. While she didn't find a suitable teacher for an alternative, the Brilliant Coals variant of the [Glossary('Dharma','podgloss.dharma')] at least allowed her to vent her frustrations more easily.\n\nEven with the issue of her [Glossary('Dharma','podgloss.dharma')] settled, Eindra proved to be a somber, morose and mood killing presence in the exuberant and vibrant Scarlet Courts. As she was politically isolated, it was a given that she ended up basically exiled to the westernmost frontier of the Scarlet Court.\nA more than thankless job, as she has to be the gatekeeper against all the Indian heresies.\n\nSurprinsigly, Eindra soon learned to love that political exile. Her unflinching nature shines in a role where she is supposed to rebuke basically every attempt to cross the Scarlet border.\n\nFuture fate\nEindra will barely notice Piyau's conquest. Since her job didn't change, why would she care?\nFor their part, the Golden Queens will be more than happy to let their dour gatekeeper continue handling the frontier."
 POD_persistentpodlore.desc.791534: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn her mortal life, Raya was a priestess of Po Inu Naga, the mythical founder of the Cham people. She only has fond memories of that time, a stark contrast to her death that she has no recollection of. Since she ended up in Yomi, she fears that she did something so terrible that her mind chose to forget during the decades lost in Hell.\n\nWhatever the truth might be, Raya found a quiet strength and a continued faith in her goddess to help her endure Yomi. Underestimated by her captors, she took the first opportunity she found to escape.\n\nRaya took easily enough to [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] society, becoming a student of Dyanang herself and becoming instrumental in some of the Scarlet Court's successes, like its warm diplomacy with the Beast Courts. These achievements and her steady rise in [Glossary('Dharma','podgloss.dharma')] made her the obvious heir to Dyanang as she approached the [Glossary('Hundred Clouds','podgloss.hundredclouds')].\n\nThis changed in recent times. Raya seems to have found herself in a growing melancholy, some whispering that it is due to her strong attachment to her goddess and coming to the realization that she is the last one truly remembering her. Dyanang herself has tried to rouse her student, to seemingly no avail, forcing the Scarlet Court Empress to delay her own enlightenment in the fears of leaving the Court to an unprepared Raya.\n\nThe shrine maiden has only roused herself recently by asking to leave for Champa and become a regional Ancestor here, a request that has been granted in the hopes of rekindling her flame.\n\nFuture fate\nRaya will pose no resistance to Piyau's conquest despite the wishes of many at the court. After leaving Angkor, Dyanang will come find her and they will leave together.\nSome say to the [Glossary('Hundred Clouds','podgloss.hundredclouds')], some say to greet the sun one last time."
 POD_persistentpodlore.desc.793423: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe success of the Faces of the Goddess [Glossary('Dharma','podgloss.dharma')] has been one shocking and surprising for many ancestors. Despite its split from the Celestial Tribe and its place surrounded by enemies, it would surprise many to see that Shodashi's philosophy didn't burn away and collapse into flames.\nBut when they look deeper, they find that the fire that burned in one of her disciples was far hotter, far more wild. One that, if unleashed, could become a wildfire that could consume Devil and Goddess alike.\n\nShe remembers her mortal life in a broken haze of anger and frustration. Her time in the Hell of Salt and Iron was that of a toy that would fight the user, for the user's amusement, a fate humiliating and dejecting, but one that ignited the fire in her ever hotter.\nFinally, it grew out of control, and Bhairavi could stand it no longer. Breaking her limbs to escape her chains, clenching her jaw to powder to avoid her screams, fleecing herself to deny them a grip, she fled in a whirlwind of desperation and determination. She would not be broken.\nShe couldn't be. And as she fled, visions and hazes of a woman most beautiful ran through her tormented mind.\n\nAnd when she found herself back in the world of the living, it was Shodashi who found her first. And took her as her first disciple, for clearly Bhairavi had given her the spark of divinity.\nTo the red haired devil, this made sense. It worked. And to that end, she would be their fury. Their anger. She would be the Faces of the Goddess' Fierce Goddess."
 POD_persistentpodlore.desc.793424: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite being a man who once lorded over the Emperor of China, Li Jue became a mere historical footnote dwarfed by much grander men. A bitter, ambitious and cruel warlord, he was not very surprised when his ignominious death sent him to the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')].\nAs a minor "celebrity", Li Jue found himself part of the "Favored Ones" and seemingly happy to heed the [Glossary('Yama King','podgloss.yamaking')] [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s orders. In truth, Li Jue still took being ordered around as poorly as he did in life and thus used his (relative) position of prestige to escape.\n\nSent into the Black Tortoise Court to be taught proper [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] customs, Li Jue barely listened, seeing all of this as another form of the politics that costed him his power so long ago. In a way, this political isolation was his salvation.\n\nAs [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s influence spread in the Black Tortoise Court, Li Jue was able to see the signs and left the court after being targeted by an assassination attempt as the [Glossary('Yama King','podgloss.yamaking')] still held a grudge against his wayward general. Going to the most remote area under (on paper) jurisdiction of the Court, Li Jue was content to ignore the coming storm and live on his own. Things changed when Sagezhi came.\n\nThe fleeing youngling that painted herself a picture of Li Jue as a grand heroic figure that could save the Court stirred something in the tired warlord. Not compassion or duty per se, Li Jue has forgotten these notions a long time ago, but at least the feeling that there might be one last war in him worth fighting.\nIf it can get Sagezhi to stop pestering him and give [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] some more reasons to be angry with him then... why not.\nAs more and more Black Tortoise refugees gather around him, Li Jue wonder if, this time, he will make it in the forefront of the history books.\n\nFuture fate\nWhile it will be Sagezhi that will represent the Black Tortoise Court for the Quincunx treaty signing, it will be Li Jue that will strike the most telling blows to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s forces and holdings across the steppes, precipitating the fall of the [Glossary('Yama King','podgloss.yamaking')] in the 14th century.\nWhen Sagezhi will return to tell the good news, Li Jue will be nowhere to be found. While most would believe that a stranded servant of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] finally found their mark, Sagezhi will cling to the hope that the old grumbling warlord found his own twisted way to the [Glossary('Hundred Clouds','podgloss.hundredclouds')]."
 POD_persistentpodlore.desc.793425: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAs [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s influence over the Black Tortoise Court grew, so did his boldness. No longer satisfied with waiting for the souls of the dead to come to his realm, he started sending assassins to quicken the demise of especially interesting individuals. Such was the case for Sagezhi.\n\nA skilled tracker for her tribe, she was murdered in her sleep simply because [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] thought that one of his Hell tribes needed a little favoritism with such an addition. What the [Glossary('Yama King','podgloss.yamaking')] didn't account for is that it can be hard to track the tracker, even in your own realm. Thus Sagezhi waited, narrowly avoiding detection until she found a way out and jumped into it.\n\nThe return to Earth wasn't really a salvation for Sagezhi. Being fresh from the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')], she could easily see the signs that most of the Court were already in his thrall. That's when she heard of Li Jue, apparently a famous dissenter who left the Court a long time ago.\nAnd while he had no desires to be found, Sagezhi was still a very good tracker.\n\nHer first encounters with the warlord were... anticlimatic. An angry and bitter old man that threatened to punish her "insolence" were a far cry from what she heard. Sagezhi is stubborn however and, truth be told, was out of other options as simply giving up and letting [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] have his way were never a thought. So she persevered until, mostly by sheer annoyance, Li Jue accepted to rouse himself.\n\nSagezhi is now his second in command though, truth be told, she does everything not related to direct military matters. Her gregarious nature has made her a favorite among the Black Tortoise refugees and she is the go between them and her unwilling mentor.\n\nFuture fate\nWhile Li Jue will be the military mind, Sagezhi will be the only reason his unlikely coalition held for as long as it did. She was thus the obvious choice for representing them during the Quincunx' formation and, after his disappearance, succeeding the warlord.\nShe remains an influential steppe Ancestor to this night though her smile has faded a little.\nShe must admit she sort of misses the old goat."
 POD_persistentpodlore.desc.793426: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDokhor's Khan most favored ritual is the "Spiked Chains" where victims are bound tightly in Yomi-iron chains and hung from the stalactites in a great, windy cave for years at a time. Struggle to escape only make the agony worse, and [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] enjoys placing small files and lockpicks just out of reach. While he would never admit it, this torture technique actually cost [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] one prisoner.\nYangdai, an apparently unnaturally flexible young man, found himself enduring the Spiked Chains for less than two days before reaching a lockpick and escaping. Enraged, [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] made killing the escapee the priority for his [akuma|E] for several years.\n\nWith the Black Tortoise Court strongly in thrall of the [Glossary('Yama King','podgloss.yamaking')], Yangdai found very little shelter and possibility for Dharmic enlightenment. While he had considered going South, he was unaware of what could possibly await for him there since perhaps even the Chinese were in league with his tormentor. Thus he went North, going as far away from civilization as possible.\n\nIt was the lack of Dharmic tutelage that forced Yangdai to seek the company of other [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] once more. Thankfully for him, by that point, the Silver Blade Horsemen of Li Jue and Sagezhi were starting to take form and they were happy to welcome another victim of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')].\nStill quiet and reserved, Yangdai has been eager to take on the more stealthy missions needed by the group. He is actually one of the few to report directly to Li Jue instead of Sagezhi, the latter joking that a whole conversation between the two of them end up more often than not less than ten words.\n\nFuture fate\nYangdai will survive to see the fall of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], leaving a broken lockpick on one of the purified Dragon Nest. While he will mostly disappear afterwards, he will still visit Sagezhi infrequently, sometimes even saying more than ten words."
 POD_persistentpodlore.desc.793427: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBaohuoli had nothing to do with [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] and now he might be his most dogged foe.\nBorn and dying in a Siberian hunter gatherer tribe, Baohuoli wasn't a kind man and paid the price for it by entering [Glossary('Tou Mu','podgloss.toumu')]'s [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] on his death. Thankfully for him, [Glossary('Tou Mu','podgloss.toumu')]'s reach so close to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s playground was very weak and he thus was able to escape before being formally caught.\nHis return as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] was as uneventful as the minor Siberian Court where he ended up was small and isolationist.\nUntil [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s send his first "Blessed" [akuma|E] for a field trial on this weak target. The slaughter that ensued only left Baohuoli alive.\n\nMore of a cold and callous mind before this event, Baohuoli found a burning rage take him over and firmly shift him from a Bone Flower to a Devil Tiger [Glossary('Dharma','podgloss.dharma')]. He then visited most major Black Tortoise Courts and found only disdain, scorn or even violence when he argued for bold attacks against [Glossary('Dokhor-Khan','podgloss.dokhorkhan')].\n\nIt was during a battle against a "Blessed" [akuma|E] that Baohuoli was found by the Silver Blade Horsemen (and, even if he won't admit it, saved in the process). While Sagezhi was reluctant, seeing his wrath as self destructive, Li Jue accepted Baohuoli into his ranks.\nHe became a feared vanguard, being always the first to jump into battle. Sagezhi argues that his self destructive behavior and constant arguing for more and more aggressive actions is actually more of an hindrance to the group than a boon. This is however one of the few instances where Li Jue doesn't listen to her, apparently content to have a raging tiger to point at difficult targets that others wouldn't dare approach.\n\nFuture fate\nBaohuoli would, to the surprise of many, actually survive to see [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s fall. He will however argue strongly against joining the Quincunx as he felt that the Southern Courts did little to help.\nAfter an especially strong clash with Sagezhi, Baohuoli will disappear. The new uncontested leader of the Silver Blade Horsemen will launch an investigation without success though a dark twinkle in Yangdai's eye will give her pause..."
 POD_persistentpodlore.desc.793428: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMinggan never thought she would ride alongside a band of hardened veteran horsemen. As the bookish daughter of a minor Jin official, her biggest worry was dreading the day of her marriage. Something that never came, as she was killed during the anti Jin revolts of 1127.\nMinggan was woefully unprepared for the Hells of Spiked Chains and broke easily. It was only the act of compassion of other escapees taking her with them that saved her.\n\nHer introduction into [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] society was a revelation for Minggan and she read everything from the Great Sages she could get her hands on. This is when she found that the Court where she resided was basically flaunting most of these precepts and, when one of her teachers pushed a book she knew was forbidden into her hands, she understood.\n\nMinggan took the initiative perhaps for the first time in her life when she heard of the Court intention to crackdown on the nearby "heretical resistance". Jumping on the first horse she found, she rose ahead and warned the Silver Blade Horsemen of the impending attack.\nThis forewarning helped the Silver Blade mount an ambush and secured her a spot in the group.\n\nMinggan is quickly blossoming in her new environment. While their lack of decorum and disdain for court politics sadden her, she is teaching them many historically relevant facts and is actually serving as a mentor for Dharmic enlightenment to many, as she is one of the few with broad knowledge of them.\nShe never interacted with Li Jue but Sagezhi is proving to become a fast friend and something of a mentor herself for the more practical knowledge that Minggan lacks.\n\nFuture fate\nMinggan will chronicle the fall of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] and become one of the most respected teachers of the Steppe Courts. Her pull over many of the new generation will be instrumental in keeping Sagezhi as the leading force in the post Black Tortoise era for the region."
 POD_persistentpodlore.desc.793429: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMaoying never truly feel like she belonged. While this steeled her resolve and helped her escape the [UmbraGlossaryLocalized('yomi_wan','Yomi Hells')], it meant that her Dharmic enlightenment never really took root. Despite many teachers trying to school the obviously skilled and dedicated woman, she never really felt drawn to any specific [Glossary('Dharma','podgloss.dharma')]. She even studied some unorthodox ones (though she drawn the line at infernalist ones) to no avail. Then Shan Bo came.\nA diligent, if strict, Devil Tiger mentor, he managed to truly make a [Glossary('Dharma','podgloss.dharma')] seem appealing to Maoying. Thus she dedicated herself to become the best student there is. Thanks to her more practical nature compared to the very inward focused Shan Bo, she soon became more of an assistant, making sure that her teacher could provide for his many students and didn't step into political traps. Life was good, until Shan Bo changed.\n\nShe didn't know what truly happened but when her mentor started criticizing the [Glossary('August Personage of Jade','podgloss.augustpersonageofjade')] himself and talking of challenging him, she was horrified. No amount of debate or pleading could sway him however and she soon found herself before a choice. Fearing to lose the only place she truly felt was home, she silenced her concerns and "joined" her teacher's heresy.\nMaoying is now unwillingly managing Shan Bo's growing cult while hoping to find an out that can save her own soul.\n\nFuture fate\nMaoying won't even try to stop Shan Bo when he will depart in his journey to challenge the August Personage. When he, predictably, never come back, she will quickly disband the cult and go back to her own way.\nShe will become something of an urban legend to modern Ancestors, a drifting [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] that never found a [Glossary('Dharma','podgloss.dharma')] or a Court to belong. Her arrival somewhere will be seen as a sign of troubles ahead."
 POD_persistentpodlore.desc.793430: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nXingcheng was a member of a minor cult during his life. Not a true believer by any means, he used this relative power to get ahead by any means necessary until he was found out by a true believer and promptly dealt with. Finding himself in the [Glossary('Wicked City','podgloss.wickedcity')], Xingcheng adapted well, swindling the scavengers to improve his own station. The [Glossary('Wicked City','podgloss.wickedcity')] is much more resilient than a single con man can truly outsmart however and Xingcheng quickly understood that he would never achieve power and riches in there if he wasn't allowed to. And thus he used what he had achieved to escape instead.\n\nBack to the mortal world, Xingcheng became a fairly unremarkable [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], likely destined for a minor court position. If he was skilled enough to deceive some villagers and refugees from the [Glossary('Wicked City','podgloss.wickedcity')], Xingcheng was but a child compared to the entrenched Ancestors and thus his every attempt ended up only in him being brought low and punished.\nShan Bo entered the Court at this moment, followed by an entire group of his students ready to argue for the merits of his apparently mad teachings. Xingcheng recognized a cult when he saw one and enlisted on the spot.\n\nAt first, it was business as usual for him and he quickly gained some riches and respect from the more naive students of Shan Bo. But then something changed. He started truly listening to the master and enlightenment dawned over him. All of his life has led him to this point and Xingcheng can't wait to climb Mount Meru to question the [Glossary('August Personage of Jade','podgloss.augustpersonageofjade')] with his mentor.\nWhat a sight it will be! Him, the lowly con artist finally telling what's what to the most powerful entity of the Heavens!\n\nFuture fate\nOn the way to Mount Meru, Xingcheng will be executed when sent to convert the Ancestor Fu Hao and her Court."
 POD_persistentpodlore.desc.793431: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTooril has few memories of his mortal life. Considering what happened after, he thinks it might be for the best.\nEmbraced by a Gangrel that thoroughly thrashed him despite Tooril being a skilled brawler, he never saw his [Glossary('Sire','game_concept_Sire_desc')] again, being left to fend for himself as was, as he learned decades later, a custom among the Gangrel.\nTruth be told, he fared very poorly.\n\nBeing overwhelmed by his new condition as a vampire, Tooril became quite close to a mindless beast, listening to his inner demon way more than he should have. He became a local monster, killing indiscriminately passing tribes or settlements and, since the region was so remote, there was no other creatures of the night to stop him. Tooril fears that he might have wiped the entire population of his "kingdom" if not for the [Glossary('Anda','podgloss.anda')] arrival.\n\nWhile the bestial Gangrel was certainly a strong warrior, he was no match for the disciplined and more in control vanguard. While his story could have ended here, a respected ex shaman and now mentor of Via Yasaq, Kuchuguden, stopped the horsemen before they could kill Tooril.\nIt took months (and many fights for dominance) before progress was made but it happened. Tooril, schooled in the way of the [Glossary('Anda','podgloss.anda')], slowly regained control of himself and managed to keep his Beast at bay. While he was certainly very thankful for the help, there was still one thing left to consider, the price.\n\nTooril was sent back to his native Gobi with the mandate of checking for weaknesses in this rear of the Yellow Emperor Court.\nThe Gangrel is no fool. While they would claim it is a position of honor and an obvious one because of his knowledge of the region, Tooril understands that he will never truly belong to the Horde as a non [Glossary('Anda','podgloss.anda')] and, thus, is expendable.\nIn the end though, it doesn't matter to him. Discovering Via Yasaq saved him and he intends to repay this gift with honor, loyalty and zeal for the Horde.\nEven if he will always be a mistrusted outsider."
 POD_persistentpodlore.desc.793432: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the [Glossary('Anda','podgloss.anda')] are accustomed to shamans being strange at times, they still think Kuchuguden is downright weird. For his part, the mentor answers that he only follows Tengri's changing moods, gentle and cleansing rain in the morning can make way for a destructive thunderstorm at night.\nWhat is agreed upon though is that he is one of the most respected mentors of Via Yasaq and acts as a traveling teacher to the nomadic [Glossary('Anda','podgloss.anda')]. While he will always be welcome, only the truly enlightened (and patient) deliberately seek his counsel. It is more often than not the unruly neonates that are thrown his way in the hopes of his unusual teachings techniques having a result while others have not.\n\nKuchuguden doesn't have a blood brother or an arban (the [Glossary('Anda','podgloss.anda')] fighting forces) of his own and some of his detractors have taken this to mean that, while clearly dedicated to Yasaq, Kuchuguden might not be as dedicated to the [Glossary('Anda','podgloss.anda')] Horde as a whole.\nThey aren't too far from the truth.\n\nKuchuguden dislikes the militaristic path Dobrul and his successors have set the [Glossary('Anda','podgloss.anda')] on. While no pacifist, he sees no gains to be made by antagonizing their neighbors. It is not as if they could realistically wipe all the Demons of Xia or the [Glossary('Каиниты','game_concept_cainite_desc')]. Thus, at best the [Glossary('Anda','podgloss.anda')] will be embroiled into very long conflicts or at worst exterminated by their many enemies.\nHis lack of political influence makes his viewpoint moot in the grand scheme of things and he knows it. Thus, his efforts at schooling stubborn neonates (or even non [Glossary('Anda','podgloss.anda')]) are driven by the goal of having many former pupils that will hopefully listen to him when the time is right.\nKuchuguden doesn't want to betray his people so he isn't sure "when" the time will be right but he is confident that Tengri will send him a sign. He just hopes that he will be able to see it in time."
 POD_persistentpodlore.desc.793433: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSaryk was a lower member of the traditional Naiman tribal aristocracy when they were crushed by the then named Temujin. He was thus also part of the Naiman that choose Jemugha, Temujin's blood brother, as the "universal ruler" to oppose him. Jemugha had trouble building a lasting coalition to oppose his once brother and many of the aristocracy he pulled from ended up disappointing. Saryk was somewhat better, having at least a solid grasp on steppe warfare. It sadly didn't meant much when the Battle of the Thirteen Sides happened.\nWith Jemugha crushed, and seemingly killed, Saryk fled for his life to the Naiman of the Kara-Khitan Khanate. Despite the rise of power of his tribe in this region, Saryk didn't accomplish much more until he was ambushed one night. At first fearing his assailant to be a man of Temujin, he was even more shocked to see Jemugha, apparently very much still walking the Earth. Before he could react though, Saryk was dead and reborn as a vampire.\n\nJemugha took time to instruct his first childe in the little he knew about vampires and the [Glossary('Anda','podgloss.anda')] cause but it proved too much too quickly for Saryk. Still thinking as a mortal, the Naiman saw the real threat as being Temujin and didn't understand when he saw that Jemugha hold no grudge against him. His every suggestion to hamper the rise of Genghis Khan were scoffed at or met with disdain by the [Glossary('Anda','podgloss.anda')] and Saryk grew more bitter and isolated.\n\nNowadays, the Great Khan is finally dead but has become a legend to Mongols and [Glossary('Anda','podgloss.anda')] alike. As Saryk is still not keeping his thoughts on the matter to himself, he was ultimately sent to Gobi to "keep an eye" on the Gangrel Tooril. While clearly just an exile not saying its name, Saryk is at least satisfied to no longer be in the middle of people worshiping his one sided nemesis.\nAs his mood improves, he might consider even making an effort and helping plan for the attack on the Yellow Emperor Court from the rear."
 POD_persistentpodlore.desc.793434: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIbakha was a gregarious and energetic child in a tribe roaming Gobi. While she always considered it home, her mother passed away stories of her own mother who apparently came from another tribe entirely, one that has been wiped out by a terrible monster. Ibakha listened closely but ultimately paid it no mind, like most children do. It was not until she grew into a young woman that she wondered more about this story.\n\nIbakha had the troubling sensation of being watched by an unseen presence. While it wasn't happening all the time, it did occur enough to unsettle her. Talking with other members of the tribe only earned her gruff rebuttals, most not wanting to potentially attract the ire of the monster.\n\nThen, one day, her tribe lost a skirmish with another and she was captured alongside many of the non combatants. She didn't have time to be roughed up by her captors that a whirlwind of fangs and claws tore them apart and freed her.\nHer savior was a rough looking man who didn't answer most of her questions.\n\nTime has passed since then and Ibakha has learned (with difficulty) some things about Tooril. He only comes out at night, he is fiercely protective of her for some unknown reason (though she is starting to pierce the puzzle) and his blood has magical properties. When she fell ill, it healed her quicker than any shaman concoctions.\n\nTimes are changing however and Tooril can't kept Ibakha completely out of reach anymore. He has explained that others like him are coming to Gobi and that he has to prepare for a war.\nIbakha knows that, if she pushed a little more, he would likely answer her questions about who he is, what he is and what is happening.\n\nThe thing is, she isn't sure if she would like his answers."
 POD_persistentpodlore.desc.793435: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nVietnam is, compared to much of the rest of the night world, a warzone. The collapse of the Scarlet Phoenix Court has opened up both interested southern Hungry Dead warlords from Indonesia and Malaysia and northern sycophants of the Chinese Courts to hungrily eye and covet a region not their own. An insult Phùng Thị Chính will not stand for.\n\nChính was born long ago, in a time when Vietnam was being exploited by the local governor. The rise of many warriors, both men and women under the Trưng sisters to throw the imperial overseers out. Chính was one of many aligned with their cause, who came to fame as a specially gifted warrior who could not be stopped, even giving birth on an active battlefield and fighting with her newborn in hand.\nHowever, no matter how righteous their cause, the generalship of Ma Yuan saw their rebellion destroyed. And Chính, despite her bravery and strength of will, became one of many killed among those captured.\n\nChính however would not let her people's story end there. Rather, death taught her the danger of brazenness. In Lanka she became a phantom. In her escape she was a ghost.\nAnd returned through the world of the living, she briefly tutored under one who would understand, and then returned to Vietnam. That is when numerous ancestors installed by Dyanang met ignominious deaths, Wang Hongben's officials met gory ends, and Piyau's daughters of scandals found their last dances.\nFinally, as the Scarlet Phoenix Court crumbles, Chính steps from behind the curtain, asserting herself as an Ancestor who stands not for Dyanang or Wang Hongben, but for her people and the nation she once fought for.\n\nFuture Fate\nDespite the more brazen opening, Chính would play politics close to her chest and be wary of everything around them. When Piyau was revealed to be outright unstoppable in her conquests, she negotiated assisting with [akuma|E] hunts in return for unprecedented local autonomy.\nAnd into modern nights, her own take on the Golden Courts of Vietnam will flourish where others didn't stand the test of time."
 POD_persistentpodlore.desc.793436: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOng was used to living between two worlds. The daughter of a Chinese trader and a Korean merchant's daughter, from her childhood she was used to standing out.\nBut she did find a calling. She felt at home at sea. The bob of the ships, the grain of a handrail, the wind in her face, the smell of salt, all of it made her feel at home. Even her husband was married for the sake of making sure she wouldn't lose her home. And even stepping into late adulthood for the time, she could at least be considered some measure of happy.\n\nAt least before it was taken from her.\n\nOng had the misfortune of being the target of a Lasombra embrace. A cavalcade of misfortune leading to her husband's merchant caravan leading to pirates, her homes raider by bandits, and all she had built destroyed in fire, she tried all she could to hold onto her dying dream. And when her final ship was sinking, her choosing to go down with it.\nAnd that is when Hafiz approached her, and offered to restore it all, should she choose to become a vampire. Ong, simply wanting to sail the sea again, agreed. And then she learned that Hafiz was the architect of all her pain, and that now he wanted her to worship a foreign god.\nShe plots her freedom, her return to the sea. Her pride demands nothing less.\n\nFuture Fate\nOng and Hafiz fell out often and nearly constantly. She refused to join the Ashirra, and stole away with her own merchant fleet to build anew, even aligning herself with the Camarilla when it arrived in East Asia to spite her sire.\nDespite [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] dominance in the city, she would proclaim herself 'Prince' of Singapore as a snub to her sire, organizing the crew she built into a small domain within Singapore for which to deny the Ashirra access to the ports."
 POD_persistentpodlore.desc.793437: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nYoudao is the latest in a long line of Ancestors sent from the Yellow Emperor Court to make sure the frontier region of Vietnam doesn't fall in the hands of the Scarlet Phoenix Court. Contrary to his predecessors, he is actually quite successful at this endeavor.\n\nHis secret is simple, he is not a politically minded individual. Content to preach the more traditional Fivefold [Glossary('Dharma','podgloss.dharma')] to the Viets, he has made no move to extend his reach despite the Viet Court aligned with the Scarlet Phoenix collapsing on its own. His only policy regarding this event has been to welcome refugees from the [akuma|E] encroaching south. The more warlike factions of the Yellow Emperor Court aren't happy with this and push for Youdao to be more aggressive or face his recalling to Changan. Youdao, for his part, has the inkling that this posturing won't matter for long.\n\nFuture fate\nWhen the Yellow Emperor Court collapses, Youdao will see the writing on the wall. Simply packing his things and going to the still stable Bone Court, he will forgo any political ambitions and dedicate his time to the study of his [Glossary('Dharma','podgloss.dharma')].\nThis will make him a surprisingly well liked and respected figure for Viet [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] who will often visit him for scholarly matters. Despite many Ancestors pushing him to become a diplomat between the Chinese and Viet Courts, Youdao will always refuse."
 POD_persistentpodlore.desc.793438: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nLuong Trac was born during the dying years of the Ly dynasty and was one of the victims of the Chinese Sui conquest of Vietnam. Hurled into Lanka, Luong Trac was reborn in the fires of this warlike realm. Cultivating her latent talent for bloodshed, she became respected among the Raksha as a worthy prisoner and a potential [akuma|E] for their lord Ravana. It was seemingly not to be however as Luong battled her way out of Yomi after several grueling decades of warfare.\n\nEmerging as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], Luong was enraged at seeing Vietnam under the thumb of a Yellow Emperor Court lackey. Eschewing her Dharmic enlightenment, she lead a force of like minded [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] to conquer her native realm with the support of the Scarlet Phoenix Court. After several decades of conflict, Luong was mostly successful, starting her reign as the Scarlet Ancestor of Vietnam.\nIt was time for her to focus on her Dharmic enlightenment, something that proved a more challenging endeavor. Refusing to take teachers, as she considered herself as an Ancestor above that, she tried to emulate the aggressive Passion Bloodflowers philosophy starting to take Southeast Asia by storm.\nIt was to no avail however, Luong confusing wanton violence and destruction for liberation. The stigma of a very low [Glossary('Dharma','podgloss.dharma')] Ancestor had repercussions on her court as many left her behind once the conflict for Vietnam was over.\nSensing weakness, the Yellow Emperor Court took back most of their lost land and other regional Ancestors declared independence. With her Dharmic collapse well known, Luong has lost her political capital and isn't able to muster the forces she once could.\n\nAs everything crumbles around her, Luong finally found a way out. If warfare was the only thing she was good at, it might be time to bring the realm of eternal war where she thrived so much to this world...\n\nFuture fate\nLuong's pledge to Ravana will be a serious threat to the region for a while. The short lived alliance between Phùng Thị Chính and Quyen Vien will bring her down and Piyau's forces will hunt her remaining supporters.\nThe memories of her bloody reign will be a factor in keeping Vietnam's [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] politics more tame than the rest of the Golden Courts."
 POD_persistentpodlore.desc.793439: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nLiving during the tumultuous Anarchy of the 12 Warlords era, Quyen Vien was told many stories about legendary figures such as lady Trieu and the Trưng sisters, hoping that she would become the one for this age. This was not to be as her prospective military superior was more interested in her feminine allure rather than her fiery spirit. Thrown into Lanka, Quyen found she indeed had the talent for fighting but still thrived to find a worthy cause behind it. She thus fled as soon as she got the chance.\n\nWhen she met Luong Trac, Quyen was awed. This woman with a similar background to her achieved so much, seemingly liberating Vietnam from the Chinese [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. Stubbornly pleading her case, she managed to become her student.\n\nThe truth soon proved to be less perfect than Quyen hoped. Luong was a very poor teacher as she lacked Dharmic enlightenment herself. Having no real responsibilities at the court, Quyen simply decided to leave and look for answers herself.\nThat is when she met Phùng Thị Chính, an actual hero of her childhood stories. Her [Glossary('Dharma','podgloss.dharma')] seemed alien to Quyen however and they thus parted ways quickly, though amicably. It was not until the rise of the Passion Bloodflowers that Quyen truly found her way. After achieving her first breakthroughs, she excitedly came back to her first mentor, Luong, to share the good news. What she found horrified her.\n\nQuyen was thus the first to accuse Luong of being an [akuma|E] and rally other concerned courtiers to her cause. With the help of Phùng Thị Chính, Quyen is ready to take the fight to her fallen mentor and become the protagonist of her own legend.\n\nFuture fate\nWhile Quyen and Phùng Thị Chính will achieve victory, their relationship will sour as Quyen will align closely with Piyau's Golden Courts.\nNo warfare will erupt between the two but Vietnam will stay divided between their two competing courts for a while.\nThe French arrival in the 19th century will seriously disrupt Quyen's powerbase in southern Vietnam, up to the point of her destruction at the hands of the [Glossary('Каинит','game_concept_cainite_desc')] Prince of Manila."
 POD_persistentpodlore.desc.793440: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe son of a Chinese trader's daughter and Filipino fisherman, Isagani spent his youth growing up during the boom of Song Dynasty trade in the Philippines. And then one night while sailing, seeing a reflection in the water, he was swiftly killed by one of the Cainites of the Phillippines, and cast into the Hell of Boiling Seas.\nAnd it was then his grandparent revealed themself, a ship of [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] casting into hell and finding Isagani, the son of a Dhampyr and cultivated from birth to lead.\n\nIsagani was deeply confused and disoriented by his rapid death, descent to hell, and then rescue in what felt like a blur. But he was chosen for a reason. Precise, loyal, social, clever, and handsome from focused development in his parents, one could say his only flaw would be his constant fear of the depths and threats around him.\nAnd so, his teacher trained him to lead the newly established Violet Coral Court, placed him in command as their most accomplished student, and then settled to their dharmic studies.\n\nIsagani walks a tightrope. Abroad the Yellow Emperor Court's greater demands of his court and the wider threat of Piyau breathing down his back have done little to assuage his paranoia.\nAnd further complicating things is a part of them that has fallen for the handsome, dangerous, and wild beast that killed him, now sharing either savage battles or passionate couplings with the progenitor of the lineage that is his enemy.\n\nWas his mentor right in setting him up for this? Or will he fail because despite all his advantages, he lacked the will to thrive?\n\nFuture Fate\nIsagani would manage to hold, but not thrive. The Yellow Emperor Court's collapse does buy him time, and clever diversions of the Anh into Piyau's Golden Courts get him reprieve, but the Anh's entrenchment is nigh impossible to uproot.\nBut when a new lineage threatens them both, Isagani and Ngai may now finally have the political cause to bury their hatchet and face the rising threat of the Hari in a land both consider their home."
 POD_persistentpodlore.desc.793441: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the August Courts have plenty of space and need for Dhampyr, sometimes, someone can just be too reckless with making them that the veil between the Night and Day Worlds blur, and unwanted attention can be dangerous.\nSo, to that end, the Grandmaster Yuan was, as soon as trade contact with the Philippines reached the ears of the higher officials of the Yellow Emperor Court, given 'the opportunity of an age'.\n\nYuan is an inconsistent and wild hearted man. Moving between the hedonism iconic of the Thrashing Dragons with a ferocity that could make a [Glossary('Penangallan','podgloss.penangallan')] blush or an indulgent cruelty that could make a hardened Devil Tiger Ancestor balk, Yuan was most well known for the veritable army of Dhampyr he produced, so many in fact that a not insubstantial number came back as [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. This is what got him kicked upstairs to the Philippines.\nYuan is perfectly fine with this, as he has mused that he has grown tired of Chinese women, and as soon as several of his children died and returned as [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], he elevated them, and retired to focus on his 'Dharmic pursuits', which in reality was a soul bonded fleet of maidens to tend to his every 'whim'.\nAnd, as the mainland Night World burns from the [Glossary('Anda','podgloss.anda')] assault, Yuan casually enjoys the pleasures of the flesh an ocean away, caring not for the horrifying political mess he put his children in.\n\nFuture Fate\nYuan, true to his [Glossary('Dharma','podgloss.dharma')] in form, function, and mind, much to the shock of the surviving ancestors who hear of it, would later ascend to the [Glossary('Hundred Clouds','podgloss.hundredclouds')] before Spanish arrival in the Philippines, much to the headaches and jubilee of his surviving children.\nHowever, so despised was he by his children, his name would be functionally forgotten by the 1600s, and his impact would only remain in his progeny that had to clean up his mess."
 POD_persistentpodlore.desc.793442: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile there are whispers in the mainland courts of flesh arts, among the myriad powers and factions in Southeastern Asia, the mastery of Piyau and her [Glossary('Penangallan','podgloss.penangallan')] is all too real, and something of a feared measure, their greatest arts all to themselves.\nAt least, they were. Until the Manananggal managed to take them. And they owe their own deviation on Flesh Shintai to their First Divider.\n\nKalinaw, like many of the higher ancestors of the Violet Coral Court, was a Dhampyr descended of Grandmaster Yuan. One of many positioned to begin expanding his court across the Philippines, Kalinaw was one of the few unlucky enough to die at night in a storm, exiling her into [Glossary('Kakuri','podgloss.kakuri')].\nAt least, luckily for Kalinaw, [Glossary('Emma-O','podgloss.emmao')]'s 'tastes' in victims didn't apply to her, so under the cover of a storm, slipped out back to the living world. And, like her fellow disciples under Yuan, was elevated quickly into being a figure of authority among the Violet Coral Court, specifically as an envoy to the declining Scarlet Phoenix Court.\nAnd it was there that she first met the disciples of Piyau.\n\nWhile they would for the most part preach their matriarchal tirade, Kalinaw paid little attention to it. What really interested her was their Flesh Shintai.\nShe played coy with them, pretending to be fully on board, citing her 'frustrations' and 'mistreatment' as a former Dhampyr. One of them bought it, and once she had internalized it, she immediately fled back to her home, where she shared the arts with her Court.\n\nFuture Fate\nKalinaw's stunt would not do the Violet Court many favors, but Piyau's own ascension at least gave them breathing room, as the formation of the Quincunx was a far greater issue.\nKalinaw would become one of the foremost experts on Flesh Shintai outside of the Golden Courts, and later on, would become a critical part of countering the Fleshcrafted monstrosities of the Blood Mage Cainites who would one day later establish themselves and dominate the Philippines."
 POD_persistentpodlore.desc.793443: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMakisig isn't much for theory. He is a man of praxis. Of action. He doesn't want to sit by and babble nonsense about righteous action while doing nothing. And for that reason, many mock him afar. But to the disciples of the Violet Coral Court, few Ancestors are more beloved.\n\nMakisig was one of the numerous Dhampyr descendants of Yuan, but unlike most of them, he was considered a failure, as unlike many of the others, while blessed with an immensely strong body and a potent virility, he was slower to his studies, and often struggled on concepts his Ancestor considered essential, so he was spent as a meathead.\n\nSent to his death in a doomed battle against the native Kindred of the Philippines, and after being turned into chum at sea, he was condemned to the Hell of Boiling Seas. And yet, in a rather ironic turn of events, his directness, strength, and the tricks and riddles of devils going over his head led to him simply cracking enough skulls the devils just let him leave for fear of his strength.\nAnd, while Yuan still rejected him, something Makisig wouldn't forgive him for, Isagani and Kalinaw would welcome him into their fold, something he would be eternally grateful for.\n\nMakisig has what any would consider an unenviable position, but he knows this and does it proudly. Charged with ensuring the Anh never go further than Visayas, he holds the line through sheer unrelenting violence and bullheaded determination, unflinching in his vigil.\nHe is one of the few Hungry Dead to ever survive an engagement with the Anh's progenitor, and he punishes the evil with an earnest and proud will. And as long as he can stand, he will fight to protect his home from the foul blooded horrors that despoil it.\n\nFuture Fate\nMakisig would be instrumental in the survival of the Violet Coral Court, but at a terrible cost.\nWith the arrival of the Hari despoilers, he would personally investigate the affair. When he discovered the true horror at the heart of it, he would challenge it directly, and while it would slay him, Makisig would buy the Night World of East Asia precious centuries of peace from Kagaseo, as he would become the first being to force her into [Glossary('Торпор','game_concept_torpor_desc')], proving to the Night World that even the Hand of the Iron Tyrant can be beaten, and deny her followers her presence for over two centuries."
 POD_persistentpodlore.desc.793444: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest of the Dhampyr descended from Yuan, Adhika has already striven to have a very full life. Her earliest memories are of her mother being pulled into the sea and devoured, of the lecherous gazes of a younger disciple had towards her as a teen, Adhika has thus, from the moment she could pick up a weapon, starting challenging these horrors, head to head, without a concern for the dangers, and for no other reason than, in her eyes, it being the right thing to do.\n\nYuan, finding the 'fancies' of the young Dhampyr bemusing, had her train among old Shih contacts, and Adhika found no path more fulfilling. While few would take a Dhampyr Demon Hunter seriously, Adhika became very, very good at it.\nEnough that the other more level headed Ancestors of the Violet Coral Court wanted to know what in the Hells Yuan was thinking. But it mattered little, as when Adhika returned, she could at least be aimed against the Anh, and other interlopers in their Court.\nGiven special permission, despite just being a Dhampyr, Adhika has a high degree of freedom in the Court. And as far as she is concerned, she will use it to be a fist that smites evil.\n\nFuture Fate\nAdhika would go on, slay, and die as she lived. A Demon Slayer.\nHowever, unlike many other Demon Hunters, she would pass on what she knew to her descendants. She would have her own children, and pass on her war to them, creating a lineage of Filipino Hunters that, while they would eventually fade away from the Violet Coral Court, keep up their hunt against Kindred and Hungry Dead both, named 'Aswang' by this lineage."
 POD_persistentpodlore.desc.793445: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt has been a long time since Munsuq walked the Earth. He did kind of miss the feeling.\n\nThe leader of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s Favored Ones, Munsuq has long discarded his past as an Hunnic raider. His master was still a very young [Glossary('Yama King','podgloss.yamaking')] at this point and Munsuq reaped the rewards of being one of the first cruel enough to do what [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] told him. As the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] expanded, his loyalty was rewarded by making him the de facto lieutenant, leader of the Favored Ones tribe and basically highest authority in the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] outside of Dokhor himself.\nMunsuq greatly enjoyed these privileges for centuries, perhaps even a little too much. While he was a relatively shrewd military man a long time ago, centuries spent simply hunting and bullying helpless prisoners didn't exactly keep his skills sharp. This resulted in many embarrassing security breaches and, while the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] is clearly getting more powerful far quicker than most others, it's also one where a higher than usual number of prisoners manage to escape. This has risen to a point where [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] himself has taken notice.\nWhile the [Glossary('Yama King','podgloss.yamaking')] is busy finishing asserting his control over the steppes and the Black Tortoise Court, he has tasked Munsuq to lead some of his best [akuma|E] to crush the remaining opposition, punish the escapees of his hell and pave the way for his coming to the mortal world.\nAfter all, it wouldn't do for the future [Glossary('Demon Emperor','podgloss.demonemperor')]'s domain to be anything less than ironclad.\n\nAnd so, Munsuq is back to the steppes of his mortal life and while they have changed a lot since then, he hasn't. More than confident in the many impressive "blessings" [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] granted him over the years, the Favored One can't wait to be reacquainted with some former inmates.\nPerhaps they will even put up more of a fight than his usual wretched prey."
 POD_persistentpodlore.desc.793446: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMost [akuma|E] first turn to infernalism because of a lust for power, glory or revenge. Salikh turned because he was bored to death.\n\nA willful man in his mortal life, Salikh fought his way out of the [UmbraGlossaryLocalized('yomi_wan','Yomi Hells')] with skill and valor. As a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], he became a disciple of the Resplendent Cranes and was praised for his orderly conduct, great dedication to his studies and drive to act properly. And all of this amounted to little when Salikh understood that he would have to do the same thing over and over again for centuries before truly rising in station or enlightenment.\nAs a nomadic tribesman in life, the stiffening confines of the sedentary courts, combined to this impression that, while he did everything right, nothing truly mattered finally got to him.\nOne night, without warning, he rode to the steppes, not really knowing what he was looking for. [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s influence was already pervasive at that point and Salikh quickly understood what would happen if he stayed. He did so nonetheless.\n\nIt started small, with some (exciting!) forbidden rituals leading to (interesting!) new powers. Then it turned to darker deeds, selling his own soul, bringing other courts under the [Glossary('Yama King','podgloss.yamaking')]'s influence... In truth, Salikh knows what he is doing is evil and that he has condemned himself to be a pawn for all eternity. But it truly doesn't matter to him as life as an [akuma|E] is exciting and he craves this sensation like no other.\n\nWith [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s final takeover of the steppes approaching, he can't wait to see what new horrors will appear when this world merges with the Hell of the Spiked Chains..."
 POD_persistentpodlore.desc.793447: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSongul was born to a Shatuo tribe and lived a mostly inconsequential life until she killed her husband under circumstances that she doesn't remember today. Executed by her husband's brother after the fact, she ended up in [Glossary('Kakuri','podgloss.kakuri')], [Glossary('Emma-O','podgloss.emmao')]'s [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')]. She would learn later that she was one of the last mortal from the steppes to end up there before [Glossary('Emma-O','podgloss.emmao')]'s influence in this area was supplanted by [Glossary('Dokhor-Khan','podgloss.dokhorkhan')].\nIn any case, Songul was horrified to her core by this realm of broken women molded to obey [Glossary('Emma-O','podgloss.emmao')]'s every order and whim. Thankfully for her, as a steppe woman, the [Glossary('Yama King','podgloss.yamaking')] had no interest in her and she was thus ignored.\nHer escape sadly coincided with an expansion of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s realm and instead of returning to the mortal world, she ended up in his [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')].\n\nThis time, Songul found this realm almost... normal. True, it was a twisted extreme of the harsh life of the steppes but it was still recognizable in its patterns. She easily found her place among the Favored Ones and used this position to escape.\n\nThe return as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] was another shocking experience for Songul. There was an entire society of supernaturals under the surface that basically did nothing against the [Glossary('Yama Kings','podgloss.yamaking')], content to follow mythical sages and the faint hope of a redemption from a god she didn't believe in.\nHer best efforts to raise awareness of the [Glossary('Yama Kings','podgloss.yamaking')]' threat were met with snickering and rebuttal at her youthful insolence. When her very public and very loud shaming of an Ancestor ended up in her exile, Songul knew what she had to do.\n\nIt is clear as day to her that the [Glossary('Yama Kings','podgloss.yamaking')] will triumph. So the only thing she can still make sure is that the less horrifying one wins. And thus, Songul pledged herself to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], becoming perhaps his most zealous [akuma|E] with him not having left a single finger to make it happen."
 POD_persistentpodlore.desc.793448: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nQurdjaquz was once a well known name among the Black Tortoise Court. A dedicated Devil Tiger respected for his drive to safeguard the Court against the many threats surrounding it. Alongside Lei Fan, he was the strongest advocate for redirecting efforts against the [Glossary('Anda','podgloss.anda')] and [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s Akumas instead of the Yellow Emperor Court.\nA man of action first and foremost, Qurdjaquz scored several victories against minor incursions of the [Glossary('Yama King','podgloss.yamaking')] though a true triumph eluded him. The possibility to achieve just that came when he uncovered [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s long term plan, the corruption of the Dragon Nests of the steppes.\n\nIt was a grand night for the Black Tortoise Court, with powerful warriors rallied by Qurdjaquz preparing for a telling strike against [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]. Even the jaded Ancestors gave their blessing to this unprecedented opportunity. The battle was to be a powerful setback to the rise of the [Glossary('Demon Emperor','podgloss.demonemperor')].\n\nIn the end, they were all slaughtered except Qurdjaquz himself. Some say [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] was at the site of the corrupted Dragon Nest for his true plan required his presence. The [Glossary('Yama King','podgloss.yamaking')] didn't want to only corrupt the Dragon Nests, he intended to "key" them to his own Akumas. This allows him to gain sole use of the corrupted Chi (which ends up weakening other [Glossary('Yama Kings','podgloss.yamaking')]) and to transfer the corrupted Chi from one creature to another at will.\nQurdjaquz was the first captive forcefully "keyed" to a corrupted Dragon Nest and driven completely insane by the burst of evil Chi constantly flowing through him.\n\nThus ended the night of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s greatest triumph. A revolutionary edge against his rivals secured, a foe molded into a servant and the combative spirit of the Black Tortoise Court broken beyond repair, ripe for the taking."
 POD_persistentpodlore.desc.793449: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nJakhangir was raised with tales of heroes, gods and monsters and enjoyed every minute of it. The fact that many of those served as warnings against very real dangers never really get through to him.\nBecoming a diligent member of his tribe thanks to wanting to emulate those heroes, Jakhangir showed enough promise that he was [Glossary('обращён','game_concept_Embrace_desc')] by the [Glossary('Anda','podgloss.anda')]. Thrilled to be part of a strong community such as this one, Jakhangir still knew he had to do something to really distinguish himself, as heroic figures always do. He thus decided to give immortality to his childhood crush before she could grew old without him.\nThe [Glossary('Anda','podgloss.anda')], who only allow Embracing once you are experimented enough and are stricter about women joining them, weren't amused. So much so that they banished Jakhangir and his new childe, Aslihan, from their camp.\nJakhangir, while saddened at this, took it in stride. Aslihan was grateful for becoming immortal and the two of them thus continued their lives on the steppes as an unlikely duo.\n\nWhile lacking some basic knowledge on the supernatural, they proved resourceful enough to survive and their good nature made them welcome among various groups, including some [Glossary('Anda','podgloss.anda')] tribes that didn't know of their exile.\n\nIt was when they rode further east than the bulk of the [Glossary('Anda','podgloss.anda')] that their destinies took a turn for the worse. Ambushed by [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s Akumas who were looking for isolated [Glossary('Anda','podgloss.anda')], they were brought to a corrupted Dragon Nest and subjected to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s latest experiments, creating "[Glossary('Anda','podgloss.anda')] [akuma|E]". To his pleasure, the test was successful, warping the minds of the unfortunate couple with an overwhelming amount of evil Chi.\nWhile a fragment of their past selves remains, buried under the constant pain and horror of the experiments, Jakhangir and Aslihan are now puppets of the [Glossary('Yama King','podgloss.yamaking')], unable to defy his commands to bring more [Glossary('Anda','podgloss.anda')] to him.\n\nif all goes according to plan, the two of them will only be the first of an unending army of [Glossary('Anda','podgloss.anda')] [akuma|E] that will ensure [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s rise as the [Glossary('Demon Emperor','podgloss.demonemperor')]."
 POD_persistentpodlore.desc.793450: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nJakhangir was raised with tales of heroes, gods and monsters and enjoyed every minute of it. The fact that many of those served as warnings against very real dangers never really get through to him.\nBecoming a diligent member of his tribe thanks to wanting to emulate those heroes, Jakhangir showed enough promise that he was [Glossary('обращён','game_concept_Embrace_desc')] by the [Glossary('Anda','podgloss.anda')]. Thrilled to be part of a strong community such as this one, Jakhangir still knew he had to do something to really distinguish himself, as heroic figures always do. He thus decided to give immortality to his childhood crush before she could grew old without him.\nThe [Glossary('Anda','podgloss.anda')], who only allow Embracing once you are experimented enough and are stricter about women joining them, weren't amused. So much so that they banished Jakhangir and his new childe, Aslihan, from their camp.\nJakhangir, while saddened at this, took it in stride. Aslihan was grateful for becoming immortal and the two of them thus continued their lives on the steppes as an unlikely duo.\n\nWhile lacking some basic knowledge on the supernatural, they proved resourceful enough to survive and their good nature made them welcome among various groups, including some [Glossary('Anda','podgloss.anda')] tribes that didn't know of their exile.\n\nIt was when they rode further east than the bulk of the [Glossary('Anda','podgloss.anda')] that their destinies took a turn for the worse. Ambushed by [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s Akumas who were looking for isolated [Glossary('Anda','podgloss.anda')], they were brought to a corrupted Dragon Nest and subjected to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s latest experiments, creating "[Glossary('Anda','podgloss.anda')] [akuma|E]". To his pleasure, the test was successful, warping the minds of the unfortunate couple with an overwhelming amount of evil Chi.\nWhile a fragment of their past selves remains, buried under the constant pain and horror of the experiments, Jakhangir and Aslihan are now puppets of the [Glossary('Yama King','podgloss.yamaking')], unable to defy his commands to bring more [Glossary('Anda','podgloss.anda')] to him.\n\nif all goes according to plan, the two of them will only be the first of an unending army of [Glossary('Anda','podgloss.anda')] [akuma|E] that will ensure [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s rise as the [Glossary('Demon Emperor','podgloss.demonemperor')]."
 POD_persistentpodlore.desc.793451: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAs a regional ancestor of the Black Tortoise Court, Khanda has the dubious honor of having a front row seat at what feels like the end of the world.\n\nA capable and respected ancestor once, she will be the first to admit that she underestimated the early signs. The disappearances, the indolence spreading from the central court, the casual disregard for the rumors of [akuma|E]... it sounded like your usual doom and gloom prevalent in younger generations that didn't know better. It was only when a minister she trusted tried to poison her Dragon Nest in front of her that she understood. He thought that she was already "on board with the changes" and paid for this with his life but it was too little too late.\n\nKhanda sees it now, [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s influence is everywhere on the steppes. His [akuma|E] swagger like they own the place and the [Glossary('Anda','podgloss.anda')] [Glossary('Каиниты','game_concept_cainite_desc')] might also be on his pocket for all she knows. But... what was she supposed to do? Her show of defiance against her corrupt minister put her on the [Glossary('Yama King','podgloss.yamaking')]'s most wanted list and it was only a matter of time before she was slandered, threatened and blackmailed in the daily. It was when the first assassination attempt happened that Khanda knew that she had no choice anymore.\n\nMaking her first bargain with [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], Khanda became just another one of his pawns.\nOr so he thinks. The truth is, the beleaguered ancestor is more than ready to be a martyr. Now that the [Glossary('Yama King','podgloss.yamaking')] doesn't watch her closely, she has started subtly interfering with his plans. She can't be too brazen but misleading Akumas, letting resistance troops escape her territory, slandering "rivals"... it's not much but it adds up or at least she hopes it does.\nFor now, Khanda is happy to be considered an incompetent idiot in [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s forces. She fears the night when they will understand that she is actually very capable at what she does.\n\nFuture Fate\nKhanda's contributions to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s downfall will remain unknown. When the [Glossary('Yama King','podgloss.yamaking')]'s is finally destroyed and her sold soul destroyed with him, she will go into oblivion with a smile on her face."
 POD_persistentpodlore.desc.793452: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTayisung was always a simple soldier and it was a life that satisfied him. While he heard the rumors of the Black Tortoise Court being corrupted by [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], he mostly left these issues to those apparently more qualified to handle them. He regrets that choice nowadays.\n\nNever interested in power and having a spotless record, Tayisung was fine when he was sent to become a courtier in a minor regional Court. He even thrived there, achieving the honor to become the First Oni and warden of the Dragon Nest of said court, a task he took to heart.\nSadly, even this faraway posting couldn't keep [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s influence away forever. Tayisung saw the signs but stood his ground, stopping several budding [akuma|E] trying to get access to the Nest. It was only when Tayisung received an order from the Ancestor to stand down that he did so.\nAnother choice he regrets today.\n\nHe was sadly not surprised to see his Dragon Nest thoroughly corrupted when he got back to his post. At this point however, there is little he can do. He needs the Chi energies to survive and thus will end up corrupted as well and he knows it.\nRebelling has never been in Tayisung's vocabulary but the last thing he wants to promise himself as long his mind is still his is that he doesn't want to regret a choice for the third time.\n\nFuture fate\nWhen the Silver Blade Horsemen will attack his Dragon Nest to purify it, Tayisung will only put a token resistance and "forget" to warn his Court before being slain. This will be his first and last act of defiance."
 POD_persistentpodlore.desc.793453: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBaatar was a victim of one of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] infamous "[akuma|E] raid" where entire communities are slain to potentially end up in the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] as prisoners. While he was a troubled child and an indecisive adult in his mortal life, Baatar proved to be strong under duress and endured the torture better than most.\nBetter than his older brother in any case, who also ended up as a prisoner at the same time as he did. While Baatar wasn't particularly close to him as a mortal, he tried his best to help and soothe him in this terrible prison. It didn't work however and, seeing his brother's spirit crushed, Baatar took the opportunity he saw to escape without him.\n\nWhile it was likely the good call at that point, this decisive choice hampered Baatar growth as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] as he was always trying to find a way to get back here and save him. Obviously, his pleas to attack [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] were met with derisive laughter and thus Baatar despaired. It changed when the Black Tortoise Court fell more into corruption and the knowledge on how to bargain with [Glossary('Yama Kings','podgloss.yamaking')] became more widespread.\nBaatar thus made a deal with [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]. His service as an [akuma|E] for the release of his brother. And, while the contract was sealed and thus binding for both parties, Baatar didn't specify "where" his brother should be released and thus didn't see him again. His new duties as an [akuma|E] forbid him from trying to track him down and Baatar is getting desperate once again.\nWith his soul sold and his brother stranded only [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] knows where, the future seems grim indeed.\n\nFuture fate\nDuring the years leading to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s downfall, Baatar will hear of a fierce warrior of the Chinese Courts corresponding to the description of his brother. Indeed, when the final attacks are launched by the Quincunx, the two brothers will stand on opposite sides.\nBaatar will try to explain himself but his voice will be silenced by the petty [Glossary('Yama King','podgloss.yamaking')], thus making sure Baatar will be slain by his brother as just another [akuma|E]."
 POD_persistentpodlore.desc.793454: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFrom the Chaos of the Eternal War, there is routine spill over. As of late, there are winds of change as new things begin to poke and prod further. And as these night horrors try to pass through the lands of the Tai people, they meet grisly ends. Lawan will not tolerate outside influence or mortal winds to taint her works.\n\nLawan, in life, was a slave to the Champa peoples, abducted and put into service in building their works. And that was her whole life, a chattel slave. And for that life, heaven saw fit to send her to the Hell of No Money, where, after a life of toil, she was left to scrounge on nothing and scraps and labor further.\nBut Lawan, desperately having sought an escape in life, and sick of the tyranny of mortal men and the [Glossary('Yama King','podgloss.yamaking')], made herself a fortress of dust and hurricane of breaths, where she would then blow away her jailers. And she would later be found by the Scarlet Phoenix Court after her escape.\n\nTo say Lawan has a chip on her shoulder from her mortal life is an understatement. She loathes and despises mortal society, seeing them as depraved monsters that have set Hell the way it is with their wickedness. They are cattle who would crush their own for the sake of avoiding the butcher.\nSo no, she would prevent them from tainting this purer society, and she would be a bulwark between the Courts and mortal sinfulness.\n\nFuture Fate:\nLawan would be an early ally of Piyau, seeing her incredibly divergent ideology from mortal society as prime liberation. However, her own resentment of mortal society would eventually leave her detached from potential allies, and be usurped and pushed into obscurity by later more integrationist courts in Modern Nights."
 POD_persistentpodlore.desc.793455: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile many Ancestors overfocus on [Glossary('Dharma','podgloss.dharma')], and some heretics obsess over their mortal life, that all strikes as rather silly to Klahan. One can seek higher powers and still care for those around them. In fact, he considers it the peak of wisdom. And besides, his mortal experiences demand nothing less.\n\nKlahan was born a slave, and even through that mortal hell, he was an optimist. Kind to those around him, personable and charismatic, and always willing to wait for others to come around, Klahan was well loved by all those around him.\nBut, his life was a footnote, and when he died, he was sent to the Hell of Being Flayed Alive for the sins of the people who owned him. But Klahan was used to having nothing but his wits and charisma, and used it well to sway travelers to aid his escape.\n\nKlahan is a sobering presence, and as such, he is considered a bit of a downer in the more vivacious Scarlet Phoenix Court. But he doesn't mind his rural appointments, as he builds connections among the people and builds soft power among mortals.\nHe has plans, goals, and hopes. Atonement now may yet come. He just needs to wait for the opportunity.\n\nFuture Fate\nKlahan's canny patience and willingness to stay in the shadows pays him well. Perfectly willing to be submissive and deferential to Piyau and her forces, he is largely ignored and absorbed quietly.\nBut in modernity, clever politicking and mortal support will see him overthrow their former masters, ascending properly and stepping into the light as the true protectors of their homeland.\nAnd as the [Glossary('Demon Emperor','podgloss.demonemperor')] draws closer, his wisdom is needed now more than ever."
 POD_persistentpodlore.desc.793456: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce, Sakchai was appointed to his court to ensure that no supernaturals would pass into South East Asia's seaways without approval or oversight from Dyanang. Now, it is just his approval and oversight he cares about.\nHis mortal life a miasma of shreds of isolation and chains, he remembers little of his time in the Hell of Upside Down Sinners as well. But he at least knows a freeform mindset is what freed him. His open mindedness originally is what earned him his position as an overseer of travelers, but the Scarlet Phoenix Court didn't see the ambition and grasping vainglory in his heart.\nHe always wanted a justification. And he found it when he met another strange night creature robed in shadows, preaching the word of a foreign god.\n\nSakchai would, on the surface at least, come to adopt this mindset to an extent, and let this stranger deeper into the Scarlet Phoenix Court. As more arrives, he curries favor and tries to build his power further among these '[Glossary('Каиниты','game_concept_cainite_desc')]', seeking further links and connections to build his power.\nAs he sees it, rejecting these foreigners is idiocy. To succeed requires embracing the outsiders, at least in a way that appeases them.\nSo he has told these '[Glossary('Ashirra','game_concept_ashirra_desc')]' he is fully on board with them, using their faith as a justification for greater building of power and authority.\n\nFuture Fate\nSakchai would, through his drive and boldness, bite off far more than he could chew. When the Flaying Monkey Intan came to his court, his demands of her subservience and conversion in heart and mind to his new 'enlightenment' led to her finding his position no longer needed, and him trying to have her executed for defying him soured things further. He would even try to arrest the next disciple of Piyau sent to 'remove' him.\n\nHe would end up in the same gullet as countless Akuma as Wati devoured him whole."
 POD_persistentpodlore.desc.793457: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEveryone in the Angkor Court clamor that Tilaka is strong, skilled and enlightened. As the leader of the famed Golden Shroud [Glossary('Wu','podgloss.wu')], her being the obvious successor of Dyanang is a given. How could it be otherwise?\nThe truth is a little more complicated.\n\nTilaka is indeed the leader of the famous group that brokered a lasting peace with the ferocious shapeshifters of the jungles. Being the leader doesn't mean that she was instrumental though and, truth be told, she was kind of the opposite.\nTilaka is ambitious to a fault and when her [Glossary('Wu','podgloss.wu')] mate Vedavati offered to start the negotiations with the shapeshifters, Tilaka saw only two outcomes. Success would bring her fame while failure would likely cost Vedavati's life, which was a price she was willing to pay.\nHer assessment turned out to be correct and Tilaka was quick to put her name at the front of the budding alliance treaty. So quick in fact that it almost soured the proceedings until Vedavati stepped up.\n\nIn the end, it didn't truly matter and Tilaka has been leveraging this great victory to its fullest ever since. To her credit, she did it well and the Angkor Court is eating from her hand at this point though, annoyingly, Dyanang herself is uncharacteristically cold and distant with her.\nNo matter really, the Scarlet Court Empress is likely to reach the [Glossary('Hundred Clouds','podgloss.hundredclouds')] soon enough, leaving the throne wide open for Tilaka. Then, she will reorganize the Court in her image and truly start her ascension.\n\nFuture fate\nPiyau's rise will concern Tilaka. Concern that will turn to outright panic when the Red Dragon will prove impressively successful.\nTilaka will try to leverage all her political power to brand her an heretic and send forces against her but will be stopped at every turn by Dyanang.\nWhen the Scarlet Empress finally leave Angkor, it will be too late. Tilaka's supporters will refuse to die for a lost cause, leaving her with no choice but to challenge the one she saw as her nemesis to a duel.\n\nPiyau will quickly dispatch her, idly wondering who was this frantic woman who apparently hated her so much."
 POD_persistentpodlore.desc.793458: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSriteja has fond memories of her mortal life as a Khan kinfolk. She was always tall, strong and striking, making the Khan men treat her with respect and try to win her over. It didn't come to pass however as she died protecting her tribe from the [Glossary('Yama King','podgloss.yamaking')] Ravana's forces.\nEnding up in Lanka, the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Ravana, Sriteja simply saw it as a continuation of her previous battle. She fought it with determination and patience and earned her escape and return as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. Said return was a difficult experience for her, finding the cutthroat political ambiance of the Courts a far cry from the much simpler life of her mortal tribe.\nLeft adrift for a while, she ended up assigned to the Golden Shroud [Glossary('Wu','podgloss.wu')] when they started negotiating with the shapeshifters due to her past.\n\nSriteja's homecoming wasn't as warm as she expected early on, as her people now saw her with suspicion at best due to her being a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. She didn't give up however, and reconnected with them as much as she could, helped by the peace negotiations going well at the same time.\n\nWhen they were finalized, Sriteja realized that, even with these warming relations, she could never live with her people and was forever condemned to stay an outsider. This plunged her into a malaise that turned into despair.\nWhen her leader Tilaka brought her to the Court to be removed from the Golden Shroud because she was now "useless", Scarlet Empress Dyanang refused and instead made Sriteja First Oni, thus general for the Angkor Court forces.\n\nThis surprise appointment's underlying motive soon became apparent. Sriteja had to work closely with the now allied shapeshifters to keep the peace and handle the common threats. She is now thriving in her new role, becoming a respected coordinator between the two forces.\n\nFuture fate\nSriteja won't bat an eye when her leader Tilaka self destructs against Piyau. She will instead be confirmed into her role. Even the splintering of the Courts post Piyau won't change much for her, the many Golden Queens still entrusting her to keep the peace with the Ferocious People of the jungles, something she still does to this day."
 POD_persistentpodlore.desc.793459: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nVedavati, despite what many think, was the true mastermind behind the treaty allying the Scarlet Phoenix Court with the ferocious shapeshifters of the jungles. Few would believe it seeing her however as her shy and unassuming presence doesn't mesh well with such a diplomatic feat.\n\nShe doesn't speak of her time in the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] but it's safe to assume that it left a profound stigma on her. It also gave her an unshakable conviction that the [Glossary('Yama Kings','podgloss.yamaking')] have to be stopped. Sadly, she soon learned that many [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] speak more about confronting them than actually doing something about it.\nBeing assigned to the Golden Shroud [Glossary('Wu','podgloss.wu')] didn't help matters. Its leader Tilaka being more concerned with personal glory and ambition than the true threat. It came to a breaking point and Vedavati was considering leaving the court when Scarlet Empress Dyanang summoned her for a private conversation. What has been said there isn't known but Vedavati left with a renewed fire in her eyes that lead her to spearhead the diplomatic efforts with the shapeshifters.\n\nWhen, despite the many hurdles, it proved successful, she was content to leave the praise for Tilaka and instead worked on her own projects. What those are is anyone's guess.\n\nFuture fate\nVedavati will subtly help Piyau's rise to power by playing the diplomat with several undecided Courts. When confronted about this unlikely help from someone not very suited to Piyau's extreme [Glossary('Dharma','podgloss.dharma')], Vedavati will simply say that the Red Dragon did more against the infernal powers than most Courts ever thought possible.\nShe would then fade in the background, becoming something of an urban legend among the Golden Courts as her fate will never be recorded."
 POD_persistentpodlore.desc.793460: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBhadra, for all intents and purposes, was a rather unremarkable [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] that became the unremarkable youngest member of the Golden Shroud [Glossary('Wu','podgloss.wu')]. She drifted through Dharmic enlightenment and court politics, happy to support her leader Tilaka in her more ambitious endeavors. She was valued for her loyalty but it was truly more a general apathy that drove her to do what was asked of her. Things changed dramatically in 1177 when she stumbled, frankly completely by happenstance, on an [akuma|E] plot to seize a Zhong Lung (the dragon shapeshifters) nest of power.\n\nWith her [Glossary('Wu','podgloss.wu')] at her side, she charged into battle and saved the dragon changer named Nongkhai in the process, suddenly earning herself fame and accolades she was dearly not prepared for.\nThis sudden change has flared Bhadra's own sense of self and ambition and she is now (not very subtly) contesting Tilaka's leadership of the Golden Shroud. The serious gap in age and power means that Bhadra won't make any daring moves anytime soon but she has finally started to play the court politics game and found that she liked it.\n\nFuture fate\nWhen Tilaka's head roll to the floor after her challenge against Piyau, Bhadra will wisely swear allegiance to the Golden Courts.\nBecoming one of the first Golden Queens, she will however quickly end up biting more than she could chew when threatening another Golden Queen, Mawar, territory.\nHer ultimate fate will be to be thrown into a fleshpit, becoming the first prominent victim of the Golden Courts' constant state of low intensity civil war."
 POD_persistentpodlore.desc.793461: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn physically disabled, Konti was cared for by her family until she wasn't when her callous brother became head of the household and left her to die.\nWhile being plunged into a [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] was a shock, the fact that this spiritual world allowed to be independent for the first time in her existence pushed her to endure it until she found an opening.\n\nReturning as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] in the Scarlet Phoenix Court was a tremendous experience for her. Embracing the vivacious lifestyle of the Yang aligned Court, Konti never grew tired of experiencing to the fullest everything she missed during her life. Thus, despite her respectable age and career in several ministerial positions, she is still considered an overexcited disciple by many.\nTrying to focus and center her, the Angkor Court assigned Konti to the Golden Shroud [Glossary('Wu','podgloss.wu')]. As with everything else, Konti jumped head first into this new role and was a crucial help in the many diplomatic and military achievements the Shroud gathered. Still though, her [Glossary('Dharmic','podgloss.dharma')] enlightenment stayed as stunted as ever and the Angkor Court is starting to be less forgiving about her antics, some arguing that she is on a straight path to be tempted by a [Glossary('Yama King','podgloss.yamaking')]\n\nFuture fate\nTheir fears won't come to pass as Piyau's rise will offer a new opportunity for Konti. Learning of the Passion Bloodflowers [Glossary('Dharma','podgloss.dharma')], she will join with them the first chance she will get.\nLearning under Piyau's disciple Mawar, Konti will thrive in the extremes of the Passion Bloodflowers but also manage to progress on the road to enlightenment thanks to it.\nBecoming Mawar's regional minister then a Golden Queen on her own, Konti will be the main example the Chinese Courts point at when (fearfully) describing the incredible excesses the Golden Courts will be known for.\n\nKonti won't care however and will steadily climb her way to the [Glossary('Hundred Clouds','podgloss.hundredclouds')]."
 POD_persistentpodlore.desc.793462: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEven from his mortal life, overlooking the Pacific on the Chinese coast, Shenyou always wondered what lay on the other side. And even after his Second Breath, he can't help but yet wonder.\n\nShenyou was a sailor in mortal life, even born on a ship. Between navigating early routes to the Philippines, passages to Japan and Vietnam, and other smaller islands around the South China Sea, the open sea always called to him, even when it killed him in a storm.\nBut the Hell of Boiling Seas wasn't the worst fate for him, as he could understand the passages the ships took. Through clinging to the hull of a ship of passing Hungry Dead, he found his escape, and was brought into the fold.\nAnd with his knowledge of sailing, he was immediately plucked by Hao for his skill and wisdom. Keeping him close, Shenyou's wisdom was immediately put to use keeping contact with the collapsing Scarlet Phoenix Court, open to taking in skilled refugees fleeing the chaos.\nWith that, Shenyou became invaluable, taking choice picks from Southeast Asia and Nusantara to elevate Hao's Court further.\n\nFuture Fate\nShenyou would eagerly go along with Hao in his eventual masterminding of the Great Leap Outward. He would eagerly go across the Pacific, and try to establish a Court in Mazatlán. However, several foolish assaults against the Sabbat led to his court's destruction, and he returned to the Quincunx in shame, and submitted himself to judgment before the Eye of Heaven for his failure."
 POD_persistentpodlore.desc.793463: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the Courts of the Yellow Emperor have long fallen into the hands of sycophants and bootlickers, not all suffer from the ailments of a rule long burdened by too dull a rule. Jingxinan is one such spared. And the one who brought it into line was once a meek nobody slain by war and reduced to nothing, who vowed never to be weak again.\n\nChujun was one of thousands slain in the Mongolian advance across China. That is most of what Chujun remembers, but also how in his mortal life he was weak.\nThe Hell of Being Skinned Alive changed him to his core. The fleecing sands enlightened him, showing him how even the smallest grains could render a demon to mist in minutes if guided properly. And those were the principles that guided Chujun to his escape.\n\nImmediately upon entering Hao Wei Liang's Court, Chujun dedicated himself to studying the works of Sun Li, wanting to make himself great and deny himself weakness ever again. Selected as Hao's personal enforcer, he was wildly successful in that path. And as a chaotic age draws closer, his path remains unchanged.\n\nFuture Fate\nChujun would prosper and flourish under Hao, and through their expansions in the Great Leap Outward, Chujun would write his own works and treatises on fighting [Glossary('Каиниты','game_concept_cainite_desc')].\nHowever, his own boldness would spell his doom, when he would boldly try to lead an expeditionary force to take over Lima from the native Karai Pyhare. The Drowned Legacies defied him and decimated his armies, and when he returned to the Quincunx to beg for reinforcements, he was met with a collapsing institution, and his own Court was in chaos under the usurpation of the Heaven and Hell Legion.\n\nAnd so the man who once vowed never to be weak again met his end blubbering and begging before having his last breath sucked out from his lungs by Shufen, and his swiftly decaying remains thrown into the ocean."
 POD_persistentpodlore.desc.793464: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTo most of the older ancestors of the Yellow Emperor Court, the threat of [akuma|E] is that of a distant one, the struggles of the Black Tortoise and Scarlet Phoenix Courts. Simply, they are too distant and the virtues of the Fivefold Way protects them, so they rest on their laurels.\n\nLingyuan cannot rest on that.\n\nLingyuan's mortal life is a haze to her, knowing that in life she was a cook in a restaurant, and she had died in a fire of some kind.\nBut in the Hell of Upside Down Sinners, she saw flashes of wickedness, a looming darkness, and armies of devils marching beneath a one eyed sovereign. Her escape was not a thing of personal freedom, but of a desire to save the world from this threat.\n\nHer drive and will to do so earned her an easy place among the more competent courts of Jingxinan, where she has dedicated herself to focusing on finding these hidden devils.\n\nFuture Fate\nLingyuan would come to see this one eyed devil as Zao-Lat, known in the West as Saulot, and would dedicate herself to purging [Glossary('Каиниты','game_concept_cainite_desc')] as part of the Great Leap Outward. But following the fall of Hao from favor, her own station would be systematically shredded by the Ancestors of the Heaven and Hell Legion, and after a failed assassination on Lin Xiao, she was brought before the Legion's conqueror, Ma Hai-Lan.\n\nAnd in her final moments before death, she could only laugh as she saw the one eyed devil's gaze as she met judgment."
 POD_persistentpodlore.desc.793465: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe strangest member of Hao Wei Liang's Court, the fact that he has a [Glossary('Penangallan','podgloss.penangallan')] among them is a shock. But the errant student of the exiled ancestor Thitkwa has found a critical place in Hao's court.\n\nHayati was born in Malaysia, a weaver of no renown or notice, at least not until her death, where her life of mediocrity condemned her to the Hell of No Money. Disoriented and horrified that this would be a reason to face damnation, Hayati did all she could to try and make sense of things, the only thing that could eventually make sense was the acquisition of wealth.\nSo, she hoarded what she could in the desolate expanse, and was finally able to bribe her way to the Second Breath. And from that experience, she became remarkably skilled at managing money, as she poured over every coin.\nAnd while she was initially tutored by the [Glossary('Penangallan','podgloss.penangallan')] Thitkwa, Hayati was a weird student, far more focused on money and stability rather than sex and violence, but with the same wild zeal that would would expect of them.\n\nSent to deal with envoys to Jingxinan, Hayati found that Hao Wei Liang was a far more capable ancestor, so she simply never left. She would become critical in helping him with translations and navigating the politics of Southeast Asia, and her insight was invaluable in avoiding the normal arrogance that plagued their relations.\n\nFuture Fate\nEventually, Hayati would be the main link that the Quincunx would have with understanding the Golden Courts. And when Hao would commandeer the Great Leap Outward, Hayati would be their main thread guiding them to Australia.\nHowever, their growing conflict with the more inward focused Heaven and Hell Legion would spell her eventual doom, as she would be accused of consorting with the Golden Courts, and her eventual condemnation would set the chain of dominoes that would lead to the failure of the Great Leap Outward and the disaster of the Century Rebellion."
 POD_persistentpodlore.desc.793466: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the courts of Jingxinan are less overly focused on Court Culture, they still prize themselves on proper Court building and politicking. But yet, there are times they must send someone for a difficult negotiation with other Courts. And Xiao'e threads that line masterfully.\n\nAn actress in life, Xiao'e always had a knack for understanding people. Opening doors and clearing paths for their success was always something she was good at.\nHer charm helped her escape the Hell of Salt and Iron, and her drive made her an easy foundational member of the Leaping Gibbons, especially as Hao's first disciple. And as there are whispers of a coming massive change, her services will be needed now more than ever.\n\nFuture Fate\nXiao'e would see the collapse of the August Courts, and through her influence, cement herself and Hao as foundational members of the Quincunx.\n\nPutting forth what would become the Great Leap Outward, Xiao'e was critical in their success. However, her focus on the abroad made her an enemy of many, and as soon as it was clear she was the one opening doors, she met a grisly end one night as the Demon Bull of the Heaven and Hell Legion greeted her, hammer in hand."
 POD_persistentpodlore.desc.793467: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile few Hungry Dead leave the Hell of Being Flayed Alive with a love for the lords of the [UmbraGlossaryLocalized('yomi_wan','Yomi Hells')], Xiaowan stands among even them for her hatred. Her haven lined with the bodies of flayed sinners and devils, strewn with the gore and sinew of the wicked, while she waits at the center, meditating on the wickedness that has yet to come.\n\nXiaowan is one of Hon Li's first disciples, and by far his most competent and loyal one. Even her memories of mortality were flayed away by the sands of the Thousand Hells, and all that burned in her was an unyielding hatred for devils, a desire to see them bleed, and the strength of will to face even the [Glossary('Demon Emperor','podgloss.demonemperor')] with teeth bared and sword in hand.\n\nShe pays no heed to the word of ancestors or lords, instead gathering her screens and disciples in her own wars, her own bloody purges against the rot that is worming its way into the Courts.\nShe has nothing, so she will deny the [Glossary('Yama Kings','podgloss.yamaking')] everything, just as they did to her. A simple, brutal, and straightforward path for her to follow. Really, the only one she has left.\n\nFuture Fate\nXiaowan would for a time slay many [akuma|E], but with the formation of the Quincunx, eventually her brazen acts of violence would grow too bold and too destructive for the Quincunx to tolerate.\nWhile the first couple of [Glossary('Wu','podgloss.wu')] dispatched met violent ends, the veteran of the Anda War and former Ogre of the Warriors of the Hebei Plains Mapo ended her heresy once and for all."
 POD_persistentpodlore.desc.793468: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn order to keep the Three Mountains Village experiment going properly, there needs to be some threat behind the laws instituted by Wang Ping. A damnation all too present that they should fear. A reason to seek a peaceful if dull life.\n\nYouqiu is more than eager to be that devil.\n\nYouqiu was a native of the village, albeit one who routinely took to banditry and horrible acts of violence. Even in his advanced age and size, he was quite eager to command his sons in the plunder of the small places abound, and he lived a long and violent life from it, at least until one night a girl came back from the dead and splayed him open.\n\nCondemned to the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Lanka, he found himself in his element, the detriments of age and his cruelty not abated. He devoured numerous Rakshasa and took several as brides, until one night one Ravana finally had enough of him and banished him back to the world of living, where a former victim and now master, his killer, broke him into line.\nWhat exactly she did to him is unknown, but he definitely came out worse. He became her iron gauntlet, the engine of terror and fear for those who resisted their reforms. And with the children and lives of men who resist and the bodies and eyes of women who defy, he couldn't be happier and more content.\n\nFuture Fate\nYouqiu would become quite effective in his role, perhaps too much so.\nEventually the village forgot its monsters as they obeyed, and following Wang Ping's absence, the other caretakers saw no more reason to tolerate a monster so close on the dance to damnation. And so, he was trapped in a bronze tea basin, and the villagers rested easy as his last screams lulled them to sleep one forgettable night."
 POD_persistentpodlore.desc.793469: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile doctors are meant to heal rather than hurt, following his death, Zongmin is adamant he is still following that principle. Rather, now he understands that healing the wicked will hurt more than heal, so it is the obligation of the doctor, when put before them, to heal the world by cutting the infection of their evil then and there.\n\nZongmin, from his mortal life, was a doctor, condemned to hell in death for sparing a serial killer and healing them.\nWithin the Hell of Upside Down Sinners, that truth was beaten into him, both metaphorically and literally, as he was whipped and flayed with a whip made of the teeth of the serial killer's victims. Finally, he accepted the truth, and was liberated from Hell in that moment, released without really any affair.\n\nZongmin, taking the revelation internally, was rather unhinged in his early nights, and sent to the Ancestor Hon Li for his education.\nZongmin, disgusted by the inaction of the courts, took his word quite well, and would become one of his ardent and zealous disciples. He chose to obey the Searing Winds by eating the souls of killer, and using their energy to heal the virtuous sick. Balancing the books, so to say.\n\nHe has much work to do."
 POD_persistentpodlore.desc.793470: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the most enigmatic disciples of Hon Li, Yushi has no words in following his mentor's path. From writing, he has said he is from the Hell of Salt and Iron, and knows little before that. But from the things he learned in there, he cannot tolerate the presence of the Courts for something they had done.\n\nHon Li was not one to look a gift horse in the face. Yushi's mute condition became something fear inducing among his disciples, as the silent menace that was always eager to act on behalf of Hon Li's orders, while being a radically devout adherent of his path.\nYushi would come to specialize in assassinating fallen members of the Courts, something that brings no end of fury from the mainline Courts, but one they have been distracted from with the growing threat of the [Glossary('Anda','podgloss.anda')].\nNot one to sit and let be, Yushi has since begun hunting the hedonistic lunatics from the growing threat coming from the Scarlet Phoenix Court. Whether or not he will make headway is yet to be seen..."
 POD_persistentpodlore.desc.793471: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the youngest but most fanatic disciples of Hon Li, Aiqin was rather unique among the Hungry Dead, as her own Hell was the wider tapestry of the Thousand Hells themselves, rather than an individual one. Chained to the Wandering Overlord, he reshaped her memory into that of an oracle. And there she would have remained, had she not foresaw a break in her chains, and then exploited it to escape.\nAnd of all the mentors that could have found her, it was Hon Li who brought her into the Night World properly.\n\nAiqin however has retained her oracular ability, where she has constant flashes of shadows with bloody mouths and raised knives, and beyond them a charred throne from which a charcoaled blood god stood.\nAiqin is adamant that the nightmarish figure could be the [Glossary('Demon Emperor','podgloss.demonemperor')], and is insistent that they must be ready to oppose them.\nTo that end, Hon Li lets Aiqin be the eyes of their sect, watching for these devils. And as she begins to find more and more information on the enigmatic vampire assassins, her fears are becoming more and more realized.\n\nFuture Fate\nAiqin would eventually be the main force that would lead Hon Li's sect into modern day Afghanistan, and her visions would be further given weight by the return of Ur-Shulgi.\nAs the Sixth Age draws nearer, the Searing Winds may have found one of the possible [Glossary('Demon Emperors','podgloss.demonemperor')].\nBut will they be ready? Aiqin doesn't know, as all her visions end before the battle."
 POD_persistentpodlore.desc.793472: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nUmikana doesn't remember much about her past. In fact, she doesn't really know what she has become. She has faint memories of dying, a terrible place then coming back and becoming a barely sentient monster. She doesn't know how long she stayed in that state but she fears it might have been decades, if not more, before her mind (barely) put itself back together.\n\nHer first tangible memory after that sorry state is seeing a shrine to Amamikyu and the noro priestesses praying there. She has an inkling that it might have been her salvation, perhaps unlocking a core memory of her past that allowed her to heal herself a little.\n\nWhatever the case might be, Umikana has been slowly learning of her new condition since then. She has also encountered others like her but most were lost and were mindless monsters like she was. She still doesn't know if she should put them out of their misery before they harm others or leave them a chance to save themselves, like she did.\nSo far, she has been too preoccupied with her own state of mind to act but as her understanding grows, so does the responsibility she feels to safeguard Ryukyu.\n\nFuture fate\nWith the coming of the Chinese and later on the Japanese, Umikana will learn what she is. Tensions with the arrogant outsiders will run rampant until she will self proclaim herself Ancestor of Ryukyu to spurn them.\nWhile her diligent efforts to keep her island independent by playing the Courts against each other will be enough for a time, there will come a point where the Japanese Bishamon will simply have enough of "Okinawa's disrespect"..."
 POD_persistentpodlore.desc.793473: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSuryawati is considered the oldest [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] of the Maluku islands though, truth be told, she knows that this history was written by the victors. She was barely out of hell when the Scarlet Phoenix Court made first contact with the islands, found the ruling male [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] "wanting", put them to the sword and then started "civilizing" the survivors in the proper [Glossary('Dharma','podgloss.dharma')], including her.\nSuryawati was frankly a mediocre (if cheerful) student but she was a native woman that wasn't resisting the Scarlet Phoenix which was enough for them to appoint her Ancestor of the islands, go back to their ships and promptly forget about the Maluku again.\n\nSuryawati put her seat of power in Nusa Isa (the "Mother Island") to garner what little prestige she could and started her somewhat pathetic (and unwanted) rule over the very limited number of [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] of her "domain". It is thus of little surprise that she became an indolent ruler that most don't even pay lip service to.\n\nWhile some of the younger generation are talking of much needed change, especially with the Scarlet Phoenix Court in too much of a disarray to intervene, the real threat lies more in the growing presence of [akuma|E] that use this lax rule to prosper.\n\nFuture fate\nSuryawati will weather the coming storm of the foundation of the Golden Courts by basically being irrelevant. Losing what little temporal power she had left to a new generation of rulers, she will become something of a well liked oddity of the islands, a benign and likable elder with many colorful stories to tell."
 POD_persistentpodlore.desc.793474: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe loving wife of a fisherman, Dara threw herself into the sea when she knew her beloved wouldn't come back after a terrible storm. Finding herself in the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Hine-Nui-Te-Po for those who died by suicide in the Pacific, she was enraged to see that her act of love was turned against her. While the Hell expected her to wallow in self-loathing, she instead fought back at every turn, eventually breaking through to go back to the world once more as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\n\nDara found the organization (or lack thereof) of the Maluku Court to be annoying at best, worrying at worst. Her pleas for restructuring and decisive action against the growing [akuma|E] threat fell on deaf ears and her patience is running short.\n\nFuture fate\nDara will be the one to point Piyau towards the Maluku at the end of her purge. Thrilled to see such clear victories for once, Dara will embrace the Passion Bloodflowers and become the Golden Queen of Ternate after the rise of this regional power.\nHer relations with the other Courts will be tense however as Dara won't enforce matriarchy as ruthlessly as the other Queens, some say because of her memories of her mortal life. This reputation will however lead her to attract refugees from the other Courts and even enjoy relatively stable relationships with the incoming [Glossary('Ashirra','game_concept_ashirra_desc')] and, later on, the [Glossary('Каиниты','game_concept_cainite_desc')] of Australia.\n\nIt was thus little surprise when Dara opposed the Great Leap Outward's attack on Australia. She will become a thorn on the side of Seok Kwan Sook, the leader of the invasion, and the situation will "stabilize" into a Cold War between the two powerful Queens."
 POD_persistentpodlore.desc.793475: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nHaving never known her family, Suryani fended for herself until she couldn't and starved to death alone and forgotten. Plunged into the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Malaveyovo, what she saw there changed her to her core. While she never speaks of what exactly happened, it is clear that this is the catalyst behind her drive to hunt down [akuma|E].\n\nAs a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], Suryani found an attentive friend in Dara, a woman who shares her passion for justice, though sometimes shies away from some of the more extreme solutions she offers. Suryani doesn't blame her however, after all, Dara didn't know what she saw.\nNone of them did.\nUnbeknownst to even her friend, Suryani is now planning to remove "Ancestor" Suryawati from power, by force if necessary. The times for compromises are over, if they ever existed.\n\nFuture fate\nSuryani won't have time to launch her plan as Piyau's purge will basically accomplish what she wanted. The formation of the Golden Court of Ternate under Dara will however cause a rift between the two women.\nSuryani will become more extreme and berate Dara for her laxity until a boiling point is reached when the Dutch and their [Glossary('Каинит','game_concept_cainite_desc')] supporters arrive.\n\nAccusing them of being in league with Malaveyovo and the reason being his sudden resurgence, Suryani will go rogue and conduct her own attacks against them.\nThe Great Leap Outward's attack on Australia will see her lead the Razor Blossom [Glossary('Wu','podgloss.wu')] during the first battles.\nThe signing of the truce of Sydney and the state of Cold War resulting of it will see Suryani once again go rogue and her [Glossary('Wu','podgloss.wu')] will become a very dangerous loose canon in the tense political arena of Australia."
 POD_persistentpodlore.desc.793476: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAs the [Glossary('Yama King','podgloss.yamaking')] of those who partook in cannibalism or died from hunger, Malaveyovo often has some especially wretched souls coming to his [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')]. Anangga was one of them.\n\nThe man himself doesn't know where his taste for human flesh truly came from. He just knows he enjoyed it, and enjoys it that much more since entering Malaveyovo's service. While he is far from the most powerful [akuma|E] in his lord's service (even he doesn't dare coming cloe to the corrupted shark shapeshifters lurking around his master), he fancies himself a creative mind. While he wasn't an especially sexist man in life (everyone can taste good when properly prepared anyway), he has seen the rise of the matriarchal Scarlet Phoenix Court and its even more extreme offshots as an opportunity.\nPerhaps these wronged women would like to truly taste their victory over the wretched men.\nPerhaps they will even enjoy the experience.\nIf they do... well, he would be happy to bond with them over some recipes and then present them to his lord.\n\nWhat a feast it will be!"
 POD_persistentpodlore.desc.793477: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDashi isn't the most skilled, charismatic or powerful [Glossary('Anda','podgloss.anda')] there is, leaving many to wonder why he has been chosen for the prestigious role of Eastern Vanguard of the horde instead of more famous vampires like the Black Winds. For his part, Dashi knows full well the reason. It's because he is expendable.\n\nDespite having been neighbors for a long while, the [Glossary('Anda','podgloss.anda')] know alarmingly little about the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] with their few encounters having ended in costly defeats.\nWith the rise of Genghis Khan and their mortal Mongol brethren now storming China, times are changing and opportunities are arising.\n\nDashi knows what is expected of him, learn as much as he can about the undead of China, probe their defenses and give the signal to launch the invasion when the time comes... if he still alive by that point. He has been given ample leeway to select the members of the vanguard among the other young, promising (and expendable) members of the [Glossary('Anda','podgloss.anda')]. He has taken full advantage of this and created a skilled group that is now slowly learning more about the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\nToo slowly for some of the more impatient elders but Dashi knows that it's his head on the line, not theirs. So he will be meticulous, patient and only push for action if some cataclysmic event were to happen to this apparently invincible "Yellow Emperor Court" of the Chinese undead..."
 POD_persistentpodlore.desc.793478: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhen Dashi started assembling his Eastern Vanguard, his blood brother Ketuyu was an obvious choice. The two, while very different in demeanor, always worked well together. Dashi is a more somber and withdrawn individual and it is thus the cheerful Ketuyu that is the face of the Vanguard to many. He is even the face of the [Glossary('Anda','podgloss.anda')] as a whole for the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\n\nIndeed, Ketuyu's diplomatic skills have been used to placate the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] Courts into a false sense of security. The crafty [Glossary('Anda','podgloss.anda')] is happy to debase himself in front of his so called betters to lull them into ignoring the growing threat at theirs borders. He has even been so successful in that endeavor that his tributes have become a mark of prestige among many Courts, all too eager to see barbaric foreigners kneeling to their superiority with fancy and exotic trinkets in hands.\nAnd while they snicker and degrade him at every turn, Ketuyu learns more and more about how they think, operate and more importantly of all, their weaknesses.\n\nLike his blood brother, Ketuyu is patient and takes every insult with a smile. Dashi knows that his sibling doesn't forget nor forgive however.\nIf one night, the [Glossary('Anda','podgloss.anda')] were to ride on China, the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] who slighted him might find themselves finally noticing the cruel and almost unhinged undertone carefully hidden behind Ketuyu's pleasant smile..."
 POD_persistentpodlore.desc.793479: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\n [Glossary('обращён','game_concept_Embrace_desc')] outside of Yesira's lineage, Saige faced the disapproval of the traditionalist [Glossary('Anda','podgloss.anda')] from the start of her undead existence. Barely accounted for by her [Glossary('Sire','game_concept_Sire_desc')] who [Glossary('обращён','game_concept_Embrace_desc')] her as an afterthought, Saige fled to the South as soon as she was able, looking for freedom and recognition of her skills.\nShe soon learned to hate the Chinese [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] much more than she ever did her [Glossary('Anda','podgloss.anda')] brethren.\n\nParaded as an exotic (and unruly) animal in the "enlightened" [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] Courts, she went from humiliation to humiliation until she escaped once again. She returned to the [Glossary('Anda','podgloss.anda')] just in time for Dashi to see in her an useful asset for the Eastern Vanguard as her knowledge (and hatred) of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] had few rivals among the younger members of the horde. Given more credit and respect than she ever got since becoming a vampire, Saige gladly accepted, the prospect of bloody revenge being a sweet bonus as well.\n\nWhile Saige's knowledge has already proven useful to the horde, she still resents them and chooses to disguise as a man when dealing with [Glossary('Anda','podgloss.anda')] outside of the Eastern Vanguard. She luckily has little to no contact with them, being happy to let Dashi and the others handle them in her stead.\n\nAs the years drag on and the awaited invasion still hasn't started, Saige is losing patience. It is only the prospect of being recognized by the Black Winds, or Yesira herself, that keeps her in line.\nIf she has to climb atop a mountain of [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] skulls to get there, all the better." 
 POD_persistentpodlore.desc.793480: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhen given the difficult task of leading the Eastern Vanguard of the [Glossary('Anda','podgloss.anda')], Dashi knew what he had to do and, thanks to the leeway given to him because of the task at hand, he could even get away with it. To understand the Chinese [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], he needed a Chinese man to use as a spy.\nIt took him months to locate a prospective candidate, a fairly minor bandit, and approach him with the offer of immortality. Dashi needed his future spy completely loyal and thus didn't withdraw any information.\nDeyi accepted and thus the first Chinese [Glossary('Anda','podgloss.anda')] was born.\n\nAfter some time to get acclimated, the former bandit was sent to a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] minor court to play the part of a clueless soul recently returned from hell. While Deyi wasn't the most convincing liar at first, the sheer impossibility of a Chinese [Glossary('Каинит','game_concept_cainite_desc')] was enough to lend his story the air of truth. And thus started his formal "education", learning about the [Glossary('Dharmas','podgloss.dharma')], the Five August Courts, the [Glossary('Yama Kings','podgloss.yamakings')] and much more.\n\nDeyi knew better than to push his luck and when the time came to assign him a proper mentor, he fled and returned to the [Glossary('Anda','podgloss.anda')]. Since then, he has infiltrated two other courts and perfected his acting skills.\nAs his mastery grows so does his ambition however. While Dashi is staying evasive, Deyi now understands that he will never be truly accepted into the [Glossary('Anda','podgloss.anda')], nor the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] for that matter.\n\nHe is thus pondering his options, knowing full well that they are quite limited at the moment."
 POD_persistentpodlore.desc.793481: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nSeok Kwan Sook was always an ambitious woman, dreaming of accomplishing spectaculars feats when she was young. Sadly, the norms of the day and her poor background meant that only a marriage to a struggling merchant could help her elevate herself. Sadder still, dying in childbirth cut her ambitions even shorter.\n\nStranded in a [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] that forced her to relieve the trauma of her death over and over again, Seok choose to fight and managed to escape. The return as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] and her first experiences with the Courts were exhilarating moments as her gender wasn't a problem anymore and it seemed like with proper studies and diligence, she could finally accomplish anything.\nNow almost a century later, Seok's honeymoon phase with her new condition is long gone and she understands that the rise to the top in an immortal society can take literally forever. She is now eyeing the weakening of the Azure Dragon Court for opportunities to find some kind of shortcut.\n\nFuture fate\nSeok will thrive for a while in the chaotic turning of the age but will have to step down during the formation of the Green Courts.\nLearning of the formation of the violent and fractured Golden Courts in Southeast Asia, she will join the fray and carve her own fief here.\nThe others [Glossary('Penangallan','podgloss.penangallan')] will respect her skill but demand that she become one of them before being accepted.\nShe will do so and become a respected queen in her own right with strong contacts with Korea.\n\nThis position will culminate in her being chosen to lead the Courts attack on Australia. She will achieve strong early successes by dividing and conquering the [Glossary('Каиниты','game_concept_cainite_desc')] there though the situation will remain unresolved for a long while."
 POD_persistentpodlore.desc.793482: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nGwang Hwa was barely a young man when general Ajagae passed through his town to recruit locals. Inspired by the man's charisma, poor background and apparent will to help the people, Gwang Hwa joined on the spot.\nSuch trepidation did him little good when he took an arrow to the face during his first battle.\n\nIn the chaotic [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Lanka, Gwang Hwa witnesses and took part in more warfare than he ever wanted for several lifetimes and every single one of those battles was in vain. He was finally thrown away when his spirit was completely spent and thus useless to the warring demons.\n\nAs a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], Gwang Hwa rebuilt himself and found solace in the strict rulings that policed the Courts. The fact that general Ajagae became barely an historical footnote also finished extinguishing his remaining youthful vigor. Gwang Hwa became a well behaved student, then a respected member of the traditionalists that accepted the Chinese Yellow Emperor Court's meddling in Korea's affairs.\n\nGwang Hwa is tired of conflict and strife but he is no fool. Emperor Xiao's grip on power is shaky at best and the current troubled times could create major issues for Korea. He has thus recently started to shift his stance to a more central position, trying to act as a mediator between the various factions.\n\nFuture fate\nGwang Hwa will prove to be pivotal in the orderly change from the Azure Dragon Court to the Green Courts. Acting as a voice of reason and lacking the will to seize power for himself, he will help in the peaceful reorganization before becoming a respected regional Ancestor.\nHis lack of will to take direct action and overall conciliating attitude will however play a strong part in the Green Courts' reputation as a safe haven for many unsavory characters."
 POD_persistentpodlore.desc.793483: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSelected to be one of the Wonhwa, the warrior women of 6th century Korea, Ji So took her role with pride becoming skilled with both bow and sword. The dissolution of the group in shame before it even saw a battlefield was a blow to her, and she choose to become a wandering warrior to help the people.\nShe soon learned that it worked better in the stories, as her skill was no match for superior bandit numbers and she suffered a grisly death.\n\nThe Hell of Being Skinned Alive wasn't kind to Ji So. She found her martial skills lacking to defeat the many demons and had to resort to underhanded tactics to escape. She keeps the troubling intuition that she could have been let go instead on the back of her mind.\n\nAs a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], Ji So naturally gravitated towards the Devil Tigers and honed her skills once more though the lack of [akuma|E] threat in Korea meant it once again stayed mainly theoretical. As centuries passed, her reputation grew and she got the honor of being chosen as the Azure Dragon Emperor bodyguard. While certainly humbled by the offer, Ji So couldn't shake the feeling that it meant that she was relegated to becoming a ceremonial warrior once again.\nAs the Azure Dragon Court is weakening and tensions with both Chinese and Japanese Courts are rising, Ji So secretly hopes that it will finally be time for her to prove her skills on an battlefield.\n\nFuture fate\nThe peaceful transition towards the Green Courts will foil Ji So once again. While many Ancestors will request her services, she will refuse every offer and leave the political scene.\nLegends will say that she gone back to the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] to fight against [Glossary('Tou Mu','podgloss.toumu')]. Other, more shrouded rumors, speak of having seeing her alongside the forces of the Iron Empress instead..."
 POD_persistentpodlore.desc.793484: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn during the time of the "Protectorate General to Pacify the East" that the Chinese Tang imposed over Korea, Bo Hui came to see their presence as a showcase of the intricacies of strength and weakness. While she didn't participate directly, she listened attentively to the political news of the day and came to her own conclusions. Her death, result of her "meddling" being caught by the authorities, only strengthened her newfound beliefs.\n\nBo Hui doesn't talk about what she had to do to escape the Pit of Salt and Iron but it is clear that she takes no pride in it. Instead, she jumped headfirst into [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] politics, some say at the expense of her personal enlightenment, and played the game as soon as she was able.\nThe situation with the Azure Dragon Court being dominated by Chinese interests reminds her of her mortal life and, while she has no real deeply seated convictions about the Korean Courts' independence, she choose to bet on this horse and became the head of the opposition faction.\nWhile her successes in this position have been few and far between, the current political climate seems poised to give her new opportunities as the Courts show their first signs of weaknesses.\n\nFuture fate\nBo Hui will be seen as the "winner" of the transition towards the Green Courts. As the leader of the Korean faction, she will achieve peaceful independence from China and cut ties with Japan.\nThe truth is that she could have pushed for much more but the prospect of ruling as a "Green Empress" held little appeal to her. The divided Green Courts becoming a neutral crossroads weakly "ruled" by a council of Ancestors suited her much more.\n\nThere is no fun in playing the game if you already won after all."
 POD_persistentpodlore.desc.793485: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nYeong Chang, thanks to his background as the one handling monetary concerns for a respected [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], always knew that Hell was very real. Even his vivid imagination wasn't enough to prepare him for it however.\n\nMade an example of by a rival of his master, Yeong found himself in the Hell of Being Skinned Alive and the horrors he endured there broke him. Promising that he would do anything to be freed, the demons let him go with a warning that they will come to collect at one point or another.\n\nAs a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], Yeong is motivated by his fear of going back to [UmbraGlossaryLocalized('yomi_wan','Yomi')] and he thus started using his keen sense for financial opportunities to make allies, earn favors and overall make himself as useful as possible to avoid making enemies. He is currently investing in the emerging ritual Jade market, something that could open him new clients outside of Korea.\n\nFuture fate\nYeong will thrive in the coming Green Courts, even playing his part in naming them as his ritual Jade market will take off beyond his wildest dreams.\nSurprisingly to many, Yeong won't really become rich thanks to his trade since his prices are always below what could be expected. For his part, the "Jade father" will laugh these concerns off and say he is only looking for new friends and not new clients.\n\nEverytime someone new enters his domain however, one can see Yeong startled for a moment, as if dreadfully waiting for an unannounced customer..."
 POD_persistentpodlore.desc.793486: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nRuhui is a man who knows his worth. Though some would say that his mortal life as the youngest son of a gentry clan gave him an inflated vision of it.\n\nAs a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], Ruhui wanted the quickest path to relevance and thus his annoyed mentor pointed him to the Devil Toppling Society, the group of young immortals meant to keep in check crumbling Courts (or hasten said crumbling in some cases).\nRelishing in this opportunity, Ruhui set his sights on Northern Korea where the authority of the Azure Dragon Court was weakened due to the unrest in P'yong'yang, Ruhui led a band of other malcontents and carved his own fief in the area.\nWhile this could have been seen as an act of war between the Chinese Yellow Emperor Court and the Korean Azure Dragon Court, the fact that Ruhui acted under the banner of the Devil Toppling Society gave him political immunity and his takeover became fait accompli.\n\nRuhui is now marshaling his forces to march on P'yong'yang itself as its new Ancestor is also considered an upstart and unlikely to receive help from the major Courts.\n\nAfter that... well, if the entire Azure Dragon Court needs toppling to give way to a new age, Ruhui is ready to be the man ushering it. And ending on top.\n\nFuture fate\nDuring the creation of the Green Courts, Ruhui will try to make the situation descend into chaos. He will one night receive a warning to not do so by the being known as Shadow Puppet.\nAfter ignoring it and on the night preceding his call to arms, Ruhui's ashes will be found spread over the warning letter."
 POD_persistentpodlore.desc.793487: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nA long time ago, Tokiko had the dubious honor of being one of the first souls imprisoned by a young and ambitious [Glossary('Yama King','podgloss.yamaking')], [Glossary('Mikaboshi','podgloss.mikaboshi')]. The demon, in a way, was much more open about his goals in these formative years and Tokiko saw it all, the soulless grind of a maddening society that would twist humanity to become no more than tools in his hands. She swore to fight it with all her being and never wavered in this promise still.\n\nAs a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], Tokiko progressed quickly, becoming a respected Bishamon Ancestor and even the Japanese representative to the Azure Dragon Court several times. Her diligence at hunting down [akuma|E] was highly praised and she took to the field herself many times. Many demon hunters of the Bishamon still use her tactics, though none would admit it openly nowadays.\n\nDespite these victories, Tokiko saw signs of [Glossary('Mikaboshi','podgloss.mikaboshi')]'s rise everywhere. The growing cities, the new inventions and philosophies invented by humanity were insidious tools of the enemy to her. When she uncovered that [Glossary('Mikaboshi','podgloss.mikaboshi')] had ensnared a powerful group of strange creatures to his bidding, she alerted the entire courts and rallied every ally she could.\n\nIt ended in a wild goose chase, these creatures were slippery and besides the name "Kagaseo", Tokiko had nothing to show for her work.\nShe didn't stop however, and soon isolated herself in what others thought were a growing paranoid madness. It was when she finally confirmed the existence of the "Great Clan" but could not confront them on her own that she took the most critical decision of her life.\n\nThe next night, Tokiko entered [Glossary('Kakuri','podgloss.kakuri')] and was received with respect and honors by [Glossary('Emma-o','podgloss.emmao')] himself.\n\nThis night, the "Daimyo of the Dark" gained his most fanatic and devoted [Glossary('Shikome','podgloss.shikome')] and he didn't even have to lift a finger."
 POD_persistentpodlore.desc.793488: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThere was once a time when the Judge of Balance, Yen-Lo, presided over the souls of the just and compassionate. His honorable conduct was seen as an affront by the other [Glossary('Yama Kings','podgloss.yamaking')] who lusted after the many souls they could corrupt in Yen-Lo's realm. Thus, lead by [Glossary('Emma-o','podgloss.emmao')], they invaded his territory and struck him down. But the triumph they expected was short lived, Yen-Lo had a dead man switch and they were hurled out of his realm that sealed itself for good.\n\nBarely escaping the ordeal, [Glossary('Emma-o','podgloss.emmao')] angered to have nothing to show for his victory when he noticed that, in the fleeting moment between Yen-Lo's death and the closing of this realm, some unfortunate souls drifted apart.\nTracking them down, he could only capture one, and it was the sweetest soul he has ever seen. Yen-Lo sheltered the kind and compassionate after all and true purity was a rare sight indeed.\n\nIsolating himself in the depths of Kyuken no Kakuri, [Glossary('Emma-o','podgloss.emmao')] only emerged when he was done, accompanied by the one he named Kiyoko, the first of his [Glossary('Shikome','podgloss.shikome')].\n\nSince then, every Shikome has been modeled after Kiyoko, quiet, emotionless and icily cunning. None of them truly surpass the one Emma-o considers his masterpiece however, most likely due to what he calls the "source material", that being the purity of the original soul.\n\nOne night, when he becomes the [Glossary('Demon Emperor','podgloss.demonemperor')], Emma-o knows that he will be able to remove Yen-Lo's seal and finally have the means to create an army of more powerful and perfected [Glossary('Shikome','podgloss.shikome')] to serve him for the eternal Sixth Age..."
 POD_persistentpodlore.desc.793489: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile [Glossary('Kakuri','podgloss.kakuri')] is an hellish desolate landscape for most of the souls tortured there, this is not the case for people of Ainu descent. Even to this day, [Glossary('Emma-o','podgloss.emmao')] takes his role as the god of the Ainu dead seriously and they are thus treated with respect and care before being led to the underworld of their ancestors where the just and compassionate among them can look forward to a peaceful afterlife. Sometimes however, a soul resists this offer. Such was the case for Pirka.\n\nThis woman, feeling restless even in death, choose to wander the realm instead of accepting her reward. It didn't take her long to see that [Glossary('Emma-o','podgloss.emmao')], while respectful of her people, has grown mad and corrupt beyond reason regarding everything else. Protected by her immunity as an Ainu, she entered his domain and confronted him for answers.\n\nWhile surprised, [Glossary('Emma-o','podgloss.emmao')] showed patience, almost fatherly concern, and listened. And then he told her everything. The slow death of their people, the mad realities of the other [Glossary('Yama Kings','podgloss.yamaking')], the careless and unconcerned [Glossary('August Personage of Jade','podgloss.augustpersonageofjade')]. Pirka understood but didn't completely agree and refused to let Emma-o escorts her to the Ainu underworld. Instead, she choose to enter his service.\n\nReturning as an [akuma|E], Pirka's relationship with Emma-o has been complicated since. She hopes to serve as his moral compass as he ascends to the [Glossary('Demon Emperor','podgloss.demonemperor')] throne. The [Glossary('Yama King','podgloss.yamaking')] for his part is torn on how to act with her and has so far let her do her own thing, though always with a group of [Glossary('Shikome','podgloss.shikome')] close to ensure her protection."
 POD_persistentpodlore.desc.793490: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIeko was angry all her life. Angry to be called ugly when she was young. Angry to be forced into a loveless marriage with an old brute. Angry that she was executed for defending herself against him.\nEven death didn't bring her peace, as she was destined for [Glossary('Kakuri','podgloss.kakuri')].\n\nAllying with other souls lost in this dark realm, she thought for a moment that escape was possible until the group met its first [Glossary('Shikome','podgloss.shikome')] and the men instantly turned on her out of "love" for the creature. Left to rot on the desolate sand, she would have given up if not for the intervention of Jizo-Bosatsu.\n\nThe strange and kind old man put her back up and taught her about the ways of the world, the [Glossary('Yama Kings','podgloss.yamaking')], her potential to return as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] and the enlightenment to achieve there. Ieko listened but also noticed that the traveler was making the [Glossary('Shikome','podgloss.shikome')] and even [Glossary('Emma-o','podgloss.emmao')] himself afraid. This was the part that interested her the most.\nJizo stayed silent about the truth of the matter however which annoyed Ieko greatly. Here was a great being with apparently the power to make things right and what was his goal instead? School lost souls into following a long and arduous path that "could" lead to something good at the end.\n\nTheir relationship never really recovered after this falling out, Ieko never seeing the point of avoiding direct action that could help things now instead of centuries in the future. In the end, they parted ways, but not before Jizo showed her a mean to escape.\n\nIeko stayed there a long time, looking at the door to the outside world and apparently the centuries of grueling Dharmic enlightenment that awaited her, most likely with the added stigma of being a newcomer. In the end, she turned around and entered Emma-o's castle instead, Kyuden no Kakuri.\n\nWhen she emerged, the youngest [Glossary('Shikome','podgloss.shikome')] was ready to take decisive action for her lord."
 POD_persistentpodlore.desc.793491: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor someone who claims to be a god, the Hungry Dead who now goes by the name Hari really doesn't look the part. And in the sun-scarred and physically weak advisor commonly hiding in Indra-gha's shadow, there isn't a more fearsome mind the Celestial Tribe have at their command.\n\nHari was born in the Chutia Kingdom, and from birth his strange physique was considered ominous. Pale, anemic, and throughout his life barely fit for much labor, he was none the less staggeringly intelligent from a young age, capable of performing advanced mathematics and religious studies from early in life. His parents, wanting him to have some degree of advancement as minor landowners, sent him for study at Nalanda mahavihara in the hopes he would have a chance to do something great.\nHe studied there and took to it greatly, having a great mind for the sciences, arts, and religions, but tragically, when he was returning home, he was killed one night as, awakening to forces that lay dormant in all mortals, he was scoured away by lightning of his own make, and he was condemned to the Hell of Wicked Magic. And in that Hell, he became bitter. Furious. Condemned as a Mage when he was one for all of about a minute lit a different fire in him.\nHe tore his way from the Hell like a phantom, until finally he returned to life, and was found by the Celestial Tribe. And, in hearing them explain things, he at least had a cause. And someone to blame.\n\nHari is one of the rare few people in the world with a higher education, intelligent, a drive, and the mindset to do it. Too physically weak to directly engage most threats, he has honed subtle warfare to an artform. While still young, he is an artist of lies, distant to the pain he inflicts, and wise enough to know when to be meek, he may carry the Celestial Tribe to new heights.\n\nFuture Fate\nHari would advance quickly in [Glossary('Dharma','podgloss.dharma')], as the God that clears away opposition to the Celestial Tribe, but never overreaching. He would eventually surpass his mentor Indra-gha in Dharma, but disappeared shortly after the Week of Nightmares.\nHe sees one final great obstacle to the Celestial Tribe's ascent, and his role is to clear it. So he disappears, preparing for when the Celestial Tribe faces the [Glossary('Demon Emperor','podgloss.demonemperor')]."
 POD_persistentpodlore.desc.793492: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe Godlings are well known for the diverse colors and walks of life that they have within their members. Granted though, even for them, Prajapati is a bit... eccentric.\n\nWho he was before he went to the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')] isn't clear. But he ended up in the Hell of Upside Down Sinners. There, through embracing its mania and confusion, he managed to be ejected out, as the Hell naturally doesn't welcome those accustomed to it.\nThus, as he was tearing through central India as a feral Hungry Dead, the Godlings found this child of Sita and brought him into the fold. But even through his education, which aspect of the Devi he embodies was never clear. To complicate matters, the name he took, Prajapati, could apply to Brahma... but also Vishvakarma, Agni, Indra, Daksha, and numerous other beings.\nAnd given he seems to deviate wildly on which one he is closest to at any given time makes a direct comparison a headache to say the least.\n\nAt the very least, his familiarity with the Hell of Upside Down Sinners, while it has left him undeniably 'different' he is a true sage on the worlds beyond the earth, and his teachings are at the very least illuminating.\n\nWhen they can be made sense of, at least."
 POD_persistentpodlore.desc.793493: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhat would gods be if they didn't look the part? To be as Gods in all things is a foundational tenet of the Celestial Tribe. And in armory and fashion is no different. And to help them with that, Tvashtr is happy to see to the forge.\n\nTvashtr was always an artisan. In his mortal life he even idolized his namesake when he read of him in the Mahabharata. In all these things, that is what he wished to be.\nSo he was always was pushing himself further and further in those arts. Between making weapons and making jewelry, he was constantly pushing himself to be better and better. And one day, his work was proven fantastic, when one of his former clients separated his head from his shoulders and sending him to the Hell of Being Skinned Alive.\n\nHe cannot remember his escape, but Tvashtr is eternally grateful for the Godlings that saved him. He is now sure of their [Glossary('Dharma','podgloss.dharma')], believing with all his heart his earlier adoration of Tvashtr meant they were one and the same. It makes perfect sense to him.\nAnd now, among the Godlings, few are as true to their path as the Master of the Forges."
 POD_persistentpodlore.desc.793494: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhen Chitrangada woke up in the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')], she was sure of one thing - she didn't belong here. But as one of Ravana's many consorts, she had little say in the matter.\n\nChitrangada doesn't remember her mortal life at all, and as far as she can remember, her life begins in Ravana's castle, selected as one of his consorts. While many others in this horrifying situation succumbed to either despair or greed, being shaped into Rakshasa. But among them, Chitrangada was one who refused to fully succumb, instead playing her cards right, holding onto as much of her soul as she could.\nAnd for that, one night, when the Hungry Dead who went by Hanuman was on one of his regular rampages through the Demon City, he found her, a consort who wouldn't yield to Ravana. Seeing a godliness in her the Celestial Tribe cherished, he broke her out, and brought her into the Celestial Tribe for a proper education.\n\nSince then, Chitrangada has embodied this, styling herself as a Goddess of Willpower, Trauma, and Humility. And above all, she is one of the Faces of the Goddess' biggest detractors.\nThe idea that they were wicked is fundamentally false, as she never did anything wrong. Her story began in Hell. So for them to claim she deserved that fate is an insult. So she leads them in that regard, the main opponent to their doctrine, and foremost of the Celestial Tribe's intellectual defenders."
 POD_persistentpodlore.desc.793495: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSurpanakha, before she died, was a ghoul of a truly ancient Ravnos. While she claimed to be the sister of Ravana, ghouled so as to serve him in immortality, her claims cannot be proven. At the very least, she was a weaver of arcane arts and terrible magics, the ancient monster's bloodied hand, feasting on his blood in return for immortal service.\n\nShe was a scourge to the early Hungry Dead of India, a terrible hand of reckoning, an infernalist of high renown, and witch of terrible power. At least, until she was finally slain by Hanuman. While many thought that would be the end of things, in a strange way, it proved to simply be a new beginning, as in death, she learned the true price of infernal servitude in Lanka.\n\nRaging against her brother's betrayal, ancient spells fading were turned into the means of her liberation, and Hanuman found her once more revived in the living world. Subjugating and civilizing her, he gave her an ultimatum. Be a God, or be a Devil. She chose to be both.\n\nAmong the Godlings, few know what she claims, and fewer buy it. At the very least, she seems utterly convinced it is true. And to that end, she is their monster. The thing they unleash when all hope is lost, to remind others what goodness exists in opposition to.\nAnd while she is more controlled, she is no less violent and indulgent. At the very least, she listens, and acts against the forces she is convinced betrayed her.\n\nFuture Fate\nWhile her exact origins would never become concretely proven, when the Eternal War is restored when Chandraputra and Hazimel unite once more, Surpanakha, ancient as she is, goes into a manic fit of berserk rage and terror, tearing her way into the Ravnos domains that struggle on after the Week of Nightmares, before disappearing into Lanka.\nWhat becomes of her is not known."
 POD_persistentpodlore.desc.793496: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nGayatri prefers to avoid over grandness, as the greater scale of the games of Ancestors and Princes exist at a scope she struggles to really fathom. She knows what she is, and what she aspires to be. And that is enough for her.\n\nGayatri was born, raised, lived, and died in a small village along the southern half of the Brahmaputra River. From birth to death, life went on as it always had. Relatively out of the way, and distanced from the major wars of the time, she was primed for an uneventful life. She grew up, married, had a family, tended to their means as farmers, and then passed away old, And through her life, she was content. She was happy with it.\n\nThat is why waking up in the Night Realm was so disorienting. But, she at least remembered the rules of mortal life, and followed the rivers, and eventually, through them and at times going by nothing but the sound of water lapping against a riverbed, she found her way back to the world of the living, but now there is an entire society of monsters and lesser deities that now say she is a Goddess.\nAnd while she can at least understand that now the power she has is godly, her contemporaries claiming to be incarnated aspects of beings as high as Indra or Shiva doesn't exactly sit right with her.\n\nGayatri, rather than challenge this, has chosen instead to tend to back to her home. Centering a small cult around her, she is perfectly content and happy to protect them, to guide them, and be their protector god. That's enough for her.\n\nOnly time will tell if she has the luxury of staying small."
 POD_persistentpodlore.desc.793497: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile most of the Rising Phoenixes pursue their [Glossary('Dharma','podgloss.dharma')] through protecting their biological family, the [Glossary('Dharma','podgloss.dharma')] mainly focuses on community and kinship, something in which blood is not a necessity. Civatêvi was among the first Phoenix in the Infinite Thunder Courts to truly embody this principle.\n\nCivatêvi always lived on the edges of society. Never feeling right with herself growing up as a boy, she was drawn early to the various Aravanis and Hijra that would come by the city she lived. However, her parents did not like this 'phase' and tried to pressure them against it. But they were far more welcoming to her than her 'family' ever was.\nBut all in all, it would have mean little, as Civatêvi was later killed during a payment dispute, and for her proximity to a sex worker when she died, she ended up in the Hell of Salt and Iron. But unlike so many others, the tortures of the Hell of Salt and Iron, in an odd way, ended up making her fully realize herself.\nActualized, her escape was inevitable, as she fully committed to her perfected self and charmed her way out, and took her second breath.\n\nCivatêvi has since more closely connected herself to the Indian communities that exist outside the normal bounds of masculinity and femininity, and in protecting those who move across those thresholds. They are her family, she feels, and so she does what she can to uplift them. And as the Eternal War rages, everyone needs protectors."
 POD_persistentpodlore.desc.793498: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nThratri has always been Ravana's oldest ally. Long, long ago, when the proto-Indo European peoples diverged, and those that would come to India began their conquests, Thratri was there, the only daughter of a general to a conqueror. Born on campaign, raised around soldiers, and growing up through a conquest, Thratri had only ever known war.\nAnd when her father's lord would fall under the gaze of a blood god, she would go with his army into the night, first as a Ghoul, and then later, as the first progeny of a blood brother to the conqueror. And then, Thratri began to understand. And she followed her [Glossary('Sire','game_concept_Sire_desc')], who she would come to see as a father for the power he gave her, into damnation.\n\nWhen Ravana betrayed the rest of the Ravnos, it was not just his own power that let him prevail. Chandraputra was nearly unequaled as a general, and older than Ravana. While Ravana's infernal arts were great, Chandraputra's armies would overwhelm him, had it not been for Thratri commanding their forces.\n\nThratri was born and raised in Chandraputra's camp, and trained in his warfare. Since her [Glossary('Объятия','game_concept_Embrace_desc')], Ravana had bade her to shape her own battle strategies purely on countering Chandraputra. So when Chandraputra arrived to put down his traitorous blood brother, Thratri sprung to action, leading their infernal forces and demonic hosts against him in stratagems tailor made to counter him, wholly unlike that of the Damned or the Blood Assassins.\nHer counter campaigns were enough, and Ravana became a [Glossary('Yama King','podgloss.yamaking')]. And Thratri's reward? A violent and humiliating murder, as she was stripped bare, hacked apart with every weapon known to them, starved, staked, and set ablaze while beaten to death by devils. Condemning her to the newly born Demon City as its first sinner, and its first Raksha.\n\nThratri never forgave Ravana for this. She liked being a vampire. She hated her new state as an Asuratizayya monster.\nBut her father was now a Devil King. She needed to wait for her chance. She built his empire afterall.\n\nAnd she would have her inheritance.\n\nFuture Fate\nThratri would wait for millennia, even past the Demon City's decline. In Modern Nights, she steadily builds strength, as some suspect her betrayal is inevitable. And as the Sixth Age draws near, Thratri finally starts to make moves in the wake of the Week of Nightmares."
 POD_persistentpodlore.desc.793499: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nJayamala was a man of war in his lifetime. Being born during the collapse of the Pala of Kamarupa, he has to be as the region's instability left little room for men of peace. Sadly, Jayamala was strong but not strong enough to survive in this line of work for long and the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Lanka was his reward.\n\nLanka's desolation and lack of strong central authority were familiar to the soldier. He was quickly found by the many refugees (or bold adventurers) using this realm as a (relatively) safe respite zone. Jayamala wasn't brave enough to follow those trying to escape but he was skilled and willing to defend the more broken souls that just wanted to continue their "living" here.\n\nWhile the Raksha of Lanka mostly left the refugees alone (for unknown reasons), they are still sometimes hunted down for sport by the more sadistic ones. Jayamala made a name for himself during these hunts, being able to face and hold his own against several Raksha.\nSadly, that made him interesting and he was woefully outmached when the Raksha Queen Thratri faced him herself. Ignoring the refugees under his care, Thratri dragged him to the Demon Keep.\n\nWhen he emerged, Jayamala was now a Raksha himself.\n\nSince then, he has been a solid and stoic warrior reporting directly to Thratri though other Raksha doubt his commitment to the cause. He is considered soft hearted (though some thinking that have been shown the error of their ways in very public displays) and his loyalty looks to be to Thratri instead of Ravana himself.\nThat being said, other rumors have it that he is Ravana's trump card to be played when Thratri inevitably betrays him.\n\nThe truth is unlikely to be known until the very fate of Lanka hangs in the balance."
 POD_persistentpodlore.desc.793500: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nRenben was always a smart man. If he wasn't always looking to cut corners, he might even have become someone important.\n\nBorn during the reign of Emperor Taizong, Renben was quick to notice the outsized influence of the Shangqing school in matters of state. Seeing this as a quick way to courtly power with a veneer of philosophical legitimacy, he became a seemingly diligent and avid practitioner.\n\nTruth be told, his understanding was surface level at best as he tried to look for openings to prestigious court positions at every opportunity. It was only a matter of time before he was found out. Renben tried to push around and threaten the seemingly frail scholar that berated him, only to be met with a fireball in the face.\n\nFinding himself in the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Feng-tu, Renben was invited by a strange individual named Ku. Introducing himself as a [Glossary('Yama King','podgloss.yamaking')], this entity offered power and recognition in exchange for fealty. Renben, awed by what looked like the interest of a godlike entity, eagerly accepted.\n\nSeveral centuries later, the honeymoon period has long ended. Renben has since understood that Ku is a very minor [Glossary('Yama King','podgloss.yamaking')], barely holding his realm under the nose of much more powerful entities. While he has considered defecting, Renben is no fool and knows that his master is still more than able to crush him without much effort.\nHe has recently understood that his master hid his most powerful asset from him, the Wu-Keng mages, and he is wondering why. Are the mages considered expandable? Or is he?\n\nRenben is now pondering how to use this information. It could serve as leverage for switching sides to another master or perhaps even position himself as a go between the mages and Ku, using one against the other."
 POD_persistentpodlore.desc.793501: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWidely considered as the least human of the [Glossary('Yama Kings','podgloss.yamaking')], Hluh eschews the use of [akuma|E], preferring the company of the parasitic organisms that inhabit his [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')]. There are exceptions though, such as Namwaran.\n\nNobody knows much about him (her? they?) as his very form seemingly comes out as a shifting nightmare rather than anything sane. Rumors have him as Hluh very first [akuma|E] (which would explain his power), others as simply his current favorite. The most disturbing ones tell that Namwaran isn't a single entity but an amalgam of poor souls grafted together by Hluh's deranged mind, or even simply an host to a malevolent parasitic lifeform, testament to what Hluh has in store for humankind if he was to ascend as the [Glossary('Demon Emperor','podgloss.demonemperor')].\n\nWhatever the case might be, Namwaran rarely speaks though is able to showcase human emotions at times (though in a deformed, uncanny, way as if mimicking those was hard on him). He is more well known as a butcher however, reaping the souls of the Hell of Boiling Oil and occasionally coming to Earth itself.\nWhile his aims during these raids are never truly understood, the results are always bloody and horrifying to behold. Every bold [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] force that tried to stop him has only served to increase the dreadful reputation of the Boiling Reaper."
 POD_persistentpodlore.desc.793502: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThere was a time when the [Glossary('Yama King','podgloss.yamaking')] Tou Shen was a worthy rival to Rangda, the mistress of pestilence. This time is long gone as Tou Shen's [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] is slowly depopulating with Rangda strengthening her stranglehold on the souls killed by diseases. Tou Shen can boast of one victory though, and her name is Ensima.\n\nOne of the many poor souls dying from a rabid pestilence, Ensima ended up in Rangda's domain and soon became a favorite test subject for the mistress of pestilence latest creations. Stuck in endless agony, Ensima's savior wasn't a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] or a fellow lost soul but Tou Shen himself. Leading on his own an attack on Rangda's realm, Tou Shen (rightfully) supposed that the mistress of the realm wouldn't show herself in fear of a costly confrontation. As the one losing the war, Tou Shen didn't have this issue and Rangda's [akuma|E] were no match for his personal might. Before leaving, he secured several souls for his own use, including Ensima's.\n\nThe woman, having endured untold horrors under Rangda's "care" already had supernatural resilience and a zealous gratitude for her savior. Tou Shen didn't waste time in gifting her his own set of powers, transforming her into a formidable being blessed by the two [Glossary('Yama Kings','podgloss.yamaking')] of disease.\n\nStrangely for a foremost [akuma|E] of pestilence, Ensima appears as an healthy looking woman untouched by any signs of illness. The truth on that matter is simple, Tou Shen earned even more of her loyalty by making sure she would never endure diseases herself while still being perfectly able to inflict it on others.\nShe is more than eager to do just that, eager to please her savior and get her revenge on Rangda in the process."
 POD_persistentpodlore.desc.793503: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nHumamay, as far as she can remember, hated her life. An uncaring family, the weight of expectations to accept her role and the inability to rebel made her angry until her father beat her up enough to warp this anger into despair. It wasn't very long until Humamay jumped into the ocean to end it all.\n\nThe small [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] of Hine-Nui-Te-Po, a minor [Glossary('Yama Queen','podgloss.yamaking')] was the end of her journey. Hine-Nui-Te-Po feeds on despair and anger and her small realm allows her to provide personal "care" to every soul in her realm and Humamay was no exception.\nShe rekindled Humamay's youthful anger and made sure it encompassed everything.\n\nHumamay now appears as a rare but feared presence in Southeast Asia, feeding on despair and self loathing, encouraging it at every turn to empower her mistress.\nShe reserves her personal scorn for the [Glossary('Penangallan','podgloss.penangallan')] however. These women trying to reach enlightenment by wildly rebelling against the societal order repulse her.\nDeep down, she knows that her anger at them stems from her own experience leading her to this point but she is too far gone to care. While she hasn't managed this feat yet, she dearly hopes to be able to capture one of those [Glossary('Penangallan','podgloss.penangallan')] then break her thoroughly by showing her that nothing will change, no matter how hard she trashes around.\n\nThe despair she will feed from this day will be truly the stuff of legends."
 POD_persistentpodlore.desc.793504: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce, Ni Luh was a promising disciple. Before that, she remembers hazes of calling someplace home. But now, that is just a nightmare, echoes and torments of a time long gone. All she has now is her siblings and her mother. Her queen, and her purpose.\n\nNi Luh, before her service to Rangda, was among a trio of disciples tasked with investigating a Broken Mirror in India, until they faced a six armed, flesh roiling horror. All three were briefly captured, and in their imprisonment, they had tasted of the horror's blood. And something... entered them.\nSomething alien, something beyond knowing, but something still distinctly human, distinctly hateful, and distinctly ambitious. The first of the Hungry Dead to become vectors of this supernatural plague, it tormented them endlessly, playing with them like toys, as vomiting out their stomachs only to see it transform into insectile horrors intent on killing each other.\n\nSeeking to flee this abomination inside them, they fled across the Umbra, only finding respite in the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')]. Desperate for succor, they looked everywhere for relief from this affliction. And of all places, they found it in Rangda.\n\nAs the senior of the group, Rangda reshaped the soul of Ni Luh the most intensely. She was remade under Rangda's touch, pulled apart and reformed. Rangda saw the malleability of flesh as a result of a plague fascinating, and let them grow it into something akin to Shintai.\n\nThese horrors were revealed most closely to Ni Luh, who would become a foremost expert on them, and would use this into shaping her body into a whole menagerie of new horrors, and extending pain. Rangda, please with her, named her Ni Luh, and set her to work within her Hell.\n\nBut now, there are other Hungry Dead that can shape flesh. Ni Luh has a gift to give them. A plague of a horror in blood that only Rangda can save them from. The Eldest Cancer that spreads through her lips.\n\nSisters, come to Rangda's Daughter, and find purpose."
 POD_persistentpodlore.desc.793505: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce, Madek was a promising disciple. Before that, he remembers hazes of calling someplace home. But now, that is just a nightmare, echoes and torments of a time long gone. All he has now is his siblings and his mother. His queen, and his purpose.\n\nMadek, before his service to Rangda, was among a trio of disciples tasked with investigating a Broken Mirror in India, until they faced a six armed, flesh roiling horror. All three were briefly captured, and in their imprisonment, they had tasted of the horror's blood. And something... entered them.\nSomething alien, something beyond knowing, but something still distinctly human, distinctly hateful, and distinctly ambitious. The first of the Hungry Dead to become vectors of this supernatural plague, it tormented them endlessly, playing with them like toys, as vomiting out their stomachs only to see it transform into insectile horrors intent on killing each other.\n\nSeeking to flee this abomination inside them, they fled across the Umbra, only finding respite in the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')]. Desperate for succor, they looked everywhere for relief from this affliction. And of all places, they found it in Rangda.\n\nMadek, in being 'healed' by Rangda, was made ideal to serve as the commander of her maggot ridden Zombies. Madek had a mind for war, and his mind was tested in commanding her forces, in siege worms smashing down walls made of the screaming afflicted.\n\nFurther, he discovered that disease itself could be a weapon in war, and frequently eschewed direct siege engines for instead arming them with afflicted bodies filled with the foul blood of the disease that ravages his insides. Only when others die and are infected does his aches subside. Plague and war is all that eases his pain.\n\nSo he conquers. He spreads. Your pain eases him. So you will be afflicted."
 POD_persistentpodlore.desc.793506: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce, Nyoman was a promising disciple. Before that, she remembers hazes of calling someplace home. But now, that is just a nightmare, echoes and torments of a time long gone. All she has now is her siblings and her mother. Her queen, and her purpose.\n\nNyoman, before her service to Rangda, was among a trio of disciples tasked with investigating a Broken Mirror in India, until they faced a six armed, flesh roiling horror. All three were briefly captured, and in their imprisonment, they had tasted of the horror's blood. And something... entered them.\nSomething alien, something beyond knowing, but something still distinctly human, distinctly hateful, and distinctly ambitious. The first of the Hungry Dead to become vectors of this supernatural plague, it tormented them endlessly, playing with them like toys, as vomiting out their stomachs only to see it transform into insectile horrors intent on killing each other.\n\nSeeking to flee this abomination inside them, they fled across the Umbra, only finding respite in the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')]. Desperate for succor, they looked everywhere for relief from this affliction. And of all places, they found it in Rangda.\n\nOddly for a realm defined by disfigurement and maggots, when Rangda lifted the Hungry Dead she named Nyoman from her Spawning Pits, Nyoman left it beautiful beyond compare, but this was a honeyed lure to those who would seek her out.\n\nWithin her coursed every affliction that could flow through mankind's loins, and Rangda set in her an unquenchable desire to spread it far and wide, and the knowledge on how to play men and women around her fingers and become new vessels for Rangda's 'gifts'. Nyoman would leave the Spawning Pits with that charge, smiling and dreaming deliriously of the pleasures to come."
 POD_persistentpodlore.desc.793507: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAt the turn of Ages, when the Hungry Dead fell from the grace of heaven, it was the newly united Beast Courts that had struck them down. The Beast Courts had come together after Heaven's Ministers tricked the Emerald Mother's Children into a war, while the Ministers abused their authority to kill her.\nThe Ferocious People saw this, and rose up as one to depose them and save their mother. But to their shock she sought to smite them all, as it was not their job to oppose the Ministers. No, they should have killed each other and let her die. But her wrath was shifted, as the Hakken Legend Chi You accepted condemnation for their 'sins', where he would remain, bearing the weight of all their sins and preventing any other Fera from being sent to the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')].\n\nBut a Hakken Sword-Bearer despaired at this. The Emerald Mother's condemnation was cruel, unfair, and unjust. But none would listen to him.\nSo his protests turned to resentment, his despair turned to wrath, and his sorrow into rage. He defied his Goddess Mother's edicts, and descended into Hell to save him. But there he would become lost, and wander, until he found himself in the Hell of Being Skinned Alive.\n\nHis blessed hide would heal against the flaying winds, as he pressed on, howling for the heads of the Ministers who set this whole tragedy into play. The lord of this hell, the [Glossary('Iron Queen','podgloss.toumu')], looked from her fortress and smiled as she found someone who actually equaled her in hate for the fallen Ministers of Heaven. She opened the way to her palace for this wolf, and treated him to a dinner.\nThey bonded over their hate, and [Glossary('Tou Mu','podgloss.toumu')] offered to free Chi You when she became Demon Empress, and ensure the Wolf would have his love. And all he had to do was help her annihilate that which damned Chi You.\n\nAnd the Wolf that was died there, and Kills-The-Dead was born in agreement. Recast in Infernal Iron, sinners now whisper of the Iron Queen's Hunting Dog, the most dreaded killer among the [akuma|E].\nWhat they don't know is when he howls, he howls for what he has lost, and swearing that those that damned him will suffer until the death of time for their sins."
 POD_persistentpodlore.desc.793508: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nPerhaps, had Daoyi died at a later time, she'd have been sent to the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')], and possibly returned as a Hungry Dead herself. But she was born far too early. Born long long ago before the Wheel of Ages turned to grimmer times, Daoyi was a forgotten sex worker, who lived an uncelebrated life, before her demise at the hands of someone who saw her and chose that rather than pay for her services, he would take it and kill her instead.\n\nAnd then, in the Yellow Springs as a Wraith, she was pressed into the same fate. But as days passed into centuries, one client in the Yellow Springs was different, and they saw a fire in Daoyi that still burned. So they whispered to her a forbidden truth. Doayi seized on the chance to reclaim her fate, performing a blasphemy and coming back from the dead, her body rising from dust as a Risen, and that client returned to her, proud that she succeeded, and offered her a job as their first [akuma|E].\n\nDaoyi has since served [Glossary('Wu Hua','podgloss.wuhua')] faithfully, aiding him as the Wheel turns by managing one of the most depraved place in all the Hells. And unlike their other servants, she remembers her humanity, and it enflames her.\nShe oversees the Iron Brothel, Wu Hua's favored construction in their Hell. She commands his collection demons, seeking out perpetrators of sexual violence not just in other Hells, but also across the Underworld to be abducted and dragged back to the Iron Brothel.\n\nWith a mixture of Moliation and Jade Arcanoi, she delights in castrating them, turning their taken manhoods into chain jades that can control their emotions, and moliating them into the women that staff the Iron Brothel. Their agony and torment is among the richest any of Wu Hua's servants has supplied them, and so Daoyi has many special privileges, especially given her unique status as a Risen.\n\nThey have soul shaped her as one would expect of a favorite disciple, and Daoyi sees no reason to ruin their relationship. As long as she has more people to torment, she is content. And if [Glossary('Wu Hua','podgloss.wuhua')] becomes the [Glossary('Demon Emperor','podgloss.demonemperor')], of course they would choose their Madonna and Chief Consort to be their Empress."
 POD_persistentpodlore.desc.793509: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDeep within the Hell of Burning Seas, all the sinners within fear a great and fearsome monster that can be seen even leagues away, a colossal shadow that stalks the very edges of the Hell. Haha No Fukami's lesser servitors have had entire cities obliterated by its passing, and even entire Schools of Rokea have perished and left to rot in the seas around this Beast.\nOnly Haha No Fukami herself has met the Devil-Fish, and the two seem to have a kind of accord. Their songs are a brief moment of respite when they swim together, before they depart and she returns to her ambitions, and the Devil-Fish returns to its hunt.\n\nIn truth, the Devil-Fish is one of very few beings from another cycle of the Wheel of Ages. In her time, the Emerald Mother was the supreme God, and her children were all that dominated the world. The Devil-Fish was one of the Emerald Mother's Memories, but even then, she was a heretic.\n\nShe desired the immortality of the Sharks, so she filled the oceans with their blood and devoured their life essence, swimming with the Cephalopod horrors for immortality. But when the Wheels turned, the Devil-Fish slept in the deepest ocean trenches, until Haha No Fukami found her, and woke her up once more.\nAnd the Mother of Pearls then understood what she was seeing. A Mokolé born a Mosasaurus, a creature of incredible gnosis and stolen memory. But it would be lost in this new age, and the [Glossary('Yama Queen','podgloss.yamaking')] couldn't abide that.\nShe stirred the Mokolé, who had the name 'Hunger-of-Qyrl', and she guided them to the Hell of Burning Seas, where it offered her the chance to hunt all the Rokea, souls, and Devils it could desire, and in return it would swim with her and counsel her on the Wheel of Ages, of the God of the Last Age, and what she might do to become the current one.\n\nHunger-of-Qyrl abides this, for now at least. She is a simple creature. She hungers. She dreams. She persists. Such as she always has."
 POD_persistentpodlore.desc.793510: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nUnlike most in the Infinite Thunder Courts, Talia is far from the places she once called home. In her mortal life even, she would have once seen this place as one to be conquered and shown the light. But now, having seen hell itself, she has had second thoughts.\n\nTalia was the daughter of a Ghaznavid Captain, and his favorite one at that. He let her train in swords, read his books, exercise, and learn directly from her father. Naturally, such a free spirited daughter would be a scandal, so she learned early on to be subtle, secretive, and coy.\n\nAs an adult, she was always in close orbit to her father, and her sharp wit honed by a youth of hiding her free spirit made her quite the canny whisper weaver. But, it was not meant to be, as in the invasion and in transit, an ambush ended her story to the rest of the living world. And Talia herself woke from death in the horror that was the Night Realm.\n\nHorrified by the stalking demon women and forced to horrors herself, she focused and used her subtlety and long denied chance to assert herself to break free. And in liberating herself internally, she liberated herself from hell, and she found herself far from where she died, deep in the Indian Continent, as it seems her body had floated a great distance down the Ganges. And the Infinite Thunder Courts found her.\n\nTalia was inconsolable for a long while, trying to come to terms with how Allah could allow this. And furthermore, she was now surrounded by people she once wouldn't have batted an eye for destroying, but now letting her live however she liked in the open.\nAnd she only escaped hell by actualizing herself, owning herself as a spinner of intrigue and warrior-assassin. She could now love as she wanted, not be forced to exist in the shadow of her father or a husband she would have never loved. It felt right to her. It just made sense. So, she accepted the new community around her. She could not go back to her mortal family.\nSo the Infinite Thunder Courts would be her new family. She was no longer a foreigner to them. She was free.\n\nShe could make this right."
 POD_persistentpodlore.desc.793511: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the Hungry Dead when thinking of the Eternal War mainly default to the constant war with the Ravnos, there is another oft forgotten but no less existentially terrifying theater that must be upheld. While the Godlings and August Courts clash in the north against the Eternal General, the Scourge and the Many-Armed wage a no less constant and unrelenting war.\n\nSanjaya was once just a guy. Not a conqueror, not a warrior, not a prince, not some other great and lofty title. He was a woodcutter. He had a wife he loved dearly, a son and two daughters that were his world. And one day, his home was attacked by the Yakshi of Kartarirya, and Sanjaya was one of their many victims.\n\nSent to Hell, the despair for his family was so immense that his roaring rampage in the forgotten hell he came from was so great that he tore from it possessed, dripping in the gore of devils. The next time the Yakshi came to a small community, the people saw only in terror as a new horror burst from the earth, damnation on his heels, howling out to their maker to face him and meet justice.\nThe Infinite Thunder Courts found him, and bringing him back to lucidity was an ordeal. But even back to sanity, Sanjaya was a man clear in vision and purpose.\nHe would lead any who followed him to hunt and destroy the Many-Armed's get and their Yakshi wherever they appeared. His single minded hate bloomed into a millennia lasting war, as the Scourge of Fiends would become the greatest enemy to the Many-Armed. While his followers say he fights the Contender for the Throne of the Sixth Age coursing in the veins of the Fiends, for Sanjaya, his hatred is a lot simpler\n\nFor his love, and for his children, he will kill it. He will kill it in every place it manifests. War has made his mind sharp. It has made his path clear. The hands of death could not defeat him. He will have his revenge."
 POD_persistentpodlore.desc.793512: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite what the August Courts would assume, the two heavily present 'heretical' [Glossary('Dharmas','podgloss.dharma')] of India are not in any way linked. In fact, their own conflicts between the Infinite Thunder Courts and the Manidvipa Court and Celestial Tribe is a fierce, violent, and brutal one. While the wrath of the Godlings is famous, the cruelty of mankind knows no bounds.\nAnd among the Celestial Tribe, charged with protecting the Courts from the Godlings is a particularly radiant exemplar of humanity's infinite potential for violence and humiliation.\n\nNazia was one of many shorn clean in the Hell of Being Skinned Alive, but her escape and discovery by the Celestial Tribe left her a bit at a loss. She wandered for a bit, but a Godling who has since been rendered to into fecal material once took advantage of her when she was still new to her [Glossary('Dharma','podgloss.dharma')], gaslighting her and compelling her into many horrors.\n\nGaining a sense of clarity, while he was in slumber for the day, she forced herself away, and then staked him with an iron rod, and laughed hysterically as she sapped him empty of life, and then devoured all that remained of his stagnant corpse. She returned to the Infinite Thunder Courts, and asked she be their shield against the Godlings.\n\nNazia sees the Godlings as cultists, abusers, and idiots, deluding themselves with divinity. So, her killing of them is a justice of a kind, as the people they lord over cannot resist them. But she can. So she revels in their deaths, in their agonies, learning all manner of new ways to extend and draw out their pain. Then, and only then, will she devour them before their cult, showing them that these delusional 'gods' were nothing more than screaming piglets who die the same as any other man when a psychotic devil woman is eating their heart.\n\nJustice, clearly."
 POD_persistentpodlore.desc.895501: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile it is a thing of scoffs and derision among the Orthodox [Glossary('Dharmas','podgloss.dharma')] to decry them as the foolish rationalization of mortal religion into the truth that should be self evident. But for those sent to 'handle' the Faces of the Goddess, in seeing their champion, they finally understand that they may in fact be onto something.\n\nThe Godling known as Mahakali is a mystery even to other higher Godlings. While many would consider her quite bold for claiming that name, she embodies the Goddess she believes saved her as close as she can. A tempest of rage and destruction, unflinching in the face of danger, devoted to her new family and cause without question, and a delight in death, she certainly looks the part in battle. But before all that, she cannot say, for it no longer exists.\nSome Godlings suspect she may have been a Mage of Time in life before she somehow destroyed herself and her past, hence why she escaped the Hell of Wicked Magic. And her death in some way stripped her of all power, until, by rage and divine illumination, she tore her way out not with magic but with raw anger and strength. It took most of the Godlings to subdue her as a Feral Devil, but many are now glad they did.\nMahakali is the foremost protector of the Faces of the Goddess.\n\nFuture Fate\nIn time, Mahakali's embodiement of the ideals of the Faces of the Goddess eventually make her surpass even Shodashi in terms of Dharmic power. However, she disappeared shortly after the Week of Nightmares. Where she went is unknown, but the last message she left to her fellow Godlings gave them all a sense of incredibly dread, even if they didn't understand why.\n\n"A monster defiles the name of that which has made me a Goddess. I will set things right." "
 POD_persistentpodlore.desc.895502: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe Godlings tend to be a factitious and violent group, and that is just as true for the Faces of the Goddess as it is for the Celestial Tribe. Rejecting duality and limitation can apply to norms and bonds afterall. But to guide them is Shodashi's most competent student.\n\nBefore she was a Hungry Dead, Tārā was just one of many small folk in the numerous fishing communities in the Bengal Bay. Married to a kind man, blessed with beautiful children, having enough to get by just fine, and living in a time of relative peace for their community. She was happy. At least, she thought she was. But one day, while out collecting traps, she misstook a crocodile for a log, and for her mundane life, found herself in the Hell of Upside Down Sinners, where her once life of mundanity became a Hell of constant confusion and chaos.\nShe cursed herself for mortal weakness, and cried out for escape. But only when she accepted the absurdity of it all did she start awake as she fell back into the Living World into the Bengal Bay, where the Faces of the Goddess would eventually find her.\n\nUnder their paradigm, at the very least, the epiphany her escape made sense to the fresh [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], who took the name Tārā to honor the Shakti that elevated her to a goddess. She no longer wants the mundane life she had, she wishes for more. She wants to live, she wants to experience, she wants to have something to fight and live for.\nSo she has taken to the path with intense precision and direction, a foremost authority on the Faces of the Goddess second only to Shodashi. She has become a source of guidance and protector for their cause. And she has never been more actualized."
 POD_persistentpodlore.desc.895503: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIt is an often understated duty of the Hungry Dead to keep a watchful eye on the Spirit Worlds. While the Orthodox [Glossary('Dharmas','podgloss.dharma')] would claim the Heretical [Glossary('Dharmas','podgloss.dharma')] are obsessive in their overfocus on the Living Worlds, and they are correct to an extent, to deny there is effort made is a gross error. And among the Faces of the Goddess, Bhuvaneshvari has dedicated herself to being the main crossroads between the physical and spiritual worlds.\n\nBefore she died, she was simply a woman of faith and devotion, but she always had doubt. No matter the dedication of her meditations or focus she placed upon them, she was always plagued with uncertainy, fear, and melancholy. So she died young, at her own hands. And to that torment, she found her way into the Hell of Bitter Truth, one tailor made to strip the faithful of cause and devotion, and trick them into worshipping its master.\n\nBut so broken by devotion, she instead resolved to make her own way. In faithlessness, she found her purpose. Something awoke in her, and she would manage to fight her way out. And when found by the Faces of the Goddess, her accomplishment in navigating through one of the deepest hells back to the living without invention made her take the title of Bhuvaneshvari.\n\nAnd to that end, she now manages both their earthly and spiritual affairs. Not a fighter but a navigator, she prefers to shy away from combat, tending to coin and resources instead. She maps out realms for the Godlings to use, sends out envoys, and organizes the youngest Godlings to those ends.\nHowever, a doubt always remains. She found her way out of hell by rejecting the divine.\nWould she have to do the same? And would that mean she'd have to deny the Godhood that the others believe is in her now?"
 POD_persistentpodlore.desc.895504: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn her mortal life before she became Chinnamasta, she was one of many casualties in the Eternal War. Originally ghouled as one of the Ravnos' many attendants, Chinnamasta struggled against the Bloodbond, fearing the endangerment that might befall her family to be taken into the conflict. She defied orders routinely, defying their will, and helping her family escape being rendered into food for the Ravnos.\n\nFinally, when her dormitor had enough, he bound her at a stake and demanded that if she wanted to continue being difficult, she could either give in and tell them, or be dominated into subservience. And to that end, Chinnamasta, summoning all the will she had, overcame the power of the [Glossary('витэ','game_concept_vitae_desc')] to instead throw herself off the pedestal that was prepared for herself, and decapitated herself on a saw rather than be used to that end.\n\nAnd it seemed that within Lanka she was set to be made to be eternally regretful for having the audacity to defy them. Being set before countless victims, she was given the sadistic choice of choosing to suffer more for them, or take their pain willingly unto a thousand deaths.\n\nNot once did she err. Not once did she decline. And every time, she took the instrument of their pain into her own hands and accepted it. And in every horror she found herself growing stronger. Every decapitation she regained her clarity. Every flaying she realized her shape. Every torture restored her will.\n\nHer escape was a quiet thing. There was no one left in that small segment of Lanka but her, as all before her had been absolved, and simply opened her eyes broken and bleeding in the world of the living. And when found by the Faces of the Goddess, what part of the Shakti had blessed her was obvious to her. And now with the vessel of the divine, so much beyond her former mortal sense, she may do more than delay that which killed her to begin with."
 POD_persistentpodlore.desc.895505: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile violence between the Godlings is common, there are those who would rather wish that they didn't fight. At least as they understand it, the Descended should see the Faces of the Goddess as misguided members of Devi, and to the Faces of the Goddess, the Descended still have pieces of the Shakti in them. Dhumavati is one of few of the greater Celestial Tribe to really strive to bridge the gap between them.\n\nDhumavati in her mortal life was originally a medium, being able to hear the whispers of ghosts. But with that and her own appearance, she was treated less as a person most of the time and more as a monster. But her services as a medium at least made her tolerated, and she died peacefully, and for a time, went to the Hell of Wretched Magic for her lack of drive in laying the dead to rest.\nHowever, she took this too in stride, and used the isolation put upon her and made it the means of her escape. And when found by Shodashi, Shodashi initially wrote her off, but then noticed how incredibly wise the old woman was, and what they understood as a piece of Shakti in her. So, the old woman was taken in and given the name she would go by into the Night World, Dhumavati.\n\nDhumavati at least nominally is tasked with dealing with the dead, but in truth, she is the main source of conversation among young Godlings and the Descended from the Faces of the Goddess. Seeking to sway them to the true nature of the Shakti within them, she is incredibly dedicated to this task, assuming they don't judge her by the first glances."
 POD_persistentpodlore.desc.895506: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the foundational tenets of the Faces of the Goddess is that, before the Hungry Dead receives a piece of the Shakti to make them worthy of the Second Breath, all of them were just mortals, sinful and wicked. And at the very least, Bagalā embodied that in her mortal life.\n\nEven as a child, she was wicked. Enjoying catching fish to watch them suffocate, drowning rabbits, knocking dogs into crocodile-infested waters, and slaughtering sacred animals. She escalated to people before she turned 14, and by the time she was an adult, so prolific was her murdering spree that even the select Khan Weretigers sent to deal with the serial killer found her home overladen with horrible traps and murderpits waiting for them.\nHowever, she did finally meet her end when she murdered the wrong Dhampyr, and a woman bearing the name of a storm god killed her in a flash flood and sentenced her to the Hell of Boiling Seas. The pain of drowning and a hell of it on repeat, forced to suffer the same fate she inflicted on others, at the very least humbled her, to an extent at least.\n\nAnd when she finally escaped Hell by letting herself be a canvas of pain until she was thrown back into the living, she at least felt she needed to temper her... 'indulgences'. With a part of the Shakti within her, she might be better.\n\nAt least, Bagalā tries. That taste for murder is still in her. But poisons of paralysis, traps, silver knives, stakes, and many other implements of murder she now just... better chooses her targets. Ravnos, [akuma|E], Nagaraja, Devils, and many an assortment of the wicked are introduced to Bagalā's attention, where she takes a special glee in hacking them to pieces and making a show of their death.\n\nWhile a far cry from the Devi that is her namesake, she at the very least is useful to the Faces of the Goddess. And that's what matters, is it not?"
 POD_persistentpodlore.desc.895507: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor the most part, the Faces of the Goddess are a bit divided from the traditionally ostracized. Often overlooked with the prejudices of life being carried over, it is an easy thing to look past them. And it is for that reason that the Hungry Dead that now goes by Matangi refuses to abandon her mortal roots, even as a Godling.\n\nBefore she was Matangi, she was an outcaste, specifically going into the profession of the thankless job of disposing of dead bodies. Her parents in a similar profession, she had little else she could hope to achieve past that.\nSo, from a young age, she took to the same profession, and did so diligently. But the derision she felt as someone who disposed of the dead was something that never left her. And one night, things got infinitely worse when, as she was burying one body, they began twitching, rising back from the earth. She panicked, the existential fear of death gripping her as the recently risen corpse beat her to death, ate her, and left her bones and tendons rotting in the sun.\nAnd after the sin of being murdered by a Risen, she wound herself in the Hell of Burrowing Maggots. But despite it all, her former source of isolation became a thing of liberation. Knowing how bodies rot and how the dead decay allowed her to time the maggot cycles, and used the flies blooming from her body to carry her back to the living world.\n\nSince becoming a student of Shodashi and taking the name Matangi to always remind her of her origins, Matangi cannot help but notice even now, despite being called a Godling, she is still on the periphery of her new Courts.\nAt the very least, she has accepted her role as a Goddess of Outcastes, protecting them from fates like hers. Maybe, at the very least if the Shakti chose her, she can help make things right."
 POD_persistentpodlore.desc.895508: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor most Godlings, while many had lives marked by omens, very few have come from positions or backgrounds of wealth or power. But for all norms, there are exceptions. And among the Faces of the Goddess, they have a former princess. Which one though, Kamalā won't say. She is rather clear that who she was is dead. And who is here now is all that matters now.\n\nIn her mortal life, Kamalā was a princess of the Pāla Empire. Raised in privilege and next to the heartland of the Bengali people, she had everything she could have materially wanted in life.At least, all but the man she actually loved.\n\nBetrothed for political reasons, she had her dalliances with him, but they were a fleeting thing in the grand scale of things. As for the why, when her betrothed found out, he had simply drowned her, and then took a sister as a bride.\n\nThus, condemned to the Hell of Boiling Seas for adultery and drowning, her only companion other than suffocation was the currents. So, rather than risk the flaming surface, she followed the current in the Hells. And in going through it and trusting the flow, she did find herself extradited back to the world of the Living.\n\nAnd when found by the Faces of the Goddess, her competence and skill in governance made her incredibly valuable, and she was an easy choice for the final student of Shodashi. Thus, in taking the name of Kamalā, she can leave the ghosts of her mortal life behind, and start anew. She is rather looking forward to being a ruler in her own right."
 POD_persistentpodlore.desc.793513: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nYanling has long tied herself to the Black Tortoise Court. Perhaps Pu Shoukeng's closest supporter, she was at his side from the very beginning. When the Fourth Age came to a start, and the Bright Forest came to the steppe in the wake of the Regretful Hunters, Riders of the Ashen Plains, and Sons of Tengri, Yanling was a largely quiet force in the Bright Forest, supporting then as they became the compromise for leadership between the three factions.\n\nYanling's life ended in shame and humiliation, as in her life she was an adultress, and killed by her first husband for it, where she found herself in the possession of Dou Tingzhang, Mutilator of the Unfaithful. However, his doomed desire to take the Libraries of Heaven led to her being freed not by will or desire, but by circumstance.\nShe was saved though by Pu Shoukeng, who she then followed around wherever he went. As one of the earliest 'true' Hungry Dead, her insight was valuable to them for that, and she did have a good mind for keeping and manipulating secrets. She quietly sank into Pu Shoukeng's shadow, content and adoring her savior, and later on, readily accepting her role as a wife to him that, on the surface was for Dhampyr, but the two had grown genuinely close as someone he could trust.\nWith their companions Lìn, Rong, and Xiaoli, the five would lead the Court in those critical early days of the Fourth Age against the [akuma|E].\n\nBut Yanling is tired. Very tired. And worse, she is finding a degree of boredom in her marriage. She loves Pu Shoukeng, but the new men and women who introduce themselves to the Court cannot help but draw her attention, as she frequently excludes herself to 'refocus' herself. Between that and wanting to downplay the threat of the [Glossary('Anda','podgloss.anda')], Yanling is dancing a very dangerous line as she spites her eyes to manage her exhaustion and lust as the Fifth Age draws near..."
 POD_persistentpodlore.desc.793514: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the oldest members of the Black Tortoise Court, Xiaoli has always been in the saddle, as it is where he feels the most at home. A Qiang rider in life and Hungry Dead in death, he was critical in communicating between the three [Glossary('Wus','podgloss.wu')] that founded the Black Tortoise Court, as their messenger. And it was him that helped Pu Shoukeng come to lead them as the compromise.\n\nHe would also explore hell, seeking valuable sinners, and it is where he met his closest friend and confidant Lìn. He rode between them, and by his word and Dhampyr, they were brought together.\n\nBut things sour with time. He came to hate the bickering between Badmaarag, Tugmandakh, and Achitbaatar. His visits became a frequent exchanges of insults and jabs between news. His marriage of community to the Chacha within the Barren Wind became a new kind of hell for him.\n\nDespite being their diplomat, Xiaoli was laying the seeds of intense domestic conflict throughout the Black Tortoise Court, and their responsiveness diminished with it as the channels of power refused to flow to him. And now, as the [Glossary('Anda','podgloss.anda')] grow closer, things are getting messy, complicated, and full of dire omens. And yet, all Xiaoli can seem to manage is venting to Lìn, clinging to his friends, and continuing the Black Tortoise's descent into chaos."
 POD_persistentpodlore.desc.793515: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest member of the Bright Forest, Lìn was perhaps the most critical to the lasting success the Black Tortoise enjoyed. The wife of the General Ma Yuan, in her mortal life she was witness to her husband's campaigns against the Trung Sisters and Wulin Tribes, and perished with him on campaign from illness.\nUnlike her husband though, her story continued in the Hell of Burrowing Maggots. Waking up being eaten apart, she had once lived a life of comfort and she was now confined to horror. Panicking, her wails and screaming was enough that she caught the attention of the Bright Forest Xiaoli, who pulled her from the Hell and brought her back to the Black Tortoise. And when they conversed, Xiaoli was impressed by her understanding of warfare, and insisted to the rest of the Bright Forests that they defy convention and include Lìn among their numbers.\n\nLìn was fast friends with Xiaoli, and she got along quite well with the rest of them. Her husband's campaign notes were known to her, and applying his stratagems were critical to the Black Tortoise Court consolidating its victory against the [akuma|E] before Dokhor Khan and the threat of the [Glossary('Anda','podgloss.anda')]. Resting on her laurels, Lìn was proud to retire simply supporting Pu Shoukeng, playing board games with Xiaoli, and pursuing her own enlightenment.\n\nHowever, her younger age spurred a good deal of issues with the Yellow Emperor Court, especially Li, Wang Hongben's Northern Emissary. Lìn and Li quickly came to despise each other, a hatred and fury that would bloom into the constant border skirmishes that plague the Courts. Even now, she is more focused on Li than the [Glossary('Anda','podgloss.anda')], as she pursues every attempt to humiliate the bastard that continually demeans her as nothing more than 'a Barbarian's Whore', adamant to prove her own worth against them."
 POD_persistentpodlore.desc.793516: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn the early days of the Black Tortoise Court, they were in a competitive new territory. Surrounded by the early [Glossary('Anda','podgloss.anda')] and Fera, Rong earned a reputation as an unbeatable force that could break any before him. He was the one that would drive the [Glossary('Anda','podgloss.anda')] from the main places the Black Tortoises would build, and the force of strength that would ensure the Siberakh would remain too isolated to ever join with the other shapeshifters.\nPu Shoukeng would become a close friend of his, as his elevated perspective helped give Rong direction. He would become the protector of the Bright Forests, and the rock in which they would build their Empire.\n\nBut now, the [Glossary('Anda','podgloss.anda')] are ascendant under the Mongol Empire and [akuma|E] run rampant. And Rong is long out of practice, and without allies beyond his [Glossary('Wu','podgloss.wu')]. Rong came to hate the impudence of the greater political actors among the Black Tortoise Court, antagonizing Tarugha, Tan Banshi, and Xiang Li for their political ambition, and his own disinterest in any romantic paths made him closed off as access to Pu Shoukeng's Court.\n\nHe was simply too focused on service, and in the heavily political and informal structure of the courts spelled issues for him on a large scale. And as he may need help against the [Glossary('Anda','podgloss.anda')], that stance may very well have damned him once again."
 POD_persistentpodlore.desc.793517: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAncient even for many of the oldest [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] who had directly suffered in Hell, the unlife of Badmaraag has been no less eventful. The first leader of one of the oldest [Glossary('Wu','podgloss.wu')] of the Steppe, from the early days of the Fourth Age to the present. But now, she is a shell of the feared terror that the Steppe Beast Courts once whispered about, and as she watches destruction approach, she seems ever more locked into her depression.\n\nBadmaraag was one of the most beautiful woman of her tribe when she lived, the favorite consort of a chieftain. But, in many ways she was still seen as 'defective' for her blindness.\nBut she still did her duty as a consort well, bearing him many children, and when the Wheel of Ages turned and the Time of Beautiful Sadness began, Badmaraag had died in childbirth delivering her 13th Child and went to the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')].\nBut she knew how to exploit the politics it mocked, so she escaped in short order. And on her escape, tutored by the earlier savants of these early ages, she went with likeminded souls north, to be free of the restrictions of the Court in the Chinese core of their society.\n\nAnd despite her blindness, her new ability to see souls and spirits alongside her own much more practiced senses, she became the greatest of the Steppe Hungry Dead in terms of hunting prowess, choosing to hunt all rival members of the Beast Court that threatened them.\n\nBut millennia of violence will wear anyone down. Fighting with Xiaoli on politics and the endless struggle against the misogynist Achibaatar and the brutality of Tugmandakh has led her to largely withdraw and focus on enlightenment. She has found a friend among the young [Glossary('Wu','podgloss.wu')], and taking her first and only student Khorkhoi is a kind of insurance.\nShe knows the Black Tortoise Court is doomed, but there are places that need to be guarded. So for that end, as the Hunters stagnate, she puts her faith in new blood.\n\nFuture Fate\nBadmaraag's experience from centuries of struggle finally reached a breakthrough in taking a student, and as the [Glossary('Anda','podgloss.anda')] were knocking on her Haven, they found it empty, as she had just ascended to the [Glossary('Hundred Clouds','podgloss.hundredclouds')] moments before, finally free"
 POD_persistentpodlore.desc.793518: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nGatlmaa had once dreamed of glory. As a girl, she was the only child of the leader of a small group of steppe nomads, and she had long desired to follow in his glory. And while the circumstances of fate would see her dead before him, she never gave up that dream, even when she was consigned to the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')].\n\nPaying no mind to how her lust for power and prestige may have interfered with her soul's fate, Gatlmaa thrashed against the Hell, and in her protests and fury at the world, she broke herself free and escaped back to the living world. With enough pride to choke a whale to death and a desire for everything and all things, she took the risk of opportunity on the steppe over the security in the Yellow Emperor Court.\n\nPerhaps the least 'regretful' of the Regretful Hunters, she chased every glory she could, and was the strongest pusher for chasing and absorbing tribes into their network of influence, becoming a hidden lord and general, using various tribes and camps as pieces on a board for her own mock games of strategy.\n\nNaturally, this glory chaser with all the restraint of a starving dog, patience of a hummingbird, and humility of a demon found few friends. Her own [Glossary('Wu','podgloss.wu')] barely tolerated her, naked antagonism with the other founding [Glossary('Wu','podgloss.wu')], routinely getting her Dhampyr killed, and usual solution of fighting someone by setting entire fields ablaze, is largely alone as she continues to chase more and more glory."
 POD_persistentpodlore.desc.793519: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe frequent acts of war with the Beast Courts among the Black Tortoise Courts have, among the Regretful Hunters, become a great shame. Routine border clashes, seeking the hidden Siberian dragons, and dealing with the distorted and mangled essence flowing through the Great Wall, they have for the most part accepted that their actions would have been better served elsewhere.\n\nSo that is why Chinzorig runs from his past.\n\nAn oddity for having come from the Hell of [Glossary('Kakuri','podgloss.kakuri')], Chinzorig however was a capable hunter, honed in searching for scraps. His tracking skill was essential for the success of the Regretful Hunters, as he was the supreme and uncontested master at finding Dragon Nests and, as the Beast Courts called them, 'Caerns'.\n\nAnd with the forces of the early Court, many of their now oldest fonts were found and won by him. But he was too greedy in his search, and now the relationship with the Beast Courts remains ever broken. Chinzorig has reacted to this regret by refusing to live in the past, instead now chasing any conflict he can bury his head in.\n\nBut now, Chinzorig is poking the bear. In his focused flight from guilt, he pokes at the [Glossary('Anda','podgloss.Anda')], and rather blatantly. Clashing with them early on as the rest of the Court entertains itself with drama, Chinzorig has already lost numerous students to a team of [Glossary('Anda','podgloss.anda')] riders.\n\nYounger [Glossary('Wu','podgloss.wu')] despise him as the pinnacle of foolishness, and as the [Glossary('Anda','podgloss.anda')] grow closer, he may very well have set the domino to doom the Black Tortoise Court."
 POD_persistentpodlore.desc.793520: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite the name of his [Glossary('Wu','podgloss.wu')], Khongor himself was never really a hunter. A pastoralist in life with his death caused by lean times, the trauma of the Hell of No Money, and his own escape caused Khongor to become something new and something far deadlier. However, his soul remains unchanged. What he was in life, he will be in death, just in a new context.\n\nKhongor is the main emissary to the mortal groups on the Steppes from the Regretful Hunters to the various nomad clans and tribes. He has both prepped good people to feed from and the means for their own security.\n\nHaving spent a large degree of time with Nesulte, who was once an ally that became the mother to his Dhampyr children, he kept pushing on with his meager tasks despite criticisms from other members of the ancient [Glossary('Wu','podgloss.wu')]. But he pays them little mind, further inflaming their distrust of him.\nHe has even taken on a new student, Sansar, who he has as a close confiding friend and ally.\n\nBut things are getting far more grim than Khongor is ready for. The [Glossary('Anda','podgloss.anda')] press closer, and many of his tribes defect and join with the rest of the Great Mongol Nation or being destroyed outright, providing him with fewer and fewer allies. And as the [Glossary('Anda','podgloss.anda')] breathe down the Black Torstoise Court's neck, his gentleness may prove to be his undoing."
 POD_persistentpodlore.desc.793521: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nUsually, when someone is the emotional core of a [Glossary('Wu','podgloss.wu')], they are usually in that position by skill or by willingness to be. However, for Naidan, he has a much worse problem. Sworn with a lunatic, a pushover, an agitator, and an incredibly depressed leader, the milquetoast guy ended up being their heart. Much to Naidan's dismay.\n\nDespite his age, Naidan isn't the best at being one of the Hungry Dead. Enlightenment eludes him, and the [Glossary('Yama Kings','podgloss.yamaking')] scare the breath out of him. Even as one of the Black Tortoise Court's ancients, he is the one who was carried to his position largely by seniority and the presence of his [Glossary('Wu','podgloss.wu')].\nInstead, he mainly balances out having to hear the inane or grim woes of his sworn family, all while pulled further and further from the world he knows.\n\nHe simply just wanted to return to humanity, and every time something comes up he relates too, it is just as swiftly severed. While the humanist heresy in India fascinates him, he is so far removed from it that it may as well be useless for him to try and seek them out for answers. And all the while the agitators around him keep trying to harm his kids or his power, making things worse.\n\nReally, he only has his wife, and even then he suspects treachery with their union. He is, despite being surrounded by others, totally alone. Forced to listen to his [Glossary('Wu','podgloss.wu')], his marriage to Uleken, and his feuding with Zevseg and Khünbish, and the forbidden trysts with Sansar, his entire political position teeters on the edge of unraveling."
 POD_persistentpodlore.desc.793522: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe Wandering Overlord is an enigma to many, even among the rare few servants they have. They accept no servitors, they tolerate no fools following them. Some disciples exist, but very few have ever had any degree of communion with the King they profess to serve. They are a wandering cataclysm of suffering, the eye of a hurricane of misery. But there is one Defiled soul who has earned their favor more than most.\n\nMiracala is an oddity, originally one of the Blood Slaves of a [Glossary('Каинит','game_concept_cainite_desc')] Knight sent to the Steppes to investigate the [Glossary('Anda','podgloss.anda')]. Enthralled for her incredible skill as a physician, the kindred knight is unaware of the maelstrom of darkness that roars in his Ghoul's heart, and the quirk of fate that lets her mind be clear in his service and forever safe from the Bloodbond. Numerous vampires he defeated were strangely killed, exsanguinated fully, unaware his Ghoul was sapping them of power.\n\nAnd once they fully entered the steppes, a chance meeting with a traveler on the road awoke something in his surgeon. On a whim, the stranger gave her a gift of sorcery, and disappeared. Seeking them more, the surgeon would use this to enter the Realms of the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')], defecting from the Knight with warped slaves of her own with stolen power and trapped blood sources. She chases the Overlord's wake, receiving blessings and blood as the Ghoul chases their chosen master.\nAll while their excited and depraved lust for suffering, zeal, and carnal pleasure in the name of her god push her deeper into the depths of madness and defilement.\n\nAnd now, she feels her chosen god bids her to return back west, and tear down the wall that holds her master back from it. How she is aware of this, she doesn't know, but she will do it, proudly and without regret. She will pick apart the children of Caine, steal their power, and tear down the wall for the sake of her Emperor. And at least the screaming victims on her table bring her no end to joy."
 POD_persistentpodlore.desc.793523: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile to most of the rest of the night world, when it comes to the childer of the Many-Armed, Ratti-Ben and her personal war makes her the most famous, south of the Decan Plateau his second childe is more feared and loathed, the source of many a new horrors and monstrosities. And when they see him, they would never suspect anything is off. At least not until his hands make contact with his victims.\n\nBut for someone who now has such a pleasant demeanor, few would believe his mortal life. A disaffected and depressed second son of a local lord, who always aspired to be an artist. But come his father's death and brother's ascent, his brother instead put him in pointless positions and humiliations such as 'tax oversight' and 'court seneschal'.\nAkhed resented his brother for keeping him from his dream, despising the jeers and mocking that was no doubt hidden behind his back. Even when the throne was succeeded by his nephew, he just resented the little shit for taking his birthright in stride, and never asking Akhed what he wanted to do. But the seething resentment caught a monster's attention, and saw Akhed for what he truly was.\n\nAn artist.\n\nHe blessed Akhed with death, and Akhed returned to his nephew, and shaped him into an artpiece that stretched across a whole forest, nerves alight with the symphony of pain. The light in his eyes returned, as the whole family that mocked him and denied him art became art itself.\nSo now he makes up for lost time, enjoying unlife and elysium with new vigor, as he seeks the perfection of art itself.\n\nFuture Fate\nAkhed would make many more masterpieces, and with the decimation of the Ravnos in the Week of Nightmares, he would begin to clash more with Ratti-Ben in artistic vision.\nAnd as they did so more and more, he begins to see his long dead brother in her. And in the hour of Tzimisce triumph in India, it may be subjected to a new disastrous sibling feud."
 POD_persistentpodlore.desc.793524: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nVery few Tzimisce ever survive failing to live up their [Glossary('Sire','game_concept_Sire_desc')]'s expectations. Ezlynn lucked out by virtue of being her grandsire's ideal student. [Glossary('обращён','game_concept_Embrace_desc')] from among the Blood Thralls that the Many-Armed had access to, Ratti-Ben had hoped Ezlynn would follow in her own footsteps, turning her powers towards the idealistic and driven, seeking out liberation just as she had. However, Ezlynn was idealistic, just not in the way she had hoped.\nEzlynn was enthralled by Vicissitude, and the power it had, and wanted nothing to do with her former mortal state. While Ratti-Ben wanted to destroy her for the lost use of [Glossary('витэ','game_concept_vitae_desc')], her own [Glossary('Sire','game_concept_Sire_desc')] forbade her, as Ezlynn was crossing territories few among the Fiends do.\n\nEzlynn knows the flesh is weak. It is a thing easily cut, burnt, and sundered. It was metal that was firm, enduring, and immortal. As immortal creatures, should they not recast themselves in steel. Ezlynn used her fleshshaping arts to pursue perfection not in spirit or in pure flesh, but by making her flesh and metal as one.\nRoutinely experimenting on subjects and using her own body as a canvas for this path. And by the Dark Ages, there is little of her physical body left, having been replaced with steel and lead overlaid on muscle, her bones replaced with iron, and organs replacing with bronze and copper.\nOnly her muscle remains, giving her a degree of flexibility, only visible through the seams where metal connects and is left open for articulation.\nShe is a special kind of terrible, one that inspires a special kind of fear among those that fight the Fiends."
 POD_persistentpodlore.desc.793525: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nNethmi is an odd one, there is no doubt about that. Usually, to be a Tzimisce's ghoul is a thing of constant terror and fear, knowing the single wrong moment could make you be transformed into some kind of new horror. But yet, for millennia, Kartarirya had a subject that not only was willing, but fully eager in body, mind, and soul. And so, he did something many Tzimisce would consider unthinkable.\n\nHe [Glossary('обращён','game_concept_Embrace_desc')] a Szlachta.\n\nNethmi's memory before her ghouldom to Kartarirya is a mystery to her, as he routinely made putty of her brain when she was a ghoul. And even now as a vampire, she is more than eager to submit to his work yet again.\nBut now, he has a far more practical goal for her in mind. Centuries of time shaped into alien horrors and blights have given Nethmi a unique perspective on existence as a Yakshi, one that, when she makes them, leads to a particularly deadly creation.\n\nAnd so, when Kartarirya is not making them, only Nethmi is permitted to so much as interact with their ghouls. She understands them, she soothes them, and she makes things clear to them, before she remolds them as she was and made into beautiful new horrors. Even now, as the Eternal War rages, the need of bodies and horrors ramps up, so she adds more and more into their unending war with an incredible degree of due diligence and relentless focus that would make even a mule look fickle.\nIt is all she knows, and her own path to perfection. And she aspires to be nothing more but worthy to her master and [Glossary('Sire','game_concept_Sire_desc')], whatever that entails."
 POD_persistentpodlore.desc.791174: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nFollowing the mistake of Ravana and growing frustrations with his second childe Jayendra's growing impudence, Chandraputra felt there needed be a change in how he selected his childer. The blood he offered was potent and powerful, and previous methodology and protocol had been lacking. So, he tried a new method. The one he would adopt for all future childer, when his third Indraja exceeded all of his expectations.\n\nIndraja was born to the legendary Ashoka the Great and his final consort Tishyaraksha, the very last son in an incredibly long line of succession. Even his older brothers by his mother Tishyaraksha were her own favorites, and he was just an afterthought, relegated to military service and political marriage.\nBut what he lacked in birth order, he more than made up for in conduct. A stern and humorless man, resolute in the face of danger and never flinching at even the grimmest orders, this distant prince caught Chandraputra's attention. Rather than [Glossary('Объятия','game_concept_Embrace_desc')] him outright, Chandraputra took him as a ghoul and began testing him in the values of the Mayaparisatya and seeing how he fared as a commander. And while Indraja was at least capable in the command of open field warfare, his true skill lie in the same arts his mother was infamous for, and proved to be a visionary at seeing through and severing the insidious schemes of the asuratizayya before they could come to fruition.\nAnd after two centuries of experience, training, and trials, Chandraputra saw fit to finally reward Indraja with the Embrace.\n\nAnd Indraja's [Glossary('Sire','game_concept_Sire_desc')] was not disappointed. Indraja was a critical counterbalance and defensive measure against the intrigues of their foes, and was especially adept at blunting the influence of the Banu Haqim in India. He would become the primary guardian of the hidden chambers and havens that held the critical members of the Kshatriya, and become an invaluable piece in the ternal game of chess against their enemies.\n\nFuture Fate\nIndraja's role as the guardian of their havens and master of their spy networks came to save him against the unthinkable. While doing security detail of Hazimel's tomb, the Week of Nightmare's struck, and only by virtue of being trapped within did he escape running to his death under his grandsire's awakening.\nWhen the week ended, he would guard the tomb until a traveler revealed himself with a missing eye, and he would reunite a force strong enough to finally break an endless stalemate."
 POD_persistentpodlore.desc.793526: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOften so often understated in pursuits of war is the ever critical and ever foundational aspect of it that is the finance and funding of it. And even for undead blood drinkers, that is no different. And for the largest [Glossary('Каинит','game_concept_cainite_desc')] war machine ever to make war in the night, Mahi really had his work cut out for him. The son of the Yuezhi Kushan Emperor Kanishka the Great, and grew up in the shadow of his conquests of Northern India.\nBut unlike his older brother Huvishka, Mahi was not permitted to learn the arts of war as his father had become glorious in, but rather in its support. Raised to be his brother's supporter, Mahi at least excelled in this, as his close eye to detail and acute understanding and adherence to law showed such dedication, that along with his father's conquests, he caught the eyes of a far more ancient conqueror that was looking into having another 'son'.\n\nMahi underwent the standard siring practice that Chandraputra came to adopt, first being ghouled, and then personally evaluated over the course of a century of study, training, [Glossary('Каинит','game_concept_cainite_desc')] theology, and trials. Mahi was a financier and administrator first and foremost, and Chandraputra saw immense potential in making him an accountant that could still flourish even in a region as militantly chaotic as northern India.\n\nOnce he was sure, Mahi was [Glossary('обращён','game_concept_Embrace_desc')] and brought into the Kshatriya, where he immediately was put to work managing the finances of the mainline Ravnos clan. And with a new found and loyal purpose to the Mayaparisatyas, he refused to ever let himself fail Chandraputra, who finally validated him with a princedom of his own in the war against the Hungry Dead.\n\nFuture Fate\nMahi, due to never being a general first and foremost past his training with Chandraputra and occasional command in sieging down havens, was right near the epicenter of his grandsire's awakening during the Week of Nightmares.\nLike most of his clan, he met his Final Death before the progenitor of the Ravnos."
 POD_persistentpodlore.desc.793527: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSripurusha had a truly wild mortal life. One of the numerous sons of Gautamiputra Satakarni growing up had no expectation of ever ruling, especially as the 5th son. So as a youth he frequently went out, seeking out more and more dalliances, parties, and social affairs, his silver tongue always getting him out of trouble. He adored the presence of others, and was a natural at gathering and organizing people.\nBut disaster struck in a chain of dominoes. With the growth of the Satavahana's rising Western Satraps and decline of his family's power after his father's death, leading to his just older brother becoming King, he somehow managed to coast by pretty well.\nWhich, when factored with his youth, caught Chandraputra's attention.\n\nChandraputra initially had little hope for Sripurusha, but was actually impressed at his skills with organization, and his ability to ease and assuage conflict. He could keep a cool head, and in time even began to truly follow the Path of Paradox.\nAfter a full training period, Chandraputra understood. He had his chancellor.\n\nSripurusha was [Glossary('обращён','game_concept_Embrace_desc')], and for Chandraputra in a way saving him from the chaos of the decline of the Satavahana Empire he was eternally grateful. Chandaputra in many ways reminded him of his father, and was one that would never die of old age.\n\nHe became the critical grease in the cogs of the Ravnos War Machine, keeping them unobstructed while presenting a confidant and proud face to the Banu Haqim and Danava. He even would come to be quite proud of the one time he even managed to charm one of the Many-Armed's get.\nBut as the Long Night trudges on, the need for keeping the peace remains ever relevant.\n\nFuture Fate\nSripurusha would, despite all he managed to accomplish, finally met a monster he couldn't charm, when in the Week of Nightmares, his Grandsire devoured him all the same."
 POD_persistentpodlore.desc.793528: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWithin the Eternal War, most of the asuratizayya fear the immortal general Chandraputra. However, in other campaigns, they speak of another general, that where Chandraputra strikes in the jungles, they strike in the open fields. A blur that many cannot distinguish between man or woman, an illusionist that forms entire cities in the night to lure the damned to their final demise.\nAnd for the Cainites in India that here this story, and finally meet the Ravnos Prince of Anahilapataka, they do not expect the visually young [Glossary('Каинит','game_concept_cainite_desc')] with unmatched radiance.\n\nArdhagupta was the son of the second emperor of the Gupta Empire Samudragupta, its greatest conqueror.  But unlike his brothers, Ardhagupta, the baby of the family, didn't dream of the throne. Rather, his love of strategy games and texts of conquerors of old, he was a lover of history. Studying open field warfare, reading over his father's conquests, and aspiring for the same glories, he would often grab weapons and charge into the training yards, taking on bigger and greater foes, as he too wanted to be a conqueror like those of legends.\nOne night, when training with his tutors, he fell into the orbit of one Conqueror who saw in him potential.\n\nChandraputra took Ardhagupta away as a new Ghoul during the chaos of Samudragupta's death and succession feud between his brothers, and found in Ardhagupta a military mind that impressed even him. While he lacked experience, he was clever and excelled in areas Chandraputra himself struggled in.\nAnd Ardhagupta's eagerness in war against the asuratizayya finally gave Chandraputra the childe he had long been waiting for. [Glossary('обращён','game_concept_Embrace_desc')] and given tentative command, Ardhagupta struggled where Chandraputra excelled, but thrived where he didn't.\nWhile still his second, Ardhagupta quickly rose to become the second greatest general at the Kshatriya's command. And he loves every second of it.\n\nFuture Fate\nArdhagupta disappeared during the Week of Nightmares, but a series of circumstances led to an ambush by the Fiends that knocked him into [Glossary('Торпор','game_concept_torpor_desc')], falling into the Ganges River Delta and disappearing in its waters. He is rumored to still be slumbering in its depths, for the moment to awaken when his [Glossary('Sire','game_concept_Sire_desc')] calls to him once more so they may complete their war."
 POD_persistentpodlore.desc.793529: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the sudra of the Ravnos Kshatriya, most of the time the various generals and other castes are focused on other campaigns and duties. Once, they would have hired from the Marijav Revenants to fulfill the gaps in their service where they need to operate in the day.\nBut early on, Chandraputra noticed one frequently went above and beyond in service, with a mind to match and attention for detail much needed. And between the Path of Paradox's prohibition on the [Glossary('Объятия','game_concept_Embrace_desc')] of women (at least in theory, which is often ignored as often as those following the Path of Humanity would have greedy thoughts being sinful) and the need of someone to operate in the day, Chandraputra tired of those who relied on coin. And Hara was an easy choice for a dedicated attendant.\n\nHara has been in Chandraputra's service as the coordinator of the Kshatriya sudra for millennia, once a Marijav Revenant since made his personal Ghoul. Even without the Bloodbond, she holds herself to the highest standards of loyalty, a constant attention to detail, and never succumbing to panic despite the odds.\n\nAnd with it, there is no fear of betrayal from the person who guards the Ravnos in the day. Given a comparatively staggering amount of leeway for a Ghoul, she however has never failed in her tasks, never faltered, and never brought her loyalty into question.\nShe is the main guardian of Chandraputra while he sleeps in the day, and while at this point so tied to [Glossary('витэ','game_concept_vitae_desc')] that the sun has become vexing to her, she holds onto her task by sheer force of will and dedication to her dormitor, and has brought forth numerous Marijav to strengthen their sudra network.\n\nShe knows her place is not as a vampire, but as a Ghoul. And for that, she is fine. For as long as her heart beats, she will serve them faithfully.\n\nFuture Fate\nHara's incredible extent of service would be proven once more during the Week of Nightmares, where she somehow managed to forestall Chandraputra's awakening and assured destruction. But, she was mortally wounded in whatever happened.\nShe held on until the nightmares were over, and Chandraputra could bid his faithful attendant goodbye, as she could die peacefully and happily held in the arms of the man she never admitted to loving."
 POD_persistentpodlore.desc.EA0001: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the myriad vampires that find themselves in the orbit of the King of the Wicked City, few are more out of their depth than Atsushi. Originally a doll maker in Northern Japan, his skill with making childrens' toys earned the attention of a rather unusual buyer, of deathly complexion, strange hair, and a terrible accent. He thought little of it at the time, just happy to have someone so invested in his work, up until the moment she killed him and brought him back with his blood, and happily explained to him how he was going to make dolls for her.\n\nForever.\n\nAtsushi was not at all prepared to become one of the Banpaia, to see his skill as a dollmaker turned to horrifying ends, as he used his new bloodborne powers to warp screaming subjects into new monsters. Endless guilt wracked him, and all in the miasma of confusion of his [Glossary('Sire','game_concept_Sire_desc')] being proud of him. All of it began to weigh on him, to break him, until finally he snapped. He slunk into his master's haven, and simply craved her approval. He supported her, just wished to do something good, so he caved and did all she asked, becoming her greatest supporter, her proudest artisan, and the thing always shadowing her like a quivering dog. All for the sake of purpose. All for the sake of clarity."
 POD_persistentpodlore.desc.EA0002: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor the most part, while hunters call Kindred monsters, most struggle against the monster in themselves, striving to cling to their humanity. But a select few of them embrace the monster within, finding the darker parts in themselves and using such indulgences to shackle their beast under the weight of depravity. Akane was one such Kindred.\n\nBorn a part of the noble class, Akane had everything she could have wanted in life, she still desired all she could not have. She cheated on her husband with the younger staff of the castle, stole from the locals for the sake of petty indulgences and covered it up, and the thrill of violating norms grew larger and larger until she had a special shack where she tortured the nearby peasantry and murdered them. She covered her tracks well, but when she had an outburst when two of her flings married, she abducted them and sewed them together. And nearly getting away with it, it only faltered because her husband was able to see through the lie. Quietly her crimes were hidden so as to not shame her family, and she was slated for execution. But her malice and cruelty, as well as subtlety, impressed the ancient vampire Kagaseo. Kagaseo, not wanting to empower her any more than she had to, had Hannah embrace her into the Banpaia.\n\nAkane would find that, among her duties and powers as a vampire, she thrived. She delighted in making gargoyles, found the power in taking blood delightful, and adored the power she had in bloodbonding people. After turning her former husband into a vampire, warping him into a gargoyle, and then diablerizing him, her wild dance of new horrors and crimes spun ever higher as she craved more and more power. Fleshcrafting and Defilement became her pleasures, her purpose. Now, she amasses a harem of bloodbonded puppetmasters and monsters, as a veritable queen of defilement, drowning her beast in pleasure as she indulges ever onward."
 POD_persistentpodlore.desc.EA0007: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe first of the Bingmayong Gargoyles, formed of the fusion of a Kindred and Wan Kuei and inspired by little figures Hannah saw in shops, the Gargoyle known as 'Clay' would become Hannah's terrifying shadow. Who Clay was before she became a gargoyle is now irrelevant. Formed of a captured Bushi and [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] of House Bishamon. Hannah, initially not wanting to waste anything, made Clay the size of two men, staggeringly tall and more or less having the muscle of two people overlaid each other. And when 'Clay' woke up to Hannah letting her [Glossary('витэ','game_concept_vitae_desc')] flow into her mouth, Clay recognized her as master.\n\nUnlike many other Gargoyles, especially in the West, Clay has many more rights than most Gargoyles. Clay is permitted to lead Hannah's forces, talk back to Hannah, and go out unattended. Even despite initial concerns by the leaders of the lineages, Hannah's insistence and then Clay's proving of their loyalty was eventually enough that Clay was permitted to act as she always had. And now, even when Hannah forgets the Bloodbond, Hannah's own kindness to Clay has made them a ferociously devoted bodyguard. Clay knows what horrors and slavery awaits her if her mistress dies. So Clay will serve her faithfully into the night.\n\nFuture Fate:\n\nClay would protect Hannah into modern nights, but one night, a strange vampire with blood that reminded Clay of Hannah found her. He would abduct Clay with his blood sorcery, discover what formed her, and then killed Clay, and went out to make his own version of Clay in Los Angeles."
 POD_persistentpodlore.desc.EA0008: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe first of the Kintsugi Caste, and inspired by the pottery Hannah saw in her travels, Porcelain, despite being one of her earliest works, is one of her proudest. Formed of a Bushi burnt near to a crisp by their training and a mentally unsound mess broken by Nightmares, Hannah was happy to 'fix' them by tearing them apart and reshaping them into a new being, one both whole and sound. And once done, broken apart and brought back together, Hannah named them... Porcelain.\n\nPorcelain, like all of the 'First' Gargoyles made by Hannah, was given a significantly higher degree of freedom than the others past the Bloodbond. The new Gargoyle was fast, incredibly present when she needed to be, or 'extremely charismatic' when she needs to be. Knowing Hannah was the only master that would let her have any degree of freedom was... liberating, in a way. So she turned her powers to ensuring her master stayed safe. While Loyal, Porcelain was ruthlessly precise, hiding in lies, and canny. She would protect her master from herself, even while Hannah would at times be overwhelmed by the beauty of her own creation.\n\nFuture Fate:\n\nIn all but name, Porcelain would become the heart of the Banpaia's web of intrigue, second only to Akane in influence, albeit far less externally respected. And yet, the incredibly loose leash Hannah left Porcelain allowed her to coordinate a massive lattice of spies and agents to protect the Banpaia, and to a larger extent, the Kindred Cult to [Glossary('Mikaboshi','podgloss.mikaboshi')]."
 POD_persistentpodlore.desc.EA0009: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhatever vampires formed Iron, they were both clearly of stern stock. While Japan is comparatively crawling with Werewolves, the Hakken have not been able to uproot the Banpaia in their tentative and endangered earlier years. Because, when the wolves come out to play, the warrior statue in their havens open their eyes, draw a ruinous blade, and set to show those wolves who is the real monster.\n\nIron was made of a Bushi and Monomi, strong in all incarnations of her existence. Unlike their countepart Clay, Iron was heavy and thundering, less graceful but horrifyingly lethal. Wrapped in cast iron muscle, Iron was lethal from the moment she left the Wicked Citadel. As Hannah was not overbearing on her, Iron adored her, to the extent that despite Hannah making her, Iron doted on her almost like a daughter. And to that end, whenever Hannah holds court, the same statue is always there in the room, with cast eyes that always loom over them.\n\nFuture Fate:\n\nIron's constant vigil defined her unlife. Rarely ever leaving Hannah's haven, Iron simply loomed over them, but her duties expanded. Organizing armies and acting as the metal fist of Hannah, Iron would be the crusher of dissent in the Banpaia, the absolute will of a leader who oftentimes was too meek to act. And Iron will always act."
 POD_persistentpodlore.desc.EA0010: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe first of the Totai, Ceramic was originally made as an unrepentant indulgence on Hannah's part. Formed of a beautiful traitor Chibo and handsome smooth talking Kizoku who got too bold for his own good, the Gargoyle Hannah named 'Ceramic' was made to be an object of objective beauty, and she was more than overjoyed with the result. As the last of the First, despite what many would assume would become a concubine, Ceramic was instead given all the same privileges the other First Gargoyles Hannah made. Rather, Hannah wanted a storybook romance, because it wasn't enough to make a perfect consort, Hannah wanted to Ceramic to actually love her.\n\nCeramic would come to be a Haven guardian, but largely always out of sight, hiding among other Gargoyles. Countless ghouled animals stalked around the Haven, while Ceramic spied at a distance with Auspex. And when push came to shove, her ability to weave illusions was the last line of defense to protect her eccentric but otherwise lax master.  Furthermore, knowing Hannah would excuse anything she did, Ceramic would become a bit indulgent in toying with her prey, incredibly thorough in it, and more than eager to spin lies into lethal daggers. And given Hannah rarely asked questions, Ceramic found the situation perfect. Ceramic tolerated the ‘dinner dates’ of shared hunts, various gifts of useless trinkets, and over designed clothes, in return for Hannah more or less letting Ceramic do whatever she wanted. Usually the joy and mental stimulation of hunting and killing Shih for sport.\n\nFuture Fate:\n\nCeramic would, eventually, become the hidden master of the Banpaia. She would eventually bloodbond Hannah to herself in a Blood Wedding, securing her long term safety so long as Hannah remained. And as threats amass around Japan as Modern Nights moves to Final Nights, the Puppetmaster begins to better control her strings so as to make sure any that would threaten her perfect situation find themselves strangled."
 POD_persistentpodlore.desc.EA0011: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe Blackest Night is the covenant that guards the residence of the shogun from forces beyond their understanding from the shadows must play by different rules from the rest of the world. Such is the nature of surviving in the night world. And in that time, easily the most sly snake in that garden is the Bleak Warden.\n\nKakue is a mystery to most the rest of his house, a force in the night that rarely leaves Kamakura. Always hidden from view, speaking few truths, and by and far the most embittered against the influence of the [Glossary('Dharmas','podgloss.dharma')], Kakue's escape from Hell is mainly guess work by the rest of his [Glossary('Wu','podgloss.wu')]. By his own testimony, he went to [Glossary('Kakuri','podgloss.kakuri')], and became so irrelevant and beneath notice that the [Glossary('Shikome','podgloss.shikome')] and [Glossary('Emma-o','podgloss.emmao')] forgot he existed. While a bit absurd and from a man known from lies, his [Glossary('Wu','podgloss.wu')] suspect this might very well be true. And given his skills with obfuscation and sedition, he is superb at squirreling out the truth and casting it out into full view.\n\nKakue however works to greater aims. He has rather deep suspicions regarding rumors of a horde of Tsuchigumo beyond the steppes on the mainland traveling in the shadows of the Mongols and Yuan. To the rest of the Bishamon, he feeds them truths and lies to radicalize them against the mainland, while refusing to authenticate anything that might make them open up to this deeper threat. And as the feedback loop of lies and belief increases, he gets his blessed quiet from the chattering and inane ancestors on the mainland.\n\nFuture Fate:\n\nKakue would always be central to the Blackest Night. However, his vehemency against the Tsuchigumo would spell his end at some point, when one night shortly after the arrival of the Portuguese in Japan, he was found a pile of rotting meat, the only clue to a killer being smoking black vapors..."
 POD_persistentpodlore.desc.EA0012: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nA visionary of engineering and works, many a smith, mason, and carpenter in Kamakura gets their funding from this hidden patron. And all around them, their works build to a greater work, all to protect and shield against outside influences.\n\nNorinaka is that patron, and an escapee from the Hell of Burning Seas. Murdered by Korean Pirates when helping his village build docks by being trawled out to sea from a rope cast off the back, Norinaka never moved on past his death. While many in the Bishamon are isolationist, Norinaka takes it to a whole new level, exclusively feeding on foreigners if he can help it and taking a special joy in architecture completely divorced from any foreign influence. Within Kamakura, he uses architectural magic to confuse and disorient the dead, and cause the heads of those not familiar with the place to spin in confusion when they tread the grounds he has designed. Past that, he is genuinely a skilled architect, incredibly focused and meticulous in his work. He genuinely believes in the cause of the Bishamon, and as such, he is nigh incorruptible. He is a critical bedrock in the secrecy and planning of the Darkest Night's deeper works, and is critical for their continued operations as they protect the Shoguns.\n\nFuture Fate:\n\nNorinaka would keep his position in the Bishamon, and rant and thrash against the Bishamon's decline with the end of Japan's isolationism. He would become rabidly xenophobic and to an extent unhinged, and one night, his desire to get closer to foreigners to kill would lead to his demise, when he went abroad to try and hunt, only for a temporary haven to be struck in a fire bombing during the Second World War."
 POD_persistentpodlore.desc.EA0013: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn 9 months after a pirate raid, a career criminal, and by and large a social scourge and embarrassment to the wider Bishamon since his induction, when it comes to the necessity of a warrior to guard mortal institutions of power from supernatural interference, Ujiyori is without compare. Ujiyori was born of violence, and lived a life of one. Abandoned early by his mother who wanted nothing to do with him due to the nature of his birth, and starting life as a thief urchin and ruffian, his crimes grew more and more, becoming a full bandit and assassin working for coin. However, despite the lucrative opportunities of the Genpei Wars, he met his end in it, when a dedicated official had a whole group of guards ambush him, and finally could arrange his execution. And he was punished further by being condemned to the Demon City. Ujiyori was a cunning and personable force though, and sweet-talking many a Rakshasa allowed him to find a Thrashing Dragon to escape. When he returned to the mortal world with a second breath, he celebrated with a marathon escapade that would leave behind numerous Dhampyrs.\n\nUjiyori is an oddity among the Bishamon, and especially among the Blackest Night. He is a Thrashing Dragon, yet still deeply loyal to the House. While mentored beyond Japan, he returned to it and calls it his fundamental home. Despite being a part of a House that conducts itself with honor, he is a lecherous pervert who leaves countless bastards in his wake.\n\nHowever, he is fundamentally useful. Charismatic and freeform, he can adapt to threats, and his practiced skill with a sword and skill as a hunter of men and beasts makes him invaluable. And furthermore, his Dhampyr bastards are useful as a network of allies. And to add to it all, with his magnetic charisma, he can turn heads of men and women alike. So his [Glossary('Wu','podgloss.wu')] tolerates him, as his mix of utility despite his wanton habits gives him a place in the [Glossary('Wu','podgloss.wu')].\n\nFuture Fate:\n\nWhile the paths and purpose of the Night changed, Ujiyori never escaped his nature. And because of it, in his wild passion for life and joy in sensation would see him ascend to the [Glossary('Hundred Clouds','podgloss.hundredclouds')], leaving a confused lover from underneath him bewildered as to where his lover went."
 POD_persistentpodlore.desc.EA0014: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe Uji are, at their core proudly divergent from the mainland Hungry Dead. One such point of their divergence is how their Dhampyr are treated. Dhampyr among the Bishamon are a thing of pedigree, of prestige, and of status. Most though don't often find their way back into the systems of power and edifices of office that define the Uji. Usually, anyways\n\nHiinashi is a quiet figure, thoughtful and willingly deferential to the Blackest Night. However, one of Ujiyori's romps through a young family that had deeper connections to an organization known as the 'Jidai' has given her a unique inheritance from her mother's family. A bridge between the Jidai and Bishamon, she has access to Arts and means often feared by the Hungry Dead, but so devoted she is that the rest of [Glossary('Wu','podgloss.wu')] seriously doubt she would ever plot against the Bishamon. And even then, what the Bishamon can assert about this hidden order is they have similar views to the rest of the world, she is permitted to thread this line. And so, this 'Sorcerer' has become a core part of the [Glossary('Wu','podgloss.wu')] due to her powers actively making up for things the rest of the [Glossary('Wu','podgloss.wu')] lack. her wards can repel spirits, her creations can burn like fire, her conjurings can last and hold. And besides, she is incredibly devoted to Yasutami in ways that many whisper that their relationship may be deeper... but such rumors have never been substantiated. And at the very least, she is a critical cornerstone in the hidden Bishamon Court of Kamakura.\n\nFuture Fate:\n\nHiinashi would grow old, and not once did she ere in devotion to the Blackest Night. From 1227 when she was a woman grown to 1678, she remained steadfast in her service to House Bishamon. While their links to the Jidai would die with them, her lasting legacy within the Bishamon would elevate her to the golden standard of what a Dhampyr should aspire to be." 
 POD_persistentpodlore.desc.EA0015: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTo the rest of the Uji, by and large the Emishi people were beneath notice, as between their own disregard for them and an absence of a Court structure to take upon the feral members that escaped Hell, for the most part, they left no legacy among the Uji. However, some select few were found in the Hells and brought to the world of the living by the mainland August Courts. They had hoped that perhaps they could use them as a tool against the Uji, natives to Japan that could present a face for the August Courts against the hegemonies of the Uji. And they succeeded beyond their wildest nightmares.\n\nToshie was the only soul to endure when her home village was subjugated by the predecessors to the Samurai, not even worth a footnote. The ancestors that brought her in found her a nervous wreck, constantly crying and scratching at her wrists and ankles where she had been dragged by horses. She was prone to fits of violence at the mention of the Demon City, and her mentors even suspected she might have originally gone to [Glossary('Kakuri','podgloss.kakuri')], only to be traded away by [Glossary('Emma-o','podgloss.emmao')]. Her education into the Night World was long and hard, but she did eventually get a grasp of the Devil Tiger [Glossary('Dharma','podgloss.dharma')]. In fact, once she understood it, she seemed to fall into it with a wild zeal that shamed even her mentors. And it was for that reason she should have never been allowed to return home.\n\nUpon her return, she began stalking the settled lands the Emishi once called home, becoming a bloodthirsty monster who now associated all Yamato people with [Glossary('Emma-o','podgloss.emmao')], and as an Iron Talon, they all must die. Mortal, Wolf, Lightning Thief, Tsuchigumo, and Gaki alike all had to die. Only stubborn Emishi holdouts and the Ainu were spared her wrath. And as the Uji begin to consolidate, her rampage as a monster of the night will be tested.\n\nFuture Fate:\n\nToshie could only hunt for so long. Eventually, Kishu agents were able to overwhelm her, and she was paralyzed with an iron rod to the chest. The master of the Conclave of Stars watched as her personal artisan reshaped Toshie and one of her most hated foes into a new, loyal beast of clay and [Glossary('витэ','game_concept_vitae_desc')]." 
 POD_persistentpodlore.desc.EA0016: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn life, Nariaki was the son of a Japanese Trader and a former Nomadic Steppe Woman who settled in Korea, and his life was defined by constant travel between Korea and Japan. While always close to his father, he internalized many lessons from his mother, and loved them birth. However, such straits are always moody, and the regular storms between the peninsula and the islands struck his ships, and Nariaki drowned, and drifted into the Hell of Boiling Seas. Despite this though, he applied the sailing lessons his father taught him and the survival skills of his mother to survive. And in time, he was able to slip through an underwater cavern, and wake up on the shores of Tsushima.\n\nWhen the Uji found him, the then forming House Genji was one of the very few houses that would take him in. For accepting him, Nariaki is deeply protective of his House. A steadfast and calm force, he has excelled as the Celestial Blade's primary apprentice, his dedicated and unrelenting candor well deserved. Furthermore, his constant exposure to coin and trade made him adept at helping faciliate trade, and as such, he would become a rising star and proof of what the Genji stand for in that it can work perfectly.\n\nFuture Fate:\n\nNariaki was always an cautious proponent of the Uji being willing to engage with other supernaturals. As of Modern Nights, he is in close contact with as many of them as he can find. Occultists, the Beast Courts, Little Gods, and more, he centers himself in a wider web for the sake of learning as much as he can."
 POD_persistentpodlore.desc.EA0017: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor many a foreman, it is easy to become detached from ones workers. In death though, Sukehisa was forced to confront the weight of what he was doing. In his life Sukehisa was a foreman who oversaw the construction of castles and forts, and a brutal one at that. Countless war slaves died in his processes, and many of those brutalized by him resented the fact that he died of old age. However, he did get his just deserts in the Wicked City. And only when he was finally broken down and endured four lifetimes of menial slavework, did he find an escape.\n\nSince his return, he has dedicated himself to the contrary. The Sukehisa that came back was no longer the cold hearted bastard miser. The man who came back beamed with warmth, had a new love of unlife beyond the Wicked City, and a generosity to match. Willing to adjust with the times, he gravitated to the Hiyorumi, jumping on the chance to open homes and safety locations for those displaced by conflict and war. By connecting with the people there, he would create a network of informants to spread throughout Japan that were loyal to their benefactor. And now, as the Mongols conquer further and the [Glossary('Anda','podgloss.anda')] draw closer, there are no shortage of refugees. All he needs to do to be happy is overcome the bullheaded closemindedness of the Bishamon, and make it clear what being hateful misers entails.\n\nFuture Fate:\n\nAs a philanthropist, Sukehisa did his best despite Japan's isolation. When Japan's isolationist period ended, he was overjoyed, and tried to spread his philanthropy work afar. However, as a diehard proponent of hope and generosity, he was marked for death by [Glossary('Mikaboshi','podgloss.mikaboshi')], and his [akuma|E] followed through, bringing a close to his tale once and for all."
 POD_persistentpodlore.desc.EA0018: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOriginally just Kogoko, Kogoko-no-Nukekubi is one of the precious few disciples of one of the few true [Glossary('Bodhisattva','podgloss.bodhisattva')] the Uji have. And with that, she has already excelled in ways that few other students have. Originally just a serving girl in a restaurant who died from dysentery and condemned to the Hell of Having No Money, she escaped due to the generosity of her mentor, who was searching for students at the time. And among the many of them, Kogoko had something that Nukekubi was looking for. Her civilizing was rather rushed, as Nukekubi had a purpose for her.\n\nAs soon as Kogoko-no-Nukekubi understood what she was and her role in the Uji, she was sent as part of a trade mission to Indonesia, seeking out a master who had developed a new Shintai. Kogoko-no-Nukekubi came before the Red Dragon with gifts from her mentor and numerous powerful spirit pacts, in return for Flesh Shintai. Piyau accepted only under the prohibition that it only be taught to women, and Kogoko-no-Nukekubi herself agreed. And she immediately rushed back home, and shared the art with Nukekubi. And while Kogoko-no-Nukekubi was the one who brought Flesh Shintai to Japan, it was her mentor who defined it. And now, as Nukekubi plans her further development for the House, Kogoko-no-Nukekubi awaits patiently at the sidelines, knowing that in due time her mentor would reward her.\n\nFuture Fate:\n\nEventually, Nukekubi would retire from politic, changing her role to that of a distant guide. The House's second leader would be Kogoko-no-Nukekubi, who proudly stepped up into the role. However, Kogoko-no-Nukekubi would come to loathe politics, and would later pass on the role of leadership to her own future student Danrin-no-Nukekubi, and then retire from politics altogether. She is rarely seen in modern nights, having faded into obscurity."
 POD_persistentpodlore.desc.EA0019: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile many of the Kin of Izanami are hidden, due to the nature of their [Glossary('Dharma','podgloss.dharma')] threading the line dangerously close to the Devil Kings' Defiled, the codifier of their path was always the exception. Ancient, terrible, magnificent, and cruel, Yūki is an exemplar of the path, feared and respected in equal measure. Very few of her Uji contemporaries know when she was young. Some whisper she even civilized herself. The truth is more complex.\n\nYūki is one of the oldest Gaki in Japan. Born in the early days of the Yayoi period, when Yūki's heart still beat, the people of Japan were just starting to build distinctive keyhole shaped burial mounds. But for Yūki, that mattered little. She was just the bride to an early Japanese Mage. They were happy together, but as time passed, she had the misfortune to die to a particularly brutal winter, and her husband tried his best to save her from death. He sought her out, and to his horror her found her in the Hell of Wicked Magic. He tried to barter for her, but as the ritual neared completion, an oversight caused it to fail, and for Yūki to be damned. In this failure, Yūki watched as her husband abandoned her, and left her to hell. And in that moment, she understood. He saw his deceased wife once again, where she dragged back to hell, covered in self inflicted scars and the gore their village, and had a revelation of the revelations that would define the Children of Izanami.\n\nYūki holds herself to be a paragon of the Children. Depraved enough to make even hardened Devil Tigers shrink before her, when the Uji seek her, they often find her in a cave of indescribable torments, where mortal, undead, and devil alike howl together, as she seeks others who have fallen like she has. Her body a canvas of agony, few would risk her wisdom. Thankfully for the Uji, she is at least, probably, on their side.\n\nFuture Fate:\n\nYūki largely ignores the inane politics of her contemporaries, and instead builds her cult. As the Prophet of Izanami, she is unrivaled in wisdom among the Cult, and she knows it. And in the grinding of the Wheel in Modern Nights, she dreams of a world not of a Demon Emperor, but of a Corpse Queen...\n\nIzanami is so close. Spiraling and turning on itself like a colossal dragon."
 POD_persistentpodlore.desc.EA0020: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAt the base of Mount Daisen, there is a hidden temple, partially sequestered within the Umbra. New students from all Clans are welcome, and its graduates are respected across the Great Clans... but the cost of being a student there is steep. At its core, the master of the temple is a harsh mistress. And her God would have it no other way. Yaeko was once a shrine maiden, whose life always came back to fire. Born in the shadow of the mountain, she has always called Daisen her home. As a Maiden of the Shrines there, she dedicated herself to the support of ascetic monks at the shrine of the Fire God Kagutsuchi-no-mikoto. And she was so devoted to her god, that when a rite gone awry caused her shrine to burn down, she prayed rather than flee, trusting him to protect her. She even thought it was a test when she found herself in the Hell of Burning Seas, lashed to everflaming wood on the seas, doused in pitch to burn eternally. Yet she held on, praying to her god. So intense was her prayers, that Haha No Fukami could not tolerate it anymore, and threw her back to the living world.\n\nUpon regaining lucidity, she returned to her tending of the Shrines. Her new instinctual fear of fire though distressed her though, so she tested her faith once more, skewering herself to an iron stake in the temple, and setting the pit ablaze. And in the agony of the rite, she was eternally marked, as she saw visions of a spirit that called himself the vassal soul of Kagutsuchi, a boy made of pure fire with vermillion eyes and hair, shifting into a terrible dragon with scalding rubies for scales. And then she understood. When the blaze abated, she emerged still whole, burned but her purpose clear. Yaeko would build a temple around the pit, and create another to train students.\n\nFuture Fate:\n\nYaeko's act of insane faith and mastery of the Flame Shintai made her an alluring mentor, but also the master of the feared Daisen Rite of the Fire God. She remains in Daisen to this day, one of the three nuns that oversees the rite, and oversees this harsh crucible of training."
 POD_persistentpodlore.desc.EA0022: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nA military man through and through, Nagamatsu was among the very first of the Bushi class to serve in the wars Heian period, the precursors to the Samurai. A minor noble, he earned much acclaim in battle and in service, and he saw a great deal of personal success in civilizing the barbarians in the north. But to live by the sword is to die by the sword, and he perished to an ambush. From a life of violence, he earned his torments in the Demon City, much to his dismay. But Nagamatsu was as stubborn as he was a go getter, and with iron resolve and a willingness to wait and endure, he wore down a wall in the Hell and escaped, returning back to the world of the living. Within the Uji, Nagamatsu gravitated to the Taira Uji, as he found the new world disorienting and confusing. He liked things the way they were, and despised the pivot. He became a model of the clan, and gladly and deeply threw himself into service and devoted attendance of his new lords. His old connections became an access to Samurai, letting the Uji stay relevant. And to that end, he has not ered in service.\n\nFuture Fate:\n\nNagamatsu would define himself in service and in war. He became feared and loathed for his brutal mindset to war, and using his agents to murder rivals in the day. And, in a twist of hilarious circumstance, when the Americans fired into the port his Haven was sequestered in, his slumbering body was thrown into the sky, and he was ash before his corpse hit the sea."
 POD_persistentpodlore.desc.EA0023: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the more conservative Uji in Japan's Night World, many among the Great Clan see shipbuilders and artisans that desire to learn more as dangerous. But to waste all that knowledge? Ieko can't stand for it. She was born not far from Enuma, to shipbuilders and sailors. Proximity to the Hoshi Ryokan always meant business, and her family prospered immensely from it. But, the shores are a fickle thing. One day, when testing a ship, Ieko fell overboard, and a riptide snagged her out to sea, and claimed her then and there. And perishing that way earned her a place in the Hell of Burning Seas.\n\nHowever, from driftwood and wreckage, Ieko found a means to escape. By building a new ship, she was able to sail free, and from her hell fashioned ship she awoke in the living world. She sailed back home, and was found by the Uji. But yet, she was aimless, as few wanted her skills. So, she gravitated to those who did, the Echizen. And since falling into Kasumi's orbit, she has become happy for the first time since her living days.\n\nFuture Fate:\n\nIeko's shipbuilding skill was foundational to the Echizen's success, and her proximity to Kasumi allowed her to learn enough leadership skills to lead the Clan after Kasumi's death. Come Modern Nights, she still leads them, and has taken great interest in modern ship building and how she can apply those new building techniques."
 POD_persistentpodlore.desc.EA0024: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWho Koreko was before her death, matters little. Her name wasn't even her living one, but rather a new one given to her by [Glossary('Emma-o','podgloss.emmao')], who hated her original one. Once, she might have loathed such degradation. Now, she sees it as fundamental to her as it is for a mortal to breathe. Since the beginning of her service as a [Glossary('Shikome','podgloss.shikome')], Koreko has become the main overseer of the prisons in [Glossary('Kakuri','podgloss.kakuri')]. She is the one tasked with chaining up the men they find and denying them respite, and rubbing their torments in their faces. She relishes this, and loves gratifying herself with their torments. And yet, the moment one of her superior [Glossary('Shikome','podgloss.shikome')] comes to her, she is immediately deferential and submissive.\n\nShe is a useful, cruel, and petty sycophant, and [Glossary('Emma-o','podgloss.emmao')] finds great satisfaction in the creature he molded Koreko into. Naturally, her ability and skill in breaking people made her a given for the task force sent to break the forces of the Wicked City. In particular, she is wildly curious at the rumored arts of flesh shaping these infernalists are said to have. What she could do with that, she salivates at the thought. She is oh so eager to break them all."
 POD_persistentpodlore.desc.EA0025: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the indistinguishable [Glossary('Shikome','podgloss.shikome')], Haneko is actually rather unique among them. Because, unlike all the other [Glossary('Shikome','podgloss.shikome')], Haneko is the only one whose unlife actually resembles their mortal one. Her memory of it is of course fragmented and shattered, but Haneko was always a killer who used her body as a honey trap. And to what end? Because she could. She liked killing. She murdered dozens of people, until when murdering a guard, she killed someone who would be missed too much, and she met her end at an execution. And for her loveless life she was consigned to [Glossary('Kakuri','podgloss.kakuri')], and the overwhelming malice that radiated off of her caught the attention of the [Glossary('Shikome','podgloss.shikome')].\n\n[Glossary('Emma-o','podgloss.emmao')] initially wanted to discard her, but curiosity was enough that he wondered if a [Glossary('Shikome','podgloss.shikome')] could be made from a soul that already resembled one, rather than an innocent one. The end result was... a success of a kind. She did look the part, and was equally dead inside, but she was erratic, unhinged, and prone to fits of sudden shouting and sensation. She was a relentlessly efficient hunter, but at the same time she at times hunted targets that didn't exist and missed obvious targets. She is completely and utterly insane, and yet still is effective enough that [Glossary('Emma-o','podgloss.emmao')] keeps her, at least for the lesson. In fact, it might be for that reason that she was put in the task force meant to destroy [Glossary('Mikaboshi','podgloss.mikaboshi')]. Her own madness is anathema to the monotony that [Glossary('Mikaboshi','podgloss.mikaboshi')] embodies, and her own flights and spasms might be enough to shatter it completely and utterly."
 POD_persistentpodlore.desc.EA0026: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFamed for their masterworks and artisans, House Echizen isn't often known for its warriors. There is an exception to that though. Some weapons made by them are never used by anyone other than their creator. And those weapons are the most feared. And for that reason, Akira is the most feared of the Echizen.\n\nHe was never a particularly outgoing person. Even as a child, he always had a dour demeanor and avoided the public eye. The son of a blacksmith, he luckily found a great joy in creating. He loved it more than people, to an extent. Really, the only thing that could compete with his love of metalworking was his love of hurting people. He always liked it when passerbys tried to steal, as he always took the excuse to bust open a man's brains with a hammer. Which, would come to be his doom, when he killed a nobleman's son out on the town, and met his end for it and ended up in the Demon City. And there, he was incredible useful as a maker of weapons. And plenty of foes to practice it on. He became truly fearsome with the blade, of a kind few other Hungry Dead could hope to equal with as much experience as he got. And upon escaping, he sought out those that wouldn't bother him when he made things. Naturally, he fell into Kasumi's orbit, and joined the Echizen.\n\nFuture Fate:\n\nAkira's lack of interest in power helped him greatly. While he did little to stop Kasumi's death, he was greatly irritated that his work was now delayed by conflict, and vowed destruction upon the Tsuchigumo for disrupting him. His relentless seeking of them would eventually lead to him becoming a continous thorn in their side."
 POD_persistentpodlore.desc.EA0027: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMost Uji, when asked about what should be done with the Tsuchigumo, often waffle a bit on the answer, on how uprooting them would be costly and ill-done, and how there are greater concerns at hand. However, when asking one of them, her eyes burn with furious zeal, as she affirms the threats and hidden monsters that haunt Satsuma, Hokkaido, and Shikoku. A hate that can only come from a place deep in her heart. Afterall, she was killed by the Tsuchigumo. And her sister was lost to them and damned forever by them. When she still drew breath, she was content with a quiet life in the northern parts of the Japanese mainland, but one night, pale demons came with horrors, and spirited away with some in the night. They brought them to a despicable fortress, where Mikoto was torn apart and made an amalgam being, until it died in some battle. But the beast endured, while her corpse added to its mass.\n\nShe went to the Wicked City, condemned by the foul blood of the spawn. But after being a literal piece of a biological machine, the false one could not hold her. The beast, still shambling, once burst open with her escape as her body restored itself, and she fled south to be found by the Uji. Mikoto is, as such, the foremost expert on the other native blood drinkers of Japan among the Uji. And she is adamant they all have to be destroyed. Be they lurking sycophants, infernalists of coin, or storm-bound bandits, they are all a threat, and their blood caries with it a damnation so perverse that even their own damnation as taught by Xue is nothing compared to it. And she won't stop beating that drum until the scourge is eradicated.\n\nFuture Fate:\n\nMikoto would, among the Uji, be the main obstacle to the native Kindred of Japan, until one night, as she made a case for the destruction of the more amicable ones, a particular smooth talker requested a parley. She never escaped the nightmare realm he thrust her into."
 POD_persistentpodlore.desc.EA0028: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTreachery is a difficult sin to make up for. Karuki knows this, and makes no attempt to hide her past transgressions, and rather labors constantly and steadfastly to make up for it. In her mortal life, Karuki was one of the Go Kamisori Gama, a craft of Assassin Magi. However, she was deeply jealous of her master, and, conspiring with two of her fellow students, came up with a truly brutal and sadistic way to kill him, and condemn him to the Thousand Hells. But the intervention of Jizo the Wanderer led to her master returning, and she was dealt swift and deserved justice. But of the three traitors, Karuki was the only one to actually learn her lesson in the Hells. Falling into the Hell of Hell of Being Cut to Pieces, everything she did to her mentor was returned onto her a hundred fold. And only when, on the deepest possible level did she understand what she did and truly desire to atone, did she awake in the shallow grave her victim and killer left her in. And he was the one that found her.\n\nKaruki debased herself to him, begging for forgiveness, even allowing him to kill her again if he felt she deserved it. But Kuro-sama instead decided to test her, and properly educated her under the most brutal efficiency. And when her final test came, and he said she had to die, she accepted it. And then, he told her to earn her redemption.\n\nShe has since served as the Uji's premier assassin in the Fourth Age, and would come to found the Uji Clan of the Iga. However, she is exacting on her targets, and is always certain they deserve it. She then deals them a swift and painless death. In personal conduct, she is dour and withdrawn, exacting and professional, still believing herself a beast striving to be better. But, she is finally letting herself open up. Rumors abound of hidden trysts with Taira Kaito. Karuki has spent so much time atoning, she may be finally trying to learn to live again.\n\nFuture Fate:\n\nKaruki's Iga Clan would never be as large as the other Uji, and she would be outdone in targets by Yukio. However, when it came to putting down inward targets, Karuki remained an easy ancestor to call. She still holds her office into modern nights. And, if rumors are to believed, the trysts with Kaito blossomed into numerous Dhampyr that aid the Iga."
 POD_persistentpodlore.desc.EA0029: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nNo organization is ever truly homogenous. Even for the most insular and defiantly conservative Uji on Japan, they have their exceptions. And it comes from the strangest place. Being born from actual Taira lines, Kaito remains a staggering contrast to the rest of the Uji he was pressed to join.\n\nKaito was born to the Taira, specifically of the line descended from Kohehira, but Kaito was distant enough from the line as to not have been considered important enough for the historical texts. One of the many casualties in the Genpei Wars, the Demon City called to him for his life of conflict. But the free spirited soul he had couldn't be constrained, so he escaped in short order, and was found by the Uji Clan that took his family name, and swiftly pressed him into their fold. However, Kaito resented the new set of chains. He genuinely did not believe the values they espoused. To an extent, they only wanted to use him for his size, professional skill with a blade, and little else past being a meat stick to bash their enemies with. But he wanted to live free of tradition. Unlife was a chance to experience things he never could in life, see plays he was denied, love freely without judgment, see places he never could, and be more than a killer.\n\nWhile his masters would press him into being an ancestor, he would be his own ancestor. While his skill with a sword was greatly awe inspiring alongside with his physique, he adored the arts and generally took to life with a new zeal. Be it private meetings with the assassin Karuki, traveling Japan, partaking of the arts, and exploring cities he never got to see in life, he takes to everything with an undeniable vigor and pride.\n\nFuture Fate:\n\nFollowing the Year of Black Kites, Kaito would disappoint the Taira by not aspiring to much, and instead fading into obscurity. The only clues as to where he went was a number of incredibly well built and handsome Dhampyr of noble stock that surrounded Karuki, and tales of a wandering Samurai in the Umbra seeking all there was to be seen."
 POD_persistentpodlore.desc.EA0030: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nFor most of the history of the Azure Dragon Court, the Ancestor of Tsushima, despite the comparatively small size of the Court, has always been one of critical importance. Traditionally, whoever held Tsushima held the critical junction of travel between the two halves of the Court. For a time, this position was always neutral. However, in these trying times when terrifying omens of what is coming are on the wind, its current keeper has taken a side. Miki is among the most respected of the Uji, even if she doesn't look the part. An early student of Miura Yasutami, she was a compromise between him, Masao Iwase, and the ancestors of the August Courts, hand chosen for her neutrality in politics at the time. As someone severed from mortal connections due to her memory being ripped asunder by the Hell of Upside Down Sinners, and largely married to her job as a warrior warden, it was an easy call for her. However, come the march of the Mongols, Miki can see that the winds are blowing East. And furthermore, the [Glossary('Anda','podgloss.anda')] circling the door not far from Korea and China has brought an immense cause for alarm. When she toured the Black Tortoise Court to check on the threat, she was horrified.\n\nShe returned to her post, and contemplated her next course of action. And, after a year of deliberation, she returned to Iwase and Yasutami and informed of her intention to close the normal Dragon Lines that lead to Japan in the interest of forestalling the threat, and holding as firmly as she could while accepting no travelers. She merely is awaiting the signal.\n\nFuture Fate:\n\nMiki was a critical member in the conspiracy that was the Year of Black Kites. She issued an order of expulsion in Tsushima for all [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] loyal to the Azure Dragon Court, and executed those that failed to leave. And with the severance, she began the drift that would divide the Clans of the Sun from the rest of the supernatural world."
 POD_persistentpodlore.desc.EA0031: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile most of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] pay little attention to the native Little Gods (known as 'Fae' or 'Changelings' further west), there are times when liaisons are needed between Ancestors and these lesser divinities. While the Uji as a whole resent having to deal with them, they do have a dedicated person on hand for such things. And Rina wonders if she is the butt of some joke.\n\nRina has served the Uji faithfully for several centuries now, and is a competent Genji peacemaker and oftentimes an envoy to the rest of the Azure Dragon Court. But as the Clans of the Sun and the factions of the mainland court drift apart, Rina has been finding rather different postings in Japan itself, oftentimes dealing with the fickle, erratic, and confusing Little Gods. And unfortunately for her, she has always been a diplomat, and the alternatives are a diplomat to the Tsuchigumo (which would almost certainly end in her death) or to the Hakken (who are likely to slay her on the spot), she takes the headache position in stride because it allows her to keep her head."
 POD_persistentpodlore.desc.EA0032: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nGiven his special focus on Japanese people, [Glossary('Emma-o','podgloss.emmao')] holds a special degree of fear among the Uji, and as such, the Broken Mirrors where his forces have come over from have always gotten special concern. And with an entire battalion of [Glossary('Shikome','podgloss.shikome')] active now, the Uji are going to be damn sure they're not taken by surprise. Despite how most would refuse such a posting, Kazuko volunteered for it. An escapee from [Glossary('Kakuri','podgloss.kakuri')], Kazuko is someone who tries to live her life to the fullest, and feels as though something is always... lacking. She was always a bit distant from her contemporaries, as where the [Glossary('Shikome','podgloss.shikome')] often fill the other women of the Uji with rage and the men often succumb to their wiles, Kazuko never understood why she never reacted to them violently. And while she does find the possibility of falling to [Glossary('Emma-o','podgloss.emmao')] horrifying, to the [Glossary('Shikome','podgloss.shikome')]... she has more mixed feelings on that.\n\nAt the very least, she has extremely detailed reports for her superiors, and her tracking skill is superb. So the [Glossary('Shikome','podgloss.shikome')] fighting the cultists of the Wicked City are being watched. Very intensely.\n\nFuture Fate:\n\nKazuko's 'dedication' to her role was intense. But such proximity to [akuma|E] without killing them is always dangerous, and the supernatural beauty of the [Glossary('Shikome','podgloss.shikome')] rendered her an easy thrall to them when they captured her. What became of her is unknown, but some of the successors to her role suspect that the presence of a new [Glossary('Shikome','podgloss.shikome')] that fawned over the other Devil-Women might illuminate what happened to her."
 POD_persistentpodlore.desc.EA0033: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEven as a child, Haruka was always the little girl poking in things she shouldn't, and the one that always had a shadow over her. Lacking energy and vigor, one day she trapped a wasp and a fly in a jar and watched when the wasp latched onto the fly's back and ate it, until a single wing drifted to the bottom. Haruka had a revelation that day, that she was the fly, and life was the wasp. Just a constant agitating pain that kept eating her alive. Her mindset never changed, and she eventually lost the battle against life's cruelty, and she found a quiet place to let the wasp win.\n\nBut in doing so, what she hoped would finally be sleep was instead the Hell of Being Eaten Alive, her metaphor made literal. Haruka though loathed the cruel joke of it all, and finally, realizing she had been wrong, ate the wasp on her back, and took her Second Breath. And among the Uji, Haruka is a bit of an oddity as their fascination with death merely changed. A lifelong struggle with depression made her incredibly sympathetic to wraiths, and they can recognize her struggles in their own war against their shadows. Frustratingly though to the wider clans though, is she has little patience for politics, so the potential power to recruit Wraiths en masse is not used by the Uji. At the very least, she is a damn good exorcist who will do a job and do it well.\n\nFuture Fate:\n\nHaruka's patient walk of the Bone Flowers would, in time, reward her. One night, while helping a Wraith that died like her find peace, they moved on together. Them to Transcendence, and Haruka to the [Glossary('Hundred Clouds','podgloss.hundredclouds')]."
 POD_persistentpodlore.desc.EA0034: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe keys to mortal influence and power is a fickle thing, especially among the vanities and excesses of the upper class. Staying in touch with gossip, keeping up with fashion, maintaining networks, and resetting every few decades can be quite exhausting. But Hidaka is making up for lost time.\n\nBorn to constantly feuding parents, Hidaka was the daughter of minor nobility, and was little more than a tool for her parents. But she tried to be a good daughter. She put on a smile when she was married to a plain man she had never met before. She swallowed her pride from the neglect. She withstood the dagger to the heart that was his mistress. She said nothing about the sexually transmitted infections that came with the affair.\n\nHidaka can't rightly say what set her over the edge. It was either the government confiscating the escape, or the miscarriage that came with the drunk beatings. Either way, Hidaka ended things with a knife. After she ended him of course. Her last musings before that knife sent her to the Hell of Eternal Castration was of a deep laugh with tears rolling down her cheek at the pointlessness of it all. But in Hell Hidaka got another chance. She was nobility. She would get the glamorous life she was always denied. The packs of demons would take victims and wander for a time. She she let herself be taken, and escaped. And upon returning to the mortal world, she was going to live. She took a special pleasure in finding those like her mortal husband and turning them inside out, while moving and basking in the light of privilege, wealth, and high society. She would be the mistress this time, she would be the one to bask in praise, she would be the shining gem in the night. And damn, does she love undeath.\n\nFuture Fate:\n\nHidaka would always keep moving, always basking in the benefits of wealth. Moving from man to man and destroying them for infidelity, her game continues into modernity, a wake of corpses and gossip treading in her wake."
 POD_persistentpodlore.desc.EA0035: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nUntil they reach the higher stages of their enlightenment, the younger of the dead tend to leave a trail of corpses behind them. Be it a feeding that got too tough, accidentally taking to much breath, or having a fit of anger that reduced a village's census to 0. Keeping that from eyes that shouldn't see them is a tricky affair. But then again, Yoriie has always been cleaning up other people's messes. Yoriie was born to house attendants, and from a young age, he knew that was his purpose. Growing up in a noble's household not as the noble but the cleaners, Yoriie spent 7 decades of his life in the same castle, always cleaning, cooking, tending the animals, and serving the masters. He never married, as women didn't interest him. He never took a lover, as the flesh never interested him. He cleaned, he listened, and he advised. There was power in being the guy who made the bed and prepared the tea.\n\nWhen he was rewarded with a mundane life with Hell, he refused to accept the mess he left behind, and [Glossary('Emma-o','podgloss.emmao')] was flummoxed how the mild mannered butler escaped. Now, Yoriie directly serves the Clans of the Sun. No longer bound to a single estate, he is a mercenary therapist, janitor, cleaner, and 'cleaner'. No matter the mess, Yoriie will clean it. An unusual Crane, but a high standing one regardless. His lack of political ambition, ask no questions demeanor, and no desire the sleep with the spouse makes him the man everyone in the Uji trusts. For Yoriie? He's just happy to be busy."
 POD_persistentpodlore.desc.EA0036: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAs a child, Moroie always dreamed of the stage. From his first time seeing a puppet show, Moroie always wanted to act. He loved the theatre, and aspired over all else to have a chance to be on that stage. And to that end, he spent all the money he had from his time in a merchant's family to studying, performative martial arts, orating, and performance. He was overjoyed when he got his first chance to audition. And all of it gone in an instant, as while on the road he was ambushed by bandits. Shot in the eye with an arrow, left to bleed out, and stripped naked with all his things taken from him, Moroie's living story ended there.\n\nA new chapter began as due to the best day in his life becoming the worst day in his life, he was condemned to the Hell of Upside Down Sinners. But even then, when his sufferings reached their zenith, he woke back up in the living world. And Moroie was free, and found by a Whisperer. He's still struggling to orient himself, but he has found a place for himself. As the local acting scenes of Japan begin to bloom however, he tears himself up as a rootless tree and finally lives his dream. He is making friends throughout the world of theatre, and even more, his love of action has made him a rather capable warrior. Be it for a performance or a thrashing, Moroie is a critical piece in the links that empower the Uji."
 POD_persistentpodlore.desc.EA0037: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMidorikawa, in a system where many of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] were of middling wickedness, was one exception. He deserved Hell. And most strange of all, he of all people got a second chance. Midorikawa was a magus of truly terrible fury and depravity. So eager was he to eat the weak that he damned not just his body and mind, but his eternally reincarnating soul. He bathed in blood to keep his youth, he lured children towards people that would make meat of them in all the worst ways, he smiled when he exposed desperate spouses to violent partners. If he could make someone suffer, he was content. But his time did run out, when the Akashayana finally found him, and put an end to him with an enchanted blade that destroyed his higher self, and condemned him.\n\nBut yet he didn't die completely. His avatar shattered, he came to in the [Glossary('Kakuri','podgloss.kakuri')]. A place he had been before. And with that knowledge, he thought he was in the clear. But his mind fled him with his escape, and the Devil Tigers of the Uji found him and brought him to heel. And he was... deeply disoriented by his condition. No longer was the influence of damnation from his avatar over him, and his mind was clear. So focused on pain and hurting people, he never truly lived. He was marked as a devil, and now he truly was one. Midorikawa's road has been a twisting and confusing one. He has struggled intensely with redemption, but he at least seeks to live free. Not just brutalizing others, but truly sharing in pleasure, making people happy, and enjoying existence. Without his damned avatar, he could enjoy that. He's new at it, but he is going to try and walk that road."
 POD_persistentpodlore.desc.EA0038: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the reign of Xiao has largely been defined as a masterwork treatise on the follies of nepotism and dangers of decentralization within the Azure Dragon Court, to say that was his only legacy would be a disservice. And for a man so terrified of overindulgence and hoarding wealth, his singular student is a stark contrast.\n\nJi-so was born in a time of great chaos. Born in Gyeongju when the kingdom of Silla was still young in its unification, Ji-so was one among many within its dregs, the poorest of the poor. Her whole life was defined by begging, and she had never known a day when hunger did not gnaw at her belly. And eventually, between malnutrition, exposure, and being largely alone, she would succumb to the world's cruelty and fall into the Hell of Having No Money. But despite this injustice, it finally gave Ji-so something she had always lacked. Power of a kind. She would tear the bones from her foes, and use it as a kind of currency, as nothing else existed in the Hell. Many of its denizen were eager for money of any kind, and she bought her way out. And when found by the Azure Dragon Court, she was initially suggested to mentor under Xiao as a joke. He agreed, hoping to 'enlighten' her. But Ji-so paid little attention to her mentor, and immediately gravitated to the orbit of the Crimson Tiger Mercantile Cartel. She vowed she would never want for anything again. Be it blood, jade, bone, or power, she would never again lack. And while Xiao earned the ire of the Court, Ji-so began taking her own students and began building her own network of power, scattering contacts throughout what she knew as Silla. And as the Uji drift further and further, the time of her greatest acquisition may yet come.\n\nFuture Fate:\n\nWhile she always saw Xiao's fall from power as inevitable, the Year of Black Kites took her by surprise. [Glossary('Anda','podgloss.anda')] pillaging into the region caused a great deal of damage, and she lost a good deal. But she recollected her agents, and bode their time under the reorganized Green Courts. Following the division of Korea following World War Two, she spurred her students to action, and formed a 'New Green Court' within South Korea. She leads her 'True Bone Society' to this day."
 POD_persistentpodlore.desc.EA0039: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nPerhaps one of the most emblematic of the True Bone Faction within the Korean Night World, Ji-un hears his detractors, and largely ignores them. He doesn't have time to waste with gossip. Not when he has money to make.\n\nJi-un saw firsthand what evils money can drive men to do. He was a contract killer, after all in his mortal life. And a good and reliable one at that. Officials, Vagrants, Soldiers, Children, anyone, Ji-un would take the pay. And when the job killed him, he was fine with such a fate. Live by the sword, die by the sword. And his reaction to being in the Demon City was also rather tempered. He saw firsthand where killers go. Surrounded by people who enjoyed killing, loved causing pain, all of that disturbed him greatly. He was a professional, not a psychopath. And his dedication would let him carve his way out of the Hell, and into his Second Breath. When interrogated, he caught the attention of Ji-so, who took him in. And Ji-un was deeply relieved. She was a professional, and he could empathize with that. He expanded his skillset, and set to work managing the finances of their growing society. And besides, if someone defaulted on a loan, while an assassin was a worrying thing, a devil coming to collect is far worse."
 POD_persistentpodlore.desc.EA0040: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhen one thinks of Necromancers, usually it is the black robed, elderly figure surrounded by swirling ghosts that comes to mind. Yeon-jin doesn't mind such a reputation, as it does him favors. Being able to disorient the dead when they instead find them in a room as he holds a precious reminder of their past with merely atmosphere does wonders for funding the Societies.\n\nOnce a ruffian who was greeted with a knife to the belly, Yeon-jin always knew how to extort others, and now what not to do. But he has always been eager to find new ways to get coin. Since he became a student of Ji-so, the Ghost Arts have been of great interest to him. Afterall, when people die, they tend to leave fortunes behind. And perusing the archives of the Azure Dragon Court and conversing with many of the elder necromancers, he has learned a great many things about the other kinds of dead. Most usefully, are how precious 'fetters' are to them. If he only calls forth one of the dead while threatening a fetter, they always seem to squirm and agree to whatever he says. Its easy money, and the better to pay his respects to Ji-so with. He's already making a killing."
 POD_persistentpodlore.desc.EA0041: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest of Ji-so's disciples, A-ji is the odd one out from among the True Bones at large. Where most her peers, their disciples, and her mentor are ruthless and driven forces, she is a rather quiet soul that prefers her workshop. Having died over a payment dispute in her father's shop, the sorts that they now have to deal with all strike her as the kind who would have once spilled her brains all over the floor. But now, they're the ones placing orders.\n\nDespite this though, Ji-so continually affirms how important A-ji is to their Society. Jade, Bone, and Chi are all pains to work, and she is quite skilled at it. Her workings allow the rest of them to continue their conflict against both the [akuma|E] in the north and trading at large. And given she is the only artisan they have, she is at least comfortable in the fact that she is far too precious to ever let be endangered. Numerous Half-Devils are always guarding her workshop, as well as Dhampyr employed by herself as additional security. And in turn, her allies get immaculate workings for their own use in their conflicts. Despite it all though, she worries about the paths they are treading. They're a cartel, yes, and while fighting the [akuma|E], she has been doing some studying. At what point do they go too far? At what point will they become worse that the recordings she sees of a young Devil King named [Glossary('Mikaboshi','podgloss.mikaboshi')]?"
 POD_persistentpodlore.desc.EA0042: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce, Bo-jeon thought that a life of scholarship would do him good. At least, before he ended up in Hell that is. Despite having spent nearly 7 decades trying to lead as good a life as he could, pushing against the overwhelming pressures of others against him to weaken his position, he struggled against it while trying to stay moral. And yet, smallpox still damned him to the Feverish Hell. Bo-jeon, furious at this cosmic injustice, flensed off the diseased skin of his poxes, letting the Hell regrow it and made himself a stairway out of the Hell made of diseased flesh.\n\nWhen he drew his second breath, the Sangun were accused of acts of terror, only for it to be revealed the demon bear terrorizing an area was Bo-jeon's rampage fresh out of Hell. Since being brought into the Night World, Bo-jeon has no mind for honor and virtue anymore. While he is as witty and wise as he was, he barely uses it. What would be the point? No, he instead enjoys being the muscle for the True Bone Society. When their debtors fail to meet their dues, he will rip the doors from their hinges and chase them to the ends of the earth to see their dues repaid. When someone criticizes his peers, he pays them a visit to 'discuss' things with them. And he's finally having fun. And damn does he love it now."
 POD_persistentpodlore.desc.EA0043: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAn enigma within the True Bone Society, Ja-hyo has never said a word to any of them. And yet, he is easily the most feared among their number to the rest of the Night World of Korea. Having come from the Hell of Upside Down Sinners, and by his own writings believed to not have any memory of the past, in his mentorship of Ja-Hyo, Ji-un at least is glad to see that he is remarkably loyal and obedient to the wider society. And yet, Ja-hyo has his... quirks. Besides being mute at least.\n\nAt times, if he is not guarding a place, people go missing where he goes. False doctors found with their jaws missing. Career thieves arms pressed into their shoulders until only their hands are sticking out. Legs spun in circles on a body 15 times on those constantly on the run from the law. Those who practice sexual violence found gelded and skewered on a tree through their rectums. And Ja-hyo, back in his haven, covered in blood and contemplating his path. It is for this reason that Ja-hyo is considered very highly as a mercenary terrorist. If someone needs to be terrified into obliging their oaths, he is without a doubt the Ancestor to call to do so. And oftentimes, he will definitely send the message. And all without a single word of protest. Just a nod, and then someone gets mutilated.\n\nA picturesque Devil Tiger, if there ever was one."
 POD_persistentpodlore.desc.EA0044: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn a society where everyone can go from a normal person to an intensely durable, tree throwing, lightning speed demon monster with wild emotions, the ones who can coax others down or keep fights from happening is critically valuable for any long term civilization. To that end, Ui-min has been a critical member of the True Bone Society. The third son of a minor noble in life, Ui-min was charismatic, but struggled a lot with his exams. And as neither the heir or the spare, that was more or less his only chance at upward advancement. The stress of it all began to break Ui-min, and ultimately, between his parents beratement, his own failure, and the stress of the exams, Ui-min broke, and thrust himself into the Wicked City after a night with far too much alcohol for his body to handle. And there, he was forced to retest the same exams that killed him every day, until he finally tore free of his restraints and ran through every wall keeping him from the living world.\n\nHe was found by the Azure Dragon Court and educated in the [Glossary('Dharma','podgloss.dharma')], and by and large, he's exhausted. He is fully on board with using money to weaken the [Glossary('Yama Kings','podgloss.yamaking')], but above it all, he just wants a place. He wants to be around others, to be valued, and to be wanted. At the very least, he puts the other True Bone members at ease, so he makes an excellent peacekeeper. And that is, finally, a role he is happy with."
 POD_persistentpodlore.desc.EA0045: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the lesser known fields of warfare comes in altered substances, where the [akuma|E] often lace stimulants and depressants with tainted essence to open up their users to infection and possession, to bind their souls to service with them being none the wiser. And as people fall through the cracks, the True Bone Society has decided not to rely on mortal institutions to mitigate their use, and rather use it to earn more funds for their mission and also control what they're addicted to. And Ja-gyeom has refined that to an art.\n\nIn his mortal life a brewer, he was a skilled alcohol maker. But when he died and was greeted with the Hell of Being Skinned Alive, he didn't understand, but he didn't need too. He liked not being skinned alive, so he buried himself as best he can, and dug his way out.\n\nSince entering the Bone Society's orbit, he has defined himself with his old talents and further expanded. A brilliant brewer, but also really skilled at making other drugs, he has his subjects and agents move about, introducing 'better' products to be addicted too. While it is very lucrative, they are laced with essence to purify them of the taint of the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')]. As such, despite the moral hang ups more senior ancestors would have, they cannot deny that Ja-gyeom is an effective warrior in the battles he fights."
 POD_persistentpodlore.desc.EA0046: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest member of the True Bones and the only one to diverge from being an adherent to the methods of the Crimson Tiger Mercantile Cartel, Yu-hwa more than makes up for it with performance and zeal. Originally just a young woman who enjoyed being the center of attention in her village for her beauty, her life changed when a noble came to see this lady who his servants spoke of as a vision of beauty, and was immediately smitten with her and offered to take her as a mistress. Yu-hwa wasn't keen on losing her local celebrity status, but knew refusing a lord wasn't a real option. So she agreed, and much to the chagrin of his wife, he spent as much time as he could with her. And it was for that reason the wife, refusing to be replaced, drugged Yu-hwa, bound her ankles and wrists to a chain, and threw her into the sea.\n\nYu-hwa no longer remembers how long she spent in the Hell of Boiling Seas tied to a rock at the bottom, but a greedy devil looking to take a bite cut her bounds enough she could escape.\n\nSince that whole experience, and part of her education being done with Seok Kwan Sook, Yu-hwa has taken to rather interesting means of enlightenment. The Brilliant Coal adores luring the foolishly lustful to their doom, before assuming her Devil-Form mid coitus into that of a colossal fox demon. While loyal to Ji-so and the other True Bones, she constantly skirts the line for too far, and every night she tests her limits as she seeks carnal bliss and a visceral finale constantly. Every claim that 'she is just enjoying unlife' becomes more and more hollow as more and more murders appear in her wake.\n\nFuture Fate:\n\nThe chaos of the Year of Black Kites and its aftermath made the True Bones stop caring about Yu-hwa's predilections, and instead put her to use as an assassin seductress. So prolific was her hunts that younger [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] assumed she was the inspiration for the kumiho. But by that point, she really doesn't care much. She has her paths, she has gone far in her enlightenment, and her unlife is her own to enjoy. And she wouldn't have it any other way."
 POD_persistentpodlore.desc.EA0047: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nNo stranger to the liminal, there has not been a day either in her living or unliving in Shigeno's life that she hasn't been pushed onto roads she hasn't wanted to walk. But now? She dares to walk her own path. Born at the turn of the Nara to the Heian period, the 7th daughter of the Emperor Kanmu and Court Lady Fujiwara no Kamiko. But Shigeno was a single child among Kanmu's 36 children, and she was of little importance in the grand scale of history. And on a bone deep level, Shigeno resented that. But she was pressed into the position of a wife to a minor lord to consolidate the balance of power. Until she died at the age of 48 with no children, she was bitter, unfulfilled, and died feeling her life was wasted.\n\nAnd things got unfathomably worse when she found herself in the Night Realm. Immediately, she was hounded by the Shikohime, as Emma-O was more than eager to twist and violate a princess into one of his assassin consorts. They even chased Shigeno back into the living world, and only with the intervention of the Ancestor Yūki. For a time, Shigeno was grateful for the protection, until she saw what her 'savior' was trying to summon. Shigeno was horrified by what she saw, and became the first member of the Uji to decry the Kin of Izanami, and formally broke from them. Due to Yūki's venerated status, this was a move that isolated her politically, but she didn't care. She finished her education under Riyan, and refused to deny her fascination with the living world with the foreign Dharmas that she saw as forced upon the Uji. The spirit world was real. The Beast Courts made that blatantly true. To deny that was madness. She defied orders and took students of her own, relying on the importance of her duties as a spirit tender to ensure her protection. She still threads a dangerous line now, daring to walk her own path now that she is no longer bound to the status she was born too.\n\nFuture Fate:\nDespite the constant back and forth the Sotogawa No would suffer as Cerulean Veils, Shigeno endured. With Riyan's departure from the Material World and the Veils drifting apart, Shigeno would become the nominal leader of the Animsit [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] in Japan. Even as she remains exiled from the Uji, her influence is undeniable. And she'll need it too. Somone has to stop Yūki. And Shigeno will not be found lacking."
 POD_persistentpodlore.desc.EA0048: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe Genji, while known as the xenophilic Uji, is more progressive in mindset in more than just their stance to foreign influence within the Uji Clans. Those mindsets extend further, in what is considered acceptable in both conduct and means of amassing power. Because of that, Ruri is one of the Genji's most ardent supporters... and useful agents.\n\nRuri was perhaps one of the more well liked Courtesans in her mortal life in Saga. The daughter of a line of them, the slow amassing of power among the women before her allowed Ruri to have a more comfortable role within their 'theatre'. Viewed as a woman for men of refinement, she learned quite a lot by proximity, and became incredibly adept at reading people. She had hoped she would be able seduce a man of wealth and rise in power, but one client had something different in mind, and Ruri's life ended choked to death, and her body dumped into the sea with rocks tied to her ankles to prevent a scandal. And things just got worse for her, as she was traded out of the Yellow Springs and into the Iron Brothel. She spent an unfathomable amount of time there, but that time there did give her some perspective, and she was able to manipulate a Devil to purchase her as a wife, and with a well placed dagger formed of her soul, she escaped back to the living world.\n\nSince her civilization, Ruri has however defined herself as a rising star among the Genji. One of the only Ujis to not make her a pariah for not abandoning her skills as a courtesan, she uses those learned skills to manipulate and control those in positions of power in the mortal world to help assist the Uji. But she builds to greater things. Ruri's perspective has merely grown larger. And despite the unassuming masks she wears for her clients and allies, she aspires to so much more.\n\nFuture Fate:\nRuri would adapt to clients and, for the sake of new avenues of power, new mediums. Pivoting from a Courtesan to an Adult Actress, she has found a way to reap large amounts of essence from her consumers, and fortifies it all for herself to make her all the more ready when she seeks out the Dragon Angel of Death..."
 POD_persistentpodlore.desc.EA0049: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile infamous for their stubbornness and general unbending attitude, the traditional values of the Taira Uji can manifest in more ways than just resisting any and all foreign influence and any social advancement. It can come in other ways too. And Tsugoko, who brought one of the most influential mortal Taira into the world, is an exemplar of the social values such things entail.\n\nA concubine to the mortal Taira no Takamochi, Tsuguko was the mother of his fifth son Taira no Yoshifumi. Dutiful and devoted, Tsugoku did all that was expected of a woman of her station. She lived a life as virtuous as she could, and when illness took, she was at the very least emotionally content with what she had accomplished, as her son set out to master the world. But she was condemned to the Hell of Burrowing Maggots, and to her dismay, the illness wracked her endlessly past any rhyme or reason. Only the passing of an Uji War Party saved her, and brought her back to their tutors for a proper civilizing. And with her mortal life, the Taira Uji claimed her immediately. But much to their surprise, as soon as she could, she left their center of power and immediately returned to her savior, Tashimoto Hanko. He had saved her, and she vowed to him he would have no more devoted servant. She has not erred on that vow since.\n\nFuture Fate:\nWhen the true depths of what lie in Hanko's past came unveiled, Tsuguko was the one who was the most taken aback. She disappeared seeking him out, and to this day, has not been seen in her quest to find the truth about the man who saved her from damnation."
 POD_persistentpodlore.desc.793166: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nIf you told Masao Iwase that he would lead a progressive faction during his life, he would have laughed at you. And yet, the master of the Genji can only reflect on how he got to this place.\n\nA stern and traditionalist man during his breathing days, Iwase was skilled enough to lead men into battle but not to triumph against worse odds. Dying by the sword with his head held high to the last moment, Iwase entered the Hell of Being Skinned Alive with a strong sense of injustice. Had he not done anything expected of him? For which crime was he made to atone? He soon learned that these concerns didn't matter, as the [UmbraGlossaryLocalized('yomi_wan','Thousands Hells')] were broken beyond repair and a parody of celestial punishment.\nThus, for the first time in his life, Iwase rebelled, using his martial knowledge to lead a band of like minded souls in a daring escape.\n\nReturning as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], he was fully expected to lead his grateful new followers in the politics of nightly Japan. He found none of the existing clans to his liking.\nWhile Iwase was still a stern military man that respected decorum, he now firmly believed that the system, whatever it was, wasn't working. Old traditions and ways of thought only lead to this broken Heaven and Hell, thus everything would have to be reconstructed from the bottom. How though? This, Iwase doesn't pretend to know, hence why his Genji followers are expected to be forward thinkers and provide new roads for the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] to walk and achieve enlightenment.\n\nIwase himself still doesn't have an innovative mind. While protecting his clan, he acts as the second foremost general of the Uji (behind Tashimoto Hanko) and cultivates a good relationship with Yasutami of the Bishamon. This lead some to believe that Iwase might be the tree hiding the forest for the Genji and if he was to step down or disappear the enmity between Bishamon and Genji could tear the Japanese [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] apart."
 POD_persistentpodlore.desc.795054: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nAntoku's past is something of a mystery to even the most learned of Japan [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]. His claim of descent from Japan’s ancient aristocratic families and his impeccable knowledge of courtly life from the Kofun period would put him as one of the oldest active beings in Japan, something that his critics snicker that it would explain his mindset.\n\nUnder his leadership, Taira is Japan’s foremost conservative Uji who regards the Bishamon as dangerous innovators. Throughout his long existence, Antoku steadfastly championed Imperial rule and kept his Uji in Kyoto, through all the centuries when the Emperor remained just a figurehead. The Taira resist every change, advocate for direct Imperial rule and an almost military adherence to traditions. This uncompromising stance has only served to sideline them politically, as they are unable to adapt to the changing times.\n\nTo his credit however, Antoku fosters a culture of openness when it comes to [Glossary('Dharma','podgloss.dharma')] acceptance and gender representation. He has little concerns for traditions in [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] society, regarding them as secondary to mortal Japan's institutions. This has made the Taira Uji a strange mix of diehard traditionalists rubbing shoulders with [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] that want to ignore the political field and focus on their Dharmic enlightenment, which they can easily do as long as they pay lip service to the Uji's line.\n\nFuture fate in Canon\n\nAntoku will enjoy his time in the spotlight during the Meiji restoration where his pro Imperial stance and imperial contacts will suddenly be courted by all the other Uji concerned with the rise of the Emperor's power.\nIt will be a short lived triumph however. Japan's frantic ride towards modernity will leave the Taira as a peculiar relic of older times with little political relevance."
 POD_persistentpodlore.desc.795307: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nElior is among the last of the Menahemites, faithful followers of Menahem ben Shlomo ben Dawid, murdered several generations ago. The qa'im of Shlomo ben Ruji swore to remove the yoke thrust upon his people by Muslims, Crusaders, and the spawn of Lilith behind them. He would free first Amadiya, then Baghdad, and finally the holy city of Jerusalem itself. However, he was struck down through the treachery of family for 10,000 gold coins, an act his followers believe to be spurred by those cursed creatures of the shadows, for no other could fund such an effort.\n\nWhile many scoff at those still loyal to what they see as a fallen Messiah ben Dawid, they claim to know the truth. Menahem studied under the Rosh Hakehillah, Chisdai the Head of the Captivity, the premier Rosh Yeshiva, Gaon Jacob, and a Magi, follower of the prophet Daniel. No one was more versed in all matters occult and magical, both Jewish and Arabic, than his teachers. He learned many things from these masters that aided him in his grand fight: the ability to hide himself from his enemy's sight, to cross bodies of water without want of a boat, to summon divine light to cast aside the darkness, ... and perhaps to escape death's claim.\n\nIt is said that if his vision were to be fulfilled, Menahem and his father shall return to truly free the Jews and burn out the infestation of Lilith's brood plaguing their holy land.\n\nBut remember, if Elior is to weather the approaching storm and achieve such a goal, he will need to draw upon the teachings passed on from Menahem. Many threats stand in his way, and little stands between the last of the Menahemites and death."
 POD_persistentpodlore.desc.795201: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce, did the Clutch of Bright Flame exist.\nOnce, a clutch of four were born.\nThe hatchlings learned to speak, to sing, to shout. One did not.\nOne did not speak for many years and the Clutch failed to find a remedy.\nOne avoided the others. One could never be found. One was nowhere to be seen. One was always right there.\nOne had learned to avoid the pitiful gazes. One had learned to step silently. One had learned its own path.\nThen came the First Change.\nThe former hatchling spoke, but his words were slow. He sang, but the melody was sour. He yelled, but the winds did not hear it. The Mokolé would stutter with his words.\nThe Clutch rejoiced, for he finally spoke. They trained the Mokolé in all things. How to fight, how to think, how to dream.\nHis Clutch valued strength, but he was not strong.\nHis Clutch valued wisdom, but he was not wise.\nHis Clutch valued honor, but he was a shadow.\n\nOnce, the Clutch was attacked.\nStrength did not save them.\nWisdom did not help them.\nHonor did not spare them.\nOne shadow remained.\n\nOne shadow still remains."
 POD_persistentpodlore.desc.795202: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nEver since he was a young hatchling Khabash was always fascinated with the stories about ancient Khem. The magic, mummies, werebeasts, even the foul vampires. His questions were many but the answers he received were few. What happened to our homeland? Why can't we go back? Where did Sobek the Crocodile God go? His teachers would tell him that he would discover all these when he grew up and could experience it through his own Mnesis. So Khabash waited eagerly, idolizing the heroes of these stories.\n\nWhen Khabash finally understood, his world came crashing down. His heroes had lost, Khem was lost. Now he yearns to return to a home he never knew. To avenge people he does not know. To slay Sobek so that his memory will no longer be tainted."
 POD_persistentpodlore.desc.795203: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn to a wealthy minister, Hao Zhi received a superb education in all manner of topics expected from his status. He spent his childhood attending classes and aiding his family in their endeavors. Life was simple and Hao Zhi was content, until he experienced the First Change.\n\nPerhaps owing to his calm nature, his experience was fairly restrained and went completely unnoticed by those around him. Hao Zhi however was restless as the memories of the Mokolé would start to flow through his mind. For years he spent his time honing his mind and trying to control his Mnesis. Eventually he found success and managed to journey through the rivers of time on his own terms. He would spend many nights dreaming of the past, of the legendary figures he was taught about. One figure interested him in particular, Zhuge Liang.\n\nHao Zhi always had an affinity for military tactics, often surprising his teachers with his intellect. Now armed with ancient strategies long lost, his abilities grew rapidly. Determined to strike out on his own, Hao Zhi had decided to attend one of the great examinations to become a military officer. It was there he rose in prominence and was quickly noticed by the other Zhong Lung. Within the safety and companionship of his own kind his knowledge grew even more. Many of his days are spent in deep sleep as he continues to explore the times of the Warring Kingdoms. Due to his constant slumber he became known as “the Sleeping Dragon”, most likely as a jest. The name however only gladdened Hao Zhi for he has become the one he idolized most."
 POD_persistentpodlore.desc.795204: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nLong Yanshao was born in a farming family on the Yellow River, long after the collapse of the Tang dynasty. After his awakening revealed him to be one of the Middle Dragons, his curiosity and whispers of Dragon Kings who had once ruled the great rivers compelled him to travel along the Silk Road. Only after traveling for months on end did he finally decide to settle.\n\nYanshao is a true sage: patient, deliberate in every word, and gentle to all. He aims to make others question everything around them, so they can find the truths themselves. His way of speech is often vague and full of metaphors, often leaving mortals and younger Middle Dragons frustrated until his meaning dawns on them days later.\n\nHis wanderlust remains within him still. Even settled, he often walks the caravan routes, seeking new people, new wisdom, and forgotten tales."
 POD_persistentpodlore.desc.795107: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nThe seemingly placid appearance of the one known as Nongkhai betrays a sharp mind that has thrived in the chaotic jungles of Southeast Asia for centuries. While a feared predator in his own right, the Zhong Guo recently understood the value of working with others. In 1190, a difficult encounter with a band of [akuma|E] was nearly his end until the timely arrival of the Golden Shroud [Glossary('Wu','podgloss.wu')] saved his skin.\n\nNongkhai is a being of honor and has since then honored his life debt to the strange queens of the Scarlet Phoenix... as long as they show proper respect. Now more interested in the wider world, Nongkhai is getting concerned. [akuma|E] are seemingly running rampant everywhere and his [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] "allies" are showing no signs of being able (or sometimes willing) to stop them.\n\nNongkhai is determined to not be taken by surprise another time. If he has to rally the other concerned supernaturals of the jungles himself to stop this tide of darkness then so be it. Mokolé were kings of all a long while ago afterall."
 POD_persistentpodlore.desc.795108: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nA solitary "Dragon of the North", Tong Long Hua has been a known quantity for the powerful Yellow Emperor Court for centuries. During his early days, he was even oftentimes seen attending court, offering invaluable insight inherited from the Mokolé's impressive memories. Some even claim he invited wise and respectful [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] to his retreat to discuss the passing of mortal dynasties. This hasn't happened in a long time however.\n\nTong Long Hua has grown more reclusive the last decades, something the Yellow Emperor Court thinks is due to old age catching up to him. Wiser minds however see it as a sign of the spiritual decline of the Court, the great dragon sage being unsatisfied with what he experienced in his last visits.\n\nThe truth is known only to Tong Long Hua himself and he is not sharing. It remains to be seen if the dragon scholar intends to act or sit out the apparently inevitable moral collapse of China's supernaturals."
 POD_persistentpodlore.desc.795109: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nA young (by their standards) Mokolé, Red-Sky-Waiting is torn between her natural stubbornness and the realities of the world sinking into her being.\nGifted in accessing the collective memory of her kind, she saw the glorious past age as a sign of things to come and to strive towards. Her first taste of reality was a bitter one, finding the supernaturals of India not very keen on her ideas and even her kin preferring a life of contemplation.\n\nWizened by the experience, Red-Sky-Waiting has spent the last decades towards more scholarly pursuits. Still, the fire of her youth isn't yet extinguished and it would only take a small opportunity for her to chase her ambitious dreams once again."
 POD_persistentpodlore.desc.795110: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nThe "Radiant Light", the "Queen of Many Colors", Wolaru is known by many names to her people, the Gumagan. Leader of the shapeshifters of Bandaiyan, the Fire Land, Wolaru lives outside of the concerns of other supernaturals. She protects the Mother, welcomes those that do the same (like the Dog-Faced Possum children, or "Bunyip") and slays those that don't. A simple but fulfilling existence.\n\nLife is a cycle however and all things must change. Wolaru knows this and has seen the signs of troubling times ahead. She worries that defending Bandaiyan might not be enough and the next wave of attackers might be too strong for her Clutch to handle.\nGoing to the edge of the land of her people in Papua, Wolaru now observes the outside world and ponders. A proactive stance, something so alien to her mindset, might be the only thing that can save her people's future.\n\nFuture fate in Canon\nWolaru will fight bravely to defend Australia against the coming supernaturals. The Bunyip genocide will remove her only allies and the endless numbers of vampires will however prove too much. After a last act of defiance that will burn many vampires and ghouls to ashes, Wolaru will fall into slumber, never witnessing her people's exile from the Fire Land."
 POD_persistentpodlore.desc.795112: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nWhile a very young Mokolé, Towers-Above-the Kings is very proud of who (and especially what) she is. While her chosen name has been considered a little too grandiose by many of the denizens of Komodo Island, she feels that her lineage of Middle Dragons means that she is destined for greatness. Many think that prolonged exposure to the collective memory of the Mokolé should quickly dispel Towers-Above-the Kings from her illusions of grandeur and she agrees... which is why she accesses it as little as she can.\nThis situation is tenuous, as limiting herself in that regard will certainly stunt her spiritual growth but the fear of losing who she is (and her high opinion of herself) is also a good deterrent. This has surprisingly led her to find new ways to better herself and prove her claims in a more mundane manner. As such, Towers-Above-the Kings is actually a skilled administrator (for the usually indolent Mokolé of her Clutch) and is keen on watching the evolving political situations of the surrounding islands for potential threats against her people.\n\nIf she continues in this manner, she might make an unusual but dependable leader for Komodo island in the future."
 POD_persistentpodlore.desc.795113: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nAs his chosen name indicates, Swims-in-Mbembe's-Wake is proud of his heritage. Still, living in the shadow of the mythical first Mokolé isn't the easiest path to follow.\n\nSwims-in-Mbembe's-Wake is one of the many children of Mokolé-Mbembe and was provided his education by the many kinfolk mates of his father. He rarely saw the man himself, as Mokolé-Mbembe doesn't operate in the same timeline as others, often sleeping for centuries. Swims-in-Mbembe's-Wake soon realized that he wasn't the smartest or the most skilled warrior of his siblings and despaired to find a way to be worthy of his name. It was only his encounter with other shapeshifters that changed his fate.\n\nRealizing he had an innate curiosity that other Mokolé lacked, Swims-in-Mbembe's-Wake soon thrived to learn more about the ones blessed by the Mother. This slowly made him the go-between for Mokolé-Mbembe's once isolationist Clutch and the outside world, a task he thrived in. After decades perfecting this talent, Swims-in-Mbembe's-Wake has now started his own Clutch and shown great promise at it, a testament to his unique skills.\n\nFuture fate in Canon\nCome the modern age, Swims-in-Mbembe's-Wake will have become the most well known and de facto leader of the African Mokolé. His participation as a leader of the Ahadi alliance will prove decisive in saving Africa from a terrible threat."
 POD_persistentpodlore.desc.795114: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nWhile most Mokolé are placid and contemplative creatures, Sand's-Last-King is a bold warrior through and through. Frankly, he had no choice but to be.\n\nAs his chosen name indicates, Sand's-Last-King leads his Black River Shore Clutch in the grim present where the Children of Set have triumphed over the [Glossary('Osirian League', 'glossary_osirian_league_tt')]. While he is too young to have participated, the collective memories of the Mokolé have shown him much, including Set himself abducting and performing foul magic on the Mokolé progenitor Sobek.\nThis experience and the reality of his homeland being overrun by his Setite foes has made Sand's-Last-King a somber general prone to fits of anger. This has sadly somewhat estranged him from the other remnants of the Osirian League which in turn makes Set's ultimate victory all the more possible. It remains to be seen if Sand's-Last-King's sheer determination and bravery will be enough to win this eternal war on his own.\n\nFuture fate in Canon\nSand's-Last-King will mellow with age, leading to him accepting to join the Ahadi alliance, a reborn Osirian League of sorts for him, in the modern times. His leadership capabilities will prove critical to the alliance's efforts but his ailing health will sadly cut short the prosperous future his Clutch could have seen."
 POD_persistentpodlore.desc.795115: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nThe youngest member of the Children of Sobek is one of the few to not be plagued by the memories of their fallen ancestor. While she has experienced them like the rest of her Clutch, Swali sees it as a warning of sorts, a way to make sure the errors of the past do not repeat themselves.\n\nThe Osirian League of old lacked cohesion and while many of its members were mighty, this flaw made them ultimately weaker than the much more united in purpose followers of Set. Thus, Swali waits, listens and explains more than many of her kin. Her bravery is however not in doubt, as she has already joined her elders on several hunts.\n\nIn many ways, she seems to be the embodiment of a balance between the usual placid and contemplative Mokolé and the more assertive and sometimes wrathful Children of Sobek. Some wonder if said balance will end up being a key to their future."
 POD_persistentpodlore.desc.795116: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nSand's-Last-King's heir is, to the outside at least, very much like his father. Haunted by the collective memories of the Osirian League's defeat at the hands of the followers of Set, Unseen-in-Shallow-Water is a bold and wrathful military man that will stop at very little to avenge the fallen lineage of Sobek. This in fact is the key difference between father and son.\n\nSand's-Last-King's view of the situation is somber and more fatalistic, while giving up isn't in his nature, he accepts that defeat is a likely outcome. Unseen-in-Shallow-Water doesn't. There is very little he won't do to ensure a victory for the Mokolé, including crossing some lines that would be unforgivable for his father and many others.\n\nIn the desperate situation he sees his Clutch though, there might be only room for desperate measures.\n\nFuture fate in Canon\nIn the modern times when his father's ailing health finally claims him, Unseen-in-Shallow-Water will ascend as leader of the Clutch. His first plan of action will be a most unpleasant one for anyone living in Egypt..."
 POD_persistentpodlore.desc.795213: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nLittle, named so for her diminutive size as the runt of her litter, was a rare white tiger. But her life was almost very short, as [akuma|E] had captured her parents. Her tiger father was skinned and thrown into the sea, and her Khan mother was butchered. As a game, the devil men set the kittens free, and Little could only despair as her siblings were hunted and slaughtered by devils. But the little tiger was smiled upon by the Emerald Mother, and she took the mighty Chatro and killed the Devils. Seeing what happened to her sisters, she vowed none of her children would suffer such fates, be they of her blood or not. Numerous Khans were adopted by her, and she took many mates. After losing her whole family, she wanted a massive one. And no matter how far they went, she would always welcome them home. The Khan who initially taught her how to be a Khan, Soft-Walker, would often relay to her word on those throughout the world. And he recommended her a woman who sought to protect women from the woes often set upon them. Little sought her out, and when the Khan Elder met the Bloodflower Piyau, they were fast friends, and not long after they shared 'special communions' in Piyau's Yang Pits and in Little's Den-Realm when they needed a break from their male mates.\n\nHowever, as Little contemplates her situation, things are looking worse. The Devils are getting active again, and this time, she has much to lose. She is strong, but she worries deeply for the safety of her children. Piyau is on a war path, and to involve herself would be potentially disastrous. But at the same time, wouldn't isolation just leave them unprepared for when they arrive? What is a mother to do in such a situation?\n\nFuture Fate:\nUltimately, remembering her dead siblings and fearing for what would happen if she died like her mother, Little joined Piyau's march, her own daughters fighting alongside the Flaying Monkeys. Little would grow old, and hold the rare honor of dying of old age, a Legend to the Malaysian Khans. And surrounded by her daughters, their children, and her extended family, she died weeping tears of joy."
 POD_persistentpodlore.desc.795214: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce, the Malayan and Indochinese Tigers were the dominant [Glossary('Фера', 'glossary_fera_tt')] of the wider region of South East Asia. But those glory days are gone. And they died with Noble-Fang, and there is no Khan in the region that doesn't mourn his loss.\n\nThe eldest of his line, Noble-Fang came from a long line of Khan leaders, with an immaculate bearing and impeccable physique. Clever, capable, kind, personable, and unflinching in the face of danger, he was an ideal king for a dangerous age. With the waning of their allies in the Scarlet Phoenix Court, Noble-Fang was in an incredibly dangerous position, but he faced it directly. Taking the powerful mate Little White-Fur, he aspired to build something to last for his children to inherit, like his ancestors before him. He knew his younger brother would carry on his line, and knowing how much Little desired a family, he affirmed his children would be White-Furs, and from their future coats, such was certain. And so with a legacy behind him and a destiny before him, he led the assembled Khan hosts to decimate the [akuma|E] forces in Malaysia. Accomplished and honored already at a young age, the Bon Bhat set out to make all right under the Emerald Mother.\n\nAnd he failed.\n\nRangda expected the Khans to strike, so she sent her Leyaks into action. A horrifying supernatural illness wracked his camp, afflicting them with an enemy they could not fight. As soon as they breathed in the miasma sent, pustules wracked their bodies, transforming into ravenous maggots that would devour them alive, before bursting into a similar infectious miasma. Knowing that were it to spread Rangda could damn whole continents, Noble-Fang called for several spirits to send some last messages to his wife and brother, before, along with his men, they quarantined themselves by going to the Umbral Realm of Erebus and throwing themselves into the molten silver. Dying heroes, but damning their dream in their own generation."
 POD_persistentpodlore.desc.795217: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTo the Beast Courts, the Mother of the Harimau is revered for her place among the Malaysian Khans. Returned Dead, Shapers of Reality, the myriad Children of the Emerald Mother, and other stranger things all pay her homage. When they look to her daughters, they expect to see heirs just as mighty and proud as she is. And when they look at her eldest Homid child, Ratna swiftly shatters that image.\n\nRatna was born sickly and frail. For 5 years, Ratna was often confined to her mother's Den-Realm for her safety, and even now, she rarely goes far. Unlike her mother, Ratna was small, unable to lift most weighty objects, and quickly winded. And when the First Change passed her over, Ratna was so ashamed of what they had become. Despite Little's constant affirmation that they still loved them, Ratna still felt horrifically useless. She envied the other Khans and Devil-Women, standing tall and proud in their femininity and strength, while at the time she was a pathetic shell of what her mother was. Some in Little's Sept whisper that Little had Ratna trained in the sorcerous ways to try and avert Ratna doing anything 'drastic'. And while Ratna did find a great joy in Alchemy (evidenced by how their former masculine presentation is all but forgotten due to the alterations of her medicines to her body, to such an extent one would never know that Little once had a son), she still longs for the chance to feel worthy of her mother. As she pours over Little's discourses, Ratna longs to join Piyau's crusade. Maybe there, with her Alchemy, she can be useful.\n\nFuture Fate:\nRatna's life, and then unlife, took several critical twists. When Little joined with Piyau formally, Ratna ran off to join Piyau's army, but she was ambushed by the [akuma|E] en route. But Little delved into the Hells for her daughter, and found Ratna calling out for her in the Hell of Wicked Magic. Ratna was rescued by her mother, and brought to Piyau for education. Ratna became a disciple of Wati, and with her new devil body, the weaknesses of life fell away, and she became a [Glossary('Penangallan','podgloss.penangallan')], an everlasting bond between the White-Furs and the Golden Courts. Into modernity, Ratna would become one of the Penangallan Queens, with a storied and honored service as a hero among their number."
 POD_persistentpodlore.desc.795218: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nTo the overwhelming majority of the people who go to see Little, they often seek out the rumors of her the majesty her cubs have attained. And seeing Somya, it is no question who will succeed her.\n\nThe second of her human children, Somya, from birth, was always a big girl. Weighing 4 kilograms at birth, Somya was muscled like a tiger and stood over her sisters quite easily. It was little surprise when, during a hunt, she took the shape of Chatro to fell an elephant. While not a true giant, she comes quite close. Inheriting her mother's strength, she has already accomplished a great deal, destroying an [akuma|E] den and leading a Den in her own right until the day she can take over the Sept.\n\nBut Somya is more than her strength. Somya has studied the works of the War of Shame and the initial conquests that formed the August Courts. At home in the jungles and an incredibly capable logistician, she is of the firm belief that the Khans' future is in war. She knows her family cannot last long alone, so she pushes hard to join forces with the currently reclusive [Glossary('Penangallan','podgloss.penangallan')] and form a great host to expunge Malaysia and Nusantara of the scourges that befoul it.\n\nFuture Fate:\nSomya's pleas would be answered. While Somya did not directly join Piyau's host, she did support her mother's forces in the war as they marched across the mainland, taking their mainland holdings. After Little's passing, Somya would take leadership of the Sept, and directly support the Golden Court's purge of the Jade Court. Furthermore, she would greatly expand Little's bloodline, siring kittens and babies with as much fervor as her mother."
 POD_persistentpodlore.desc.795219: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile it is known that Little has 3 human daughters, they often only see the shrinking and meek Ratna or the mighty and proud Somya. But then they can feel the third. Mahendradatta is always lurking not far after all.\n\nMahendradatta is an odd one out, alike to her older sister Ratna in being a black sheep in the family. While she did undergo the First Change while swimming and fighting a rip tide, that did little for Mahendradatta's aversion to being watched. She remained evasive, both in word and appearance. And yet, enemies of the sept often had a habit of being found later, horrifically torn apart and left on display as a warning. And even her lovers really don't see her beyond the bedroom. Only her family can really say what makes the tiger tick.\n\nBut Mahendradatta is a devoted killer, and one with no compunctions about it. Where Little asks her to go, she goes, and who Little asks her to kill, she kills. Her political agency is virtually nonexistent, and much to her mother's horror, has affirmed she would even kill her siblings if given the word. At the very least, she is steadfast in her devotion to her mother and her sept, as a good daughter should, in her mind.\n\nFuture Fate:\nMahendradatta would be one of the daughters Little sent to aid Piyau directly. A more subtle agent, she often was used as an assassin over a blunt weapon to throw at a line. And after her impressive service, Mahendradatta would join in the battle against Qiang Ru in the Jade Court. There, she would die gloriously felling the albino incestuous devil twins, returning to the Emerald Mother with the highest honors."
 POD_persistentpodlore.desc.795220: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe eldest child of Little's Feline children, Grim-Whiskers presents a gnarled, terrifying factor in her mother's Sept. As a kitten, when Little was still learning how to manage a Sept, an [akuma|E] looking for particularly spiritually rich dinners found a young tiger, and made a game to see how much they could cut open its face before it bled out, feasting on the essence. But much to their horror, the trauma of the disfiguring caused the tiger to rise, adjust and take the Crinos, and bisect them so fast the Akuma hadn't realized they were descending into final death by the time their body was sailing into the Indian Ocean. And when Little came to the cries, they found a child crying as she held at her still mutilated face from the magical wounds.\n\nGrim-Whiskers has never really moved on from the incident. A shadow hangs over her, and she largely avoids her mother's court when she can. Angry and furious at the Akuma for what they did to her, she takes a special joy in killing them. Tormented even further by the fire within her for love of both the heart and the flesh, so marred she is that she struggles with very few women finding her tolerable. Angry, bitter, depressed, and frustrated, she is a raging wrecking ball of a warrior, venting it all on those she kills when sent to war. Given her focus on battle, all other pursuits have fallen by the wayside. If she has been passed over for succession by Somya, and stuck with the hand she has been dealt, let it be the last thing those demons see.\n\nFuture Fate:\nGrim-Whiskers would join Mahendradatta when sent to join Piyau, and found purpose in her armies. But even more staggering, she actually found someone that found not just her battle scars, but all of her immaculate. Grim-Whiskers and the Dhampyr Nidhi became inseparable, and while Nidhi would take a number of consorts in the [Glossary('Penangallan','podgloss.penangallan')] tradition, the berserkers always found their hearts coming back to each other. And Grim-Whiskers would die peacefully of old age as a Khan elder, smiling in her Dhampyr's arms."
 POD_persistentpodlore.desc.795221: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe second of Little's feline Kittens, Noble-Mane was among the most omni-disciplinarian. A skilled and nearly peerless Twilight, Noble-Mane from her First Change strove to master all she could. The Laws of the Emerald Mother were her favorite studies, and she became a central expert of their sept in their interpretation. Tutoring under foreign elders and studying all she could, she returned and was a given as the spiritual leader of their sept, despite her young age. And while the eccentric structures of man elude her, she does understand magic. She studies endlessly on the occult, looking for every possible edge against the Infernalists that despoil their homes. And when she casts judgement, she prefers to deliver it herself, in tooth and claw.\n\nNow, Noble-Mane sees to the auguries and portents of her gifts, doing her best to advise her mother. She sees dreaded omens cast in the blood of snakes and in fire, but then in steel and lightning. What this means she still does not know, but she knows that the Khans must act. She urges her mother to act, insistent that they need to not let the time of metal and lightning come to pass, as all omens after such an event end. And now, as Little ponders Noble-Mane's advice, Noble-Mane has already been conducting her own forces to begin amassing.\n\nFuture Fate:\nNoble-Mane was proud of Little's decision to join with Piyau, and oversaw their Sept while Somya waged war and Little met with Piyau. While she resented the nagging of her youngest sister Proud-Eyes, she dealt with it as she sought her own answers to prophecy. She ultimately never found out what had happened, and died true to the Emerald Mother, dying after expunging a den of Kumo."
 POD_persistentpodlore.desc.795222: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest of Little's children, and undoubtedly the most entitled, Proud-Eyes at times acts as though she has no regards for the workings of her mother, and rather benefiting from it. The cub in her litter with the most immaculate coat, her first time taking the Homid form radiated a beauty that shamed her sisters, and she adored the attention. A social butterfly to her core, she also loved the fineries and luxuries of her station. Already dallying with the prettiest men in court and rolling in wealth, she adores basking in all the benefits of being a true-blooded child of the Emerald Mother. Seeing combat as more of a secondary obligation, as she is often lounging in her position, dressed in gold and fine clothes in a lavish Den-Realm decked out in wonderful and exotic delicacies. When she does go fight, she tends to pick [akuma|E] who are wealthy, so she might ransack their havens and take the wealth for herself and find new ways to adorn herself. And despite such vanity, she is still a Khan, and a giant man-tiger dressed in gold has its own presence.\n\nProud-Eyes however is frustrated at this talk of war. She would much rather enjoy the finer points of life, and feels she is being ignored. Even the small Den given to her in the hopes it would teach her responsibility has shown to be another way for her to fund her delights, and her protests are getting louder. Perhaps her mother may break, as she does genuinely love her little princess. Or Proud-Eyes might finally have to step up and be responsible.\n\nFuture Fate:\nLittle formally joining Piyau got quite the tantrum out of Proud-Eyes, but it did at least force her to confront reality. As really the most sociable of the White-Fur family, she was the main one tasked with dealing with delegates from the Beast Courts and Golden Courts. And credit where it is due, she did decently well. And while the myriad fathers of her children did little for more 'respectable' lineages, she still ended up bringing many more Khans that would spread throughout Malaysia and Nusantara."
 POD_persistentpodlore.desc.793530: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMany expect the disciples of the Return to Power philosophy to be ambitious individuals driven by their greed or arrogance. Hanzhang shows that generalizations are rarely wise.\n\nA minor official during his mortal days, Hanzhang had enough resources to feed his big family and was happy with his lot. He wasn't blind to the suffering of others however but lamented that he could do very little to improve the situation. He died with a loving family around him and a local community that mourned his passing but this earthly concern still clawed at his soul. The [UmbraGlossaryLocalized('yomi_wan','Thousand Hells ')] were his only reward for this benevolent but fraught with doubt life.\n\nHanzhang proved to be a more resilient soul than many (including himself) would have anticipated. While he pleaded, beg and did things he wasn't proud of, he never truly broke and found his own escape back to the world. The society of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] didn't appeal to him as he found it to be a twisted delusion meant to keep them from tackling the real problems. Drifting away from enlightenment with each passing night, it was only when finding Kang Cho-lu that Hanzhang found a new purpose.\n\nContrary to his mentor, Hanzhang doesn't see the Return to Power philosophy as a way to make amends to the [Glossary('August Personage of Jade','podgloss.augustpersonageofjade')] (he doesn't truly believe in the founding myths of his kind anyway), but as a more pragmatic means to improve mortals' lot. While he knows that [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] certainly aren't perfect, their drive towards a very tangible enlightenment still potentially forces them to abide to a moral code, which is more that he can say for most mortals.\nIt is thus Hanzhang's hope that his mentor's philosophy will create a new [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]'s society dedicated to lead and protect mortals. He hopes that ones of Kang Cho-lu's disciples (or the master himself) soon reaches the [Glossary('Hundred Clouds','podgloss.hundredclouds')], potentially creating a ripple effect of new converts eager to lead mankind to a prosperous future, even if it's done in their own self interests."
 POD_persistentpodlore.desc.793531: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nJilan barely had time to experience her mortal life before she was swept away by a plague and thrown into the [UmbraGlossaryLocalized('yomi_wan','Thousand Hells')]. She had to learn quickly and efficiently how to survive, both physically and mentally, after the initial horror of her situation was past. As far as she could tell, she ended up spending decades coming to terms with her situation. Truth be told, her escape was more a stroke of luck than skill. Her arrival in the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] society was another shock.\n\nSo far, Jilan only knew of her carefree days as a young mortal or the harrowing experience of the Hells. The stifling, extremely structured and demanding nature of the Courts wasn't something she was prepared for. Jumping from master to master while making little progress, Jilan was soon declared a lost cause.\n\nHer story would have likely ended here in a [Glossary('Dharmic','podgloss.dharma')] collapse if she hasn't been found by Kang Cho-lu and his disciples. They didn't ask much of her and their close ties to mortal society allowed her to experience much of what she missed during her life cut short.\nWhile she has yet to make true progress on her Enlightenment, she has at least stabilized. Kang Cho-lu and his followers are content to have her pretend to be a mortal in each new town they visit, which has proved to be very useful to gather information from the more downtrodden parts of society.\n\nJilan's proudest memory so far is when Kang himself praised her as being more in touch with humanity than anyone else in their group. Still, she knows that her nights of relatively carefree experiments will have to end at some point. Every time she dons the mask of a new mortal girl, a feeling of emptiness grows within her. She knows that she is just mimicking something she has lost forever and she fears the night when she will feel more sorrow than joy when interacting with mortals."
 POD_persistentpodlore.desc.793532: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAnarya is a figure shrouded in myth. According to her students, the other Outriders who follow the steppe empires, she was a Scythian Enaree capable of awakened magick, but outcast for her dealings with devils.\nShe wandered the Umbra, but something in the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] comforted her. And so long she stayed, her physical body bled away, and she became just as much a part of the then infant hell as though she had died there as a sinner. When she left back to the Living World, she did so as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')].\n\nThe then young [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] confronted her, as she was a child of the steppe beyond his reach, a concept he loathed. But she was experienced in dealing with such forces, so she proposed to be his hands beyond, and she would train similar hunters. He found this acceptable, and sent the priestess abroad.\nAnd while [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] never trusted the priestess, she would collect a great many precious toys and trophies from the various steppe empires that rode across the world. But such is not why she is feared. She is dreaded for the reputation of unfathomable cruelty, cold glee, and wicked satisfaction in breaking her victims in her own alcove of the Cave of Spiked Chains. Rendering peasants, chieftains, and champions alike into monsters with their minds emptied into that of mere beasts.\n\nThe other Outriders have tried to emulate her practices, but there are few as great as the original. And while [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] doesn't trust her in the slightest, she is effective at the least, and thus tolerated. And besides, her footsteps alone can cow any escapees into terrified submission, and many proud [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] of the Black Tortoise Court dread her whisper.\n\nFuture Fate\n\n Despite [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] meeting his demise, the First Outrider managed to preserve her own Cave of Spiked Chains as an independent hell realm while her former patron's rivals tore the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] apart. She went to ground, but emerged again creating new Akuma to harass the Ancestors of the Steppe.\n\nAnd come modern nights, they whisper of her ambitions to become a [Glossary('Yama King','podgloss.yamaking')], seeking the nuclear weapons in the Siberian Wilderness, to usher an age of nuclear fire that scours all but the steppe and chokes the sun in nuclear winter, so she may rise as the [Glossary('Demon Emperor','podgloss.demonemperor')] of the Last Empire of the Steppe."
 POD_persistentpodlore.desc.793533: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe first Outrider after the Enaree to earn Dobrul's favor, Roxolaia is a title, a moniker to her origins among the Sarmatian Roxolani Tribe, the only piece of her past her [Glossary('Yama King','podgloss.yamaking')] permitted her to keep.\nOne of the many peoples beyond the reach of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] but very much within his desired influence, he tasked his Outrider to collect one of them. Then just the third daughter of a warrior, her life changed when a bale eyed figure in the night massacred her family, pulled her into the depths of hell, and tore her asunder with Iron Chains. Her mind was also split apart, as it was regrafted into that of another collector.\n\nGiven a new monikor, the last piece of her memory she was permitted to keep, she began her service reforged into a titan of fiendish might.\n\nEasily the most prolific of the Outriders of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], many of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] within the Black Tortoise Court born beyond the Indus were brought to their demise and killed by Roxolaia. Simple, effective, relentless, and brutal, when her [Glossary('Yama King','podgloss.yamaking')] makes a request, she fulfills it.\nShe however has little patience for holding them, and thus all of her captures are prone to the same escape rates as the rest of the Hells she brings them too. But luckily for her, she is often distant from her victims, making reprisals unlikely. So she hunts, seeking all the more lost children of the steppe to bring back to their 'proper' home.\n\nFuture Fate\n\nLike the other Outriders, Roxolaia was not present at the destruction of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]. Following her mentor's orders, she hid in the regions beyond the reach of the Quincunx.\nWhen it began to weaken with age, her captures, under a new jailor, became new recurring Akuma threats to the new Ancestors of the Steppe."
 POD_persistentpodlore.desc.793534: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile most Outriders are those born beyond the reaches of the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')], some talents make an exception. And once a Xiongnu born at the state of Yuwen's demise, the Outrider who took its name has more than proved he has a ferocity to match the fires that burned his home away.\n\nWhile they went to Lanka as a sinner, Yuwen was captured by the Devils of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] and brought to the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')], and saw something in him that he suspected would make a good Outrider.\nThe sinner was lacerated to ribbons and reformed by the [Glossary('Yama King','podgloss.yamaking')], and then put him under the Enaree for training. He became an ideal Outrider to delve into the lands of Russia, a specialist in slaying the summoned horrors of the native Undead Lords.\nThis was handy training, as he was also just as effective at ripping apart Devil Tigers and their Bakemono. The last thing many would see before he dragged them into Hell was the Outrider soaked in blood and wearing skinned demons, heaving and howling through blood as he dragged them to their doom.\n\nFuture Fate\n\nLike the other Outriders, Yuwen evaded the destruction of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] by virtue of being away from the regions active.\nHe however continued his silent rampage in Russia, until Baba Yaga's forces drove him back to Enaree's attention. And then, he returned to his former service under a new leader as if nothing had happened."
 POD_persistentpodlore.desc.793535: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe overwhelming majority of sedentary sinners who found their way into the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] are the ones the most easily broken, but there are always exceptions. Even rarer still are those who embrace the lifestyle, and come to serve the master of the Hell. And while the sinner that forfeited his soul to be an Outrider is long since forgotten, the Lord is now perhaps the most driven Outrider.\n\nUnlike most other Outriders, Zhu remembers his mortality quite clearly. He was the son of a northern soldier and a working woman, who gravitated to military service because he was fascinated by horses. He even got up close and personal with them, when he was trampled to death with an arrow in his throat when the Rouran Khaganate was early on in its conquests.\nBut in the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')], his envy was obvious to his captors. Even when rent apart, against all odds he seemed to maintain his iron gaze, unbound cruelty delighting in seeing the evisceration of the other sinners. At the First Outrider's recommendation, he was released, and taken under her wing.\n\nHe proved incredibly skilled at navigating courts, an unrealized talent that blossomed into a great skill, making him staggeringly effective at being a lure to others' damnation, as he was rarely alone among the Outriders. Unlike the others, he however would, on occasion, deliberately free sinners from the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')]. Only for many he freed to one day find their ways back, ready to be broken again and remade into Akuma.\n\nFuture Fate\n\nZhu was with his mentor when [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] was slain, and thus followed her into a brief exile while the [Glossary('Anda','podgloss.anda')] and other Akuma of the fallen [Glossary('Yama King','podgloss.yamaking')] were slain.\nUnlike the other Outriders though, he stayed in the small Hell Realm preserved by his mentor. There he would tend to it anew, eagerly awaiting the day he could be the right hand and king of the Final Empire."
 POD_persistentpodlore.desc.793536: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOld among the Ancestors of the Steppe, famously feuding with Badmaraag and Achibaatar since its early days, there is no deeper and more ardent champion of the purity of the Black Tortoise Court than the master of the Riders of the Ashen Plain.\n\nHis mortal life having long since faded from memory, Tugmandakh knew he was always a son of the steppe. It instilled in him such a pride that the presence of those who died and went to other Hells beyond the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] irked him, he had no time and patience for them.\nIf they left the steppes for the cities, or went west, to Tugmandakh they may as well be scumwater from the bottom of a stagnant pond.\n\nHis first great achievement was the destruction of a beast like the [Glossary('Anda','podgloss.anda')] who came east, with similar powers of blood and drawn from the peoples known as Turks. He broke them and skinned them before they became ash, and dresses frequently in the wolves they venerate and the hides he sees as false and wayward bastards of his homeland.\n\nA Devil Tiger's Devil Tiger if there ever was one, his brutality to all those he sees as lesser is infamous. As such, he has made it clear that the Court's response to the [Glossary('Anda','podgloss.anda')] should be to ride and slay the so called Judge himself in single combat. He even boasts he'll do it himself, calling for war now and immediately.\n\nFuture Fate\n\nTo the shock of many Ancestors of the Black Tortoise Court and no one else, Tugmandakh's brazen charge against Chinkai was met with a ruthless efficiency and the same brutality he always espoused.\nHe was beaten senseless, skewered at the top of a lone tree, and the Judge rendered his judgement upon Tugmandakh with the dawn."
 POD_persistentpodlore.desc.793537: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nMuch to the chagrin of the Black Tortoise Court's younger members, the biggest champion of the old ways still remains in a position of deep cultural respect. A purist in his bones, who refuses to speak to people if they do not embody his standards, dealing with him is the most famous Black Tortoise test of patience.\n\nAchitbaatar nonetheless earned his position in the Court. One of its oldest members, founder and leader of the honored and ancient Sons of Tengri, Achitbaatar was at the forefront of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] riders in their glorious charges against the Beast Courts, [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], and many other threats. He codified most of their laws, and never once erred in their doing.\nHe is absolutely and perfectly sincere in all of them, which made his slide into absolute adherence to tradition and purity all the more infuriating for the younger members of the Court. Traditional to such an extent even the Yellow Emperor Court would fail to meet his standards. All decorum upheld, every [Glossary('Wu','podgloss.wu')] balanced to speak to him, and even then only men allowed to stand near him, the Wise Centipede even once shot Badmaraag when she showed him a small piece of derision.\nAnd now, as a new threat wholly unlike one they have ever faced, Achitbaatar is insistent the [Glossary('Anda','podgloss.anda')] must be fought like the Beast Courts, certain they are coming for the Dragon Nests, and adamant they will come through the Umbra to assault them.\n\nNow, he rallies those under him in preparation for their war, one he is absolutely certain he will win, and pays no mind and acts with no regard to the other Elder [Glossary('Wus','podgloss.wu')], only listening to Shoukeng, as he is the only one with wisdom equal to him.\n\nFuture Fate\n\nAchitbaatar refused to believe the [Glossary('Anda','podgloss.anda')] (ignorant to the fact that most Cainites cannot move through the Umbra), were coming in the physical world. And as such, he was completely unaware he was being ambushed while watching the center of a Dragon Nest, as flaming arrows from the Black Wind Vanguard killed him once more."
 POD_persistentpodlore.desc.793538: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nKumud lived as a fisherman and died as a fisherman, lost at sea. His only reward for a simple life was the Hell of the Seven Burning Seas.\n\nIt took a long time for the man to come to terms with this new existence but he managed to find a way back, mostly because the mistress of the realm had no qualms with him. Kumud always respected and rightly feared the sea and she knew it. And so, he came back to the world as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]... not that he knew anything about that at this point, as Liuqiu island had no Ancestor or Court capable of teaching him. And thus he roamed, being little more than a beast for years.\n\nIt is likely that Kumud would have been put down by an hunter or a group of mortals if not for the coming of Yao Wei. The young Chinese [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] was barely starting her spiritual journey herself but her sense of duty was too strong to just let Kumud continues his rampage.\nIt took her a long time, and frankly quite a bit of luck, but she managed to teach him enough to save him.\n\nSince then, Yao Wei has been serving as a sort of mentor to Kumud as she establishes her crew and her vast ambitions. Yao Wei respects the sea but doesn't fear it and Kumud is both frightened and awed by her determination.\n\nIn his darkest days, Kumud wonders if he should flee for the continent to receive a proper education. In his brightest ones, he wonders if he loves her.\n\nFuture fate\n\nKumud's infatuation for his mentor will dull with age but his respect will not. As Yao Wei will embark on her grand destiny, he will become a respected, if introverted, part of her crew. He will make it his duty to remind his captain that the sea should never be taken for granted, even for the "Ocean-Striding Bandit"."
 POD_persistentpodlore.desc.793539: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite the irony of their titles, Zevseg was always among the closest people to the Great Ancestor Tugmandakh through their early days as the Black Tortoise Court rose to prominence. Quiet yet always cunning, he had all the patience and guile of a persistence hunter.\nFew [akuma|E] could ever claim to survive his hunts, and fewer still could make such boasts and not fall in the coming years.\nOvercoming the weakness of his mortal constitution, a great many devils fell to his arrows. And as such, he became all the more desirable of a prize to slay.\n\nBut as the Court grew old, his skills dulled. Resting on the laurels of his position, he treasured the excess and privileges of his position, taking cushy positions hunting young and foolish [akuma|E] and leaving the elder infernalists of the [Glossary('Yama Kings','podgloss.yamaking')] to young [Glossary('Wus','podgloss.wu')], not feeling a single pang of remorse as they met grisly demise after grisly demise.\n\nEven now, he is all too eager to indulge the games of the court over dealing with the threat of the [Glossary('Anda','podgloss.anda')], which he cannot seriously consider to be a legitimate menace. Rather, he has pushed it onto the other [Glossary('Wus','podgloss.wu')], while he retreats to his excesses.\n\nFuture Fate\n\nZevseg would survive his blood brother's demise, but his ultimate fate is unknown. He disappeared before the [Glossary('Anda','podgloss.anda')] fell, the last things heard from his haven was the rattle of iron chains and whispers in a long dead language.\nHe was never seen again."
 POD_persistentpodlore.desc.793540: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the Black Court has always had its fair share of rumors for its decadence, it is often discredited. Afterall, if it was true, wouldn't it be the case that it would be overrun with Dhampyr? At least, that is the official reasoning. And Tamir makes sure that image isn't tarnished.\n\nAlways an unwanted child in his mortality, Tamir was a chieftain's eldest son, but his least favorite. Tamir's attitude and narcissism always rubbed his father the wrong way, and he was sent to hell when his father, his younger brother, his mother, and his three sisters all filled him with arrows when he punched his then baby brother out of anger for the child spilling milk on him, sending him to the Hell of Spiked Chains.\n\nHis time there was brief though, as the tribe he was assigned too was so swiftly fed up with him they threw him out.\nHe finally found a kindred spirit in Tugmandakh. And an even higher calling in dealing with unwanted Dhampyr. Already repulsed by the disgusting goblins called children and anything to do with their creation, he took a rather disconcerting pride in destroying unapproved Dhampyr, and between his feats with his [Glossary('Wu','podgloss.wu')], his age, and service in the time of legends, few can challenge him when he renders a devil-spawn into a meat slurry.\nEnlightenment is difficult, and protecting the world requires difficult choices. And as the [Glossary('Anda','podgloss.anda')] draw closer, more soldiers is no reason to pollute the world with more children. So he massacres would be warriors, all for the sake of enforcing the Black Tortoise Court's law.\n\nFuture Fate\n\nTamir's fate came as a surprise only to himself. When the [Glossary('Anda','podgloss.anda')] launched their full assault on the Black Tortoise Court and sought allies, Tamir threatened a Malayan [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] Ambassador's daughter, the woman would then swiftly tore him to shreds then and there the moment he touched a hair on her daughter's head."
 POD_persistentpodlore.desc.793541: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the few Ancestors of the Black Tortoise Court met with snickers behind his back, no courtier of the Courts of the Steppe can deny the chip on Madava's shoulder. One of the extremely unlucky souls to enter the Hell of Spiked Chains not by dying in the Eastern Steppe, Madava was a Scythian, born one of the many sons of King Ateas of Scythia. But he had the deep misfortune to be prince when his father lost numerous wars against King Phillip II of Macedon, the father of Alexander the Great.\n\nHis father's losses against Phillip was horrible enough as it broke his kingdom, but the First Outrider targeted Madava, and took him across the expanse of land the son of his father's rival conquered, taunting and breaking him with jeers that maybe, maybe it could have been him. His last sight before his condemnation to the Hell of Spiked Chains was watching the Greeks march into the Indus Valley.\n\nMadava was a trophy of Dohkor-Khan for a time, but the early wars against the [Glossary('Yama King','podgloss.yamaking')] freed him. He was taken into the Riders of the Ashen Plain as a concession, and he genuinely found a place in it as a general.\nHe has accomplished great campaigns against the Beast Courts and [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]. But the haunting experiences of his drawn out death hang over him. He is slow to animate, haunted, and struggles to move at times.\n\nHis feelings of inferiority to an impossible comparison haunts him. The [Glossary('Anda','podgloss.anda')] rides, and he may have a chance to prove himself. Or at least so he prays.\n\nFuture Fate\n\nEarly on in the [Glossary('Anda','podgloss.anda')] campaign, Madava disappeared without warning. What became of his is unknown. But the night before he was to be set off to fight the [Glossary('Anda','podgloss.anda')], his attendants could swear they heard an ancient drum being beat."
 POD_persistentpodlore.desc.793542: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the opinion of the Courts on mortality has always been a loose one due to the family structures they emulate, even they typically don't want their Ancestors being too flagrant with letting mortals know too much.\nAmong all the Ancestors of the Black Tortoise Court, Tatahaui is the most lax with this, flagrantly taking mortal lovers across the steppe, and letting her own children go out and found tribes, so much so that her typical methods of courtship is now a frequent claim to a tribe's founding, regardless of her actual presence.\n\nHer mortal life was largely forgotten but she knows she was one of the Donghu before they were conquered by the Xiongnu. She wanted to be a mother, but the circumstances of mortality saw her perpetually barren, dying unfulfilled from a particularly lean winter.\nBut when she learned as a sinner that if she escaped, she might be able to have Dhampyr, the Devil jailing her stood no chance.\n\nShe was among the Black Tortoise Court's earliest members, and was the mother of their original Dhampyr. And since those days, she has done as she always has. Exult in the forming of a child, and relish their upbringing, before stepping away and watching their lineage flourish, and doing it all over again.\nShe has done this for centuries, and even as the [Glossary('Anda','podgloss.anda')] bear down on the Courts, she refuses to change.\n\nFuture Fate\n\nDespite the layers of Dhampyrs, they were not enough to stop the [Glossary('Anda','podgloss.anda')]. While fleeing, she was trapped in a river by an [Glossary('Anda','podgloss.anda')] sinking mostly into the earth, and was helpless as she rotted away beneath the sun, her swiftly decaying body mingling with what was once her central courtship ritual."
 POD_persistentpodlore.desc.793543: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite his many enemies, no one has managed to defeat the Sky's Champion. At his side from the beginning though, he has Batbold, the Second Son of Tengri, one of the most feared warriors in the Black Tortoise Court.\nOne of the many sinners in the Hell of Spiked Chains, Batbold was feared even as a dead man, as he could easily overcome even the favored Tribes of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], and could take blow after blow without uttering a word. Batbold was excellent at using his muteness to his advantage, being a terrible force of carnage. And when he eventually carved his way out of the Hells, he swiftly went back to his homeland, and found a fast friend in Achitbaatar.\n\nWhile Batbold never ceased to be a warrior, he was a surprisingly astute man, and became a deeply purist adherent of the Eight Lotus Path through spiritualism and meditation. But when not meditating, all the Court fears the silent muscle Achitbaatar can call upon. And now, Batbold's meditations are interrupted by the noisy [Glossary('Anda','podgloss.anda')], so he positions himself according to his friend's wishes.\n\nFuture Fate\n\nBatbold's trust in his friend was his demise, as their foolish demands to guard Dragon Nests led to the [Glossary('Anda','podgloss.anda')] catching Batbold isolated and vulnerable, and he met his end brutally before the [Glossary('Anda','podgloss.anda')] advance."
 POD_persistentpodlore.desc.793544: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOne of the most feared Ancestors of the Black Tortoise Court to the forces of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], Elbegsaikhan is an ancient warrior in the Sons of Tengri, and despite its more traditional reputation, an unorthodox one.\n\nAlways a handsome man, Elbegsaikhan had always used charm and looks to his advantage, charming his jailor to escape the Hell of Spiked Chains, and then luring [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s [akuma|E] to his doom, the Bone Flower swiftly earned a reputation for being a truly terrifying figure, who swiftly progressed in [Glossary('Dharma','podgloss.dharma')].\n\nIn this time of turmoil though, the Ancestor now stands on the thresholds of enlightenment, and his usual tactics don't work well against the [Glossary('Anda','podgloss.anda')] due to the lack of a Cainite libido in manners he is familiar with. And with his growing detachment with the world, he is finding less and less to concern himself with. The [Glossary('Hundred Clouds','podgloss.hundredclouds')] are so close, and with salvation within reach, the fate of the world is such a small thing.\n\nFuture Fate\n\nWhile his [Glossary('Wu','podgloss.wu')] rallied to the front, Elbegsaikhan withdrew to his own Dragon Nest, on paper to guard it, but in actuality, to focus on his [Glossary('Dharma','podgloss.dharma')].\nNumerous [akuma|E] disappeared, and when the [Glossary('Anda','podgloss.anda')] finally located his haven, all they found was the broken corpses of [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s followers, and an empty set of clothes."
 POD_persistentpodlore.desc.793545: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe sanctioned Dhampyrs of the Black Tortoise Court very rarely have their own separate lives from the Court. Many are trained, prepared, and groomed for war against the ever present [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]. And the brutal task master from the Sons of Tengri is the primary charge to oversee such armies.\n\nKhünbish's mortal life was like that of many men on the ancient steppe, being that of a shepherd, who lived an uneventful pastoral life before his demise and condemnation to the Hells.\nIt was then he learned his father's brutality as a hunter is why he was condemned, and he realized that children are the ones who pay for the sins of their parents. When he escaped, and seeing fellow devils, he knew then what he was meant to do.\n\nEvery Dhampyr he trains pays for their parents sins, waging war and dying in their name. He trained the great armies the Sons of Tengri led, and forged a mighty fighting force in those times of legends. But now, he is falling on old patterns, more abuse than training, especially as the Dhampyrs protests in being out of position, the war against the [Glossary('Anda','podgloss.anda')] looking dodgier by the night...\n\nFuture Fate\n\nDespite his preparations, Khünbish never saw the [Glossary('Anda','podgloss.anda')]. A particularly brutal training scenario led to his soldiers dog piling him, tearing his limbs off, starving him, tying him with a noose to a horse, and slapping it towards the dawn. He was never seen again."
 POD_persistentpodlore.desc.793546: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe youngest of the Sons of Tengri, Sansar is the one that nonetheless is very frequently considered to be the brains behind their order. A mortal who tended goats in life and later a sinner of the Hell of Spiked Chains, Sansar's escape on the belly of a devil animal during the first great assault on the Hell from the Black Tortoise Court and his evident skill as a pastoralist made him an easy finishing piece to complete the directions of the Sons of Tengri.\n\nDespite his temperament feeling out of place among his [Glossary('Wu','podgloss.wu')], Sansar was incredibly adept at caring for the herds of the Black Tortoise Court, and then later on, their main agricultural elder. Very quickly becoming a central figure of the Ten Seasons Sect, Sansar was far more well traveled and frequented the Yellow Emperor Court and White Tiger Court to train new students, before returning to his pastures. But such specializations make him out of touch with the current crisis.\nAs the [Glossary('Anda','podgloss.anda')] disrupt his projects, he grows more and more disoriented and unnerved at the damage to his works. He is seeing threats behind every corner, and the chaos of the age may break him.\n\nFuture Fate\n\nSansar would mentally shatter under the chaos of the [Glossary('Anda','podgloss.anda')], the death of his [Glossary('Wu','podgloss.wu')] and being abandoned by a friend, and he would eventually disappear howling into the night.\nLater on, the Quincunx aligned successor Courts would whisper of the 'Feral Ancestor', suspecting that Sansar fell from his [Glossary('Dharma','podgloss.dharma')] so hard he became a mindless Chi-Meh."
 POD_persistentpodlore.desc.793547: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAmong the younger [Glossary('Wus','podgloss.wu')] rising to prominence in the Black Tortoise Court, the leader of the Paper Dragons is by and far the most enigmatic of their number. Coming not from any of the major Hells, Khorkoi was found in the Goblin Forest, a hellscape of webs and trees.\nHer spiritual form so eviscerated, chewed, and masticated she came out more scar than devil. But the Kumo Hawk as she has come to be called is a leader in the making.\n\nKhorkoi has specialized in cleaning the Dragon Lines of the Kumo that infest them. While most of the Paper Dragons are scholars, their leader is unique in how she applies their knowledge. Marching into hell vested with prayers, relics, and treasures, she is a whirling stinging dervish of death, clearing the paths of transit deeper, to some unseen end.\n\nFrustrated by the Ancestor and Elder [Glossary('Wus','podgloss.wu')] of the Court, she has, alongside the Bloodriver Serpents and Excellent Forest Whispers, aligned herself with the Silver Blades and the old warlord. She clears Dragon Lines of Kumo to the Hell of Spiked Chains itself. To what end... only time will tell.\n\nFuture Fate\n\nThe scholarship of the Paper Dragons and wrath of Khorkoi cleared many Dragon Lines, that became critical launching points for the spear heads that let the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] dive deep into [Glossary('Anda','podgloss.anda')] lines and later [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s Realm.\nKhorkoi herself did not join the assault, as she instead covered the lines to ensure there were no ambushes. She was present at the Quincunx's founding, and would become the Ancestor of Hailar, overseeing the Dragon Lines between the Chinese and Steppe Courts."
 POD_persistentpodlore.desc.793548: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the term 'Youngster' always rankles him, the leader of the Excellent Forest Whispers can do little at the moment to stop such besmirches. He does the thing no one else wants. He is the main link the Black Tortoise Court has to some of their most ancient enemies.\n\nChono was a Siberakh Kinfolk in life, and a devout and good one. The only husband of a Siberakh Chieftain, he fathered many children, three of which were blessed with the First Change. His wife was kind and gentle, noble and heroic. He adored her, and while he mourned her death in battle, he tended to their family until he died of old age in his 78th winter.\n\nBut Hell has little love for the Emerald Mother's people, so the Hell of Bitter Truths awaited him. But even there, his devotion to the Emerald Mother was a guiding light, and he found his way back to his goddess.\nNow however, he is a devil, and treading on thin ground. He knows the Great Destroyer has graced him, but that will not define him. He took bold action, reconnecting with his children and grandchildren, and other shifters.\nThey see he was once kin, understands his plight, and are willing to hear him out. He has built his [Glossary('Wu','podgloss.wu')] of likeminded spirits, those that want to reconcile the [Glossary('August Personage of Jade','podgloss.augustpersonageofjade')]'s Fallen Champions and the Emerald Mother's Warriors. They will all need to work together to defeat the great threat of the [Glossary('Anda','podgloss.anda')], a scourge that is a threat to them all.\n\nFuture Fate\n\nThe [Glossary('Anda','podgloss.anda')], so practiced in slaying [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], were helpless to defeat Chono as Dragon Lines opened and the Forest Whisper's Fera allies came crashing into them like a hammer. Chono's Siberakh family was guided to the Hell of Spiked Chains, where they assisted in [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] demise as Chono held it open.\n\nWhen he saw to the new Steppe Courts' birth, he graciously accepted the role of Ancestor in colder reaches of Siberia, as the liaison between the Courts of the Dead and the Courts of the Beasts."
 POD_persistentpodlore.desc.793549: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nA dangerous game is being played under the nose of the [Glossary('Anda','podgloss.anda')] and Black Tortoise Court. One where a thin line is being tread by a bold new devil, determined to prove herself.\n\nKhongortsetseg is still less than a century old as one of the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')], but has already begun to make waves with her [Glossary('Wu','podgloss.wu')] of the Bloodriver Serpents. Having died of exposure in the Gobi Desert to then ending up in the Hell of Being Skinned Alive for her father's pride, Khongortsetseg has learned how to do a lot with very little. Found as a sinner in the razor sands having shaped herself into the visage of a Death Worm, she made a splash in Black Tortoise Court politics by setting up Scarlet Screens in [Glossary('Anda','podgloss.anda')] hunting grounds, and striking at [Glossary('Anda','podgloss.anda')] soldiers in the ground using her own Devil Shintai to burrow and find them at their most vulnerable. But when her unorthodox tactics were met with derision, she passed her intel to the Silver Blades, determined to not let her spy network go to waste.\n\nIf she is found out, it is either scandal to the Black Tortoise Court or destruction to the [Glossary('Anda','podgloss.anda')]. But she knows how to go to ground. And if [Glossary('Tou Mu','podgloss.toumu')] couldn't break her, they won't either.\n\nFuture Fate\n\nKhongortsetseg's line between lies, bravery, and meticulous planning paid off. When the Black Tortoise Court fell and the counter attack was planned, she presented herself as a target to numerous [Glossary('Anda','podgloss.anda')] battle groups and the feared Black Wind Vanguard, playing a lethal game of cat and mouse with them.\nShe was successful, and hunted them back into Siberia. When the Quincunx was formed, she proudly became the Ancestor of where her spies were along the Orkhon River, and later became the Ancestor of Darkhan in Modern Nights."
 POD_persistentpodlore.desc.793550: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nA scourge and outright loathed figure in the Yellow Emperor Court, Aisūltan is perhaps the most vindictive member of the Barren Winds, even more zealous than his Blood Brother Tarugha.\nBorn among the Kök-Türks and a soldier in their armies when they invaded China, Aisūltan never forgave the 'slight' that was his death to a Chinese arrow during the initial invasions. He never got over not being able to see the full power of the Eastern Göktürk's power, so he made it his mission in unlife to be sure that the societies of the dead never forgot how great they were. In every skirmish between the Black Tortoise Court and the Yellow Emperor Court, Aisūltan is always at its head, cutting the enlightenment of the placid and decadent Ancestors of China short.\n\nEven now, as the [Glossary('Anda','podgloss.anda')] come from the north, he looks south, punishing those too complacent even as the Courts burn.\n\nFuture Fate\n\nAisūltan's insistence on conflict would ensure he met his second death just as his first. In a clash along the borders of the Courts, Aisūltan met his fate at the rising star Ma Hai-Lan's blade, the first truly great victory in her career."
 POD_persistentpodlore.desc.793551: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn of the Kyrgyz, Ulugbek was a child of a time of great change. His father a minor general of the Kyrgyz Khaganate, Ulugbek joined their armies as a truly terrifying mortal rider, using his colossal size to inspire fear. But, such strength came with a cost, as he died of a heart attack from his size mid battle.\n\nIn the Hell of Spiked Chains, it came to his aid once more, as one of the chains that hoisted him broke from the weight of the titan. And taken into the Barren Winds, he easily became their fist. Made larger as a devil, only Bakemono horses could sustain his weight. And he became a truly horrible threat for any sorry [akuma|E] sent against him, and in the Barren Winds' conflict with the Yellow Emperor Court, any sorry soul sent to oppose him.\n\nBut now, he is worried. The Kyrgyz Khaganate's last remnants were absorbed by the Mongols, and now their [Glossary('Anda','podgloss.anda')] counterparts are marching. And despite his strength, he is worried he may come next.\n\nFuture Fate\n\nUlugbek was the only Barren Wind to survive the [Glossary('Anda','podgloss.anda')], as he swiftly realized the threat they posed from what happened to his mortal kinsmen. He quietly defected to the Warriors of the Hebei Plain and the Silver Blades, and fought in their assaults.\nHe was among the oldest present for the Steppe Courts at the formation of the Quincunx, and retired to a role as an Ancestor in the Steppe."
 POD_persistentpodlore.desc.793552: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nA relic of the Xiongnu Empire, and seemingly the least feared of the Barren Winds, numerous murders across the Yellow Emperor Court all have the gust of empty winds among them.\nA friendly face always leading to a dead ancestor. or so Ankang's detractors claim.\n\nAnkang is easily the most subtle member of the Ancestor [Glossary('Wus','podgloss.wu')], the clear and most realized spinner of intrigue in the Black Tortoise Court's orbit. Lying as easily as she breathes, paying little attention to matters of [Glossary('Dharma','podgloss.dharma')] past slaying the wicked, and finding monogamy to be a ridiculous concept, the sinner from the bleak wastes from the Hell of Being Skinned Alive seems to relish being everything and nothing at the same time.\n\nMany enemies of the Black Tortoise Court have been silenced by her networks, and as the [Glossary('Anda','podgloss.anda')] come towards them, she seems all the more focused on her detractors in the Yellow Emperor Court.\n\nFuture Fate\n\nWith the demise of Wang Hongben, a fair number of Ancestors of the Yellow Emperor Court suspected that Ankang was the culprit behind the murder.\nFor the first time ever, she denied the murder was her own, but having lied so much, no one believed her. Her panicked demise was rendered by the great judge Qiang Ru, imposing upon her a final death for the crime, even if it was still doubtful it was her who did it."
 POD_persistentpodlore.desc.793553: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBeing kicked from a [Glossary('Wu','podgloss.wu')] is a rare and shockingly humiliating thing. Very rarely does the ejected member ever forgive the slight, and worse still, some may hold a grudge.\n\nSaekae did more than hold a grudge.\n\nSaekae was once a Warrior of the Hebei Plain in its early days, until a feud with Mapo over his decorum led to her killing one of their Dhampyr, that led to her being ejected from the [Glossary('Wu','podgloss.wu')] with an equally messy divorce.\nHer feud with Mapo and then Maedaeri escalated further, as she then joined the Barren Winds [Glossary('Wu','podgloss.wu')], as their dedicated scourge against the Warriors of the Hebei Plain.\n\nWith the Warriors being a neutral buffer, the Yellow Emperor Court wouldn't bother her sustained raids, and the Black Tortoise Court wouldn't stop her. Because of her experience among those Courts, she is adept at exploiting them, but her hotheadedness does her little favors.\n\nEven now, with much greater issues, her feud against her ex is still hot as they fight while the [Glossary('Anda','podgloss.anda')] approach.\n\nFuture Fate\n\nSaekae's disappearance was shocking, as one ploy to get over Mapo had her take a new lover with no name. But she then disappeared, and was not seen again. At least, so it goes.\nMapo can swear that after [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s demise, one of the Outriders has a hellbeast that has eyes identical to Saekae. Even despite the bad blood, he hopes to the heavens it isn't her. But a part of him is terrified that the worst has already come to pass."
 POD_persistentpodlore.desc.793554: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nKnown to few but beloved by her [Glossary('Wu','podgloss.wu')], the Healing Flame is easily considered the most important member of their [Glossary('Wu','podgloss.wu')] internally. At least amongst each other.\n\nWhile the Storm of Fire scours the Gobi Desert for relics and resources, the presence of the [Glossary('Anda','podgloss.anda')] and the natural dangers of the desert make such expeditions a challenge even for an Ancestor [Glossary('Wu','podgloss.wu')]. As such, an alchemist that deals in potions of pure essence is incredibly valuable.\n\nMiray was always a wise woman, even when she was mortal on the steppe. Not born to any empires, she was just another Turk who lived and died on the open fields, and her life as a doctor earning the ire of Rangda and consigning her to the Hell of Burrowing Maggots. But knowing how to heal herself, she could push free and escape.\n\nHer understanding of medicine made her an easy choice for the Wise Centipedes, and so she turned her alchemy to those pursuits, and with friendships joined the Storm of Fire [Glossary('Wu','podgloss.wu')] because of how needed her arts was. Her potions were desired across the Black Tortoise Court, and with Xiang Li acting as a merchant, Miray is content to her solitude and medicine.\nSo much so she has barely paid any mind to the [Glossary('Anda','podgloss.anda')] storming across the desert they so often explore.\n\nFuture Fate\n\nMiray was always a centerpiece of her [Glossary('Wu','podgloss.wu')]. [Glossary('Anda','podgloss.anda')] assassins learned of this, and targeted her first to break them apart. And with her demise, the Black Tortoise Court lost its greatest doctor."
 POD_persistentpodlore.desc.793555: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAn expert in the Dragon Lines of the Gobi Desert, the vast expanses of the desert hold many hidden wellsprings of power. And moreso than even the Beast Courts, Chagur knows those sands better than anyone.\n\nA Kerait who once explored them before the Mongols' rise to power, Chagur may not have been a rider, but she knew such places well. But deserts are always dangerous even for the most seasoned travelers, and it claimed her.\n\nThe more structured nature of the Hell of Being Skinned Alive was remarkably more predictable, and Chagur's escape was far easier than from the Gobi Desert. And in her experiences as a [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] in the Storm of Fire, she has stepped up as a master of the Godbody of Fire, and using the Soul Arts of the Dead to better control the flow of essence across the desert. While she clashes constantly with the other Ancestors over 'her' domains, none can deny that she is a master at what she does.\nBut as the [Glossary('Anda','podgloss.anda')] have more and more presence in the Gobi Desert, conflict becomes inevitable.\n\nFuture Fate\n\nWith the demise of Miray, Chagur was then targeted by the [Glossary('Anda','podgloss.anda')] over a protracted hunt, exhausting her, and eventually chasing her until dawn, leaving her to the sun as the [Glossary('Anda','podgloss.anda')] sank back beneath the earth."
 POD_persistentpodlore.desc.793556: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAs the Gobi Desert falls under the influence of the [Glossary('Anda','podgloss.anda')], the [Glossary('Wu','podgloss.wu')] that has dedicated their unlives to exploring and collecting its many treasures much be ever vigilant, ever watchful. And as such, the Sand Scorpion's services are relevant now more than ever.\n\nOnce a hunter, before a death and condemnation to [Glossary('Kakuri','podgloss.kakuri')], Jagambu was guided back home to the steppe by the sensation of warmth from the Gobi Desert's rich Dragon Lines. His call to it made him fall into the orbit of the Storm of Fire readily, where he put his skills as a hunter and his new Devil Shintai as the boundary keeper of their operations, stalking its borders while the rest of his [Glossary('Wu','podgloss.wu')] does their own tasks across its sands.\n\nWhile he wouldn't admit to it (and in fact has gone to lengths to hide it), the [Glossary('Anda','podgloss.anda')] were too numerous for him to handle. His old boundaries are damaged, and the spiritual veins are changing.\nHe pursues them more doggedly, seeking out a means to remake his precious unlife's work.\n\nFuture Fate\n\nThe last of his [Glossary('Wu','podgloss.wu')] to fall, Jagambu was able to hide better than the rest of his [Glossary('Wu','podgloss.wu')]. But eventually, with his allies dead or scattered, he was alone, and thus easy prey for the Kindred masters of the Steppe."
 POD_persistentpodlore.desc.793557: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe specialist in actually searching a desert for relics, Taibuka perhaps is the most patient [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] in the whole of the August Courts. He would need to be for his job in searching the Gobi Desert for relics and artifacts, actively combing over the sands inch by inch in the dead of night, fighting off supernatural threats that bother him, before he goes back to his combing.\n\nWhile in his life he was just another pastoralist, a stay in the Hell of Upside Down Sinners gave him some perspective. Why rush things? He now has all the time in the world. And such a mindset made him an ideal ally for the Storm of Fire [Glossary('Wu','podgloss.wu')], and then a central member.\nHe may be slow to react to change, but he is meticulous to an impressive degree, and while he has a weakness for the delicacies of flesh, it doesn't distract him from his work.\n\nThe overwhelming majority of the Storm of Fire's relics were found by him, and even now, he is still finding things as he combs the deserts over and over while the [Glossary('Anda','podgloss.anda')] storm across them.\n\nFuture Fate\n\nTaibuka was greatly horrified by Miray's death, and fled as deep into the Gobi Desert as he could to wait out the [Glossary('Anda','podgloss.anda')]. He was presumed dead, until he was found 200 years after his disappearance again after [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s defeat.\nAnd into modernity, he still combs the Gobi Desert for treasures."
 POD_persistentpodlore.desc.793558: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nChief among the infamously violent Black Hoof Riders, the one many [akuma|E] meet is the dreaded Isiha. The judge, jury, and executioner of the Black Tortoise Court, the Bunraku has served devotedly in such a role since his death and emancipation from Lanka.\nAlways a soldier and dull beyond his work, his attention to detail and relentless pursuit, boldness, and blind conviction makes him an unreasoning monster to many of the threats facing him. But notably, with such fury, he is at times very easy to goad, making him infamous for being an easy tool for eliminating rivals.\n\nHe has gotten numerous censures from the Yellow Emperor Court, but he frankly doesn't truly care about what the soft ancestors of the center have to say about him. He is a killer. He knows this. And he is okay with it. And if someone has forgotten, he will remind them.\n\nAnd it seems the [Glossary('Anda','podgloss.anda')] need a good talking to.\n\nFuture Fate\n\nEarly on in the [Glossary('Anda','podgloss.anda')]'s trampling of the Black Tortoise Court, two Judges would meet.\n\nChinkai would not remember Isiha within a month after slaying him."
 POD_persistentpodlore.desc.793559: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the Black Hoof Riders have a reputation for being brutes, being strong alone can only get you so far. The forces of the [Glossary('Yama Kings','podgloss.yamaking')] are good at going to ground, hiding, actively veiling their presence, and digging in. Rooting them out not only requires one that is strong, but capable enough to outmaneuver them and break their strongholds open. And for the deathly fist of the Black Tortoise Court, Dumu is their guide, their strategist, general, and military guide.\n\nJust as headstrong and wrathful as his compatriots, his mind however is sharp in the fields of war. While lacking in theology, he is a sound tactician, and has even read up on the texts of Sun Li in regards to their continued skirmishes of Twilight Warfare.\nA specialist against the [akuma|E], he has a storied history of military successes against them. And unlike nearly everyone else in the Black Tortoise Court, he is excited that the [Glossary('Anda','podgloss.anda')] have become a relevant threat.\n\nFor so long he has desired a new challenge, and the [Glossary('Anda','podgloss.anda')] will surely provide.\n\nFuture Fate\n\nDumu did in fact get his wish in strategic equals, and in fact even got his betters. His normal tactics against [akuma|E] did not account for the Protean of the [Glossary('Anda','podgloss.anda')], and when he led a force against them, he destroyed the Black Hoof Rider's warhost in an ambush that killed him and most of his [Glossary('Wu','podgloss.wu')]."
 POD_persistentpodlore.desc.793560: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nDespite the reputation of the Black Tortoise Court, not many among them actively still practice horse archery as a primary means of battle. Simply, their Devil and Soul Arts, Shintai, and Godbodies make such mechanisms of war rather tricky, as horses cannot keep up. So, most battles between the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] are closer to duels than actual raids.\n\nMost of the time anyways.\n\nA master of the Devil Wind, Giahun has applied the arts of the steppe to the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] existence. Striking like a blur and disappearing, she is the premier master of such tactics in her Court. Like the other Black Hoof Riders, she is a warrior, clean and simple. She shows up, shoots her target dead, and runs back over the horizon before they realize what has happened.\n\nAt her husband Dumu's command, she is a terror in the field, unflinching before any danger and similar zeal, with all the pride one would imagine such a warrior would have. And like Dumu, she is excited to see what the [Glossary('Anda','podgloss.anda')] have to throw at her. She has never been more ready.\n\nFuture Fate\n\nGiahun, like Dumu, would fall into an [Glossary('Anda','podgloss.anda')] trap due to Dumu being unable to predict Protean. She died with her husband, scoured before the [Glossary('Anda','podgloss.anda')]'s fury."
 POD_persistentpodlore.desc.793561: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWith the [akuma|E] as inexhaustible as they are, the work of the Courts is never done. Between their own hands, that of their screens, and other means of Twilight War, the never ending battle always needs more swords and claws. And to that end, the Dhampyr are some of their greatest assets. And even in a Warriors' [Glossary('Wu','podgloss.wu')] like the Black Hoof Riders, while they do most of their fighting, the presence of a Dhampyr never hurts.\nIt's not like pregnancy has stopped Sogiaen before.\n\nA steppe woman who had met her death in childbirth, Sogiaen's flight from [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')] is not something she remembers clearly, but most of her past isn't really clear. But now, at least, Sogiaen has figured she should make up for what she lost in life.\n\nHaving produced over a hundred Dhampyr in her time as a warrior, cutting swathes while pregnant, and whispered to be the lover of every man in the Black Tortoise Court, she has nonetheless been the backbone of the Black Hooves' military campaigns. And now especially as the [Glossary('Anda','podgloss.anda')] begin to crack at their domains, her forces are needed especially.\nSo, she has gotten to work, setting the groundwork for more Dhampyr to come against the [Glossary('Anda','podgloss.anda')] assault.\n\nFuture Fate\n\nLike Dumu and Giahun, Sogiaen would meet her end during Dumu's doomed assault, dying on the field of battle after being picked off. The [Glossary('Anda','podgloss.anda')] knew she was the source of most of their Dhampyr, so she was the first of the Black Hooves to fall."
 POD_persistentpodlore.desc.791120: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nTarugha has the dubious honor of being the leader of the currently dominating [Glossary('Wu','podgloss.wu')] in the crumbling and decadent Black Tortoise Court. A great honor and responsibility, though the arrogant nomad mostly acknowledges the former.\nTamugha, and the Barren Wind, success mostly comes from its willingness to embrace change and the various nomadic people that swept across the steppes over the centuries. This willingness to adapt has pushed them to the forefront of the Black Tortoise's court politics as the other [Glossary('Wu','podgloss.wu')] now look to them as the most suited to navigate these troubled and conflicting times.\nA few however worry that giving more power to Tarugha will only lead to more trouble.\n\nSadly, they are right.\n\nWhile a competent judge of character and able politician, Tarugha is a poor strategist and lacks a vision outside of his own political machinations. Completely dismissing the [Glossary('Anda','podgloss.anda')] as a potential threat, he has kept his [Glossary('Wu','podgloss.wu')] firmly pointed towards the unending and petty skirmishes with the Yellow Emperor Court to the south, where he feels that more glory could be won. On internal matters, Tarugha lacks foresight as well. His continued conflict with the Black Hoof Riders [Glossary('Wu','podgloss.wu')] has only caused more mistrust and weakening of the Black Tortoise. With these repeated errors, it wouldn't take much for everything he has built so far to come crumbling down.\n\nFuture fate\n\n [Glossary('Anda','podgloss.anda')] spies will classify Tarugha as a low threat and even a potential useful destabilizing factor if left alive. They will be right.\nTarugha will refuse to redirect his [Glossary('Wu','podgloss.wu')] against them until way too late, resulting in him having to shamefully flee towards the Yellow Emperor Court for help when Daidu fell.\n\nAs the Yellow Emperor Court itself was in the process of disintegrating, his warning will be ignored and he will be executed for his past transgressions against the Chinese courts."
 POD_persistentpodlore.desc.791121: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nThe seemingly stern and strict Tan Banshi leads the Black Hoof Riders [Glossary('Wu','podgloss.wu')], considered by some as the second most powerful faction in the Black Tortoise Court. Many would think that the leader of such a traditionalist [Glossary('Wu','podgloss.wu')] would themselves be a strict hardliner but, truth be told, Tan Banshi grew to this role due to political concerns.\n\nSeeing early in his unlife that the innovative Barren Winds lacked an organized counterpart, Banshi lashed into this role as a way to quickly gather the respect of more politically detached, but traditionally conservative, older Ancestors. This ploy worked well, but maybe even a little too well.\n\nBanshi found himself surrounded by characters, even in his own [Glossary('Wu','podgloss.wu')], that straddled the line between "traditions" and "fanaticism". This lead to more and more younger [Glossary('Wu','podgloss.wu')] detaching themselves from the Black Tortoise and looking for other ways to prosper outside the stifling constraints and rules advocated by Banshi's cronies.\n\nThe man himself is no fool however, and he knows that this path can only lead to a weakening of the Court, especially as the conflict with the Barren Winds gets more and more heated. He is now weighting the potential to subtly shift his political stance to hopefully save the Black Tortoise Court. So far, he has concluded that it's not worth the cost of his political capital.\n\nFuture fate\n\nBanshi will be one of the victims of the infamous [Glossary('Anda','podgloss.anda')] assault on the Black Tortoise Court's leadership meeting in 1261.\n\nIronically, this was when he was finally planning to propose his plan for a change of course."
 POD_persistentpodlore.desc.791122: "Этот персонаж является частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')], но имеет очень ограниченную биографию. Поэтому разработчики PoD расширили её, для придания большей глубины сеттингу.\n\nThe dour Xiang Li is the informal leader of the Storm of Fire [Glossary('Wu','podgloss.wu')], though she herself dislikes being called by that title. This honorific came to her because she is the most visible member of her faction at court. While the others scour the Gobi desert for relics and artifacts, she handles the commerce between her people and the Black Tortoise Court.\n\nThis knowledge of a treacherous area and the possession of prized artifacts has given her much (unwanted) political credit, leading some to think that the Storm of Fire could be the stabilizing force the Black Tortoise Court needs to survive the coming storm. If this is the case, then those voices will be disappointed.\nXiang Li represents her people well, and her people have no time for political trouble.\n\nShe isn't blind to the coming storm however and has quietly started making contacts with other Courts to potentially relocate her [Glossary('Wu','podgloss.wu')] if the Black Tortoise was overrun or fractured on its own. Sadly, so far these contacts have led to little. Many outlying Courts have seemingly already fell to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s influence or are too weak to be a potential shelter.\nAnd so, on the outside, Xiang Li is still the stern merchant representing her [Glossary('Wu','podgloss.wu')] with her sharp tongue and keen eye. On the inside however, she is getting close to panicking as she sees the time for preparations getting shorter and shorter.\n\nFuture fate\n\nXiang Li will disappear when the [Glossary('Anda','podgloss.anda')] start their assault, leaving her [Glossary('Wu','podgloss.wu')] as an easy prey.\n\nThe truth won't be found until decades later, when the victorious Quincunx will purge an outlying Court still in [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s thrall and find a treasure trove of artifacts and relics drenched in blood."
 POD_persistentpodlore.desc.795401: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nAltın-Arığ was the jewel of a tribe of Yenisei Kyrgyz. She grew to be an Alyp-Kız, a warrior maiden. Her most striking trait was her golden colored eyes, a trait that her people saw as her being blessed by Umay Ana herself. As she grew into adulthood however, her peaceful life crumbled. It began with a famine, killing all crops and farm animals. Then, the wolves and snow leopards went mad, tearing through their yurts for seemingly no reason.\n\nAltın-Arığ refused to sit and just watch her people die. She rode towards a forbidden mountain path far away from their home. It was here she began her search for the rumored Bengi su, water of immortality.\n\nNear the summit, inside a cavern full of rich metals, she found a ravaged man with one eye, his body mending and changing shape constantly.\n\nOn the ground, pooled all around him, was thick blood. Altın-Arığ believed it to be the Bengi su and desperate to save her people, she drank it, and passed out. When the young woman next opened her eyes, he was gone, and she was changed.\n\nReturning to her tribe, she used her new abilities to mask the sickly flesh of the newborns to make them look healthy and used her strength to fend off the mad animals.\n\nDecades passed as the beloved daughter kept watch over her home. The sickness and the crazed animals stopped, but a new threat arrived. Men and women from the East sensed the “Demon” in the tribe, and came to purge it. The warriors from the east massacred her tribe until it was just herself and one young boy left.\n\nShe led him back to the mountain where she was first [Glossary('Объятия','game_concept_Embrace_desc')]d, and wandered out to gather other people from different tribes. When a small community was gathered, Altın-Arığ hid the valley from the outside world. For 400 years, she kept guard over them.\n\nIn the 6th century, Altın-Arığ decided that it was time to unleash the horde. She approached a mortal blacksmith in the form of a golden wolf and guided him to lead the people of the valley to the exit. Right after they rode out, the exhaustion caught up with Altın-Arığ. Burying herself deep beneath the earth, she fell into Torpor.\n\nFuture Fate: Altın-Arığ will awaken centuries later and attempt to bring her cubs working as a family once more, knowing they will only be strong when together." 
 POD_persistentpodlore.desc.795402: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIshbara was not born a great warrior or leader. The third son of a minor Beg, he was considered to be a weak warrior and a dour man. While his father and brothers trained to perfect their fighting skills, he realized his talent in administration. When a catastrophic winter hit his tribe, Ishbara ensured that they survived while the others froze and starved. Rationing and stockpiling resources with precision, he kept order. In the middle of this crisis, a Golden Wolf witnessed this lone tribe, surviving while no others did. Watching this man defeat these cold winds with order made her realize that while she could conquer well on her own, she needed people to keep it running. Ishbara was [Glossary('Объятия','game_concept_Embrace_desc')]d that night in his yurt.\n\nFor nearly a thousand years, Ishbara acted as the right hand of Altın-Arığ. He codified the Töre and ensured the Erk could thrive. In the 6th Century, he [Glossary('Объятия','game_concept_Embrace_desc')]d a Childe of his own. Ay-Toldı. He was everything that Ishbara was not; a charismatic warrior with a poet’s heart. Ishbara truly loved him, and began educating him so that he could one day leave the Erk in his hands. Years later, the Erk rode out to support their [Glossary('Anda','podgloss.anda')] allies against the Eastern threat. The battle was going badly as their foes cut them down too easily. Desperate to end it and save his people, Ishbara weaved absolute destruction across the entire battlefield. Thousands of blades filled the air, shredding the flesh and bone of everyone around. Ay-Toldı rushed towards him, hoping to aid his [Glossary('Sire','game_concept_Sire_desc')]. Ishbara, exhausted, did not see him. The storm tore his Childe to pieces until only ash remained.\n\nIshbara now works relentlessly alongside his [Glossary('Anda','podgloss.anda')] allies to drown out the silence in his head. He does not often ride to battle himself, but when he does, he always invites the blows of his enemies. His only hope is that one day, the Golden Wolf will wake up and judge him guilty. He hopes that she will execute him, granting him the peace he desires. Until then, he will do his duty.\n\nFuture Fate: The Golden She-Wolf will not judge him, but he will get the peace he desires after a reckless skirmish with the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')]."
 POD_persistentpodlore.desc.795403: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nModu was born in the dying Xiongnu Empire in the 1st Century A.D.. He possessed great charm and ambition from the start, wanting to make himself a great hero. When he was nineteen, he used his influence and charisma to  gather warriors and promised them a part in the battle that would destroy the rebelling traitors in the south. Riding at the front of an army 7.000 strong, he led the warriors into what he believed would be a crushing victory.\n\nModu was wrong. The enemy commander led the Xiongnu forces into a trap, encircling and butchering them. Modu’s horse was killed by an arrow, and he could do nothing but lay in the blood and mud, watching his men die and listening to their screams. When the few remaining survivors helped him up, he looked at the eerily silent field and could only think about why he had led so many to their deaths. Riding back to his tribe on a lame horse, between the now-empty yurts, he couldn’t bear to look anyone in the eye. The looks the wives, children and mothers gave him was crushing enough. One silent foreigner saw past the seemingly broken man, though. This mistake could be turned into something good, even if it may take centuries. Ishbara embraced the defeated young man that night.\n\nThe brash warrior died on that battlefield, but a Vigilant Wolf took his place. Modu would fight recklessly no longer. To prevent a tragedy like that battle ever happening again, he mastered the use of his powers, utilizing them for camouflage. Now, he serves as the main commander for his [Glossary('Sire','game_concept_Sire_desc')], Ishbara. Modu has changed a lot from his mortal days. He still has the undeniable charm, but it is a subdued, humble one. Some may consider his caution a weakness, but it is inarguable that he deeply cares for his people.\n\nFuture Fate: Modu will continue to be a beloved mentor and leader to the Erk, especially the younger ones."
 POD_persistentpodlore.desc.795404: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nYidu was born in one of the many Shatuo tribes serving as minor border guards for the Tang dynasty. For 52 years, he was the perfect servant. An uncivilised barbarian in the eyes of the Tang, but at least a servile one. He hated every second of it. He witnessed himself and his people being used as meat shields by the Chinese generals against their foes. The Shatuo were looked down upon constantly, punished for every small mistake and even some they did not do. Yidu became one of the Shatuo generals at the age of 50. A cynical and scarred man, he realized that there would never be peace with his oppressors. Only a boot to the neck would be the proper response.\n\nIn 884 A.D., Yidu seized an opportunity. Gathering men loyal to him, he murdered his Chinese overseers, burning down their manors with their families inside. Having heard rumors of a skilled and opportunistic tactician, Ishbara tracked him down and [Glossary('Объятия','game_concept_Embrace_desc')]d Yidu, hoping to turn his hatred into something more productive. He succeeded, but not in the way he hoped.\n\nYidu grew into an even more competent and diligent man. His callous and underhanded schemes grew as well, but no one could deny the results he got. Yidu hates that his [Glossary('Sire','game_concept_Sire_desc')] is content to be mere servants for the [Glossary('Anda','podgloss.anda')], when the East is so ripe for conquest. Yidu controls the easternmost regions belonging to the Erk. Lately, he has begun to recruit heavily from Shatuo remnants, using them as his personal army. The Black Crow intends to provoke a war by forcing the Cathayans to retaliate to one of his secret raids, forcing the hand of his [Glossary('Sire','game_concept_Sire_desc')] to join and defend him.\n\nFuture Fate: Yidu will break from the rest of the Erk centuries later and will do terrifyingly well ruling his land in the East. Only the blade of an assassin will bring his ambitions to an end."
 POD_persistentpodlore.desc.795405: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nBorn the only child of a talented mercenary, Chixin spent his childhood traveling and sparring. He had a natural talent for making friends and allies easily, charming many women, and fighting with his twin blades. He joined his first skirmish at the age of 15, and moved terrifyingly fast through the battlefield, charging fearlessly into the front lines. His fame grew as some years passed, getting the attention of Yidu who was looking to gather more people loyal to him. Instead of embracing him right away, Yidu persuaded the young hothead that countless opportunities would await him if he accepted his offer. Never one to turn down a chance for more fighting and glory, he accepted.\n\nChixin got used to his new unlife surprisingly well. Yidu brought many swordmasters to further his education, and taught him on how a man must lead his people; efficiently and without doubt. The Young Crow is well liked among the Erk due to his natural charisma and prowess. While he is not as callous as his [Glossary('Sire','game_concept_Sire_desc')], many fear that Chixin's grand ambitions may spell his doom.\n\nFuture Fate: Having been groomed to be a great heir, Chixin will take over what remains of Yidu's lands after his assassination. Furious and grieving, he will launch reckless attacks in retaliation. It may be a war he is certain to lose, but Chixin will not rest until he avenges his [Glossary('Sire','game_concept_Sire_desc')]."
 POD_persistentpodlore.desc.795408: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn her mortal days, Çiçek was the beloved daughter of a wealthy family of Uyghur merchants. Raised in a world of haggling, silk and economics, she was taught by her parents that a well-spoken compliment or promise could open doors no amount of violence of bribery could. Her family was always well liked in their community, and Çiçek was their precious jewel.\n\nWhen Ay-Toldı, the beloved of his own community, visited her city for business, he was captivated by her kindness and gentle soul. They spent a week walking and talking under the gentle night sky. However, when the time came for him to leave, he refused to take her with him. He loved her too much to inflict the curse his kind had upon an innocent young woman. Çiçek may have been gentle and kind, but that didn't mean she was weak. She tracked him down before he could leave and pleaded with Ay-Toldı, arguing that a lifetime under the bright sun meant nothing if they couldn't be together. Moved by her devotion, Ay-Toldı granted her the [Glossary('Объятия','game_concept_Embrace_desc')].\n\nÇiçek was only a few short years into her unlife when her beloved [Glossary('Sire','game_concept_Sire_desc')] was accidentally killed by Ishbara. When the broken man returned and confessed to her what he did, he was ready for her to lash out. Instead, Çiçek held the man and forgave him, knowing that he would never have done such a terrible act with intent. Çiçek now serves as a diplomat for the Erk, doing her best to keep her only remaining family from breaking apart.\n\nFuture Fate: Çiçek will live on, moving into modern day Türkiye. Operating out of Istanbul, she will be the sole reason the Erk don't tear themselves apart."
 POD_persistentpodlore.desc.795407: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn his mortal days, Bayan was a Khazar toll master stationed near a prominent center of trade. He was a man of massive appetites from the beginning; for food, drink, good company and women. Despite what his jovial and carefree nature may suggest, he possessed a sharp mind for numbers. He could take one look at the caravan of a Persian merchant and calculate a toll that kept everyone satisfied.\n\nThe young Ay-Toldı [Glossary('Объятия','game_concept_Embrace_desc')]d him, both due to his consistent ability to make him laugh, and his talents as a treasurer. The two became close friends almost immediately. When Bayan lost his [Glossary('Sire','game_concept_Sire_desc')], he became louder, more boisterous. He is always surrounded by people in some feast or event, unwilling to be alone with his thoughts.\n\nFuture Fate: The [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] will retaliate for Yidu's attacks by targeting Bayan and Çiçek. When their defenses are breached, to buy time for the others to escape, he will use his abilities to its full extent and conjure an illusion of an army, shining silver and gold. Charging the enemy lines, laughing, the very image of a God of Wealth. He will buy enough time for others to escape, but Bayan himself will be killed, dying as he lived: making a loud spectacle so no one sees the pain beneath."
 POD_persistentpodlore.desc.795411: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nIn her mortal days, Kreka was a true pillar of the Hunnic Empire. A master diplomat and steward, she held the loyalty of countless rulers and dealt with many envoys. When news reached her that Attila died from a nosebleed upon seeing the beauty of his new bride, Ildico, the world she knew was shattered. As the empire was torn apart from the inside, Kreka could do nothing but watch the meticulously crafted realm shatter. She grew to resent the younger Ildico, believing the girl to be the curse that doomed them all.\n\nAs the Huns collapsed, the isolated Erk heard of Kreka’s talents. She was secretly taken to Ergenekon and [Glossary('Объятия','game_concept_Embrace_desc')]d. For hundreds of years, she served as the matriarch of coin and statecraft.\n\nKreka had never given much thought to what happened to Ildico afterwards. But as the [Glossary('Anda','podgloss.anda')] strikes at the Black Tortoise Court, intriguing whispers of a [Glossary('Wu','podgloss.wu')] of devil-brides reach her ears. Rumors of a woman with a tragically beautiful and familiar face.\n\nKreka’s disdain for Ildico changed into one of profound respect as soon as the whispers were confirmed. No longer a weak little girl, she had grown into someone who escaped the clutches of the horrid [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]. She was no longer the only one who remembered the sight and smell of Attila’s great hall.\n\nFuture Fate: Recognizing that a war between the Erk and the [Glossary('Куэй-дзин','game_concept_kuei_jin_desc')] would benefit nobody, the two immortal queens will forge a clandestine alliance. Ildico will leverage her ever-growing influence to keep the Hungry Dead out of Erk territory. Kreka will focus on halting Yidu’s advance towards the East, and persuade the Erk to go west, towards Anatolia. Kreka will establish her court in modern day Türkiye, becoming a silver-tongued titan of commerce."
 
 POD_persistentpodlore.desc.793562: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce the greatest gift the Outriders gave to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], the last bride to a Steppe Lord that nearly broke two empires, by all rights, Ildico should have never seen [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], meant to die far beyond the reach of the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')]. However, the march of the Huns was shadowed by the [Glossary('Yama King','podgloss.yamaking')]'s Outriders, and from Atilla the Hun's court, his final wife was their prize.\n\nSo beautiful she killed her husband with a nosebleed on their wedding night, the Outriders had taken her in the chaos of his death, and brought her to the domain of their [Glossary('Yama King','podgloss.yamaking')], slew her, and offered her to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] as a choice sinner. Ildico was immediately made the prize bride of whichever damned tribe in his hell [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] favored.\n\nBut times are changing.\n\nWith the success of Dobrul's progeny, [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] has been distracted. And long thought to be just a beautiful face with little behind her eyes, Ildico, alongside the other brides, orchestrated their escape through a series of bribes, seductions, and murders to ensure their escape. And back in the living world, the architect of their freedom Ildico holds the newly formed [Glossary('Wu','podgloss.wu')] of devil-brides together.\n\nWanting to stay mobile to avoid the Outriders, Ildico leads the [Glossary('Wu','podgloss.wu')] as diplomats outwardly, but she wants more. For a single night, she was a Queen. She misses it dearly. And she and her new sisters suffered in Hell for far longer than most of the Ancestors of the Black Tortoise Court have existed. She is hungry for more.\n\nA trophy in Hell, she vows to be more.\n\nFuture Fate\n\nIldico kept the peace for as long as she could, but when it was clear to her war was inevitable, she repositioned her sisters and herself to the north, letting the [Glossary('Anda','podgloss.anda')] dull its blade into the Black Tortoise Court's shell.\n\nWhen the counterattack began, Ildico led the Silent Glades as negotiators and mediators. In coordinating their host, she was granted the rank of Ancestor, where she would immediately begin building her power.\nIn modern nights, she discreetly aids the Century Rebellion alongside Ji-yeon, eyeing the Quincunx with the hunger of a Queen denied."
 POD_persistentpodlore.desc.793563: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile the vast, overwhelming majority of infernal threats that the Hungry Dead are familiar with are products of either the [UmbraGlossaryLocalized('yomi_wan','Yomi Hell')], the mad dreams of humanity, or the manifestations of entropy, there are some rarer forces about.\nOne such horror is the chthonic entity known as the Gardener of Hell, Sarisel. Summoned by mages long ago, the conquests of the Mongols has disrupted the Earthbound's home, and some of his followers have brought him to the Korean Peninsula for safekeeping. There, the demon begat a child with a local woman. And Ji-yeon has suffered her father's indiscretion ever since.\n\nGroomed to be a tool for her infernal father even after his departure, she was trained to be one of his enforcers, despite her heart's protest. But a Demon Hunter's blade cared not for how she desired freedom, and they specifically ensured she would go to the deepest pits of the Earth Prison.\n\nBut the Hell did not recognize her as something that belonged to it. And as she had always rejected her father's will, the deeper prison he belonged to did not call to her.\n\nUpon escape, her doubly infernal nature brought her under immediate suspicion, and so Ji-yeon understands that not even a mentorship by Ancestors of power can save her. Only action can. So she gathered four other students of similar impulse, and leads them to the [Glossary('Anda','podgloss.anda')].\n\nAll the Courts are afraid of them, so where better than to prove her worth?\n\nFuture Fate\n\nWhile Ji-yeon's feats were not directly celebrated outside the Steppe, she was an undeniably critical piece in the defeat of the [Glossary('Anda','podgloss.anda')]. Where most Ancestors saw only the Cainite warlords, Ji-yeon knew every mastermind has their supporters.\nThe [Glossary('Anda','podgloss.anda')]'s myriad allies, namely the Erk, found themselves under relentless harassment and hit and run campaigns, as Ji-yeon used hidden paths in the Umbra to cut deep. While she would be hated by them, she kept them from rescuing Dobrul. But her lack of recognition, and continued condemnation fills her with rage, so she aligns herself with Ildico in Modern Nights in support of the Century Rebellion, to punish the fools who would still see her as little more than a mindless fiend."
 POD_persistentpodlore.desc.793564: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nSince witnessing the empire she was born to enter a harsh period of decline to a nomadic force, and being married to it, Sabina feels she knows all too well the destiny of the Black Tortoise Court. After all, how many other times has she seen this before?\n\nBorn the daughter to a minor Byzantine merchants, the conquests of Asparuh after the Battle of Ongal, Sabina lived much of her life in the shadow of such conquests. Sold by her parents to the Khan turned Emperor, Sabina was one of many of his wives, and while her beauty did earn her special attention from Asparuh, her lack of children ensured that after his death, she was alone without allies in a foreign court. And that is where the Outriders struck, kidnapping her, bringing her into the steppes, and sacrificing her as a gift to the [Glossary('Dokhor-Khan','podgloss.dokhorkhan')].\n\nPleased with the offering, Sabina became one of the devil-brides given to [Glossary('Dokhor-Khan','podgloss.dokhorkhan')]'s favored sinners.\n\nBut with their recent escape under the [Glossary('Yama King','podgloss.yamaking')]'s now scattered focus, Sabina sees the [Glossary('Anda','podgloss.anda')] as just another iteration of the countless threats she had seen in Hell, and the August Courts as another permutation of settled peoples too content with their lot to deal with the problem. And she is done reliving that tragedy.\n\nWhile outwardly a diplomat alongside her Sister-Brides, Sabina has already been quietly passing along movements to the Silent Glade and their Harbinger allies. Like her sisters, she wants more. And she will have more.\n\nFuture Fate\n\nWhile her [Glossary('Wu','podgloss.wu')] kept to their pursuits, Sabina secured the leverage they would need to become to important to discard. And when dust settled on the [Glossary('Anda','podgloss.anda')], she stayed close to her sisters and built her own power. And come modernity, as the Century Rebellion rocks the Quincunx, rebellious students and mortal hunters can always find a sponsor in Sabina."
 POD_persistentpodlore.desc.793565: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nWhile for most of the rest of her fellow Devil-Brides the humiliation of being the wives of the Favored Tribe of the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] was new, for Perozdukht that was just her life.\n\nA Sassanian princess captured by the Hephtalites and taken as a trophy for their conquests, it was so when the Outriders came for her that at the time it was just another tragedy to her existence. But after her sacrifice, the realization that said state of being might be all that is left for her woke something in Perozdukht.\n\nWhen [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] was elated with the success of the [Glossary('Anda','podgloss.anda')], it was Perozdukht that pushed her sisters to escape. It was her that kept them together, that held them through trial and tribulation, and consoled them in their flight. And once back to the mortal world, she had been the one that suggested they stay together when all lacked the words to describe wanting the same thing.\n\nWhile outwardly just another of the beauties of the Silent Glades, inwardly, she is their heart and soul, their console and guide. While she desires greatness like all the rest of them, she will not lose any of her sisters. They went through hell together, and she will see them all become queens once more.\n\nFuture Fate\n\n With her understated role in the Silent Glades, Perozdukht was not rewarded with any Ancestorships following the [Glossary('Anda','podgloss.anda')]'s demise, but her sisters refused to part with her, and she became their connective tissue.\n\nWith the coming Modern Nights, she is also fanning the flames of their hunger. When the Quincunx falters, they will be the new heroes to rise over them. Afterall, who better to resist the [Glossary('Demon Emperor','podgloss.demonemperor')] than those who endured Hell for far longer than most others?"
 POD_persistentpodlore.desc.793566: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nThe first change from the Outrider's standard collection practices, Changle however was a special interest for [Glossary('Dokhor-Khan','podgloss.dokhorkhan')], a noble daughter of a claimant to China, married to a steppe lord. And so, when Changle first met Bumin Qaghan of the Göktürk Khaganate, she was unaware of the Devils in the shadows.\nAfterall, she was just a piece on the board between the Wei and Göktürks, and court politics was far more relevant to a noble woman doing her best to avoid an untimely demise. But when her husband died of old age and eyes turned away from her, the Outriders struck, dragged her to the steppes, and sent her to the [Glossary('Hell of Spiked Chains','podgloss.hellspikedchains')] to become a Devil-Wife of the Favored Tribe of Dohkor-Khan.\n\nChangle languished in the Hell, being forced to be a trophy wife when she actually did have a mind to rule. Logistics and numbers was a strong suit of hers, but all she was wanted for was how well of bride she was.\nBecause of that, when [Glossary('Dokhor-Khan','podgloss.dokhorkhan')] was celebrating the [Glossary('Anda','podgloss.anda')], she readily joined her sisters in escaping the Hell. But again, she was met with many who disregarded her and only saw her as a pretty face. She grits her teeth, knowing she can be more.\n\nShe will play the role for now, but once she can be free of it, she will refuse to be the perfect arm candy anymore.\n\nFuture Fate\n\nThe realpolitik of the Silent Glade would secure Changle an Ancestorship in the Quincunx, but even then, the Silent Glade were still seen as beauties with little behind their eyes.\nSo she accepted the post, and resolved to build her domain of Dragon Nests deeply and thoroughly. And come modernity, as the Young Dead of the Century Rebellion seek to strike at the Ancestors, Changle always seems to have a prudent one ready for them."
 POD_persistentpodlore.desc.793567: "Этот персонаж был создан разработчиками PoD для придания большей глубины сеттингу и не является официальной частью [Glossary('Мира Тьмы','game_concept_world_of_darkness_desc')].\n\nOnce the prize jewel of the Devil-Brides to Dokhor Khan, and now the main diplomat of the Silent Glade between the Courts, Xiaoguo has an unenviable position she takes with shocking gusto.\n\nIn life, the daughter of Emperor Suzong of Tang and married to Bayanchur Khan of the Uygur Khaganate for a year before his death, Xiaoguo, as she was returning to her father after his death a year after their marriage, was struck by tragedy, and the Outriders, seeking the prize of a child of an Emperor on their lonesome, rode and pulled her into the steppes.\n\n[Glossary('Dokhor-Khan','podgloss.dokhorkhan')] was ecstatic with this sacrifice, and as the final Devil-Bride, Xiaoguo was the most inconsolable of her sisters, and until their escape, the most melancholy.\n\nBut escape changed her. That first breath free of hell, and she never wanted to see it go. She vowed to build something, experience it all, and actually live. She died barely a woman, and now she was this powerful immortal.\nThe damnation she already felt, and now she could claim the world. The most depressed to the most energetic, Xiaoguo relishes her role as the diplomat between Courts, as now she can not only see the world, but also what she may one day take.\n\nFuture Fate\n\nXiaoguo's contacts throughout the Courts let the Silent Glade avoid the [Glossary('Anda','podgloss.anda')]'s onslaughts, and Xiaoguo's steady presence ensured the Quincunx rewarded them well.\nBut that was not enough to sate her new love of life. She is absolutely on board with her sisters' ambitions, and plays the role of the pretty and bubbly mediator in trying times, making sure no eyes fall onto her militarizing sisters."

 
