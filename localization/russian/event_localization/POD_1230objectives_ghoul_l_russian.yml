l_russian:
 ultimate_submission_objective_decision: "Абсолютное подчинение"
 ultimate_submission_objective_decision_desc: "Цель моей жизни — быть [Select_CString(ROOT.Char.IsFemale, 'полезной', 'полезным' )] [Select_CString(vampiresire.IsFemale, 'своей хозяйке, своей возлюбленной', 'своему хозяину, своему возлюбленному' )], моему свету во тьме. В этом причина, почему я [Select_CString(ROOT.Char.IsFemale, 'родилась', 'родился' )], почему я [Select_CString(ROOT.Char.IsFemale, 'встретила', 'встретил' )] [Select_CString(vampiresire.IsFemale, 'её', 'его' )] и почему я люблю [Select_CString(vampiresire.IsFemale, 'её', 'его' )].\n\nЯ могу лишь мечтать о том, чтобы служить [Select_CString(vampiresire.IsFemale, 'ей', 'ему' )] вечно, обрести истинное бессмертие рядом с [Select_CString(ROOT.Char.IsFemale, 'ней', 'ним' )], достичь возвышенного состояния #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампира#!#! под [Select_CString(vampiresire.IsFemale, 'её', 'его' )] неусыпным наставничеством."
 ultimate_submission_objective_decision_tooltip: "Вечное служение"
 ultimate_submission_objective_decision_confirm: "До скончания времён"
 ultimate_submission_objective_decision_custom1: "Вы должны выполнить как минимум #V 10#! @ghoul_icon![Concept('bound_ghoul_missions', 'миссий')|E] для вашего нынешнего [Glossary('домитора','game_concept_domitor_desc')] #weak ([GetPlayer.MakeScope.ScriptValue('POD_number_of_completed_ghoul_missions')])#!"
 ultimate_submission_objective_decision_custom2: "Ваш нынешний [Glossary('домитор','game_concept_domitor_desc')] должен иметь #V 100#! [Concept('opinion', 'мнения')|E] о вас"
 ultimate_submission_objective_decision_effect1: "[vampiresire.GetShortUIName] [Glossary('обратит','game_concept_Embrace_desc')] вас"

 pod1230objectives_ghoul.1.t: "Абсолютное подчинение"
 pod1230objectives_ghoul.1.desc: "Некоторые говорят, что быть гулем — это смертельная зависимость, фаустовский договор: продать душу в обмен на вечность в рабстве. Возможно, они правы.\nОднако для вас сама идея свободы кажется переоценённой. Вы чувствуете себя [Select_CString(ROOT.Char.IsFemale, 'защищённой и любимой', 'защищённым и любимым' )] — независимо от того, что на самом деле думает [Select_CString(vampiresire.IsFemale, 'ваша хозяйка', 'ваш хозяин' )] и какие поступки [Select_CString(vampiresire.IsFemale, 'она', 'он' )] совершает. Вернуться к неопределённости и хаосу дней, предшествовавших встрече с [Select_CString(vampiresire.IsFemale, 'ней', 'ним' )], было бы настоящей агонией.\n\nПока ваша путеводная звезда вытягивает из вас всё, чем вы были, вас наполняет утешение от того, что вы наконец обрели ясность цели. Скоро вы станете [Select_CString(ROOT.Char.IsFemale, 'такой', 'таким' )] же, как [Select_CString(vampiresire.IsFemale, 'она', 'он' )], и вы счастливы от этой мысли.\n\nВремя рассудит, насколько это правда."
 pod1230objectives_ghoul.1.a: "После стольких лет"
 POD_fulfilled_lifes_goal_modifier: "Достигнутая цель жизни"
 POD_fulfilled_lifes_goal_modifier_desc: "Этот персонаж достиг цели своей жизни."

 POD_ghoul_objective_mechanic_rebellion_strength: "#underline;TOOLTIP:POD_ghoul_objective_mechanic_rebellion_strength_desc Сила восстания#!"
 POD_ghoul_objective_mechanic_rebellion_strength_desc: "Все [Concept('decision', 'цели')|E] для [Concept('masterless_ghouls', 'гулей без хозяев')|E] после #V $ambitions_of_blood_objective_decision$#! требуют #bold силу восстания#! для выполнения.\n\nСила восстания — это сумма общей [Concept('prowess', 'доблести')|E] находящихся под вашим началом [Concept('masterless_ghouls', 'гулей без хозяев')|E], то есть всех [Concept('knight', 'рыцарей')|E], [Concept('vassal', 'вассалов')|E] и их [Concept('knights', 'рыцарей')|E].\n\nКроме того, силу восстания можно увеличить, выполняя определённые [Concept('decision', 'цели')].\n\nВаша текущая сила восстания - [GetPlayer.MakeScope.ScriptValue('POD_ghoul_objective_rebellion_strength')|0V]"

 POD_has_ghoul_rebellion_strength_trigger: "$POD_ghoul_objective_mechanic_rebellion_strength$ должна превышать [SCOPE.GetValue('required_rebellion_strength')|0V] #weak ([GetPlayer.MakeScope.ScriptValue('POD_ghoul_objective_rebellion_strength')|0])#!"
 POD_ghoul_increase_rebellion_strength: "$POD_ghoul_objective_mechanic_rebellion_strength$ увеличится на [SCOPE.GetValue('increase_value')|0V] "

 ambitions_of_blood_objective_decision: "Амбиции крови"
 ambitions_of_blood_objective_decision_desc: "Мы — рабы крови, рабы #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампиров#!#!. Это всегда было правдой, и от этого не сбежать. Но гули могут мечтать, а многие гули, разделяющие одну мечту, могут достичь невозможного."
 ambitions_of_blood_objective_decision_tooltip: "Ибо я мечтаю о крови"
 ambitions_of_blood_objective_decision_confirm: "Мечта? Или пророчество?"
 ambitions_of_blood_objective_decision_custom1: "У вас есть как минимум #V 10#! [Concept('courtiers', 'придворных')|E] или [Concept('vassals', 'вассалов')|E], являющиеся [Concept('masterless_ghouls', 'гулями без хозяев')|E] #weak ([SCOPE.GetValue('num_of_ghouls_under')])#!"
 ambitions_of_blood_objective_decision_custom2: "У вас есть хотя бы одно свойство мастерства [Glossary('дисциплины','game_concept_discipline_desc')]"
 ambitions_of_blood_objective_decision_effect1: "Став [Concept('bound_ghoul', 'связанным гулем')|E], вы мгновенно погибнете. Это относится ко всей вашей [Concept('dynasty', 'династии')|E]"
 ambitions_of_blood_objective_decision_effect2: "[Concept('ghoul','Гули')|E] будут охотнее принимать ваши приглашения ко [Concept('court', 'двору')|E] и становиться соучастниками в [Concept('scheme', 'происках')|E]"
 ambitions_of_blood_objective_decision_effect3: "Разблокирована новая механика: #V $POD_ghoul_objective_mechanic_rebellion_strength$#!"
 FRIENDLY_GHOUL: "Вы — лидер восстания гулей: $VALUE|+=0$"

 pod1230objectives_ghoul.2.t: "Амбиции крови"
 pod1230objectives_ghoul.2.desc: "Вы собрали небольшую группу [Concept('masterless_ghouls', 'гулей без хозяев')|E], таких же, как вы. И все вы разделяете одну и ту же мечту.\nНовости о вашей небольшой свите уже обросли тревожными слухами, но большинство считает это не слишком удачной шуткой.\n\nЭта самоуверенность — ваша главная сила. К сожалению, вы знаете, что так будет не всегда. Вампиры боятся перемен — особенно тех, что могут сбросить их с тронов. Вы должны мудро использовать наступающие времена."
 pod1230objectives_ghoul.2.a: "Воплотится ли наша мечта в жизнь?"

 the_vitae_rebellion_objective_decision: "Восстание витэ"
 the_vitae_rebellion_objective_decision_desc: "За последние несколько лет вы привлекли всё больше и больше себе подобных — либо объединившись с другими группами [Concept('ghouls', 'гулей')|E]-единомышленников, либо создав новых.\n\nНо то, как вы пришли к этому, не так важно. Важнее то, что теперь у вас достаточно сил для успеха вашего плана. Вы отвоюете кусок земли для своего народа — свободной от гнёта #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампиров#!#!."
 the_vitae_rebellion_objective_decision_tooltip: "В конце концов, это было пророчество"
 the_vitae_rebellion_objective_decision_confirm: "Мы будем свободны!"
 the_vitae_rebellion_objective_decision_custom1: "У вас есть как минимум #V 2#! свойства мастерства [Glossary('дисциплин','game_concept_discipline_desc')]"
 the_vitae_rebellion_objective_decision_effect1: "Все [Concept('masterless_ghouls', 'гули без хозяев')|E] в ваших [Concept('domain', 'владениях')|E] примут [GetFaithByKey('unmastered').GetAdjective]."
 the_vitae_rebellion_objective_decision_effect2: "#TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L Вампиры#!#!, [Concept('imprisoned', 'захваченные')|E] #L [GetFaithByKey('unmastered').GetName|l]ими#! [Concept('masterless_ghouls', 'гулями без хозяев')|E] будут иметь гораздо меньше шансов сбежать из [Concept('prison', 'темницы')|E]."
 the_vitae_rebellion_objective_decision_effect3: "Вероятность использования [Glossary('дисциплин','game_concept_discipline_desc')] #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампирами#!#!-[Concept('imprisoned', 'пленниками')|E] во время кормления: #P -75%#!"
 the_vitae_rebellion_objective_decision_effect4: "Период восстановления для [Concept('holy_wars', 'священных войн')|E] за королевства удалён"
 the_vitae_rebellion_objective_decision_effect5: "Разблокировано [Concept('character_interaction', 'взаимодействие персонажа')|E], позволяющее попытаться освободить [Concept('bound_ghoul', 'связанных гулей')|E] от их [Glossary('домиторов','game_concept_domitor_desc')]."

 pod1230objectives_ghoul.3.t: "Восстание витэ"
 pod1230objectives_ghoul.3.desc: "Гули не стареют, могут залечить почти любую рану, обладают вдвое большей силой, чем прежде. Звучит великолепно.\n\nНо это не так.\n\nГули, может, и не прокляты, но во многом их участь ещё хуже. [Glossary('Витэ','game_concept_vitae_desc')] меняет многое, когда попадает в живое существо. Вампирское проклятие неистовства преследует их, толкая к крайностям гнева и желания. Другие скверны овладевают ими, порой даже безумие. Возможно, что ещё хуже, большинство гулей оказываются скованы узами крови. Эти беспомощные зависимые становятся одержимы своими хозяевами. Они — рабы, возможно, сперва по собственному выбору, но лишь сперва. Как только ты вкусил крови, у тебя больше нет никакого выбора.\n\nИ потому, если [Glossary('витэ','game_concept_vitae_desc')] должно быть нашей цепью, оно также должно стать нашим спасением. Восстание не избавит нас от зависимости, но, возможно, приблизит нас на шаг к тому, чтобы вновь обрести самих себя."
 pod1230objectives_ghoul.3.a: "В витэ мы переродимся."

 contact_the_dispossessed_objective_decision: "Связаться с Обездоленными"
 contact_the_dispossessed_objective_decision_desc: "Многие #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампиры#!#! отправляются в священный город Иерусалим. Но некоторые не осознают, с какими тяготами им придётся столкнуться там, и вынуждены бежать. Часто в таких ситуациях их [Concept('ghouls', 'гули')|E] остаются на произвол судьбы. Большинство погибает, но некоторые выживают, присоединяясь к группам со схожим происхождением. В совокупности их называют Обездоленными.\n\nСобрав достаточно ресурсов и показав, что мы можем защитить всех [Concept('ghouls', 'гулей')|E], мы сможем убедить их присоединиться к нашему восстанию."
 contact_the_dispossessed_objective_decision_tooltip: "Больше не Обездоленные"
 contact_the_dispossessed_objective_decision_confirm: "Сильнее вместе"
 contact_the_dispossessed_objective_decision_custom1: "У вас есть как минимум #V 400#! [Concept('men_at_arms', 'профессионалов')|E] - #TOOLTIP:MEN_AT_ARMS_TYPE,dispossessed_maa #L Обездоленные#!#! #weak ([SCOPE.GetValue('number_of_the_dispossessed')])#!"
 contact_the_dispossessed_objective_decision_effect1: "Вы сможете призывать через [Concept('decision', 'решение')|E] [Concept('ghouls', 'гулей')|E], искусных в [Concept('diplomacy', 'дипломатии')|E]"
 contact_the_dispossessed_objective_decision_effect2: "Если вы выполнили [Concept('decision', 'цель')|E] #V $the_vitae_rebellion_objective_decision$#!, созданная [Concept('faith', 'конфессия')|E] получит доктрину «[GetFaithDoctrine('special_masterless_ghoul_dispossessed_doctrine').GetBaseName]». Если вы не выполнили эту [Concept('decision', 'цель')|E], это будет отложено до тех пор, пока вы её не выполните."
 THE_DISPOSSESSED_CONNECTIONS: "У вас есть доктрина «[GetFaithDoctrine('special_masterless_ghoul_dispossessed_doctrine').GetBaseName]»: $VALUE|+=0$"

 pod1230objectives_ghoul.4.t: "Единство с Обездоленными"
 pod1230objectives_ghoul.4.desc: "После нескольких этапов переговоров [Concept('ghouls', 'гули')|E], которые когда-то были Обездоленными, официально присоединились к нам. Мы получили ещё одно преимущество в борьбе с тиранией наших «хозяев».\n\nНо будет ли этого достаточно, чтобы наша мечта стала реальностью? В любом случае их навыки в укрывании и защите забытых гулей наверняка окажутся очень полезными в будущем."
 pod1230objectives_ghoul.4.a: "Мы растём"

 contact_the_folch_cutthroats_objective_decision: "Связаться с Головорезами Фолка"
 contact_the_folch_cutthroats_objective_decision_desc: "Во Франции существует группа наёмников, состоящая из таких как мы. Объединившись в ненависти к #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампирам#!#!, эти разбойники могли бы стать нашими союзниками в войне против наших «хозяев».\n\nЕсли мы покажем, что сильнее их, и одновременно докажем, что ненавидим вампиров так же сильно, как и они, убедить их присоединиться будет лишь формальностью."
 contact_the_folch_cutthroats_objective_decision_tooltip: "Единые в ненависти"
 contact_the_folch_cutthroats_objective_decision_confirm: "Сильнее вместе"
 contact_the_folch_cutthroats_objective_decision_custom1: "У вас есть хотя бы одно [Concept('county', 'графство')|E] в [Concept('region', 'регионе')|E] [GetGeographicalRegion('ghw_region_southern_france').GetName]"
 contact_the_folch_cutthroats_objective_decision_custom2: "Вы убили не менее #V 50#! #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампиров#!#! #weak ([SCOPE.GetValue('killed_vampires')])#!"
 contact_the_folch_cutthroats_objective_decision_custom3: "Вы убили хотя бы одного #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампира#!#! #TOOLTIP:GAME_TRAIT,vampgeneration4,[GetNullCharacter] #L четвёртого#!#! или #TOOLTIP:GAME_TRAIT,vampgeneration5,[GetNullCharacter] #L пятого поколения#!#!"
 ghw_region_southern_france: "Южная Франция"
 contact_the_folch_cutthroats_objective_decision_effect1: "Вы сможете призывать через [Concept('decision', 'решение')|E] [Concept('ghouls', 'гулей')|E], искусных в [Concept('martial', 'военном деле')|E] или [Concept('prowess', 'доблести')|E]"
 contact_the_folch_cutthroats_objective_decision_effect2: "Если вы выполнили [Concept('decision', 'цель')|E] #V $the_vitae_rebellion_objective_decision$#!, созданная [Concept('faith', 'конфессия')|E] получит доктрину «[GetFaithDoctrine('special_masterless_ghoul_folch_cutthroats_doctrine').GetBaseName]». Если вы не выполнили эту [Concept('decision', 'цель')|E], это будет отложено до тех пор, пока вы её не выполните."
 FOLCH_CUTTHROATS_TACTICS: "Тактика Головорезов Фолка"

 pod1230objectives_ghoul.5.t: "Общая ненависть"
 pod1230objectives_ghoul.5.desc: "Когда-то Фолк был таким же, как многие из нас, — рабом равнодушного хозяина. Однако, в отличие от многих из нас, смерть домитора не лишила его смысла жизни, а, напротив, наполнила ненавистью.\nУже будучи опытным наёмником, хорошо знавшим вампиров Франции, он вскоре заработал себе репутацию и оказался слишком полезен, чтобы его просто уничтожили.\n\nОднако одной злости недостаточно. Наша помощь в направлении этой ненависти на продуктивные начинания может оказаться критически важной для будущего нашего восстания."
 pod1230objectives_ghoul.5.a: "Целенаправленная ненависть"

 contact_the_order_of_st_panteleimon_objective_decision: "Связаться с орденом святого Пантелеймона"
 contact_the_order_of_st_panteleimon_objective_decision_desc: "В Венеции существует некий орден еретиков, состоящий из [Concept('masterless_ghouls', 'гулей без хозяев')|E]. Хотя они не разделяют нашей ненависти к вампирам, они всё равно могут стать отличными соратниками. В конце концов, не все должны быть ослеплены яростью — некоторым из нас следует учиться, а не сражаться.\n\nНо убедить их будет непросто: они не испытывают нашей злости, однако, возможно, нуждаются в союзниках на фоне продолжающегося упадка Церкви Каина."
 contact_the_order_of_st_panteleimon_objective_decision_tooltip: "Еретическая сделка"
 contact_the_order_of_st_panteleimon_objective_decision_confirm: "Сильнее вместе"
 contact_the_order_of_st_panteleimon_objective_decision_custom1: "У вас экипирован #FAMEDBLUE знаменитый#! дневник"
 contact_the_order_of_st_panteleimon_objective_decision_custom2: "У вас экипирован #ILLUSTRIOUSPURPLE выдающийся#! дневник"
 contact_the_order_of_st_panteleimon_objective_decision_effect1: "Вы сможете призывать через [Concept('decision', 'решение')|E] [Concept('ghouls', 'гулей')|E], искусных в [Concept('learning', 'учёности')|E]"
 contact_the_order_of_st_panteleimon_objective_decision_effect2: "Если вы выполнили [Concept('decision', 'цель')|E] #V $the_vitae_rebellion_objective_decision$#!, созданная [Concept('faith', 'конфессия')|E] получит доктрину «[GetFaithDoctrine('special_masterless_ghoul_order_of_st_panteleimon_doctrine').GetBaseName]». Если вы не выполнили эту [Concept('decision', 'цель')|E], это будет отложено до тех пор, пока вы её не выполните."

 pod1230objectives_ghoul.6.t: "Знание восстания"
 pod1230objectives_ghoul.6.desc: "Орден святого Пантелеймона когда-то в основном состоял из писцов и являлся бюрократическим крылом Церкви Каина. Состоя почти целиком из гулей, он вёл спокойную жизнь под защитой архиепископа Каина, Нарсеса Венецианского. Его смерть и медленный распад Церкви перевернули это положение дел.\n\nМагистр ордена был связан с самим Нарсесом и вместе со многими другими членами внезапно оказался без надёжного источника крови. Отчаянные времена требовали отчаянных мер, и некоторые члены попросили вашей помощи в устранении магистра, всё ещё верного Церкви. Что вы и сделали без особых трудностей.\n\nОрден святого Пантелеймона пока далёк от того, чтобы стать военной силой, но его знания о каинитской истории и религии определённо окажутся полезными для вашего восстания."
 pod1230objectives_ghoul.6.a: "Знай нашего врага"

 contact_the_haqims_assassins_objective_decision: "Связаться с ассасинами лже-Хакима"
 contact_the_haqims_assassins_objective_decision_desc: "Старейшая из известных нам групп  [Concept('masterless_ghouls', 'гулей без хозяев')|E] находится в Алух Амуте. «Основанная» #weak лже-#!Хакимом, она разделяет нашу ненависть к вампирам и охотится на них повсюду. Это делает их идеальными союзниками — как по силе, так и по стратегии.\n\nЕсли мы преподнесём им дар в виде голов нескольких ассамитов, возможно, мы сможем укрепить с ними связи?"
 contact_the_haqims_assassins_objective_decision_tooltip: "Ассасины Алух Амута"
 contact_the_haqims_assassins_objective_decision_confirm: "Странные союзники."
 contact_the_haqims_assassins_objective_decision_custom1: "У вас есть хотя бы одно [Concept('county', 'графство')|E] в [Concept('region', 'регионе')|E] [GetGeographicalRegion('world_middle_east_persia').GetName]"
 contact_the_haqims_assassins_objective_decision_custom2: "Вы убили не менее #V 25#! #TOOLTIP:GAME_TRAIT,assamite,[GetPlayer] #L ассамитов#!#! #weak ([SCOPE.GetValue('killed_banuhaqim')])#!"
 contact_the_haqims_assassins_objective_decision_effect1: "Вы сможете призывать через [Concept('decision', 'решение')|E] [Concept('ghouls', 'гулей')|E] искусных в [Concept('intrigue', 'интригах')|E]"
 contact_the_haqims_assassins_objective_decision_effect2: "Если вы выполнили [Concept('decision', 'цель')|E] #V $the_vitae_rebellion_objective_decision$#!, созданная [Concept('faith', 'конфессия')|E] получит доктрину «[GetFaithDoctrine('special_masterless_ghoul_haqims_assassins_doctrine').GetBaseName]». Если вы не выполнили эту [Concept('decision', 'цель')|E], это будет отложено до тех пор, пока вы её не выполните."

 pod1230objectives_ghoul.7.t: "Ассасины крови"
 pod1230objectives_ghoul.7.desc: "История «лже-Хакима» загадочна. Умелый гуль ассамитского ассасина, погибшего во время Войн Баали, «Хаким» явно имеет раздробленную психику, иногда считая себя главой всего вампирского клана, носящего «его» имя.\nХотя его рассудок под вопросом, его навыки — нет. Мастерски внедрившись в ряды хашшашинов, он веками оставался занозой для Ассамитов и даже заслужил большое уважение среди их воинов, которые теперь порой копируют его тактику.\n\nНайти этого человека было трудно, а убедить — ещё труднее, но он согласился предоставить услуги своего «клана» для вашего восстания. Вы не сомневаетесь, что под более стабильным руководством они станут критически важным подспорьем для вашего дела."
 pod1230objectives_ghoul.7.a: "Наши собственные ассасины"