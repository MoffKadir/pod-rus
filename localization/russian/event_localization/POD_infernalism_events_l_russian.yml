l_russian:
 POD_infernalism_events.1.t: "Diabolus Advocatorum"
 POD_infernalism_events.1.desc: "$POD_splat_demon_plural$ take their [demonic_pacts|E] very seriously. While they are bound to respect their end of the bargain, they will jump at any loopholes or unclear clauses that can be to their advantage. Many foolish #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L Infernalists#!#! learned way too late to read the fine print with more dedication than the big letters written in blood."

 POD_infernalism_events.1.pact: "• Pact signed with [EventWindowWidget.GetScope.sC('recipient').GetFirstNameNoTooltip] •"

 POD_infernalism_events.1.confirm: "My soul for power."
 POD_infernalism_events.1.a: "This isn't to my advantage."