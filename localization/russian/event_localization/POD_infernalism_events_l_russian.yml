l_russian:
 POD_infernalism_events.1.t: "Diabolus Advocatorum"
 POD_infernalism_events.1.desc: "#TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L Демоны#!#! очень серьёзно относятся к своим [Concept('demonic_pacts', 'договорам')|E]. Хотя они и обязаны выполнять свою часть сделки, они будут использовать любые лазейки или неясные положения, которые могут быть им выгодны. Многие безрассудные #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L инферналисты#!#! слишком поздно научились читать мелкий шрифт с большим вниманием, чем крупные буквы, написанные кровью."

 POD_infernalism_events.1.pact: "• [EventWindowWidget.GetScope.sC('recipient').GetFirstNameNoTooltip]: договор •"

 POD_infernalism_events.1.confirm: "Моя душа в обмен на силу."
 POD_infernalism_events.1.a: "Это не в моих интересах."