 fera_advance_rank_decision: "Повысить свой ранг"
 fera_advance_rank_decision_desc: "Известность и ранг являются мерой положения перевёртыша в обществе. Чем больше у него известности, тем больший вес имеют его слова. Различные фера используют различный набор из трёх типов известности.\n\nВы получаете известность:\n"
 fera_advance_rank_decision_tooltip: "Продвижение по иерархии фера требует времени и целеустремленности."
 fera_advance_rank_decision_confirm: "Моя слава растёт!"

 fera_advance_rank_renown_glory: "#clickable $POD_fera_renown_glory$:#!\n#medium $BULLET_WITH_TAB$Побеждая в войнах с правителями, служащими Вирму, если вы исповедуете конфессию Геи.\n$BULLET_WITH_TAB$Побеждая в войнах с правителями, служащими Гее, если вы исповедуете конфессию Вирму.\n$BULLET_WITH_TAB$Убивая персонажей, служащих Вирму, если вы исповедуете конфессию Геи.\n$BULLET_WITH_TAB$Убивая персонажей, служащих Гее, если вы исповедуете конфессию Вирма.\n$BULLET_WITH_TAB$Завершая [Concept('mercenary_task_contracts', 'контракты наёмника')|E] за [Concept('adventurer', 'авантюриста')|E].#!\n"

 fera_advance_rank_renown_honor: "#clickable $POD_fera_renown_honor$:#!\n#medium $BULLET_WITH_TAB$Отказываясь от [Concept('grudge', 'обиды')|E], прекращая [Concept('rivalry', 'соперничество')|E] или теряя [Concept('nemesis', 'заклятых врагов')|E].\n$BULLET_WITH_TAB$Даруя [Concept('duchies', 'герцогства')|E] или титулы более высокого уровня другим фера.\n$BULLET_WITH_TAB$Улучшая уровень каэрна до максимального.\n$BULLET_WITH_TAB$Повышая свой [Concept('piety_level', 'уровень набожности')|E].#!\n"

 fera_advance_rank_renown_wisdom: "#clickable $POD_fera_renown_wisdom$:#!\n#medium $BULLET_WITH_TAB$Завершая экспедиции Умбры.\n$BULLET_WITH_TAB$Получив последнее [Concept('perk', 'достоинство')|E] из древа образа жизни [Glossary('фера', 'glossary_fera_tt')].\n$BULLET_WITH_TAB$Завершая [Concept('journey', 'странствие')|E] духовных поисков.#!\n"

 fera_advance_rank_renown_power: "#clickable $POD_fera_renown_power$:#!\n#medium $BULLET_WITH_TAB$Побеждая в войнах.\n$BULLET_WITH_TAB$Побеждая в поединках.\n$BULLET_WITH_TAB$Повышая свой [Concept('prestige_level', 'уровень престижа')|E].\n$BULLET_WITH_TAB$Получая физическую [Concept('urgetaints_lifestyle', 'скверну инстинктов')|E].#!\n"

 fera_advance_rank_renown_cunning: "#clickable $POD_fera_renown_cunning$:#!\n#medium $BULLET_WITH_TAB$Успешно проводя #TOOLTIP:game_concept_infiltration_desc #E проникновение#!#!.\n$BULLET_WITH_TAB$[Concept('blackmailing', 'Шантажируя')|E] других персонажей.\n$BULLET_WITH_TAB$Успешно выполнив [Concept('schemes', 'происки')|E] «[GetScheme('abduct').GetTypeName]».#!\n"

 fera_advance_rank_renown_ferocity: "#clickable $POD_fera_renown_ferocity$:#!\n#medium $BULLET_WITH_TAB$Возвращаясь в свои владения, набрав не менее #P 50#! [Concept('loot', 'добычи')|E] в [Concept('raid', 'набеге')|E].\n$BULLET_WITH_TAB$Получая [Concept('trait_level_track_xp', 'опыт')|E] в любом [Concept('trait_level_track', 'пути развития')|E] свойства «[GetTrait('lifestyle_hunter').GetName(GetNullCharacter)]».\n$BULLET_WITH_TAB$Тренируясь с вашей группой [GetPlayer.Custom('PODCoterie')].#!\n"

 fera_advance_rank_renown_infamy: "#clickable $POD_fera_renown_infamy$:#!\n#medium $BULLET_WITH_TAB$Успешно завершив [Concept('schemes', 'происки')|E] «[GetScheme('fabricate_hook').GetTypeName]».\n$BULLET_WITH_TAB$Казнив вассалов с титулом [Concept('title_rank', 'ранга')|E] герцогства или выше без [Concept('execute_reason', 'повода')|E].\n$BULLET_WITH_TAB$Узурпировав титулы королевского [Concept('rank', 'ранга')|E] или выше.\n$BULLET_WITH_TAB$Нарушая перемирия.\n$BULLET_WITH_TAB$Получив ментальную [Concept('urgetaints_lifestyle', 'скверну инстинктов')|E].#!\n"


 fera_advance_rank_renown_bonuses: "\n#clickable [GetPlayer.Custom('PODFeraAuspiceType')] даёт вам бонус на [GetPlayer.Custom('PODFeraAuspiceRenownBoost')].#!"

 POD_fera_advance_to_next_rank_desc: "Вы повышаете свой ранг до #bold $VALUE|0V$#! в [Concept('trait', 'свойстве')|E] «[TRAIT.GetName(GetPlayer)]»"
 fera_advance_rank_decision_requirement_tributaries: "У вас есть 2 или более [Concept('tributaries', 'данников')|E] с титулом как минимум королевского [Concept('rank', 'ранга')|E]"


 fera_recruit_beastborn_decision: "Понаблюдать за звериной роднёй"
 fera_recruit_beastborn_decision_desc_werewolf: "Гару тесно связаны со своими родичами-волками. Каждое племя, даже те, что живут в городах, например Стражи людей, внимательно следят за своими четвероногими друзьями и ищут у них признаки Первого изменения.\nТем из волков, кто в итоге становится вервольфом, требуется больше времени на подготовку, прежде чем они станут полноправными членами племени, поскольку для них непривычны атрибуты человеческого мира. Как местный лидер, вы сами решаете, насколько пристально следить за потенциальными помощниками и планировать их помощь."

 fera_recruit_beastborn_decision_desc_bubasti: "Давным-давно Бубасти присоединились к Гору в его вечной борьбе против своего упадочного дяди Сета. Несмотря на то, что дело было правое и Бубасти по-прежнему гордятся своим вкладом, оно привело к сокрушительному поражению. Победоносные Сетиты захватили кошачью родню Бубасти, кифурских котов, и либо убили их, либо напоили кровью, чтобы превратить в чудовищ.\nОднако после недавней победы и дерзкого спасения последних кифурских котов Бубасти снова процветают и присматривают за своей кошачьей роднёй, помогая им набираться сил и исцеляться от травм, полученных за долгие годы рабства у Сетитов."
 fera_recruit_beastborn_decision_desc_bastet: "Бастет тесно связаны со своей кошачьей роднёй. Каждое племя внимательно следит за своими четвероногими друзьями и ищет у них признаки Первого изменения. Кошки очень территориальны, поэтому племена, как правило, не покидают регион, где живут их родичи.\nТем из кошек, которые в итоге становятся бастет, требуется больше времени на подготовку, прежде чем они станут полноправными членами племени, поскольку для них многое в человеческом мире в новинку. Как местному лидеру, вам решать, насколько пристально вы будете следить за потенциальными помощниками и планировать взаимодействие с ними."
 fera_recruit_beastborn_decision_desc_mokole: "Будучи одними из немногих не относящихся к млекопитающим фера, моколе могут не принимать активного участия в заботе о своих более асоциальных звериных родичах. Благодаря более быстрому жизненному циклу рептилий моколе могут откладывать яйца в специальные кладки, где за ними присматривают люди из числа родни, пока те не вылупятся и не претерпят Первое изменение, которое обычно происходит в течение пары недель. Вам, как местному лидеру, ничего не стоит подойти к яйцам и проверить, как идут дела, а также узнать, не прошёл ли кто-то из ваших детёнышей через Первое изменение.\nТем из рептилий, которые в итоге становятся моколе, требуется больше времени, чтобы стать полноценными членами кладки, поскольку для них всё, что связано с человеческим миром, в новинку. Вам, как местному лидеру, решать, насколько пристально вы хотите следить за происходящим и планировать эту потенциальную помощь."

 fera_recruit_beastborn_decision_bubasti_requirement: "Цель #bold Кошки против змей#! должна быть завершена"
 fera_recruit_beastborn_decision_effect: "Вам будут предложены варианты, при которых к вам прибудут #TOOLTIP:GAME_TRAIT,beast_born,[GetNullCharacter] #L зверорождённые#!#! [Glossary('фера', 'glossary_fera_tt')] из вашего племени. Скорее всего, это потребует от вас дополнительных ресурсов."
 fera_recruit_beastborn_decision_tooltip: "Найти [Glossary('фера', 'glossary_fera_tt')] среди зверей."
 fera_recruit_beastborn_decision_confirm: "Приступить к поискам!"