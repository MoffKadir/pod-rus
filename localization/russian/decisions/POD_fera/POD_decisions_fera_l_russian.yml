 fera_advance_rank_decision: "Повысить свой ранг"
 fera_advance_rank_decision_desc: "Известность и ранг являются мерой положения перевёртыша в обществе. Чем больше у него известности, тем больший вес имеют его слова. Различные фера используют различный набор из трёх типов известности.\n\nВы получаете известность:\n"
 fera_advance_rank_decision_tooltip: "Продвижение по иерархии фера требует времени и целеустремленности."
 fera_advance_rank_decision_confirm: "Моя слава растёт!"

 fera_advance_rank_renown_glory: "#clickable $POD_fera_renown_glory$:#!\n#medium $BULLET_WITH_TAB$Побеждая в войнах с правителями, служащими Вирму, если вы исповедуете конфессию Геи.\n$BULLET_WITH_TAB$Побеждая в войнах с правителями, служащими Гее, если вы исповедуете конфессию Вирму.\n$BULLET_WITH_TAB$Убивая персонажей, служащих Вирму, если вы исповедуете конфессию Геи.\n$BULLET_WITH_TAB$Убивая персонажей, служащих Гее, если вы исповедуете конфессию Вирма.\n$BULLET_WITH_TAB$Completing [mercenary_task_contracts|E] as an [adventurer|E].#!\n"

 fera_advance_rank_renown_honor: "#clickable $POD_fera_renown_honor$:#!\n#medium $BULLET_WITH_TAB$Отказываясь от [Concept('grudge', 'обиды')|E], прекращая [Concept('rivalry', 'соперничество')|E] или теряя [Concept('nemesis', 'заклятых врагов')|E].\n$BULLET_WITH_TAB$Даруя [Concept('duchies', 'герцогства')|E] или титулы более высокого уровня другим фера.\n$BULLET_WITH_TAB$Улучшая уровень каэрна до максимального.\n$BULLET_WITH_TAB$Повышая свой [Concept('piety_level', 'уровень набожности')|E].#!\n"

 fera_advance_rank_renown_wisdom: "#clickable $POD_fera_renown_wisdom$:#!\n#medium $BULLET_WITH_TAB$Завершая экспедиции Умбры.\n$BULLET_WITH_TAB$Получив последнее [Concept('perk', 'достоинство')|E] из древа образа жизни [Glossary('фера', 'glossary_fera_tt')].\n$BULLET_WITH_TAB$Завершая [Concept('journey', 'странствие')|E] духовных поисков.#!\n"

 fera_advance_rank_renown_power: "#clickable $POD_fera_renown_power$:#!\n#medium $BULLET_WITH_TAB$Побеждая в войнах.\n$BULLET_WITH_TAB$Побеждая в поединках.\n$BULLET_WITH_TAB$Повышая свой [Concept('prestige_level', 'уровень престижа')|E].\n$BULLET_WITH_TAB$Obtaining Physical [urgetaints_lifestyle|E].#!\n"

 fera_advance_rank_renown_cunning: "#clickable $POD_fera_renown_cunning$:#!\n#medium $BULLET_WITH_TAB$Успешно проводя #TOOLTIP:game_concept_infiltration_desc #E проникновение#!#!.\n$BULLET_WITH_TAB$[Concept('blackmailing', 'Шантажируя')|E] других персонажей.\n$BULLET_WITH_TAB$Успешно выполнив [Concept('schemes', 'происки')|E] «[GetScheme('abduct').GetTypeName]».#!\n"

 fera_advance_rank_renown_ferocity: "#clickable $POD_fera_renown_ferocity$:#!\n#medium $BULLET_WITH_TAB$Возвращаясь в свои владения, набрав не менее #P 50#! [Concept('loot', 'добычи')|E] в [Concept('raid', 'набеге')|E].\n$BULLET_WITH_TAB$Получая [Concept('trait_level_track_xp', 'опыт')|E] в любом [Concept('trait_level_track', 'пути развития')|E] свойства «[GetTrait('lifestyle_hunter').GetName(GetNullCharacter)]».\n$BULLET_WITH_TAB$Тренируясь с вашей группой [GetPlayer.Custom('PODCoterie')].#!\n"

 fera_advance_rank_renown_infamy: "#clickable $POD_fera_renown_infamy$:#!\n#medium $BULLET_WITH_TAB$Успешно завершив [Concept('schemes', 'происки')|E] «[GetScheme('fabricate_hook').GetTypeName]».\n$BULLET_WITH_TAB$Казнив вассалов с титулом [Concept('title_rank', 'ранга')|E] герцогства или выше без [Concept('execute_reason', 'повода')|E].\n$BULLET_WITH_TAB$Узурпировав титулы королевского [Concept('rank', 'ранга')|E] или выше.\n$BULLET_WITH_TAB$Нарушая перемирия.\n$BULLET_WITH_TAB$Obtaining Mental [urgetaints_lifestyle|E].#!\n"


 fera_advance_rank_renown_bonuses: "\n#clickable [GetPlayer.Custom('PODFeraAuspiceType')] даёт вам бонус на [GetPlayer.Custom('PODFeraAuspiceRenownBoost')].#!"

 POD_fera_advance_to_next_rank_desc: "Вы повышаете свой ранг до #bold $VALUE|0V$#! в [Concept('trait', 'свойстве')|E] «[TRAIT.GetName(GetPlayer)]»"
 fera_advance_rank_decision_requirement_tributaries: "У вас есть 2 или более [Concept('tributaries', 'данников')|E] с титулом как минимум королевского [Concept('rank', 'ранга')|E]"


 fera_recruit_beastborn_decision: "Nurture Animal Kin"
 fera_recruit_beastborn_decision_desc_werewolf: "Garou have a strong relationship with their wolf-kin. Each tribe, even the most city bound ones like the Warders of Men, carefully watch over their four legged friends and look for the signs of a First Change among them.\nThose from the wolves that end up becoming Werewolves tend to need more preparation before becoming fully fledged members of the Tribe as the trappings of the human world are new to them. As the local leader, it falls to you to choose how closely you want to monitor and plan for this potential help."

 fera_recruit_beastborn_decision_desc_bubasti: "Long ago, the Bubasti joined Horus in his eternal fight against his decadent uncle, Set. While the cause was righteous and the Bubasti still take great pride in their contribution, it still resulted in a terrible defeat. The triumphant Setites captured the cat kin of the Bubasti, the Kyphur cats, and either killed them or fed them blood to turn them into aberrant monsters.\nWith their recent victory and daring rescue of the last Kyphur cats however, the Bubasti are now once again prospering and watching over their feline kin, helping them gather strength and heal themselves from the trauma of the long servitude to the Setites."
 fera_recruit_beastborn_decision_desc_bastet: "Bastet have a strong relationship with their cat-kin. Each tribe carefully watch over their four legged friends and look for the signs of a First Change among them. Cats being very territorial, it also means that the tribes tend to stay put in the region where their kin dwell.\nThose from the cats that end up becoming Bastet tend to need more preparation before becoming fully fledged members of the Tribe as the trappings of the human world are new to them. As the local leader, it falls to you to choose how closely you want to monitor and plan for this potential help."
 fera_recruit_beastborn_decision_desc_mokole: "As one of the few Non-Mammalian Fera, the Mokolé can be rather uninvolved with the tending of their more antisocial animal kin. With the faster life cycle of reptiles, it is a simple matter to have specialized clutches where the Mokolé lay their eggs, where Human Kinfolk can watch over them and await those who hatch, and usually undergo the First Change within a couple weeks. As the local leader, it is a simple matter to go to the eggs and check on current developments, to check to see if any of your hatchlings have undergone the First Change.\nThose from the reptiles that end up becoming Mokolé tend to need more preparation before becoming fully fledged members of the Clutch as the trappings of the human world are new to them. As the local leader, it falls to you to choose how closely you want to monitor and plan for this potential help."

 fera_recruit_beastborn_decision_bubasti_requirement: "#bold Cat Against Snake#! must have been completed"
 fera_recruit_beastborn_decision_effect: "You will be offered options to have [GetTrait('beast_born').GetName( GetPlayer )] [Glossary('Фера', 'glossary_fera_tt')] of your tribe arrive at your court. This will likely cost you some additional resources."
fera_recruit_beastborn_decision_tooltip: "Find [Glossary('Фера', 'glossary_fera_tt')] among the beasts."
fera_recruit_beastborn_decision_confirm: "Commence the search!"