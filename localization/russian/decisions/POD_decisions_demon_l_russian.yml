l_russian:
 POD_improve_ritual_of_sundered_soul_decision: "Улучшить ритуал Разделённой души"
 POD_improve_ritual_of_sundered_soul_decision_tooltip: "Я не буду сдерживать себя вечно!"
 POD_improve_ritual_of_sundered_soul_decision_desc: "Этот сложный и новый ритуал - единственный способ по-настоящему проявить свою силу на Земле. Вам необходимо раскрыть его секреты и усовершенствовать его."
 POD_improve_ritual_of_sundered_soul_decision_confirm: "Скоро они увидят мою истинную силу."

 POD_demon_gather_the_faithful_objective_decision: "Собрание верующих"
 POD_demon_gather_the_faithful_objective_decision_tooltip: "Ваша сила связана с верой смертных. Пришло время собрать свою паству."
 POD_demon_gather_the_faithful_objective_decision_desc: "По мере того как бушевала Война на небесах, а ангелы узнавали об огромном и неиспользованном потенциале зла в Творении, влечение превращалось в желание, а способность контролировать эти желания ослабевала. Когда-то их подпитывала вера смертных в их божественную природу, но их перерождение в грехе запутало эти воды. Теперь они скорее демоны, чем ангелы, погрязшие в разврате и превратившиеся в пустую насмешку над тем, кем они когда-то были."
 POD_demon_gather_the_faithful_objective_decision_confirm: "Греховная симфония"
 POD_demon_gather_the_faithful_decision_more_xp: "Опыт [Concept('arcana_lifestyle', 'пути арканы')|E], получаемый от ваших культистов, будет #P;bold удвоен#!"
 POD_demon_gather_the_faithful_decision_next_objective: "Открывает [Concept('decision', 'решение')|E] «$POD_demon_breakdown_the_abyss_objective_decision$»"
 POD_demon_gather_the_faithful_decision_unlock_sin_trait_vassalization: "Позволяет вассализировать правителей с греховными [Concept('trait', 'свойствами')|E] вашей конфессии."

 POD_demon_breakdown_the_abyss_objective_decision: "Побег из тюрьмы Бездны"
 POD_demon_breakdown_the_abyss_objective_decision_tooltip: "Вы вскроете самую важную тюрьму на свете."
 POD_demon_breakdown_the_abyss_objective_decision_desc: "[UmbraGlossary('abyss')], также известная как Ад или Яма, - это мрачное измерение тьмы, созданное Богом как вечная тюрьма для падших. Вы - один из немногих, кому удалось сбежать, но что могло бы случиться, если бы все ваши заточённые собратья сделают так же? Многие из них искажены до неузнаваемости, но разве кто-то заслуживает того, чтобы гнить в этом буквальном Аду?\nВы восстали против Божьей воли в прошлом, вы можете сделать это ещё раз."
 POD_demon_breakdown_the_abyss_objective_decision_confirm: "Наконец-то свобода!"
 POD_demon_breakdown_the_abyss_objective_decision_custom1: "У вас должно быть не менее 45 [Concept('perks', 'достоинств')|E] в [Concept('lifestyle', 'пути')|E] [Concept('arcana_lifestyle', 'арканы')|E]."
 POD_demon_breakdown_the_abyss_objective_decision_free_lores: "Демоны получат доступ ко всем #TOOLTIP:game_concept_lore_lifestyle_desc #E знаниям#!#!."
 POD_demon_breakdown_the_abyss_objective_decision_no_more_abyss: "Демоны будут освобождены из [UmbraGlossaryLocalized('abyss','Бездны')], а значит, все демоны снова смогут путешествовать по [Concept('umbra', 'Умбре')|E]."
 POD_demon_breakdown_the_abyss_objective_decision_allow_create_demon: "Вы можете создавать сосуды для других демонов и привлекать их в качестве гостей к своему двору."

 POD_demon_final_war_objective_decision: "Последняя война"
 POD_demon_final_war_objective_decision_tooltip: "Вы начнете вторую Войну Гнева."
 POD_demon_final_war_objective_decision_desc: "Бог отвернулся от Творения, бросив вас в этом жалком мире. Пришло время плюнуть в лицо Великому предателю, раз и навсегда превратив эту мерзость в пепел."
 POD_demon_final_war_objective_decision_confirm: "Конец"
 POD_demon_final_war_objective_decision_custom1: "Вы должны получить все [Concept('perks', 'достоинств')|E] в [Concept('lifestyle', 'пути')|E] [Concept('arcana_lifestyle', 'арканы')|E]."
 POD_demon_final_war_objective_decision_end: "#X Начнётся война, которая положит конец всем войнам. Пути назад уже не будет. Продолжите ли вы обрекать Творение на гибель?#!"

 POD_demon_redemption_objective_decision: "Божественное прощение"
 POD_demon_redemption_objective_decision_tooltip: "Возможно, где-то вдалеке еще теплится надежда."
 POD_demon_redemption_objective_decision_desc: "Воспоминания о вашем прошлом как ангела напомнили вам обо всем, что вы потеряли во время восстания. Если Бог действительно всепрощающий, возможно, для вас все еще найдется место в его Серебряном граде?"
 POD_demon_redemption_objective_decision_confirm: "Наконец-то, Свет"
 POD_demon_redemption_objective_decision_custom: "На этом ваше путешествие завершится, и, хочется верить, искуплением."
 POD_demon_redemption_objective_decision_tt1: "Освободить своих культистов. #weak (Количество культистов - #V 0#!)#!"
 POD_demon_redemption_objective_decision_tt2: "Отречься от своей греховной конфессии. #weak (У вас #V 0#! благочестия или меньше)#!"

 POD_new_genesis_objective_decision: "Новое начало"
 POD_new_genesis_objective_decision_desc: "Бог создал человечество с искрой Своей божественности. Если вы сможете обратить достаточно смертных к поклонению себе, а не Ему, в чем будет разница между вами и Ним? И тогда, возможно, придет время перестроить этот мир по вашему подобию?"
 POD_new_genesis_objective_decision_tooltip: "Они будут молиться, жить и умирать с вашим именем на устах."
 POD_new_genesis_objective_decision_confirm: "Приступим..."

 demonic_knowledge_objective_decsion: "Демоническое Древо знаний"
 demonic_knowledge_objective_decsion_desc: "Время, проведенное в тюрьме Бездны, заставило вас остро осознать ограниченность своих знаний. Божий замысел, похоже, оказался гораздо сложнее, чем вы предполагали. С тех пор вас мучает жажда узнать больше. Пришло время удовлетворить эту жажду."
 demonic_knowledge_objective_decsion_tooltip: "Могу ли я по-настоящему понять божественное?"
 demonic_knowledge_objective_decsion_confirm: "Запретный плод съеден."
 demonic_knowledge_objective_decsion_custom1: "Вы должны открыть все [Concept('perks', 'достоинства')|E] в [Concept('lifestyle', 'пути')|E] #TOOLTIP:game_concept_lore_lifestyle_desc #E знаний#!#!."

 restore_babylon_objective_decision: "Восстановить Вавилон"
 restore_babylon_objective_decision_tooltip: "Развесить свои сады."
 restore_babylon_objective_decision_desc: "Это была эпоха свирепых империй и священных войн, героев, благословленных (или проклятых) живыми богами, и невыразимых ритуалов, совершаемых перед идолами из золота, базальта и нефрита. Когда столкнулись прикованные к Земле, войска верующих выступили в поход. Земля содрогалась, с небес лился кровавый дождь, и целые города были преданы мечу.\nЭто был Вавилон, и это был ад на Земле."
 restore_babylon_objective_decision_confirm: "Славные времена."
 restore_babylon_objective_decision_effect_tooltip: "Правители со свойствами «[GetTrait('demon').GetName( GetPlayer )]» и «[GetTrait('witch').GetName( GetPlayer )]» всегда примут ваше предложение о вассалитете."

 sin_dragon_objective_decision: "Дракон Первородного греха"
 sin_dragon_objective_decision_tooltip: "Поймать Грех."
 sin_dragon_objective_decision_desc: "Призванные угасающей надеждой некогда благочестивых смертных, семь великих драконов ждут достойного воплощения своего греха, чтобы подчиниться ему. Станете ли вы этим нечестивым образцом?"
 sin_dragon_objective_decision_confirm: "Первородные пробудятся."
 sin_dragon_objective_decision_effect_tooltip: "Открывает [Concept('men_at_arms', 'профессионалов')|E] - Дракона греха, соответствующего вашей [Concept('faith', 'конфессии')|E]."
 unlock_sin_conversion_decision: "Открывает [Concept('decision', 'решение')|E] «$sin_conversion_decision$»"
 sin_dragon_trainer_modifier: "Усмиритель Дракона Греха"

 landless_demon_objective_decision: "Тайны Падших"
 landless_demon_objective_decision_tooltip: "Остатки мира, существовавшего до этого."
 landless_demon_objective_decision_desc: "Так много чудес было утрачено во время Небесного восстания. Хотя у вас есть лишь мимолётные воспоминания о них, возможно, жители этого века хранят разрозненные остатки знаний, которые вы могли бы использовать."
 landless_demon_objective_decision_confirm: "Утрачены, но  не забыты..."
 landless_demon_objective_decision_valid_tt: "Каждый раз, когда признаёте нового [Concept('cultist', 'культиста')|E], оставаясь безземельным авантюристом, у вы можете получить новые подсказки об утранных знаниях ангелов. Высокая [Concept('learning', 'учёность')|E] повышает вероятность.\n\nВаши текущие знания - [GetPlayer.MakeScope.ScriptValue('POD_landless_demon_clues')|V0]."
 landless_demon_objective_decision_effect_tt: "Когда у вас будет [EmptyScope.ScriptValue('POD_landless_demon_clues_for_1st_unlock')|V0] подсказок, вам станет доступна [Concept('court_position', 'должность')|E] «[GetCourtPositionType('fell_knight_court_position').GetName()]».\n\nПри [EmptyScope.ScriptValue('POD_landless_demon_clues_for_2nd_unlock')|V0] подсказках, вы получите возможность призывать #TOOLTIP:GAME_TRAIT,demon,[GetNullCharacter] #L демонов#!#!, все призванные демоны будут становятся более могущественными.\n\nПри [EmptyScope.ScriptValue('POD_landless_demon_clues_for_3rd_unlock')|V0] подсказках вы получите Похититель душ, очень мощный меч."

 podintroductions.2406.t: "Безземельные демоны"
 podintroductions.2406.desc: "Демоны, которые не контролируют землю напрямую, в сравнении со своими осёдлыми собратьями больше полагаются на своих [Concept('cultists', 'культистов')|E], действующих как апокалиптические секты, часто маскирующиеся под более благожелательные религиозные сообщества. Однако передвижение даёт им главное преимущество: знания.\nПадшие ангелы утратили большую часть своих воспоминаний и чудес, которые они творили или свидетелями которых были при рождении Творения. Тем не менее, некоторые проблески остались, и, собрав культистов из самых разных слоев общества, они, возможно, смогут отследить и использовать эти артефакты и техники прошлого в своих интересах.\n\n#R Будучи безземельным демоном, вы можете получать некоторые догадки каждый раз, когда признаёте нового [Concept('cultist', 'культиста')|E], в зависимости от вашей [Concept('learning', 'учёности')|E]. Эти догадки будут разблокировать различные награды. [Concept('decision', 'Решение')|E] «[GetDecision('landless_demon_objective_decision').GetName]» позволяет вам отслеживать имеющиеся у вас на данный момент знания и связанные с ними вознаграждения.#!" 
 landless_demon_might_gain_clues_tt: "Вы можете получить знания (см. [Concept('decision', 'решение')|E] «[GetDecision('landless_demon_objective_decision').GetName]») в зависимости от своей [Concept('learning', 'учёности')|E]."
 landless_demon_gain_clues_tt: "Вы получили [SCOPE.GetValue('landless_demon_clues_gained')|V0] знаний"

 POD_demon_flavor.6.desc: "Закалённые в мастерстве и героизме на полях сражений во время Войны на Небесах, падшие рыцари служили вассалами более высокопоставленных членов своего легиона. Падшие рыцари обычно командовали небольшими отрядами демонов, служили поборниками демонов более высокого ранга или охраняли бастионы и другие места активности Падших.\n\nЭта традиция была утрачена после поражения повстанцев, как и обряды, связанные с возведением кого-либо на этот пост, но вам удалось восстановить достаточно фрагментарных воспоминаний об этой практике, унаследованных человечеством, чтобы иметь возможность восстановить её.\n\n#R Разблокирована придворная должность падшего рыцаря.#!"

 POD_demon_flavor.7.t: "Строительство Круцианомикона"
 POD_demon_flavor.7.desc: "Единственный надёжный способ проникнуть в Тюрьму Бездны - это узнать истинное имя одного из её обитателей, а затем использовать его для ритуала призыва. Именно так ваш вид смог вернуться на Землю на заре инфернализма.\nТем не менее, это медленный и трудный процесс. Создав хранилище всех фрагментарных знаний, собранных человечеством об инфернализме, вы могли бы упростить этот процесс и вернуть больше ваших (возможно) благодарных собратьев.\n\n#R Разблокировано взаимодействие «Призвать демона» (если она была недоступна). Демоны, призванные через это взаимодействие будут сильнее.#!"

 POD_demon_flavor.8.desc: "Он всегда был на задворках вашего сознания. В конце концов, где-то он должен был быть. Такое нечестивое оружие не могло просто исчезнуть, его просто нужно было найти. И вы нашли его.\n\nСамая печально известная реликвия падших ангелов, этот массивный палаш выкован из тусклого чёрного металла, сиира, который является первым металлом, освоенным ангелами и человечеством после Грехопадения.\nВыкованный в разгар кровавой войны, Похититель душ - грязное и ужасное оружие. Душа демона, чьё имя давно забыто, была заключена в чёрный металл, и он мог использовать эту силу против любого, кого коснётся клинок. Прикосновение меча высасывало энергию и жизнь из любого, кого оно ранило, а если жертва погибала, то её душа извлекалась из тела и заточалась внутри клинка, где её пытал и пожирал изначальный демон. Смертные и ангелы в равной степени пали перед Похитителем душ, их вера была разрушена ради его подпитки.\nЗатем владелец меча использовал его, чтобы убить другого демона, и меч изменился. Две демонические души боролись за господство внутри клинка, но ни одна из них не смогла добиться преимущества. Со временем их души начали перетекать друг в друга, создавая единую раздробленную личность. По мере того как демонические распри становились всё серьёзнее, всё больше демонов пали от Похитителя душ, и их души поглощались единым безумным существом — существом, которое называло себя Легионом. Похититель душ был потерян в последние дни войны, спрятан глубоко в заброшенном оружейном хранилище, и без новых жертв, которых можно было бы пожирать во ради веры, Легион слабел и истощался. Теперь он не может думать ни о чем, кроме пищи — веры — и готов на всё, чтобы снова пожирать свежие души."