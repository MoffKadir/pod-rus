l_russian:



 jagglings: "Джагглинги"
 jagglings_flavor: "#F Джагглинги - обычные умбральные «жители». Они обычно разумны и обладают индивидуальностью. Джагглинги обычно служат инкарне.#!"

 water_spirits: "Духи воды"
 water_spirits_flavor: "Меньшие духи местных вод, призванные на службу."

 rat_headed_dragonfly_demon: "Крысоголовые демоны-стрекозы"
 rat_headed_dragonfly_demon_flavor: "#F Стрекозы-демоны длиной от фута до полутора футов и с размахом крыльев до двух футов имеют панцирь с такой же блестящей переливчатостью, как торакс мухи или масло на воде. Они используются Тиграми-дьяволами как разведчики.#!"

 sleeper_seducing_bane: "Спящие-соблазнители бэйны"
 sleeper_seducing_bane_flavor: "#F Эти демоны, похожие на суккубов, совсем не привлекательны. Действительно, спящие-соблазнители бэйны выглядят как мокрые, мясистые красные массы размером в несколько футов и утыканные щупальцами разных размеров. Тигры-дьяволы подчиняют их, заставляя служить себе.#!"

 face_robe_demon: "Демоны-лицедеи"
 face_robe_demon_flavor: "#F Демоны-лицедеи неприятны даже по меркам Тигров-дьяволов. Обитатели жестокости и отчаяния, демоны-лицедеи получили такое название из-за своей неприятной привычки одеваться в элегантные одеяния, сделанные из лиц своих жертв.#!"

 fire_elemental: "Элементали огня"
 fire_elemental_flavor: "#F Элементали огня, которые считают себя страстями Геи и когда-то научили человечество пользоваться огнем. Они спонтанно появляются на свет за Барьером, но исчезают, как только заканчивается их питание.#!"

 air_elemental: "Элементали воздуха"
 air_elemental_flavor: "#F Элементали воздуха, которые обычно обитают во внешних пределах [UmbraGlossaryLocalized('aetherial_realm','Неземной сферы')] или следуют за умбральными ветрами.#!"

 water_elemental: "Элементали воды"
 water_elemental_flavor: "#F Элементали воды, обитающие в водоемах на территории Умбры.#!"

 earth_elemental: "Элементали земли"
 earth_elemental_flavor: "#F Элементали земли, которые, по слухам, ближе всего к Гее и обычно обитают в незапятнанной почве в пределах [UmbraGlossaryLocalized('penumbra','Пенумбры')].#!"

 electricity_elemental: "Элементали молний"
 electricity_elemental_flavor: "#F Старейшины гару считают, что элементали - первое творение Геи и что новые элементали - это извращение, предвещающее Апокалипсис. Другие считают, что элементали существовали всегда, но им не хватало материальной субстанции, чтобы проявиться. Хотя существуют истории о Дворе элементалей в [UmbraGlossaryLocalized('astral_reaches','Высокой Умбре')], большинство гару не верят в его существование. Теурги говорят, что то, что посторонние воспринимают как иерархию, является лишь отражением собственных предположений, которые элементаль отражает для того, чтобы лучше общаться с существом из плоти.#!"

 metal_elemental: "Элементали металла"
 metal_elemental_flavor: "#F Элементали металла считают себя грядущими правителями своего рода и находятся в натянутых отношениях с элементалями земли. Они появляются в виде гуманоидов, сделанных из того металла, который они представляют, и часто бывают вспыльчивыми и высокомерными.#!"

 wood_elemental: "Элементали дерева"
 wood_elemental_flavor: "#F Будучи лишь немного старше элементалей металла, лин-шэнь также поддерживают тесные отношения с людьми. В то время как некоторые из ти-шэнь чувствуют себя покинутыми человеком, большинство элементалей дерева ощущают себя жертвами.#!"

 liderci: "Лидерции"
 liderci_flavor: "#F Эти коварные духи - воплощения чистого желания, духи-искусители и демоны-любовники.#!"

 animated_tree: "Оживлённые деревья"
 animated_tree_flavor: "#F Деревья, пропитанные магией и побуждаемые к действию, отправляются на войну под руководством мага-садовника.#!"

 stormcrows: "Вороны-буревестники"
 stormcrows_flavor: "#F Любимцы Дедушки-Грома, вороны-буревестники в основном служат шпионами для Теневых владык, но при достаточной численности они могут стать мощной силой.#!"

 apis_minotaurs: "Минотавры"
 apis_minotaurs_flavor: "#F Аписы, или Лунные быки, были истреблены гару - чудовищным преступлением, совершенным против сострадательной расы. Но не принимайте их сострадание за слабость, поскольку они возвращаются, чтобы отомстить за свою смерть благодаря силе Мнезиса моколе.#!"

 camazotz_megachiropteras: "Мегахироптеры"
 camazotz_megachiropteras_flavor: "#F Благодаря силе Мнезиса вымершие летучие мыши-оборотни возвращаются, чтобы летать в тени. Их клыки готовы вонзиться в тех, кто стал причиной их гибели, или в любого другого, кто встанет у них на пути.#!"

 grondr_daeodons: "Даэдоны"
 grondr_daeodons_flavor: "#F Там, где другие могли отступить, опасаясь порчи или одержимости [Glossary('Вирмом', 'glossary_wyrm_tt')], грондр наступали, неустрашимые перед лицом всепоглощающей порчи. Многие фера помнят грондров именно такими, и теперь эти воспоминания воплотились в реальность благодаря Мнезису. Теперь грондр ищут гару, чтобы очистить их от скверны. Иначе зачем бы они совершили такое предательство?#!"

 hoglings: "Хоглинги"
 hoglings_flavor: "#F Эти бэйны появляются в виде густых облаков ядовитых испарений, зловеще клубящихся над их целями.#!"
 furmlings: "Фурмлинги"
 furmlings_flavor: "#F Похожие на болезненно светящиеся сгустки зелёного огня, эти бэйны распространяют огонь и разрушение повсюду, куда бы ни направлялись.#!"
 hrugglings: "Храгглинги"
 hrugglings_flavor: "#F Эти бэйны представляют собой перекатывающиеся кучи неочищенных сточных вод, с соответствующим зловонием и дьявольской силой.#!"
 wakshaani: "Уакшаани"
 wakshaani_flavor: "#F Бэйны, которые проявляются в виде пластов пурпурной жидкости с вкраплениями, прожилками и пузырящимися бородавками.#!"
 phantasmi: "Фантазмы"
 phantasmi_flavor: "#F Фантазмы - это остатки мёртвых фоморов. Эти оболочки стремятся уничтожить то, что убило их.#!"
 bitter_rages: "Жгучие яростни"
 bitter_rages_flavor: "#F Бэйны, созданные Вирмом в попытке превратить всех в сумасшедших.#!"
 meat_puppets: "Мясные куклы"
 meat_puppets_flavor: "#F Одержимые трупы молодых животных и людей, которые были несправедливо убиты, вернувшиеся, чтобы сеять страдания.#!"
 shade_spiders: "Теневые пауки"
 shade_spiders_flavor: "#F Отрубленные человеческие руки, которые стремятся обрекать живых на гибель.#!"
 gray_masses: "Серые массы"
 gray_masses_flavor: "#F Бывшие духи Вильда, теперь их разрушительный грибковый рост служит Вирму.#!"
 thinbones: "Тонкие кости"
 thinbones_flavor: "#F Ненасытные бэйны голода, рождённые в местах ужасного голода.#!"
 glutton_worms: "Черви-обжоры"
 glutton_worms_flavor: "#F Они выглядят примерно как нечто среднее между гигантской личинкой и раздутой змеёй без кожи; у них нет глаз, только складки бледной розовато-серой плоти, окружающие длинные челюсти, похожие на челюсти барракуды.#!"
 scrags: "Кощеи"
 scrags_flavor: "#F Бэйны-воины, которые служат солдатами Вирма в его бесконечном стремлении к разрушению.#!"
 nexus_crawlers: "Нексусные ползуны"
 nexus_crawlers_flavor: "#F Ужасные бэйны, само присутствие которых разъедает и разлагает ткань окружающей их реальности.#!"