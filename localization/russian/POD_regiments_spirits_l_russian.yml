l_russian:



 jagglings: "Jagglings"
 jagglings_flavor: "#F Jagglings are the common umbral "citizens". They are usually sentient, and posses an individual identity. Jagglings usually serve an Incarna.#!"

 water_spirits: "Water Spirits"
 water_spirits_flavor: "Minor spirits of local waters summoned to serve."

 rat_headed_dragonfly_demon: "Rat-Headed Dragonfly Demons"
 rat_headed_dragonfly_demon_flavor: "#F From a foot to a foot-and-a-half long, and with a wingspan of up to two feet, the dragonfly demons have carapaces with the same brilliant iridescence as a fly's thorax or oil on water. They are used by the Devil Tigers as scouts.#!"

 sleeper_seducing_bane: "Sleeper-Seducing Bane"
 sleeper_seducing_bane_flavor: "#F These succubus-like demons are anything but attractive. Indeed, Sleeper-Seducing Banes appear as wet, fleshy red masses a few feet across and studded with tentacles of various sizes. Devil Tigers are known to bind them to their service.#!"

 face_robe_demon: "Face-Robe Demons"
 face_robe_demon_flavor: "#F Face-Robe Demons are unpleasant even by the standards of Devil Tigers. Dwellers among atrocities and despair, Face-Robe Demons are so named because of their unpleasant habit of dressing in elegant robes made from the faces of their victims.#!"

 fire_elemental: "Fire Elemental"
 fire_elemental_flavor: "#F Fire Elementals, who see themselves as Gaia's passions and once taught mankind the use of fire. They spring spontaneously into existence behind the Gauntlet, only to fade away once their nourishment is gone.#!"

 air_elemental: "Air Elemental"
 air_elemental_flavor: "#F Air Elementals, who usually reside in the outer reaches of the [UmbraGlossary('aetherial_realm')] or follow Umbral Winds.#!"

 water_elemental: "Water Elemental"
 water_elemental_flavor: "#F Water Elementals, who reside within bodies of water within the Umbrascape.#!"

 earth_elemental: "Earth Elemental"
 earth_elemental_flavor: "#F Earth Elementals, who are rumored to be closest to Gaia and usually dwell in untainted soil within the [UmbraGlossary('penumbra')].#!"

 electricity_elemental: "Lightning Elemental"
 electricity_elemental_flavor: "#F Elder Garou believe that the Elementals are Gaia's first creation and that newer elementals are a perversion that signals the Apocalypse. Others believe that these elementals were always present but lacked the material substance to manifest themselves. Although there are stories of an Elemental Court in the [UmbraGlossaryLocalized('astral_reaches','High Umbra')], most Garou do not believe in its existence. Theurges say that what outsiders perceive as a hierarchy are only reflections of one's own assumptions that the Elemental reflects in order to better communicate with a creature of flesh.#!"

 metal_elemental: "Metal Elemental"
 metal_elemental_flavor: "#F Metal elementals see themselves as the coming rulers of their kind and have a strained relation with Earth Elementals. They appear as humanoids made of the metal they represent, and are often ill-tempered and arrogant.#!"

 wood_elemental: "Wood Elemental"
 wood_elemental_flavor: "#F Only slightly older than the metal elermentals, the lin shen also have a close relationship with humans. While some of the tieh shen feel abandoned by man, most of the Wood elementals feel victimized.#!"

 liderci: "Liderci"
 liderci_flavor: "#F These cunning spirits are manifestations of pure desire, spirit tempters and demon lovers.#!"

 animated_tree: "Animated Trees"
 animated_tree_flavor: "#F Trees imbued with magic and animated into action, the trees march to war when guided by a magical gardener.#!"

 stormcrows: "Stormcrows"
 stormcrows_flavor: "#F Favored by Grandfather Thunder, Stormcrows mostly act as spies for the Shadow Lords, but they can be a potent force when numerous enough.#!"

 apis_minotaurs: "Minotaurs"
 apis_minotaurs_flavor: "#F The Apis or Moonbulls were driven to extinction by the Garou, a heinous crime committed against a compassionate race. But do not mistake their compassion for weakness as they return to avenge their deaths thanks to the power of the Mokolé's Mnesis.#!"

 camazotz_megachiropteras: "Megachiropteras"
 camazotz_megachiropteras_flavor: "#F Through the power of Mnesis the extinct werebats return to fly in the shadows. Their fangs ready to sink into those that caused their demise, or whoever else stands in their way.#!"

 grondr_daeodons: "Daeodons"
 grondr_daeodons_flavor: "#F Where others might retreat for fear of corruption or possession by the [Glossary('Wyrm', 'glossary_wyrm_tt')], the Grondr would advance, undaunted in the face of overwhelming corruption. Many Fera remember the Grondr this way, and now those memories have been brought into reality through Mnesis. Now the Grondr seek the Garou, to purge them and their corruption. For why else would they have committed such a betrayal?.#!"

 hoglings: "Hoglings"
 hoglings_flavor: "#F These Banes appear as thick clouds of noxious fumes, rolling ominously over their targets.#!"
 furmlings: "Furmlings"
 furmlings_flavor: "#F Sickly luminious blobs of green fire, these Banes spread fire and destruction wherever they go.#!"
 hrugglings: "H'rugglings"
 hrugglings_flavor: "#F These Banes are rolling piles of raw sewage, with a stench and unholy strength to match.#!"
 wakshaani: "Wakshaani"
 wakshaani_flavor: "#F Banes that appear as sheets of purplish liquid with blotches, veins and bubbling warts.#!"
 phantasmi: "Phantasmi"
 phantasmi_flavor: "#F The Phantasmi are remnants of dead fomori. These husks seek to destroy whatever killed them.#!"
 bitter_rages: "Bitter Rages"
 bitter_rages_flavor: "#F Banes created by the Wyrm in an attempt to turn everyone into lunatics.#!"
 meat_puppets: "Meat Puppets"
 meat_puppets_flavor: "#F Possessed corpses of young animals and humans that suffered wrongful deaths, brought back to spread misery.#!"
 shade_spiders: "Shade Spiders"
 shade_spiders_flavor: "#F Severed human hands that seek to drag the living to their demise.#!"
 gray_masses: "Gray Masses"
 gray_masses_flavor: "#F Former spirits of the Wyld, now their destructive fungal growth serves the Wyrm instead.#!"
 thinbones: "Thinbones"
 thinbones_flavor: "#F Insatiable Banes of hunger, born in places of terrible famine.#!"
 glutton_worms: "Glutton Worms"
 glutton_worms_flavor: "#F They look roughly like a cross between a giant grub and a bloated, skinless serpent; they have no eyes, only rolls of pale pinkish-gray flesh surrounding a long, barracudalike set of jaws.#!"
 scrags: "Scrags"
 scrags_flavor: "#F Warrior Banes that serve as the Wyrm's soldiers in its infinite quest for destruction.#!"
 nexus_crawlers: "Nexus Crawlers"
 nexus_crawlers_flavor: "#F Dreadful Banes whose very presence corrode and decay the fabric of reality around them.#!"