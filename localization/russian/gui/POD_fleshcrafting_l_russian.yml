l_russian:
 POD_fleshcrafting_tutorial: "Каждая из шести частей тела состоит из двух слоёв - #bold;clickable @flesh_icon!плоти#! и #bold;clickable @bone_icon!костей#!. Каждая часть тела может быть изменена только по одному слою.\n\nКаждое изменение имеет значение #bold;clickable @vicissitude_icon! сложности#!. Вероятность успеха при изменении модификаций определяется общей сложностью всех частей тела в зависимости от вашей #bold;clickable [learning_i]учёности#! и любых дополнительных бонусов, которые вы можете получить.\n\nНажмите на одну из ячеек слева, чтобы начать."

 # lowercase f for "fleshcrafting" since it looks better with that specific font
 POD_fleshcrafting_title: "изменение плоти: #bold [GetPlayer.MakeScope.Var('fleshcraft_target').Char.GetFirstNameNoTooltip]#!"

 fc_head: "Голова"
 fc_torso: "Торс"
 fc_arm_r: "Правая рука"
 fc_arm_l: "Левая рука"
 fc_leg_r: "Правая нога"
 fc_leg_l: "Левая нога"
 fc_arms: "Руки"
 fc_legs: "Ноги"

 fc_head_flesh: "Голова, @flesh_icon!плоть#!"
 fc_head_bone: "Голова, @bone_icon!кость#!"
 fc_torso_flesh: "Торс, @flesh_icon!плоть#!"
 fc_torso_bone: "Торс, @bone_icon!кость#!"
 fc_arm_r_flesh: "Правая рука, @flesh_icon!плоть#!"
 fc_arm_r_bone: "Правая рука, @bone_icon!кость#!"
 fc_arm_l_flesh: "Левая рука, @flesh_icon!плоть#!"
 fc_arm_l_bone: "Левая рука, @bone_icon!кость#!"
 fc_leg_r_flesh: "Правая нога, @flesh_icon!плоть#!"
 fc_leg_r_bone: "Правая нога, @bone_icon!кость#!"
 fc_leg_l_flesh: "Левая нога, @flesh_icon!плоть#!"
 fc_leg_l_bone: "Левая нога, @bone_icon!кость#!"

 POD_fleshcrafting_flesh_unassigned: "#italic Нажмите для ваяния @flesh_icon!плоти#!"
 POD_fleshcrafting_bone_unassigned: "#italic Нажмите для ваяния @bone_icon!кости#!"
 POD_fleshcraft_modify_layer: "#I Нажмите, чтобы изменить этот слой\nЩёлкните правой кнопкой мыши, чтобы отменить выбор#!"
 POD_fleshcrafting_selected_layer: "Изменение: [GetPlayer.MakeScope.Var('fc_selected_layer').GetFlagName]"
 POD_fleshcrafting_layer_confirm: "Выберите изменение, чтобы продолжить"
 POD_fleshcrafting_button_clear: "#I Нажмите, чтобы отменить все выбранные изменения#!"
 # invisible bullet so that the text is aligned with the other invisible bullets from the custom_tooltips in POD_fleshcrafting_list_all_perk_effects_on_character
 # this necessary trust me bro
 POD_fleshcrafting_button_reset: "#color:{0.0,0.0,0.0,0.0} $EFFECT_LIST_BULLET$#!#I Нажмите, чтобы повторно применить текущие изменения плоти персонажа [GetPlayer.MakeScope.Var('fleshcraft_target').Char.GetFirstName]#!\n\n#color:{0.0,0.0,0.0,0.0} [GetScriptedGui('POD_fleshcrafting_trait_tooltip').BuildTooltip( GuiScope.AddScope('character',GetPlayer.MakeScope.Var('fleshcraft_target').Char.MakeScope).End )]#!"

 POD_fleshcrafting_perk_name: "[Perk.GetNameNoTooltip( GetPlayer.MakeScope.Var('fleshcraft_target').Char.Self )]: @vicissitude_icon! #bold [EmptyScope.ScriptValue(Concatenate(Scope.GetFlagKey,'_complexity'))|0]#!"
 POD_fleshcrafting_perk_complexity: "@vicissitude_icon! #bold [EmptyScope.ScriptValue(Concatenate(Scope.GetFlagKey,'_complexity'))|0]#!"

 POD_fleshcrafting_total_complexity: "Общая сложность: @vicissitude_icon! [GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_current_complexity')|0]"
 # colors interpolated between red -> green as the success chance goes up
 POD_fleshcrafting_success_chance_tt: "Вероятность успеха: #color:{[Lerp_CFixedPoint( '(CFixedPoint)1.0', '(CFixedPoint)0.2', GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_success_chance_decimal') )],[Lerp_CFixedPoint( '(CFixedPoint)0.2', '(CFixedPoint)0.7', GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_success_chance_decimal') )],0.2} [GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_success_chance')|0]% #!"

 POD_fleshcrafting_success: "В случае успеха"
 POD_fleshcrafting_failure: "В случае провала"
 POD_fleshcrafting_success_message: "Успешное изменение плоти"
 POD_fleshcrafting_failure_message: "Неудачное изменение плоти"
 POD_fleshcrafting_torture_consequences: "@warning_icon!#X Поскольку [TARGET_CHARACTER.GetFirstName] не является вашим [Concept('ghoul', 'гулем')|E], [TARGET_CHARACTER.GetSheHe] будет считать это [Concept('torture', 'пыткой')|E]#!"

 POD_fleshcrafting_confirm: "Изменить плоть"

 POD_fleshcrafting_need_to_select_perk: "Вам необходимо изменить хотя бы одну часть тела"

 POD_fleshcraft_trait_tt_header: "#bold;clickable;glow_color:{0.0,0.0,0.0,1.0} [Localize(SCOPE.GetFlagName('saved_tooltip'))]:#!"
 POD_fleshcraft_trait_tt_no_perks: "#weak [character.GetFirstNameNoTooltip] в настоящее время не имеет [Concept('fleshcrafting', 'изменений плоти')|E]#!"