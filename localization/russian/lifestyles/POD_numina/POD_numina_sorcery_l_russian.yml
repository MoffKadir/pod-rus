 numina_oneiromancy_2_perk_name: "Онейромантия: $numina_2_name$"
 numina_oneiromancy_3_perk_name: "Онейромантия: $numina_3_name$"
 numina_oneiromancy_4_perk_name: "Онейромантия: $numina_4_name$"
 numina_oneiromancy_5_perk_name: "Онейромантия: $numina_5_name$"
 numina_oneiromancy_6_perk_name: "Онейромантия: $numina_6_name$"
 numina_oneiromancy_common_description: "#flavor Маги, освоившие путь Онейромантии, учатся проникать в чужие сны. Оказавшись там, они пытаются взять всё под свой контроль и могут собирать информацию или изменять сны на пользу или во вред сновидцу. На пике своего могущества онейроманты могут даже объединить нескольких людей в одном общем сне. Согласно легенде, некоторые из них могут даже воплощать сны в реальность или становиться способными физически проникать в сны.#!"

 NUMINA_ONEIROMANCY_1_PERK_EFFECT: "$numina_oneiromancy_common_description$
 NUMINA_ONEIROMANCY_2_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Вызывает у цели [stress_i]#V 15#! [Concept('stress', 'стресса')|E]. Цель также имеет #V 5%#! вероятность получить случайный негативный защитный механизм #V 2.5%#! вероятность пострадать от случайных ментальных хворей.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_3_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)]», повышая полученный [Concept('stress', 'стресс')|E] до [stress_i]#V 25#!, вероятность негативного защитного механизма до #V 10%#! и вероятность ментальной хвори до #V 5%#!.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_4_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)]», повышая полученный [Concept('stress', 'стресс')|E] до [stress_i]#V 50#!, вероятность негативного защитного механизма до #V 20%#! и вероятность ментальной хвори до #V 10%#!.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_5_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)]», повышая полученный [Concept('stress', 'стресс')|E] до [stress_i]#V 75#!, вероятность негативного защитного механизма до #V 30%#! и вероятность ментальной хвори до #V 15%#!.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_6_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)]», повышая полученный [Concept('stress', 'стресс')|E] до [stress_i]#V 100#!, вероятность негативного защитного механизма до #V 50%#! и вероятность ментальной хвори до #V 25%#!.\nДоступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('night_elves').GetName], [GetMaA('goblins').GetName], [GetMaA('duergar').GetName] и [GetMaA('nuckelavee').GetName].\n$numina_oneiromancy_common_description$"

 NUMINA_ONEIROMANCY_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Онейромантия#!#!"

 numina_quintessence_manipulation_1_perk_name: "Манипуляция квинтэссенцией: $numina_1_name$"
 numina_quintessence_manipulation_2_perk_name: "Манипуляция квинтэссенцией: $numina_2_name$"
 numina_quintessence_manipulation_3_perk_name: "Манипуляция квинтэссенцией: $numina_3_name$"
 numina_quintessence_manipulation_4_perk_name: "Манипуляция квинтэссенцией: $numina_4_name$"
 numina_quintessence_manipulation_5_perk_name: "Манипуляция квинтэссенцией: $numina_5_name$"
 numina_quintessence_manipulation_6_perk_name: "Манипуляция квинтэссенцией: $numina_6_name$"
 numina_quintessence_manipulation_common_description: "#flavor Почти все чародеи могут согласиться с одним фактом. Существует поток силы, который подпитывает их работу. Название этой силы имеет множество названий и философий: мана, ци, гнозис, шакти, сехем и многие другие. Каждый маг может описать поток энергии, когда он воздействует своей волей на реальность. Он проходит через них, как заряд по линии электропередачи, его можно почувствовать, а для некоторых его можно использовать напрямую.#!"

 NUMINA_QUINTESSENCE_MANIPULATION_1_PERK_EFFECT: "Можно использовать [Concept('artifacts', 'фетиши')|E]\nВражеские [Concept('knights', 'рыцари')|E]-#TOOLTIP:GAME_TRAIT,werewolf,[GetPlayer] #L вервольфы#!#! в [Concept('combat_phase', 'бою')|E] или ваши противники во время [Concept('single_combat_duel_plural', 'поединков')|E] получат [Concept('modifier', 'модификатор')|E] «[GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip]».\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_2_PERK_EFFECT: "Можно использовать [Concept('artifacts', 'артефакты')|E], подпитываемые ци\nВражеские [Concept('knights', 'рыцари')|E]-[GetTrait('kueijin').GetName(GetPlayer)|l] в [Concept('combat_phase', 'бою')|E] или ваши противники во время [Concept('single_combat_duel_plural', 'поединков')|E] получат [Concept('modifier', 'модификатор')|E] «[GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip]».\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_3_PERK_EFFECT: "Можно использовать демонические [Concept('artifacts', 'артефакты')|E]\nВражеские [Concept('knights', 'рыцари')|E]-#TOOLTIP:GAME_TRAIT,demon,[GetPlayer] #L демоны#!#! в [Concept('combat_phase', 'бою')|E] или ваши противники во время [Concept('single_combat_duel_plural', 'поединков')|E] получат [Concept('modifier', 'модификатор')|E] «[GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip]».\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_4_PERK_EFFECT: "Можно использовать [Concept('artifacts', 'артефакты')|E] фей\nВражеские [Concept('knights', 'рыцари')|E]-#TOOLTIP:GAME_TRAIT,fae,[GetPlayer] #L феи#!#! в [Concept('combat_phase', 'бою')|E] или ваши противники во время [Concept('single_combat_duel_plural', 'поединков')|E] получат [Concept('modifier', 'модификатор')|E] «[GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip]».\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_5_PERK_EFFECT: "Можно использовать магические [Concept('artifacts', 'артефакты')|E]\nВражеские [Concept('knights', 'рыцари')|E]-#TOOLTIP:GAME_TRAIT,mage,[GetPlayer] #L маги#!#! в [Concept('combat_phase', 'бою')|E] или ваши противники во время [Concept('single_combat_duel_plural', 'поединков')|E] получат [Concept('modifier', 'модификатор')|E] «[GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip]».\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_6_PERK_EFFECT: "Вражеские [Concept('knights', 'рыцари')|E] в [Concept('combat_phase', 'бою')|E] или ваши противники во время [Concept('single_combat_duel_plural', 'поединков')|E] получат [Concept('modifier', 'модификатор')|E] «[GetModifier('numina_sorcery_quintessence_manipulation_6_malus_modifier').GetNameWithTooltip]».\n$numina_quintessence_manipulation_common_description$"

 NUMINA_QUINTESSENCE_MANIPULATION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Манипуляция квинтэссенцией#!#!"

 numina_shadows_1_perk_name: "Тени: $numina_1_name$"
 numina_shadows_2_perk_name: "Тени: $numina_2_name$"
 numina_shadows_3_perk_name: "Тени: $numina_3_name$"
 numina_shadows_4_perk_name: "Тени: $numina_4_name$"
 numina_shadows_5_perk_name: "Тени: $numina_5_name$"
 numina_shadows_6_perk_name: "Тени: $numina_6_name$"
 numina_shadows_common_description: "#flavor Власть над тьмой - это клише, за которое некоторые чародеи без проблем цепляются из-за иронического легкомыслия или искренней веры. Не будет ошибкой предположить, что путь Теней является источником концепции о том, что тёмные силы расширяют возможности мистических искусств, учитывая, как часто об этом заявляют хитрецы. Независимо от своей репутации, тропа действительно несёт в себе дурные предчувствия и пугающую атмосферу, поскольку она формирует и изменяет субстанцию инстинктивного страха — тени и тьму.#!"

 NUMINA_SHADOWS_1_PERK_EFFECT: "$numina_shadows_common_description$"
 NUMINA_SHADOWS_2_PERK_EFFECT: "Вражеские [Concept('knights', 'рыцари')|E] в [Concept('combat_phase', 'бою')|E] или ваши противники во время [Concept('single_combat_duel_plural', 'поединков')|E] получат [Concept('modifier', 'модификатор')|E] «[GetModifier('numina_shadows_2_modifier').GetNameWithTooltip]» на #V 6 месяцев#!.\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_3_PERK_EFFECT: "Улучшает [Concept('modifier', 'модификатор')|E] достоинства «[GetPerk('numina_shadows_2_perk').GetName(GetPlayer)]» до «[GetModifier('numina_shadows_3_modifier').GetNameWithTooltip]».\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_4_PERK_EFFECT: "Улучшает [Concept('modifier', 'модификатор')|E] достоинства «[GetPerk('numina_shadows_2_perk').GetName(GetPlayer)]» до «[GetModifier('numina_shadows_4_modifier').GetNameWithTooltip]».\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_5_PERK_EFFECT: "Улучшает [Concept('modifier', 'модификатор')|E] достоинства «[GetPerk('numina_shadows_2_perk').GetName(GetPlayer)]» до «[GetModifier('numina_shadows_5_modifier').GetNameWithTooltip]».\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_6_PERK_EFFECT: "Улучшает [Concept('modifier', 'модификатор')|E] достоинства «[GetPerk('numina_shadows_2_perk').GetName(GetPlayer)]» до «[GetModifier('numina_shadows_6_modifier').GetNameWithTooltip]».\n$numina_shadows_common_description$"

 NUMINA_SHADOWS_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Тени#!#!"

 numina_shapeshifting_1_perk_name: "Превращение: $numina_1_name$"
 numina_shapeshifting_2_perk_name: "Превращение: $numina_2_name$"
 numina_shapeshifting_3_perk_name: "Превращение: $numina_3_name$"
 numina_shapeshifting_4_perk_name: "Превращение: $numina_4_name$"
 numina_shapeshifting_5_perk_name: "Превращение: $numina_5_name$"
 numina_shapeshifting_6_perk_name: "Превращение: $numina_6_name$"
 numina_shapeshifting_common_description: "#flavor Даже среди первобытной магии способность превращаться в животное выделяется как исключительная. Многие монстры, обитающие в ночи, обладают способностью к трансформации, в том числе и те, кто является истинными перевёртышами. Чародеи, изучающие путь Превращения, имитируют определённую часть своей силы, преображая сначала отдельные части себя, а затем и всё своё тело коренным образом.#!"

 NUMINA_SHAPESHIFTING_1_PERK_EFFECT: "Вариант [Concept('shapeshift', 'смены облика')|E]: Можно изменить свои черты лица.\nВариант [Concept('shapeshift', 'смены облика')|E]: Можно изменить визуальный возраст (для бессмертных).\n$numina_shapeshifting_common_description$"
 NUMINA_SHAPESHIFTING_2_PERK_EFFECT: "Вариант [Concept('shapeshift', 'смены облика')|E]: Можно принять #V звериную форму#!.\nВариант [Concept('shapeshift', 'смены облика')|E]: Можно получить до #V 2#! звериных черт, чтобы добавить их к своей #V звериной форме#!, или улучшить существующую черту.\n$numina_shapeshifting_common_description$"
 NUMINA_SHAPESHIFTING_3_PERK_EFFECT: "Предоставляет #V 2#! дополнительные звериные черты для включения в вашу #V звериную форму#!.\nВариант [Concept('shapeshift', 'смены облика')|E]: Можно принять различные звериные формы.\n$numina_shapeshifting_common_description$"
