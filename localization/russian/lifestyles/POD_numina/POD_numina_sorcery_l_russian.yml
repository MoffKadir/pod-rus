 numina_shadows_6_perk_name: "Тени: $numina_6_name$"
 numina_shadows_common_description: "#flavor Power over darkness is a cliché that some sorcerers have no problem clinging to out of ironic giddiness or genuine belief. One wouldn't be remiss in guessing the Path of Shadows as the source of the concept that dark forces empower the mystic arts, given how often hucksters make the claim. Regardless of its reputation, the Path does carry a foreboding and intimidating air, as it shapes and shifts the substance of instinctual fear — shadows and darkness.#!"
 
 NUMINA_SHADOWS_1_PERK_EFFECT: "$numina_shadows_common_description$"
 NUMINA_SHADOWS_2_PERK_EFFECT: "Inflict [GetModifier('numina_shadows_2_modifier').GetNameWithTooltip] [modifier|E] for #V 6 months#! on enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or on your foe during [single_combat_duel_plural|E].\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_3_PERK_EFFECT: "Improves the [GetPerk('numina_shadows_2_perk').GetName(GetPlayer)] [modifier|E] to [GetModifier('numina_shadows_3_modifier').GetNameWithTooltip].\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_4_PERK_EFFECT: "Improves the [GetPerk('numina_shadows_2_perk').GetName(GetPlayer)] [modifier|E] to [GetModifier('numina_shadows_4_modifier').GetNameWithTooltip].\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_5_PERK_EFFECT: "Improves the [GetPerk('numina_shadows_2_perk').GetName(GetPlayer)] [modifier|E] to [GetModifier('numina_shadows_5_modifier').GetNameWithTooltip].\n$numina_shadows_common_description$"
 NUMINA_SHADOWS_6_PERK_EFFECT: "Improves the [GetPerk('numina_shadows_2_perk').GetName(GetPlayer)] [modifier|E] to [GetModifier('numina_shadows_6_modifier').GetNameWithTooltip].\n$numina_shadows_common_description$"

