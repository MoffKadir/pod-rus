 numina_ephemera_1_perk_name: "Эфемера: $numina_1_name$"
 numina_ephemera_2_perk_name: "Эфемера: $numina_2_name$"
 numina_ephemera_3_perk_name: "Эфемера: $numina_3_name$"
 numina_ephemera_4_perk_name: "Эфемера: $numina_4_name$"
 numina_ephemera_5_perk_name: "Эфемера: $numina_5_name$"
 numina_ephemera_6_perk_name: "Эфемера: $numina_6_name$"
 numina_ephemera_common_description: "#flavor Некоторые маги — те, кто следует путём Некромантии, — повелевают духами. Те, кто следует путём Эфемеры, стремятся к более близким отношениям с ними. Для магов, которые используют путь Эфемеры, их отношения с духами больше похожи на отношения семьи и друзей, чем на отношения хозяина и слуги. Когда они вызывают духа, это приглашение, а не повестка в суд. Вместо того, чтобы связывать духов и командовать ими, путь Эфемеры позволяет магу вести с ними переговоры.#!"

 NUMINA_EPHEMERA_1_PERK_EFFECT: "Можно взаимодействовать с персонажами по ту сторону Барьера.\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_2_PERK_EFFECT: "Можно выучить #V 1#! дополнительный [Concept('language', 'язык')|E] без каких-либо штрафов.\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_3_PERK_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('jagglings').GetName].\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_4_PERK_EFFECT: "$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_5_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Совершает ложный шиминаж, чтобы слегка повысить ранг [Concept('spirit_companion', 'спутника-духа')|E] #ONCLICK:FAITH,velvet_brood #TOOLTIP:FAITH,velvet_brood Геи#!#!.\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_6_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_ephemera_5_perk').GetName(GetPlayer)]», удваивая его эффект.\nУдаляет затраты на вход в [UmbraGlossary('spirit_wilds')].\nВы получите [Concept('trait', 'свойство')|E] #V [GetTrait('immortal').GetName(GetPlayer)]#!\n$numina_ephemera_common_description$"

 NUMINA_EPHEMERA_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Эфемера#!#!"

 numina_fascination_1_perk_name: "Очарование: $numina_1_name$"
 numina_fascination_2_perk_name: "Очарование: $numina_2_name$"
 numina_fascination_3_perk_name: "Очарование: $numina_3_name$"
 numina_fascination_4_perk_name: "Очарование: $numina_4_name$"
 numina_fascination_5_perk_name: "Очарование: $numina_5_name$"
 numina_fascination_6_perk_name: "Очарование: $numina_6_name$"
 numina_fascination_common_description: "#flavor Истории о чародеях-обольстителях встречаются в народных сказках по всему миру. Коварные чародеи подчиняют своей власти невинных, а сделки, заключаемые ради власти, завладевают сердцами и умами тех, кто настолько глуп, что отдает свои души в обмен на такие сделки. Зерно истины в этой старой поговорке прочно, как алмаз. Недобросовестные фокусники, подчиняющие умы других людей своей воле, практиковали этот путь с тех пор, как все захотели, чтобы другие просто действовали или думали в соответствии с их желаниями.#!"

 NUMINA_FASCINATION_1_PERK_EFFECT: "$numina_fascination_common_description$"
 NUMINA_FASCINATION_1_PERK_REASON: "[GetPerk('numina_fascination_1_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 NUMINA_FASCINATION_2_PERK_EFFECT: "Открывает [Concept('scheme', 'происки')|E] «[GetScheme('befriend').GetTypeName]».\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_3_PERK_EFFECT: "[Concept('characters', 'Персонажи')|E] менее склонны присоединяться к [Concept('factions', 'фракциям')|E] и участвовать в [Concept('schemes', 'происках')|E] как соучастники.\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_3_PERK_REASON: "[GetPerk('numina_fascination_3_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 NUMINA_FASCINATION_4_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Предоставляет [Concept('weak_hook', 'слабое влияние')|E] на цель.\nВаши [Concept('friends', 'друзья')|E] и [Concept('best_friends', 'лучшие друзья')|E] иногда будут пытаться начинать [Concept('scheme', 'происки')|E] «[GetScheme('murder').GetTypeName]» против ваших [Concept('rivals', 'соперников')|E].\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_5_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_fascination_4_perk').GetName(GetPlayer)]», вместо этого предоставляя [Concept('strong_hook', 'сильное влияние')|E].\nВаши [Concept('lovers', 'любовники')|E] иногда будут пытаться начинать [Concept('scheme', 'происки')|E] «[GetScheme('murder').GetTypeName]» против ваших [Concept('rivals', 'соперников')|E].\nПредоставляет сильную ментальную защиту.\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_5_PERK_REASON: "[GetPerk('numina_fascination_5_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 NUMINA_FASCINATION_6_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Распускает все [Concept('factions', 'фракции')|E] и [Concept('schemes', 'происки')|E] против цели, если их владельцы не имеют сильную ментальную защиту.\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_6_PERK_REASON: "[GetPerk('numina_fascination_6_perk').GetName(GetPlayer)]: $VALUE|0+=$"

 NUMINA_FASCINATION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Очарование#!#!"

 numina_fortune_1_perk_name: "Удача: $numina_1_name$"
 numina_fortune_2_perk_name: "Удача: $numina_2_name$"
 numina_fortune_3_perk_name: "Удача: $numina_3_name$"
 numina_fortune_4_perk_name: "Удача: $numina_4_name$"
 numina_fortune_5_perk_name: "Удача: $numina_5_name$"
 numina_fortune_6_perk_name: "Удача: $numina_6_name$"
 numina_fortune_common_description: "#flavor Судьба непостоянна, даже если не принимать во внимание манипуляции магов. Путь Удачи позволяет им использовать удачу как оружие, уничтожая врагов проклятиями или укрепляя союзников благословениями. Хотя методы и объяснения могут быть самыми разными - от сглаза до Божьей руки и манипулирования вероятностями, на пути Удачи никогда не случается по-настоящему невозможного, только крайне маловероятное. Это также один из наименее точных путей: в то время как чародей приводит в движение Удачу и контролирует величину и общий диапазон потенциальных результатов, последствия этого пути часто застают их врасплох или растворяются в шуме повседневной жизни.#!"

 NUMINA_FORTUNE_1_PERK_EFFECT: "$numina_fortune_common_description$"
 NUMINA_FORTUNE_2_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Накладывает проклятие, которое ранит цель, принадлежащую к [Concept('splat', 'виду')|E], напоминающую смертных (например, [GetTrait('ghoul').GetName(GetNullCharacter)|l], [GetTrait('revenant').GetName(GetNullCharacter)|l], [GetTrait('kinfolk').GetName(GetNullCharacter)|l]).\n@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Благословляет цель, накладывая модификатор «[GetModifier('numina_fortune_2_bless_modifier').GetNameWithTooltip]».\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_3_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Совершает ритуал наведения, чтобы получить [gold_i]#V 50#!.\nУлучшает #TOOLTIP:PERK,numina_fortune_2_perk #L проклинающее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], ухудшая состояние нанесённой раны.\nУлучшает #TOOLTIP:PERK,numina_fortune_2_perk #L благословляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], вместо этого накладывая модификатор «[GetModifier('numina_fortune_3_bless_modifier').GetNameWithTooltip]».\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_4_PERK_EFFECT: "Улучшает #TOOLTIP:PERK,numina_fortune_2_perk #L проклинающее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], нанося цели увечье.\nУлучшает #TOOLTIP:PERK,numina_fortune_2_perk #L благословляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], вместо этого накладывая модификатор «[GetModifier('numina_fortune_4_bless_modifier').GetNameWithTooltip]».\nУлучшает #TOOLTIP:PERK,numina_fortune_3_perk #L наводящее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], повышая доход до [gold_i]#V 100#!.\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_5_PERK_EFFECT: "Улучшает #TOOLTIP:PERK,numina_fortune_2_perk #L проклинающее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], позволяя нацеливаться на любой материальный [Concept('splat', 'вид')|E] моложе #V 500#! лет.\nУлучшает #TOOLTIP:PERK,numina_fortune_2_perk #L благословляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], вместо этого накладывая модификатор «[GetModifier('numina_fortune_5_bless_modifier').GetNameWithTooltip]».\nУлучшает #TOOLTIP:PERK,numina_fortune_3_perk #L наводящее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], повышая доход до [gold_i]#V 150#!.\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_6_PERK_EFFECT: "Улучшает #TOOLTIP:PERK,numina_fortune_2_perk #L проклинающее#!#! [Concept('bs_spell', 'заклинание')|E], позволяя нацеливаться на любой [Concept('splat', 'вид')|E].\nУлучшает #TOOLTIP:PERK,numina_fortune_2_perk #L благословляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], вместо этого накладывая модификатор «[GetModifier('numina_fortune_6_bless_modifier').GetNameWithTooltip]».\nУлучшает #TOOLTIP:PERK,numina_fortune_3_perk #L наводящее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], повышая доход до [gold_i]#V 200#!.\n$numina_fortune_common_description$"

 NUMINA_FORTUNE_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Удача#!#!"

 numina_healing_1_perk_name: "Исцеление: $numina_1_name$"
 numina_healing_2_perk_name: "Исцеление: $numina_2_name$"
 numina_healing_3_perk_name: "Исцеление: $numina_3_name$"
 numina_healing_4_perk_name: "Исцеление: $numina_4_name$"
 numina_healing_5_perk_name: "Исцеление: $numina_5_name$"
 numina_healing_6_perk_name: "Исцеление: $numina_6_name$"
 numina_healing_common_description: "#flavor Везде, где процветает человечество, существует потребность в исцелении. С самого зарождения цивилизации целители возникали из чувства сопереживания и общественных потребностей, они учились служить своему народу на основе традиций, общения с духами, методом проб и ошибок и множеством других способов.#!"

 NUMINA_HEALING_1_PERK_EFFECT: "$numina_healing_common_description$"
 NUMINA_HEALING_2_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Исцеляет обычную хворь, такую как «[GetTrait('ill').GetName(GetPlayer)]» или «[GetTrait('sickly').GetName(GetPlayer)]».\n@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Исцеляет [EmptyScope.ScriptValue('POD_numina_sorcery_healing_2_heal')|V0] ед. @health_track_damage_icon! [Concept('POD_superficial_damage', 'поверхностного урона')|E].\n$numina_healing_common_description$"
 NUMINA_HEALING_3_PERK_EFFECT: "Улучшает #TOOLTIP:PERK,numina_healing_2_perk #L исцеляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], также исцеляя «[GetTrait('disfigured').GetName(GetPlayer)]».\n$numina_healing_common_description$"
 NUMINA_HEALING_4_PERK_EFFECT: "Улучшает #TOOLTIP:PERK,numina_healing_2_perk #L исцеляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], также исцеляя серьёзные хвори, такие как «[GetTrait('pneumonic').GetName(GetPlayer)]», «[GetTrait('consumption').GetName(GetPlayer)]» и т.д.\n$numina_healing_common_description$"
 NUMINA_HEALING_5_PERK_EFFECT: "Улучшает #TOOLTIP:PERK,numina_healing_2_perk #L исцеляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], повышая количество исцелённого @health_track_damage_icon! [Concept('POD_superficial_damage', 'поверхностного урона')|E] до [EmptyScope.ScriptValue('POD_numina_sorcery_healing_5_heal')|V0] ед. и @health_track_aggravated_damage_icon! [Concept('POD_aggravated_damage', 'серьёзного урона')|E] до [EmptyScope.ScriptValue('POD_numina_sorcery_healing_5_aggravated_heal')|V0] ед. Оно также исцеляет [Concept('traits', 'свойства')|E] увечий, такие как «[GetTrait('one_eyed').GetName(GetPlayer)]», «[GetTrait('maimed').GetName(GetPlayer)]» и т.д.\nУлучшает #TOOLTIP:PERK,numina_healing_2_perk #L исцеляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], также исцеляя неизлечимые хвори, такие как «[GetTrait('cancer').GetName(GetPlayer)]» или «[GetTrait('infirm').GetName(GetPlayer)]».\n$numina_healing_common_description$"
 NUMINA_HEALING_6_PERK_EFFECT: "Ячейки [Concept('POD_health_track', 'здоровья')|E]: #P +1#!\nУлучшает #TOOLTIP:PERK,numina_healing_2_perk #L исцеляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], повышая количество исцелённого @health_track_damage_icon! [Concept('POD_superficial_damage', 'поверхностного урона')|E] до [EmptyScope.ScriptValue('POD_numina_sorcery_healing_6_heal')|V0] ед. и @health_track_aggravated_damage_icon! [Concept('POD_aggravated_damage', 'серьёзного урона')|E] до [EmptyScope.ScriptValue('POD_numina_sorcery_healing_6_aggravated_heal')|V0] ед.\nУлучшает #TOOLTIP:PERK,numina_healing_2_perk #L исцеляющее#!#! @sorcerer_icon![Concept('bs_spell', 'заклинание')|E], также исцеляя сверхъестественные хвори, такие как «[GetTrait('chulorviosis').GetName(GetPlayer)]» или «[GetTrait('crimson_fever').GetName(GetPlayer)]».\nВы получите [Concept('trait', 'свойство')|E] #V [GetTrait('immortal').GetName(GetPlayer)]#!\n$numina_healing_common_description$"

 NUMINA_HEALING_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Исцеление#!#!"

 numina_hellfire_1_perk_name: "Адское пламя: $numina_1_name$"
 numina_hellfire_2_perk_name: "Адское пламя: $numina_2_name$"
 numina_hellfire_3_perk_name: "Адское пламя: $numina_3_name$"
 numina_hellfire_4_perk_name: "Адское пламя: $numina_4_name$"
 numina_hellfire_5_perk_name: "Адское пламя: $numina_5_name$"
 numina_hellfire_6_perk_name: "Адское пламя: $numina_6_name$"
 numina_hellfire_common_description: "#flavor По слухам, адское пламя, возникающее в результате инфернальных сделок, наделяет заклинателя огромной разрушительной силой. Хотя обычно она вызывает огонь, были замечены варианты, которые вызывают молнию, мокрый снег, песчаные бури, землетрясения или дым. Путь Адского пламени не обладает индивидуальными способностями, дальнейшее продвижение позволяет лишь призвать ещё больше разрушительных сил.#!"

