 numina_alchemy_1_perk_name: "Алхимия: $numina_1_name$"
 numina_alchemy_2_perk_name: "Алхимия: $numina_2_name$"
 numina_alchemy_3_perk_name: "Алхимия $numina_3_name$"
 numina_alchemy_4_perk_name: "Алхимия: $numina_4_name$"
 numina_alchemy_5_perk_name: "Алхимия: $numina_5_name$"
 numina_alchemy_6_perk_name: "Алхимия: $numina_6_name$"
 numina_alchemy_common_description: "#flavor Алхимия - это древнее искусство и наука, изучающая трансформацию и очищение. Практикующие её используют различные методы, как магические, так и научные, чтобы понять скрытые свойства материи и души. Самой традиционной целью алхимии является не более известное превращение простых веществ в более «благородные» аналоги, такие как свинец в золото, а скорее совершенствование алхимика.#!"

 NUMINA_ALCHEMY_1_PERK_EFFECT: "$unlock_brewing_node$ «[GetModifier('alchemy_antidepresants_1_modifier').GetNameWithTooltip]»\n$unlock_brewing_node$ «[GetModifier('alchemy_aphrodisiac_1_modifier').GetNameWithTooltip]»\n$unlock_brewing_node$ «[GetModifier('alchemy_poison_1_modifier').GetNameWithTooltip]»\n$unlock_brewing_node$ «[GetModifier('alchemy_antibiotics_1_modifier').GetNameWithTooltip]»\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_2_PERK_EFFECT: "Улучшает все [Concept('crafting_nodes', 'узлы')|E] достоинства «[GetPerk('numina_alchemy_1_perk').GetName(GetPlayer)]»\n$unlock_brewing_node$, добавляющий [Concept('modifier', 'модификатор')|E], увеличивающий случайный [Concept('skill', 'навык')|E] на 1 ([GetModifier('alchemy_stimulant_diplomacy_modifier').GetNameWithTooltip])\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_3_PERK_EFFECT: "Улучшает все [Concept('crafting_nodes', 'узлы')|E] достоинства «[GetPerk('numina_alchemy_2_perk').GetName(GetPlayer)]»\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_4_PERK_EFFECT: "Улучшает все [Concept('crafting_nodes', 'узлы')|E] достоинства «[GetPerk('numina_alchemy_3_perk').GetName(GetPlayer)]»\n$unlock_brewing_node$ «[GetModifier('alchemy_health_booster_1_modifier').GetNameWithTooltip]»\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_5_PERK_EFFECT: "Улучшает все [Concept('crafting_nodes', 'узлы')|E] достоинства «[GetPerk('numina_alchemy_4_perk').GetName(GetPlayer)]»\n$unlock_brewing_node$ #TOOLTIP:GAME_TRAIT,immortal,[GetNullCharacter] #L Бессмертие#!\n$unlock_brewing_node$ #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L Вампиризм#!\nПродолжительность действия зелья: #P +1#!\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_6_PERK_EFFECT: "Улучшает все [Concept('crafting_nodes', 'узлы')|E] достоинства «[GetPerk('numina_alchemy_5_perk').GetName(GetPlayer)]»\n$unlock_brewing_node$ Повышает выбранный [Concept('skill', 'навык')|E] на #P 1#! благодаря принесению в жертву [Concept('character', 'персонажа')|E] с этим [Concept('skill', 'навыком')|E] выше #bold [EmptyScope.ScriptValue('POD_numina_sorcery_alchemy_skill_potion_requirement')]#!\nПродолжительность действия зелья: #P +2#!\n$numina_alchemy_common_description$"

 NUMINA_ALCHEMY_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Алхимия#!#!"

 numina_conjuration_1_perk_name: "Призыв: $numina_1_name$"
 numina_conjuration_2_perk_name: "Призыв: $numina_2_name$"
 numina_conjuration_3_perk_name: "Призыв: $numina_3_name$"
 numina_conjuration_4_perk_name: "Призыв: $numina_4_name$"
 numina_conjuration_5_perk_name: "Призыв: $numina_5_name$"
 numina_conjuration_6_perk_name: "Призыв: $numina_6_name$"
 numina_conjuration_common_description: "#flavor Призыв - это основной путь сценических магов: вытаскивание кроликов из шляп и карточек из карманов зрителей - обычные примеры его применения. Чародеи, которые хотят зарабатывать на жизнь своими занятиями, часто учатся Призыву. Из-за этой неразрывной связи со сценической магией Спящие склонны считать Призыв просто искусной ловкостью рук.#!"

 NUMINA_CONJURATION_1_PERK_EFFECT: "$numina_conjuration_common_description$"
 NUMINA_CONJURATION_2_PERK_EFFECT: "$numina_conjuration_common_description$"
 NUMINA_CONJURATION_3_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Призывает случайного питомца.\n$numina_conjuration_common_description$"
 NUMINA_CONJURATION_4_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Призывает случайный [Concept('artifact', 'артефакт')|E] #color_dark_green мастерского#! качества.\n$numina_conjuration_common_description$"
 NUMINA_CONJURATION_5_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Призывает #TOOLTIP:GAME_TRAIT,mortal,[GetPlayer] #L смертную#!#! или добровольную сверхъестественную цель.\nУлучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_conjuration_4_perk').GetName(GetPlayer)]», вместо этого призывая #FAMEDBLUE знаменитый#! [Concept('artifact', 'артефакт')|E].\n$numina_conjuration_common_description$"
 NUMINA_CONJURATION_6_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Призывает #TOOLTIP:GAME_TRAIT,demon,[GetPlayer] #L демона#!#! из Бездны. При нацеливании на себя призывает случайного демона, при выборе персонажа-#TOOLTIP:GAME_TRAIT,demon,[GetPlayer] #L демона#!#! с модификатором «[GetModifier('trapped_in_abyss_modifier').GetNameWithTooltip]», призывается конкретный персонаж.\nУлучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_conjuration_4_perk').GetName(GetPlayer)]», вместо этого призывая #ILLUSTRIOUSPURPLE великолепный#! [Concept('artifact', 'артефакт')|E].\nУлучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_conjuration_5_perk').GetName(GetPlayer)]», удаляя требования к мнению.\n$numina_conjuration_common_description$"

 NUMINA_CONJURATION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Призыв#!#!"

 numina_conveyance_1_perk_name: "Перемещение: $numina_1_name$"
 numina_conveyance_2_perk_name: "Перемещение: $numina_2_name$"
 numina_conveyance_3_perk_name: "Перемещение: $numina_3_name$"
 numina_conveyance_4_perk_name: "Перемещение: $numina_4_name$"
 numina_conveyance_5_perk_name: "Перемещение: $numina_5_name$"
 numina_conveyance_6_perk_name: "Перемещение: $numina_6_name$"
 numina_conveyance_common_description: "#flavor Мечтая о телепортации или полётах на метлах, люди всегда хотели быстро перемещаться с места на место. Независимо от того, насколько быстро у них это получается, этого никогда не бывает достаточно, и многие обращаются к магии и необычным наукам, чтобы добраться туда, куда они направляются, намного быстрее. До тех пор, пока они не достигнут вершин мастерства владения путём, чародею, использующему путь Перемещения, требуется какое-то транспортное средство, которое маг готовит для одиночного путешествия.#!"

 NUMINA_CONVEYANCE_1_PERK_EFFECT: "$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_2_PERK_EFFECT: "$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_3_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Позволяет телепортироваться в следующий пункт назначения во время путешествия.\n$numina_conveyance_common_description$
 NUMINA_CONVEYANCE_4_PERK_EFFECT: "$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_5_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Позволяет телепортировать армию, которой командуете вы, в выбранную локацию.\n$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_6_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_conveyance_5_perk').GetName(GetPlayer)]», снимая ограничения к размеру армии.\n$numina_conveyance_common_description$"

 NUMINA_CONVEYANCE_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Перемещение#!#!"

 numina_divination_1_perk_name: "Прорицание: $numina_1_name$"
 numina_divination_2_perk_name: "Прорицание: $numina_2_name$"
 numina_divination_3_perk_name: "Прорицание: $numina_3_name$"
 numina_divination_4_perk_name: "Прорицание: $numina_4_name$"
 numina_divination_5_perk_name: "Прорицание: $numina_5_name$"
 numina_divination_6_perk_name: "Прорицание: $numina_6_name$"
 numina_divination_common_description: "#flavor Гадание на чайных листьях, нанесение рун на камни или кости, изучение ночного неба — всё это примеры традиционных практик Прорицания, вариации которых охватывают множество культур. С тех пор как появилась концепция будущего, люди хотели знать, что оно им готовит. Чародей, занимающийся Прорицанием, пытается предсказать будущее. Однако будущее - это постоянно меняющаяся и запутанная история. Колдун может использовать гадание, чтобы найти ключи к наиболее вероятным исходам, но мудрый провидец знает ценность точной интерпретации неточной и похожей на сон символики, чтобы оценить вероятные изменения вероятности.#!"

 NUMINA_DIVINATION_1_PERK_EFFECT: "$countermeasures_unlocks_t1_all_seeing_eye$\n$numina_divination_common_description$"
 NUMINA_DIVINATION_2_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Раскрывает случайный [Concept('secret', 'секрет')|E] цели.\n$numina_divination_common_description$"
 NUMINA_DIVINATION_3_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\n$numina_divination_common_description$"
 NUMINA_DIVINATION_4_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Раскрывает случайные [Concept('scheme', 'происки')|E] цели.\nВы получите уведомление, если кто-то задумает убить ваших друзей или членов семьи.\n$numina_divination_common_description$"
 NUMINA_DIVINATION_5_PERK_EFFECT: "@sorcerer_icon![Concept('bs_spell', 'Заклинание')|E]: Раскрывает случайные [Concept('scheme', 'происки')|E], нацеленные на выбранного персонажа.\n$countermeasures_unlocks_t3_all_seeing_eye$\n$numina_divination_common_description$"
 NUMINA_DIVINATION_6_PERK_EFFECT: "Улучшает @sorcerer_icon![Concept('bs_spell', 'заклинание')|E] достоинства «[GetPerk('numina_divination_5_perk').GetName(GetPlayer)]», также завершая раскрытые [Concept('scheme', 'происки')|E].\n$countermeasures_unlocks_t4_all_seeing_eye$\n$numina_divination_common_description$"

 NUMINA_DIVINATION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Прорицание#!#!"

 numina_enchantment_1_perk_name: "Зачарование: $numina_1_name$"
 numina_enchantment_2_perk_name: "Зачарование: $numina_2_name$"
 numina_enchantment_3_perk_name: "Зачарование: $numina_3_name$"
 numina_enchantment_4_perk_name: "Зачарование: $numina_4_name$"
 numina_enchantment_5_perk_name: "Зачарование: $numina_5_name$"
 numina_enchantment_6_perk_name: "Зачарование: $numina_6_name$"
 numina_enchantment_common_description: "#flavor Путь Зачарования вознаграждает за терпение и предусмотрительность больше, чем любой другой путь. На этом пути нет заклинаний, только ритуалы, в том числе долгие и сложные ритуалы создания магических предметов, называемых артефактами. Каждый из этих артефактов должен быть тщательно обработан зачарователем. Первым шагом является создание обычного базового предмета. Обычно чародеи изготавливают его вручную, используя все свои навыки, чтобы создать подходящий сосуд для своей магии. Однако иногда подходящий сосуд можно найти в виде редкого или древнего предмета. Как только сосуд будет изготовлен или найден, зачарователь может приступить к процессу наполнения предмета магической энергией для последующего использования.#!"

 NUMINA_ENCHANTMENT_1_PERK_EFFECT: "Улучшает базовые [Concept('crafting_nodes', 'узлы ремесла')|E]\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_2_PERK_EFFECT: "Улучшает базовые [Concept('crafting_nodes', 'узлы ремесла')|E]\nОткрывает слабые версии базовых [Concept('crafting_nodes', 'узлов ремесла')|E] для [Concept('crafting_enhancing', 'улучшения')|E]\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_3_PERK_EFFECT: "Улучшает базовые [Concept('crafting_nodes', 'узлы ремесла')|E] и их версии [Concept('crafting_enhancing', 'улучшения')|E]\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_4_PERK_EFFECT: "Улучшает базовые [Concept('crafting_nodes', 'узлы ремесла')|E] и их версии [Concept('crafting_enhancing', 'улучшения')|E]\n$unlock_forging_node$ Добавляет [Concept('modifier','модификатор')|E], увеличивающий случайный [Concept('skill','навык')|E] ([GetModifier('enchantment_attribute_diplomacy_modifier').GetNameWithTooltip]) с огранничением в 1 [Concept('crafting_node', 'узел')|E] за сессию ремесла\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_5_PERK_EFFECT: "Улучшает базовые [Concept('crafting_nodes', 'узлы ремесла')|E] и их версии [Concept('crafting_enhancing', 'улучшения')|E]\nИзменяет ограничения достоинства «[GetPerk('numina_enchantment_4_perk').GetName(GetPlayer)]» с 1 до 2\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_6_PERK_EFFECT: "Улучшает базовые [Concept('crafting_nodes', 'узлы ремесла')|E] и их версии [Concept('crafting_enhancing', 'улучшения')|E]\nСнимает ограничения достоинства «[GetPerk('numina_enchantment_4_perk').GetName(GetPlayer)]»для [Concept('crafting_forging', 'ковки')|E], и повышает их для [Concept('crafting_enhancing', 'улучшения')|E]\n$numina_enchantment_common_description$"

