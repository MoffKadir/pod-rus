 numina_weather_control_6_perk_name: "Управление погодой: $numina_6_name$"
 numina_weather_control_common_description: "#flavor In societies that relied heavily on agriculture or seafaring, those who could control the weather were prized, often being the difference between life and death in their communities. Famines have been prevented or ended, and the most powerful sorcerers have been known to dispel or divert natural disasters. Weather control allows sorcerers to do what it says on the package — they can control the weather.#!"
 
 NUMINA_WEATHER_CONTROL_1_PERK_EFFECT: "Can predict natural hazards\n$numina_weather_control_common_description$"
 NUMINA_WEATHER_CONTROL_2_PERK_EFFECT: "$numina_weather_control_common_description$"
 NUMINA_WEATHER_CONTROL_3_PERK_EFFECT: "Can prevent or strengthen natural hazards\n$numina_weather_control_common_description$"
 NUMINA_WEATHER_CONTROL_4_PERK_EFFECT: "$numina_weather_control_common_description$"
 NUMINA_WEATHER_CONTROL_5_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Cause natural hazards in realms smaller than 50 counties\n$numina_weather_control_common_description$"
 NUMINA_WEATHER_CONTROL_6_PERK_EFFECT: "Improves [GetPerk('numina_weather_control_5_perk').GetName(GetPlayer)] by lifting the realm size limit.\n$numina_weather_control_common_description$"

 NUMINA_WEATHER_CONTROL_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Управление погодой#!#!"