 numina_illusion_1_perk_name: "Иллюзия: $numina_1_name$"
 numina_illusion_2_perk_name: "Иллюзия: $numina_2_name$"
 numina_illusion_3_perk_name: "Иллюзия: $numina_3_name$"
 numina_illusion_4_perk_name: "Иллюзия: $numina_4_name$"
 numina_illusion_5_perk_name: "Иллюзия: $numina_5_name$"
 numina_illusion_6_perk_name: "Иллюзия: $numina_6_name$"
 numina_illusion_common_description: "#flavor Одна из самых фундаментальных магических способностей - это способность обманывать других, заставляя их верить в то, чего хочет маг. Путь Иллюзии вводит в заблуждение органы чувств, заставляя своих жертв воспринимать то, чего на самом деле нет, или изменяя их восприятие того, что есть. Большинство людей доверяют своим чувствам. «Увидеть - значит поверить», но когда рядом иллюзионист, эта старая пословица может убить вас.#!"

 NUMINA_ILLUSION_1_PERK_EFFECT: "Повышает вероятность успеха [Concept('decision', 'решения')|E] «[GetDecision('escape_from_prison_decision').GetName]».\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_2_PERK_EFFECT: "В начале [Concept('war', 'войны')|E] до её конца призывается [Concept('army', 'армия')|E] из #V 100#! профессионалов ([GetMaA('illusionary_combatants').GetName]).\n$countermeasures_unlocks_t1_obfuscated_court$\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_3_PERK_EFFECT: "Улучшает достоинство «[GetPerk('numina_illusion_2_perk').GetName(GetPlayer)]», повышая количество призванных профессионалов ([GetMaA('illusionary_combatants').GetName]) до #V 250#!.\n$countermeasures_unlocks_t2_obfuscated_court$\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_4_PERK_EFFECT: "Улучшает достоинство «[GetPerk('numina_illusion_2_perk').GetName(GetPlayer)]», повышая количество призванных профессионалов ([GetMaA('illusionary_combatants').GetName]) до #V 500#!.\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_5_PERK_EFFECT: "Улучшает достоинство «[GetPerk('numina_illusion_2_perk').GetName(GetPlayer)]», повышая количество призванных профессионалов ([GetMaA('illusionary_combatants').GetName]) до #V 1000#!.\n$countermeasures_unlocks_t3_obfuscated_court$\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_6_PERK_EFFECT: "Значительно повышает вероятность успеха [Concept('decision', 'решения')|E] «[GetDecision('escape_from_prison_decision').GetName]».\n$countermeasures_unlocks_t4_obfuscated_court$\n$numina_illusion_common_description$"

