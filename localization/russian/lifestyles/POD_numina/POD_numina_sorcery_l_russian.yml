 numina_necromancy_1_perk_name: "Некромантия: $numina_1_name$"
 numina_necromancy_2_perk_name: "Некромантия: $numina_2_name$"
 numina_necromancy_3_perk_name: "Некромантия: $numina_3_name$"
 numina_necromancy_4_perk_name: "Некромантия: $numina_4_name$"
 numina_necromancy_5_perk_name: "Некромантия: $numina_5_name$"
 numina_necromancy_6_perk_name: "Некромантия: $numina_6_name$"
 numina_necromancy_common_description: "#flavor Некоторые вещи должны оставаться в тайне. Главные из них - мёртвые. Но те, кто следует путём Некромантии, видят всё немного по-другому. Как и Адское пламя, некромантия имеет репутацию нечестивой, и ею занимаются только худшие из худших. В отличие от Адского пламени, эта репутация, по крайней мере, в какой-то степени заслужена.#!"

 NUMINA_NECROMANCY_1_PERK_EFFECT: "Можно взаимодействовать с персонажами по ту сторону Барьера.\n$POD_can_summon_on_death_trigger_loca$\n$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_2_PERK_EFFECT: "$POD_can_weaken_fetter_trigger_loca$\n$POD_can_bind_wraith_trigger_loca$\n$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_3_PERK_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('hidden').GetName], [GetMaA('walker').GetName], [GetMaA('shambler').GetName] и [GetMaA('skeletons').GetName].\n$POD_can_command_wraith_trigger_loca$\n$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_4_PERK_EFFECT: "$unlock_forging_node$ Можно принести в жертву [Concept('prisoner', 'пленника')|E]-#TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призрака#!#!, чтобы улучшить [Concept('artifact', 'артефакт')|E] в зависимости от [Concept('traits', 'свойств')|E] жертвы.\n$numina_necromancy_common_description$"
