 numina_alchemy_1_perk_name: "Алхимия: $numina_1_name$"
 numina_alchemy_2_perk_name: "Алхимия: $numina_2_name$"
 numina_alchemy_3_perk_name: "Алхимия $numina_3_name$"
 numina_alchemy_4_perk_name: "Алхимия: $numina_4_name$"
 numina_alchemy_5_perk_name: "Алхимия: $numina_5_name$"
 numina_alchemy_6_perk_name: "Алхимия: $numina_6_name$"
 numina_alchemy_common_description: "#flavor The study of transformation and purification, Alchemy is an ancient art and science. Practitioners draw from disparate practices, both magical and scientific, to understand the hidden properties of matter and the soul. The most traditional goal of alchemy is not the more famous transformation of base matter into more 'noble' counterparts — such as lead into gold — but rather the perfection of the alchemist.#!"

 NUMINA_ALCHEMY_1_PERK_EFFECT: "$unlock_brewing_node$ [GetModifier('alchemy_antidepresants_1_modifier').GetNameWithTooltip]\n$unlock_brewing_node$ [GetModifier('alchemy_aphrodisiac_1_modifier').GetNameWithTooltip]\n$unlock_brewing_node$ [GetModifier('alchemy_poison_1_modifier').GetNameWithTooltip]\n$unlock_brewing_node$ [GetModifier('alchemy_antibiotics_1_modifier').GetNameWithTooltip]\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_2_PERK_EFFECT: "Improves all [GetPerk('numina_alchemy_1_perk').GetName(GetPlayer)] [crafting_nodes|E]\n$unlock_brewing_node$ Add a [modifier|E] increasing a random [skill|E] by 1 ([GetModifier('alchemy_stimulant_diplomacy_modifier').GetNameWithTooltip])\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_3_PERK_EFFECT: "Improves all [GetPerk('numina_alchemy_2_perk').GetName(GetPlayer)] [crafting_nodes|E]\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_4_PERK_EFFECT: "Improves all [GetPerk('numina_alchemy_3_perk').GetName(GetPlayer)] [crafting_nodes|E]\n$unlock_brewing_node$ [GetModifier('alchemy_health_booster_1_modifier').GetNameWithTooltip]\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_5_PERK_EFFECT: "Improves all [GetPerk('numina_alchemy_4_perk').GetName(GetPlayer)] [crafting_nodes|E]\n$unlock_brewing_node$ #TOOLTIP:GAME_TRAIT,immortal,[GetNullCharacter] #L Immortality#!\n$unlock_brewing_node$ #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L Vampirism#!\nPotion effect duration: #P +1#!\n$numina_alchemy_common_description$"
 NUMINA_ALCHEMY_6_PERK_EFFECT: "Improves all [GetPerk('numina_alchemy_5_perk').GetName(GetPlayer)] [crafting_nodes|E]\n$unlock_brewing_node$ Increase a selected [skill|E] by #P 1#! by sacrificing a [character|E] with that [skill|E] above #bold [EmptyScope.ScriptValue('POD_numina_sorcery_alchemy_skill_potion_requirement')]#!\nPotion effect duration: #P +2#!\n$numina_alchemy_common_description$"

 NUMINA_ALCHEMY_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Алхимия#!#!"

 numina_conjuration_1_perk_name: "Призыв: $numina_1_name$"
 numina_conjuration_2_perk_name: "Призыв: $numina_2_name$"
 numina_conjuration_3_perk_name: "Призыв: $numina_3_name$"
 numina_conjuration_4_perk_name: "Призыв: $numina_4_name$"
 numina_conjuration_5_perk_name: "Призыв: $numina_5_name$"
 numina_conjuration_6_perk_name: "Призыв: $numina_6_name$"
 numina_conjuration_common_description: "#flavor Conjuration is the quintessential Path of stage magicians: pulling rabbits from hats and cards from an audience member's pocket are common examples of its most basic applications. Sorcerers who wish to make a living from their studies often learn Conjuration. Because of this inextricable association with stage magic, Sleepers tend to rationalize Conjuration as simply expert sleight-of-hand.#!"
 
 NUMINA_CONJURATION_1_PERK_EFFECT: "$numina_conjuration_common_description$"
 NUMINA_CONJURATION_2_PERK_EFFECT: "$numina_conjuration_common_description$"
 NUMINA_CONJURATION_3_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Summon a random pet.\n$numina_conjuration_common_description$"
 NUMINA_CONJURATION_4_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Summon a random #color_dark_green Masterwork#! [artifact|E].\n$numina_conjuration_common_description$"
 NUMINA_CONJURATION_5_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Summon a [GetTrait('mortal').GetName(GetPlayer)] or willing supernatural target.\nImproves the [GetPerk('numina_conjuration_4_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by summoning a #FAMEDBLUE Famed#! [artifact|E] instead.\n$numina_conjuration_common_description$"
 NUMINA_CONJURATION_6_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Summon a [GetTrait('demon').GetName(GetPlayer)] from the Abyss. Target yourself to summon a random Demon, or target a [GetTrait('demon').GetName(GetPlayer)] character who is [GetModifier('trapped_in_abyss_modifier').GetNameWithTooltip] to summon them specifically.\nImproves the [GetPerk('numina_conjuration_4_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by summoning an #ILLUSTRIOUSPURPLE Illustrious#! [artifact|E] instead.\nImproves the [GetPerk('numina_conjuration_5_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by removing the opinion requirement.\n$numina_conjuration_common_description$"

 NUMINA_CONJURATION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Призыв#!#!"

 numina_conveyance_1_perk_name: "Перемещение: $numina_1_name$"
 numina_conveyance_2_perk_name: "Перемещение: $numina_2_name$"
 numina_conveyance_3_perk_name: "Перемещение: $numina_3_name$"
 numina_conveyance_4_perk_name: "Перемещение: $numina_4_name$"
 numina_conveyance_5_perk_name: "Перемещение: $numina_5_name$"
 numina_conveyance_6_perk_name: "Перемещение: $numina_6_name$"
 numina_conveyance_common_description: "#flavor Whether dreaming of teleportation or flying broomsticks, people have always wanted to travel quickly from place to place. No matter how quickly they can manage it, it's never fast enough, and many turn to magic and strange sciences to get where they're going that much sooner. Until they reach the pinnacles of Path mastery, a hedge magician using the Path of Conveyance requires some sort of vehicle, which is prepared for a single journey by the magician.#!"
 
 NUMINA_CONVEYANCE_1_PERK_EFFECT: "$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_2_PERK_EFFECT: "$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_3_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Teleport to your next destination when traveling.\n$numina_conveyance_common_description$
 NUMINA_CONVEYANCE_4_PERK_EFFECT: "$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_5_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Teleport an army you are commanding to the target's location.\n$numina_conveyance_common_description$"
 NUMINA_CONVEYANCE_6_PERK_EFFECT: "Improves the [GetPerk('numina_conveyance_5_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by lifting the army size limitation.\n$numina_conveyance_common_description$"

 NUMINA_CONVEYANCE_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Перемещение#!#!"

 numina_divination_1_perk_name: "Прорицание: $numina_1_name$"
 numina_divination_2_perk_name: "Прорицание: $numina_2_name$"
 numina_divination_3_perk_name: "Прорицание: $numina_3_name$"
 numina_divination_4_perk_name: "Прорицание: $numina_4_name$"
 numina_divination_5_perk_name: "Прорицание: $numina_5_name$"
 numina_divination_6_perk_name: "Прорицание: $numina_6_name$"
 numina_divination_common_description: "#flavor Reading tea leaves, casting rune stones or bones, studying the night sky — all these are examples of traditional practices of Divination, variations of which span a multitude of cultures. As long as there's been the concept of a future, there've been people wanting to know what it held for them. A hedge magician performing acts of Divination attempts to predict the future. However, the future's an ever-changing and muddied mess. A sorcerer may use Divination to find clues to the most likely outcomes, but the wise seer knows the value of accurately interpreting the imprecise and dream-like symbolism to judge likely probability changes.#!"
 
 NUMINA_DIVINATION_1_PERK_EFFECT: "$countermeasures_unlocks_t1_all_seeing_eye$\n$numina_divination_common_description$"
 NUMINA_DIVINATION_2_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Discover a random [secret|E] of the target.\n$numina_divination_common_description$"
 NUMINA_DIVINATION_3_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\n$numina_divination_common_description$"
 NUMINA_DIVINATION_4_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Discover a random [scheme|E] of the target.\nYou will receive a notification if someone intends to murder your friends or family.\n$numina_divination_common_description$"
 NUMINA_DIVINATION_5_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Discover a random [scheme|E] targeting the target.\n$countermeasures_unlocks_t3_all_seeing_eye$\n$numina_divination_common_description$"
 NUMINA_DIVINATION_6_PERK_EFFECT: "Improves the [GetPerk('numina_divination_5_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by also stopping the discovered [scheme|E].\n$countermeasures_unlocks_t4_all_seeing_eye$\n$numina_divination_common_description$"

 NUMINA_DIVINATION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Прорицание#!#!"

 numina_enchantment_1_perk_name: "Зачарование: $numina_1_name$"
 numina_enchantment_2_perk_name: "Зачарование: $numina_2_name$"
 numina_enchantment_3_perk_name: "Зачарование: $numina_3_name$"
 numina_enchantment_4_perk_name: "Зачарование: $numina_4_name$"
 numina_enchantment_5_perk_name: "Зачарование: $numina_5_name$"
 numina_enchantment_6_perk_name: "Зачарование: $numina_6_name$"
 numina_enchantment_common_description: "#flavor The Path of Enchantment rewards patience and forethought more than any other Path. There are no spells in this Path, only rituals, including the long and difficult rituals creating magical objects called Artifacts. Each of these Artifacts must be carefully crafted by the Enchanter. The first step is to create the mundane base item. Usually these are hand-crafted by the Enchanter, pushing their mundane skills to their limits to make just the right vessel for their magic. Sometimes, however, the right vessel can be found in the form of a rare or ancient object. Once the vessel has been made or found, the Enchanter can get to the process of infusing the object with magical energy to be used later.#!"

 NUMINA_ENCHANTMENT_1_PERK_EFFECT: "Improves basic [crafting_nodes|E]\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_2_PERK_EFFECT: "Improves basic [crafting_nodes|E]\nUnlocks weaker versions of basic [crafting_nodes|E] for [crafting_enhancing|E]\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_3_PERK_EFFECT: "Improves basic [crafting_nodes|E] and their [crafting_enhancing|E] versions\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_4_PERK_EFFECT: "Improves basic [crafting_nodes|E] and their [crafting_enhancing|E] versions\n$unlock_forging_node$ Add a [modifier|E] increasing a random [skill|E] ([GetModifier('enchantment_attribute_diplomacy_modifier').GetNameWithTooltip]) with a limit of 1 [crafting_node|E] per crafting session\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_5_PERK_EFFECT: "Improves basic [crafting_nodes|E] and their [crafting_enhancing|E] versions\nChanges the limit from [GetPerk('numina_enchantment_4_perk').GetName(GetPlayer)] from 1 to 2\n$numina_enchantment_common_description$"
 NUMINA_ENCHANTMENT_6_PERK_EFFECT: "Improves basic [crafting_nodes|E] and their [crafting_enhancing|E] versions\nLifts the limit from [GetPerk('numina_enchantment_4_perk').GetName(GetPlayer)] for [crafting_forging|E], and increases it for [crafting_enhancing|E]\n$numina_enchantment_common_description$"

 NUMINA_ENCHANTMENT_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Зачарование#!#!"

 numina_ephemera_1_perk_name: "Эфемера: $numina_1_name$"
 numina_ephemera_2_perk_name: "Эфемера: $numina_2_name$"
 numina_ephemera_3_perk_name: "Эфемера: $numina_3_name$"
 numina_ephemera_4_perk_name: "Эфемера: $numina_4_name$"
 numina_ephemera_5_perk_name: "Эфемера: $numina_5_name$"
 numina_ephemera_6_perk_name: "Эфемера: $numina_6_name$"
 numina_ephemera_common_description: "#flavor Some magicians — those focusing on the Path of Necromancy — command spirits. Those who follow the Path of Ephemera seek a relationship of greater familiarity with them. To magicians who use the Path of Ephemera, their relationship to spirits is more like family and friends than master and servant. When they call for a spirit, it's an invitation, not a subpoena. Instead of binding and commanding spirits, the Path of Ephemera allows the magician to negotiate with them.#!"

 NUMINA_EPHEMERA_1_PERK_EFFECT: "Can interact with characters on the other side of the Gauntlet.\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_2_PERK_EFFECT: "Can learn #V 1#! additional [language|E] without any penalties.\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_3_PERK_EFFECT: "Can recruit [GetMaA('jagglings').GetName] as [men_at_arms|E].\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_4_PERK_EFFECT: "$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_5_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Perform a false chiminage to slightly increase a #ONCLICK:FAITH,velvet_brood #TOOLTIP:FAITH,velvet_brood $Gaian|L$#!#! [spirit_companion|E]'s rank.\n$numina_ephemera_common_description$"
 NUMINA_EPHEMERA_6_PERK_EFFECT: "Improves the [GetPerk('numina_ephemera_5_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by doubling its effect.\nRemoves the cost of entering the [UmbraGlossary('spirit_wilds')].\nYou gain the #V [GetTrait('immortal').GetName(GetPlayer)]#! [trait|E]\n$numina_ephemera_common_description$"

 NUMINA_EPHEMERA_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Эфемера#!#!"

 numina_fascination_1_perk_name: "Очарование: $numina_1_name$"
 numina_fascination_2_perk_name: "Очарование: $numina_2_name$"
 numina_fascination_3_perk_name: "Очарование: $numina_3_name$"
 numina_fascination_4_perk_name: "Очарование: $numina_4_name$"
 numina_fascination_5_perk_name: "Очарование: $numina_5_name$"
 numina_fascination_6_perk_name: "Очарование: $numina_6_name$"
 numina_fascination_common_description: "#flavor Stories of the enthralling sorcerer or the bewitching magician are found in folktales across the world. Devious enchanters bring the innocent under their sway, and deals struck for power entrap the hearts and minds of those so foolish as to sign away their souls to such bargains. The kernel of truth to this old trope is solid as diamond. Unscrupulous magicians bending the minds of others to their will have practiced this Path as long as anyone has wished another would just act or think in an agreeable manner.#!"
 
 NUMINA_FASCINATION_1_PERK_EFFECT: "$numina_fascination_common_description$"
 NUMINA_FASCINATION_1_PERK_REASON: "[GetPerk('numina_fascination_1_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 NUMINA_FASCINATION_2_PERK_EFFECT: "Unlock the [GetScheme('befriend').GetTypeName] [scheme|E].\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_3_PERK_EFFECT: "[characters|E] are less prone to start or join [factions|E] and join [schemes|E] as agents.\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_3_PERK_REASON: "[GetPerk('numina_fascination_3_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 NUMINA_FASCINATION_4_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Gain a [weak_hook|E] on the target.\nYour [friends|E] and [best_friends|E] will sometimes try to start [GetScheme('murder').GetTypeName] [scheme|E] against your [rivals|E].\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_5_PERK_EFFECT: "Improves the [GetPerk('numina_fascination_4_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E]  by gaining a [strong_hook|E] instead.\nYour [lovers|E] will sometimes try to start [GetScheme('murder').GetTypeName] [scheme|E] against your [rivals|E].\nGain strong mental defenses.\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_5_PERK_REASON: "[GetPerk('numina_fascination_5_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 NUMINA_FASCINATION_6_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Dissolve all [factions|E] and [schemes|E] targeting the target as long as their owners don't have strong mental defenses.\n$numina_fascination_common_description$"
 NUMINA_FASCINATION_6_PERK_REASON: "[GetPerk('numina_fascination_6_perk').GetName(GetPlayer)]: $VALUE|0+=$"

 NUMINA_FASCINATION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Очарование#!#!"

 numina_fortune_1_perk_name: "Удача: $numina_1_name$"
 numina_fortune_2_perk_name: "Удача: $numina_2_name$"
 numina_fortune_3_perk_name: "Удача: $numina_3_name$"
 numina_fortune_4_perk_name: "Удача: $numina_4_name$"
 numina_fortune_5_perk_name: "Удача: $numina_5_name$"
 numina_fortune_6_perk_name: "Удача: $numina_6_name$"
 numina_fortune_common_description: "#flavor Fate is fickle, even before accounting for the manipulations of magicians. The Path of Fortune allows them to wield luck like a weapon, cutting down their enemies with curses or fortifying their allies with blessings. While methods and explanations may vary, from the Evil Eye, to the Hand of God, to probability manipulation, the Path of Fortune never makes the truly impossible happen, only the exceedingly unlikely. It's also one of the least precise Paths: While the hedge magician sets Fortune in motion and controls the magnitude and general range of potential outcomes, the effects of this Path often surprise them or disappear into the noise of daily life.#!"
 
 NUMINA_FORTUNE_1_PERK_EFFECT: "$numina_fortune_common_description$"
 NUMINA_FORTUNE_2_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Curse a mortal-like [splat|E] (e.g. [GetTrait('ghoul').GetName(GetNullCharacter)], [GetTrait('revenant').GetName(GetNullCharacter)], [GetTrait('kinfolk').GetName(GetNullCharacter)]) target to get wounded.\n@sorcerer_icon![bs_spell|E]: Bless your target by granting [GetModifier('numina_fortune_2_bless_modifier').GetNameWithTooltip].\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_3_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Perform a dowsing ritual to gain [gold_i]#V 50#!.\nImproves the #TOOLTIP:PERK,numina_fortune_2_perk #L Cursing#!#! @sorcerer_icon![bs_spell|E] by worsening the wounds caused.\nImproves the #TOOLTIP:PERK,numina_fortune_2_perk #L Blessing#!#! @sorcerer_icon![bs_spell|E] by granting [GetModifier('numina_fortune_3_bless_modifier').GetNameWithTooltip] instead.\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_4_PERK_EFFECT: "Improves the #TOOLTIP:PERK,numina_fortune_2_perk #L Cursing#!#! @sorcerer_icon![bs_spell|E] by maiming the target.\nImproves the #TOOLTIP:PERK,numina_fortune_2_perk #L Blessing#!#! @sorcerer_icon![bs_spell|E] by granting [GetModifier('numina_fortune_4_bless_modifier').GetNameWithTooltip] instead.\nImproves the #TOOLTIP:PERK,numina_fortune_3_perk #L Dowsing#!#! @sorcerer_icon![bs_spell|E] by increasing the yield to [gold_i]#V 100#!.\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_5_PERK_EFFECT: "Improves the #TOOLTIP:PERK,numina_fortune_2_perk #L Cursing#!#! @sorcerer_icon![bs_spell|E] by letting it target any corporeal [splat|E] younger than #V 500#! years.\nImproves the #TOOLTIP:PERK,numina_fortune_2_perk #L Blessing#!#! @sorcerer_icon![bs_spell|E] by granting [GetModifier('numina_fortune_5_bless_modifier').GetNameWithTooltip] instead.\nImproves the #TOOLTIP:PERK,numina_fortune_3_perk #L Dowsing#!#! @sorcerer_icon![bs_spell|E] by increasing the yield to [gold_i]#V 150#!.\n$numina_fortune_common_description$"
 NUMINA_FORTUNE_6_PERK_EFFECT: "Improves the #TOOLTIP:PERK,numina_fortune_2_perk #L Cursing#!#! [bs_spell|E] by letting it target any [splat|E].\nImproves the #TOOLTIP:PERK,numina_fortune_2_perk #L Blessing#!#! @sorcerer_icon![bs_spell|E] by granting [GetModifier('numina_fortune_6_bless_modifier').GetNameWithTooltip] instead.\nImproves the #TOOLTIP:PERK,numina_fortune_3_perk #L Dowsing#!#! @sorcerer_icon![bs_spell|E] by increasing the yield to [gold_i]#V 200#!.\n$numina_fortune_common_description$"

 NUMINA_FORTUNE_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Удача#!#!"

 numina_healing_1_perk_name: "Исцеление: $numina_1_name$"
 numina_healing_2_perk_name: "Исцеление: $numina_2_name$"
 numina_healing_3_perk_name: "Исцеление: $numina_3_name$"
 numina_healing_4_perk_name: "Исцеление: $numina_4_name$"
 numina_healing_5_perk_name: "Исцеление: $numina_5_name$"
 numina_healing_6_perk_name: "Исцеление: $numina_6_name$"
 numina_healing_common_description: "#flavor Wherever humanity thrives, there's a need for healing. Since the dawn of civilization, healers sprung up out of empathy and community need, they learned how to serve their people from tradition, communing with spirits, trial and error, and a host of other ways.#!"
 
 NUMINA_HEALING_1_PERK_EFFECT: "$numina_healing_common_description$"
 NUMINA_HEALING_2_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Cure a trivial disease like [GetTrait('ill').GetName(GetPlayer)] or [GetTrait('sickly').GetName(GetPlayer)].\n@sorcerer_icon![bs_spell|E]: Heal [EmptyScope.ScriptValue('POD_numina_sorcery_healing_2_heal')|V0] [POD_superficial_damage_with_box|E].\n$numina_healing_common_description$"
 NUMINA_HEALING_3_PERK_EFFECT: "Improves the #TOOLTIP:PERK,numina_healing_2_perk #L Heal#!#! @sorcerer_icon![bs_spell|E] by also healing [GetTrait('disfigured').GetName(GetPlayer)].\n$numina_healing_common_description$"
 NUMINA_HEALING_4_PERK_EFFECT: "Improves the #TOOLTIP:PERK,numina_healing_2_perk #L Cure#!#! @sorcerer_icon![bs_spell|E] by also curing more serious diseases like [GetTrait('pneumonic').GetName(GetPlayer)], [GetTrait('consumption').GetName(GetPlayer)] etc.\n$numina_healing_common_description$"
 NUMINA_HEALING_5_PERK_EFFECT: "Improves the #TOOLTIP:PERK,numina_healing_2_perk #L Heal#!#! @sorcerer_icon![bs_spell|E] by increasing the amount healed to [EmptyScope.ScriptValue('POD_numina_sorcery_healing_5_heal')|V0] [POD_superficial_damage_with_box|E] and [EmptyScope.ScriptValue('POD_numina_sorcery_healing_5_aggravated_heal')|V0] [POD_aggravated_damage_with_box|E]. It also heals maim [traits|E] like [GetTrait('one_eyed').GetName(GetPlayer)], [GetTrait('maimed').GetName(GetPlayer)] etc.\nImproves the #TOOLTIP:PERK,numina_healing_2_perk #L Cure#!#! @sorcerer_icon![bs_spell|E] by also curing incurable diseases like [GetTrait('cancer').GetName(GetPlayer)] or [GetTrait('infirm').GetName(GetPlayer)].\n$numina_healing_common_description$"
 NUMINA_HEALING_6_PERK_EFFECT: "[POD_health_track|E] boxes: #P +1#!\nImproves the #TOOLTIP:PERK,numina_healing_2_perk #L Heal#!#! @sorcerer_icon![bs_spell|E] by increasing the amount healed to [EmptyScope.ScriptValue('POD_numina_sorcery_healing_6_heal')|V0] [POD_superficial_damage_with_box|E] and [EmptyScope.ScriptValue('POD_numina_sorcery_healing_6_aggravated_heal')|V0] [POD_aggravated_damage_with_box|E].\nImproves the #TOOLTIP:PERK,numina_healing_2_perk #L Cure#!#! @sorcerer_icon![bs_spell|E] by also curing supernatural diseases like [GetTrait('chulorviosis').GetName(GetPlayer)] or [GetTrait('crimson_fever').GetName(GetPlayer)].\nYou gain the #V [GetTrait('immortal').GetName(GetPlayer)]#! [trait|E]\n$numina_healing_common_description$"

 NUMINA_HEALING_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Исцеление#!#!"

 numina_hellfire_1_perk_name: "Адское пламя: $numina_1_name$"
 numina_hellfire_2_perk_name: "Адское пламя: $numina_2_name$"
 numina_hellfire_3_perk_name: "Адское пламя: $numina_3_name$"
 numina_hellfire_4_perk_name: "Адское пламя: $numina_4_name$"
 numina_hellfire_5_perk_name: "Адское пламя: $numina_5_name$"
 numina_hellfire_6_perk_name: "Адское пламя: $numina_6_name$"
 numina_hellfire_common_description: "#flavor Rumored to be the result of infernal dealings, Hellfire grants its caster massive destructive powers. While generally summoning forth fire, variants have been observed that call forth lightning, sleet, sandstorms, earthquakes or smoke. The Path of Hellfire has no individual powers, further advancement only allows to call forth more destructive forces.#!"
 
 NUMINA_HELLFIRE_1_PERK_EFFECT: "$numina_hellfire_common_description$"
 NUMINA_HELLFIRE_2_PERK_EFFECT: "$numina_hellfire_common_description$"
 NUMINA_HELLFIRE_3_PERK_EFFECT: "$numina_hellfire_common_description$"
 NUMINA_HELLFIRE_4_PERK_EFFECT: "$numina_hellfire_common_description$"
 NUMINA_HELLFIRE_5_PERK_EFFECT: "At the start of battle when acting as a [commander|E]: Deal [EmptyScope.ScriptValue('POD_numina_hellfire_5_damage')|V0] [POD_aggravated_damage_with_box|E].\n$numina_hellfire_common_description$"
 NUMINA_HELLFIRE_6_PERK_EFFECT: "Improves the [POD_damage|E] of [GetPerk('numina_hellfire_5_perk').GetName(GetPlayer)] [POD_damage|E] to [EmptyScope.ScriptValue('POD_numina_hellfire_6_damage')|V0] [POD_aggravated_damage_with_box|E].\n$numina_hellfire_common_description$"

 NUMINA_HELLFIRE_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Адское пламя#!#!"

 numina_illusion_1_perk_name: "Иллюзия: $numina_1_name$"
 numina_illusion_2_perk_name: "Иллюзия: $numina_2_name$"
 numina_illusion_3_perk_name: "Иллюзия: $numina_3_name$"
 numina_illusion_4_perk_name: "Иллюзия: $numina_4_name$"
 numina_illusion_5_perk_name: "Иллюзия: $numina_5_name$"
 numina_illusion_6_perk_name: "Иллюзия: $numina_6_name$"
 numina_illusion_common_description: "#flavor One of the most fundamental magics is the power to deceive others into believing what the magician wants. The Path of Illusion confounds the senses, making its targets perceive things that aren’t there or altering their perception of what is there. Most people trust their senses. 'Seeing is believing', but when an illusionist is nearby, this old adage can kill you.#!"

 NUMINA_ILLUSION_1_PERK_EFFECT: "Increase the chance of success for the [GetDecision('escape_from_prison_decision').GetName] [decision|E].\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_2_PERK_EFFECT: "At the start of a [war|E], summon an [army|E] of #V 100#! [GetMaA('illusionary_combatants').GetName] for the duration of said [war|E].\n$countermeasures_unlocks_t1_obfuscated_court$\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_3_PERK_EFFECT: "Improves [GetPerk('numina_illusion_2_perk').GetName(GetPlayer)] by increasing the number of [GetMaA('illusionary_combatants').GetName] summoned to #V 250#!.\n$countermeasures_unlocks_t2_obfuscated_court$\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_4_PERK_EFFECT: "Improves [GetPerk('numina_illusion_2_perk').GetName(GetPlayer)] by increasing the number of [GetMaA('illusionary_combatants').GetName] summoned to #V 500#!.\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_5_PERK_EFFECT: "Improves [GetPerk('numina_illusion_2_perk').GetName(GetPlayer)] by increasing the number of [GetMaA('illusionary_combatants').GetName] summoned to #V 1000#!.\n$countermeasures_unlocks_t3_obfuscated_court$\n$numina_illusion_common_description$"
 NUMINA_ILLUSION_6_PERK_EFFECT: "Greatly increases the chance of success for the [GetDecision('escape_from_prison_decision').GetName] [decision|E].\n$countermeasures_unlocks_t4_obfuscated_court$\n$numina_illusion_common_description$"

 NUMINA_ILLUSION_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Иллюзия#!#!"

 numina_necromancy_1_perk_name: "Некромантия: $numina_1_name$"
 numina_necromancy_2_perk_name: "Некромантия: $numina_2_name$"
 numina_necromancy_3_perk_name: "Некромантия: $numina_3_name$"
 numina_necromancy_4_perk_name: "Некромантия: $numina_4_name$"
 numina_necromancy_5_perk_name: "Некромантия: $numina_5_name$"
 numina_necromancy_6_perk_name: "Некромантия: $numina_6_name$"
 numina_necromancy_common_description: "#flavor Some things should stay buried. Chief among them: the dead. But those who follow the Path of Necromancy see things a bit differently. Like Hellfire, Necromancy has a reputation for being foul, practiced only by the worst of the worst. Unlike Hellfire, this reputation is at least somewhat deserved.#!"
 
 NUMINA_NECROMANCY_1_PERK_EFFECT: "Can interact with characters on the other side of the Shroud.\n$POD_can_summon_on_death_trigger_loca$\n$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_2_PERK_EFFECT: "$POD_can_weaken_fetter_trigger_loca$\n$POD_can_bind_wraith_trigger_loca$\n$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_3_PERK_EFFECT: "Unlocks [GetMaA('hidden').GetName], [GetMaA('walker').GetName], [GetMaA('shambler').GetName] and [GetMaA('skeletons').GetName] as [men_at_arms|E].\n$POD_can_command_wraith_trigger_loca$\n$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_4_PERK_EFFECT: "$unlock_forging_node$ Sacrifice a $POD_splat_wraith$ [prisoner|E] to improve the [artifact|E] based on the sacrifice's [traits|E]\n$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_5_PERK_EFFECT: "$numina_necromancy_common_description$"
 NUMINA_NECROMANCY_6_PERK_EFFECT: "$numina_necromancy_common_description$"

 NUMINA_NECROMANCY_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Некромантия#!#!"

 numina_oneiromancy_1_perk_name: "Онейромантия: $numina_1_name$"
 numina_oneiromancy_2_perk_name: "Онейромантия: $numina_2_name$"
 numina_oneiromancy_3_perk_name: "Онейромантия: $numina_3_name$"
 numina_oneiromancy_4_perk_name: "Онейромантия: $numina_4_name$"
 numina_oneiromancy_5_perk_name: "Онейромантия: $numina_5_name$"
 numina_oneiromancy_6_perk_name: "Онейромантия: $numina_6_name$"
 numina_oneiromancy_common_description: "#flavor Magicians who learn the Path of Oneiromancy learn to walk into the dreams of others. Once there, they try to take control, and can glean information or alter dreams to the benefit or harm of the dreamer. At the peak of their power, oneiromancers can even bring several people together in a shared dream. According to legend, some can even make dreams real or become capable of physically entering dreams.#!"
 
 NUMINA_ONEIROMANCY_1_PERK_EFFECT: "$numina_oneiromancy_common_description$
 NUMINA_ONEIROMANCY_2_PERK_EFFECT: "@sorcerer_icon![bs_spell|E]: Inflict [stress_i]#V 15#! [stress|E] on the target. The target also has a #V 5%#! chance to gain a random negative coping mechanism and a #V 2.5%#! chance to suffer from a random mental illness.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_3_PERK_EFFECT: "Improves the [GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by increasing the [stress|E] to [stress_i]#V 25#!, the chance for a negative coping mechanism to #V 10%#!, and the chance for a mental illness to #V 5%#!.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_4_PERK_EFFECT: "Improves the [GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by increasing the [stress|E] to [stress_i]#V 50#!, the chance for a negative coping mechanism to #V 20%#!, and the chance for a mental illness to #V 10%#!.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_5_PERK_EFFECT: "Improves the [GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by increasing the [stress|E] to [stress_i]#V 75#!, the chance for a negative coping mechanism to #V 30%#!, and the chance for a mental illness to #V 15%#!.\n$numina_oneiromancy_common_description$"
 NUMINA_ONEIROMANCY_6_PERK_EFFECT: "Improves the [GetPerk('numina_oneiromancy_2_perk').GetName(GetPlayer)] @sorcerer_icon![bs_spell|E] by increasing the [stress|E] to [stress_i]#V 100#!, the chance for a negative coping mechanism to #V 50%#!, and the chance for a mental illness to #V 25%#!.\nUnlocks [GetMaA('night_elves').GetName], [GetMaA('goblins').GetName], [GetMaA('duergar').GetName] and [GetMaA('nuckelavee').GetName] as [men_at_arms|E].\n$numina_oneiromancy_common_description$"

 NUMINA_ONEIROMANCY_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Онейромантия#!#!"

 numina_quintessence_manipulation_1_perk_name: "Манипуляция квинтэссенцией: $numina_1_name$"
 numina_quintessence_manipulation_2_perk_name: "Манипуляция квинтэссенцией: $numina_2_name$"
 numina_quintessence_manipulation_3_perk_name: "Манипуляция квинтэссенцией: $numina_3_name$"
 numina_quintessence_manipulation_4_perk_name: "Манипуляция квинтэссенцией: $numina_4_name$"
 numina_quintessence_manipulation_5_perk_name: "Манипуляция квинтэссенцией: $numina_5_name$"
 numina_quintessence_manipulation_6_perk_name: "Манипуляция квинтэссенцией: $numina_6_name$"
 numina_quintessence_manipulation_common_description: "#flavor Nearly all sorcerers can agree on one fact. There is a flow of power that fuels their works. The name of that power has taken on a multitude of faces and philosophies: mana, qi, gnosis, shakti, sekhem, and many others. Every magician can describe the flow of energy as they work their will on reality. Coursing through them like charge through a powerline, it can be felt, and for some it can be directly harnessed.#!"
 
 NUMINA_QUINTESSENCE_MANIPULATION_1_PERK_EFFECT: "Can use fetish [artifacts|E]\nInflict [GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip] [modifier|E] on enemy [GetTrait('werewolf').GetName(GetPlayer)] [knights|E] when acting as a [commander|E] during the [combat_phase|E], or on your foe during [single_combat_duel_plural|E].\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_2_PERK_EFFECT: "Can use Chi-powered [artifacts|E]\nInflict [GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip] [modifier|E] on enemy [GetTrait('kueijin').GetName(GetPlayer)] [knights|E] when acting as a [commander|E] during the [combat_phase|E], or on your foe during [single_combat_duel_plural|E].\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_3_PERK_EFFECT: "Can use Demonic [artifacts|E]\nInflict [GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip] [modifier|E] on enemy [GetTrait('demon').GetName(GetPlayer)] [knights|E] when acting as a [commander|E] during the [combat_phase|E], or on your foe during [single_combat_duel_plural|E].\n$numina_quintessence_manipulation_common_description$"
 NUMINA_QUINTESSENCE_MANIPULATION_4_PERK_EFFECT: "Can use Fae [artifacts|E]\nInflict [GetModifier('numina_sorcery_quintessence_manipulation_malus_modifier').GetNameWithTooltip] [modifier|E] on enemy [GetTrait('fae').GetName(GetPlayer)] [knights|E] when acting as a [commander|E] during the [combat_phase|E], or on your foe during [single_combat_duel_plural|E].\n$numina_quintessence_manipulation_common_description$"
