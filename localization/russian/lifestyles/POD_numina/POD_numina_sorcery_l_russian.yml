 numina_shapeshifting_1_perk_name: "Превращение: $numina_1_name$"
 numina_shapeshifting_2_perk_name: "Превращение: $numina_2_name$"
 numina_shapeshifting_3_perk_name: "Превращение: $numina_3_name$"
 numina_shapeshifting_4_perk_name: "Превращение: $numina_4_name$"
 numina_shapeshifting_5_perk_name: "Превращение: $numina_5_name$"
 numina_shapeshifting_6_perk_name: "Превращение: $numina_6_name$"
 numina_shapeshifting_common_description: "#flavor Even among primal magics, the ability to change into an animal stands out as exceptional. Many monsters haunting the night have the power of transformation, including those who are true shapeshifters. Hedge magicians who study the Path of Shapeshifting mimic a certain amount of their power, transforming first pieces of themselves and later their entire body in dramatic ways.#!"
 
 NUMINA_SHAPESHIFTING_1_PERK_EFFECT: "[shapeshift|EU] Option: Change your facial features.\n[shapeshift|EU] Option: Change your visual age (if immortal).\n$numina_shapeshifting_common_description$"
 NUMINA_SHAPESHIFTING_2_PERK_EFFECT: "[shapeshift|EU] Option: Morph into your #V Bestial Form#!.\n[shapeshift|EU] Option: Buy up to #V 2#! animal parts to incorporate into your #V Bestial Form#!, or improve an existing part.\n$numina_shapeshifting_common_description$"
 NUMINA_SHAPESHIFTING_3_PERK_EFFECT: "Gain #V 2#! additional animal parts to incorporate into your #V Bestial Form#!.\n[shapeshift|EU] Option: Morph into several animal forms.\n$numina_shapeshifting_common_description$"
 NUMINA_SHAPESHIFTING_4_PERK_EFFECT: "Gain #V 4#! additional animal parts to incorporate into your #V Bestial Form#!.\n$numina_shapeshifting_common_description$"
 NUMINA_SHAPESHIFTING_5_PERK_EFFECT: "Gain #V 2#! additional animal parts to incorporate into your #V Bestial Form#!.\n$numina_shapeshifting_common_description$"
 NUMINA_SHAPESHIFTING_6_PERK_EFFECT: "Gain #V 5#! additional animal parts to incorporate into your #V Bestial Form#!.\n[shapeshift|EU] Option: Morph into mythical creatures.\n[shapeshift|EU] Option: Change your [physical_traits|E].\n$numina_shapeshifting_common_description$"

 NUMINA_SHAPESHIFTING_6_PERK_FLAG_REQUIREMENT: "#X @warning_icon! Сначала вы должны завершить [Concept('journey', 'странствие')|E] #V Изучить низшее мастерство: Превращение#!#!"

