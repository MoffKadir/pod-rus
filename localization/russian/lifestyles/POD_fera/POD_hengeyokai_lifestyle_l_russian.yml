l_russian:

 hengeyokaigifts_lifestyle_name: "Хенгейокай"
 hengeyokaigifts_lifestyle_desc: "Фокус на силе, исходящей от Звериных дворов."
 hengeyokaigifts_lifestyle_highlight_desc: "Из-за вашего модификатора [GetModifier('POD_gnosis_5_modifier').GetNameWithTooltip] ваш прирост [Concept('experience', 'опыта')|E] для этого образа жизни увеличен на #P [GetPlayer.Custom('GetEducationLifestylePercentageBoost')]#!."
 monthly_hengeyokaigifts_lifestyle_xp_gain_mult: "Ежемесячный прирост [Concept('experience','опыта')E] на [Concept('lifestyle','пути')E] даров хенгейокай"
 hengeyokaigifts_focus: "Дары хенгейокай"
 hengeyokaigifts_focus_modifier: "[GetFocus('hengeyokaigifts_focus').GetName]"
 hengeyokaigifts_focus_desc: "Сила в единстве."
 hengeyokaigifts_focus_effect_desc: "Сосредоточившись на дарах хенгейокай, персонаж получает:"
 hengeyokaigifts_common_visible: "Дары дворов"


 mindspeak_perk_name: "Глас разума"
 MINDSPEAK_PERK_EFFECT: "Can learn #V 2#! additional [languages|E] without any penalties.\n#flavor This Gift is commonly shared among newcomers to the Courts as the most basic form of universal communication.#!"
 create_element_perk_name: "Создание элемента"
 CREATE_ELEMENT_PERK_EFFECT: "#flavor Hengeyokai in tune with the appropriate elements can summon "moon" as an element; this manifests as pure moonlight, providing illumination and often some measure of comfort.#!"
 courtly_speech_perk_name: "Придворная речь"
 COURTLY_SPEECH_PERK_EFFECT: "#flavor When acting as an envoy, hengeyokai find it only polite to speak in the tongue of one's host. This Gift allows a hengeyokai to speak any of the Changing Breed tongues as if he were a native.#!"
 blaze_talons_perk_name: "Пылающие когти"
 BLAZE_TALONS_PERK_EFFECT: "#flavor One of the war arts of the hengeyokai, this Gift enables the shapeshifter to ignite his hands, paws, or wings granting his blows the ferocity of a wildfire.#!"
 sense_imbalance_perk_name: "Чувство дисбаланса"
 SENSE_IMBALANCE_PERK_EFFECT: "$countermeasures_unlocks_t1_all_seeing_eye$\nYour [court_chaplain|E] is #P 25%#! faster at the [convert_county|E] [councillor_task|E].\n#flavor This Gift allows the hengeyokai to focus her perceptions on the balance between the Three, discerning any local imbalances of energies - whether those of the [Glossary('Triat', 'glossary_triat_tt')], or those of Yin, Yang and Yomi.#!"
 waking_dream_of_unity_perk_name: "Пробуждение мечты о единстве"
 WAKING_DREAM_OF_UNITY_PERK_EFFECT: "#flavor This gift places a group of Hengeyokai into silent communication by sending walking dreams into their minds. This is used to communicate with the entire court at a time.#!"
 part_the_wall_perk_name: "Разделение стены"
 PART_THE_WALL_PERK_EFFECT: "#flavor This Gift is shared among hengeyokai who cannot normally step sideways. It allows them to walk into the Mirror Lands as easily as their more fortunate cousins do.#!"
 exorcism_perk_name: "Экзорцизм"
 EXORCISM_PERK_EFFECT: "Can [POD_banish|E] $POD_splat_wraith_plural$ to their native [umbra|E] realms.\nYou can no longer be possessed by $POD_splat_wraith_plural$.\n#flavor The Yama Kings frequently send their spirit minions to plague the hengeyokai courts; as a result, the knowledge of banishing evil spirits is shared freely among the beast-children.#!"
 walking_the_bone_road_perk_name: "Walking the Bone Road"
 WALKING_THE_BONE_ROAD_PERK_EFFECT: "#flavor The Hengeyokai may step sideways into the Yin World as easily as she normally does the Yang World.#!"
 way_of_ten_thousand_cities_perk_name: "Way of Ten Thousand Cities"
 WAY_OF_TEN_THOUSAND_CITIES_PERK_EFFECT: "Reduces the base cost of establishing new [culture_traditions|E] by #P 25%#!.\n#flavor The Hengeyokai can blend smoothly into any culture, no matter how peculiar or unfamiliar the culture is.#!"