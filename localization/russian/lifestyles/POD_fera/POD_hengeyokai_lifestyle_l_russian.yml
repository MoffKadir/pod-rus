l_russian:

 hengeyokaigifts_lifestyle_name: "Хенгейокай"
 hengeyokaigifts_lifestyle_desc: "Фокус на силе, исходящей от Звериных дворов."
 hengeyokaigifts_lifestyle_highlight_desc: "Из-за вашего модификатора «[GetModifier('POD_gnosis_5_modifier').GetNameWithTooltip]» ваш прирост [Concept('experience', 'опыта')|E] для этого образа жизни увеличен на #P [GetPlayer.Custom('GetEducationLifestylePercentageBoost')]#!."
 monthly_hengeyokaigifts_lifestyle_xp_gain_mult: "Ежемесячный прирост [Concept('experience','опыта')E] на [Concept('lifestyle','пути')E] даров хенгейокай"
 hengeyokaigifts_focus: "Дары хенгейокай"
 hengeyokaigifts_focus_modifier: "[GetFocus('hengeyokaigifts_focus').GetName]"
 hengeyokaigifts_focus_desc: "Сила в единстве."
 hengeyokaigifts_focus_effect_desc: "Сосредоточившись на дарах хенгейокай, персонаж получает:"
 hengeyokaigifts_common_visible: "Дары дворов"


 mindspeak_perk_name: "Глас разума"
 MINDSPEAK_PERK_EFFECT: "Можно выучить #V 2#! дополнительных [Concept('languages', 'языка')E] без штрафа.\n#flavor Этим даром обычно пользуются новички в дворах как самой основной формой универсального общения.#!"
 create_element_perk_name: "Создание элемента"
 CREATE_ELEMENT_PERK_EFFECT: "#flavor Хенгейокай, созвучный соответствующим стихиям, может вызывать «луну» как стихию; это проявляется в виде чистого лунного света, обеспечивающего освещение и часто некоторую степень комфорта.#!"
 courtly_speech_perk_name: "Придворная речь"
 COURTLY_SPEECH_PERK_EFFECT: "#flavor Выступая в роли посланников, хенгейокай считают вежливым говорить на языке своего хозяина. Этот дар позволяет хенгейокай говорить на любом из языков Меняющихся пород, как на родном.#!"
 blaze_talons_perk_name: "Пылающие когти"
 BLAZE_TALONS_PERK_EFFECT: "#flavor Одно из боевых искусств хенгейокай, этот дар позволяет перевёртышу поджигать свои руки, лапы или крылья, придавая его ударам силу лесного пожара.#!"
 sense_imbalance_perk_name: "Чувство дисбаланса"
 SENSE_IMBALANCE_PERK_EFFECT: "$countermeasures_unlocks_t1_all_seeing_eye$\nВаш [Concept('court_chaplain', 'придворный капеллан')|E] выполняет [Concept('councillor_task', 'задание')|E] «[convert_county|E]» на #P 25%#! быстрее.\n#flavor Этот дар позволяет хенгейокай сосредоточить своё восприятие на балансе между Троицей, распознавая любой локальный дисбаланс энергий - будь то энергии [Glossary('Триады', 'glossary_triat_tt')] или энергии Инь, Ян и Йоми.#!"
 waking_dream_of_unity_perk_name: "Пробуждение мечты о единстве"
 WAKING_DREAM_OF_UNITY_PERK_EFFECT: "#flavor Этот дар позволяет группе хенгейокай безмолвно общаться, посылая в их сознание ходячие сны. Это используется для общения со всем двором одновременно.#!"
 part_the_wall_perk_name: "Разделение стены"
 PART_THE_WALL_PERK_EFFECT: "#flavor Этим даром обладают хенгейокай, которые обычно не могут шагнуть в сторону. Это позволяет им входить в Зеркальные земли так же легко, как и их более удачливым собратьям.#!"
 exorcism_perk_name: "Экзорцизм"
 EXORCISM_PERK_EFFECT: "Можно [Concept('POD_banish', 'изгонять')|E] #TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призраков#!#! в их родные миры [Concept('umbra', 'Умбры')|E].\nВ вас больше не могут вселиться #TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призраки#!#!.\n#flavor Повелители Яма часто посылают своих духов-приспешников наводить ужас на дворы хенгейокай; в результате дети-звери свободно делятся знаниями об изгнании злых духов.#!"
 walking_the_bone_road_perk_name: "Ступая по костяной дороге"
 WALKING_THE_BONE_ROAD_PERK_EFFECT: "#flavor Хенгейокай может войти в мир Инь так же легко, как он обычно делает это в мире Ян.#!"
 way_of_ten_thousand_cities_perk_name: "Путь десяти тысяч городов"
 WAY_OF_TEN_THOUSAND_CITIES_PERK_EFFECT: "Снижает базовую стоимость принятия новых [Concept('culture_traditions', 'культурных традиций')|E] на #P 25%#!.\n#flavor Хенгейокай может органично вписаться в любую культуру, какой бы необычной или незнакомой она ни была.#!"