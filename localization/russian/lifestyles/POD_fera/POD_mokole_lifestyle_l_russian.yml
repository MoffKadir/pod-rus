 age_of_man_perk_name: "Age of Man"
 AGE_OF_MAN_PERK_EFFECT: "Allows finding Artifact Shards in the [UmbraGlossary('astral_reaches')]."
 sun_spark_perk_name: "Sun Spark"
 SUN_SPARK_PERK_EFFECT: "$unlock_forging_node$ Add a modifier depending on Artifact type and add 10 [durability|E], this replaces a Base Forging Node."
 strengthening_chant_perk_name: "Strengthening Chant"
 STRENGTHENING_CHANT_PERK_EFFECT: "$unlock_forging_node$ Increase [durability|E] by 20, this replaces a Base Forging Node."
 curing_the_body_perk_name: "Curing the Body"
 CURING_THE_BODY_PERK_EFFECT: "$unlock_brewing_node$ Heal 1 [POD_superficial_damage_with_box|E] and mortal diseases.\n$unlock_brewing_node$ Add 25 [supply|E] to the army the target is leading."
 brews_of_the_mokole_perk_name: "Brews of the Mokolé"
 BREWS_OF_THE_MOKOLE_PERK_EFFECT: "$unlock_brewing_node$ [GetModifier('matre_medicine_modifier').GetNameWithTooltip], if the character is female and married then she becomes pregnant.\n$unlock_brewing_node$ [GetModifier('snake_herbs_modifier').GetNameWithTooltip]\n$unlock_brewing_node$ [GetModifier('swimmers_medicine_modifier').GetNameWithTooltip]."
 stones_of_power_perk_name: "Stones of Power"
 STONES_OF_POWER_PERK_EFFECT: "$unlock_forging_node$ [GetModifier('sunstones_modifier').GetNameWithTooltip]\n$unlock_enhancing_node$ [GetModifier('bloodstones_modifier').GetNameWithTooltip]"
 flood_the_land_perk_name: "Flood the Land"
 FLOOD_THE_LAND_PERK_EFFECT: "Unlocks Weather Magic option: #V Flood#!"
 bring_the_apocalypse_perk_name: "Bring the Apocalypse"
 BRING_THE_APOCALYPSE_PERK_NAME: ""
 the_devisor_perk_name: "The [Glossary('Devisor', 'glossary_wyld_tt')]"
 THE_DEVISOR_PERK_EFFECT: ""
 the_designer_perk_name: "The [Glossary('Designer', 'glossary_weaver_tt')]"
 THE_DESIGNER_PERK_EFFECT: "Funding the inspirations for artifacts or commissioning one is now less costly."
 the_dissolver_perk_name: "The [Glossary('Dissolver', 'glossary_wyrm_tt')]"
 THE_DISSOLVER_PERK_EFFECT: ""


 age_of_beasts_perk_name: "Age of Beasts"
 AGE_OF_BEASTS_PERK_EFFECT: "Weather Magic can now target [duchies|E]"
 sun_ray_perk_name: "Sun Ray"
 SUN_RAY_PERK_EFFECT: "Improves [GetPerk('sun_spark_perk').GetName(GetPlayer)] but it no longer adds [durability|E]."
 turtle_blessing_perk_name: "Turtle Blessing"
 TURTLE_BLESSING_PERK_EFFECT: "Improves [GetPerk('strengthening_chant_perk').GetName(GetPlayer)] by making it add an additional 10 [durability|E]\n$unlock_forging_node$ The next [crafting_node|E] that reduces [durability|E] will not reduce [durability|E]."
 see_the_form_perk_name: "See the Form"
 SEE_THE_FORM_PERK_EFFECT: "$unlock_enhancing_node$ Spend Artifact Shards to add [artifact_power_with_icon|E] to a #COMMONBROWN Common#! or #color_dark_green Masterwork#! [artifact|E].\n[character_interaction|E]: Deconstruct an [artifact|E], turning it into Artifact Shards."
 cleansing_the_mind_perk_name: "Cleansing the Mind"
 CLEANSING_THE_MIND_PERK_EFFECT: "$unlock_forging_template$ Lungin: An unequippable artifact with 4 charges that reduces [stress|E] scaling with [artifact_power_with_icon|E]."
 tools_of_destruction_perk_name: "Tools of Destruction"
 TOOLS_OF_DESTRUCTION_PERK_EFFECT: "$unlock_forging_template$ Arrows of the Sun: An unequippable artifact that inflicts sun damage to a character scaling with its [artifact_power_with_icon|E].\n$unlock_forging_template$ Thunder Dart: An unequippable artifact that inflicts casualties on an [army|E] scaling with [artifact_power_with_icon|E]."
 dream_the_beast_perk_name: "Dream the Beast"
 DREAM_THE_BEAST_PERK_EFFECT: "Can recruit [GetMaA('archators').GetName] as [men_at_arms|E].\nAllows finding additional Dinosaur $POD_bygones_maa$ in the [UmbraGlossary('astral_reaches')].\n[character_interaction|E]: Summon a Dinosaur Mount [artifact|E], more choices unlock as you discover more Dinosaurs in the [UmbraGlossary('astral_reaches')]."
 beast_kin_perk_name: "Beast Kin"
 BEAST_KIN_PERK_EFFECT: ""
 apis_rebirth_perk_name: "Apis Rebirth"
 APIS_REBIRTH_PERK_EFFECT: "Can recruit [GetMaA('apis_minotaurs').GetName] as [men_at_arms|E]."
 camazotz_paranoia_perk_name: "Camazotz Paranoia"
 CAMAZOTZ_PARANOIA_PERK_EFFECT: "Can recruit [GetMaA('camazotz_megachiropteras').GetName] as [men_at_arms|E]."
 grondr_purification_perk_name: "Grondr Purification"
 GRONDR_PURIFICATION_PERK_EFFECT: "Can recruit [GetMaA('grondr_daeodons').GetName] as [men_at_arms|E].\nIncreases success chance of [GetTrait('mokole').GetName(GetNullCharacter)] [interactions|E] when targeting servants of the [Glossary('Wyrm', 'glossary_wyrm_tt')]."


 age_of_sleep_perk_name: "Age of Sleep"
 AGE_OF_SLEEP_PERK_EFFECT: "Weather Magic can now target [kingdoms|E]"
 sun_flame_perk_name: "Sun Flame"
 SUN_FLAME_PERK_EFFECT: "Improves [GetPerk('sun_ray_perk').GetName(GetPlayer)] but it now reduces [durability|E] by 10."
 dragon_scale_perk_name: "Dragon Scale"
 DRAGON_SCALE_PERK_EFFECT: "$unlock_forging_node$ Spend Artifact Shards to double [durability|E], cost scales with the current durability of the artifact."
 dream_the_form_perk_name: "Dream the Form"
 DREAM_THE_FORM_PERK_EFFECT: "Improves [GetPerk('see_the_form_perk').GetName(GetPlayer)] and allows it to target #FAMEDBLUE Famed#! [artifacts|E]."
 dragon_kings_invocation_perk_name: "Dragon King's Invocation"
 DRAGON_KINGS_INVOCATION_PERK_EFFECT: "$unlock_enhancing_node$ Add $POD_energy_gnosis$ storage to an [artifact|E], this turns it into a [fetish|E]."
 suns_judgement_perk_name: "Sun's Judgement"
 SUNS_JUDGEMENT_PERK_EFFECT: "$unlock_forging_template$ Edge of the Sun: A sword that unlocks a new [execution|E] method that grants [lifestyle_experience|E] and [piety|E] scaling with [artifact_power_with_icon|E]."
 dream_the_spirit_perk_name: "Dream the Spirit"
 DREAM_THE_SPIRIT_PERK_EFFECT: "If you can already summon $POD_splat_spirit_plural$: Gain the ability to summon Gaian Spirits."
 gods_of_men_perk_name: "Gods of Men"
 GODS_OF_MEN_PERK_EFFECT: ""
 willing_servitude_perk_name: "Willing Servitude"
 WILLING_SERVITUDE_PERK_EFFECT: "Invite to [court|E] Acceptance: #P +10#!"
 WILLING_SERVITUDE_INVITE: "[GetPerk('willing_servitude_perk').GetName(GetPlayer)]: $VALUE|=+0$"
 ancient_terror_perk_name: "Ancient Terror"
 ANCIENT_TERROR_PERK_EFFECT: "$countermeasures_unlocks_t2_mental_fortress$\nYou can bypass delirium immunity."
 stampede_perk_name: "Stampede"
 STAMPEDE_PERK_EFFECT: "[character_interaction|E]: Summon an army of [GetMaA('dryptoraptors').GetName] on your enemy's capital, they dissipate after the war ends."


 age_of_kings_perk_name: "Age of Kings"
 AGE_OF_KINGS_PERK_EFFECT: "[POD_health_track|E] boxes: #P +1#!\nWeather Magic can now target [empires|E]"
 sun_breath_perk_name: "Sun Breath"
 SUN_BREATH_PERK_EFFECT: "Improves [GetPerk('sun_flame_perk').GetName(GetPlayer)] but it now reduces [durability|E] by 20."
 helios_blaze_perk_name: "Helios Blaze"
 HELIOS_BLAZE_PERK_EFFECT: "$unlock_forging_node$ Add #P +2#! to a random [skill|E] but reduce [durability|E] by 40"
 shape_the_form_perk_name: "Shape the Form"
 SHAPE_THE_FORM_PERK_EFFECT: "Improves [GetPerk('dream_the_form_perk').GetName(GetPlayer)] and allows it to target #ILLUSTRIOUSPURPLE Illustrious#! [artifacts|E]."
 ascending_flame_perk_name: "Ascending Flame"
 ASCENDING_FLAME_PERK_EFFECT: "$unlock_forging_node$ Randomly add one of the following modifiers [GetModifier('ascending_flame_damage_1_modifier').GetNameWithTooltip], [GetModifier('ascending_flame_toughness_1_modifier').GetNameWithTooltip], [GetModifier('ascending_flame_siege_1_modifier').GetNameWithTooltip]. Each subsequent use of this node will add a new modifier of the same type but double its strength and cost."
 shifting_blade_perk_name: "Shifting Blade"
 SHIFTING_BLADE_PERK_EFFECT: "$unlock_forging_template$ Blade of the Kings: Converts all your [POD_superficial_damage|E] to [POD_aggravated_damage|E] against characters with [prowess|E] lower than the blade's [artifact_power_with_icon|E]."
 rulers_of_the_earth_perk_name: "Rulers of the Earth"
 RULERS_OF_THE_EARTH_PERK_EFFECT: "[character_interaction|E]: Immediately make an owned title [de_jure_drift|E] into your [primary_title|E]."
 rulers_of_the_sea_perk_name: "Rulers of the Sea"
 RULERS_OF_THE_SEA_PERK_EFFECT: "[prowess|E] based chance to reduce a hostile army's [supplies|E] by 10 and inflict 1 [POD_aggravated_damage_with_box|E] to all accompanying [knights|E] including the [commander|E] whenever they move through a sea tile."
 rulers_of_the_sky_perk_name: "Rulers of the Sky"
 RULERS_OF_THE_SKY_PERK_EFFECT: "All Mountain or Desert Mountain [baronies|E] you own gain [GetModifier('POD_mokole_rulers_of_the_sky_modifier').GetNameWithTooltip].\nIf you have [GetPerk('open_sun_bridge_perk').GetName(GetPlayer)] then remove the restrictions on your destination, otherwise unlock the Open Sun Bridge [character_interaction|E]."
 draconic_rumination_perk_name: "Draconic Rumination"
 DRACONIC_RUMINATION_PERK_EFFECT: "Lose 20 [stress|E] every three years.\nUnlock an additional [streamgifts_lifestyle|E] tree to learn."
 kings_call_perk_name: "King's Call"
 KINGS_CALL_PERK_EFFECT: "Improves [GetPerk('stampede_perk').GetName(GetPlayer)] by adding [GetMaA('archators').GetName] and [GetMaA('baroceratops').GetName] to the spawned army and letting you target up to 2 additional provinces."



