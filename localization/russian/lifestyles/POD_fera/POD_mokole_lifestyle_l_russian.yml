 mnesis_lifestyle_name: "Mnesis"
 mnesis_lifestyle_desc: "Recall the abilities and crafts of the Ancient Mokolé."
 monthly_mnesis_lifestyle_xp_gain_mult: "Monthly Mnesis [lifestyle|E] [experience|E]"
 mnesis_lifestyle_tree_visible: "Mnesis"

 MNESIS_PERK_COST_EFFECT: "#clickable This perk costs $VALUE|V0$ perk [Select_CString( EqualTo_CFixedPoint( '(CFixedPoint)$VALUE|q$', '(CFixedPoint)1' ), 'point', 'points' )]#!"
 MNESIS_PREVIOUS_AGE_REQ: "@warning_icon!#warning You must obtain all [perks|E] in the previous Age.#!"
 DEEPER_MNESIS_EFFECT: "Your [skills|E] will be further #N reduced#! while you journey deeper into Mnesis."

