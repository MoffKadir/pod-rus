l_russian:



 ####Common Gifts####

 razor_claws_perk_name: "Razor Claws"
 RAZOR_CLAWS_PERK_EFFECT: "#flavor By raking his claws over stone, steel or some other hard surface, the Mokolé hones them to razor sharpness.#!"
 talk_perk_name: "Talk"
 TALK_PERK_EFFECT: "Can learn #V 1#! additional [language|E] without any penalties.\n#flavor This Gift permits the Mokolé to speak any human language he knows while in Suchid or Archid Form.#!"
 blessings_of_the_nest_perk_name: "Blessings of the Nest"
 BLESSINGS_OF_THE_NEST_PERK_EFFECT: "Can recruit [GetMaA('crocodiles').GetName] as [men_at_arms|E].\n#flavor Hissing a blessing in the Dragon Tongue, the Mokolé bestows a gift of fertility.#!"
 mokole_axis_mundi_perk_name: "Axis Mundi"
 MOKOLE_AXIS_MUNDI_PERK_EFFECT: "#flavor The Mokolé reaches out with her spirit to feel the presence of Gaia, centering herself with relation to her Mother.#!"
 dragonfear_perk_name: "Dragonfear"
 DRAGONFEAR_PERK_EFFECT: "#flavor The Mokolé displays his full terrifying might - baring teeth or claws, roaring, or simply looming ominously over a foe.#!"
 mokole_walking_between_worlds_perk_name: "Walking Between Worlds"
 MOKOLE_WALKING_BETWEEN_WORLDS_PERK_EFFECT: "#flavor The Mokolé can breach the Gauntlet and enter the Umbra. Though he should be wary of [innocents|E] while traversing it.#!"
 dragons_breath_perk_name: "Dragon's Breath"
 DRAGONS_BREATH_PERK_EFFECT: "Unlocks a new [single_combat_duel|E] move.\n#flavor The Mokolé spits fire at his foes.#!"
 cocoon_perk_name: "Cocoon"
 COCOON_PERK_EFFECT: "$countermeasures_unlocks_t2_supernatural_high_alert$\n#flavor The Mokolé wraps himself in a thick, opaque, chitinous sarcophagus, immobilizing himself but also becoming nearly impervious to harm.#!"
 serenity_perk_name: "Serenity"
 SERENITY_PERK_EFFECT: "#flavor The Mokolé can fill a hot heart with the peace of Gaia, even in the midst of battle.#!"
 grasp_the_beyond_perk_name: "Grasp the Beyond"
 GRASP_THE_BEYOND_PERK_EFFECT: "Can shapeshift and maintain shapeshifted forms while staying in the [umbra|E].\n#flavor The Mokolé may carry things in and out of the Umbra without having to dedicate them to herself.#!"
 song_of_the_great_beast_perk_name: "Song of the Great Beast"
 SONG_OF_THE_GREAT_BEAST_PERK_EFFECT: "Inflict enemy [rulers|E] with a powerful negative [modifier|E] per [GetTrait('mokole').GetName(GetNullCharacter)] Rank when starting a [war|E] as the primary attacker or defender.\n#flavor The Mokolé travels to the deep wilderness and lets out a long, mournful roar. One of the Great Beasts of Antiquity answers the call, appearing in the realm near the weresaurian.#!"



####Stream Gifts####
 streamgifts_lifestyle_name: "Stream Gifts"
 streamgifts_lifestyle_desc: "The four Mokolé streams are all shaped by the nature of their chosen lands and the reptile kin found there."
 streamgifts_lifestyle_highlight_desc: "Because of your $POD_energy_gnosis$, you gain #P [GetPlayer.MakeScope.ScriptValue('gnosis_lifestyle_xp_mult')|%0]#! more [experience|E] in this Lifestyle."
 monthly_streamgifts_lifestyle_xp_gain_mult: "Monthly Stream Gifts [lifestyle|E] [experience|E]"
 streamgifts_mokole_mbembe_visible: "Mokolé-mbembe Gifts"
 streamgifts_gumagan_visible: "Gumagan Gifts"
 streamgifts_makara_visible: "Makara Gifts"
 streamgifts_zhong_lung_visible: "Zhong Lung Gifts"
 
 streamgifts_mokole_mbembe_focus: "Mokolé-mbembe Focus"
 streamgifts_mokole_mbembe_focus_modifier: "[GetFocus('streamgifts_mokole_mbembe_focus').GetName]"
 streamgifts_mokole_mbembe_focus_desc: "Gifts from the Stream of the Fighters."
 streamgifts_mokole_mbembe_focus_effect_desc: "Focusing on Mokolé-mbembe Gifts grants:"

 streamgifts_gumagan_focus: "Gumagan Focus"
 streamgifts_gumagan_focus_modifier: "[GetFocus('streamgifts_gumagan_focus').GetName]"
 streamgifts_gumagan_focus_desc: "Gifts from the Stream of the Forerunners."
 streamgifts_gumagan_focus_effect_desc: "Focusing on Gumagan Gifts grants:"

 streamgifts_makara_focus: "Makara Focus"
 streamgifts_makara_focus_modifier: "[GetFocus('streamgifts_makara_focus').GetName]"
 streamgifts_makara_focus_desc: "Gifts from the Stream of the Folk."
 streamgifts_makara_focus_effect_desc: "Focusing on Makara Gifts grants:"

 streamgifts_zhong_lung_focus: "Zhong Lung Focus"
 streamgifts_zhong_lung_focus_modifier: "[GetFocus('streamgifts_zhong_lung_focus').GetName]"
 streamgifts_zhong_lung_focus_desc: "Gifts from the Stream of the Philosophers."
 streamgifts_zhong_lung_focus_effect_desc: "Focusing on Zhong Lung Gifts grants:"

 NEEDS_MOKOLE_MBEMBE_STREAM: "@warning_icon!#X Your stream must be Mokolé-mbembe#!"
 NEEDS_GUMAGAN_STREAM: "@warning_icon!#X Your stream must be Gumagan#!"
 NEEDS_MAKARA_STREAM: "@warning_icon!#X Your stream must be Makara#!"
 NEEDS_ZHONG_LUNG_STREAM: "@warning_icon!#X Your stream must be Zhong Lung#!"


 speed_of_thought_perk_name: "Speed of Thought"
 SPEED_OF_THOUGHT_PERK_EFFECT: "#flavor The Mokolé doubles her running speed.#!"
 sense_dissolver_perk_name: "Sense [Glossary('Dissolver', 'glossary_wyrm_tt')]"
 SENSE_DISSOLVER_PERK_EFFECT: "$countermeasures_unlocks_t1_all_seeing_eye$\n#flavor The Mokolé can sense nearby manifestations of the [Glossary('Dissolver', 'glossary_wyrm_tt')].#!"
 silver_claws_perk_name: "Silver Claws"
 SILVER_CLAWS_PERK_EFFECT: "[character_interaction|E]: Give yourself [GetModifier('POD_mokole_silver_claws_modifier').GetNameWithTooltip] for 3 years.\n#flavor Luna sends her children to teach this powerful but painful Gift to those warriors who gain her favor. When invoked, it transforms the Mokolé's claws into silver.#!"
 bark_of_the_mudpuppy_perk_name: "Bark of the Mudpuppy"
 BARK_OF_THE_MUDPUPPY_PERK_EFFECT: "Unlocks a new [single_combat_duel|E] move.\n#flavor This Gift allows the Mokolé to bark loudly at any one person or object, shattering glass, splintering light wood, or even opening wounds on a living being.#!"
 beak_of_the_finch_perk_name: "Beak of the Finch"
 BEAK_OF_THE_FINCH_PERK_EFFECT: "#flavor The Mokolé adapts to new situations in order to survive. They do so by reshaping themselves into a form which can accomplish a goal.#!"
 heat_wave_perk_name: "Heat Wave"
 HEAT_WAVE_PERK_EFFECT: "#flavor The Mokolé can bring the heat of Lord Sun to burn his enemies.#!"
 walk_into_my_eyes_perk_name: "Walk Into my Eyes"
 WALK_INTO_MY_EYES_PERK_EFFECT: "[character_interaction|E]: Force a [truce|E] with the target. When the truce expires, one of their [personality_traits|E] changes to its opposite trait.\n#flavor This powerful Gift forces a target to see the world from the Mokolé's point of view. During this time he will not be able to attack the Mokolé. After returning to himself, the target is often profoundly changed.#!"

 songlines_perk_name: "Songlines"
 SONGLINES_PERK_EFFECT: "#flavor This Gift covers the landscape with songs. The Gumagan can navigate from one end of Bandaiyan to the other using legends.#!"
 dreamwalk_perk_name: "Dreamwalk"
 DREAMWALK_PERK_EFFECT: "Can manipulate the Gauntlet.\n#flavor The Gumagan may use her connection to the Dreamtime to lower the Gauntlet.#!"
 bunyips_boom_perk_name: "Bunyip's Boom"
 BUNYIPS_BOOM_PERK_EFFECT: "Give [GetModifier('POD_mokole_bunyips_boom_modifier').GetNameWithTooltip] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n#flavor The Gumagan may reach into Mnesis and imitate the mournful cry of the Bunyip.#!"
 landspeak_perk_name: "Landspeak"
 LANDSPEAK_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\nGain a chance to passively learn a [secret|E] of one of your [vassals|E] every three years.\n#flavor By listening carefully, a Gumagan can hear the songs of the Earth.#!"
 nightmare_mnesis_perk_name: "Nightmare Mnesis"
 NIGHTMARE_MNESIS_PERK_EFFECT: "[character_interaction|E]: Force a character to experience a [mental_break|E].\n#flavor The Gumagan can overcome any foe with Mnesis, forcing them to remember the atrocities they've committed.#!"
 bilabong_walk_perk_name: "Bilabong Walk"
 BILABONG_WALK_PERK_EFFECT: "#flavor Gumagan use this Gift to successfully cross large expanses of terrain by using water as a shortcut.#!"
 bloody_mindedness_perk_name: "Bloody-Mindedness"
 BLOODY_MINDEDNESS_PERK_EFFECT: "Gain [GetModifier('POD_mokole_bloody_mindedness_nemesis_modifier').GetNameWithTooltip] while you have a [nemesis|E] or [GetModifier('POD_mokole_bloody_mindedness_rival_modifier').GetNameWithTooltip] while you have a [rival|E].\n#flavor The Gumagan can "point herself" at a chosen goal or foe. She will pursue this goal until death and beyond.#!"

 sense_prey_perk_name: "Sense Prey"
 SENSE_PREY_PERK_EFFECT: "Reduces cost of the Hunt [activity|E] by #P -10%#!\n#flavor This Gift lets a weresaurian locate enough prey to feed her clutch.#!"
 SENSE_PREY_REASON: "$sense_prey_perk_name$: $VALUE|+=0$"
 scent_of_sweet_nectar_perk_name: "Scent of Sweet Nectar"
 SCENT_OF_SWEET_NECTAR_PERK_EFFECT: "[character_interaction|E]: Give a character [GetModifier('POD_mokole_scent_of_sweet_nectar_modifier').GetNameWithTooltip].\nCan recruit [GetMaA('insects').GetName] as [men_at_arms|E].\n#flavor The Mokolé's victim begins to exude a wonderfully sweet aroma. All manner of vermin quickly appear and coat the victim. The resulting coat of gnats, flies, bees, and beetles crawls, stings, and generally impairs vision and hearing.#!"
 shed_perk_name: "Shed"
 SHED_PERK_EFFECT: "Increase the chance of success for the Escape from Prison [decision|E].\n#flavor The Mokolé can shed a layer of skin and/or feathers, slipping from an opponent's grasp or escaping from bonds with ease.#!"
 waxwork_monster_perk_name: "Waxwork Monster"
 WAXWORK_MONSTER_PERK_EFFECT: "$countermeasures_unlocks_t3_supernatural_high_alert$\n#flavor This Gift lets a Mokolé take advantage of the fact that "dinosaurs are extinct" to hide in plain sight.#!"
 view_the_seed_perk_name: "View the Seed"
 VIEW_THE_SEED_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\n[character_interaction|E]: Discover a random [scheme|E] or [secret|E] of a character.\n#flavor This Gift comes from the blief that all things are but a dream of the idea or object that birthed them. It allows the user to see the "seed" of anything, from the parents of a child to the mastermind of a plot.#!"
 the_thousand_arrows_perk_name: "The Thousand Arrows"
 THE_THOUSAND_ARROWS_PERK_EFFECT: "#flavor This Gift allows a Makara marksman to greatly multiply his missiles in mid-flight.#!"
 great_as_a_white_hill_perk_name: "Great as a White Hill"
 GREAT_AS_A_WHITE_HILL_PERK_EFFECT: "#flavor The Makara grows to three times her normal size or shrinks to the size of a small mugger crocodile.#!"


 dragon_milk_perk_name: "Dragon Milk"
 DRAGON_MILK_PERK_EFFECT: "[character_interaction|E]: Heal 1 [POD_aggravated_damage_with_box|E] on another character.\n#flavor The Zhong Lung channels spiritual power through her blood, mending the wounds of any other living creature.#!"
 chiih_ming_perk_name: "Chi'ih Ming"
 CHIIH_MING_PERK_EFFECT: "#flavor This Gift allows the Zhong Lung to walk on air.#!"
 clap_of_thunder_perk_name: "Clap of Thunder"
 CLAP_OF_THUNDER_PERK_EFFECT: "Unlocks a new [single_combat_duel|E] move.\n#flavor The Zhong Lung slams her hands together, creating a mighty thunderclap that stuns those who hear it.#!"
 the_dragons_tongue_perk_name: "The Dragon's Tongue"
 THE_DRAGONS_TONGUE_PERK_EFFECT: "[character_interaction|E]: Inflict up to 2 [POD_aggravated_damage_with_box|E] on a character.\n#flavor The Zhong Lung calls down lightning upon his enemy.#!"
 anger_of_the_wani_perk_name: "Anger of the Wani"
 ANGER_OF_THE_WANI_PERK_EFFECT: "Unlocks Weather Magic options: #V Storm#! and #V Blizzard#!\n#flavor The Zhong Lung can summon nearly any weather effect she desires: Fog, tornadoes, blizzards, and thunderstorms all await her call.#!"
 sleep_of_hsi_wang_mu_perk_name: "Sleep of Hsi Wang Mu"
 SLEEP_OF_HSI_WANG_MU_PERK_EFFECT: "#flavor This Gift allows the Zhong Lung to hibernate, concentrating his life force to extend his life.#!"
 a_thousand_secret_faces_perk_name: "A Thousand Secret Faces"
 A_THOUSAND_SECRET_FACES_PERK_EFFECT: "[character_interaction|E]: Allows you to edit your own [personality_traits|E] or copy another character's appearance.\n#flavor This Gift allows the Zhong Lung to assume the perfect likeness of any human, of any age, ethnicity, or station.#!"



####Solar Auspice Gifts####
 solar_auspicegifts_lifestyle_name: "Solar Gifts"
 solar_auspicegifts_lifestyle_desc: "Focus on the Gifts that come from the Solar Auspice."
 solar_auspicegifts_lifestyle_highlight_desc: "Because of your $POD_energy_gnosis$, you gain #P [GetPlayer.MakeScope.ScriptValue('gnosis_lifestyle_xp_mult')|%0]#! more [experience|E] in this Lifestyle."
 monthly_solar_auspicegifts_lifestyle_xp_gain_mult: "Monthly Solar Auspice Gifts [lifestyle|E] [experience|E]"
 solar_auspicegifts_rising_sun_visible: "Rising"
 solar_auspicegifts_noonday_sun_visible: "Noonday"
 solar_auspicegifts_setting_sun_visible: "Setting"
 solar_auspicegifts_midnight_sun_visible: "Midnight"
 solar_auspicegifts_shrouded_sun_visible: "Shrouded"
 solar_auspicegifts_decorated_sun_visible: "Decorated"
 solar_auspicegifts_eclipsed_sun_visible: "Eclipsed"


 solar_auspicegifts_focus: "Solar Auspice Gifts Focus"
 solar_auspicegifts_focus_modifier: "[GetFocus('solar_auspicegifts_focus').GetName]"
 solar_auspicegifts_focus_desc: "The Great Sun"
 solar_auspicegifts_focus_effect_desc: "Focusing on Solar Auspice Gifts grants:"


 RISING_SUN_PERK_REQ: "@warning_icon!#warning Requires one of the following traits:\n$BULLET_WITH_TAB$[GetTrait('rising_sun').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('vasanta').GetName(GetPlayer)]#!"
 NOONDAY_SUN_PERK_REQ: "@warning_icon!#warning Requires one of the following traits:\n$BULLET_WITH_TAB$[GetTrait('noonday_sun').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('nam_hsia').GetName(GetPlayer)]#!"
 SETTING_SUN_PERK_REQ: "@warning_icon!#warning Requires one of the following traits:\n$BULLET_WITH_TAB$[GetTrait('setting_sun').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('tung_chun').GetName(GetPlayer)]#!"
 MIDNIGHT_SUN_PERK_REQ: "@warning_icon!#warning Requires one of the following traits:\n$BULLET_WITH_TAB$[GetTrait('midnight_sun').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('hemanta').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('pei_tung').GetName(GetPlayer)]#!"
 SHROUDED_SUN_PERK_REQ: "@warning_icon!#warning Requires one of the following traits:\n$BULLET_WITH_TAB$[GetTrait('shrouded_sun').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('zarad').GetName(GetPlayer)]#!"
 DECORATED_SUN_PERK_REQ: "@warning_icon!#warning Requires one of the following traits:\n$BULLET_WITH_TAB$[GetTrait('decorated_sun').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('grisma').GetName(GetPlayer)]#!"
 ECLIPSED_SUN_PERK_REQ: "@warning_icon!#warning Requires one of the following traits:\n$BULLET_WITH_TAB$[GetTrait('eclipsed_sun').GetName(GetPlayer)]\n$BULLET_WITH_TAB$[GetTrait('sai_chau').GetName(GetPlayer)]#!"



 bellow_perk_name: "Bellow"
 BELLOW_PERK_EFFECT: "The Mokolé releases a powerful and terrifying reptilian roar."
 master_of_fire_perk_name: "Master of Fire"
 MASTER_OF_FIRE_PERK_EFFECT: "Gain immunity to fire damage.\n#flavor A Mokolé remembers the ancient pact made with fire spirits. Shielding himself as the final fires of the Apocalypse loom.#!"
 eye_of_the_raptor_perk_name: "Eye of the Raptor"
 EYE_OF_THE_RAPTOR_PERK_EFFECT: "#flavor The Mokolé can see clearly for miles.#!"
 paint_the_meadows_perk_name: "Paint the Meadows"
 PAINT_THE_MEADOWS_PERK_EFFECT: "#flavor The Mokolé may utter pitiable moans and groans to draw prey closer.#!"
 call_the_tides_perk_name: "Call the Tides"
 CALL_THE_TIDES_PERK_EFFECT: "Unlocks Weather Magic option: #V Flood#!\nReduces the cost and increases the duration of #V Flood#! if you have [GetPerk('flood_the_land_perk').GetName(GetPlayer)]\n#flavor This Gift makes the Mokolé able to bend the tides to his will.#!"
 might_of_kings_perk_name: "Might of Kings"
 MIGHT_OF_KINGS_PERK_EFFECT: "You gain an increased chance to wound enemy [knights|E] during a [combat_phase|E] as a [knight|E].\n#flavor The Mokolé can increase his strength tremendously, the better to slay his foes.#!"
 lash_of_ages_perk_name: "Lash of Ages"
 LASH_OF_AGES_PERK_EFFECT: "#flavor The Rising Sun can destroy any man-made substance.#!"
 scream_of_gaia_perk_name: "Scream of Gaia"
 SCREAM_OF_GAIA_PERK_EFFECT: "[character_interaction|E]: Inflict 1 [POD_superficial_damage_with_box|E] to all [knights|E] of your target.\n#flavor The Mokolé emits a horrible, ragged scream imbued with the Rage and the pain of Gaia.#!"
 jointsnakes_mojo_perk_name: "Jointsnake's Mojo"
 JOINTSNAKES_MOJO_PERK_EFFECT: "#flavor The Mokolé may rejoin severed body parts without even touching them.#!"
 wall_of_granite_perk_name: "Wall of Granite"
 WALL_OF_GRANITE_PERK_EFFECT: "$unlock_forging_node$ [GetModifier('shards_of_granite_modifier').GetNameWithTooltip]\n#flavor While in contact with earth or rock, the Rising Sun can invoke a wall to protect himself.#!"


 truth_of_olodumare_perk_name: "Truth of Olodumare"
 TRUTH_OF_OLODUMARE_PERK_EFFECT: "[espionage|E] Progress Speed: #P +25%#!\n#flavor As judges of the Duties, Noonday Suns may easily seperate truth from falsehood.#!"
 TRUTH_OF_OLODUMARE_REASON: "$truth_of_olodumare_perk_name$: $VALUE|+=0$"
 fangs_of_judgement_perk_name: "Fangs of Judgement"
 FANGS_OF_JUDGEMENT_PERK_EFFECT: "[imprison|E] chance with an [imprisonment_reason|E]: #P +20%#!\n[revoke|E] Title Acceptance: #P +10#!\n#flavor It falls upon the Noonday Sun to levy not only judgement but also punishment against those who have fallen from their proper stations.#!"
 strength_of_purpose_perk_name: "Strength of Purpose"
 STRENGTH_OF_PURPOSE_PERK_EFFECT: "#flavor Noonday Suns use this Gift to fortify themselves in the face of the apocalypse, turning hot passion and burning Rage into cold, steely resolve.#!"
 tame_sunbeam_perk_name: "Tame Sunbeam"
 TAME_SUNBEAM_PERK_EFFECT: "[character_interaction|E]: Inflict 2 [POD_aggravated_damage_with_box|E] on another character that is weak to the sun and make them unable to heal for 5 years.\n#flavor The sun has long been the staunchest ally of the Mokolé, and sends his light when they need it most.#!"
 clear_mind_perk_name: "Clear Mind"
 CLEAR_MIND_PERK_EFFECT: "#flavor This Gift encourages clarity of thought, no matter the distractions.#!"
 weak_arm_perk_name: "Weak Arm"
 WEAK_ARM_PERK_EFFECT: "#flavor By watching an opponent's fighting style, the Noonday Sun can quickly evaluate his strengths and weaknesses.#!"
 eye_of_the_cobra_perk_name: "Eye of the Cobra"
 EYE_OF_THE_COBRA_PERK_EFFECT: "Give [GetModifier('POD_mokole_eye_of_the_cobra_modifier').GetNameWithTooltip] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n#flavor With an unearthly stare, the weresaurian can draw anyone to within striking distance.#!"
 raptors_gaze_perk_name: "Raptor's Gaze"
 RAPTORS_GAZE_PERK_EFFECT: "#flavor One of the Mokolé's eyes glows a livid red, and all enemies caught by his gaze are stricken with terrible agony.#!"
 wisdom_of_the_sun_perk_name: "Wisdom of the Sun"
 WISDOM_OF_THE_SUN_PERK_EFFECT: "$unlock_forging_node$ [GetModifier('suns_wisdom_modifier').GetNameWithTooltip].\n#flavor By meditating beneath Lord Sun's face, the Noonday Sun becomes a channel for the wisdom of Tellurian, and can find the answer to almost any question.#!"
 sleep_of_the_dragon_perk_name: "Sleep of the Dragon"
 SLEEP_OF_THE_DRAGON_PERK_EFFECT: "#flavor The Mokolé enters a state of aestivation. She does not age as she sleeps, though she may dream.#!"


 resist_pain_perk_name: "Resist Pain"
 RESIST_PAIN_PERK_EFFECT: "#flavor Fortifying herself with purpose and will, the Mokolé shuts out the pain of her wounds.#!"
 rage_of_the_nest_mother_perk_name: "Rage of the Nest Mother"
 RAGE_OF_THE_NEST_MOTHER_PERK_EFFECT: "Gain a stack of [GetModifier('POD_mokole_rage_of_the_nest_mother_modifier').GetNameWithTooltip] for each of your non-adult children.\n#flavor When confronted with a threat to a helpless member of the Mokolé's family or clutch, the Setting Sun can rise above her normal limits to defend them.#!"
 combat_healing_perk_name: "Combat Healing"
 COMBAT_HEALING_PERK_EFFECT: "#flavor This Gift allows the weresaurian to mend his injuries without rest or hesitation, even in the midst of battle.#!"
 warding_dance_perk_name: "Warding Dance"
 WARDING_DANCE_PERK_EFFECT: "#flavor Pushing the fire in his heart into his limbs, the Setting Sun hurls himself unharmed through the ranks of Gaia's foes.#!"
 clenched_jaw_perk_name: "Clenched Jaw"
 CLENCHED_JAW_PERK_EFFECT: "More likely to [imprison|E] [characters|E] after a successful [siege|E] or [raid|E].\n#flavor The weresaurian bites down with such power that her grip won't loosen until she chooses to let it; even in death her jaws remain locked.#!"
 armor_of_the_tortoise_perk_name: "Armor of the Tortoise"
 ARMOR_OF_THE_TORTOISE_PERK_EFFECT: "#flavor The Mokolé may form a hard shell around his skin, protecting himself from harm.#!"
 clarity_perk_name: "Clarity"
 CLARITY_PERK_EFFECT: "$countermeasures_unlocks_t1_all_seeing_eye$\n#flavor This Gift grants the ability to see through fog, pitch darkness, invisibility, and to recognize illusions.#!"
 hand_of_the_earth_lords_perk_name: "Hand of the Earth Lords"
 HAND_OF_THE_EARTH_LORDS_PERK_EFFECT: "Can recruit [GetMaA('earth_elemental').GetName] as [men_at_arms|E].\n#flavor By drawing on the land's energies, the Setting Sun can move any one object simply by gesturing at it.#!"
 halo_of_the_sun_perk_name: "Halo of the Sun"
 HALO_OF_THE_SUN_PERK_EFFECT: "$unlock_forging_node$ [GetModifier('cleansing_sun_modifier').GetNameWithTooltip].\n#flavor The character speaks an ancient word sacred to Helios and is immediately surrounded by a sphere of blazing sunlight.#!"
 fossilize_perk_name: "Fossilize"
 FOSSILIZE_PERK_EFFECT: "[character_interaction|E]: Send a character into [GetTrait('torpor').GetName(GetNullCharacter)].\n#flavor The Mokolé consigns an enemy to memory by fossilizing him for the edification of further generations.#!"


 brothers_scent_perk_name: "Brother's Scent"
 BROTHERS_SCENT_PERK_EFFECT: "#flavor Drawing upon the universal brotherhood of all creatures of Gaia, the Mokolé seems to fit in wherever he goes.#!"
 spirits_of_laughter_perk_name: "Spirits of Laughter"
 SPIRITS_OF_LAUGHTER_PERK_EFFECT: "[faction_military_power|E] Threshold for [vassals|E]: #P +10%#!\n#flavor The Midnight Sun invokes spirits of good humor, lightening everyone's mood.#!"
 FACTION_POWER_SPIRITS_OF_LAUGHTER: "$spirits_of_laughter_perk_name$: $VALUE|+=0$"
 glib_tongue_perk_name: "Glib Tongue"
 GLIB_TONGUE_PERK_EFFECT: "#flavor Listeners hear whatever the Mokolé wishes them to. The Midnight Sun can say anything, even total nonsense, but anyone listening will agree heartily.#!"
 GLIB_TONGUE_ACCEPTANCE: "$glib_tongue_perk_name$: $VALUE|+=0$"
 dreamspeak_perk_name: "Dreamspeak"
 DREAMSPEAK_PERK_EFFECT: "[espionage|E] Progress Speed: #P +25%#!\n#flavor The Midnight Sun can walk among another's dreams and therefore affect their course.#!"
 DREAMSPEAK_REASON: "$dreamspeak_perk_name$: $VALUE|+=0$"
 invisibility_perk_name: "Invisibility"
 INVISIBILITY_PERK_EFFECT: "Unlock [GetModifier('POD_shapeshift_form_invisible_modifier').GetNameWithTooltip] shapeshift option.\n#flavor The Mokolé can vanish from sight, though she must concentrate to maintain her invisibility.#!"
 shadows_by_the_firelight_perk_name: "Shadows by the Firelight"
 SHADOWS_BY_THE_FIRELIGHT_PERK_EFFECT: "[character_interaction|E]: Reduce your own [stress|E].\n#flavor The Midnight Sun invokes shadows and dreams to set the stage for a play in which other Mokolé play a part.#!"
 open_sun_bridge_perk_name: "Open Sun Bridge"
 OPEN_SUN_BRIDGE_PERK_EFFECT: "[character_interaction|E]: Teleport to a Wallow or Caern as an [army_commander] or while [traveling|E].\n#flavor The weresaurian has the ability to open a sun bridge, with or without the permission of the totem of that wallow.#!"
 take_the_true_form_perk_name: "Take the True Form"
 TAKE_THE_TRUE_FORM_PERK_EFFECT: "[character_interaction|E]: Remove a character's shapeshifts and make them unable to shapeshift for 10 years.\n#flavor The Midnight Sun can force a being into its true form.#!"
 fools_luck_perk_name: "Fool's Luck"
 FOOLS_LUCK_PERK_EFFECT: "This Gift grants temporary immunity to bad luck."
 thousand_forms_perk_name: "Thousand Forms"
 THOUSAND_FORMS_PERK_EFFECT: "Unlock various animal shapeshift forms.\n$unlock_forging_node$ [GetModifier('beast_rampage_modifier').GetNameWithTooltip].\n#flavor The weresaurian with this Gift may change herself into any animal between the sizes of a small bird and a bison.#!"



 sense_magic_perk_name: "Sense Magic"
 SENSE_MAGIC_PERK_EFFECT: "You can no longer be possessed by $POD_splat_wraith_plural$.\n#flavor The weresaurian can sense the pulse and flux of mystic energies, no matter their origins.#!"
 mokole_spirit_speech_perk_name: "Spirit Speech"
 MOKOLE_SPIRIT_SPEECH_PERK_EFFECT: "#flavor This Gift bestows understanding of the language of the spirit world, permitting the Mokolé to clearly understand and speak with any spirit he encounters.#!"
 command_spirit_perk_name: "Command Spirit"
 COMMAND_SPIRIT_PERK_EFFECT: "Can recruit [GetMaA('jagglings').GetName] as [men_at_arms|E].\n#flavor The Shrouded Sun can give commands to spirits she meets and expect obedience.#!"
 COMMAND_SPIRIT_REASON: "$command_spirit_perk_name$: $VALUE|+=0$"
 umbral_shadow_wings_perk_name: "Umbral Shadow Wings"
 UMBRAL_SHADOW_WINGS_PERK_EFFECT: "#flavor This Gift allows a Mokolé to fly through the "nothing" of the Umbra, ignoring the various paths and tracks in favor of a more direct route from realm to realm.#!"
 breaking_the_tomorrow_wall_perk_name: "Breaking the Tomorrow Wall"
 BREAKING_THE_TOMORROW_WALL_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\nYou will receive a notification if someone intends to murder your friends or family.\n#flavor The Mokolé swims upstream through the river of Mnesis, catching vague glimpses of the future.#!"
 call_water_spirit_perk_name: "Call Water Spirit"
 CALL_WATER_SPIRIT_PERK_EFFECT: "Can recruit [GetMaA('water_elemental').GetName] as [men_at_arms|E].\n#flavor The Mokolé is able to call a water elemental to her aid.#!"
 walk_the_matres_mind_perk_name: "Walk the Matre's Mind"
 WALK_THE_MATRES_MIND_PERK_EFFECT: "Can physically enter the [umbra|E].\n#flavor This Gift allows the Mokolé to physically enter the Umbra without leaving a helpless body behind and without a silver cord.#!"
 gorgons_gaze_perk_name: "Gorgon's Gaze"
 GORGONS_GAZE_PERK_EFFECT: "[character_interaction|E]: Reduce a character's [prowess|E] and give them the [GetTrait('scaly').GetName(GetNullCharacter)] [trait|E].\n#flavor The Mokolé's eyes burn red, gold, and green as this hideous power of legend transforms living flesh into stone with but a gaze.#!"
 mokole_living_treasure_perk_name: "Living Treasure"
 MOKOLE_LIVING_TREASURE_PERK_EFFECT: "[buy_claim_interaction|E] and [buy_artifact_claim_interaction|E] Cost: #P -25%#!\n$unlock_forging_node$ [GetModifier('inscribed_legacy_modifier').GetNameWithTooltip].\n#flavor A Shrouded Sun can convince the spirit of a treasure to relate its history and lore.#!"
 malleable_spirit_perk_name: "Malleable Spirit"
 MALLEABLE_SPIRIT_PERK_EFFECT: "#flavor The Mokolé can change a spirit's form or purpose.#!"



 mercy_perk_name: "Mercy"
 MERCY_PERK_EFFECT: "#flavor Decorated Suns see no use for lethal force when not fighting minions of the [Glossary('Dissolver', 'glossary_wyrm_tt')].#!"
 mokole_pack_tactics_perk_name: "Pack Tactics"
 MOKOLE_PACK_TACTICS_PERK_EFFECT: "#flavor By taking the lead and coordinating the other Mokolé, the Decorated Sun gifts all her clutchmates with great competence in the heat of battle.#!"
 mothers_touch_perk_name: "Mother's Touch"
 MOTHERS_TOUCH_PERK_EFFECT: "[character_interaction|E]: Heal 1 [POD_superficial_damage_with_box|E] on another character.\n#flavor The Decorated Sun channels spiritual power through her hands, mending the wounds of any living creature.#!"
 pilot_snake_perk_name: "Pilot Snake"
 PILOT_SNAKE_PERK_EFFECT: "Can recruit [GetMaA('snakes').GetName] as [men_at_arms|E].\n#flavor This gift allows the Mokolé to summon the helpful pilot snake, a creature who knows how to get places.#!"
 wind_beneath_my_wings_perk_name: "Wind Beneath my Wings"
 WIND_BENEATH_MY_WINGS_PERK_EFFECT: "#flavor This Gift helps Mokolé travel more easily by marching or flying in formation.#!"
 call_to_duty_perk_name: "Call to Duty"
 CALL_TO_DUTY_EFFECT: "#flavor Names hold power in the spirit world, and the Decorated Sun may exploit this to summon and command any spirit she knows by name.#!"
 dragon_drill_perk_name: "Dragon Drill"
 DRAGON_DRILL_PERK_EFFECT: "Give [GetModifier('POD_mokole_dragon_drill_modifier').GetNameWithTooltip] to friendly [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to yourself during [single_combat_duel_plural|E].\n#flavor The Mokolé may organize his allies into a potent workforce, sharing abilities learned to all members.#!"
 reshape_object_perk_name: "Reshape Object"
 RESHAPE_OBJECT_PERK_EFFECT: "Gain [gold|E] when breaking down [artifacts|E]\n#flavor The Mokolé can shape once-living material into something else instantly.#!"
 chaos_mechanics_perk_name: "Chaos Mechanics"
 CHAOS_MECHANICS_PERK_EFFECT: "$unlock_forging_node$ Add one of four random modifiers.\n#flavor This Gift enables the weresaurian to summon primal energy and mystical form at the same time.#!"
 strength_of_the_dominator_perk_name: "Strength of the Dominator"
 STRENGTH_OF_THE_DOMINATOR_PERK_EFFECT: "[character_interaction|E]: Reduce a character's [splat|E] resource and gain [prowess|E] equal to a third of their [prowess|E].\n#flavor The weresaurian draws on a target's anger to feed his own.#!"




 mokole_aura_of_confidence_perk_name: "Aura of Confidence"
 MOKOLE_AURA_OF_CONFIDENCE_PERK_EFFECT: "$countermeasures_unlocks_t1_mental_fortress$\n#flavor The Mokolé projects an aura of superiority, preventing attempts to find flaws or read auras.#!"
 lambent_flame_perk_name: "Lambent Flame"
 LAMBENT_FLAME_PERK_EFFECT: "#flavor The weresaurian causes her body to ignite with silver light.#!"
 mokole_awe_perk_name: "Awe"
 MOKOLE_AWE_PERK_EFFECT: "#flavor The Mokolé becomes an unmistakable avatar of primal glory and majesty, crowned by the sun and cloaked in years.#!"
 dazzle_perk_name: "Dazzle"
 DAZZLE_PERK_EFFECT: "#flavor The Mokolé can flood a target's mind with the glory and love of Gaia.#!"
 dragon_kings_majesty_perk_name: "Dragon King's Majesty"
 DRAGON_KINGS_MAJESTY_PERK_EFFECT: "#flavor The Eclipsed Sun appears to grow larger and more imposing, becoming a terrible shadowy version of herself.#!"
 wrath_of_the_dragon_perk_name: "Wrath of the Dragon"
 WRATH_OF_THE_DRAGON_PERK_EFFECT: "Inflict 40 [stress|E] to enemy [knights|E] and [commanders|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E] if they serve the [Glossary('Wyrm', 'glossary_wyrm_tt')].\n#flavor The Mokolé shows himself in full, terrible glory as Gaia's chosen warrior. His splendor overwhelms minions of the [Glossary('Dissolver', 'glossary_wyrm_tt')].#!"
 mokole_mastery_perk_name: "Mastery"
 MOKOLE_MASTERY_PERK_EFFECT: "[character_interaction|E]: Gain a [strong_hook|E] on another [GetTrait('mokole').GetName(GetNullCharacter)].\n#flavor The Eclipsed Sun can command other Mokolé, even those fallen to the [Glossary('Dissolver', 'glossary_wyrm_tt')] to do her bidding.#!"
 army_of_the_ancestors_perk_name: "Army of the Ancestors"
 ARMY_OF_THE_ANCESTORS_PERK_EFFECT: "Three powerful [ancestor_spirits|E] are summoned to aid you as [knights|E] during war.\n#flavor The Mokolé can call on the ancestors who gave him the shape he wears, bringing them out of the mists of the Memory to challenge his opponents.#!"
 sun_enfleshed_perk_name: "Sun Enfleshed"
 SUN_ENFLESHED_PERK_EFFECT: "Inflict 1 [POD_aggravated_damage_with_box|E] to enemy [knights|E] and [commanders|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E] if they are weak to the sun.\n$unlock_forging_node$ [GetModifier('sun_scales_modifier').GetNameWithTooltip].\n#flavor The Mokolé becomes a living embodiment of the sun's holy fire. She bursts into silent solar flames, burning her opponents with a touch.#!"
 dream_semblence_perk_name: "Dream Semblance"
 DREAM_SEMBLENCE_PERK_EFFECT: "[character_interaction|E]: Gain [GetModifier('POD_mokole_dream_semblence_modifier').GetNameWithTooltip] for a year and maximize your [dread|E].\n#flavor This rare Gift allows the Mokolé to dream themselves into the form of a True Dragon. Once the confrontation is over, the dream will depart.#!"







