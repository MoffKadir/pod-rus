l_russian:


 urgetaints_lifestyle_name: "Urge Taints"
 urgetaints_lifestyle_desc: "These dark gifts are bestowed by the Urge Wyrms to those who seek power, yet there is always a price."
 urgetaints_lifestyle_highlight_desc: "Because of your [GetModifier('POD_gnosis_5_modifier').GetNameWithTooltip], you gain #P [GetPlayer.Custom('GetEducationLifestylePercentageBoost')]#! more [experience|E] in this Lifestyle."
 monthly_urgetaints_lifestyle_xp_gain_mult: "Monthly Urge Taints [lifestyle|E] [experience|E]"

 
 urgetaints_physical_visible: "Physical"
 urgetaints_mental_visible: "Mental"

 URGETAINTS_REQ: "@warning_icon!#X Urge Taints [lifestyle_experience|E] is earned by exploring certain realms within [UmbraGlossary('malfeas')]#!"


 ###Physical
 malformed_flesh_perk_name: "Malformed Flesh"
 MALFORMED_FLESH_PERK_EFFECT: "#flavor The flesh dries and hardens, forming a protective carapace.#!"
 malformed_muscle_perk_name: "Malformed Muscle"
 MALFORMED_MUSCLE_PERK_EFFECT: "#flavor The muscles grow disproportionately large and powerful, allowing great feats of strength.#!"
 malformed_bone_perk_name: "Malformed Bone"
 MALFORMED_BONE_PERK_EFFECT: "#flavor The bones grow strong and robust, a challenge against the ravages of time.#!"
 bestial_limbs_perk_name: "Bestial Limbs"
 BESTIAL_LIMBS_PERK_EFFECT: "Shapeshifting into a [Glossary('Фера', 'glossary_fera_tt')]'s natural animal forms no longer costs $POD_energy_gnosis$.\n#flavor Even in Homid form your limbs retain their bestial appearance, less to change when shapeshifting.#!"
 forked_tongue_perk_name: "Forked Tongue"
 FORKED_TONGUE_PERK_EFFECT: "Can learn #V 1#! additional [language|E] without any penalties.\n#flavor Where one lie ends and another begins, nobody can tell.#!"
 reversed_eye_perk_name: "Reversed Eye"
 REVERSED_EYE_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\n#flavor With an eye on the back of your head, nothing can sneak up on you again.#!"
 bane_stomach_perk_name: "Bane Stomach"
 BANE_STOMACH_PERK_EFFECT: "Unlocks Cannibalism [execution|E].\nCannibalizing a character will give [trait_level_track_xp|E] to all your Bane [spirit_companions|E].\n#flavor The essence of the devoured will feed more than your own body.#!"
 BANE_STOMACH_REASON: ""$bane_stomach_perk_name$: $VALUE|+=0$""
 thundering_throat_perk_name: "Thundering Throat"
 THUNDERING_THROAT_PERK_EFFECT: "Invite to [court|E] Acceptance: #P +10#!\nGive [GetModifier('wyrm_thundering_throat_modifier').GetNameWithTooltip] and #V 30#! [stress|E] to enemy [knights|E] and [commanders|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E] if they are [intimidated|E] by you.\n#flavor With a voice that shakes the earth, your fealty is heard.#!" 
 THUNDERING_THROAT_INVITE: "[GetPerk('thundering_throat_perk').GetName(GetPlayer)]: $VALUE|=+0$"
 profaned_lungs_perk_name: "Profaned Lungs"
 PROFANED_LUNGS_PERK_EFFECT: "Train with [GetPlayer.Custom('PODCoterieNoTooltip')] [journey|E] speed: #P +25%#!\n#flavor With the air rushing to your great lungs a perfect endurance is achieved, but not for you.#!"
 unholy_heart_perk_name: "Unholy Heart"
 UNHOLY_HEART_PERK_EFFECT: "[POD_health_track|E] boxes: #P +1#!\nReduces time to convert [POD_aggravated_damage|E] to [POD_superficial_damage|E] by #V 1#! year.\n#flavor Another vessel claimed by the Wyrm.#!"

 ###Mental
 dominance_perk_name: "Dominance"
 DOMINANCE_PERK_EFFECT: "#flavor Show them why you are better.#!"
 indulgence_perk_name: "Indulgence"
 INDULGENCE_PERK_EFFECT: "#flavor Go on, you deserve it.#!"
 obsession_perk_name: "Obsession"
 OBSESSION_PERK_EFFECT: "Unlocks the [GetScheme('abduct').GetTypeName] [scheme|E]\n#flavor You must have it, no matter the cost.#!"
 warped_reflection_perk_name: "Warped Reflection"
 WARPED_REFLECTION_PERK_EFFECT: "#flavor Your reflection has become hard to see, but you're sure you look as amazing as ever.#!"
 dancing_shadows_perk_name: "Dancing Shadows"
 DANCING_SHADOWS_PERK_EFFECT: "[character_interaction|E]: Inflict #V 1-3#! [POD_superficial_damage|E] to a character.\n#flavor Your shadow sometimes abandons you to attack your foes, at least that's what you think.#!"
 fragmented_psyche_perk_name: "Fragmented Psyche"
 FRAGMENTED_PSYCHE_PERK_EFFECT: "#flavor With a split psyche you would be much more efficient at achieving your goals, your own of course.#!"
 splintered_soul_perk_name: "Splintered Soul"
 SPLINTERED_SOUL_PERK_EFFECT: "[character_interaction|E]: Create an [ancestor_spirit|E] clone of yourself.\n#flavor The Soul takes on a form of its own, to better serve its master.#!"
 maniacal_mind_perk_name: "Maniacal Mind"
 MANIACAL_MIND_PERK_EFFECT: "[character_interaction|E]: Increase a character's [opinion|E] of you while increasing their [stress|E].\n$countermeasures_unlocks_t3_mental_fortress$\n#flavor The Mind is safe in its own delusions, locked away from reality.#!"
 sanguine_spirit_perk_name: "Sanguine Spirit"
 SANGUINE_SPIRIT_PERK_EFFECT: "Empowering Banes now only causes #V 1#! [POD_aggravated_damage|E] to yourself.\nCan recruit [GetMaA('nexus_crawlers').GetName] as [men_at_arms|E].\n#flavor The Spirit glows with a dark radiance, attracting kindred spirits.#!"
 embrace_oblivion_perk_name: "Embrace Oblivion"
 EMBRACE_OBLIVION_PERK_EFFECT: "[character_interaction|E]: Make a [wyrm_tainted|E] [Glossary('Фера', 'glossary_fera_tt')] fully fall to the [Glossary('Wyrm', 'glossary_wyrm_tt')].\nUnlock the [investiture_lifestyle|E] [lifestyle|E].\n#flavor Another soul claimed by the Wyrm.#!"
 #\nUnlocks a unique level 4 [mental_break|E]. TODO Wyrm: add this back in once the stress stuff is done









