 RUH_ALLAH_PERK_EFFECT: "[Concept('faction_commitment', 'Преданность')|E] [Concept('vassal', 'вассала')|E] фракции: #P -20#!\n\n#weak Рух Аллах помогает каиниту восстановить контроль над собой и теми, кто его окружает.#!"
 RUH_ALLAH_FACTION_REASON: "[GetPerk('ruh_allah_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 ghadub_allah_perk_name: "Гадуб Аллах"
 GHADUB_ALLAH_PERK_EFFECT: "При начале [Concept('war', 'войны')|E] в качестве основного нападающего или защитника все правители противоположной стороны получат модификатор [GetModifier('ghadub_allah_modifier').GetNameWithTooltip].\nПозволяет заключить [Concept('white_peace', 'белый мир')|E] между вами и целью, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Позволяет останавливать атаки без необходимости зрительного контакта.#!"
 kubda_allah_perk_name: "Кубда Аллах"
 KUBDA_ALLAH_PERK_EFFECT: "Позволяет получить [Concept('strong_hook', 'сильное влияние')|E] на цель или ранить её в случае провала, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Выбивает нежизнь из противника и заставляет его подчиниться. Заклинатель должен быть достаточно сдержан, чтобы использовать свою силу во благо.#!"

 hikma_allah_perk_name: "Хикма мин Аллах"
 HIKMA_ALLAH_PERK_EFFECT: "#weak Благодаря длительному самоанализу аширриты способны сосредоточить свой ум на решении проблем.#!"
 idrak_allah_perk_name: "Идрак' мин Аллах"
 IDRAK_ALLAH_PERK_EFFECT: "Позволяет раскрыть все [Concept('schemes', 'происки')|E] и [Concept('secrets', 'секреты')|E] персонажа, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak С помощью силы молитвы вы сможете лучше понять своих врагов.#!"
 sultat_nabi_perk_name: "Султат эль-Наби"
 SULTAT_NABI_PERK_EFFECT: "Позволяет заставить цель случайным образом передать вам @gold_icon!, @prestige_icon!, обычный или знаменитый [Concept('inventory_artifact', 'артефакт')|E], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Заставляет цель повиноваться короткой фразе, состоящей не более чем из десяти слов.#!"
 sawt_nabi_perk_name: "Саут эль-Наби"
 SAWT_NABI_PERK_EFFECT: "#weak Заклинатель может общаться с любым известным ему каинитом, независимо от расстояния.#!"
 nar_iman_perk_name: "Нар эль-Иман"
 NAR_IMAN_PERK_EFFECT: "Позволяет ранить персонажа 3 раза и наделить его модификатором [GetModifier('nar_iman_modifier').GetNameWithTooltip] на 10 лет, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Использование присущей вампирам слабости в вопросах веры, подрывая решимость цели и нанося ей как психические, так и физические увечья.#!"

 eyes_of_the_earth_perk_name: "Глаза земли"
 EYES_OF_THE_EARTH_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\n#flavor Вампир «видит» всё, что происходит вокруг его убежища, используя ближайших духов трав и других растений, деревьев, камней и зверей.#!"
 roots_of_power_perk_name: "Корни силы"
 ROOTS_OF_POWER_PERK_EFFECT: "#flavor Сиеланит черпает силу, скрытую в земле.#!"
 arbor_of_protection_perk_name: "Защищающее древо"
 ARBOR_OF_PROTECTION_PERK_EFFECT: "#flavor Вампир ищет укрытие в живом дереве.#!"
 course_of_the_beast_perk_name: "Следом за зверем"
 COURSE_OF_THE_BEAST_PERK_EFFECT: "Разблокированы различные звериные формы для смены облика.\n#flavor Вампир может принять облик любого животного, обитающего на его территории.#!"
 way_of_the_stone_perk_name: "Дорогою камня"
 WAY_OF_THE_STONE_PERK_EFFECT: "Разблокирован вариант смены облика «[GetModifier('POD_shapeshift_form_stone_dolmen_modifier').GetNameWithTooltip]».\n#flavor Вампир превращается в нечто, напоминающее каменный дольмен. Легенды о камнях, что перемещаются по ночам, обязаны именно практикам этого могучего искусства.#!"

 see_the_dead_perk_name: "Видеть мёртвых"
 SEE_THE_DEAD_PERK_EFFECT: "$POD_can_summon_wraith_trigger_loca$\n#flavor Вампир может видеть призраков, живущих на территории.#!"
 repel_the_angry_dead_perk_name: "Отгон гневающихся мёртвых"
 REPEL_THE_ANGRY_DEAD_PERK_EFFECT: "Можно [Concept('POD_banish', 'изгонять')|E] #TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призраков#!#!.\nВражеские [Concept('knights', 'рыцари')|E], выступающие в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат модификатор «[GetModifier('repel_the_angry_dead_modifier').GetNameWithTooltip]», если они являются #TOOLTIP:GAME_TRAIT,wraith,[GetNullCharacter] #L призраками#!#!.\n#flavor С помощью этой способности вампир может изгонять враждебных призраков из определённой местности.#!"
 command_the_freshly_dead_perk_name: "Повелевание недавно умершими"
 COMMAND_THE_FRESHLY_DEAD_PERK_EFFECT: "$POD_can_weaken_fetter_trigger_loca$\n$POD_can_bind_wraith_trigger_loca$\n$POD_can_command_wraith_trigger_loca$\n#flavor Вампир может заставить подчиниться любого призрака, которого видит.#!"
 army_of_souls_perk_name: "Армия душ"
 ARMY_OF_SOULS_PERK_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('spectres').GetName].\n#flavor Сиеланит использует эту способность для того, чтобы поднять отряд призраков и использовать их как защитников или тех, кто будет угрожать его врагам.#!"
 walk_the_road_of_shadows_perk_name: "Шагая по дороге теней"
 WALK_THE_ROAD_OF_SHADOWS_PERK_EFFECT: "#flavor Вампир может пройти в [UmbraGlossaryLocalized('shadowlands','Загробный мир')] и появиться в виде плотного призрака.#!"