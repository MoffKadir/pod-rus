 BESTOWMENT_OF_SCALES_PERK_EFFECT: "Вы можете наделить цель - члена [Concept('POD_herd', 'стада')|E] модификатором [GetModifier('bestowment_of_scales_modifier').GetNameWithTooltip] на 20 лет, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Вылечить гуля быстрее, нарастив на его ранах чешуйчатую кожу#!"
 SUFFER_FOR_JORMUNGANDR_PERK_EFFECT: "Вы можете наделить цель свойством «[GetTrait('scaly').GetName(GetNullCharacter)]» и модификатором [GetModifier('suffer_for_jormungandr_modifier').GetNameWithTooltip], также увеличив случайный [Concept('skill', 'навык')|E] на 5, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Придать гулю рептильные черты#!"
 SWALLOW_THE_TAIL_PERK_EFFECT: "Вы можете получить случайное количество от 1 до 4 ед. крови, нанеся раны всему [Concept('court', 'двору')|E], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Притянуть к себе пролитую кровь из окружающих вас людей#!"
 CYCLE_OF_THE_MIDGARD_SERPENT_PERK_EFFECT: "Снижает затраты [Concept('lifestyle_experience', 'опыта образа жизни')|E] для изучения дисциплин на #p -100%#!\n#flavor Наделите гуля способностью использовать ваши дисциплины#!"

 cycle_of_the_midgard_serpent_perk_tt: "Изучение [Glossary('дисциплины','game_concept_discipline_desc')] не требует затрат из-за наличия достоинства «[GetPerk('cycle_of_the_midgard_serpent_perk').GetName(GetPlayer)]»!"
 APEPS_TRANSFORMATION_PERK_EFFECT: "Вы можете принести в жертву вашего гуля, чтобы получить складывающийся модификатор [GetModifier('apeps_transformation_modifier').GetNameWithTooltip], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Превратить гуля в огромную змею, способную понимать человеческую речь#!"


 saut_allah_perk_name: "Саут Аллах"
 SAUT_ALLAH_PERK_EFFECT: "Вы можете снизить стресс у цели и наделить её модификатором [GetModifier('saut_allah_modifier').GetNameWithTooltip] на 10 лет, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Заклинатель подготавливает своих собратьев-аширритов к предстоящим трудностям.#!"
 nuzra_allah_perk_name: "Нузра Аллах"
 NUZRA_ALLAH_PERK_EFFECT: "Ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат модификатор [GetModifier('nuzra_allah_modifier').GetNameWithTooltip].\n\n#weak Защитная способность, которая защищает заклинателя от видимого вреда.#!"
 ruh_allah_perk_name: "Рух Аллах"
 RUH_ALLAH_PERK_EFFECT: "[Concept('faction_commitment', 'Преданность')|E] [Concept('vassal', 'вассала')|E] фракции: #P -20#!\n\n#weak Рух Аллах помогает каиниту восстановить контроль над собой и теми, кто его окружает.#!"
 RUH_ALLAH_FACTION_REASON: "[GetPerk('ruh_allah_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 ghadub_allah_perk_name: "Гадуб Аллах"
 GHADUB_ALLAH_PERK_EFFECT: "При начале [Concept('war', 'войны')|E] в качестве основного нападающего или защитника все правители противоположной стороны получат модификатор [GetModifier('ghadub_allah_modifier').GetNameWithTooltip].\nПозволяет заключить [Concept('white_peace', 'белый мир')|E] между вами и целью, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Позволяет останавливать атаки без необходимости зрительного контакта.#!"
 kubda_allah_perk_name: "Кубда Аллах"
 KUBDA_ALLAH_PERK_EFFECT: "Позволяет получить [Concept('strong_hook', 'сильное влияние')|E] на цель или ранить её в случае провала, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Выбивает нежизнь из противника и заставляет его подчиниться. Заклинатель должен быть достаточно сдержан, чтобы использовать свою силу во благо.#!"

 hikma_allah_perk_name: "Хикма мин Аллах"
 HIKMA_ALLAH_PERK_EFFECT: "#weak Благодаря длительному самоанализу аширриты способны сосредоточить свой ум на решении проблем.#!"
 idrak_allah_perk_name: "Идрак' мин Аллах"
 IDRAK_ALLAH_PERK_EFFECT: "Позволяет раскрыть все [Concept('schemes', 'происки')|E] и [Concept('secrets', 'секреты')|E] персонажа, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak С помощью силы молитвы вы сможете лучше понять своих врагов.#!"
 sultat_nabi_perk_name: "Султат эль-Наби"
 SULTAT_NABI_PERK_EFFECT: "Позволяет заставить цель случайным образом передать вам @gold_icon!, @prestige_icon!, обычный или знаменитый [Concept('inventory_artifact', 'артефакт')|E], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Заставляет цель повиноваться короткой фразе, состоящей не более чем из десяти слов.#!"
 sawt_nabi_perk_name: "Саут эль-Наби"
 SAWT_NABI_PERK_EFFECT: "#weak Заклинатель может общаться с любым известным ему каинитом, независимо от расстояния.#!"
 nar_iman_perk_name: "Нар эль-Иман"
 NAR_IMAN_PERK_EFFECT: "Позволяет ранить персонажа 3 раза и наделить его модификатором [GetModifier('nar_iman_modifier').GetNameWithTooltip] на 10 лет, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n\n#weak Использование присущей вампирам слабости в вопросах веры, подрывая решимость цели и нанося ей как психические, так и физические увечья.#!"

 eyes_of_the_earth_perk_name: "Eyes of the Earth"
 EYES_OF_THE_EARTH_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\n#flavor The vampire "sees" everything that goes on around their haven by utilizing the spirits of the grass, trees, rocks, and animals in the vicinity.#!"
 roots_of_power_perk_name: "Roots of Power"
 ROOTS_OF_POWER_PERK_EFFECT: "#flavor The Sielanic practitioner draws upon the power latent in the earth.#!"
 arbor_of_protection_perk_name: "Arbor of Protection"
 ARBOR_OF_PROTECTION_PERK_EFFECT: "#flavor The vampire seeks refuge within the living wood of trees.#!"
 course_of_the_beast_perk_name: "Course of the Beast"
 COURSE_OF_THE_BEAST_PERK_EFFECT: "Unlock various animal shapeshift forms.\n#flavor The vampire can assume the shape of any animal that exists within her domain.#!"
 way_of_the_stone_perk_name: "Way of the Stone"
 WAY_OF_THE_STONE_PERK_EFFECT: "Unlock [GetModifier('POD_shapeshift_form_stone_dolmen_modifier').GetNameWithTooltip] shapeshift option.\n#flavor The vampire transforms into a great stone dolmen. The legends of stones that walk and move about during the night come from the practice of this potent art.#!"

 see_the_dead_perk_name: "See the Dead"
 SEE_THE_DEAD_PERK_EFFECT: "$POD_can_summon_wraith_trigger_loca$\n#flavor Ghosts of the dead can be seen and recognized by the user.#!"
 repel_the_angry_dead_perk_name: "Repel the Angry Dead"
 REPEL_THE_ANGRY_DEAD_PERK_EFFECT: "Can [POD_banish|E] $POD_splat_wraith_plural$\nGive [GetModifier('repel_the_angry_dead_modifier').GetNameWithTooltip] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E] if they are a [GetTrait('wraith').GetName(GetPlayer)].\n#flavor With this power, hostile ghosts and wraiths can be banished from the area.#!"
 command_the_freshly_dead_perk_name: "Command the Freshly Dead"
 COMMAND_THE_FRESHLY_DEAD_PERK_EFFECT: "$POD_can_weaken_fetter_trigger_loca$\n$POD_can_bind_wraith_trigger_loca$\n$POD_can_command_wraith_trigger_loca$\n#flavor The user can command any ghost that she can see to obey her.#!"
 army_of_souls_perk_name: "Army of Souls"
 ARMY_OF_SOULS_PERK_EFFECT: "Can recruit [GetMaA('spectres').GetName] as [men_at_arms|E].\n#flavor The Sielanic practitioner uses this power to raise a spectral troop to act as defenders or to deliver warnings to her enemies.#!"
 walk_the_road_of_shadows_perk_name: "Walk the Road of Shadows"
 WALK_THE_ROAD_OF_SHADOWS_PERK_EFFECT: "#flavor The vampire can cross into the [UmbraGlossaryLocalized('shadowlands','Underworld')] and appear as a solid wraith.#!"