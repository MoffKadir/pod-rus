 BLOOD_PERMANENCY_PERK_EFFECT: "Улучшает #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#! достоинства «[GetPerk('summon_the_simplest_form_perk').GetName(GetPlayer)]», вы можете призвать 2 материала ремесла одновременно.\n#weak Сотворенным предметам может быть придано постоянное существование#!"
