 SIGHT_OF_THE_JACKAL_PERK_EFFECT: "Можно взаимодействовать с персонажами по ту сторону Барьера.\n#flavor Осознание присутствия призраков#!"
 WEIGH_THE_VIRTUES_PERK_EFFECT: "Вы можете наделить пленённую цель-призрака модификатором [GetModifier('weigh_the_virtues_modifier').GetNameWithTooltip], позволяющим в дальнейшем использовать #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинания#!#! из этой #TOOLTIP:game_concept_bloodmagic_path_desc #E тропы#!#!.\n#flavor Узнать о преступлениях или героических поступках мёртвых или нежити#!"
 PHARAOHS_SENTRY_PERK_EFFECT: "Позволяет принести в жертву цель-призрака с модификатором [GetModifier('weigh_the_virtues_modifier').GetNameWithTooltip], чтобы призвать армию профессионалов - [GetMaA('pharaohs_sentry').GetName], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Привязать фрагмент призрака к трупу, чтобы он выполнял одну единственную команду.#!"
 IMBUE_WITH_THE_GRACE_OF_ANUBIS_PERK_EFFECT: "#flavor Оживить труп и наделить его особой целью, связанной с его добродетельными или злодейскими поступками#!"
 THE_SORCERY_OF_LIFE_PERK_EFFECT: "Превращает цель-призрака с модификатором [GetModifier('weigh_the_virtues_modifier').GetNameWithTooltip] из призрака в проклятую мумию, ценой модификатора [GetModifier('the_sorcery_of_life_modifier').GetNameWithTooltip] на 20 лет и огромной потерей [Concept('piety', 'благочестия')|E], если ваша [Concept('faith', 'конфессия')|E] не принимает демонов.\n#flavor Уменьшенная версия обряда проклятия, колдун создаёт своего рода прото-проклятую мумию.#!"

