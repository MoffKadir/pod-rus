 WHISPERS_OF_THE_SANDS_PERK_EFFECT: "#weak Удаленное общение со своими детьми или гулями.#!"
 TONGUE_OF_THE_TEMPTER_PERK_EFFECT: "Вы можете раскрыть [Concept('secret', 'секрет')|E] цели, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Вызывает у субъекта тайный страх или желание.#!"
 VOICE_OF_THE_PROPHET_PERK_EFFECT: "Вы можете заставить цель улучшить мнение о вас и потерять [Concept('piety', 'благочестие')|E] и [Concept('prestige', 'престиж')|E], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Передача загадочного послания, которое затронет самые сокровенные желания слушателя.#!"
 LORD_OF_STORMS_PERK_EFFECT: "Вражеские [Concept('knights', 'рыцари')|E], выступающие в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат модификатор [GetModifier('lord_of_storms_modifier').GetNameWithTooltip]\n#weak Призыв песчаной или грозовой бури.#!"
