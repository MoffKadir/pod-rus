 BEAUTY_FADES_PERK_EFFECT: "Вы можете дать цели 50 [Concept('stress', 'стресса')|E], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Произведение искусства должно вызывать отвращение у тех, кто его рассматривает.#!"
 TRUST_WITHERS_PERK_EFFECT: "Вы можете заставить цель разорвать случайные [Concept('friend', 'дружеские')|E] отношения, или понизить [Concept('best_friend', 'лучшего друга')|E] до обычного [Concept('friend', 'друга')|E], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Цель начинает верить, что друг или союзник собирается его предать.#!"
 LOVE_DIES_PERK_EFFECT: "Вы можете заставить цель разорвать случайные [Concept('lover', 'любовные')|E] отношения, или понизить [Concept('soulmate', 'родственную душу')|E] до обычного любовника, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Уничтожение чувства любви субъекта к другому.#!"
 HOPE_DISSOLVES_PERK_EFFECT: "Повышает прирост [Concept('stress', 'стресса')|E] от #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинания#!#! [GetPerk('beauty_fades_perk').GetName(GetPlayer)] до 100.\n#weak Вызывает у субъекта депрессию и уверенность в том, что его цели не могут быть достигнуты.#!"
 THRONES_CRUMBLE_PERK_EFFECT: "Вы можете наделить цель модификатором [GetModifier('thrones_crumble_modifier').GetNameWithTooltip], применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Вызывает недоверие и враждебность у субъекта по отношению к властному лицу.#!"

 first_taste_perk_name: "Первая проба"
