 REVERSE_CONJURATION_PERK_EFFECT: "Снижает стоимость #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинаний#!#! этой #TOOLTIP:game_concept_bloodmagic_path_desc #E тропы магии крови#!#!.\nУлучшает #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#! «[GetPerk('magic_of_the_smith_perk').GetName(GetPlayer)]», вы можете призвать мастерский [artifact|El] вместо обычного.\n#weak Изгнание предметов, созданных с помощью этого пути#!"
 POWER_OVER_LIFE_PERK_EFFECT: "Вы можете призвать армию случайных [Concept('men_at_arms', 'профессионалов')|E], использовав это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\nУлучшает #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#! «[GetPerk('reverse_conjuration_perk').GetName(GetPlayer)]», вы можете призвать знаменитый [artifact|El] вместо мастерского.\n#weak Временное сотворение живых (хотя и бездумных) существ#!"

