 ##Koldunic
 #Transylvanian Kraina
 burebistas_throne_perk_name: "Трон Буребисты"
 BUREBISTAS_THRONE_PERK_EFFECT: "#flavor Царь Буребиста, который веками наводил ужас на греков, построил на вершине горы огромный трон, с которого он мог обозревать все свои земли и врагов. Буребиста больше не нуждался в троне и передал его своему дитя-колдуну.#!"
 pietrosus_hospitality_perk_name: "Гостеприимство Петроса"
 PIETROSUS_HOSPITALITY_PERK_EFFECT: "#flavor Пронизывающие ветры горы Пьетросу и низкие температуры убьют незащищённого человека за считанные мгновения. Колдун вызывает эти мощные и ледяные ветры, которые окружают его, нанося вред всем, кто находится поблизости. Это также делает его неуязвимым для холода и силы ветра.#!"
 the_banks_of_the_basca_perk_name: "Берега Баски"
 THE_BANKS_OF_THE_BASCA_PERK_EFFECT: "Значительно повышает вероятность того, что [Concept('characters', 'персонажи')|E] [Concept('imprison', 'попадут в темницу')|E] после успешной [Concept('siege', 'осады')|E] или [Concept('raid', 'набега')|E] в прибрежных провинциях.\n\n#flavor Когда идут дожди, Баска выходит из берегов, и целые деревни оказываются сметёнными с лица земли, а вместе с ними и любой человек, у которого не хватило ума подняться повыше. Колдун, обладающий этой способностью, несёт с собой растущую мощь Баски, куда бы он ни пошёл.#!"
 kupalas_exhalation_perk_name: "Вздох Купалы"
 KUPALAS_EXHALATION_PERK_EFFECT: "[bs_spell|E]: Вы можете наделить свою локацию модификатором «[GetModifier('kupalas_exhalation_modifier').GetNameWithTooltip]» на 5 лет.\n[kraina|E]: Вместо этого применяется модификатор «[GetModifier('kupalas_exhalation_modifier2').GetNameWithTooltip]».\n\n#flavor Колдун вызывает из земли смертоносные холодные газы. Любое пламя может привести к страшному взрыву этих газов. Считается, что эти газы - дыхание Купалы.#!"
 restless_medias_perk_name: "Беспокойная медия"
 RESTLESS_MEDIAS_PERK_EFFECT: "[bs_spell|E]: Вы можете наделить свою локацию модификатором «[GetModifier('weather_magic_earthquake_modifier').GetNameWithTooltip]» на 10 лет.\n[kraina|E]: Модификатор применяется ко всем окружающим графствам.\n\n#flavor Время от времени земля под деревней Медиаш сотрясается и вздымается, срывая здания с опор. Местные жители винят во всём богов, но колдуны знают, что это Купала беспокойно ворочается в своей земляной могиле. Колдуны с величайшим мастерством знают, как вывести его из себя.#!"

 #Black Sea Kraina
 danubian_voices_perk_name: "Голоса Дуная"
 DANUBIAN_VOICES_PERK_EFFECT: "#flavor Колдуны знают истинную ценность Дуная. Духи реки разговаривают с ними, передавая то, что они знают, или передавая послания для колдунов.#!"
 grave_of_the_marea_neagra_perk_name: "Могила Марэ Негра"
 GRAVE_OF_THE_MAREA_NEAGRA_PERK_EFFECT: "#flavor Колдун всегда может благополучно опуститься на самые низкие глубины Чёрного моря, где он может комфортно отдыхать, защищённый от солнца и внешнего мира.#!"
 pontos_euxeinos_perk_name: "Гостеприимное море"
 PONTOS_EUXEINOS_PERK_EFFECT: "[bs_spell|E]: Исцеляет [Concept('POD_aggravated_damage', 'серьёзный урон')|E] и непостоянные раны.\n[kraina|E]: Дополнительно применяет модификатор «[GetModifier('pontos_euxeinos_modifier').GetNameWithTooltip]» на 10 лет.\n\n#flavor Греки когда-то называли Чёрное море Понтом Эвксинским, «Гостеприимным морем». Для колдунов Чёрного моря оно действительно может быть таким, заключая их в свои объятия и исцеляя даже от самых серьёзных травм.#!"
 minions_of_deep_marmora_perk_name: "Слуги глубин Мармары"
 MINIONS_OF_DEEP_MARMORA_PERK_EFFECT: "[bs_spell|E]: Призывает полк профессионалов - [GetMaA('water_spirits').GetName], которые помогут вам в войне.\n[kraina|E]: Призывает дополнительный полк.\n\n#flavor Легенда гласит, что колдун Кизик обнаружил, что если он прольёт свою кровь в Мраморное море, то из глубин всплывут странные звери, чтобы исполнить его волю. Другие колдуны обнаружили, что любой водоем служит тому же самому.#!"
 pontos_axeinos_perk_name: "Неприветливое море"
 PONTOS_AXEINOS_PERK_EFFECT: "[bs_spell|E]: Снижает [Concept('supplies', 'припасы')|E] вражеской высадившейся армии на #V 20%#!.\n[kraina|E]: Также вызывает потери армии.\n\n#flavor До того, как греки заселили его южную береговую линию, они называли Чёрное море Понтом Аксинским, что означает «Негостеприимное море». Для врагов колдунов оно действительно может быть очень негостеприимным.#!"


 #Bialowieza Kraina
 domain_breach_perk_name: "Нарушение границ"
 DOMAIN_BREACH_PERK_EFFECT: "#flavor Колдун столь связан со своим доменом, что может засечь нарушителя, перешедшего границу его территорий.#!"
 fingers_of_bialowieza_perk_name: "Пальцы Беловежской пущи"
 FINGERS_OF_BIALOWIEZA_PERK_EFFECT: "Вероятность [Concept('imprison', 'заключения в темницу')|E]: #P +10%#!\nДоступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('animated_tree').GetName].\n\n#flavor Колдун с помощью этой способности приказывает ближайшим растениям и деревьям опутать и, возможно, обездвижить, жертв.#!"
 grondrskas_impasse_perk_name: "Безвыходность Грондорски"
 GRONDRSKAS_IMPASSE_PERK_EFFECT: "#flavor История рассказывает о браконьере, вторгшемся в земли Цимисхи. Вскоре он бежал в ужасе и панике. Он считал, что знает лес, но деревья двигались вокруг него, отрезая выход и направляя его прямиком к ожидающему его голодному колдуну.#!"
 mouth_of_djabalek_perk_name: "Пасть Джабалека"
 MOUTH_OF_DJABALEK_PERK_EFFECT: "В начале битвы вражеский [Concept('knight', 'рыцарь')|E] с самым низким значением [Concept('prowess', 'доблести')|E] выходит из боя, а вы кормитесь от него.\n\n#flavor Джабалек — ужасающий цимисхи, погребённый где-то в Беловежской пуще. Говорят, что он как-то продолжает питаться, несмотря на торпор, открывая во время сна рот и пожирая всё, что в него попадёт. Колдун разверзает землю под своей жертвой, отправляя её на корм Джабалеку.#!"
 the_white_tower_perk_name: "Белая башня"
 THE_WHITE_TOWER_PERK_EFFECT: "#flavor Белая башня - это дар демонов земли, с которыми Джабалек когда-то заключил договор. Кости всех жертв Беловежской крайны вырываются из-под земли и заключают колдуна в башню из земли и костей.#!"

 #Kraina of the Well
 call_the_children_perk_name: "Призвать дитя"
 CALL_THE_CHILDREN_PERK_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('demonhound').GetName].\n\n#flavor Чтобы командовать чем-то, нужно узнать об этом. Демоны, как и собаки, всегда стремятся прийти, когда их призывают хозяева.#!"
 heed_the_hell_bound_heart_perk_name: "Стук адского сердца"
 HEED_THE_HELL_BOUND_HEART_PERK_EFFECT: "[bs_spell|E]: [GetTrait('demon').GetName(GetPlayer)] или [GetTrait('witch').GetName(GetPlayer)|l] наделяются модификатором «[GetModifier('heed_the_hell_bound_heart_modifier').GetNameWithTooltip]» на 5 лет.\n[kraina|E]: Вместо этого применяется «[GetModifier('heed_the_hell_bound_heart_modifier2').GetNameWithTooltip]».\n\n#flavor Благодаря благословению или знакомству, колдун, пьющий из Колодца, получает сверхъестественное чувство, предупреждающее его обо всех демонических проделках вокруг.#!"
 aegis_alighieri_perk_name: "Эгида Алигьери"
 AEGIS_ALIGHIERI_PERK_EFFECT: "Наделяет сильной ментальной защитой против #TOOLTIP:GAME_TRAIT,demon,[GetPlayer] #L демонов#!#! и #TOOLTIP:GAME_TRAIT,witch,[GetPlayer] #L инферналистов#!#!.\nВражеские [Concept('knights', 'рыцари')|E], выступающие в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат модификатор «[GetModifier('aegis_alighieri_modifier').GetNameWithTooltip]», если они являются #TOOLTIP:GAME_TRAIT,demon,[GetPlayer] #L демонами#!#! или #TOOLTIP:GAME_TRAIT,witch,[GetPlayer] #L инферналистами#!#!.\n\n#flavor Эгида Алигьери защищает колдуна от нападений, хищничества и осквернения демоническими силами.#!"
 heave_the_host_of_hell_perk_name: "Изгнание адского сонма"
 HEAVE_THE_HOST_OF_HELL_PERK_EFFECT: "[bs_spell|E]: Наносит #V [EmptyScope.ScriptValue('POD_base_fire_damage')|V0] ед. огненного#! урона #TOOLTIP:GAME_TRAIT,demon,[GetPlayer] #L демону#!#! или #TOOLTIP:GAME_TRAIT,witch,[GetPlayer] #L инферналисту#!#!.\n[kraina|E]: Вместо этого наносит #V [EmptyScope.ScriptValue('POD_double_fire_damage')|V0] ед. огненного#! урона.\n\n#flavor Изучив, как призывать, ощущать и защищаться от порождений Ада, колдун отныне может полностью стирать оставленные ими шрамы.#!"
 reap_the_well_perk_name: "Жатва Колодца"
 REAP_THE_WELL_PERK_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('aughisky').GetName].\n\n#flavor Колдун призывает окровавленные крючковатые цепи из своих рук, чтобы заставить демона служить ему.#!"


 #Kraina of Enoch
 shroud_of_oblivion_perk_name: "Саван Забвения"
 SHROUD_OF_OBLIVION_PERK_EFFECT: "Можно взаимодействовать с персонажами по ту сторону Завесы.\n\n#flavor Колдун вырывает кусок ткани [UmbraGlossaryLocalized('underworld','Загробного мира')], чтобы насытить пространство вокруг себя его атрибутами.#!"
 spectral_cloak_perk_name: "Призрачная накидка"
 SPECTRAL_CLOAK_PERK_EFFECT: "#flavor Воспользовавшись зрением мёртвых, колдун поражает окружающих проблеском мира за пределами знакомого живым. Призрачная накидка скрывает колдуна от недружественных глаз и ужасом отгоняет нежелательных наблюдателей.#!"
 pond_of_malevolent_dread_perk_name: "Пруд злобного ужаса"
 POND_OF_MALEVOLENT_DREAD_PERK_EFFECT: "[bs_spell|E]: Призывает два полка профессионалов - [GetMaA('spectres').GetName], которые помогут вам в войне.\n[kraina|E]: Вместо этого призывает четыре полка.\n\n#flavor Расположенное прямо над бездной Загробного мира, нет места более пугающего, лишённого света, мрачного или блеклого, чем Море Теней: океана душ на грани абсолютного разрушения. Колдун создаёт разрыв, чтобы отхлебнуть от судьбы этого моря и выпустить его поток.#!"
 wrath_of_the_tempest_perk_name: "Ярость Бури"
 WRATH_OF_THE_TEMPEST_PERK_EFFECT: "[bs_spell|E]: Наделяет персонажа [Concept('stress', 'стрессом')|E], соответствующим количеству убитых вами персонажей.\n[kraina|E]: Дополнительно наносит ей #V [EmptyScope.ScriptValue('POD_base_lightning_damage')|V0] ед. молниеносного#! урона.\n\n#flavor Колдун призывает предсмертные хрипы всех, кого он победил, проделывая дыру в барьере между мирами, чтобы выпустить метафизическую бурю.#!"
 hunger_of_the_void_perk_name: "Голод пустоты"
 HUNGER_OF_THE_VOID_PERK_EFFECT: "[bs_spell|E]: Наделяет вашу локацию модификатором «[GetModifier('hunger_of_the_void_modifier').GetNameWithTooltip]» на 10 лет.\n[kraina|E]: Дополнительно осушает всех #TOOLTIP:GAME_TRAIT,mortal,[GetPlayer] #L смертных#!#! в провинции.\n\n#flavor Колдун олицетворяет искажения Бури, истязая свою душу, чтобы проделать в реальности бездну полного разрушения.#!"

 #Genius Loci
 genius_loci_1_perk_name: "Малый Genius Loci"
 GENIUS_LOCI_1_PERK_EFFECT: "Повышает вероятность успеха всех [Concept('krainas', 'крайн')|E] на #P +10%#!\n\n#flavor Колдун распространяет своё сознание на землю, по которой он ступает.#!\n@warning_icon!#warning Достоинства из этого древа приобретаются автоматически при завершении других путей [Concept('kraina', 'крайны')|E].#!"
 genius_loci_2_perk_name: "Обычный Genius Loci"
 GENIUS_LOCI_2_PERK_EFFECT: "Повышает вероятность успеха всех [Concept('krainas', 'крайн')|E] на #P +10%#!\nМожно использовать [Concept('artifacts', 'артефакты')|E]-[Concept('fetish', 'фетиши')|E].\n\n#flavor Колдун ещё больше расширяет своё сознание, совершенствуя свои колдовские способности.#!"
 genius_loci_3_perk_name: "Устойчивый Genius Loci"
 GENIUS_LOCI_3_PERK_EFFECT: "[Concept('krainas', 'Крайны')|E] и их [Concept('bs_rituals', 'ритуалы')|E] стоят на 1 @blood_icon! меньше при наложении из их усиленных локаций.\n\n#flavor Локус колдуна способен самостоятельно поддерживать себя.#!"
 genius_loci_4_perk_name: "Высший Genius Loci"
 GENIUS_LOCI_4_PERK_EFFECT: "Повышает вероятность успеха всех [Concept('krainas', 'крайн')|E] на #P +15%#!\n$countermeasures_unlocks_t3_all_seeing_eye$\n\n#flavor Локус колдуна видит всё.#!"
 genius_loci_5_perk_name: "Легендарный Genius Loci"
 GENIUS_LOCI_5_PERK_EFFECT: "[Concept('krainas', 'Крайны')|E] и их [Concept('bs_rituals', 'ритуалы')|E] получают дополнительные эффекты при наложении из их усиленных локаций.\n\n#flavor Колдун и земля стали одним целым.#!"

 #Way of Earth
 grasping_soil_perk_name: "Цепкая почва"
 GRASPING_SOIL_PERK_EFFECT: "Вражеские [Concept('rulers', 'правители')|E] в начале [Concept('war', 'войны')|E] получат модификатор «[GetModifier('grasping_soil_modifier').GetNameWithTooltip]».\n\n#flavor Колдун приказывает земле подняться в виде брызг грязи и заползти по ногам жертвы, обездвиживая их.#!"
 endurance_of_stone_perk_name: "Прочность камня"
 ENDURANCE_OF_STONE_PERK_EFFECT: "#flavor Впитывая в себя сущность земли, колдун может обрести некоторую степень её сверхъестественной стойкости.#!"
 hungry_earth_perk_name: "Голодная земля"
 HUNGRY_EARTH_PERK_EFFECT: "#flavor Колдун втягивает свою жертву в землю и давит её своей безжалостной хваткой.#!"
 root_of_vitality_perk_name: "Корень жизненной силы"
 ROOT_OF_VITALITY_PERK_EFFECT: "#flavor Гораздо менее агрессивное использование «Голодной земли»: вместо мучительной агонии тело жертвы насыщается плодородной эссенцией земли.#!"
 kupalas_fury_perk_name: "Ярость Купалы"
 KUPALAS_FURY_PERK_EFFECT: "[bs_spell|E]: Удаляет [Concept('holding', 'владение')|E] в вашей локации.\n\n#flavor Колдун своей кровью пробуждает порчу Купалы, чтобы потусторонняя сила могла грызть корни гор и биться под землей, подобно великому дракону из геральдики Цимисхи.#!"

 #Way of Wind
 breath_of_whispers_perk_name: "Дыхание шёпота"
 BREATH_OF_WHISPERS_PERK_EFFECT: "#flavor Даже в своё отсутствие колдуны вселяют глубокий страх в бояр. Эта способность разносит слова вампира лёгким ветерком и возвращается с ответом цели.#!"
 biting_gale_perk_name: "Пронизывающий порыв"
 BITING_GALE_PERK_EFFECT: "Наносит #V [EmptyScope.ScriptValue('POD_base_wound_damage')|V0] ед.#! [Concept('POD_superficial_damage', 'поверхностного урона')|E] вражеским [Concept('knights', 'рыцарям')|E], выступающим в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или вашим противникам в [Concept('single_combat_duel_plural', 'поединке')|E].\n\n#flavor Мстительный колдун призывает пронизывающий ветер, который разрезает выбранную область.#!"
 breeze_of_lethargy_perk_name: "Летаргический ветер"
 BREEZE_OF_LETHARGY_PERK_EFFECT: "Вражеские [Concept('knights', 'рыцари')|E], выступающие в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат модификатор «[GetModifier('breeze_of_lethargy_modifier').GetNameWithTooltip]».\n\n#flavor Хотя они не могут вызвать немедленный сон, ветры, призываемые этой способностью, вызывают растущее истощение и немеющую усталость в каждом мускуле.#!"
 ride_the_tempest_perk_name: "Оседлать бурю"
 RIDE_THE_TEMPEST_PERK_EFFECT: "#flavor Колдун, использующий эту способность, передвигается с невероятной скоростью, двигаясь по ветру. Вселяя страх, он внезапно появляется в разных деревнях своих владений.#!"
 fury_of_the_night_sky_perk_name: "Ярость ночного неба"
 FURY_OF_THE_NIGHT_SKY_PERK_EFFECT: "[bs_spell|E]: Накладывает на локацию модификатор «[GetModifier('weather_magic_storm_modifier').GetNameWithTooltip]».\n\n#flavor Применяя ярость, усиленную кровью и волей, колдун может направить всю силу своего гнева в ночное небо. Клубящиеся серые тучи закрывают звёзды и луну, вызывая шквалистые порывы ветра и проливной ледяной дождь с молниями.#!"

 #Way of Water
 pool_of_lies_perk_name: "Заводь лжи"
 POOL_OF_LIES_PERK_EFFECT: "#flavor Эта универсальная способность создаёт трехмерные иллюзии на поверхности источника воды. То, как она используется, зависит от творческого подхода колдуна.#!"
 watery_haven_perk_name: "Водянистая гавань"
 WATERY_HAVEN_PERK_EFFECT: "$countermeasures_unlocks_t2_supernatural_high_alert$\n\n#flavor Колдун погружает свою цель в глубокий пруд с водой, чтобы защитить её от опасности.#!"
 fog_over_sea_perk_name: "Туман над морем"
 FOG_OVER_SEA_PERK_EFFECT: "#flavor Двигаясь с неестественной грацией призрака, колдун шагает по воде так же легко, как и по суше, не оставляя ни малейшей ряби в знак своего прохождения.#!"
 minions_of_the_deep_perk_name: "Приспешники глубин"
 MINIONS_OF_THE_DEEP_PERK_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('water_elemental').GetName].\n\n#flavor Капнув своей кровью в водоём, колдун может призвать воплощённых водных элементалей служить ему.#!"
 doom_tide_perk_name: "Роковой прилив"
 DOOM_TIDE_PERK_EFFECT: "[bs_spell|E]: Наделяет вашу цель модификатором «[GetModifier('doom_tide_modifier').GetNameWithTooltip]».\n\n#flavor Многие корабли лежат на дне морском, разбитые водоворотами колдуна.#!"

 #Way of Fire
 fiery_courage_perk_name: "Пламенная отвага"
 FIERY_COURAGE_PERK_EFFECT: "#flavor Ни один вампир не может совладать со стихией, которой он боится, поэтому эта способность превращает его страх в тлеющий уголёк.#!"
 combust_perk_name: "Воспламенение"
 COMBUST_PERK_EFFECT: "#flavor Глаза колдуна вспыхивают ярко-оранжевым цветом от магической силы, когда раскалённый воздух обвивается вокруг цели.#!"
 wall_of_magma_perk_name: "Стена магмы"
 WALL_OF_MAGMA_PERK_EFFECT: "#flavor Колдун поднимает руку, и земля раскалывается, разбрызгивая стену раскалённой магмы, быстро затвердевающую в любой желаемой форме.#!"
 bs_heat_wave_perk_name: "Волна жара"
 BS_HEAT_WAVE_PERK_EFFECT: "Наносит #V [EmptyScope.ScriptValue('POD_base_fire_damage')|V0] ед. огненного#! урона вражеским [Concept('knights', 'рыцарям')|E], выступающим в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или вашим противникам в [Concept('single_combat_duel_plural', 'поединке')|E].\n\n#flavor Действуя как проводник для паровых гейзеров, колдун направляет струю осушающего воздуха на жертву, находящуюся в пределах прямой видимости.#!"
 volcanic_blast_perk_name: "Вулканическая струя"
 VOLCANIC_BLAST_PERK_EFFECT: "#flavor По команде колдуна лава вырывается из-под земли огромным гейзером. Расплавленная порода разбрызгивается по широкой полосе, прежде чем обрушиться на землю и растекаться во всех направлениях.#!"

 #Way of Sorrow
 the_frustrations_of_nestrecha_perk_name: "Разочарование Нестречи"
 THE_FRUSTRATIONS_OF_NESTRECHA_PERK_EFFECT: "#flavor Названная по имени богини неудач и отчаяния, эта способность позволяет колдуну отобрать у жертвы желание сопротивляться.#!"
 the_insults_of_krivda_perk_name: "Оскорбления Кривды"
 THE_INSULTS_OF_KRIVDA_PERK_EFFECT: "[bs_spell|E]: Вызывает у вашей цели [Concept('mental_break', 'нервный срыв')|E].\n\n#flavor Благодаря силе Кривды - богини ненависти и ожесточения - оскорбления колдуна приводят его жертву в ярость.#!"
 the_weeping_of_kruchina_perk_name: "Слёзы Кручины"
 THE_WEEPING_OF_KRUCHINA_PERK_EFFECT: "Вражеские [Concept('knights', 'рыцари')|E], выступающие в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат 30[stress_i|E].\n\n#flavor Взгляд колдуна может сделать кого-либо настолько несчастным, что он только и делает, что плачет. Эта способность не просто заставляет пролить несколько слезинок, она вызывает истерический плач, причитания и зубовный скрежет.#!"
 the_misfortune_of_chernogolov_perk_name: "Неудача Черноголова"
 THE_MISFORTUNE_OF_CHERNOGOLOV_PERK_EFFECT: "Вражеские [Concept('commander', 'командиры')|E] в [Concept('combat_phase', 'битве')|E] получат модификатор «[GetModifier('the_misfortune_of_chernogolov_modifier').GetNameWithTooltip]».\n\n#flavor Колдун произносит фразу, заставляющую жертву чувствовать себя обреченной на провал и тем самым призывает Черноголова – среброусого бога неудач.#!"
 the_starvation_of_marena_perk_name: "Голод Марены"
 THE_STARVATION_OF_MARENA_PERK_EFFECT: "Наносит [Concept('character', 'персонажу')|E] #V [EmptyScope.ScriptValue('POD_base_cold_damage')|V0] ед. холодного#! урона и накладывает на его локацию модификатор «[GetModifier('weather_magic_blizzard_modifier').GetNameWithTooltip]».\n\n#flavor Призывая жену Купалы, колдун обрушивает на жертву голод и холод, подчиняющиеся её владычеству. Ледяной шторм обрушивается на жертву, оставляя его вымотанным, как после суровейшей из зим.#!"



 confer_with_the_blade_perk_name: "Разговор с клинком"
 grasp_of_the_mountain_perk_name: "Хватка горы"
 pierce_steels_skin_perk_name: "Пронзание стальной кожи"
 razors_shield_perk_name: "Бритвенный щит"
 strike_at_the_true_flesh_perk_name: "Удар в истинную плоть"

 CONFER_WITH_THE_BLADE_PERK_EFFECT: "Вы можете получить модификатор опыта [Concept('lifestyle', 'пути')|E], основанный на редкости вашего текущего оружия, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Просматривайте события и информацию, которые происходили вокруг оружия.#!"
 GRASP_OF_THE_MOUNTAIN_PERK_EFFECT: "#weak Мистическим образом усиливает хватку вашего оружия.#!"
 PIERCE_STEELS_SKIN_PERK_EFFECT: "#weak Направляет оружие на уничтожение всех защитных мер противника.#!"
 RAZORS_SHIELD_PERK_EFFECT: "#weak Позволяет отражать снаряды.#!"
 STRIKE_AT_THE_TRUE_FLESH_PERK_EFFECT: "#weak Обход любой сверхъестественной защиты при атаке.#!"

 maskims_touch_perk_name: "Касание маским"
