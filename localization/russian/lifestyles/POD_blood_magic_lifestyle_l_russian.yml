 THE_NARROW_HOUSE_PERK_EFFECT: "Вражеские [Concept('knights', 'рыцари')|E], выступающие в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат модификатор [GetModifier('the_narrow_house_modifier').GetNameWithTooltip]\n#weak Парализует цель.#!"
 CONSIGNMENT_TO_DUAT_PERK_EFFECT: "Вы можете убить не бессмертного персонажа или ввергнуть бессмертного персонажа в [GetTrait('torpor').GetName(GetPlayer)|l].\n#weak Убивает смертного или погружает вампира в торпор.#!"

