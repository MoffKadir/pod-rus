 A_SENDING_OF_SERPENTS_PERK_EFFECT: "Вражеские [Concept('knights', 'рыцари')|E], выступающие в роли [Concept('commander', 'командиров')|E] в ходе [Concept('combat_phase', 'фазы битвы')|E], или ваши противники в [Concept('single_combat_duel_plural', 'поединке')|E] получат модификатор [GetModifier('a_sending_of_serpents_modifier').GetNameWithTooltip].\n#weak Вызывает у цели галлюцинации, что на нее напали змеи.#!"
 DARKNESS_OF_DUAT_PERK_EFFECT: "Вы можете дать цели свойство [GetTrait('blind').GetName(GetPlayer)] на 5 лет, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#weak Ослепляет субъекта.#!"
