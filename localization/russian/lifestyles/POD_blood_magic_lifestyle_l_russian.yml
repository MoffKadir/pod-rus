 WEIGHT_OF_THE_SUN_PERK_EFFECT: "Вы можете наделить цель модификатором [GetModifier('weight_of_the_sun_modifier').GetNameWithTooltip] на 2 года, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Заставляет вампира почувствовать эффект бодрствования в течение дня#!"
 ABATED_TOOTH_PERK_EFFECT: "Вы можете наделить цель модификатором [GetModifier('abated_tooth_modifier').GetNameWithTooltip] на 3 года, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Предотвращает выдвижение клыков вампира#!"
 TREACHEROUS_BONDS_PERK_EFFECT: "Вы можете заставить одного случайного гуля цели ненавидеть её, применив это #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинание#!#!.\n#flavor Временно разрушает кровные узы, превращая любовь в ненависть#!"
 THE_WITHERING_OF_AGES_PERK_EFFECT: "Вы можете наделить цель [Concept('modifier', 'модификатором')|E], снижающим её [Concept('prowess', 'доблесть')|E] за каждые 10 лет жизни (продолжительность 2 года).\n#flavor Заставляет вампира разложиться до своего истинного возраста#!"

