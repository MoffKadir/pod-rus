 NECTAR_PERK_EFFECT: "Улучшает эффект #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинания#!#! [GetPerk('simple_nectar_perk').GetName(GetPlayer)] до 2 точек.\n#weak Сварив зелье из собственной [Glossary('витэ','game_concept_vitae_desc')], ракта-садху может наделить пьющего двумя уровнями дисциплины или пути#!"
 COMPLEX_NECTAR_PERK_EFFECT: "Улучшает эффект #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинания#!#! [GetPerk('nectar_perk').GetName(GetPlayer)] до 3 точек.\n#weak Сварив зелье из собственной [Glossary('витэ','game_concept_vitae_desc')], ракта-садху может наделить пьющего тремя уровнями дисциплины или пути#!"
 HIGH_NECTAR_PERK_EFFECT: "Улучшает эффект #TOOLTIP:game_concept_bloodmagic_spell_desc #E заклинания#!#! [GetPerk('complex_nectar_perk').GetName(GetPlayer)] до 4 точек.\n#weak Сварив зелье из собственной [Glossary('витэ','game_concept_vitae_desc')], ракта-садху может наделить пьющего четырмя уровнями дисциплины или пути#!"
