 NEEDS_COMMUNE_WITH_THE_YAMA_KINGS_TEXT: "@warning_icon!#X Вам нужно обратиться к [Glossary('повелителям Яма','podgloss.yamaking')], находящимся в [Concept('umbra', 'Умбре')|E] - [UmbraGlossary('yomi_wan')], чтобы разблокировать это достоинство.#!"
