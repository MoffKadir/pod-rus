l_russian:
 game_concept_investiture_lifestyle: "Инвеститура"
 game_concept_investiture_lifestyle_desc: "#bold Investments#! are the blasphemous abilities of #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L Infernalists#!#!: individuals who consort with $POD_splat_demon_plural$. Beauty, power, longevity and more await those who are willing to taint their souls.\n\nThere are two ways to gain Investiture: either by signing a [demonic_pact|E] with a Demon to enter [thralldom|E], or by [diabolism_binding|E] a Demon to take their power by force. Both approaches first require knowledge of [GetTrait('demonology').GetName(GetNullCharacter)], which can be learned via [journey|E].\n\nInfernalism is considered a [crime|E] by all but the most evil [faiths|E]."

 investiture_lifestyle_name: "Инвеститура"
 investiture_lifestyle_desc: "Фокус на способностях, дарованных демонами."
 monthly_investiture_lifestyle_xp_gain_mult: "Ежемесячный прирост [Concept('experience', 'опыта')|E] на [Concept('lifestyle','пути')E] инвеституры"

 demonic_investment_focus: "Демонические дары"
 demonic_investment_focus_modifier: "[GetFocus('demonic_investment_focus').GetName]"
 demonic_investment_focus_desc: "#X [investiture_lifestyle|E] [lifestyle|E] [perk|E] points are #bold ONLY#! gained by [demonic_pacts|E] or [diabolism|E].#!"
 demonic_investment_focus_effect_desc: "Focusing on this lifestyle is impossible."

 investments_of_soul_focus: "Дары души"
 investments_of_soul_focus_modifier: "[GetFocus('investments_of_soul_focus').GetName]"
 investments_of_soul_focus_desc: "Благосклонность [Glossary('повелителей Яма','podgloss.yamaking')]."
 investments_of_soul_focus_effect_desc: "Сосредоточившись на дарах души, персонаж получает:"

 GAINS_INVESTITURE_LIFESTYLE_XP: "#TOOLTIP:game_concept_investiture_lifestyle_desc #E Опыт инвеституры#!#! увеличивается на $VALUE|V0$"
 GAINED_INVESTITURE_LIFESTYLE_XP: "#TOOLTIP:game_concept_investiture_lifestyle_desc #E Опыт инвеституры#!#! увеличен на $VALUE|V0$"
 I_GAIN_INVESTITURE_LIFESTYLE_XP: "Ваш #TOOLTIP:game_concept_investiture_lifestyle_desc #E опыт инвеституры#!#! увеличивается на $VALUE|V0$"
 I_GAINED_INVESTITURE_LIFESTYLE_XP: "Ваш #TOOLTIP:game_concept_investiture_lifestyle_desc #E опыт инвеституры#!#! увеличен на $VALUE|V0$"
 TARGET_GAINS_INVESTITURE_LIFESTYLE_XP: "#TOOLTIP:game_concept_investiture_lifestyle_desc #E Опыт инвеституры#!#! [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] увеличивается на $VALUE|V0$"
 TARGET_GAINED_INVESTITURE_LIFESTYLE_XP: "#TOOLTIP:game_concept_investiture_lifestyle_desc #E Опыт инвеституры#!#! [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] увеличен на $VALUE|V0$"

 GAINS_A_INVESTITURE_LIFESTYLE_PERKPOINT: "Получает $VALUE|V0$ оч. для разблокирования [Concept('perk', 'достоинства')|E] в области #TOOLTIP:game_concept_investiture_lifestyle_desc #E инвеституры#!#!"
 GAINED_A_INVESTITURE_LIFESTYLE_PERKPOINT: "Получено $VALUE|V0$ оч. для разблокирования [Concept('perk', 'достоинства')|E] в области #TOOLTIP:game_concept_investiture_lifestyle_desc #E инвеституры#!#!"
 I_GAIN_A_INVESTITURE_LIFESTYLE_PERKPOINT: "Вы получите $VALUE|V0$ оч. для разблокирования [Concept('perk', 'достоинства')|E] в области #TOOLTIP:game_concept_investiture_lifestyle_desc #E инвеституры#!#!"
 I_GAINED_A_INVESTITURE_LIFESTYLE_PERKPOINT: "Вы получили $VALUE|V0$ оч. для разблокирования [Concept('perk', 'достоинства')|E] в области #TOOLTIP:game_concept_investiture_lifestyle_desc #E инвеституры#!#!"
 TARGET_GAINS_A_INVESTITURE_LIFESTYLE_PERKPOINT: "[CHARACTER.GetShortUIName] получит $VALUE|V0$ оч. для разблокирования [Concept('perk', 'достоинства')|E] в области #TOOLTIP:game_concept_investiture_lifestyle_desc #E инвеституры#!#!"
 TARGET_GAINED_A_INVESTITURE_LIFESTYLE_PERKPOINT: "[CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsFemale, 'получила', 'получил' )] $VALUE|V0$ оч. для разблокирования [Concept('perk', 'достоинства')|E] в области #TOOLTIP:game_concept_investiture_lifestyle_desc #E инвеституры#!#!"

 INVESTITURE_LIFESTYLE_PERK_POINTS_TRIGGER: "Очки достоинств пути инвеституры: $NUM|V0$"

 ############################################################
 ############################################################
 ############################################################
  
 demonic_investment_visible: "Demonic Investments"

 INVESTITURE_COST_EFFECT: "#clickable This [perk|E] costs $VALUE|V0$ perk [Select_CString( EqualTo_CFixedPoint( '(CFixedPoint)$VALUE|q$', '(CFixedPoint)1' ), 'point', 'points' )]#!"
 INVESTITURE_STACKING_EFFECT: "#clickable This [perk|E] can be bought many times.#!"
 INVESTITURE_VISUAL_CHANGE_EFFECT: "#N This [perk|E] will permanently change your appearance!#!"

 investiture_armor_perk_name: "Armor #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_armor_perk_modifier_stacks')])#!"
 investiture_backgrounds_perk_name: "Backgrounds #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_backgrounds_perk_modifier_stacks')])#!"
 investiture_demonic_strength_perk_name: "Demonic Strength #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_demonic_strength_perk_modifier_stacks')])#!"
 investiture_longevity_perk_name: "Longevity #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_longevity_perk_modifier_stacks')])#!"
 investiture_service_perk_name: "Service #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_service_perk_modifier_stacks')])#!"

 INVESTITURE_ARMOR_PERK_EFFECT: "#flavor Like a fiend, this devil-worshipper possesses scaled skin, thick warts, leathery hide, or some other revolting form of protection.#!"
 INVESTITURE_BACKGROUNDS_PERK_EFFECT: "#flavor Some #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L Infernalists#!#! prefer more... subtle help from their patron. And contacts nicely fit for such needs.#!"
 INVESTITURE_DEMONIC_STRENGTH_PERK_EFFECT: "#flavor Evil vitality floods into the supplicant's limbs. From this moment until her death, she has the physical might of a minor devil.#!"
 INVESTITURE_LONGEVITY_PERK_EFFECT: "#flavor Most #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L Infernalists#!#! fear dying. And performing a small sacrifice of innocents to prolong their own life suits that goal.#!"
 INVESTITURE_SERVICE_PERK_EFFECT: "#flavor In an irony worthy of Hell, a slave of the Abyss can 'buy' slaves from the Abyss. These bound creatures appear by the [GetTrait('witch').GetName(GetPlayer)]'s side and ask, 'Master, what is thy will?' Doubtless, he'll have some task ready....#!"
 INVESTITURE_SERVICE_PERK_IMPS_EFFECT: "Unlock [GetMaA('imps').GetName] as [men_at_arms|E]."
 INVESTITURE_SERVICE_PERK_MALEBRANCHE_EFFECT: "Unlock [GetMaA('malebranche').GetName] as [men_at_arms|E]."
 INVESTITURE_SERVICE_PERK_LUCIFERGIA_EFFECT: "Unlock [GetMaA('lucifergia').GetName] as [men_at_arms|E]."
 INVESTITURE_SERVICE_PERK_WAR_SERVITORS_EFFECT: "Unlock [GetMaA('war_servitors').GetName] as [men_at_arms|E]."
 INVESTITURE_SERVICE_PERK_HINT_EFFECT: "#italic (Further troop types can be unlocked by investing more [perk|E] points)#!"

 investiture_claws_and_horns_perk_name: "Claws and Horns"
 investiture_goat_feet_perk_name: "Goat Feet"
 investiture_panpipe_voice_perk_name: "Panpipe Voice"

 INVESTITURE_CLAWS_AND_HORNS_PERK_EFFECT: "Deal [GetPlayer.MakeScope.ScriptValue('POD_investiture_claws_and_horns_perk_damage')] [POD_superficial_damage_with_box|E] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n#flavor Claws or horns sprout from the supplicant's body resulting in inhuman appearance.#!"
 INVESTITURE_GOAT_FEET_PERK_EFFECT: "#flavor After kissing his Patron (don't ask where), an Infernalist assumes the Devil's cloven feet. After this excruciating transformation (which takes several minutes), the Infernalist may jog or run faster than a man; and kick or trample his enemies with the hooves.#!"
 INVESTITURE_PANPIPE_VOICE_PERK_EFFECT: "Deal 25 [static_stress|E] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n#flavor With simple words or songs, a soul-sworn wench can enrapture her audience. Once bound, a victim loses his good nature; they become lustful, almost drunken in their temperament.#!"

 investiture_beast_form_perk_name: "Beast Form"
 investiture_hellfire_perk_name: "Адское пламя"
 investiture_invulnerability_perk_name: "Неуязвимость"
 investiture_serpent_skin_perk_name: "Змеиная кожа"
 investiture_wings_perk_name: "Крылья"

 INVESTITURE_BEAST_FORM_PERK_EFFECT: "Unlock various animalistic shapeshifts.\n#flavor By calling upon his Patronus, a devil-worshipper may change into one of the meaner beasts (a rat, cat, wolf, etc.).#!"
 INVESTITURE_HELLFIRE_PERK_EFFECT: "Deal [GetPlayer.MakeScope.ScriptValue('POD_investiture_hellfire_perk_damage')] fire [POD_aggravated_damage_with_box|E] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n#flavor Like a human dragon, this soul-seller can breathe gouts of fire upon his enemies. Other possible attacks include acidic bile, hot blood, flaming entrails, or other vile substances.#!"
 INVESTITURE_INVULNERABILITY_PERK_EFFECT: "#flavor Mortal weapons bounce off the Infernalist's skin with little effect.#!"
 INVESTITURE_SERPENT_SKIN_PERK_EFFECT: "As a [character_interaction|E], escape [prison|E] at the cost of [GetPlayer.MakeScope.ScriptValue('POD_investiture_serpent_skin_perk_damage')] [POD_superficial_damage_with_box|E].\n#flavor In gruesome imitation of the snake, the Infernalist can literally shed her skin and escape her bonds.#!"
 INVESTITURE_WINGS_PERK_EFFECT: "#flavor Upon uttering a blasphemous command, the supplicant grows horrible, demonic wings from between her shoulder blades.#!"

 investiture_devils_eyes_perk_name: "Devil's Eyes"
 investiture_apportation_perk_name: "Apportation"
 investiture_awareness_perk_name: "Awareness"
 investiture_luciferian_charm_perk_name: "Luciferian Charm"
 investiture_master_of_the_domain_perk_name: "Master of the Domain"

 INVESTITURE_DEVILS_EYES_PERK_EFFECT: "As a [character_interaction|E], spawn a [epidemic|E] at the target's current location.\n#flavor With a glance, an Infernalist can spoil milk, rot grain and sicken children. Although the Eyes' power is useless against adults (who feel uncomfortable under its influence, nonetheless), it can decimate a village by destroying its food stock just before winter.#!"
 INVESTITURE_APPORTATION_PERK_EFFECT: "As a [character_interaction|E], steal a target's [artifact|E] at the cost of 2 [investiture_lifestyle|E] [perk|E] points.\n#flavor With this 'gift' the hell-seeker can enchant a single object, binding it to herself. From the time of enchantment onward, she can summon that object from anywhere in the mortal world (but not across the Gauntlet). The item must be small and light enough to fit in one hand, but can be anything, magickal or otherwise.#!"
 INVESTITURE_AWARENESS_PERK_EFFECT: "#flavor With a mind-shattering shock, the demon blows open the doors of occult perception, giving an Infernalist instinctual knowledge of secrets around them.#!"
 INVESTITURE_LUCIFERIAN_CHARM_PERK_EFFECT: "#flavor Literally a charming devil, an Infernalist with this Investment can get away with damned near anything. No matter what he says or does, he awes everyone he meets.#!"
 INVESTITURE_MASTER_OF_THE_DOMAIN_PERK_EFFECT: "#flavor An Infernalist's Patron gives them a 'gift' allowing them to always know what is happening 500 feet inside of her domain as if they were watching from above.#!"

 investiture_sign_of_the_inferno_perk_name: "Sign of the Inferno"
 investiture_uncanny_beauty_perk_name: "Uncanny Beauty"
 investiture_teleportation_perk_name: "Teleportation"
 investiture_invisibility_to_animals_perk_name: "Invisibility to Animals"

 INVESTITURE_SIGN_OF_THE_INFERNO_PERK_EFFECT: "Become immune to fire.\n#flavor Kissed by Hell, this diabolist needs not fear the flames. No heat or fire can harm him in any way; it may consume his clothing and possessions, but does not scar his flesh.#!"
 INVESTITURE_UNCANNY_BEAUTY_PERK_EFFECT: "#flavor Temptation often wears a terrible splendor. In exchange for a sin or two, the supplicant assumes an unearthly, irresistible beauty.#!"
 INVESTITURE_TELEPORTATION_PERK_EFFECT: "As a [character_interaction|E], allows you to teleport your army to your target's location, or teleport to your next destination when traveling.\n#flavor When the need to be everywhere at once is unbearable for an Infernalist, their infernal Patron can give them a power fulfilling their need, but remember that no gift is free.#!"
 INVESTITURE_INVISIBILITY_TO_ANIMALS_PERK_EFFECT: "Inflict [GetModifier('POD_investiture_invisibility_to_animals_perk_modifier').GetNameWithTooltip] [modifier|E] on the enemy [ruler|E] when acting as a [commander|E] during the [combat_phase|E].\n#flavor So terrible is the Infernalist's aura that all animals that would perceive them instantly repress that memory.#!"

 investiture_bond_breaking_perk_name: "Bond-breaking"
 investiture_shameful_sight_perk_name: "Shameful Sight"
 investiture_journey_to_the_spirit_realm_perk_name: "Journey to the Spirit Realm"

 INVESTITURE_BOND_BREAKING_PERK_EFFECT: "As a [character_interaction|E], make the target lose all [hooks|E] they own.\n#flavor The hand of Surgat guides this Infernalist; normal locks, knots or bindings fall open when she caresses them.#!"
 INVESTITURE_SHAMEFUL_SIGHT_PERK_EFFECT: "#flavor Gazing into a person's eyes, an Infernalist can discern the sins that lie closest to the surface. In the Infernalist's 'inner eyes', an image of the deed wells up, clear as day. She might decide to keep that image to herself for later use, sneer about it openly, or torment the victim with a vision of it.#!"
 INVESTITURE_JOURNEY_TO_THE_SPIRIT_REALM_PERK_EFFECT: "#flavor By shedding their skin and flesh as if they are just a clothing, an Infernalist can abandon their flesh for a day allowing them surface-level access to the Umbra.#!"

 investiture_mammons_gift_perk_name: "Mammon's Gift"
 investiture_talons_of_the_plague_crow_perk_name: "Talons of the Plague-Crow"
 investiture_army_of_the_damned_perk_name: "Army of the Damned"

 INVESTITURE_MAMMONS_GIFT_PERK_EFFECT: "As a [character_interaction|E], convert an [artifact|E] into [gold_i]250 [gold|E].\n#flavor Once per night, the Infernalist may turn one small non-living object into gold. (No, undead creatures do not count as 'non-living objects'.)#!"
 INVESTITURE_TALONS_OF_THE_PLAGUE_CROW_PERK_EFFECT: "As a [character_interaction|E], gain [GetModifier('POD_talons_of_the_plague_crow_modifier').GetNameWithTooltip] for 4 years.\n#flavor An Infernalist can at command lengthen their hands into bird-claws, making any non-combat actions much harder but making for an infernal weapon of mass destruction.#!"
 INVESTITURE_ARMY_OF_THE_DAMNED_PERK_EFFECT: "As a [character_interaction|E], spawn an army of 250 [GetMaA('demons').GetName] for the duration of a [war|E].\n#flavor From the pit they come and into the pit they will throw their foes.#!"

 investiture_relentless_perk_name: "Relentless"
 investiture_regeneration_perk_name: "Regeneration"

 INVESTITURE_RELENTLESS_PERK_EFFECT: "#flavor The very power of Hell drives the Infernalist towards their goal, no matter the wounds, no matter the obstacles. The Infernalist will arrive where they want.#!"
 INVESTITURE_REGENERATION_PERK_EFFECT: "Heal every year instead of every 2 years.\nEnable natural healing for $POD_splat_vampire_plural$.\n#flavor One of the greatest “gifts” offered to mortals, this Investment allows an Infernalist to restore herself to health with a mere effort of will!#!"

 ############################################################
 ############################################################
 ############################################################

 investments_of_soul_visible: "Investments of Soul"

 NEEDS_COMMUNE_WITH_THE_YAMA_KINGS_TEXT: "@warning_icon!#X You need to commune with the [Glossary('Yama Kings','podgloss.yamaking')] located in the [umbra|E] - [UmbraGlossary('yomi_wan')] to unlock this perk.#!"
 NEEDS_BE_CHI_USER_FOR_FOCUS_TEXT: "@warning_icon!#X You need to be a chi user to pick this focus#!\n"

 mask_of_yomi_perk_name: "Маска Йоми"
 black_whispers_perk_name: "Чёрный шёпот"
 ebon_fountain_perk_name: "Эбеновый фонтан"
 luck_of_yomi_perk_name: "Удача Йоми"
 savage_kiss_perk_name: "Дикий поцелуй"
 union_of_oppositions_perk_name: "Союз противоположностей"
 iron_hands_perk_name: "Железные руки"
 breath_of_knowledge_perk_name: "Дыхание знания"
 touch_of_yama_kings_perk_name: "Касание [Glossary('повелителей Яма','podgloss.yamaking')]"
 unfolding_scarlet_lotus_perk_name: "Распустившийся алый лотос"

 MASK_OF_YOMI_PERK_EFFECT: "Свойство «[GetTrait('witch').GetName( GetPlayer )]» будет автоматически скрыто при раскрытии.\nОтменяет все принудительные изменения внешнего вида от даров.\n#F Дары персонажа больше не подают признаков. Никакие допытывания разума, исследования души или выведывание истины не смогут установить, что персонаж является [Concept('akuma', 'акума')|E], или заставить его выдать свою неправедную деятельность.#!"
 BLACK_WHISPERS_PERK_EFFECT: "Позволяет раскрыть все секреты и происки цели через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#F Шпионы [Glossary('повелителей Яма','podgloss.yamaking')] повсюду, и то, что не видят и не слышат [Concept('akuma', 'акума')|E], узнают их приспешники-духи.#!"
 EBON_FOUNTAIN_PERK_EFFECT: "Вы теряете 10 [Concept('stress', 'стресса')|E] каждый месяц.\n#F П'о персонажа связано с источником демонической силы.#!"
 LUCK_OF_YOMI_PERK_EFFECT: "Позволяет тратить очки инвеституры через [Concept('decision', 'решение')|E], чтобы получить золото и престиж. Если решение уже разблокировано, оно принесёт больше золота.\n#F Повелители Яма изменяют удачу персонажа, и в результате судьба становится благосклонней к [Concept('akuma', 'акума')|E].#!"
 SAVAGE_KISS_PERK_EFFECT: "#F Душа персонажа подвергается ласкам Мукадэ.#!"
 UNION_OF_OPPOSITIONS_PERK_EFFECT: "#F [Glossary('Повелители Яма','podgloss.yamaking')] возложили на персонажа свои руки, и он был переделан.#!"
 IRON_HANDS_PERK_EFFECT: "#F Теперь персонаж движется, опираясь на мощь [Glossary('повелителей Яма','podgloss.yamaking')].#!"
 BREATH_OF_KNOWLEDGE_PERK_EFFECT: "#F [Glossary('Повелители Яма','podgloss.yamaking')] шепчут свои знания персонажу на ухо, и они выжигаются в голове, как раскалённое железо.#!"
 TOUCH_OF_YAMA_KINGS_PERK_EFFECT: "#F [UmbraGlossaryLocalized('yomi_wan','Ад Йоми')] коснулся персонажа.#!"
 UNFOLDING_SCARLET_LOTUS_PERK_EFFECT: "Требования к уровню [Glossary('дхармы','podgloss.dharma')] при разблокировке достоинств искусств игнорируются.\n#F Бэйны нашептывают персонажу секреты своего возвышенного состояния.#!"