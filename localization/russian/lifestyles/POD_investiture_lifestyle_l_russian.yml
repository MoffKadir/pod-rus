 demonic_investment_visible: "Демонические дары"

 INVESTITURE_COST_EFFECT: "#clickable Это [Concept('perk', 'достоинство')|E] стоит $VALUE|V0$ [Select_CString( EqualTo_CFixedPoint( '(CFixedPoint)$VALUE|q$', '(CFixedPoint)1' ), 'оч.', 'оч.' )]#!"
 INVESTITURE_STACKING_EFFECT: "#clickable Это [Concept('perk', 'достоинство')|E] можно разблокировать несколько раз.#!"
 INVESTITURE_VISUAL_CHANGE_EFFECT: "#N Это [Concept('perk', 'достоинство')|E] навсегда изменит ваш внешний вид!#!"

 investiture_armor_perk_name: "Броня #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_armor_perk_modifier_stacks')])#!"
 investiture_backgrounds_perk_name: "Дополнения #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_backgrounds_perk_modifier_stacks')])#!"
 investiture_demonic_strength_perk_name: "Демоническая сила #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_demonic_strength_perk_modifier_stacks')])#!"
 investiture_longevity_perk_name: "Долголетие #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_longevity_perk_modifier_stacks')])#!"
 investiture_service_perk_name: "Служба #low ([ROOT.Char.MakeScope.ScriptValue('POD_investiture_service_perk_modifier_stacks')])#!"

 INVESTITURE_ARMOR_PERK_EFFECT: "#flavor Подобно исчадию, этот дьяволопоклонник обладает чешуйчатой кожей, толстыми бородавками, жесткой шкурой или какой-то другой отвратительной формой защиты.#!"
 INVESTITURE_BACKGROUNDS_PERK_EFFECT: "#flavor Некоторые #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L инферналисты#!#! предпочитают более... тонкую помощь от своего покровителя. И контакты прекрасно подходят для таких нужд.#!"
 INVESTITURE_DEMONIC_STRENGTH_PERK_EFFECT: "#flavor Злая энергия наполняет конечности просителя. С этого момента и до самой смерти он обладает физической мощью младшего демона.#!"
 INVESTITURE_LONGEVITY_PERK_EFFECT: "#flavor Большинство #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L инферналистов#!#! боятся смерти. И этой цели соответствует принесение в жертву невинных людей, чтобы продлить свою жизнь.#!"
 INVESTITURE_SERVICE_PERK_EFFECT: "#flavor По иронии судьбы, раб Бездны может «покупать» рабов у Бездны. Эти связанные существа появляются рядом с #TOOLTIP:GAME_TRAIT,witch,[GetNullCharacter] #L инферналистами#!#! и спрашивают: «Хозяин, какова твоя воля?» Несомненно, у него наготове какое-то задание...#!"
 INVESTITURE_SERVICE_PERK_IMPS_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] — [GetMaA('imps').GetName]."
 INVESTITURE_SERVICE_PERK_MALEBRANCHE_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] — [GetMaA('malebranche').GetName]."
 INVESTITURE_SERVICE_PERK_LUCIFERGIA_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] — [GetMaA('lucifergia').GetName]."
 INVESTITURE_SERVICE_PERK_WAR_SERVITORS_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] — [GetMaA('war_servitors').GetName]."
 INVESTITURE_SERVICE_PERK_HINT_EFFECT: "#italic (Можно разблокировать больше типов войск, вложив больше очков [Concept('perk', 'достоинств')|E])#!"

 investiture_claws_and_horns_perk_name: "Когти и рога"
 investiture_goat_feet_perk_name: "Козлиное копыто"
 investiture_panpipe_voice_perk_name: "Голос пана"

 INVESTITURE_CLAWS_AND_HORNS_PERK_EFFECT: "Наносит [GetPlayer.MakeScope.ScriptValue('POD_investiture_claws_and_horns_perk_damage')] ед. @health_track_damage_icon! [Concept('POD_superficial_damage', 'поверхностного урона')|E] вражеским [Concept('knights', 'рыцарям')|E] при участии в [Concept('combat_phase', 'бою')|E] в качестве [Concept('commander', 'командира')|E], или вашим противникам в [Concept('single_combat_duel_plural', 'поединках')|E].\n#flavor Из тела просителя вырастают когти или рога, что придаёт ему нечеловеческий вид.#!"
 INVESTITURE_GOAT_FEET_PERK_EFFECT: "#flavor Поцеловав своего покровителя (не спрашивайте, куда именно), инферналист получает раздвоенные демонические ноги. После этого мучительного превращения (которое занимает несколько минут) инферналист может бегать трусцой быстрее человека и пинать или топтать своих врагов копытами.#!"
 INVESTITURE_PANPIPE_VOICE_PERK_EFFECT: "Вызывает 25 [Concept('static_stress', 'психического напряжения')|E] у вражеских [Concept('knights', 'рыцарей')|E] при участии в [Concept('combat_phase', 'бою')|E] в качестве [Concept('commander', 'командира')|E], или у ваших противников в [Concept('single_combat_duel_plural', 'поединках')|E].\n#flavor Простыми словами или песнями поклявшийся душой может привести в восторг свою аудиторию. Оказавшись связанной, жертва теряет добродушие; она становится похотливой, почти пьяной по своему темпераменту.#!"

 investiture_beast_form_perk_name: "Звериное обличье"
 investiture_hellfire_perk_name: "Адское пламя"
 investiture_invulnerability_perk_name: "Неуязвимость"
 investiture_serpent_skin_perk_name: "Змеиная кожа"
 investiture_wings_perk_name: "Крылья"

 INVESTITURE_BEAST_FORM_PERK_EFFECT: "Открывает различные анималистические формы.\n#flavor Призывая своего патронуса, демонопоклонник может превратиться в одно из самых злобных существ (крысу, кошку, волка и т.д.).#!"
 INVESTITURE_HELLFIRE_PERK_EFFECT: "Наносит [GetPlayer.MakeScope.ScriptValue('POD_investiture_hellfire_perk_damage')] ед. огненного @health_track_aggravated_damage_icon! [Concept('POD_aggravated_damage', 'серьёзного урона')|E] вражеским [Concept('knights', 'рыцарям')|E] при участии в [Concept('combat_phase', 'бою')|E] в качестве [Concept('commander', 'командира')|E], или вашим противникам в [Concept('single_combat_duel_plural', 'поединках')|E].\n#flavor Подобно человеку-дракону, этот продавец душ может изрыгать на своих врагов потоки огня. Другие возможные атаки включают кислую желчь, горячую кровь, пылающие внутренности или другие мерзкие вещества.#!"
 INVESTITURE_INVULNERABILITY_PERK_EFFECT: "#flavor Оружие смертных отскакивает от кожи инферналиста без особого эффекта.#!"
 INVESTITURE_SERPENT_SKIN_PERK_EFFECT: "Можно сбежать из [Concept('prison', 'темницы')|E] за [GetPlayer.MakeScope.ScriptValue('POD_investiture_serpent_skin_perk_damage')] ед. @health_track_damage_icon! [Concept('POD_superficial_damage', 'поверхностного урона')|E] через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor В ужасном подражании змее инферналист может в буквальном смысле сбросить свою кожу и освободиться от пут.#!"
 INVESTITURE_WINGS_PERK_EFFECT: "#flavor После произнесения богохульного приказа у посвящённого между лопатками вырастают ужасные демонические крылья.#!"

 investiture_devils_eyes_perk_name: "Глаза дьявола"
 investiture_apportation_perk_name: "Призыв"
 investiture_awareness_perk_name: "Бдительность"
 investiture_luciferian_charm_perk_name: "Обаяние Люцифера"
 investiture_master_of_the_domain_perk_name: "Владыка домена"

 INVESTITURE_DEVILS_EYES_PERK_EFFECT: "Можно вызвать [Concept('epidemic', 'поветрие')|E] в текущей локации цели через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor Одним взглядом инферналист может испортить молоко, сгноить зерно и заразить детей. Хотя сила Глаз бесполезна против взрослых (которые, тем не менее, чувствуют себя неуютно под его воздействием), он может опустошить деревню, уничтожив запасы продовольствия незадолго до наступления зимы.#!"
 INVESTITURE_APPORTATION_PERK_EFFECT: "Можно украсть [Concept('artifact', 'артефакт')|E] у цели за 2 оч. [Concept('perk', 'достоинства')|E] [Concept('investiture_lifestyle', 'пути инвеституры')|E] через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor С помощью этого «дара» искатель ада может зачаровать один предмет, привязав его к себе. С момента наложения чар он может вызывать этот предмет из любой точки мира смертных (но не из-за Барьера). Предмет должен быть достаточно маленьким и лёгким, чтобы поместиться в одной руке, но может быть любым, магическим или иным.#!"
 INVESTITURE_AWARENESS_PERK_EFFECT: "#flavor С разбивающим рассудок шоком, демон распахивает двери оккультного восприятия, давая инферналисту инстинктивное знание окружающих его тайн.#!"
 INVESTITURE_LUCIFERIAN_CHARM_PERK_EFFECT: "#flavor С этим даром инферналист может выйти сухим почти из любой ситуации. Не важно что он говорит, или же делает, он внушает подлинное благоговение каждому встречному.#!"
 INVESTITURE_MASTER_OF_THE_DOMAIN_PERK_EFFECT: "#flavor Инферналист всегда будет знать, что происходит в 500 футах внутри его владений, как если бы он наблюдал сверху.#!"

 investiture_sign_of_the_inferno_perk_name: "Инфернальный знак"
 investiture_uncanny_beauty_perk_name: "Сверхъестественная красота"
 investiture_teleportation_perk_name: "Телепортация"
 investiture_invisibility_to_animals_perk_name: "Невидимость для животных"

 INVESTITURE_SIGN_OF_THE_INFERNO_PERK_EFFECT: "Невосприимчивость к огню.\n#flavor Отмеченному адским поцелуем демонологу больше не нужно бояться огня. Никакой смертельный жар или даже пламя не могут его обжечь. Огонь может сжечь его одежду, или другое имущество, но не оставит ни следа на его плоти.#!"
 INVESTITURE_UNCANNY_BEAUTY_PERK_EFFECT: "#flavor Искушение часто принимает устрашающий вид. В обмен на один-два греха посвящённый приобретает неземную, неотразимую красоту.#!"
 INVESTITURE_TELEPORTATION_PERK_EFFECT: "Позволяет телепортировать армию в выбранную локацию или телепортироваться к следующему пункту назначения путешествия через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor Когда необходимость быть везде одновременно становится невыносимой для инферналиста, его адский покровитель может дать ему силу, удовлетворяющую его потребности, но помните, что ни один дар не бывает бесплатным.#!"
 INVESTITURE_INVISIBILITY_TO_ANIMALS_PERK_EFFECT: "Накладывает [Concept('modifier', 'модификатор')|E] «[GetModifier('POD_investiture_invisibility_to_animals_perk_modifier').GetNameWithTooltip]» на вражеского [Concept('ruler', 'правителя')|E] при участии в [Concept('combat_phase', 'бою')|E] в качестве [Concept('commander', 'командира')|E].\n#flavor Аура инферналиста настолько ужасна, что все животные, которые могут его увидеть, мгновенно вытесняют это воспоминание.#!"

 investiture_bond_breaking_perk_name: "Разрушитель оков"
 investiture_shameful_sight_perk_name: "Позорящий взгляд"
 investiture_journey_to_the_spirit_realm_perk_name: "Странствие в духовное царство"

 INVESTITURE_BOND_BREAKING_PERK_EFFECT: "Можно заставить цель лишиться всех имеющихся [Concept('hooks', 'рычагов влияния')|E] через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor Рука Шургата направляет этого инферналиста; обычные замки, узлы или оковы раскрываются, когда он их касается.#!"
 INVESTITURE_SHAMEFUL_SIGHT_PERK_EFFECT: "#flavor Заглянув человеку в глаза, инферналист может увидеть его грех, лежащий на самой поверхности сознания. Самый постыдный грех, из всех сделанных этим человеком. Для «внутреннего ока» инферналиста, картина сделанного ясна как день. Он может приберечь этот секрет на потом, использовать его как повод для насмешек, или даже мучить жертву видением об этом.#!"
 INVESTITURE_JOURNEY_TO_THE_SPIRIT_REALM_PERK_EFFECT: "#flavor Сбросив кожу и плоть, словно это просто одежда, инферналист может на один день отказаться от своей плоти, что позволяет ему получить доступ к Умбре на поверхностном уровне.#!"

 investiture_mammons_gift_perk_name: "Дар Маммоны"
 investiture_talons_of_the_plague_crow_perk_name: "Когти чумного ворона"
 investiture_army_of_the_damned_perk_name: "Армия проклятых"

 INVESTITURE_MAMMONS_GIFT_PERK_EFFECT: "Можно преобразовать [Concept('artifact', 'артефакт')|E] в [gold_i]250 [Concept('gold', 'золота')|E] через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor Один раз за ночь, инферналист может обратить один неодушевлённый предмет (не работает с нежитью) в золото.#!"
 INVESTITURE_TALONS_OF_THE_PLAGUE_CROW_PERK_EFFECT: "Можно получить модификатор «[GetModifier('POD_talons_of_the_plague_crow_modifier').GetNameWithTooltip]» на 4 года через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor Инферналист может по команде удлинять свои руки, превращая их в птичьи когти, что значительно затрудняет любые небоевые действия, но создаёт инфернальное оружие массового поражения.#!"
 INVESTITURE_ARMY_OF_THE_DAMNED_PERK_EFFECT: "Позволяет призвать армию из 250 профессионалов ([GetMaA('demons').GetName]) на протяжение [Concept('war', 'войны')|E] через [Concept('character_interaction', 'взаимодействие персонажа')|E].\n#flavor Они выходят из ямы и сбрасывают в неё своих врагов.#!"

 investiture_relentless_perk_name: "Неумолимость"
 investiture_regeneration_perk_name: "Регенерация"

 INVESTITURE_RELENTLESS_PERK_EFFECT: "#flavor Сама сила Ада ведёт инферналиста к своей цели, невзирая на раны и препятствия. Инферналист прибудет туда, куда захочет.#!"
 INVESTITURE_REGENERATION_PERK_EFFECT: "Исцеляет каждый год вместо 2 лет.\nОткрывает возможность естественного исцеления для #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L вампиров#!#!.\n#flavor Один из величайших «даров», предлагаемых смертным, этот дар позволяет инферналисту восстановить своё здоровье простым усилием воли!#!"

