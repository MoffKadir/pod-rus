l_russian:

 ####Choleric

 ##Vicissitude

 malleable_visage_perk_name: "Текучий облик"
 MALLEABLE_VISAGE_PERK_EFFECT: "[character_interaction|E]: [fleshcrafting|E].\n\n#flavor Вампир, владеющий этой способностью, может изменять своё тело: рост, телосложение, голос, черты лица, оттенок кожи и многое другое.#!"
 transmogrify_the_mortal_clay_perk_name: "Живая глина"
 TRANSMOGRIFY_THE_MORTAL_CLAY_PERK_EFFECT: "Можно изменить @flesh_icon!плоть при [Concept('fleshcrafting', 'изменении плоти')|E].\n\n#flavor Теперь вампир может производить кардинальные изменения во плоти, и не только над самим собой, но и над любым предметом, которого он может подчинять себе достаточно долго, чтобы поделиться своим видением.#!"
 rend_the_osseous_frame_perk_name: "Расщепление костяной основы"
 REND_THE_OSSEOUS_FRAME_PERK_EFFECT: "Можно изменить @bone_icon!кость при [Concept('fleshcrafting', 'изменении плоти')|E].\nДоступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('szlachta').GetName].\n\n#flavor На этой стадии мастерства вампир может манипулировать костью. При использовании в сочетании с «Живой глиной» ночные кошмары становятся возможными.#!"
 awaken_the_zulo_shape_perk_name: "Пробуждение образа зуло"
 AWAKEN_THE_ZULO_SHAPE_PERK_EFFECT: "Разблокирован вариант смены облика «[GetModifier('POD_shapeshift_form_zulo_modifier').GetNameWithTooltip]».\n\n#flavor Когда смотришь на первобытные леса Трансильвании, на ум часто приходит мысль о том, что их населяют демоны. Источником вдохновения для этого послужила форма зуло. Кошмарное зрелище из чешуи и густого меха с рядами шипов вдоль тела.#!"
 the_body_impolitic_perk_name: "Неразумное тело"
 THE_BODY_IMPOLITIC_PERK_EFFECT: "#flavor Вампир может вложить часть своих чувств в собственную плоть, а затем отсечь её, чтобы заставить выполнить свой приказ.#!"
 bloodform_perk_name: "Форма крови"
 BLOODFORM_PERK_EFFECT: "Разблокирован вариант смены облика «[GetModifier('POD_shapeshift_form_blood_modifier').GetNameWithTooltip]».\n\n#flavor Вампир, обладающий этой способностью, может физически преобразовать своё тело в разумное витэ. Эта кровь во всех отношениях идентична обычному витэ вампира, её можно использовать для создания гулей или формирования уз крови.#!"
 inner_mastery_perk_name: "Внутренняя эссенция"
 INNER_MASTERY_PERK_EFFECT: "#flavor Эта способность позволяет вампиру контролировать свои органы и жидкости. Органам можно легко придать форму, и враждебные жидкости выводятся из организма.#!"
 vicissitudeadvanced_perk_name: "Мастерство Изменчивости"
 body_arsenal_perk_name: "Арсенал тела"
 BODY_ARSENAL_PERK_EFFECT: "$unlock_forging_node$, случайно добавляющий модификатор «[GetModifier('body_arsenal_prowess_modifier').GetNameWithTooltip]» или «[GetModifier('body_arsenal_ghoul_modifier').GetNameWithTooltip]».\n\n#flavor Вампир может использовать своё собственное тело для создания оружия. Это не ограничивается отращиванием когтей и тому подобного, он может создавать мечи, дубинки и большинство других видов оружия ближнего боя.#!"
 graft_life_to_life_perk_name: "Привить живое к живому"
 GRAFT_LIFE_TO_LIFE_PERK_EFFECT: "Доступны [Concept('men_at_arms', 'профессионалы')|E] - [GetMaA('vozhd').GetName].\n\n#flavor Ваятель плоти способен брать части тела у живых существ и пересаживать их другим, живым или нежити, позволяя подопытному использовать новую конечность. С помощью этой способности можно создавать исключительно чудовищных и вызывающих беспокойство существ.#!"
 sublimation_of_the_larval_flesh_perk_name: "Сублимация личиночной плоти"
 SUBLIMATION_OF_THE_LARVAL_FLESH_PERK_EFFECT: "#flavor Вампир заключает свою жертву в кокон из её собственной плоти. Затем вампир представляет себе новую форму своей жертвы, в которую она превратится, как только освободится.#!"
 ##TODO Tzimisce: Unlock the #V Odious Chalice#! transmogrification option.\n\n

 the_last_dracul_perk_name: "Последний Дракул"
 THE_LAST_DRACUL_PERK_EFFECT: "Разблокирован вариант смены облика «[GetModifier('POD_shapeshift_form_dracul_modifier').GetNameWithTooltip]».\n\n#flavor Самая страшная из чудовищных форм Цимисхи, эта сила позволяет драконам принимать облик, от которого и произошло их древнее прозвище.#!"
 living_testudo_perk_name: "Живой щит"
 LIVING_TESTUDO_PERK_EFFECT: "В начале битвы вражеский [Concept('knight', 'рыцарь')|E] с самым высоким значением [Concept('prowess', 'доблести')|E] выходит из боя и получает #V [EmptyScope.ScriptValue('POD_base_wound_damage')|V0] ед. [Concept('POD_aggravated_damage', 'серьёзного урона')|E]#!, если вы являетесь [Concept('commander', 'командиром')|E].\n\n#flavor Вампир хватает жертву и с помощью магии плоти и костей выворачивает её спину таким образом, что обнажаются позвонки. Затем жертва используется в качестве щита, который одновременно защищает от атак и может быть превращён в ужасное оружие.#!"
 liquefy_the_mortal_coil_perk_name: "Разжижение смертной оболочки"
 LIQUEFY_THE_MORTAL_COIL_PERK_EFFECT: "[character_interaction|E]: Позволяет отсечь часть тела у персонажа, её нельзя исцелить в течение 10 лет.\n\n#flavor Жертв этой ужасной способности предают их собственные тела, когда цимисхи превращает плоть и кости своего противника в лужи крови.#!"
 perfect_essence_perk_name: "Совершенная суть"
 PERFECT_ESSENCE_PERK_EFFECT: "[Concept('fleshcrafting', 'Изменение')|E] собственной плоти всегда будет успешным\nУвеличивает @blood_icon![Concept('hunger', 'голод')|E], утоляемый со смертных\n$POD_blood_surge_interaction$#! дополнительно повышает один [Concept('skill', 'навык')|E] на #P +1#!\n\n#flavor Цимисхи, обладающий этой способностью, практически полностью контролирует свою кровь и тело. Он может по желанию изменять свой облик одним лишь усилием мысли.#!"
 sculpture_of_the_mind_perk_name: "Скульптура разума"
 SCULPTURE_OF_THE_MIND_PERK_EFFECT: "Можно [Concept('fleshcraft', 'изменять плоть')|E] любого персонажа без сильной ментальной защиты\n\n#flavor На этом уровне вампир способен изменять плоть на расстоянии. Физический контакт - это инструмент меньшего мастерства, истинное искусство исходит из разума цимисхи, а не из его рук.#!"



