####Choleric

##Vicissitude

 malleable_visage_perk_name: "Malleable Visage"
 MALLEABLE_VISAGE_PERK_EFFECT: "[character_interaction|E]: [fleshcrafting|E].\n\n#flavor The user may alter their own body in simple, cosmetic ways. He can be taller or stockier. He can change his voice by reshaping his larynx. He can adopt a new skin tone, new eye color, and so on.#!"
 transmogrify_the_mortal_clay_perk_name: "Transmogrify the Mortal Clay"
 TRANSMOGRIFY_THE_MORTAL_CLAY_PERK_EFFECT: "Can modify @flesh_icon!Flesh during [fleshcrafting|E].\n\n#flavor Now the vampire may perform dramatic alterations on the flesh, and not just upon himself, but upon any subject he can subdue long enough to impart his vision.#!"
 rend_the_osseous_frame_perk_name: "Rend the Osseous Frame"
 REND_THE_OSSEOUS_FRAME_PERK_EFFECT: "Can modify @bone_icon!Bone during [fleshcrafting|E].\nCan recruit [GetMaA('szlachta').GetName] as [men_at_arms|E].\n\n#flavor At this stage of mastery, the vampire can manipulate bone. When used in conjunction with Transmogrify the Mortal Clay, nightmares become possible.#!"
 awaken_the_zulo_shape_perk_name: "Awaken the Zulo Shape"
 AWAKEN_THE_ZULO_SHAPE_PERK_EFFECT: "Unlock [GetModifier('POD_shapeshift_form_zulo_modifier').GetNameWithTooltip] shapeshift option.\n\n#flavor When one considers the primeval forests of Transylvania, the thought demon-haunted often comes to mind. The inspiration for that is the zulo shape. A nightmare of scales and greesy fur with rows of spines along the body.#!"
 the_body_impolitic_perk_name: "The Body Impolitic"
 THE_BODY_IMPOLITIC_PERK_EFFECT: "#flavor The user can invest of a portion of his sentience into his own flesh, then sever it to do his bidding.#!"
 bloodform_perk_name: "Bloodform"
 BLOODFORM_PERK_EFFECT: "Unlock [GetModifier('POD_shapeshift_form_blood_modifier').GetNameWithTooltip] shapeshift option.\n\n#flavor A vampire with this power can physically transform his body into sentient vitae. This blood is in all respects identical to a vampire's normal vitae, it can be used to create ghouls or establish blood bonds.#!"
 inner_mastery_perk_name: "Inner Mastery"
 INNER_MASTERY_PERK_EFFECT: "#flavor This power allows the vampire to control his organs and fluids. The organs can be easily reshaped and hostile fluids are expelled from the body.#!"
 vicissitudeadvanced_perk_name: "Advanced Vicissitude"
 body_arsenal_perk_name: "Body Arsenal"
 BODY_ARSENAL_PERK_EFFECT: "$unlock_forging_node$ Randomly add [GetModifier('body_arsenal_prowess_modifier').GetNameWithTooltip] or [GetModifier('body_arsenal_ghoul_modifier').GetNameWithTooltip].\n\n#flavor The vampire can use his own body to create weapons. This goes beyond manifesting claws and the like, it can create swords, clubs, and most other melee weapons.#!"
 graft_life_to_life_perk_name: "Graft Life to Life"
 GRAFT_LIFE_TO_LIFE_PERK_EFFECT: "Can recruit [GetMaA('vozhd').GetName] as [men_at_arms|E].\n\n#flavor The fleshcrafter is able to take body parts from living creatures and graft them on to others, living or undead, and allow the recipient to use the new limb. Exceptionally monstrous and disturbing creatures can be created with this power.#!"
 sublimation_of_the_larval_flesh_perk_name: "Sublimation of the Larval Flesh"
 SUBLIMATION_OF_THE_LARVAL_FLESH_PERK_EFFECT: "#flavor The vampire encases his victim in a cocoon of their own flesh. The vampire then imagines a new form for their victim, which they will turn into once they are freed.#!"
 ##TODO Tzimisce: Unlock the #V Odious Chalice#! transmogrification option.\n\n

 the_last_dracul_perk_name: "The Last Dracul"
 THE_LAST_DRACUL_PERK_EFFECT: "Unlock [GetModifier('POD_shapeshift_form_dracul_modifier').GetNameWithTooltip] shapeshift option.\n\n#flavor The most fearsome of the Tzimisce's monstrous forms, this power allows the Dragons to assume the shape from which their ancient nickname is derived.#!"
 living_testudo_perk_name: "Living Testudo"
 LIVING_TESTUDO_PERK_EFFECT: "At the start of battle, remove the highest [prowess|E] enemy [knight|E] from the battle and inflict #V [EmptyScope.ScriptValue('POD_base_wound_damage')|V0] [POD_aggravated_damage|E]#! to them when acting as a [commander|E].\n\n#flavor The vampire grabs a victim and with flesh and bonecrafting arts exposes the victims back in such a manner that their vertebrae are exposed. The victim is then used as a shield that both protects against attacks and can be further manipulated into horrific weapons.#!"
 liquefy_the_mortal_coil_perk_name: "Liquefy the Mortal Coil"
 LIQUEFY_THE_MORTAL_COIL_PERK_EFFECT: "[character_interaction|E]: Sever a body part from a character, it cannot be healed for 10 years.\n\n#flavor Victims of this gruesome power are betrayed by their own bodies, as the Tzimisce transforms his opponent's flesh and bone into pools of blood.#!"
 perfect_essence_perk_name: "Perfect Essence"
 PERFECT_ESSENCE_PERK_EFFECT: "[fleshcrafting|E] yourself will always succeed\nIncreases [hunger_with_icon|E] slaked from mortals\n$POD_blood_surge_interaction$#! increases one [skill|E] by an additional #P +1#!\n\n#flavor A Tzimisce with this power has near-perfect control over his blood and body. He can perfectly alter his own form at will with merely a thought.#!"
 sculpture_of_the_mind_perk_name: "Sculpture of the Mind"
 SCULPTURE_OF_THE_MIND_PERK_EFFECT: "Can now [fleshcraft|E] anyone without strong mental defenses\n\n#flavor At this level the vampire is capable of altering flesh from a distance. Physical contact is the tool of a lesser artist, the true art comes from a Tzimisce's mind not his hands.#!"



