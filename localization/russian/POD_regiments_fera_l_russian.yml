l_russian:




 kinfolk_militia: "Ополчение родни"
 kinfolk_militia_flavor: "#F Низшая родня часто становится основой любого отряда фера. Хотя они часто плохо экипированы, они компенсируют это своей решимостью.#!"
 kinfolk_leeches_hunters: "Родня-охотники на пиявок"
 kinfolk_leeches_hunters_flavor: "#F Вся родня знает об опасности, которую представляют кровососы. Луки и арбалеты - излюбленное оружие тех, кому поручено выслеживать эти угрозы.#!"
 kinfolk_outriders: "Всадники родни"
 kinfolk_outriders_flavor: "#F Живя рядом со своими родичами-перевертышами, родня чаще других смертных привыкает к дикой природе, что позволяет использовать её в качестве мощной и быстрой боевой силы.#!"


 amazons: "Родня амазонок"
 amazons_flavor: "#F Эти женщины, освободившиеся от патриархального ига, будут сражаться за своих покровительниц - Чёрных фурий, как в старых легендах.#!"
 kinfolk_defenders: "Защитники"
 kinfolk_defenders_flavor: "#F Человечество нужно защищать, и эта сильная и хорошо подготовленная родня готова внести свою лепту.#!"
 woad_raider_maa: "Вайдовые налётчики"
 woad_raider_maa_flavor: "#F Вайд - это растение, произрастающее на Британских островах, из которого можно извлечь синий пигмент. Древние кельтские воины красили себя этим пигментом перед битвой, чтобы выглядеть более грозно и устрашить врагов. Родня Фианна до сих пор чтят эту традицию в бою.#!"
 berserkers_maa: "Берсерки"
 berserkers_maa_flavor: "#F Отпрыски Фенрира часто не носят почти никаких доспехов и одежды, выходя на бой в медвежьих или волчьих шкурах.#!"
 ratha_maa: "Ратха"
 ratha_maa_flavor: "#F Хотя колесницы пришли в упадок в Индии примерно с 300 года до н. э., их высокое культурное и религиозное значение не позволило отказаться от них, несмотря на то, что они были менее эффективны в бою, чем конная кавалерия и слоны, и размещались рядом с ними. Родня Звездочётов до сих пор часто используют их в бою, чтобы преследовать врагов своего племени.#!"




 werewolfpack: "Стая оборотней"

 battlescarred_fera: "Закалённые фера"
 battlescarred_fera_flavor: "#F Отряд фера-ветеранов, готовых защищать своих родичей.#!"

 skull_pigs: "Костяные вепри"
 skull_pigs_flavor: "#F Костяные вепри - это не что иное, как обезумевшие остатки расы перевёртышей, которых когда-то называли грондр - служителей чистоты и порядка, которые когда-то хранили всю Гею от гнили и разложения.#!"

 ###Werewolves

 cliath: "Клиаты"
 cliath_flavor: "#F Клиаты - это молодые гару, которых старейшины часто называют «щенками». Эти юнцы стремятся к славе и повышению ранга.#!"

 amazons_diana_maa: "Амазонки Дианы"
 amazons_diana_maa_flavor: "#F Амазонки Дианы - группа фурий, которые больше стремятся быть дерзкими, неудержимыми женщинами-воинами, чем священными мстительницами. Этот лагерь редко рассматривается как официальная группа, и скорее является общим местом для тех, кто стремится доказать, что в бою с [Glossary('Вирмом', 'glossary_wyrm_tt')] они равны любому мужчине.#!"

 children_of_cluid_maa: "Дети Клуида"
 children_of_cluid_maa_desc: "#F Многие клуити считают себя истинными потомками Клуида, героя, который первым привел пиктов в Каледонию. Эти воины сражаются с нечестивым рвением, чтобы достичь своих целей.#!"

 swarm_maa: "Рой"
 swarm_maa_flavor: "#F В лагере Костегрызов основное внимание уделяется боевым качествам крыс, они концентрируются на грязных боях и используют каждое преимущество над противником. Они специализируются на партизанской тактике, нанося удар по [Glossary('Вирму', 'glossary_wyrm_tt')] и мгновенно исчезая.#!"

 imminent_strike_maa: "Неотвратимый удар"
 imminent_strike_maa_flavor: "#F Неотвратимый удар - это военный лагерь Детей Геи, стремящихся объединить всех гару для последней битвы.#!"

 herne: "Братья Херна"
 herne_flavor: "#F Быстрое ударное подразделение, почти полностью состоящее из арун, готовое в любой момент защитить все каэрны Фианна, оказавшиеся в опасности.#!"

 mjolnir: "Сыны Мьёлнира"
 mjolnir_flavor: "#F Эти дикари-воины, считающиеся кровожадными маньяками даже среди остальных отпрысков, - зрелище, на которое стоит посмотреть.#!"

 predator_kings_maa: "Хищные короли"
 predator_kings_maa_flavor: "#F Хищные короли считают, что время компромиссов прошло и людей нужно истреблять, пока никого не останется. Они - самые агрессивные из Красных когтей.#!"

 bringers_light_maa: "Несущие свет"
 bringers_light_maa_flavor: "#F Если и есть группа Теневых владык, которая пользуется чем-то близким к всеобщему уважению, так это Несущие свет. Именно эти Теневые владыки справляются со злыми силами, такими как Танцоры Чёрной Спирали или вампиры.#!"

 hakken_samurai_maa: "Самураи"
 hakken_samurai_maa_flavor: "#F Хаккен, всю жизнь оттачивавшие своё мастерство владения клинком. Честь требует, чтобы они нашли ему достойное применение против слуг [Glossary('Вирма', 'glossary_wyrm_tt')].#!"

 daggers_nut_maa: "Кинжалы Нут"
 daggers_nut_maa_flavor: "#F Кинжалы Нут призваны разрушить власть потомков Сутеха над Египтом и, как следствие, власть вампиров над своей территорией в целом.#!"

 royal_guard_sf_maa: "Королевская стража"
 royal_guard_sf_maa_flavor: "#F Как королевскую семью нации Гару, истинных правителей Серебряных клыков всегда сопровождают самые элитные бойцы их дома.#!"

 heavenlysuccessors_maa: "Небесные наследники"
 heavenlysuccessors_maa_flavor: "#F Преемники Чжун-куэй, Небесные наследники поклялись уничтожить вампиров и других существ, которые высасывают душу Геи.#!"

 luperci_maa: "Луперкии"
 luperci_maa_flavor: "#F Процветающие и могущественные итальянские Стражи людей - эксперты в борьбе с многочисленными вампирами, охотящимися на их растущую торговую империю. Они дали свое имя тем стражам, которые специализируются на борьбе с проклятым отродьем Каина.#!"




 ###Bastet

 tekhmet: "Техмет"
 tekhmet_flavor: "#F Эти «детёныши» готовы дать волю своей свирепости и подняться в ранге среди своих сородичей.#!"

 children_saraam: "Дети Сараам"
 children_saraam_flavor: "#F Мать багира гордится тем, что её дисциплинированные дети защищают ее наследие.#!"

 warriors_ubastet: "Воины Убастет"
 warriors_ubastet_flavor: "#F Когда-то Бубасти правили Египтом как боги. Хотя это время давно прошло, они по-прежнему умеют сражаться на своей родине как никто другой.#!"

 samhach_bane: "Бич Самхаха"
 samhach_bane_flavor: "#F Цейликан никогда не забудут того, кто чуть не убил их всех. Его глупые родичи заплатят.#!"

 durga_chosen: "Избранники Дурги"
 durga_chosen_flavor: "#F Селена в аспекте Дурги улыбается своей избранной элите, благородным величайшим воинам хан.#!"

 seline_pride: "Гордость Селин"
 seline_pride_flavor: "#F Самопровозглашенные избранники Луны, симба - гордые и безжалостные бойцы. Их история также подарила им сомнительную честь - они умеют сражаться с другими перевёртышами.#!"

 danaa_runners: "Бегуны Данаа"
 danaa_runners_flavor: "#F Многие сбрасывают со счетов жилистых свара, но их удивительная скорость стала причиной гибели многих хищников.#!"


 ###Mokole
 mokole_hatchlings: "Детёныши"
 mokole_hatchlings_flavor: "#F Моколе - вымирающая порода. Поэтому крайне важно, чтобы будущие поколения были защищены. С этой целью представители низшего ранга, детёныши, научились защищаться от большинства нападений, будь то гуманоиды или животные.#!"

 primal_saurians: "Первобытные завры"
 primal_saurians_flavor: "#F Течение Земли больше всего соответствует их первобытным инстинктам. Рёв Моколе-мбембе вселяет страх, поскольку они стремятся отомстить за своих потерянных сородичей.#!"

 bronzescales: "Бронзовые чешуйки"
 bronzescales_flavor: "#F Песок крупный, шероховатый и проникает повсюду. Идеальное укрытие для гумаган, которые вырываются из песков, чтобы нести смерть тем, кто достаточно глуп, чтобы бросить им вызов в их владениях.#!"

 hidden_fangs: "Скрытые клыки"
 hidden_fangs_flavor: "#F В джунглях и лесах обитает множество ужасающих хищников. Но даже эти хищники являются добычей макара, которые выслеживают их.#!"

 sleeping_dragons: "Спящие драконы"
 sleeping_dragons_flavor: "#F Мифы смертных сумели прояснить одну вещь. Никогда не будите дракона ото сна, ибо его гнев будет ужасен.#!"

 army_aten: "Войско Атона"
 army_aten_flavor: "#F Эта воинственная кладка моколе постоянно готовится к битве с [Glossary('Расплетателем', 'glossary_wyrm_tt')] и силами тьмы. Они также ищут и уничтожают падших [Glossary('фера', 'glossary_fera_tt')], прежде чем их охватит порча Вирма.#!"

 ###Animals
 whitewolves: "Белые волки"
 whitewolves_flavor: "#F Белые волки, которые, по слухам, являются прародителями Серебряных клыков, появляются во времена нужды, чтобы помочь племени.#!"

 royal_crocodiles: "Царские крокодилы"
 royal_crocodiles_flavor: "#F Эти величественно выглядящие крокодилы стали намного сильнее и крупнее других благодаря защите своих смотрителей-моколе.#!"



 ###Dinosaur Bygones
 archators: "Архаторы"
 archators_flavor: "#F Эти громадные зверь представляют собой смесь динозавров и формы Архид. У них много общих черт, присущих форме Архид моколе, но не их темперамент, и это различие обнаруживают многие. Они верно служат своим спутникам-ящерам, пока к их силе относятся с уважением, а их желудки сыты.#!"
 dipeltas: "Дипельты"
 dipeltas_flavor: "#F Динозавры с большими костяными пластинами на черепе. Эти пластины прочнее традиционной стали и помогают защитить их, когда они атакуют свои цели.#!"
 avithons: "Авитоны"
 avithons_flavor: "#F Летающие пернатые чудовища. Эти динозавры парят в небесах и бросаются на свою добычу с огромной скоростью и точностью.#!"
 dicravenators: "Дикравенаторы"
 dicravenators_flavor: "#F Эти маленькие двуногие динозавры - настоящее проклятие для многих травоядных. Их ловкость и свирепость в преследовании добычи не имеют себе равных.#!"
 rhincanthuses: "Ринкантусы"
 rhincanthuses_flavor: "#F Ринкантусы больше похожи на гигантских рептилий-носорогов, чем на динозавров, и представляют собой неповоротливые тараны, способные пробить всё, что угодно.#!"
 baroceratops: "Бароцератопсы"
 baroceratops_flavor: "#F Толстый череп бароцератопса и естественная броня защищают его, когда он безрассудно разрушает укрепления.#!"
 dracomuses: "Дракомузы"
 dracomuses_flavor: "#F Большие драконообразные звери, которые воспламеняют себя, когда режут и сжигают свою добычу.#!"
 archeorexes: "Археорексы"
 archeorexes_flavor: "#F Альфа-хищники из снов моколе из юрского периода. Появились с единственной целью: разрушение.#!"
 dryptoraptors: "Дрипторапторы"
 dryptoraptors_flavor: "#F Эти маленькие двуногие динозавры не крупнее среднего моколе. Однако именно их численность делает их смертельно опасными.#!"