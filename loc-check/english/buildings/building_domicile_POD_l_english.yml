 belial_throne_unlimited_hatred_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('belial_throne_01').GetName])#!\nBelial's hatred of Lucifer is legendary. In his eyes, all of Creation could burn if it meant the destruction of the Morningstar."
