 abbadon_throne_01_domicile_building: "Throne of Abbadon"
 abbadon_throne_01_domicile_building_desc: "The "Grace of Wings", Seraph of the Ebon Legion, was one of the first to join Lucifer and one of the first to betray him. His Legion fought, bled and massacred more than any other."
 abbadon_throne_02_domicile_building: "$abbadon_throne_01_domicile_building$"
 abbadon_throne_02_domicile_building_desc: "$abbadon_throne_01_domicile_building_desc$"
