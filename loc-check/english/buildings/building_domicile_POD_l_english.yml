 abbadon_throne_fifth_domicile_building: "Lord of Filth"
 abbadon_throne_fifth_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('abbadon_throne_01').GetName])#!\nAbaddon is a lord of the flesh, and of its corruption and degradation. He often gifts his thralls with both immunity to disease and the ability to spread it to others."
 abbadon_throne_lord_wrath_domicile_building: "Lord of Wrath"
 abbadon_throne_lord_wrath_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('abbadon_throne_01').GetName])#!\nAbbadon is a demon of wrath, although he tempers his constant rage with an inhuman intelligence, so that his true target is always the first to fall before his unstoppable rampages.."
 abbadon_throne_black_blood_tribe_domicile_building: "The Black Blood Tribe"
 abbadon_throne_black_blood_tribe_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('abbadon_throne_01').GetName])#!\nThe Black Blood tribe was a group of savage warriors that worshipped Abbadon under the guise of Loki. These Viking invaders attacked countless towns, from Scandinavia all the way to England, sacking settlement after settlement. The war bands were led by some of the archduke’s most precious thralls, men learned in the ways of violence and terror."
 abbadon_throne_thrall_strength_domicile_building: "Lord of Atrocities"
 abbadon_throne_thrall_strength_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('abbadon_throne_01').GetName])#!\nAbbadon can reshape the flesh of his thralls, or of helpless innocents, with a whim, bursting them apart with tumors or ripping them to shreds with muscle spasms. He often gifts his thralls with inhuman strength or resilience."
 abbadon_throne_vampire_thrall_domicile_building: "Vampire Experiments"
 abbadon_throne_vampire_thrall_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('abbadon_throne_01').GetName])#!\nAbaddon developed an interest in Cainites, conducting experiments on the blood of his thralls, hoping to make it both infectious and addictive to the palates of Cainites to gain their worship."
 domicile_building_parameter_abbadon_wrath_parameter: "When ordering a [thrall|E] to go to war, they will now get [GetModifier('warfare_wrathful_strategy_modifier').GetNameWithTooltip] for #V 5#! years"
 domicile_building_parameter_black_blood_tribe_parameter: "Unlocks the [GetMaA('black_blood_tribe_maa').GetName] [men_at_arms|E]"
 domicile_building_parameter_thrall_strength_parameter: "All your [thralls|E] gain #V 5#! [prowess|E]"
 domicile_building_parameter_vampire_thrall_parameter: "$POD_splat_vampire_plural$ will now be easier to [Concept('thrall','Enthrall')|E]"
 
 black_blood_tribe_maa: "Black Blood Tribe"
 black_blood_tribe_maa_desc: "A group of savage warriors that worshipped Abbadon under his guise as Loki. The war bands were led by some of the archduke’s most precious thralls, men learned in the ways of violence and terror. The Black Blood came into conflict with the local Garou."
 
