 tower_of_pride_01_domicile_building: "Tower of Babel"
 tower_of_pride_01_domicile_building_desc: "#italic Therefore it was called Babel, because there the Lord confused (balal) the language of all the earth, and from there the Lord scattered them abroad over the face of all the earth.#!"
 treasury_of_avarice_01_domicile_building: "Golden Calf"
 treasury_of_avarice_01_domicile_building_desc: "#italic They think only of Mammon, whose God is the purse.#!"
 pit_of_wrath_01_domicile_building: "Pit Of Wrath"
 pit_of_wrath_01_domicile_building_desc: "#italic Be ye angry, and sin not: let not the sun go down upon your wrath: Neither give place to the devil.#!"
 hall_of_gluttony_01_domicile_building: "Hall Of Gluttony"
 hall_of_gluttony_01_domicile_building_desc: "#italic For many, of whom I have often told you and now tell you even with tears, walk as enemies of the cross of Christ. Their end is destruction, their god is their belly, and they glory in their shame, with minds set on earthly things.#!"
 inn_of_lust_01_domicile_building: "Garden of Pleasures"
 inn_of_lust_01_domicile_building_desc: "#italic Flee from sexual immorality. Every other sin a person commits is outside the body, but the sexually immoral person sins against his own body.#!"
 house_of_sloth_01_domicile_building: "House of Sloth"
 house_of_sloth_01_domicile_building_desc: "#italic Through sloth the roof sinks in, and through indolence the house leaks.#!"
 department_of_envy_01_domicile_building: "Palace of Envy"
 department_of_envy_01_domicile_building_desc: "#italic For where you have envy and selfish ambition, there you find disorder and every evil practice.#!"
  
 mummy_thanatology_library_01_domicile_building: "Library of Thanatology"
 mummy_thanatology_library_01_domicile_building_desc: "Thanks to your extensive travels, you have an unparalleled collection of precious tomes about death and the soul tied to various cultures."
 
  