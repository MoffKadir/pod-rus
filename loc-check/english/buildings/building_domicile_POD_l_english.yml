 asmodeus_throne_lord_of_anthropomancy_domicile_building: "Lord of Anthropomancy"
 asmodeus_throne_lord_of_anthropomancy_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('asmodeus_throne_01').GetName])#!\nFirst summoned by a cabal of Sumer royal magicians, Asmodeus promises visions of the future to the artists and scholars that pledge themselves to him."
 asmodeus_throne_fear_humanity_domicile_building: "Fear of Humanity"
 asmodeus_throne_fear_humanity_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('asmodeus_throne_01').GetName])#!\nIt was Asmodeus' fear of humanity surpassing the host of Heaven that led him to try to collar them with the Nephilim's experiments. He soon realized the grave mistake he made."
