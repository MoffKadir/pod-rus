 servant_quarters_01_domicile_building: "Servant Quarters"
 servant_quarters_01_domicile_building_desc: "Whether on the move or not, a vampire always need blood at the ready. What better way to have it than cultivating a following of mortals ready to give their precious red lifeforce at a moment notice?"
