 asmodeus_throne_rome_china_domicile_building: "From Rome to China"
 asmodeus_throne_rome_china_domicile_building_desc: "#weak (Requires [GetDomicileBuilding('asmodeus_throne_01').GetName])#!\nWith his influence over the Roman Empire, Asmodeus became the pre-eminent Archduke for a time. His cult was unrivaled by his "brothers"."
 domicile_building_parameter_unlock_nephilim_parameter: "Your [GetTrait('laham').GetName(GetNullCharacter)] children will now be [GetTrait('nephilim').GetName(GetNullCharacter)] instead, which are immortal, stronger and can use demonic [Concept('lore_lifestyle','Lores')|E] #weak (if you are a $POD_splat_demon$)#!"
