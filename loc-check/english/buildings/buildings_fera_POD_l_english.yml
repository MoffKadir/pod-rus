 building_type_warrior_scholar_lodge_01: "Warrior Scholar Lodge"
 building_type_warrior_scholar_lodge_01_desc: "#F Khans seek perfection in themselves, both mind and body, so that they can lead the Bastet Nation by example.#!"
 building_warrior_scholar_lodge_01: "Minor Warrior Scholar Lodge"
 building_warrior_scholar_lodge_01_desc: "Khans seek perfection in themselves, both mind and body, so that they can lead the Bastet Nation by example."
 building_warrior_scholar_lodge_02: "Warrior Scholar Lodge"
 building_warrior_scholar_lodge_02_desc: "$building_warrior_scholar_lodge_01_desc$"
 building_warrior_scholar_lodge_03: "Great Warrior Scholar Lodge"
 building_warrior_scholar_lodge_03_desc: "$building_warrior_scholar_lodge_01_desc$"


 building_type_feline_throne_01: "Throne of the Kings of Cats"
 building_type_feline_throne_01_desc: "#F Simba think of themselves as the rightful rulers of catkind. Their arrogance borders on cruelty when someone disputes that claim.#!"
 building_feline_throne_01: "Insignificant Throne of the Kings of Cats"
 building_feline_throne_01_desc: "Simba think of themselves as the rightful rulers of catkind. Their arrogance borders on cruelty when someone disputes that claim."
 building_feline_throne_02: "Throne of the Kings of Cats"
 building_feline_throne_02_desc: "$building_feline_throne_01_desc$"
 building_feline_throne_03: "Majestic Throne of the Kings of Cats"
 building_feline_throne_03_desc: "$building_feline_throne_01_desc$"



 building_type_chui_mal_01: "Chui Mal"
 building_type_chui_mal_01_desc: "#F Bagheera are the Bastet tribe closest to humanity. Across India, societies such the Ambari Macho, Chui Mal, Beral Meye and the Leopard Men of Chupa revere them as gifts from the heavens.#!"
 building_chui_mal_01: "Chui Mal"
 building_chui_mal_01_desc: "Bagheera are the Bastet tribe closest to humanity. Across India, societies such the Ambari Macho, Chui Mal, Beral Meye and the Leopard Men of Chupa revere them as gifts from the heavens. They are more than ready to give their lives for their deities."

 building_type_temple_bastet_01: "Temple Complex of Bastet"
 building_type_temple_bastet_01_desc: "#F The Temple of Bastet at Saqqara was built over an extensive area southeast of the Pyramid of Teti. The area included the Goddess' Sanctuary, her Cult Complex, and her Catacombs. Its destruction by the Setites heralded the end of the Bubasti domination of Egyptian politics.#!"
 building_temple_bastet_01: "Temple Complex of Bastet"
 building_temple_bastet_01_desc: "The Temple of Bastet at Saqqara was built over an extensive area southeast of the Pyramid of Teti. The area included the Goddess' Sanctuary, her Cult Complex, and her Catacombs. Its destruction by the Setites heralded the end of the Bubasti domination of Egyptian politics."

 building_type_ransacked_court_samhach_01: "Ransacked Court of Samhach"
 building_type_ransacked_court_samhach_01_desc: "#F With their nemesis Samhach dealt with and their captured kin freed at last, the Ceilican can finally able to enjoy life's many pleasures as they so wished to for so long. And what better way to start than by a unending party in the ruins of their fallen foe's court? #!"
 building_ransacked_court_samhach_01: "Ransacked Court of Samhach"
 building_ransacked_court_samhach_01_desc: "With their nemesis Samhach dealt with and their captured kin freed at last, the Ceilican can finally enjoy life's many pleasures as they so wished to for so long. And what better way to start than by a party in the ruins of their fallen foe's court?"

 building_type_court_bright_kings_01: "Court of the Bright Kings"
 building_type_court_bright_kings_01_desc: "#F Whatever a Khan does, he does with abandon no matter if it's fighting, hunting or even contemplating. The Court of the Bright Kings reflect this reckless passion, bristling with vitality and vigor. #!"
 building_court_bright_kings_01: "Court of the Bright Kings"
 building_court_bright_kings_01_desc: "Whatever a Khan does, he does with abandon no matter if it's fighting, hunting or even contemplating. The Court of the Bright Kings reflect this reckless passion, bristling with vitality and vigor."

 building_type_throne_sunlight_01: "The Sunlight Throne"
 building_type_throne_sunlight_01_desc: "#F Like the blazing mane around the heads of their kings, the Simba liken themselves to the sun. To the other tribes though, they are the "Dark Kings", tyrants imposing order through intimidation and fear.#!"
 building_throne_sunlight_01: "The Sunlight Throne"
 building_throne_sunlight_01_desc: "Like the blazing mane around the heads of their kings, the Simba liken themselves to the sun. To the other tribes though, they are the "Dark Kings", tyrants imposing order through intimidation and fear."

 building_type_silver_refuge_01: "The Silver Refuge"
 building_type_silver_refuge_01_desc: "#F The Swara, or Silver Folk as they call themselves, are relentless healers of the spiritually charged areas. Their speed and dedication to their purpose shine through this peaceful and soothing refuge. #!"
 building_silver_refuge_01: "The Silver Refuge"
 building_silver_refuge_01_desc: "The Swara, or Silver Folk as they call themselves, are relentless healers of the spiritually charged areas. Their speed and dedication to this purpose shine through this peaceful and soothing refuge."




 ####Mokole

 building_type_scaled_encampment_01: "Scaled Encampment"
 building_type_scaled_encampment_01_desc: "Mokolé warriors spend their time trading blows against one another's thick hides."
 building_scaled_encampment_01: "Small Scaled Encampment"
 building_scaled_encampment_01_desc: "The occasional clanging of metal can be heard as the Mokolé train for battle."
 building_scaled_encampment_02: "Scaled Encampment"
 building_scaled_encampment_02_desc: "The Saurians' fearsome battle cries fill the air as the hulking warriors spar with eachother.$POD_fera_requirements_development_below_t2$"
 building_scaled_encampment_03: "Large Scaled Encampment"
 building_scaled_encampment_03_desc: "The sounds of weapons, claws, and all manner of Archid weaponry echo as a repeated chorus throughout the days.$POD_fera_requirements_development_below_t3$"

 building_type_saurian_armory_01: "Saurian Armory"
 building_type_saurian_armory_01_desc: "Sometimes a reliable sword in the chest is just as effective as an Archid's claws."
 building_saurian_armory_01: "Small Saurian Armory"
 building_saurian_armory_01_desc: "A few expertly forged blades adorn the walls of this armory."
 building_saurian_armory_02: "Saurian Armory"
 building_saurian_armory_02_desc: "A sharper sword, a stronger shield. Anything to prolong a warrior's life.$POD_fera_requirements_development_below_t2$"
 building_saurian_armory_03: "Large Saurian Armory"
 building_saurian_armory_03_desc: "Ancient Mokolé swords, spears, maces, and axes decorate this hall. They only await a strong arm to wield them.$POD_fera_requirements_development_below_t3$"

 building_type_hall_elders_01: "Hall of Elders"
 building_type_hall_elders_01_desc: "As the Memory of Gaia, the Mokolé remember and pass on this knowledge to the next generation with diligence."
 building_hall_elders_01: "Small Hall of Elders"
 building_hall_elders_01_desc: "Even a single respected Elder is a boon to a Mokolé community."
 building_hall_elders_02: "Hall of Elders"
 building_hall_elders_02_desc: "There is much to be learned for those closer to the Lizard Kings than we are.$POD_fera_requirements_development_below_t2$"
 building_hall_elders_03: "Large Hall of Elders"
 building_hall_elders_03_desc: "Here, memories as old as long before the Age of Man can be heard being retold in vivid portrayals.$POD_fera_requirements_development_below_t3$"

 building_type_crafters_district_01: "Crafters' District"
 building_type_crafters_district_01_desc: "Mokolé are respected crafters in the shapeshifter world. Some of their creations have survived many Ages."
 building_crafters_district_01: "Small Crafters' District"
 building_crafters_district_01_desc: "The bare minimum for a burgeoning Mokolé community, but still a respected pillar of the social life in this area."
 building_crafters_district_02: "Crafters' District"
 building_crafters_district_02_desc: "Some of the prices in display may seem high but they showcase the talent of the Mokolé craftsmen at work.$POD_fera_requirements_development_below_t2$"
 building_crafters_district_03: "Large Crafters' District"
 building_crafters_district_03_desc: "Foreign rulers proudly wear creations from this district, unaware of their scaly creator's origin.$POD_fera_requirements_development_below_t3$"

 building_type_nest_defences_01: "Nest Defences"
 building_type_nest_defences_01_desc: "Who would be foolish enough to attack the den of a Mokolé? The very brave... or very desperate."
 building_nest_defences_01: "Weak Nest Defences"
 building_nest_defences_01_desc: "Some patrols, some wooden barricades... this nest mainly relies on the strength of its defenders."
 building_nest_defences_02: "Nest Defences"
 building_nest_defences_02_desc: "While not a truly mighty castle, this nest has discipline and supplies aplenty to defend itself if needed.$POD_fera_requirements_development_below_t2$"
 building_nest_defences_03: "Strong Nest Defences"
 building_nest_defences_03_desc: "A true fortress of the Lizard Kings of old, one only a meteor could breach.$POD_fera_requirements_development_below_t3$"

 building_type_fields_strife_01: "Fields of Strife"
 building_type_fields_strife_01_desc: "The warriors of Entoban suffered setbacks but inflicted much more losses than they took. This indomitable spirit lives on."
 building_fields_strife_01: "Small Fields of Strife"
 building_fields_strife_01_desc: "The victories of tomorrow are built in the training regimen of today."
 building_fields_strife_02: "Fields of Strife"
 building_fields_strife_02_desc: "A disciplined Mokolé-mbembe staring you down is perhaps more fearsome a sight than a brutish one charging at you.$POD_fera_requirements_development_below_t2$"
 building_fields_strife_03: "Great Fields of Strife"
 building_fields_strife_03_desc: "Reenacting some of the glorious battles of their pasts, the Mokolé-mbembe perfect their tactics for the battles of tomorrow.$POD_fera_requirements_development_below_t3$"

 building_type_dry_den_01: "Dry Den"
 building_type_dry_den_01_desc: "The Children of the Rainbow Serpent live isolated and in harsh conditions. They make the most out of it."
 building_dry_den_01: "Small Dry Den"
 building_dry_den_01_desc: "For the cold blood of the lizardfolks, the desert is merely a stubborn friend."
 building_dry_den_02: "Dry Den"
 building_dry_den_02_desc: "Visitors to this place are few and far between and this is something the Gumagan are happy to keep as is.$POD_fera_requirements_development_below_t2$"
 building_dry_den_03: "Great Dry Den"
 building_dry_den_03_desc: "If the Sun is the patron of the Mokolé as a whole, then the Gumagan are those who understand Him the most.$POD_fera_requirements_development_below_t3$"

 building_type_motley_haunt_01: "Motley Haunt"
 building_type_motley_haunt_01_desc: "The stream of air are the Mokolé closest to humanity, they listen and understand more of the current world than many of their counterparts."
 building_motley_haunt_01: "Small Motley Haunt"
 building_motley_haunt_01_desc: "The sun is light but the sun is also enlightenment. The wise Makara knows the difference."
 building_motley_haunt_02: "Motley Haunt"
 building_motley_haunt_02_desc: "Where discourses about Agni are heard, and the soothing sound of fire eases the mind of its inhabitants.$POD_fera_requirements_development_below_t2$"
 building_motley_haunt_03: "Great Motley Haunt"
 building_motley_haunt_03_desc: "Some of the greatest diplomats of the Mokolé have been taught here, learning under the wise cosmic guidance of Jya.$POD_fera_requirements_development_below_t3$"

 building_type_dragon_temple_01: "Dragon Temple"
 building_type_dragon_temple_01_desc: "The stream of water watch the world outside and ponder. Their thoughts might be the key to saving the cosmic balance."
 building_dragon_temple_01: "Small Dragon Temple"
 building_dragon_temple_01_desc: "The Dragon Kings' progenitors watch from afar the efforts of their successors."
 building_dragon_temple_02: "Dragon Temple"
 building_dragon_temple_02_desc: "While its denizens value their privacy, mortal legends of wise and powerful dragons were born here.$POD_fera_requirements_development_below_t2$"
 building_dragon_temple_03: "Great Dragon Temple"
 building_dragon_temple_03_desc: "The brave man looks for a dragon for promises of treasure. The wise man instead searches for promises of enlightenment.$POD_fera_requirements_development_below_t3$"


 building_type_crocodilopolis_01: "Crocodilopolis"
 building_type_crocodilopolis_01_desc: "Once the mortal center of worship for mighty Sobek, Crocodilopolis was a remainder of the awe that the Lizards Kings fostered in humankind."
 building_crocodilopolis_01: "Ruined Crocodilopolis"
 building_crocodilopolis_01_desc: "The city once worshipped a tamed sacred crocodile called Petsuchos, "the Son of Soukhos", that was adorned with gold and gem pendants. It has long since been relegated to a fading memory."
 building_crocodilopolis_02: "Restored Crocodilopolis"
 building_crocodilopolis_02_desc: "Amenemhat III created the part of the city that was reserved to the sacred crocodiles. Was he influenced by the Mokolé? Even they aren't sure nowadays."
 crocodilopolis_02_effect_desc: "Searching the tombs will reveal two ancient [GetTrait('mokole').GetName(GetNullCharacter)]."
 building_crocodilopolis_03: "Wonderous Crocodilopolis"
 building_crocodilopolis_03_desc: "Crocodilopolis' Labyrinth is said to be grander and more confusing than even those of the pyramids. Who knows what, or who, lies within?"
 crocodilopolis_03_effect_desc: "The final [GetTrait('mokole').GetName(GetNullCharacter)] tomb is revealed."

 building_type_oogleforp_01: "Oogleforp"
 building_type_oogleforp_01_desc: "It is on the banks of the Nile that the Mokolé fought for the $glossary_osirian_league$. While defeated back then, their patience is long enough to wait for the right time to take revenge."
 building_oogleforp_01: "Rebuilt Oogleforp"
 building_oogleforp_01_desc: "A place of defiance against the corruption of the Children of the Snake. Perhaps the start of a new history."
 building_oogleforp_02: "Oogleforp"
 building_oogleforp_02_desc: "Memories of a glorious past collide with a grim present but perhaps are the key to a brighter future."
 building_oogleforp_03: "Great Oogleforp"
 building_oogleforp_03_desc: "Battle ready Mokolé are once again seen in Oogleforp. Without their accursed progenitor, the Setites will learn to fear the Lizards Kings once more."
 oogleforp_03_effect_desc: "Archid Form gains: [GetModifier('archid_glittering_scales_modifier').GetNameWithTooltip]"


 building_type_umbral_lake_tele_01: "Umbral Lake Tele"
 building_type_umbral_lake_tele_01_desc: "The birthplace of the Mokolé-mbembe has long since faded from mortal view, its guardian choosing to transfer it to the Umbra instead, far away from prying eyes."
 building_umbral_lake_tele_01: "Shrouded Lake Tele"
 building_umbral_lake_tele_01_desc: "The harsh Umbra conditions batter lake Tele, forcing its Mokolé occupants to expand precious resources to keep it functioning."
 building_umbral_lake_tele_02: "Hidden Lake Tele"
 building_umbral_lake_tele_02_desc: "Now stabilized, lake Tele is a quiet place for those wanting to bask in the wisdom of the progenitor, Mokolé-Mbembe."
 building_umbral_lake_tele_03: "Umbral Lake Tele"
 building_umbral_lake_tele_03_desc: "A thriving new capital for the Mokolé, lake Tele has become a beacon of inspiration for those wanting to see the Lizards Kings stand tall once more."


 building_type_oannes_01: "Oannes"
 building_type_oannes_01_desc: "Once, some Mokolé saw potential in burgeoning humankind. This is where they choose to teach it how to grow spiritually from their bestial states."
 building_oannes_01: "Rebuilt Oannes"
 building_oannes_01_desc: "Mortals still remember Oannes coming from the sea to teach arts and philosophy to the human populace. The Mokolé only smile at this thought."
 building_oannes_02: "Oannes"
 building_oannes_02_desc: "Oannes became a synonym for "wise" for the awed humans being taught by the Mokolé. Perhaps this memory can be leveraged again."
 building_oannes_03: "Great Oannes"
 building_oannes_03_desc: "A city, a man or a god, Oannes still has a fond place in Mokolé's mnesis. While it ended up bitterly, the experiment still showed the possibility for humankind's cooperation with the Lizards Kings."


 building_type_rainbow_stone_01: "Rainbow Stone"
 building_type_rainbow_stone_01_desc: "#F The Rainbow Stone, sign of the Rainbow Serpent and source of power for the Gumagan.#!"
 building_rainbow_stone_01: "Rainbow Stone"
 building_rainbow_stone_01_desc: "The Rainbow Stone, sign of the Rainbow Serpent and source of power for the Gumagan. While traditionally staying in Bandaiyan, it can be moved when the stream needs a rallying symbol towards a common goal."


 building_type_sacred_sky_temple_01: "Sacred Sky Temple"
 building_type_sacred_sky_temple_01_desc: "If the sun is to be praised, one must first have a proper place to look at it."
 building_sacred_sky_temple_01: "Sky Temple"
 building_sacred_sky_temple_01_desc: "The smallest opening towards the grandest of patrons."
 building_sacred_sky_temple_02: "Large Sky Temple"
 building_sacred_sky_temple_02_desc: "If they build towards the sky, perhaps they can one day reach it. Do they see it in Mnesis?"
 building_sacred_sky_temple_03: "Sacred Sky Temple"
 building_sacred_sky_temple_03_desc: "A fitting construction for the many Mokolé wanting to bask in the glory of their benefactor."

 building_type_sacred_crocodile_temple_01: "Sacred Crocodile Temple"
 building_type_sacred_crocodile_temple_01_desc: "The kinfolk friends of the Mokolé were once worshipped as gods of their own. In this place, they are once again shown this honor."
 building_sacred_crocodile_temple_01: "Crocodile Temple"
 building_sacred_crocodile_temple_01_desc: "Finding the place to their liking, some crocodiles appear to populate the space that will one day be a temple to their glory."
 building_sacred_crocodile_temple_02: "Large Crocodile Temple"
 building_sacred_crocodile_temple_02_desc: "Mortals gather to pay respects to the scaly gods, be they the ones on four legs or the ones on two."
 building_sacred_crocodile_temple_03: "Sacred Crocodile Temple"
 building_sacred_crocodile_temple_03_desc: "Apparently understanding the respect and worship they are given here, more and more crocodiles gather in the temple's surroundings under the watchful eyes of the Mokolé guardians."

 building_type_sacred_eighth_sun_temple_01: "Sacred Eighth Sun Temple"
 building_type_sacred_eighth_sun_temple_01_desc: "The mighty Mokolé are given proper respect only in a few remote places nowadays. This is one such place."
 building_sacred_eighth_sun_temple_01: "Eighth Sun Temple"
 building_sacred_eighth_sun_temple_01_desc: "Do they seek boons or do they feel the primordial fear of mankind for the Lizards Kings?"
 building_sacred_eighth_sun_temple_02: "Large Eighth Sun Temple"
 building_sacred_eighth_sun_temple_02_desc: "With so many mortal worshippers around, it is little surprise that a caste of kinfolk started to emerge in this area as well."
 building_sacred_eighth_sun_temple_03: "Sacred Eighth Sun Temple"
 building_sacred_eighth_sun_temple_03_desc: "With their kinfolk acting as priests and guards, the Mokolé are revered as gods in this prestigious temple."

 building_type_sacred_scorched_temple_01: "Sacred Scorched Temple"
 building_type_sacred_scorched_temple_01_desc: "Mokolé are not ones for ostentatious constructions. But sometimes, a specific area, often rich in energy or seemingly blessed by the sun, catches their attention. Then the work begins."
 building_sacred_scorched_temple_01: "Scorched Temple"
 building_sacred_scorched_temple_01_desc: "A rising temple, still small in stature, overlooking both the infinite desert and the infinite sea in the distance."
 building_sacred_scorched_temple_02: "Large Scorched Temple"
 building_sacred_scorched_temple_02_desc: "Perhaps here, between sand and sea, can true balance be found. Mokolé at least find the area very pleasing to their constitutions."
 building_sacred_scorched_temple_03: "Sacred Scorched Temple"
 building_sacred_scorched_temple_03_desc: "Having become one of the mightiest temples of the Lizard Kings, this impressive building stands as a testament to the patience and diligence of the Children of the Sun."
