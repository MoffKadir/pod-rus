l_english:
 POD_ghoul_maintenance.1.a: "I need a friend from the Dispossessed"
 POD_ghoul_maintenance.1.b: "I need a friend from Folch's Cutthroats"
 POD_ghoul_maintenance.1.c: "I need a friend from the Order of St. Panteleimon"
 POD_ghoul_maintenance.1.d: "I need a friend from Haqim's Assassins"
 POD_ghoul_maintenance.1.back: "I changed my mind"

 POD_ghoul_maintenance.2.t: "Vitae in my Veins"
 POD_ghoul_maintenance.2.desc: "Since you used the Ruler Designer to become a [ghoul|E], you need to select your [ghoul_greatest_vitae_ingested|E].\n\n#X If you picked an Advanced [Glossary('Discipline','game_concept_discipline_desc')] Trait, choosing any [Glossary('Generation','game_concept_vampgeneration_desc')] besides 4th Generation will instantly truncate it to correct level!#!"

 POD_ghoul_maintenance.50.t: "Spurned by my Domitor"
 POD_ghoul_maintenance.50.desc: "My [Glossary('Domitor','game_concept_domitor_desc')] has withdrawn their patronage from me. I am no longer in their service. They will no longer gift me with their vampiric blood. Without such blood, I will eventually grow old and die."
 POD_ghoul_maintenance.50.option.a: "I hate them for this."
 POD_ghoul_maintenance.50.option.b: "Perhaps it is for the best."
 POD_ghoul_maintenance.300.t: "Revenancy"
 POD_ghoul_maintenance.300.desc: "I have become a [Glossary('Revenant','game_concept_revenant_desc')]."
 POD_ghoul_maintenance.300.option.a: "The power of the blood!"
 POD_ghoulthrall_release_option.tt: "Will release a [ghoul|E] thrall from your service."
 
