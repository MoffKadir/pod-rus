l_english:

 blackfury_objective_decision: "Daughters of Gaia"
 blackfury_objective_decision_tooltip: "The Black Furies must step up and lead the Garou Nation."
 blackfury_objective_decision_desc: "If the Black Furies are to lead the Garou Nation away from its petty squabbles, they must first find a worthy Matriarch and consolidate their homeland."
 blackfury_objective_decision_effect_tooltip: "You will get the Black Furies Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 blackfury_objective_decision_confirm: "Mothers, daughters and leaders"
 blackfury_decision_custom: "The Caern of the Sun's Glory, in [GetTitleByKey('b_montbelliard').GetNameNoTier], must be fully built"
 blackfury_decision_custom_a: "You must have 5 or more female knights with prowess 50 or more."
 blackfury_decision_custom_c: "The development level of at least 5 counties is 10 or lower."

 pod1230objectives_fera.1.t: "Daughters of Gaia"
 pod1230objectives_fera.1.desc: "The Black Furies have long been tied to their ancestral Mediterranean homeland. The rise of Rome and the growth of cities that accompanied it marked the end of their dominance over the region and helped the vampires reduce the Furies' influence little by little. No more.\nThanks to a succession of powerful Matriarchs, the cunning use of mortal institutions against the vampires and some daring assaults worthy of the Amazons, the Black Furies have once again solidified a solid foothold.\nThe other tribes are watching now, wondering if the Furies can capitalize on this surprising victory. Maybe Gaia truly intend for her champions to be united under her daughters after all?"
 pod1230objectives_fera.1.a: "Mother, hear our cry of victory!"
 pod1230objectives_fera.2.a: "Presumptuous Lupines!"
 pod1230objectives_fera.2.b: "The Amazons ride once more"
 
 bonegnawer_objective_decision: "Gaia's Laugh"
 bonegnawer_objective_decision_tooltip: "Wouldn't it be a sick joke if the scavengers became the leaders?"
 bonegnawer_objective_decision_desc: "We are the bottom of the food chain in the Garou Nation. But with our tricks and our guile, we might just prove to all these high and mighty tribes how useful we can really be."
 bonegnawer_objective_decision_effect_tooltip: "You will get the Bone Gnawers Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 bonegnawer_objective_decision_confirm: "Topple the thrones!"
 bonegnawer_decision_custom: "The Caern of the Field of Stars, in [GetTitleByKey('b_oviedo').GetNameNoTier], must be fully built"
  
 pod1230objectives_fera.3.t: "Gaia's Laugh"
 pod1230objectives_fera.3.desc: "While the mighty Shadow Lords and Silver Fangs bickered, while the brave Get of Fenris and Fianna fought hopeless battles, the Bone Gnawers waited. Helped by the growth of human civilization, the sons of Rat did what they do best: survive, adapt and thrive.\nWhile the other tribes look more and more like relics of the past, the Bone Gnawers are more at home with this changed humanity than ever and everyone is now, begrudgingly, looking to them for help and advice on how to deal with this changed society. The bottom of the Garou Nation has its revenge, and, one favor after another, is rapidly climbing up the ladder..."
 pod1230objectives_fera.3.a: "The rats don't leave the ship, they command it!"
 pod1230objectives_fera.4.b: "From scavengers to leaders?"
  
 childofgaia_objective_decision: "Gaia's Unity"
 childofgaia_objective_decision_tooltip: "Proving that unity isn't a weakness is a neverending challenge."
 childofgaia_objective_decision_desc: "We always strove for unity among the Garou Nation, but the more warlike tribes still shun us. Only through strength they must respect, or fostering relations they can't ignore can unifaction begin."
 childofgaia_objective_decision_effect_tooltip: "You will get the Children of Gaia Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 childofgaia_objective_decision_confirm: "Gather and listen"
 childofgaia_decision_custom: "The Caern of the White Sea, in [GetTitleByKey('b_kem').GetNameNoTier], must be fully built"
   
 pod1230objectives_fera.5.t: "Gaia's Unity"
 pod1230objectives_fera.5.desc: "Often dismissed as a peaceful and weak tribe, the Children of Gaia are a force for unity and purpose before everything else. In the past, their efforts to convince their fellow tribes to sit and talk about their feuds (instead of bashing each other's heads) haven't borne fruit.\nThis has changed recently however since they have proved the strength of their conviction and the great results that can be achieved if all the champions of Gaia acted as one. Finally, perhaps for the first time, the tribes are listening and the Garou Nation has never seemed so strong and united.\nTruly, Gaia must be smiling on her children right now."
 pod1230objectives_fera.5.a: "They finally understand."
 pod1230objectives_fera.6.b: "United Garou? A fearsome prospect."
   
 fianna_objective_decision: "Heroes of Gaia"
 fianna_objective_decision_tooltip: "The Isles are the land of our ancestors and no leech will kick us out of here!"
 fianna_objective_decision_desc: "Once the undisputed masters of the Isles, the Fianna have fallen on hard times with the return of Mithras and the flayed plague. We must strike back before it's too late!"
 fianna_objective_decision_effect_tooltip: "You will get the Fianna Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 fianna_objective_decision_confirm: "Time for a feast!"
 fianna_decision_custom: "The Caern of the Wild Sea, in [GetTitleByKey('b_castletown').GetNameNoTier], must be fully built"
 fianna_decision_custom_a: "The Baronies of Avalon and the Sisters of St-John do not exist or are held by you."
 fianna_decision_custom_b: "None of your counties has a faith which is hostile to the fae."
 
 pod1230objectives_fera.7.t: "Heroes of Gaia"
 pod1230objectives_fera.7.desc: "While well respected for their combat prowess and their famous storytellers, the Fianna are often considered too unruly by the other tribes. This lack of discipline has seen them suffering major setbacks in the Isles, leading them to be more and more isolated from the rest of the Garou Nation.\nNo more however, as a strong succession of rulers and a renewed sense of purpose have seen the Fianna once again ascend as the masters of Britannia. As songs are already being composed to immortalize this great deed, the Fianna will now start to look outwards, perhaps to bring their help to the rest of the Nation.\n...After recovering from the most epic feast they have ever thrown."
 pod1230objectives_fera.7.a: "...my head hurts."
 pod1230objectives_fera.8.b: "The Celts are coming."
   
 get_fenris_objective_decision: "Berserkers of Gaia"
 get_fenris_objective_decision_tooltip: "Odin's get still lives. An affront to all the warriors of Great Fenris!"
 get_fenris_objective_decision_desc: "Despite the titanic battle that got rid of Wotan, his spawn still lurks in the South while the German leeches also make inroads into our lands. They must all be punished!"
 get_fenris_objective_decision_effect_tooltip: "You will get the Get of Fenris Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 get_fenris_objective_decision_confirm: "We will cast down Valhalla!"
 get_fenris_decision_custom: "The Caern of the Fimbul Winter, in [GetTitleByKey('b_biton').GetNameNoTier], must be fully built"
 get_fenris_decision_custom_a: "The Free State and the empire of Midgard do not exist or are held by you."
 
 pod1230objectives_fera.9.t: "Berserkers of Gaia"
 pod1230objectives_fera.9.desc: "The Get of Fenris are utterly fearsome fighters and no one in the Garou Nation denies that. But their violent, bordering on abusive, ways makes them at odds with the rest of the tribes. But times have changed.\nWith the rampant growth of civilization and the leeches that control it, the Get of Fenris are advocating for the unity of the Garou Nation under their leadership as undisputed Alphas. With the successful recovery of their Swedish homeland, they make a strong case for themselves and many are flocking to their banners already.\nBlood and violence will tear down the foes of Gaia, and if that's not enough, even more bloodshed should do the trick..."
 pod1230objectives_fera.9.a: "We will cast down the Heavens!"
 pod1230objectives_fera.10.b: "To Ragnarok?"
   
 redtalon_objective_decision: "Wrath of Gaia"
 redtalon_objective_decision_tooltip: "The $glossary_wyld$ isn't yet dead."
 redtalon_objective_decision_desc: "Civilization is running more and more rampant and the other tribes refuse to act. It is up to us to finally save Gaia from this damnable humanity."
 redtalon_objective_decision_effect_tooltip: "You will get the Red Talons Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 redtalon_objective_decision_confirm: "Remember the Prophecies"
 redtalon_decision_custom: "The Caern of the Winter Forest, in [GetTitleByKey('b_kazan').GetNameNoTier], must be fully built"
 redtalon_decision_requirement: "You must have a [GetFaithByKey('velvet_brood').GetName] [spirit_companion|E] at maximum rank." 
 
 pod1230objectives_fera.11.t: "Wrath of Gaia"
 pod1230objectives_fera.11.desc: "The Red Talons never relented on the Impergium, this culling of humanity that they deem necessary. As the other tribes gave up on the idea, they found themselves more and more isolated. But the Red Talons are nothing if not patient.\nRetreating to the still wild steppes, they made sure to purge the area of any unwanted outsiders and bode their time. As the other tribes fall prey to humanity's growth and the vampires coming with it, the Red Talons prosper. And now, they are the strongest force remaining in the Garou Nation and their howls will be heard.\nThe Impergium will go as planned and Gaia will be saved in the blood of humanity, whether they like or not."
 pod1230objectives_fera.11.a: "They will fear the wolves again."
 pod1230objectives_fera.12.b: "Man versus wild, again"
  
 warderofmen_objective_decision: "Gaia's Resilience"
 warderofmen_objective_decision_tooltip: "To survive, we must adapt"
 warderofmen_objective_decision_desc: "Humanity is here to stay, we must prove to the Garou Nation that the way forwards is with them, not against them."
 warderofmen_objective_decision_effect_tooltip: "You will get the Warder of Men Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 warderofmen_objective_decision_confirm: "A new path together"
 warderofmen_decision_custom: "The Caern of the Bright Promise, in [GetTitleByKey('b_acre').GetNameNoTier], must be fully built"
 warderofmen_decision_custom_a: "You own at least 5 books, journals or similar inventory artifacts."
 
 pod1230objectives_fera.13.t: "Gaia's Resilience"
 pod1230objectives_fera.13.desc: "The Warder of Men are quickly dismissed by other tribes as 'humanity lovers' but the Warder don't mind. Like their spirit totem, cockroach, they strive and survive everything. Humanity and civilization are now ascendant, and the Warder know this. Their deep understanding of the ineluctably of mankind's victory is what led them to the position of strength they are in today.\nWhile the other tribes try to cling to bygone eras, the Warder pave the way forwards, confident in the rationality of their plans. Like them, the Garou Nation will endure and evolve but, most importantly, will survive."
 pod1230objectives_fera.13.a: "Survive, endure, thrive."
 pod1230objectives_fera.14.b: "Wolves of the cities?"
  
 shadowlord_objective_decision: "Gaia's Shadow"
 shadowlord_objective_decision_tooltip: "We are meant to lead the Garou Nation, not those pompous Silver Fangs"
 shadowlord_objective_decision_desc: "If we want the rest of the tribes to acknowledge our legitimate right to rule them, we must first make a strong show of force."
 shadowlord_objective_decision_effect_tooltip: "You will get the Shadow Lords Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 shadowlord_objective_decision_confirm: "About time!"
 shadowlord_decision_custom: "The Caern of the Night Sky, in [GetTitleByKey('b_okachiv').GetNameNoTier], must be fully built"
 
 pod1230objectives_fera.15.t: "Gaia's Shadow"
 pod1230objectives_fera.15.desc: "For too long, the Garou Nation has lacked proper leadership. The Silver Fangs, these babbling buffoons, have made great show of 'leading' us. But they have only plunged the tribes into division and hopeless battles.\nWith our homeland secure again, we have proven that only the Shadow Lords are fit to lead the Garou Nation forwards. And now, we will use all the tools at our disposal to make sure that Gaia triumphs in the end. The tribes will follow us to victory against the Apocalypse... whether they like it or not."
 pod1230objectives_fera.15.a: "Gaia needs cunning champions."
 pod1230objectives_fera.16.b: "The Silver Fangs' throne is toppled."

 
 hakken_objective_decision: "Wolves of Nippon"
 hakken_objective_decision_tooltip: "A new homeland for the Wolves."
 hakken_objective_decision_desc: "After the War of Shame, many Hakken exiled themselves to Nippon. Although we tolerate the local [GetTrait('kueijin').GetName(GetNullCharacter)], their rule is harsh. Nippon can only be ruled with honor, and we will be the masters of our own fates."
 hakken_objective_decision_confirm: "It is time we set roots, and make this land a home."
 hakken_objective_decision_requirement_example: "$hakken_objective_decision_requirement$ #weak ([example.GetName])#!"
 hakken_objective_decision_requirement: "No [GetTrait('vampire').GetName(GetNullCharacter)] holds land in [GetGeographicalRegion('world_asia_japan').GetName]"
 hakken_objective_decision_requirement_example2: "$hakken_objective_decision_requirement2$ #weak ([example.GetName])#!"
 hakken_objective_decision_requirement2: "All $glossary_fera$ and [GetTrait('kueijin').GetName(GetNullCharacter)] in [GetGeographicalRegion('world_asia_japan').GetName] are your [vassals|E]"
 hakken_objective_decision_effect: "You will gain the [GetTitleByKey('h_cherry_phoenix_court').GetNameNoTier] [title|E] which encompasses all of [GetGeographicalRegion('world_asia_japan').GetName] and [GetGeographicalRegion('world_asia_korea').GetName]"
 pod1230objectives_fera.60.t: "Wolves of the East"
 pod1230objectives_fera.60.desc: "Long have we been on the march. Since our early exploratory marches from the Carpathians, past the lands ruled by the Silver Fangs and even further beyond the Stargazers, we have, for the most part, been mercenary warriors. Between folly ridden wars and the condemnation of our champions for it, we have been lost. But no longer. Now we settle, unite our clans on this area the rest of the Beast Courts consider a backwater, and make it our own. Already, word of our success has reached the mainland Courts, and they are deeply impressed with our successes against the native Uji and Tsuchigumo. We stand tall, proud, and worthy of our birthright as Gaia's Warriors. But the work is far from over. The Centipede and the Devil Kings still prosper, in their own ways. But now? Now we can take the fight to them. Properly, as proud wolves of the Emerald Mother."
 pod1230objectives_fera.60.a: "We have found a proper home."


 silentstrider_objective_decision: "The Exiles' New Home"
 silentstrider_objective_decision_tooltip: "Egypt has been lost to us, we must rebuild and start anew."
 silentstrider_objective_decision_desc: "Though Marrakech is our new home since the loss of Egypt, we can work on breaking the curse Set has bound us with. We must use the knowledge of the Osirian league to destroy this foul enchantment."
 silentstrider_objective_decision_effect_tooltip: "You will get the Silent Striders Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 silentstrider_objective_decision_confirm: "We are prepared now"
 silentstrider_decision_custom: "The Caern of the Wheel of Ptah, in [GetTitleByKey('b_marrakesh').GetNameNoTier], must be fully built"
 silentstrider_decision_custom_b: "[GetScriptedCharacterByHistoryID('505094').GetFirstName] and [GetScriptedCharacterByHistoryID('790126').GetFirstName], the two main vampire opponents of the Silent Striders, must be dead or in $pod_torpor$"
 silentstrider_decision_custom_c: "A character with a faith of the Osirian League is in control of Cairo"
 
 pod1230objectives_fera.17.t: "The Exiles Return Home"
 pod1230objectives_fera.17.desc: "After their long fight against Set, the Silent Striders were forced into exile from their homeland of Egypt. Becoming nomads for a while, they finally settled in Marrakech and their fortune has improved a lot since that time.\nNow firmly in control of their homeland once again, the Silent Striders are coming back as a force to be reckoned with. The wisdom and strength of conviction they acquired from their exile also make them more and more sought after by the other tribes, who are now wondering if the Striders might not be an uncommon but promising new candidate to lead the Garou Nation."
 pod1230objectives_fera.17.a: "Together to Egypt!"
  
 silverfang_objective_decision: "The Return of the King"
 silverfang_objective_decision_tooltip: "We are the leaders of the Garou Nation, now and forever."
 silverfang_objective_decision_desc: "Our leadership over the other tribes has been contested as of late. A show of force is needed to quiet the dissenters."
 silverfang_objective_decision_effect_tooltip: "You will get the Silver Fangs Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 silverfang_objective_decision_confirm: "I'm assuming direct control"
 silverfang_decision_custom: "The Caern of the Crescent Moon, in [GetTitleByKey('b_voronezh').GetNameNoTier], must be fully built"
 
 pod1230objectives_fera.19.t: "The Return of the King"
 pod1230objectives_fera.19.desc: "Since the time of Rome, the Silver Fangs have been the traditional leaders of the Garou Nation. With the fall of the Empire, and the gradual shift of the tribe to a more eastwards focus, this tradition has been contested. Tribes like the Shadow Lords or the Red Talons have sprung into the vacuum of power to chip away the Silver Fangs' authority and others like the Silent Striders or the Fianna have simply been lost due to geographical distance.\nWith their recent success in Russia however, the Silver Fangs are proving that they have only moved their seat of power and not lost the capabilities that made them so respected in the first place. Not all tribes are failing in line yet, but the nobility of the werewolves are getting close to reaffirming their natural rights."
 pod1230objectives_fera.19.a: "Hail to the Kings!"
 pod1230objectives_fera.20.b: "They retain their throne... for now"
    
 stargazer_objective_decision: "Gaia's Wisdom"
 stargazer_objective_decision_tooltip: "From inner peace can rise greater unity."
 stargazer_objective_decision_desc: "We preach moderation, and we have chosen to stand apart of the Garou Nation. But inaction can only last so long before becoming indifference."
 stargazer_objective_decision_effect_tooltip: "You will get the Stargazers Empire [title|E], a powerful relic of your tribe and be one step closer to uniting the Garou." 
 stargazer_objective_decision_confirm: "Time to meet our Western cousins"
 stargazer_decision_custom: "The Caern of the Snow Leopard, in [GetTitleByKey('b_xigaze').GetNameNoTier], must be fully built"
 
 pod1230objectives_fera.21.t: "Gaia's Wisdom"
 pod1230objectives_fera.21.desc: "We didn't take part in the War of Rage and we have stayed neutral ever since, keeping our own counsel. There is a limit to how much detached from our Western cousins we can stay though. Clearly, the threats faced by the Garou in this new age require unity.\nThe other tribes have shown time and time again their propensity for rash action and their lack of careful planning. We can provide sagacious leadership to channel this anger into more productive matters. It is time for the Garou Nation to embrace Gaia's wisdom."
 pod1230objectives_fera.21.a: "Time to calm down and listen, cousins."
 pod1230objectives_fera.22.b: "Strange fellows these ones"
    
 gaia_objective_decision: "Gaia's Triumph"
 gaia_objective_decision_tooltip: "We have made our claim about leading the Garou Nation, it is now time to prove ourselves worthy!"
 gaia_objective_decision_desc: "We have made our claim about leading the Garou Nation, it is now time to prove ourselves worthy!"
 gaia_objective_decision_effect_tooltip: "You will get the Garou Nation Empire [title|E], a powerful special faith doctrine and non Werewolves rulers will be crippled." 
 gaia_objective_decision_confirm: "For Gaia! Onwards!"
 
 pod1230objectives_fera.23.t: "Gaia's Triumph"
 pod1230objectives_fera.23.desc: "Despite the Flaying Plague and the rampant growth of civilization, the Garou have endured. Under a new and respected leadership, the tribes have been united to wage a common war against the dreaded vampires and their numerous minions. Step by step, the werewolves are regaining lost Caerns, curtailing cities' growth and making sure that humanity stays in its proper place. As more and more leeches are torn apart by fangs and claws, there is little doubt left: this is the age of the Wolf.\nThe Apocalypse can wait, for the Garou are more than ever ready to keep watch over their beloved Gaia."
 pod1230objectives_fera.23.a: "The Mother is saved!"
 pod1230objectives_fera.24.b: "Is Gaia truly saved?"
 pod1230objectives_fera.23.custom: "Non-werewolf rulers will get a powerful negative effect, Collapse of Civilization, for the next 100 years. Werewolf rulers of an inferior rank will now always accept vassalization from this character, except Black Spiral Dancers."
    
 blackspiraldancer_objective_decision: "Loving Grandchildren"
 blackspiraldancer_objective_decision_tooltip: "Granny expects us to be nice!"
 blackspiraldancer_objective_decision_desc: "The Hag, Baba Yaga, is one of the most trusted servant of our master. If we please her by destroying her enemies, she will certainly reward us!"
 blackspiraldancer_objective_decision_effect_tooltip: "Baba Yaga will gift you with immortality, in a way." 
 blackspiraldancer_objective_decision_confirm: "Are you happy Grandma?"
 blackspiraldancer_victory_objective_decision_custom: "The [GetTitleByKey('k_crescent_moon').GetNameNoTier] [title|E] must be destroyed, or controlled by you"
     
 pod1230objectives_fera.25.t: "Loving Grandchildren"
 pod1230objectives_fera.25.desc: "The rapid expansion of the Shadow Curtain, in no small part thanks to you, has greatly pleased the Little Grandmother, Baba Yaga. The destruction of any close threat to her rule allows her to concentrate on more important matters but that doesn't mean that she has forgotten you.\nAfter an extensive ritual to make sure that you would (probably) survive, the Hag has [Glossary('Embraced','game_concept_Embrace_desc')] you, making you one of her 'Vrykolakas', the half breed between vampires and werewolves that some call 'Abominations'. You are now immortal and able to call on some of the powers of your two worlds. Most will recoil at your horrific transformation but you know it for what it truly is: the greatest of gifts."
 pod1230objectives_fera.25.a: "I have achieved perfection."
 pod1230objectives_fera.25.b: "That might be a bit too much..."
 pod1230objectives_fera.26.a: "What foul thing is this!?"
 pod1230objectives_fera.26.b: "What foul thing is this!?"   
 
 become_abomination_tt: "As an Abomination, you have full access to vampire's powers except the Embrace. You aren't a werewolf anymore though, but you keep access to Breed and Auspice Gifts as well as the Shapeshift option."
 become_abomination_holdings_tt: "Your holdings will be changed from tribal to castle, losing their now incompatible buildings in the process."
 
 storyteller_quest_decision: "Great Quest of Gaia"
 storyteller_quest_decision_desc: "Werewolves live (and often die) for epic quests granted by spiritual entities. Undertaking one would bring you great rewards if you could succeed.\nCollecting legendary books would be a worthwhile endeavor for Gaia."
 storyteller_quest_decision_tooltip: "Earn the legendary gift."
 storyteller_quest_decision_confirm: "For Gaia!"
 
 release_from_bondage_quest_decision: "Great Quest of the Incarna"
 release_from_bondage_quest_decision_desc: "Werewolves live (and often die) for epic quests granted by spiritual entities. Undertaking one would bring you great rewards if you could succeed.\nDestroying the oppressing Shadow Curtain would certainly please the Incarna."
 release_from_bondage_quest_decision_tooltip: "Earn the legendary gift."
 release_from_bondage_quest_decision_confirm: "Down with the wall"
 release_from_bondage_quest_decision_custom: "The [GetTitleByKey('e_shadow_curtain').GetNameNoTier] title must be destroyed"
 
 firebringer_quest_decision: "Great Quest of Coyote"
 firebringer_quest_decision_desc: "Werewolves live (and often die) for epic quests granted by spiritual entities. Undertaking one would bring you great rewards if you could succeed.\nThe trickster Coyote would certainly be pleased by a whimsical quest."
 firebringer_quest_decision_tooltip: "Earn the legendary gift."
 firebringer_quest_decision_confirm: "That should be enough I hope"
 firebringer_quest_decision_custom: "Grant an [empire|E] [title|E]"
 
 prelude_to_apocalypse_quest_decision: "Great Quest of the Maeljin Incarna"
 prelude_to_apocalypse_quest_decision_desc: "Werewolves live (and often die) for epic quests granted by spiritual entities. Undertaking one would bring you great rewards if you could succeed.\nTo please the Maeljin you must bring destruction to the land and prove your mastery over the forces of corruption."
 prelude_to_apocalypse_quest_decision_tooltip: "Earn the legendary gift."
 prelude_to_apocalypse_quest_decision_confirm: "Unlimited Power!"
 prelude_to_apocalypse_quest_decision_requirement: "You must have a [GetFaithByKey('wyrmbound').GetName] [spirit_companion|E] at maximum rank."
 
 coruroc_quest_decision: "Personal Quest of Coruroc"
 coruroc_quest_decision_desc: "Coruroc requested you to cleanse the Black Spiral Dancers taint in the name of the White Howlers. Every last one of their foul hive must be purged!"
 coruroc_quest_decision_tooltip: "Avenging the Howlers."
 coruroc_quest_decision_confirm: "Purified at last?"
 coruroc_quest_decision_custom: "There must be no [ruler|E] following [GetReligionByKey('blackspiraldancer_religion').GetName] [religion|E] on the map"
 coruroc_quest_decision_custom_ex: "$coruroc_quest_decision_custom$ #weak ([example.GetFirstName])#!"      
 
 aidan_farwatcher_quest_decision: "Personal Quest of Aidan Farwatcher"
 aidan_farwatcher_quest_decision_desc: "Driven by vengeance for his betrayed tribe, Aidan Farwatcher requested you to kill Black Spiral Dancers."
 aidan_farwatcher_quest_decision_tooltip: "The Spiral undone?"
 aidan_farwatcher_quest_decision_confirm: "A bloody revenge"
 
 stop_flaying_plague_decision: "Stop the Flaying Plague"
 stop_flaying_plague_decision_tooltip: "There must be a solution!"
 stop_flaying_plague_decision_desc: "The Flaying Plague is claiming countless Garou and Kinfolk lives in its wake. If nothing is done about it, this might be the end of the once proud warriors of Gaia.\n\nThe Silent Striders are working on a solution. If nothing is done before that point, they think they can achieve results by 1265."
 stop_flaying_plague_decision_effect_tooltip: "The Flaying Plague will stop its ongoing spread." 
 stop_flaying_plague_decision_confirm: "It is now or never!"
 stop_flaying_plague_decision_custom: "You need 10 or more in every attribute, except prowess where 40 or more is needed. Your pack members attributes can also work."
 
 pod1230objectives_fera.27.t: "Cleaving a Disease"
 pod1230objectives_fera.27.desc: "Thanks to the skills of your pack and your entourage, you have managed to uncover clues about the truth concerning the Flaying Plague. This terrible disease was indeed supernatural in origin, apparently created by a group of mages devoted to the $glossary_wyrm$ calling themselves the Circle of Red.\nThese fools were already behind several brazen attacks against eastern Caerns, most notably in Sofia, and while they tried to cover their tracks, they haven't done it well and quickly enough.\nStorming their lair, you have taken great satisfaction in slashing your way into these Wyrm-ridden cultists until their ritual circles were red with their own blood.\nWhile the threat of the Flaying Plague is now behind you, there are still some doubts about the details regarding its creation, some clues leading to a mysterious vampire and others to a demon. This might be worth investigating in the future but, for now at least, you duty to Gaia has been fulfilled."
 pod1230objectives_fera.27.a: "A legendary triumph!"
 pod1230objectives_fera.28.a: "Good for the wolves I suppose."
 pod1230objectives_fera.28.b: "Finally!"
 
 weaponize_flaying_plague_decision: "Weaponize the Flaying Plague"
 weaponize_flaying_plague_decision_tooltip: "The ultimate weapon against the werewolves?"
 weaponize_flaying_plague_decision_desc: "The $POD_splat_werewolf_plural$ and their families, the [GetTrait('kinfolk').GetName(GetNullCharacter)], have been affected by a very lethal disease recently, the Flaying Plague. They are clearly hard at work trying to find a solution but, until then, this rare method of breaking a lupine's defenses presents an opportunity."
 weaponize_flaying_plague_decision_effect_tooltip: "You will be able to spread the Flaying Plague as an interaction." 
 weaponize_flaying_plague_decision_effect_tooltip_2: "By using the Flaying Plague on a prisoner, you can have certain success on embracing them and making them an [GetTrait('abomination').GetName(GetNullCharacter)] (except the $glossary_fera$ that can't become an abomination at all)." 
 weaponize_flaying_plague_decision_confirm: "My perfected secret weapon!"
 weaponize_flaying_plague_decision_custom: "You need 3 or more werewolves prisoners to experiment upon."
 weaponize_flaying_plague_decision_customb: "The werewolves are hard at work trying to find the source of the Flaying Plague. Once they do (around 1240), this decision will disappear."
 
 pod1230objectives_fera.29.t: "Weaponized Flaying Plague"
 pod1230objectives_fera.29.desc: "The true origins of the Flaying Plague are mysterious. The infernalist Circle of Red seems to be the likeliest culprit but you also came across mentions of interference from a major demon and even some vampires. In any case it is a very impressive feat of ritualized magic with clearly an infernal taint to it.\nYour own experiments on the werewolves at your disposal managed to uncover enough of the process to now understand how to replicate it if necessary.\nEven if the werewolves end up destroying the source of the current Flaying Plague, you will be able to use it in the future."
 pod1230objectives_fera.29.a: "A useful tool indeed..."
#pod1230objectives_fera.30.a: "I don't care"
#pod1230objectives_fera.30.b: "What it mean?"   

 gaian_church_objective_decision: "The Mother of All"
 gaian_church_objective_decision_tooltip: "Humanity must come to understand Gaia."
 gaian_church_objective_decision_desc: "Some werewolves try to infiltrate the Church out of real devotion or opportunism. They try to conflate Gaia with the Virgin Mary and push the latter to more prominence in Rome's teachings."
 gaian_church_objective_decision_effect_tooltip: "You will shift the teachings of the church and marry Gaian ideals with the human institution." 
 gaian_church_objective_decision_confirm: "Guide us Mother"
 gaian_church_objective_decision_custom1: "$POD_splat_hunter_plural$ will stop seeing the Garou as an incompatible enemy. Instead, the Garou will be considered as guardians, protectors, miracle workers or charged with a divine mission.\nThis will result in their faiths being able to cooperate more easily."

 pod1230objectives_fera.125.desc: "While most of the werewolves were appalled by the rise of Christianity, a few saw an opportunity, fewer still saw a hint of Gaia in the mortals' reverence for Mary. While fringe at first, these factions used well the rapid growth of the Church's power and subtly influenced theological debates to favor worship of Mary when possible.\nIt has taken a long time and many false starts but the results are starting to show. With this apparently subtle influence, the "Church of Gaia" has managed to create a cascading effect culminating in the Catholic Church quietly turning their attention away from werewolves and more towards other concerns."
 pod1230objectives_fera.125.a: "All under one Mother"
 gaiachurch_objective_decision_custom_roma: "The holder of [GetTitleByKey('c_roma').GetNameNoTier] must be an [GetFaithDoctrine('special_doctrine_ecumenical_hunters').GetBaseName] or of your faith."
 
 bagheera_objective_decision: "Akari, Pourra, Doyala"
 bagheera_objective_decision_tooltip: "Searching, Foundation, Passing On"
 bagheera_objective_decision_desc: "The Bagheera see themselves as the most well rounded of catkind. Their many talents and great charisma make the panthers the sole tribe to be accepted as friends by all the others. Maybe they could leverage this fact to push for unity in the Bastet Nation?"
 bagheera_objective_decision_effect_tooltip: "You will unlock a chain of events putting you on the path to unite the Bastet Nation. As a Bagheera, this process will be a little easier." 
 bagheera_objective_decision_confirm: "Steady as a cat."
 bagheera_objective_decision_custom: "You need 10 or more in every attribute, except prowess where 40 or more is needed. Your pack members attributes can also work."
  
 pod1230objectives_fera.31.desc: "According to their legends, the Bagheera were once created as the judges of catkind. While this role has long since been abandoned, they have retained the natural curiosity and friendly charisma that came with it. As they often say, they are the truest embodiment of the cat spirit, wisdom, love and anger all fused together. Uniquely among the fractured Bastet tribes, the Bagheera managed to keep a cordial relationship with all of their cousins and, with their recent rise in fame, this has birthed the idea that maybe it is time for the werepanthers to leverage this strength and push for the unification of the divided Bastet Nation.\nWhile the other tribes are skeptical at best, the current talented leadership of the Bagheera has managed to at least bring them to the negotiation table. It now remains to be seen if the charismatic panthers will see this endeavor through to a satisfying conclusion."
 pod1230objectives_fera.31.a: "We are all children of Seline!"

 bubasti_objective_decision: "Cat Against Snake"
 bubasti_objective_decision_tooltip: "We are patient. We will wait for our triumphant revenge."
 bubasti_objective_decision_desc: "The Bubasti, once revered as gods by the Egyptians, have lost everything due to their war against the Setites. But as Bast herself was, they are patient and the followers of the serpent have not seen the last of the midnight black cats of Khem."
 bubasti_objective_decision_effect_tooltip: "You will liberate your captured cat kin, allowing you to get help from them in the future.\nYou will also unlock a chain of events putting you on the path to unite the Bastet Nation." 
 bubasti_objective_decision_confirm: "On the prowl."
 bubasti_objective_decision_extra1: "You must have at least 20 [perks|E] in [sorcery_lifestyle|E]"
  
 pod1230objectives_fera.32.desc: "Once revered as gods by the people of Egypt, the Bubasti lost everything in their war against the followers of Set. They have been patient however and their millennia of knowledge of the magical arts allowed them to watch and wait for the right moment to strike back.\nAnd they found it.\nLeading a daring combined force of the $glossary_osirian_league$ in the Setite temple of Ombos, the Bubasti managed to rescue their lost kin, the Kyphur cats, and deal a powerful blow to their eternal foes.\nWith their pride restored and their feline kin finally allowed to prosper again, the midnight cats of Khem have made quite the impression on the rest of the Bastet Nation. While many are still wary of their strange sorcery, most are at least willing to entertain the idea of letting the Bubasti take on a more prominent role in the future."
 pod1230objectives_fera.32.a: "Bow to the shadowcat."

 ceilican_objective_decision: "Dancing Mad"
 ceilican_objective_decision_tooltip: "The time for leisure and carelessness and over. The Faerie traitors will pay."
 ceilican_objective_decision_desc: "Once carefree and living a life of hedonism, the Ceilican have been betrayed by the Faerie lord Samhach who hunted them so efficiently that they were almost driven to extinction. Freeing these captives would take a solid plan and an even more solid group of heroes but it might be the only hope for survival for the Ceilican tribe."
 ceilican_objective_decision_effect_tooltip: "You will liberate your captured brothers and sisters who will then join your court.\nYou will also unlock a chain of events putting you on the path to unite the Bastet Nation." 
 ceilican_objective_decision_confirm: "Another type of dance..."
   
 pod1230objectives_fera.33.desc: "Once carefree and living a life of hedonism, the Ceilican have been betrayed by the Faerie lord Samhach who hunted them so efficiently that they were almost driven to extinction. The "mercurial cats" weren't ready to give up however and, under your diligent leadership, managed to stage a surprising comeback, storming Lord Samhach's Faerie court and liberating their captive brethren.\nAs the victorious Ceilican dance and feast in the ruins of the hated betrayer's court, the rest of the Bastet Nation takes notice of this puzzling development. Once thought extinct, it seems it will be now time to welcome the Ceilican back among their cat brethren, perhaps a sign of Mother Seline's will for her children to finally go past their personal grudges and unite under one banner?"
 pod1230objectives_fera.33.a: "The party isn't over!"

 khan_objective_decision_judgment_hammer: "You must retrieve the [GetPODArtifact('judgment_hammer').GetName], the most prized weapon of the Khan and arguably the most powerful of the Bastet as a whole."
 khan_objective_decision: "Wise and Fierce Tigers"
 khan_objective_decision_tooltip: "By achieving the perfect balance, we will show the way for the Bastet Nation."
 khan_objective_decision_desc: "Regal hunters, warriors and mentors, the Khan are the true nobility of the Bastet despite what the tyrannical Simba might claim. By perfecting themselves, they can show catkind that they are truly chosen by Mother Seline to lead them to a glorious future."
 khan_objective_decision_effect_tooltip: "This will improve the Judgment Hammer.\nYou will also unlock a chain of events putting you on the path to unite the Bastet Nation." 
 khan_objective_decision_confirm: "Passion, vigor and wisdom."
  
 pod1230objectives_fera.34.desc: "The wrathful Simba think that the Bastet should be led by a lion, a lazy creature relying on his wives to hunt and on his strength to bully others into submission. The Khan show the example of the tiger instead, a wise and graceful predator that does the fighting itself when needed but otherwise seeks to improve its and its pack's condition. For a long while, the other Bastet have secretly hoped that the Khan would take on a more prominent role in the Bastet Nation to counteract the Simba.\nThanks to your steady leadership and the recovery of the legendary Judgment Hammer, this time has now come. The Simba might posture and growl as they wish but the other tribes are now rallying behind the tigers' call for unity."
 pod1230objectives_fera.34.a: "A bright age for catkind begins!"

 simba_objective_decision: "The Lion Tyrants"
 simba_objective_decision_tooltip: "The lion is the king of nature. Time to remind them."
 simba_objective_decision_desc: "The Simba are the rightful rulers of catkind. Moments of weakness and accusations of "tyrannical rule" have eroded this claim however. Time to remind the other tribes who is in charge."
 simba_objective_decision_effect_tooltip: "You will also unlock a chain of events putting you on the path to unite the Bastet Nation." 
 simba_objective_decision_confirm: "Long live the kings."
  
 ruler_catkind_dynasty_modifier: "Regal and Dreadful Lions"
 ruler_catkind_dynasty_modifier_desc: "The Simba have reaffirmed their claim of rulership over the other Bastet tribes. The lions stand poised to defend it to anyone foolish enough to contest this truth." 
 pod1230objectives_fera.35.desc: "Simba legends claim that each Bastet tribe was created by Mother Seline with a purpose in mind. Theirs was to be the lord. Obviously, the other Bastet tend to heavily disagree on that interpretation. Their petty whimpering is however of no concern to the mighty lions.\nAs the other tribes lose themselves in useless small-minded concerns, the Simba do the only thing worth doing: they conquer and affirm their right to rule Africa and beyond as the true kings of this land. And with their recent successes in backing that claim, the other tribes stand silent for once."
 pod1230objectives_fera.35.a: "A true king searches for what he can take."
 
 swara_spiritual_guardians_modifier: "Spirit of Damaa"
 swara_spiritual_guardians_modifier_desc: "Thanks to their close ties with the spiritual world, the Swara are able to rely on otherwordly help much easier than other Bastet tribes."
 swara_objective_decision: "Guardians of the Pure Places"
 swara_objective_decision_tooltip: "While the others bicker, we do the work Mother Seline entrusted to us."
 swara_objective_decision_desc: "The Swara are the guardians of the spiritually charged places. While other Bastet tribes dismiss them as cowards and loners, they secretly defend the purity of Africa with a zeal that even a Khan would envy."
 swara_objective_decision_effect_tooltip: "You will also unlock a chain of events putting you on the path to unite the Bastet Nation." 
 swara_objective_decision_confirm: "We do what must be done."
 swara_objective_decision_caern_tooltip: "You need to have a maxed out Caern of each type (Level 5 ducal buildings, Caern of Will, Rage, Leadership, Wisdom and Enigmas)"

 pod1230objectives_fera.36.desc: "The werecheetah are mysterious to the other tribes. Many dismiss them as cowards, always running apparently aimlessly from place to place and avoiding conflict. This couldn't be farther from the truth. The Swara are diligent defenders of the purity of the land and they fight as hard as any lion when their sacred duty is threatened.\nWhile they haven't been clamoring it, their work has started to gain recognition among the Bastet Nation as of late. The other tribes stand silent, contemplating that they were bickering or obsessing over small concerns while the Swara were doing Mother Seline's bidding. This had lead to a surprising impetus putting them at the forefront of the renewed call for Bastet unity. It remains to be seen if the usually isolationist "Silver Folk" will be heeding that call in the future."
 pod1230objectives_fera.36.a: "Are they starting to understand?"
 
 pod1230objectives_fera.37.t: "Unification of the Bastet Nation"
 pod1230objectives_fera.37.desc: "With your recent success putting your tribe at the forefront of the Bastet, the idea of consolidating the scattered tribes into a cohesive whole has resurfaced once again. Most legends of catkind agree that you were once intended by Mother Seline to work alongside each other and that the division that happened in the earliest days was the main cause of your defeat against the werewolves during the War of Rage.\nStill, despite this agreed upon fact, it will be a very difficult task bringing catkind together once again. Each tribe will need to be convinced and cats are nothing if not both stubborn and fickle creatures at the same time."
 pod1230objectives_fera.37.a: "Let's hear their point of view."
 
 pod1230objectives_fera.38.desc: "The Bagheera are fully on board with your plan to restore the Bastet Nation. After all they have been advocating for doing just that for centuries. Still, the judges of catkind do not want a repeat of the errors of the past and they want to be certain that you are fit to lead your brethren into a prosperous future.\nThey intend to observe how you work and how you surround yourself as a ruler before giving their full commitment to the cause. To help in this matter, they have offered the teachings of one of their wisest mentors to work on your weaknesses while improving your strengths."
 pod1230objectives_fera.38.a: "We will do fine on our own."
 pod1230objectives_fera.38.b: "Their willingness to help is appreciated."
 new_objective_effect_tooltip: "A new major decision is available."
 
 bagheera_nation_decision_custom: "You need 15 or more in every attribute, except prowess where 50 or more is needed. Your Pride members' attributes can also work."
 bastet_nation_progress_objective_decision_effect_tooltip: "You will get one step closer to restoring the Bastet Nation."
 bagheera_nation_objective_decision: "The Bastet Nation: the Bagheera"
 bagheera_nation_objective_decision_tooltip: "We must be judged worthy."
 bagheera_nation_objective_decision_desc: "The Bagheera see themselves as the most well rounded of catkind. Their many talents and great charisma make the panthers the sole tribe to be accepted as friends by all the others. They are eager to participate on your endeavor of unifying the Bastet but want to make sure you will be a wise and competent ruler first."
 bagheera_nation_objective_decision_confirm: "A fine display of rulership."
 
 pod1230objectives_fera.39.desc: "The Bubasti, frankly, don't seem to care one way or another about your desire to unify the Bastet Nation. The secretive shadowcats of Egypt have their own problems to deal with, most notably the abduction of their kinfolk, the Kyphur cats, by the Followers of Set. They are keen on accepting you as the ruler of catkind... if you pledge your considerable resources to their help. They don't come empty handed however, offering to teach you the secrets of their ancestral magic, inherited from the days where the great Isis herself nurtured their tribe."
 pod1230objectives_fera.39.a: "Your cause is our own."
 pod1230objectives_fera.39.b: "Magic you said?"
 pod1230objectives_fera.39.c: "I'm sure we can convince them to reconsider."
 used_bagheera_joker_tooltip: "You will use your "joker", a one time opportunity to directly rally this tribe to your cause instead of having to fulfill their request."
 
 bubasti_knight_help_modifier: "Helping the Bubasti"
 bubasti_knight_help_modifier_desc: "Many of your best champions are currently away, helping the Bubasti plan the liberation of their kin from the Followers of Set."
 bubasti_nation_objective_decision: "The Bastet Nation: the Bubasti"
 bubasti_nation_objective_decision_tooltip: "Time for them to step out of the shadows."
 bubasti_nation_objective_decision_desc: "The Bubasti, once revered as gods by the Egyptians, have lost everything due to their war against the Setites. They will pledge themselves to your cause if you provide them with enough support to recover their lost glory, starting with their captured kinfolk."
 bubasti_nation_objective_decision_confirm: "That should be enough."
  
 ceilican_nation_objective_decision: "The Bastet Nation: the Ceilican"
 pod1230objectives_fera.40.desc: "An unexpected guest shocked the gathered representatives of the Bastet by claiming to be a member of the Ceilican. The "mercurial cats" of Celtic folklore were long thought dead by the rest of catkind. This individual explains that the Ceilican have been hunted to almost extinction by a Fae lord but a few of them managed to hide and survive. Hearing of the renewed effort to unify the Bastet, they have come to humbly request your assistance in liberating their remaining survivors from their nemesis' grasp.\nAs the prospective ruler of all the Children of Seline, you would be hard pressed to refuse such a plea for help."
 pod1230objectives_fera.40.b: "Hiding for so long? You must know a trick or two."  
 ceilican_nation_objective_decision_tooltip: "Forgotten cousins returning to the family."
 ceilican_nation_objective_decision_confirm: "A victory worthy of the new ruler of the Bastet!"
 any_knight_ceilican_tooltip: "You must have 5 or more knights with at least 45 prowess."
 
 khan_nation_objective_decision: "The Bastet Nation: the Khan"
 pod1230objectives_fera.41.desc: "The powerful weretigers were always considered a strong leadership candidate for the Bastet nation, their unrivaled strength and honorable conduct making them respected by the others. Still, they have graciously accepted to take a backseat to your own ambitions, recognizing your impressive success so far. The Khan have however issued you a challenge to prove that you are indeed the chosen of Seline that you claim to be. They even offered to put you through their traditional trial for Khan nobility, a well known ruthless and difficult exercise. While it wouldn't be enough to gain their fealty, this would certainly improve your legitimacy to the Bastet as a whole."
 pod1230objectives_fera.41.a: "Let me hear your request."
 pod1230objectives_fera.41.b: "About that trial..."
 khan_nation_objective_decision_desc: "Regal hunters, warriors and mentors, the Khan are the true nobility of the Bastet despite what the tyrannical Simba might claim. They won't accept a ruler that doesn't show the same perfection in both body and mind."
 khan_nation_objective_decision_tooltip: "Befriending the tigers."
 khan_nation_objective_decision_confirm: "I am Khan of the Khans."
   
 simba_nation_objective_decision: "The Bastet Nation: the Simba"
 pod1230objectives_fera.42.desc: "As the self proclaimed kings of the Bastet nation, the proud and arrogant werelions have always boasted that they should rule, often going to blows with other Bastet to stake their claim if needed. You expected your proposal of uniting catkind under your leadership to go quite badly with them.\nSomehow, it went even worse.\nIt took a lot of effort to subdue the Simba delegates and stop them from just jumping at you claws first to "punish you for your impudence". They are still screaming bloody murder as they are dragged out of the room and you are left to consider your next move. It's becoming clear that the lions will only be subdued if you prove your might on their own territory: Africa."
 pod1230objectives_fera.42.a: "Time to tame them."
 pod1230objectives_fera.42.b: "We need a beachhead to start our invasion."
 simba_nation_objective_decision_desc: "The Simba are the rightful rulers of catkind... according to themselves at least. They won't relinquish this claim until their heartlands are conquered by someone willing to challenge them on their own territory."
 simba_nation_objective_decision_tooltip: "Hunting lions."
 simba_nation_objective_decision_confirm: "Time to throw them off a cliff."
 POD_simba_heartlands: "Simba Heartlands: Hausaland, Igbo-Benue, Yorubaland and Borgu"  
   
 swara_nation_objective_decision: "The Bastet Nation: the Swara"
 pod1230objectives_fera.43.desc: "As a proof of their respect, the isolationist Swara have invited you to one of their den-realms to discuss your proposal of reuniting the Bastet Nation. The werecheetah don't intent to get in your way or contest your claim but they remind you of the sacred duty of the Children of Seline, protecting the pure lands. If you can prove your commitment to this ancestral duty, they will fully join the fold. Otherwise they will continue to do their own thing far from the intrigues of the rest of catkind, as they always did so far.\nJudging by some structural weaknesses you noticed in this specific den-realm, you think you could make a donation to help them improve their defenses here, showing that you are indeed taking their request very seriously."
 pod1230objectives_fera.43.a: "I will consider your request."
 pod1230objectives_fera.43.b: "An important task. Let me help right now."
 swara_nation_objective_decision_desc: "The Swara are the guardians of the spiritually charged places. They want to see your commitment to their cause before fully joining your project of rebuilding the Bastet Nation."
 swara_nation_objective_decision_tooltip: "The protectors need our protection."
 swara_nation_objective_decision_confirm: "A great deed for a great ruler."
 
 pod1230objectives_fera.44.t: "The Bastet Nation"
 pod1230objectives_fera.44.desc: "With shrewd diplomacy, force of will and a no small amount of more "direct" persuasion, you have finally rallied all the tribes under your banner. One by one they come to acknowledge your triumph and the new ruler of the united Bastet Nation. All of catkind is finally working as one, something never seen since the time of legends, well before the losing war against the tyrannical Garou.\nSome of your new "subjects" expect you to fall quickly, while others earnestly believe in you and the future you promised. In the end, it doesn't truly matter. You earned this victory.\nYou will now lead your fellow felines into a bright future. The age of the cat is finally at hand."
 pod1230objectives_fera.44.a: "From the moon, Mother Seline smiles."
 blessed_seline_modifier: "Blessed by Seline"
 blessed_seline_modifier_desc: "The Mother of Catkind smiles upon her chosen champion."
 bastet_nation_unifier_tooltip: "As long as you hold the Bastet Nation title, you will now get access to all the Bastet Men at Arms."
 
 artifact_attacker_advantage_5_modifier: "[command_modifier_i|E]Attacker [advantage|E]: #P +5#!"
 artifact_monthly_prestige_10_modifier: "Monthly [prestige|E]: #P +40%#!"
 

 entoban_objective_decision: "Unite Entoban"
 entoban_objective_decision_tooltip: "Ancient Entoban will return to Gaia's children, whole once more."
 entoban_objective_decision_desc: "Here in Entoban, the world's heart is where we awoke at the beginning of the Age of Sleep. Here we shepherded the younger races as they came into being. And it is here where we were betrayed by the #TOOLTIP:GAME_TRAIT,werewolf,[GetNullCharacter] #L Egg-smashers#! as they murdered our kin and allies. Entoban will be ours again, and the wolves cannot stop us."
 entoban_objective_decision_confirm: "Our Primeval Home."
 entoban_objective_decision_requirement_example: "$entoban_objective_decision_requirement$ #weak ([example.GetName])#!"
 entoban_objective_decision_requirement: "No #TOOLTIP:GAME_TRAIT,werewolf,[GetNullCharacter] #L Garou#! or their [GetTrait('kinfolk').GetName(GetNullCharacter)] hold land in [GetGeographicalRegion('world_africa').GetName]"
 entoban_objective_decision_effect: "You will gain the [GetTitleByKey('h_entoban').GetNameNoTier] [title|E] which encompasses all of [GetGeographicalRegion('world_africa').GetName]"
 entoban_objective_decision_effect2: "$glossary_fera$ with capitals in [GetGeographicalRegion('world_africa').GetName] will have a higher chance of accepting vassalization"
 pod1230objectives_fera.50.t: "Entoban"
 pod1230objectives_fera.50.desc: "In ages long past, the lands known as Africa to Mankind was once the heart of a global civilization. Here there were once cities the size of nations made of wonder and possibility, where all walks of life prospered long before the Age of Mammals. But that time came to an end, and Entoban became divided. In our eons of slumber, it fractured and became broken in our absence. But, that was a shame of the past. Now, as you leave your Wallow and look out across the horizon, all beneath the gaze of the sun is part of a single whole. Those ages of lost glories and wonders may yet be reclaimed. This is the first step onto a path of reaching the same heights of grandeur as the Age of Kings. There is much work to be done. But you have already ensured there will be a foothold for generations to come."
 pod1230objectives_fera.50.a: "Like the Dragon Kings of Old, take your throne on the Heart of the World."
 entoban_vassal_acceptance: "Entoban: $VALUE|=+0$"


 mokole_mbembe_spear_objective_decision: "Find the Spear"
 mokole_mbembe_spear_objective_decision_tooltip: "Through canny chiminage and exploring the lost places, a holy relic may be found."
 mokole_mbembe_spear_objective_decision_desc: "The spear of [GetScriptedCharacterByHistoryID('795111').GetFirstName] has been lost to the ages. It was last seen in the [umbra|E] but with the [innocents|E] prowling, many Mokolé do not risk searching for it. Our [spirit_companions|E] on the other hand are much better suited to the task."
 mokole_mbembe_spear_objective_decision_confirm: "Back in Mokolé hands."
 mokole_mbembe_spear_objective_decision_requirement: "[GetBuilding('umbral_lake_tele_03').GetName] must be fully built"
 mokole_mbembe_spear_objective_decision_requirement2: "Obtain [GetModifier('paleontologist_modifier').GetNameWithTooltip] from [UmbraGlossary('pangaea')]"
 mokole_mbembe_spear_objective_decision_requirement3: "You have a [spirit_companion|E] at max Rank" 
 mokole_mbembe_spear_objective_decision_requirement4: "You have two [spirit_companions|E] at max Rank"
 pod1230objectives_fera.51.t: "Spear of the First"
 pod1230objectives_fera.51.desc: "As you move through Pangaea, the spirits guide you to a forgotten glade, hidden beneath the body of a colossal long dead fallen Dragon King. Beneath their belly, in a cavern formed in their ribs, there is a single mighty spear plunged deep into a stone heart. Despite the fossilized remains of the King, the spear is still perfect and illustrious within its heart, standing strong and resolute against the ravages of time. For a creature of your strength, it is a simple matter to pull it free. As the spear is reoved, the ancient King dissolves into dust, and this hidden alcove disappears from all but your memory. The weight of ages hangs heavy on you, as the Spear accepts its new wielder."
 pod1230objectives_fera.51.a: "A mighty weapon fit for a King."


 tkash_objective_decision: "Restore the Balance"
 tkash_objective_decision_tooltip: "Dark must not overcome Light."
 tkash_objective_decision_desc: "The vile creatures of the night threaten Rta, the Cosmic Order. They must be burned away before their taint spreads through our jungles."
 tkash_objective_decision_confirm: "Balance is Restored"
 tkash_objective_decision_effect: "You will gain the [GetTitleByKey('h_tkash').GetNameNoTier] [title|E] which encompasses all of [GetGeographicalRegion('world_india').GetName]"
 tkash_objective_decision_effect2: "All $POD_splat_vampire_plural$ and [GetTrait('kueijin').GetName(GetNullCharacter)] with land in India will suffer #V 5#! Fire damage"
 pod1230objectives_fera.52.t: "Primeval Jungle"
 pod1230objectives_fera.52.desc: "For millenia now, this land has been a battleground. Between the wars of the Leeches and the Escaped Devils, aggravated by the neglect of the Khans and madness of the $glossary_wyld$'s bastards, despite this land's natural defenses, it has been the epicenter of an unending nightly war ever since the Blood Demon arrived. But, finally, no longer. Your grip on the land known to your people as T'kash is now absolute, as none of them expected your rise. The myriad immortals are now scattered, and in hiding. But they cannot escape your people's wrath. As part of a grand coronation, the light of Helios begins to suffuse the jungles itself, waiting for the right moment. As the assembled Weresuchids proclaim your name and the restoration of this ancient empire, the crown glows as the Elders set it on your brow. Helios' rage will know no bound, as the light from it begins to burn and sunlight, in a brief flash, bathes India. Helios himself has acknowledged your right to rule. The Eternal War is finally over."
 pod1230objectives_fera.52.a: "T'kash is free will be truly Eternal."



 makara_mace_objective_decision: "Songs on the Winds"
 makara_mace_objective_decision_tooltip: "Sing with me."
 makara_mace_objective_decision_desc: "The Makara have always been the most social of the four Streams, their gregarious nature leading to many friendships. Most friendships however are not enough to survive these trying times. Though the legendary mace of the Makara would make for a wonderful friend."
 makara_mace_objective_decision_confirm: "A smashing performance."
 makara_mace_objective_decision_requirement: "Two of your [friends|E] must be at least [kingdom|E] tier"
 makara_mace_objective_decision_requirement2: "You know at least 8 [languages|E]"
 pod1230objectives_fera.53.t: "Mace of the Winds"
 pod1230objectives_fera.53.desc: "As the performance winds down, you collapse, exhausted, but incredibly fulfilled. While many of the other Streams would call such a performance silly, it was cathartic in the fullest to do such a performance. The ceremony, a confirmation of friendship in times of tribulation, was well performed. To most of the performers, they were oblivious as to the true nature of the ritual. But now, as you lay in a large puddle of reptile, there is the guiding light formed and called by song. The Mace of the Winds, a holy relic to the Makara long since lost, has been summoned and delivered to you, knowing that the Makara are worthy of it once more. You smile. It is now time for an encore."
 pod1230objectives_fera.53.a: "The winds will sing with me."


 zhong_guo_objective_decision: "Children of the Wani"
 zhong_guo_objective_decision_tooltip: "We are destined to lead."
 zhong_guo_objective_decision_desc: "The Zhong Lung are the descendents of the Dragon Kings. It falls to us to lead the younger $glossary_fera$ in the Middle Kingdom, our age and wisdom will bring forth an era of endless prosperity."
 zhong_guo_objective_decision_confirm: "We become the High Dragons."
 zhong_guo_objective_decision_requirement: "You must have both a [GetTrait('werewolf').GetName(GetNullCharacter)] and [GetTrait('bastet').GetName(GetNullCharacter)] in your [GetPlayer.Custom('PODCoterie')] that are members of the [GetFaithDoctrine('doctrine_fera_beast_courts').GetBaseName]"
 zhong_guo_objective_decision_requirement2: "Your [GetPlayer.Custom('PODCoterie')] must have at least 30 in all [skills|E]"
 zhong_guo_objective_decision_requirement3: "Your [GetPlayer.Custom('PODCoterie')] must have at least 75 [prowess|E]"
 zhong_guo_objective_decision_effect: "You will gain the [GetTitleByKey('h_zhong_guo').GetNameNoTier] [title|E] which encompasses all of [GetGeographicalRegion('world_asia_china').GetName]"
 zhong_guo_objective_decision_effect2: "All [GetFaithDoctrine('doctrine_fera_beast_courts').GetBaseName] [faiths|E] will gain [GetFaithDoctrine('special_zhong_guo_reward_doctrine').GetBaseName]"
 pod1230objectives_fera.54.t: "Zhong Guo"
 pod1230objectives_fera.54.desc: "To the overwhelming majority of the Streams, the Mokolé have long believed their time as Kings has long since passed, and they have for the most part given up. But not the Zhong Lung. Where the other Streams are decimated, the Zhong Lung have remained strong, and found a new role as philosophers and scholars. They changed, and they adapted. Just as you have now. You are perhaps one of the strongest creatures in the world, a living image of the Dragon Kings of old. The Beast Courts, the Moon, and the Sun have all acknowledged you as the new manifestation of Kings in this turn of the Wheel of Ages. Not by war, but majesty and diplomacy a new Age of Kings has just hatched. The world lies before you, with the Cradle of the Wani as an unassailable heartland. The Second Age of Kings has come."
 pod1230objectives_fera.54.a: "I have become a true Prince of the Wani."


 gaias_memory_objective_decision: "Gaia's Memory"
 gaias_memory_objective_decision_tooltip: "Nothing can be truly forgotten."
 gaias_memory_objective_decision_desc: "The Mokolé are Gaia's memory, it is time we fulfill our duty. Whether it is the history of the $glossary_fera$, the turning of the [Glossary('Wheel of Ages','podgloss.wheelofages')], or the mortal world, we have seen it all. Now we simply need to remember it."
 gaias_memory_objective_decision_confirm: "Remember the beginning."
 gaias_memory_objective_decision_requirement: "Your [GetPlayer.Custom('PODCoterie')] must have at least two other Rank 4 $glossary_fera$"
 gaias_memory_objective_decision_requirement2: "Obtain the #ILLUSTRIOUSPURPLE Echo of Ages#! from the Spirit Quest [journey|E]"
 gaias_memory_objective_decision_requirement3: "A [GetTrait('kueijin').GetName(GetNullCharacter)] must be your [friend|E], [best_friend|E], [lover|E], or [soulmate|E]"
 pod1230objectives_fera.55.t: "Eternal Memory"
 pod1230objectives_fera.55.desc: "Mnesis has always been a contradictory presence to the Mokolé. As Gaia's Memory, all Mokolé can slip into their shared dreams, but for most Mokolé, they have at most fragments and broken bits to pull from. But that is not something you are content with. Through close discussion with the stewards of the world and seeking forgotten lore, you may yet plunge into the depths of memory, and uncover truths long lost. All you need to do now is to dare to do it."
 pod1230objectives_fera.55.a: "May we never forget again."


 undying_body_objective_decision: "Undying Body"
 undying_body_objective_decision_tooltip: "We stand alone."
 undying_body_objective_decision_desc: "Japan is infested with all these supernaturals, it is time for us to be rid of them. We will claim these lands and await the coming apocalypse. They will die, and we will live."
 undying_body_objective_decision_confirm: "A point proven."
 undying_body_objective_decision_requirement_example: "$undying_body_objective_decision_requirement$ #weak ([example.GetName])#!"
 undying_body_objective_decision_requirement: "No other $glossary_fera$ Breed owns land in [GetGeographicalRegion('world_asia_japan').GetName]"
 undying_body_objective_decision_requirement2: "You have at least #V 80%#! [soak_chance|E]"
 undying_body_objective_decision_effect: "Archid form gains: [GetModifier('archid_undying_flesh_modifier').GetNameWithTooltip] "
 pod1230objectives_fera.56.t: "Mastery of the Body"
 pod1230objectives_fera.56.desc: "For most the history of the Hengeyokai, Japan has been an isolated, far flung reclusium at the end of the world. Home mainly to the Hungry Dead and other more despicable things, some of the Emerald Mother's children did call this land home, but they clearly erred in their duty. The dogs that nearly wiped your people out are scattered, the youngsters of the other breeds have fled, and now, only you and your Clutch remain. A testament to your will, and where the Emerald Mother's favor lies. It will be tough, guarding her at the end of the world, but now, you at least have a basis for the claim. One that cannot be denied."
 pod1230objectives_fera.56.a: "The world may break, but I will not."



 zhong_lung_pearls_objective_decision: "Dominion over Water"
 zhong_lung_pearls_objective_decision_tooltip: "We are the Lords of Rivers."
 zhong_lung_pearls_objective_decision_desc: "As the Stream of Water, we Zhong Lung enjoy a terrifying command of the waters of the world. If the lost Pearls of the Dragon Kings could be recovered however, then our power would be absolute."
 zhong_lung_pearls_objective_decision_confirm: "Ebb and Flow."
 zhong_lung_pearls_objective_decision_requirement: "$POD_energy_gnosis$ Regen is at least #V 50%#!"
 pod1230objectives_fera.57.t: "Water Dragon"
 pod1230objectives_fera.57.desc: "Basking in the light of the sun within your Court, the river flows over you as you meditate on the nature of what is to come. The Zhong Lung has long been considered the Stream of Water, but without the Pearls of the Dragon Kings, the title was more formal than practical. Long had the Zhong Lung suffered this humiliation, as there were whispers that, perhaps, the rivers would one day forsake you all. But as you rise from the water, draped in the lost Pearls, the detractors will fall silent, their lies dead on their lips. It is no longer just a formal claim. The Rivers are back in the claws where they belong."
 pod1230objectives_fera.57.a: "The waters are mine to control."


 prehistoric_dreams_objective_decision: "Prehistoric Dreams"
 prehistoric_dreams_objective_decision_tooltip: "The world as it once was."
 prehistoric_dreams_objective_decision_desc: "Our current forms are limited by what we can dream, but we are limited by our current times. Through the sands and waters we can remember a time where dinosaurs walked the world. With these memories, we may shape our forms into something truly terrifying."
 prehistoric_dreams_objective_decision_confirm: "Myth brought to life."
 prehistoric_dreams_objective_decision_requirement: "Discovered all Dinosaurs in the [UmbraGlossary('astral_reaches')]"
 prehistoric_dreams_objective_decision_requirement2: "Has visited every [holy_site|E]"
 prehistoric_dreams_objective_decision_effect: "Archid form gains: [GetModifier('archid_prehistoric_terror_modifier').GetNameWithTooltip] "
 pod1230objectives_fera.58.t: "Prehistoric Dreams"
 pod1230objectives_fera.58.desc: "Sleep. A thing that many Mokolé are familiar with as a spectre, a call to what many Mokolé consider better times, when their bodies could match their spirits. All too often, it is the ghost of these forms that elude your bodies that renders so many of your kind to be melancholic, depressed, and withdrawn. But at the end of your journey, buried beneath the sand amongst the bones of your ancestors, those dreams of bodies long denied to you don't bleed away as you stir. You rise, sand peeling from your brow and crests. A body of dragons, a form of Kings rises from the sand, that dream made manifest. You have walked the sacred paths, remembered what you all were. And now, it will be with you every time you wake up, the world now your living dream."
 pod1230objectives_fera.58.a: "A nightmare for my foes."



 walking_world_objective_decision: "Walking the World"
 walking_world_objective_decision_tooltip: "To understand the past, one must first know the present."
 walking_world_objective_decision_desc: "The world is not as it once was, that much has been clear. As the past fades further into Mnesis, we must look at the wonders before us. They too will become the future's Mnesis."
 walking_world_objective_decision_confirm: "The cycle ever continues."
 walking_world_objective_decision_requirement: "You have visited #V 30#! [points_of_interest|E] #weak (Current: [THIS.Var('poi_visited').GetValue|V0])#!"
 walking_world_objective_decision_requirement2: "You have #V 200%#! [umbra_aptitude|E]"
 pod1230objectives_fera.59.t: "Time Marches on..."
 pod1230objectives_fera.59.desc: "Oftentimes, the Mokolé dream of ages long past, longing for its return. To deny the works of modernity and fixate over the past. And all too often, they fester and rot within that lust, blind to all the world around them. You, however, have not allowed yourself to be lost in that same despair. In time, your generation's memories will be Mnesis. And where others selfishly hide in their own memories, you have chosen to instead make your own. So much of the beauty in the modern world now has been added to the memories of those who will follow in your footsteps. For those that come after you, they will have memories of the wonders, tragedies, and majesties of mankind and the creatures of the night world. You will arm them with modern memories, fresh with all they may need to not just survive, but prosper. A legacy that time cannot erase. One that will endure and outlast the sands of time."
 pod1230objectives_fera.59.a: "And yet there is so much more to see..."

 garou_objective_decision_caern_tooltip: "You need to have one maxed out Caern of any type (Level 5 ducal buildings, Caern of Will, Rage, Leadership, Wisdom or Enigmas)." 


 beast_of_war_objective_decision: "The Beast of War"
 beast_of_war_objective_decision_tooltip: "So much death."
 beast_of_war_objective_decision_desc: "The $glossary_wyrm_calamity$ desires destruction. Through calamity and carnage we will be empowered, all the better to bring glory to the $glossary_wyrm$."
 beast_of_war_objective_decision_confirm: "Calamity comes!"
 beast_of_war_objective_decision_requirement: "All your [powerful_vassals|E] must be [intimidated|E] or [cowed|E] of you"

 eater_of_souls_objective_decision: "The Eater of Souls"
 eater_of_souls_objective_decision_tooltip: "My body and their souls."
 eater_of_souls_objective_decision_desc: "To serve the $glossary_wyrm_consumption$, one must sacrifice much. Only when our own bodies course with the raw power of the $glossary_wyrm$ and the lands drained of life will this head of the Hydra be satisfied."
 eater_of_souls_objective_decision_confirm: "Consume everything!"
 eater_of_souls_objective_decision_requirement: "Have at least #V 4#! [fetishes|E] equipped and active"

 defiler_wyrm_objective_decision: "The Defiler Wyrm"
 defiler_wyrm_objective_decision_tooltip: "All will serve, eventually."
 defiler_wyrm_objective_decision_desc: "The $glossary_wyrm$ grows by corrupting others, which makes the $glossary_wyrm_corruption$ arguably the strongest head. One can only do so much alone, we will require more of its minions in order to defile the world."
 defiler_wyrm_objective_decision_confirm: "Beautiful corruption!"
 defiler_wyrm_objective_decision_requirement: "Discovered all Bane [men_at_arms|E] in [UmbraGlossary('malfeas')]"
 defiler_wyrm_objective_decision_requirement2: "You have two [GetFaithByKey('wyrmbound').GetName] [spirit_companions|E] at max Rank"

 wyrm_hydra_objective_decision: "Devotion to the Hydra"
 wyrm_hydra_objective_decision_tooltip: "The true Triat ascends."
 wyrm_hydra_objective_decision_desc: "Our dynasty has served the $glossary_wyrm$ well. We are poised to usher in a new age under the leadership of our strongest.\Then the world will know true fear."
 wyrm_hydra_objective_decision_confirm: "Now I am complete."
 wyrm_hydra_objective_decision_effect: "You will gain the [GetTitleByKey('h_wyrm').GetNameNoTier] [title|E] which will include any [empires|E] you hold"
 pod1230objectives_fera.61.t: "The Wyrm Ascendant"
 pod1230objectives_fera.61.desc: "The $glossary_wyrm_triatic$'s power is now absolute. The $glossary_triat$ is weakened. Now the world lays ahead, not knowing its doom approaches.\n\nThere will be no shelter from your fury. Their weapons and armor will mean nothing, their faith even less. They will watch as the world comes to an end. Many will resist, their tenacity admirable but pointless, for the world already rides into the jaws of the Apocalypse. There is no hope, no future, all life is doomed!"
 pod1230objectives_fera.61.a: "I am the end of all things!"