 POD_transmogrify.100.t: "Molding the Ravages of Time" 
 POD_transmogrify.100.desc: "Should I make [recipient.GetFirstName] look younger or older?"
 POD_transmogrify.100.option.a: "I'm done changing [recipient.GetFirstNamePossessiveNoTooltip] age."
 POD_transmogrify.100.widget: "Visual Age: [Character.MakeScope.ScriptValue('POD_effective_age')]"
 
 
 POD_transmogrify.500.t: "Knowledge at any Price"
 POD_transmogrify.500.desc: "Which [trait|E] do you want to study?"
 POD_transmogrify.500.a: "I've made my choice."
 POD_transmogrify.500.a.trigger: "You need to select a trait first"
 POD_transmogrify.500.b: "I changed my mind. No experiments today."

 POD_transmogrify.501.t: "[GetPlayer.MakeScope.Var('current_journey').Var('target_trait').Trait.GetName(GetPlayer)] Anatomy"
 POD_transmogrify.501.desc: "It's been a while since I last practiced my craft in the dungeon, but my previous experiences have stayed with me.\n\nAfter some contemplation and study, I now understand how to apply my findings."
 POD_transmogrify.501.a: "Now who wants to be my next test subject?"
 POD_transmogrify.501.a.tt: "You gained an understanding of the [GetPlayer.MakeScope.Var('current_journey').Var('target_trait').Trait.GetName(GetPlayer)] [trait|E], which lets you use it in the [fleshcrafting|E] [character_interaction|E]."