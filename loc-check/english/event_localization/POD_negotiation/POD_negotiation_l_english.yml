l_english:
 POD_negotiation.4000.t: "Fallen Hunter"
 POD_negotiation.4000.desc: "What drove you, in the end? Greed? Fear? A thirst for power? Or perhaps you've convinced yourself that this betrayal of your principles was all in service of some noble, higher purpose?\n\nWhat's done is done. You may be at peace with your decision, but your fellow $POD_splat_hunter_plural$ won't be. Word of your fall from grace will travel fast.\n\nBetter act decisively, before the knives come out."
 POD_negotiation.4000.a: "I must cut ties with my former comrades and lay low."
 POD_negotiation.4000.b: "Luckily, none of my vassals can oppose me."
 POD_negotiation.4000.c: "I will abandon my holdings altogether."
 POD_negotiation.4000.d: "So they want to fight me? Let them try."

 POD_negotiation.4010.t: "The Mortal Who Knew Too Much"
 POD_landed_mortal_warning: "#N;bold You hold land as a powerless $POD_splat_mortal$ with no connection to any existing factions. As such, you cannot build anything in your holdings.#!"
 POD_negotiation.4010.desc: "You feel like a bleeding minnow in a pool of hateful sharks."
 POD_negotiation.4010.desc.diabolist: "The fact that you bound a $POD_splat_demon$ doesn't seem so impressive, now. You have no allies, no income, and no influence. No prospects, too, unless you find someone who can support you. Other than the seething devil on your shoulder, that is."
 POD_negotiation.4010.desc.exghoul: ""
 POD_negotiation.4010.desc.fallenhunter: "Once upon a time, you could count on the support of your fellow $POD_splat_hunter_plural$. That feels like another life, now. You're alone. And you know all too well about the beasts that lurk at night, and what they would do to a liability like you."
 POD_negotiation.4010.desc.mortal: "#italic Somehow#!, you hold some unclaimed real estate in the $pod_wod$. The tenants of this underworld consider you a mistake. They will rectify it shortly. As a lone $POD_splat_mortal$ with no powers and no connections, you have no say in the matter."
 POD_negotiation.4010.desc.end: "This is the most desperate you've ever been. You take a deep breath, and consider your options. "
 POD_negotiation.4010.a: "All I can do is run far, far away."
 POD_negotiation.4010.b: "I'll take my chances."
 POD_negotiation.4010.b.tt: "Unless you find some form of support #italic VERY#! quickly, there's only one way this can end."
 POD_negotiation.4010.c: "The Inquisition will surely accept a new recruit."
 POD_negotiation.4010.d: "I will join the Shih."
 POD_negotiation.4010.e: "I will find others who want to fight the darkness."
 POD_negotiation.4010.f: "Vampires treat their servants well, right?"
 POD_negotiation.4010.f.tt: "No, they do not."
 POD_negotiation.4010.f.tt2: "" # TODO MORTAL: bound ghoul explanation with game_concept
 POD_negotiation.4010.g: "Luckily, I have a prisoner to take vitae from."
 POD_negotiation.4010.g.tt: "" # TODO MORTAL: masterless ghoul explanation with game_concept
 POD_negotiation.4010.h: "My only choice is to sell my soul to a new master."
 POD_negotiation.4010.i: "Mummies are on the side of righteousness."
 POD_negotiation.4010.j: "Perhaps one of the fair folk would enchant me?"

 POD_negotiation.4020.t: "Fin"
 POD_negotiation.4020.desc: "One night you go to sleep, and simply never wake up.\n\nYou have no way of finding out who's responsible for this anticlimactic development. Perhaps an invisible Nosferatu slit your throat while you were unconscious. Perhaps a Nephandus cursed you from a distance, thinking that impromptu acts of cruelty represent the pinnacle of comedy. Perhaps it was someone entirely different. It would make for a fun thought experiment, if you still had the capacity for thought or experiments.\n\nAt least this way, you're unburdened by the regret you'd feel about your decisions right now."
 POD_negotiation.4020.a: "Did I live a good life?"
 POD_negotiation.4020.b: "I've lived pretty much the worst life."
 POD_negotiation.4020.c: "I've left some unfinished business."