l_english:
 ultimate_submission_objective_decision: "Ultimate Submission"
 ultimate_submission_objective_decision_desc: "My life's goal is to be useful to my master, my lover, my light in the dark. That is the reason why I was born, why I meet them, and why I love them.\n\nI can only dream of serving them for all eternity, becoming truly immortal at their side, achieving the exalted state of a $POD_splat_vampire$ under their diligent tutelage."
 ultimate_submission_objective_decision_tooltip: "An eternity of service"
 ultimate_submission_objective_decision_confirm: "Until the end of time"
 ultimate_submission_objective_decision_custom1: "You have to complete at least #V 10#! [bound_ghoul_missions_with_icon|E] for your current [Glossary('Domitor','game_concept_domitor_desc')] #weak ([GetPlayer.MakeScope.ScriptValue('POD_number_of_completed_ghoul_missions')])#!"
 ultimate_submission_objective_decision_custom2: "Your current [Glossary('Domitor','game_concept_domitor_desc')] must have #V 100#! [opinion|E] of you"
 ultimate_submission_objective_decision_effect1: "You will be $pod_Embraced$ by [vampiresire.GetShortUIName]"

 pod1230objectives_ghoul.1.t: "Ultimate Submission"
 pod1230objectives_ghoul.1.desc: "Some say being a ghoul is a fatal addiction, a Faustian bargain to sell your soul in exchange for an eternity as a slave. Maybe they are right.\nTo you however, the concept of freedom seems overrated. You feel protected and loved no matter what your master truly believes and no matter their actions. To go back to the uncertainty and chaos of the days before you meet them would be agony.\n\nAs your guiding star drains everything you were, you are filled by the comfort of finally finding clarify of purpose. Soon you will be like them, and you are happy for it.\n\nTime will tell if this stays true."
 pod1230objectives_ghoul.1.a: "After all this time"
 POD_fulfilled_lifes_goal_modifier: "Fulfilled Life's Goal"
 POD_fulfilled_lifes_goal_modifier_desc: "This character fulfilled their life's goal."

 POD_ghoul_objective_mechanic_rebellion_strength: "#underline;TOOLTIP:POD_ghoul_objective_mechanic_rebellion_strength_desc Rebellion Strength#!"
 POD_ghoul_objective_mechanic_rebellion_strength_desc: "All [Concept('decision', 'Objectives')|E] for [masterless_ghouls|E] after #V $ambitions_of_blood_objective_decision$#! require #bold Rebellion Strength#! to complete.\n\nRebellion Strength is the sum of the total [prowess|E] of [masterless_ghouls|E] under you, meaning every [knight|E], [vassal|E] and their [knights|E].\n\nAdditionally, Rebellion Strength can be increased by completing certain [Concept('decision', 'Objectives')]\n\nYour current Rebellion Strength is [GetPlayer.MakeScope.ScriptValue('POD_ghoul_objective_rebellion_strength')|0V]"

 POD_has_ghoul_rebellion_strength_trigger: "$POD_ghoul_objective_mechanic_rebellion_strength$ must exceed [SCOPE.GetValue('required_rebellion_strength')|0V] #weak ([GetPlayer.MakeScope.ScriptValue('POD_ghoul_objective_rebellion_strength')|0])#!"
 POD_ghoul_increase_rebellion_strength: "$POD_ghoul_objective_mechanic_rebellion_strength$ will increase by [SCOPE.GetValue('increase_value')|0V] "

 ambitions_of_blood_objective_decision: "Ambitions of Blood"
 ambitions_of_blood_objective_decision_desc: "We are slaves to the blood, to $POD_splat_vampire_plural$. This always was the truth, and there is no escaping it. But ghouls can always dream, and many ghouls that share the same dream can achieve the impossible."
 ambitions_of_blood_objective_decision_tooltip: "For I dream of blood"
 ambitions_of_blood_objective_decision_confirm: "A dream? Or a prophecy?"
 ambitions_of_blood_objective_decision_custom1: "You have at least #V 10#! [courtiers|E] or [vassals|E] who are [masterless_ghouls|E] #weak ([SCOPE.GetValue('num_of_ghouls_under')])#!"
 ambitions_of_blood_objective_decision_custom2: "You have at least one Advanced [Glossary('Discipline','game_concept_discipline_desc')] trait"
 ambitions_of_blood_objective_decision_effect1: "Upon becoming a [bound_ghoul|E], you will instantly be killed off. This applies to your whole [dynasty|E]"
 ambitions_of_blood_objective_decision_effect2: "[Concept('ghoul','Ghouls')|E] will accept your invitation to [court|E] and for becoming [scheme|E] agents more easily"
 ambitions_of_blood_objective_decision_effect3: "Unlocks a new mechanic: #V $POD_ghoul_objective_mechanic_rebellion_strength$#!"
 FRIENDLY_GHOUL: "You are the leader of a Ghoul Rebellion: $VALUE|+=0$"

 pod1230objectives_ghoul.2.t: "Ambitions of Blood"
 pod1230objectives_ghoul.2.desc: "You have gathered a small group of [masterless_ghouls|E] like yourself. And you all share the same dream.\nNews about your small entourage has already reached some threatening ears, but most consider it a not so funny joke.\n\nThis complacency is your biggest strength. Sadly, you know that it won't stay a thing forever. Vampires fear change, even more so changes that would lead to them being toppled from their thrones. You have to use the coming times wisely."
 pod1230objectives_ghoul.2.a: "Will our dream come alive?"

 the_vitae_rebellion_objective_decision: "The Vitae Rebellion"
 the_vitae_rebellion_objective_decision_desc: "These past few years you have recruited more and more of your kind either by merging with other groups of similar minded [ghouls|E], or by creating new ones.\n\nBut how you got here isn't important, what is important is that you have enough strength for your plan to succeed. You will carve a piece of land for your people, free of $POD_splat_vampire$ oppression."
 the_vitae_rebellion_objective_decision_tooltip: "It was a prophecy after all"
 the_vitae_rebellion_objective_decision_confirm: "We shall be free!"
 the_vitae_rebellion_objective_decision_custom1: "You have at least #V 2#! Advanced [Glossary('Discipline','game_concept_discipline_desc')] traits"
 the_vitae_rebellion_objective_decision_effect1: "Every [masterless_ghoul|E] in your [domain|E] will convert to [GetFaithByKey('unmastered').GetName]."
 the_vitae_rebellion_objective_decision_effect2: "[imprisoned|E] $POD_splat_vampire_plural$ by [GetFaithByKey('unmastered').GetName] [masterless_ghouls|E] will have a much harder time escaping [prison|E]."
 the_vitae_rebellion_objective_decision_effect3: "Chance for [imprisoned|E] $POD_splat_vampire_plural$ to use [Glossary('Disciplines','game_concept_discipline_desc')] during feeding: #P -75%#!"
 the_vitae_rebellion_objective_decision_effect4: "Remove the cooldown for Kingdom level [holy_wars|E]"
 the_vitae_rebellion_objective_decision_effect5: "Unlock a [character_interaction|E] to try to free a [bound_ghoul|E] from their [Glossary('Domitor','game_concept_domitor_desc')]."

 pod1230objectives_ghoul.3.t: "The Vitae Rebellion"
 pod1230objectives_ghoul.3.desc: "A ghoul never ages, can heal almost any wound, has twice the strength they once did. That sounds great.\n\nIt isn't.\n\nGhouls may not be damned but in many ways their lot is worse. The $pod_vitae$ changes many things when it enters a being. The vampiric curse of frenzy haunts them, driving them to extreme of anger and desire. Other taints take hold, sometimes even madness. Perhaps even worse, most ghouls become shackled by the Blood Bound. These helpless addicts become obsessed with their masters. They are a slave, perhaps first by choice but no longer. Once you tasted the blood, you don't have any choice at all.\n\nAnd so, if $pod_vitae$ is to be our chain, it also has to be our savior. The rebellion won't save us from the addiction but it might take us one step closer to finding ourselves still."
 pod1230objectives_ghoul.3.a: "In vitae, we are reborn."

 contact_the_dispossessed_objective_decision: "Contact the Dispossessed"
 contact_the_dispossessed_objective_decision_desc: "Many $POD_splat_vampire_plural$ travel to the Holy City of Jerusalem. But some don't recognize the hardships they will encounter there, and are forced to flee. Often in such situations, their [ghouls|E] are left to rot. Most die, but some survive by joining groups of similar origins. Collectively they are called The Dispossessed.\n\nBy amassing enough resources and showing that we can protect all [ghouls|E] we could convince them into joining our rebellion."
 contact_the_dispossessed_objective_decision_tooltip: "No longer Dispossessed"
 contact_the_dispossessed_objective_decision_confirm: "Stronger united"
 contact_the_dispossessed_objective_decision_custom1: "You have at least #V 400#! #TOOLTIP:MEN_AT_ARMS_TYPE,dispossessed_maa #L Dispossessed#!#! [men_at_arms|E] #weak ([SCOPE.GetValue('number_of_the_dispossessed')])#!"
 contact_the_dispossessed_objective_decision_effect1: "You will be able to summon [ghouls|E] skilled in [diplomacy|E] by [decision|E]"
 contact_the_dispossessed_objective_decision_effect2: "If you completed #V $the_vitae_rebellion_objective_decision$#! [Concept('decision', 'Objective')|E], the [faith|E] that will be created will gain [GetFaithDoctrine('special_masterless_ghoul_dispossessed_doctrine').GetBaseName]. If you didn't complete the [Concept('decision', 'Objective')|E], it will be postponed for after you complete it."
 THE_DISPOSSESSED_CONNECTIONS: "You have [GetFaithDoctrine('special_masterless_ghoul_dispossessed_doctrine').GetBaseName]: $VALUE|+=0$"

 pod1230objectives_ghoul.4.t: "One with the Dispossessed"
 pod1230objectives_ghoul.4.desc: "After several rounds of negotiations, the [ghouls|E] that once were the Dispossessed officially joined us. We have gained another edge against the tyranny of our "masters".\n\nBut will that be enough for our dream to become reality? In any case, their skills in sheltering and protecting forgotten ghouls will certainly prove very useful in the future."
 pod1230objectives_ghoul.4.a: "We are growing"

 contact_the_folch_cutthroats_objective_decision: "Contact Folch's Cutthroats"
 contact_the_folch_cutthroats_objective_decision_desc: "In France, there exists a mercenary group which consists of our kin. United by their hatred for $POD_splat_vampire_plural$ these bandits would make for another ally in our war against our "masters".\n\nIf we show that we are stronger than them, while also showing we hate vampires as much as they do, convincing them to join would be just a formality."
 contact_the_folch_cutthroats_objective_decision_tooltip: "United in Hatred"
 contact_the_folch_cutthroats_objective_decision_confirm: "Stronger united"
 contact_the_folch_cutthroats_objective_decision_custom1: "You have at least one [county|E] in the [GetGeographicalRegion('ghw_region_southern_france').GetName] [region|E]"
 contact_the_folch_cutthroats_objective_decision_custom2: "You have killed at least #V 50#! $POD_splat_vampire_plural$ #weak ([SCOPE.GetValue('killed_vampires')])#!"
 contact_the_folch_cutthroats_objective_decision_custom3: "You have killed at least one $POD_splat_vampire$ of [GetTrait('vampgeneration4').GetName(GetNullCharacter)] or [GetTrait('vampgeneration5').GetName(GetNullCharacter)]"
 ghw_region_southern_france: "Southern France"
 contact_the_folch_cutthroats_objective_decision_effect1: "You will be able to summon [ghouls|E] skilled in [martial|E] or [prowess|E] by [decision|E]"
 contact_the_folch_cutthroats_objective_decision_effect2: "If you completed #V $the_vitae_rebellion_objective_decision$#! [Concept('decision', 'Objective')|E], the [faith|E] that will be created will gain [GetFaithDoctrine('special_masterless_ghoul_folch_cutthroats_doctrine').GetBaseName]. If you didn't complete the [Concept('decision', 'Objective')|E], it will be postponed for after you complete it."
 FOLCH_CUTTHROATS_TACTICS: "Folch's Cutthroats' Tactics"

 pod1230objectives_ghoul.5.t: "Common Hatred"
 pod1230objectives_ghoul.5.desc: "Folch was once like many of us, a slave to an uncaring master. Contrary to many of us however, the death of his domitor didn't leave him without a life meaning but instead filled him with hatred.\nAlready a competent mercenary knowing much about France's vampires, he soon made a reputation for himself and proved too useful to be simply wiped out.\n\nAnger will only get you so far however and our help in harnessing it to productive endeavors might prove critical for our rebellion's future."
 pod1230objectives_ghoul.5.a: "Hate with a purpose"

 contact_the_order_of_st_panteleimon_objective_decision: "Contact the Order of St. Panteleimon"
 contact_the_order_of_st_panteleimon_objective_decision_desc: "There exists a certain Order of heretics in Venice, one made of [masterless_ghouls|E]. Even though they do not share our hatred for vampires, they still could be excellent comrades. After-all, not everyone should be blinded by rage, some of us should learn instead of fight.\n\nBut convincing them will be troublesome, they do not share our anger, but they might be in need of allies with the ongoing collapse of the Church of Caine."
 contact_the_order_of_st_panteleimon_objective_decision_tooltip: "Heretical bargain"
 contact_the_order_of_st_panteleimon_objective_decision_confirm: "Stronger United"
 contact_the_order_of_st_panteleimon_objective_decision_custom1: "You have equipped a #FAMEDBLUE Famed#! Journal"
 contact_the_order_of_st_panteleimon_objective_decision_custom2: "You have equipped a #ILLUSTRIOUSPURPLE Illustrious#! Journal"
 contact_the_order_of_st_panteleimon_objective_decision_effect1: "You will be able to summon [ghouls|E] skilled in [learning|E] by [decision|E]"
 contact_the_order_of_st_panteleimon_objective_decision_effect2: "If you completed #V $the_vitae_rebellion_objective_decision$#! [Concept('decision', 'Objective')|E], the [faith|E] that will be created will gain [GetFaithDoctrine('special_masterless_ghoul_order_of_st_panteleimon_doctrine').GetBaseName]. If you didn't complete the [Concept('decision', 'Objective')|E], it will be postponed for after you complete it."

 pod1230objectives_ghoul.6.t: "Knowledge of Rebellion"
 pod1230objectives_ghoul.6.desc: "The Order of St. Panteleimon was once mainly the scribes and bureaucratic arm of the Church of Caine. Composed almost entirely of ghouls, they lived an uneventful life under the protection of the Archbishop of Caine, Narses of Venice. His death and the slow collapse of the Church upended this state of affairs.\n\nThe headmaster of the Order was bound to Narses himself and he, alongside many other members, suddenly found themselves without a reliable supply of blood. Desperate times asked for desperate measures and some members asked for your help in removing the still loyal to the Church headmaster. Which you did without much trouble.\n\nThe Order of St. Panteleimon is still far from a military asset but their knowledge of Cainite history and religion will certainly prove useful to your rebellion."
 pod1230objectives_ghoul.6.a: "Knowing our enemy"

 contact_the_haqims_assassins_objective_decision: "Contact the False Haqim's Assassins"
 contact_the_haqims_assassins_objective_decision_desc: "The oldest group of [masterless_ghouls|E] we know of are located in Aluh Amut. 'Founded' by the #weak False#! Haqim, they share our hatred for vampires and hunt them wherever they go. That makes them ideal partners, both in might and strategy.\n\nIf we were to present a gift of some Assamites' heads, maybe we could solidify our ties with them?"
 contact_the_haqims_assassins_objective_decision_tooltip: "Assassins of Aluh Amut"
 contact_the_haqims_assassins_objective_decision_confirm: "A strange bedfellow."
 contact_the_haqims_assassins_objective_decision_custom1: "You have at least one [county|E] in the [GetGeographicalRegion('world_middle_east_persia').GetName] [region|E]"
 contact_the_haqims_assassins_objective_decision_custom2: "You have killed at least #V 25#! [GetTrait('assamite').GetName( GetPlayer )] #weak ([SCOPE.GetValue('killed_banuhaqim')])#!"
 contact_the_haqims_assassins_objective_decision_effect1: "You will be able to summon [ghouls|E] skilled in [intrigue|E] by [decision|E]"
 contact_the_haqims_assassins_objective_decision_effect2: "If you completed #V $the_vitae_rebellion_objective_decision$#! [Concept('decision', 'Objective')|E], the [faith|E] that will be created will gain [GetFaithDoctrine('special_masterless_ghoul_haqims_assassins_doctrine').GetBaseName]. If you didn't complete the [Concept('decision', 'Objective')|E], it will be postponed for after you complete it."

 pod1230objectives_ghoul.7.t: "Assassins of Blood"
 pod1230objectives_ghoul.7.desc: "The "False" Haqim's story is a puzzling one. A skilled ghoul of an Assamite assassin that died during the Baali Wars, "Haqim" clearly has a fractured psyche, sometimes thinking he is the master of the entire vampiric clan that bears "his" name.\nWhile his sanity is in question, his skills aren't. Masterfully infiltrating the Hashshāshīn, he has managed to be a thorn on the side of the Assamites for centuries now, even earning a large amount of respect from their warriors who now sometimes mirror his tactics.\n\nWhile the man was difficult to find and even more difficult to convince, he has agreed to offer the services of his "clan" for your rebellion. You have no doubts that, under a more stable leadership, they will become a critical asset for your cause."
 pod1230objectives_ghoul.7.a: "Our very own assassins"