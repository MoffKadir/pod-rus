l_english:
 POD_breaking_the_blond_bond.1.t: "Lessen the Blood Bond"
 POD_breaking_the_blond_bond.1.desc: "You have done it, what was once immense love and affection has been reduced to a slight liking. With this, you can hurt the one that you once thought as your undying master. It will be no simple task however as such an addiction isn't overcome in a day but you bravely took the first step at least.\n\n#weak You just have to ignore the gnawing emptiness in your heart...#!"
 POD_breaking_the_blond_bond.1.a: "I feel lost..."
 POD_breaking_the_blond_bond.1.a.tooltip: "For the next #V 10#! years you will be able to use a [character_interaction|E] to escape your master at the cost of a [modifier|E], or directly kill your [Glossary('Domitor','game_concept_domitor_desc')]. #X If you complete any [bound_ghoul_mission_with_icon|E], this whole Journey will instantly be negated.#!"

 POD_breaking_the_blond_bond.2.t: "The Blood Bond Has Returned"