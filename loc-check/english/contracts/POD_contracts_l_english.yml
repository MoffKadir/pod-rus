l_english:
 #####################################
 ####### Contracts for Slayers #######
 #####################################

 POD_assault_lair_contract: "Assault an Exposed Lair"
 POD_assault_lair_desc_title: "An opportunity presents itself..."
 POD_assault_lair_desc: "We learned the location of a lone fiend lurking in this domain. If we strike fast, we can yet get the drop on them."
 POD_assault_lair_request: "This [task_contract|E] requires you to travel to [TaskContract.GetLocation.GetName]. You can then use the skills of your [GetPlayer.Custom('PODCoterie')] to deal with your quarry.\n\n$POD_contract_show_time_remaining$"
 POD_assault_lair_contract_success_tt: "You will gain [prestige_i][prestige|E], [piety_i][piety|E], [dynasty_prestige_i][dynasty_prestige|E], and [Glossary('True Faith','game_concept_true_faith_desc')] [lifestyle_experience|E]. The rewards are based on the [task_contract_tier|E] and whether you succeeded at the hunt cleanly."

 task_contract_reward_effect_failure_abandoned_hunt_desc: "#N You abandon the hunt:#!"
 task_contract_reward_effect_failure_failed_hunt_desc: "#N The fiend gets the better of you:#!"


 ####################################
 ####### Bound Ghoul Missions #######
 ####################################

 POD_ghoul_mission_kill_hunter_contract: "Kill Hunter"
 POD_ghoul_mission_kill_hunter_desc_title: "To my decisive servant,"
 POD_ghoul_mission_kill_hunter_desc: "A Hunter who calls [TaskContract.MakeScope.Var('target').Char.GetHerselfHimself] [TaskContract.MakeScope.Var('target').Char.GetFirstName] is snooping around in our turf. Deal with [TaskContract.MakeScope.Var('target').Char.GetHerHim] before [TaskContract.MakeScope.Var('target').Char.GetSheHe] becomes more than just a nuisance."
 POD_ghoul_mission_kill_hunter_request: "This [bound_ghoul_mission_with_icon|E] requires you to kill [TaskContract.MakeScope.Var('target').Char.GetFirstName] by any means necessary.\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_cover_up_the_masquerade_contract: "Cover up the Masquerade"
 POD_ghoul_mission_cover_up_the_masquerade_desc_title: "To my discreet servant,"
 POD_ghoul_mission_cover_up_the_masquerade_desc: "If our society is to thrive, we must stay in the shadows. Prove your resourcefulness by ensuring the kine never learn of our existence."
 POD_ghoul_mission_cover_up_the_masquerade_request: "This [bound_ghoul_mission_with_icon|E] requires you to cover up [TaskContract.GetEmployer.GetShortUINamePossessive] [masquerade_exposure_with_icon|E] via a [character_interaction|E] targeting [TaskContract.GetEmployer.GetHerHim].\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_bribe_officials_contract: "Bribe Officials"
 POD_ghoul_mission_bribe_officials_desc_title: "To my resourceful servant,"
 POD_ghoul_mission_bribe_officials_desc: "I've got these pesky magistrates breathing down my neck and threatening to audit my businesses. Make them look the other way for me."
 POD_ghoul_mission_bribe_officials_request: "This [bound_ghoul_mission_with_icon|E] requires you to pay [gold_i][GetPlayer.MakeScope.ScriptValue('minor_gold_max_value')|0V] via a [character_interaction|E] on [TaskContract.GetEmployer.GetShortUIName].\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_indoctrinate_plant_contract: "Indoctrinate Plant"
 POD_ghoul_mission_indoctrinate_plant_desc_title: "To my persuasive servant,"
 POD_ghoul_mission_indoctrinate_plant_desc: "Information is an invaluable resource, wouldn't you agree? Find me someone reliable who can serve our cause as a spy."
 POD_ghoul_mission_indoctrinate_plant_request: "This [bound_ghoul_mission_with_icon|E] requires you to indoctrinate any [GetTrait('mortal').GetName(GetNullCharacter)] via a [character_interaction|E].\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_abduct_desirable_mortal_contract: "Abduct Desirable Mortal"
 POD_ghoul_mission_abduct_desirable_mortal_desc_title: "To my wily servant,"
 POD_ghoul_mission_abduct_desirable_mortal_desc: "A promising mortal by the name of [TaskContract.MakeScope.Var('target').Char.GetFirstName] has caught my attention lately. Bring [TaskContract.MakeScope.Var('target').Char.GetHerHim] to me discreetly. And don't ask further questions."
 POD_ghoul_mission_abduct_desirable_mortal_request: "This [bound_ghoul_mission_with_icon|E] requires you bring [TaskContract.MakeScope.Var('target').Char.GetFirstName] into your court by any means possible, and send [TaskContract.MakeScope.Var('target').Char.GetHerHim] to [TaskContract.GetEmployer.GetShortUIName] via a [character_interaction|E].\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_steal_rivals_gold_contract: "Steal Rival's Gold"
 POD_ghoul_mission_steal_rivals_gold_desc_title: "To my artful servant,"
 POD_ghoul_mission_steal_rivals_gold_desc: "Our enemies are many. Let us take the initiative and seize their riches to make sure they can't be used against us."
 POD_ghoul_mission_steal_rivals_gold_request: "This [bound_ghoul_mission_with_icon|E] requires you to #V $POD_gold_heist_interaction$#! via an [infiltration_mission|E] on any of [TaskContract.GetEmployer.GetShortUINamePossessive] [rivals|E].\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_damage_rivals_image_contract: "Damage Rival's Image"
 POD_ghoul_mission_damage_rivals_image_desc_title: "To my crafty servant,"
 POD_ghoul_mission_damage_rivals_image_desc: "Our enemies are many. We must teach them a lesson. Strike preemptively and undermine their dignity, so they will lose the respect of their peers."
 POD_ghoul_mission_damage_rivals_image_request: "This [bound_ghoul_mission_with_icon|E] requires you to sabotage the [prestige|E] of any of [TaskContract.GetEmployer.GetShortUINamePossessive] [rivals|E] via a [character_interaction|E].\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_slander_rival_contract: "Slander Rival"
 POD_ghoul_mission_slander_rival_desc_title: "To my sly servant,"
 POD_ghoul_mission_slander_rival_desc: "Our enemies are many. Spread rumors of their debased activities, and we will bring them down without lifting a finger."
 POD_ghoul_mission_slander_rival_request: "This [bound_ghoul_mission_with_icon|E] requires you to sabotage the [piety|E] of any of [TaskContract.GetEmployer.GetShortUINamePossessive] [rivals|E] via a [character_interaction|E].\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_give_relative_away_contract: "Give Relative Away"
 POD_ghoul_mission_give_relative_away_desc_title: "To my precious servant,"
 POD_ghoul_mission_give_relative_away_desc: "The time has come for you to prove your absolute loyalty to me."
 POD_ghoul_mission_give_relative_away_request: "This [bound_ghoul_mission_with_icon|E] requires you to send away one of your close relatives via a [character_interaction|E]. You may never see them again.\n\n$POD_contract_show_time_remaining$"

 POD_ghoul_mission_expand_domain_contract: "Expand Domain"
 POD_ghoul_mission_expand_domain_desc_title: "To my uncompromising servant,"
 POD_ghoul_mission_expand_domain_desc: "I'm putting my trust in your skills on the battlefield. Go forth and wage conquest in my name."
 POD_ghoul_mission_expand_domain_request: "This [bound_ghoul_mission_with_icon|E] requires you to conquer territory via the #V Install New Ruler#! [casus_belli|E] and give it to [TaskContract.GetEmployer.GetShortUIName]. Alternatively, you can give away one of your held [counties|E] via the #V $grant_titles_interaction$#! [character_interaction|E].\n\n$POD_contract_show_time_remaining$"


 ##################################
 ####### Scripted Contracts #######
 ##################################

 POD_natural_disaster_contract: "Natural Disaster"
 POD_natural_disaster_desc_title: "[TaskContract.MakeScope.Var('disaster_loc').GetFlagName]"
 POD_natural_disaster_desc: "A great [TaskContract.MakeScope.Var('disaster_type').GetFlagName|l] is going to strike [TaskContract.MakeScope.Var('target_title').Title.GetNameNoTierNoTooltip]. It's not yet too late to prevent it... or perhaps, make it worse?"
 POD_natural_disaster_request: "This [task_contract|E] requires you to travel to [TaskContract.GetLocation.GetName]. You can then decide what to do about the impending disaster, based on the abilities of your [GetPlayer.Custom('PODCoterie')].\n\n$POD_contract_show_time_remaining$"

 task_contract_reward_effect_success_prevented_disaster_desc: "#P You prevent the disaster:#!"
 task_contract_reward_effect_success_turned_disaster_into_prosperity_desc: "#P You prevent the disaster #bold and#! improve the climate:#!"
 task_contract_reward_effect_success_provided_relief_desc: "#P You provide disaster relief to the mortals:#!"
 task_contract_reward_effect_success_provided_great_relief_desc: "#P You provide #bold great#! disaster relief to the mortals:#!"
 task_contract_reward_effect_success_made_disaster_worse_desc: "#P You make the disaster#! #N;bold worse:#!"
 task_contract_reward_effect_failure_do_nothing_desc: "#N You do nothing:#!"

 # Event options
 POD_accept_contract: "I'll travel there right away."
 POD_accept_contract_tt: "You will open the [travel|E] planner and make your way to [task_contract.GetLocation.GetName]"
 POD_postpone_contract: "I'll think about it."
 POD_abandon_contract: "I'm not interested in this contract."
 POD_abandon_contract_tt: "This contract will be abandoned"

 # Variable display
 POD_contract_show_time_remaining: "This contract will expire in #bold [GetGameTimeDifferenceForDiffDays(GetVarTimeRemaining(TaskContract.MakeScope,'time_remaining'))]#! #italic ([GetCurrentDateWithDiff(GetVarTimeRemaining(TaskContract.MakeScope,'time_remaining'))])#!"