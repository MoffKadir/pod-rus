l_english:
 POD_improve_ritual_of_sundered_soul_decision: "Improve the Ritual of the Sundered Soul"
 POD_improve_ritual_of_sundered_soul_decision_tooltip: "I won't be contained forever!"
 POD_improve_ritual_of_sundered_soul_decision_desc: "This complex and new ritual is the only way for you to truly manifest your power on Earth. You need to discover its secrets and improve it."
 POD_improve_ritual_of_sundered_soul_decision_confirm: "Soon, they will see my true power."

 POD_demon_gather_the_faithful_objective_decision: "Let The Faithful Gather"
 POD_demon_gather_the_faithful_objective_decision_tooltip: "Your power is linked to mortals' faith. Time to gather your flock."
 POD_demon_gather_the_faithful_objective_decision_desc: "As the War in Heaven raged on, and the angels learned of the vast and untapped potential for evil in Creation, attraction turned into desire, and the ability to control those desires weakened. Once, they were fueled by the faith of the mortals in their divine nature but their rebirth into sin muddled these waters. They are now more demons than angels, tapping into corruption as a hollow mockery of the being they once were."
 POD_demon_gather_the_faithful_objective_decision_confirm: "Sinful Symphony"
 POD_demon_gather_the_faithful_decision_more_xp: "The [arcana_lifestyle|E] experience from your cultists will be #P;bold doubled#!"
 POD_demon_gather_the_faithful_decision_next_objective: "Unlock $POD_demon_breakdown_the_abyss_objective_decision$ [decision|E]"
 POD_demon_gather_the_faithful_decision_unlock_sin_trait_vassalization: "Allows you to vassalize rulers with the sin [trait|E] corresponding to your faith."

 POD_demon_breakdown_the_abyss_objective_decision: "Abyssal Prison Break"
 POD_demon_breakdown_the_abyss_objective_decision_tooltip: "You will crack open the most important prison in existence."
 POD_demon_breakdown_the_abyss_objective_decision_desc: "The [UmbraGlossary('abyss')], also known as Hell or the Pit, is the murky dimension of darkness created by God as an eternal prison for the Fallen. You are one of the few who escaped but what could happen if all of your imprisoned brethren were to do the same? Many are twisted beyond belief but do anyone truly deserve to rot in this literal Hell?\nYou rebelled against God's orders once, you can do it twice."
 POD_demon_breakdown_the_abyss_objective_decision_confirm: "Freedom at last!"
 POD_demon_breakdown_the_abyss_objective_decision_custom1: "Must have at least 45 [perks|E] in the [arcana_lifestyle|E] [lifestyle|E]."
 POD_demon_breakdown_the_abyss_objective_decision_free_lores: "Demons get access to every [lore_lifestyle|E]."
 POD_demon_breakdown_the_abyss_objective_decision_no_more_abyss: "Demons will be freed from the [UmbraGlossary('abyss')], meaning all demons can travel the [umbra|E] once more."
 POD_demon_breakdown_the_abyss_objective_decision_allow_create_demon: "You can make vessels for other $POD_splat_demon_plural$, and recruit them as guests in your court."
 
 POD_demon_final_war_objective_decision: "Final War"
 POD_demon_final_war_objective_decision_tooltip: "You will start a second War of Wrath."
 POD_demon_final_war_objective_decision_desc: "God has turned his back on Creation, abandoning you to this wretched world. It is time to spit on the face of the Great Betrayer by reducing this abomination to ashes once and for all."
 POD_demon_final_war_objective_decision_confirm: "The End"
 POD_demon_final_war_objective_decision_custom1: "You must have all [perks|E] in the [arcana_lifestyle|E] [lifestyle|E]."
 POD_demon_final_war_objective_decision_end: "#X The war to end all wars will start. There is no going back. Will you proceed to doom Creation?#!"

 POD_demon_redemption_objective_decision: "Divine Forgiveness"
 POD_demon_redemption_objective_decision_tooltip: "Maybe, somewhere in the distance, hope still lingers."
 POD_demon_redemption_objective_decision_desc: "Memories of your past as an angel reminded you of everything you lost during the rebellion. If God truly is forgiving, maybe there is still a place for you in His Silver City?"
 POD_demon_redemption_objective_decision_confirm: "Finally, the Light"
 POD_demon_redemption_objective_decision_custom: "This will end your journey in, hopefully, redemption."
 POD_demon_redemption_objective_decision_tt1: "Free your cultists. #weak (Number of cultists is #V 0#!)#!"
 POD_demon_redemption_objective_decision_tt2: "Perjure your sinful faith. #weak (You have #V 0#! piety or less)#!"
 
 POD_new_genesis_objective_decision: "A New Genesis"
 POD_new_genesis_objective_decision_desc: "God created mankind with a spark of His divinity in them. If you were to convert enough mortals to your worship instead of His, what would be the difference between you and Him? And then, it might be time to remake this world in your image?"
 POD_new_genesis_objective_decision_tooltip: "They will pray, live and die in your name."
 POD_new_genesis_objective_decision_confirm: "Let's begin..."

 demonic_knowledge_objective_decsion: "Demonic Tree of Knowledge"
 demonic_knowledge_objective_decsion_desc: "Your time in the Abyssal Prison made you keenly aware of the limitations of your knowledge. God's plan, it seems, was much more complex than you ever anticipated. You have since been tormented by an hunger to know more. It is time to sate this craving."
 demonic_knowledge_objective_decsion_tooltip: "Can I truly understand the Divine?"
 demonic_knowledge_objective_decsion_confirm: "The forbidden fruit, eaten."
 demonic_knowledge_objective_decsion_custom1: "You must have all [perks|E] in the [lore_lifestyle|E] [lifestyle|E]."
 
 restore_babylon_objective_decision: "Restore Babylon"
 restore_babylon_objective_decision_tooltip: "Hanging your gardens."
 restore_babylon_objective_decision_desc: "It was an age of savage empires and holy wars, of heroes blessed (or cursed) by the living gods and unspeakable rituals performed before idols of gold, basalt and jade. When the Earthbound clashed, armies of the faithful marched. The earth trembled and the skies rained blood, and whole cities were put to the sword.\nIt was Babylon and it was Hell on Earth."
 restore_babylon_objective_decision_confirm: "Glorious times"
 restore_babylon_objective_decision_effect_tooltip: "[GetTrait('demon').GetName( GetPlayer )] and [GetTrait('witch').GetName( GetPlayer )] rulers will always accept your offer of vassalization."
 
 sin_dragon_objective_decision: "Primordial Sin Dragon"
 sin_dragon_objective_decision_tooltip: "Capture the Sin."
 sin_dragon_objective_decision_desc: "Summoned by the fading hope of once pious mortals, seven great dragons are waiting for a worthy embodiment of their sin to claim them. Will you be that unholy paragon?"
 sin_dragon_objective_decision_confirm: "Primordials, reawakened"
 sin_dragon_objective_decision_effect_tooltip: "Unlock a Sin Dragon [men_at_arms|E] corresponding to your [faith|E]."
 unlock_sin_conversion_decision: "Unlock $sin_conversion_decision$ [decision|E]"
 sin_dragon_trainer_modifier: "Sin Dragon Trainer"
 
 landless_demon_objective_decision: "Secrets of the Fallen"
 landless_demon_objective_decision_tooltip: "Remnants of the world before this one."
 landless_demon_objective_decision_desc: "So many wonders were lost during the Heavenly Rebellion. While you have only a fleeting memory of those, maybe the denizens of this age carry fragmented remnants of knowledge that you could use."
 landless_demon_objective_decision_confirm: "Lost but not forgotten..."
 landless_demon_objective_decision_valid_tt: "Each time you recognize a new [cultist|E] while landless, you have a chance of gaining new knowledge about the lost lore of the Angels. Higher [learning|E] increases said chance.\n\nYour current knowledge is [GetPlayer.MakeScope.ScriptValue('POD_landless_demon_clues')|V0]."
 landless_demon_objective_decision_effect_tt: "At [EmptyScope.ScriptValue('POD_landless_demon_clues_for_1st_unlock')|V0] knowledge, you unlock the [GetCourtPositionType('fell_knight_court_position').GetName()] [court_position|E].\n\nAt [EmptyScope.ScriptValue('POD_landless_demon_clues_for_2nd_unlock')|V0] knowledge, you gain the ability to summon $POD_splat_demon_plural$, and all summoned Demons are more powerful.\n\nAt [EmptyScope.ScriptValue('POD_landless_demon_clues_for_3rd_unlock')|V0] knowledge, you gain the Soultaker, a very powerful sword."
 
 podintroductions.2406.t: "Landless Demons"
 podintroductions.2406.desc: "Demons that don't control land directly rely more on their [cultists|E] than their sedentary counterparts, acting as apocalyptic sects often masquerading as more benign religious communities. Moving around offers them a major benefit however: knowledge.\nThe fallen angels have lost most of their memories and the wonders they made or witnessed at the birth of Creation. Still, some glimpses remain and by gathering cultists from many different walks of life, they can hopefully track down and use these bygone artifacts and techniques to their advantage.\n\n#R As a landless Demon, you might gather some knowledge each time you recognize a new [cultist|E] depending on your [learning|E]. Said knowledge will unlock various rewards. The [GetDecision('landless_demon_objective_decision').GetName] [decision|E] allows you to track down the knowledge you have so far and the associated rewards.#!" 
 landless_demon_might_gain_clues_tt: "You might gain knowledge (see [GetDecision('landless_demon_objective_decision').GetName] [decision|E]) depending on your [learning|E]."
 landless_demon_gain_clues_tt: "You gained [SCOPE.GetValue('landless_demon_clues_gained')|V0] Knowledge"
 
 POD_demon_flavor.6.desc: "Raised by sheer skill and heroism on the fields of battle during the War in Heaven, Fell Knights served as lieges and vassals to the higher ranking members within their Legion. Fell Knights usually commanded small warbands of Demons, served as Champions for higher-ranking Demons or guarded Bastions and other sites of Fallen activity.\n\nThis practice has been lost since the defeat of the rebels, as well as the rites behind elevating someone to that position, but you have managed to recover enough of the fragmented memories of this practice inherited by humanity to be able to reinstate it.\n\n #R The Fell Knight court position has been unlocked.#!"
 
 POD_demon_flavor.7.t: "Building the Crucianomicon"
 POD_demon_flavor.7.desc: "The only way to reliably breach the Abyssal Prison is by knowing the True Name of one of its inhabitants, then using it for a summoning ritual. This is how your kind has been able to come back to Earth since the dawn of infernalism.\nStill, this is a slow and difficult process. By building a repository of all the fragmented knowledge gathered by humanity about the infernal, you could streamline the process and bring more of your (hopefully) grateful brethren back.\n\n#R The Summon Demon interaction is unlocked (if not already available). The demons summoned by said interaction will start stronger.#!"

 POD_demon_flavor.8.desc: "It was always at the back of your mind. It had to be somewhere after all. Such an unholy weapon couldn't just disappear, it just has to be found. And you found it.\n\nThe most infamous relic of the Fallen Angels, this massive broadsword is made of a dull, black metal, siyr which is the first metal mastered by Angels and Humanity alike after the Fall.\nForged at the bloody height of the war, Soultaker is an obscene and terrible weapon. The willing soul of a demon — his name long since forgotten — was bound into the black metal, where he could use this power upon anyone touched by the blade. The sword’s touch drained the energy and life from anyone it wounded — and if it killed a victim, his soul would be pulled from his corpse and imprisoned within the blade, there to be tortured and devoured by the original demon. Mortals and angels alike fell before Soultaker, their Faith torn apart for his sustenance.\nThen the sword’s bearer used it to slay another demon, and the sword changed. The two demonic souls fought for dominance within the blade, neither able to gain an advantage. Over time, their souls began to bleed into each other, creating a single fractured personality. As demonic infighting grew more serious in the war, more demons fell to Soultaker, and their souls became absorbed into a single insane entity — a being that called itself Legion. Soultaker was lost during the final days of the war, hidden deep in a forgotten weapons cache, and without new victims to devour for Faith, Legion grew weak and thin. Now it can think of nothing but food — Faith — and it will do anything to devour fresh souls once more."
 
 