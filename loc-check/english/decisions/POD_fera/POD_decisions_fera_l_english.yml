 fera_advance_rank_decision: "Advance your Rank"
 fera_advance_rank_decision_desc: "Renown and Rank are a measure of a shapeshifter's place in their society. The more Renown they have, the more weight their words carry. The different $glossary_fera$ each use a different set of three renown types.\n\nYou gain Renown from:\n"
 fera_advance_rank_decision_tooltip: "Progressing the Fera ranks takes time and commitment."
 fera_advance_rank_decision_confirm: "My fame grows!"

 fera_advance_rank_renown_glory: "#clickable $POD_fera_renown_glory$:#!\n#medium $BULLET_WITH_TAB$Winning wars against Wyrm aligned rulers if you are a Gaian faith.\n$BULLET_WITH_TAB$Winning wars against Gaia aligned rulers if you are a Wyrm faith.\n$BULLET_WITH_TAB$Killing Wyrm aligned characters if you are a Gaian faith.\n$BULLET_WITH_TAB$Killing Gaia aligned characters if you are a Wyrm faith.#!\n$BULLET_WITH_TAB$Completing [mercenary_task_contracts|E] as an [adventurer|E].\n"

 fera_advance_rank_renown_honor: "#clickable $POD_fera_renown_honor$:#!\n#medium $BULLET_WITH_TAB$Abandoning a [grudge|E], ending a [rivalry|E], or losing a [nemesis|E].\n$BULLET_WITH_TAB$Granting [duchies|E] or higher titles to another $glossary_fera$.\n$BULLET_WITH_TAB$Upgrading a Caern to its maximum level.\n$BULLET_WITH_TAB$Increasing your [piety_level|E].#!\n"

 fera_advance_rank_renown_wisdom: "#clickable $POD_fera_renown_wisdom$:#!\n#medium $BULLET_WITH_TAB$Finishing Umbra Expeditions.\n$BULLET_WITH_TAB$Obtaining the last [perk|E] of a $glossary_fera$ lifestyle tree.\n$BULLET_WITH_TAB$Finishing a Spirit Quest [journey|E].#!\n"

 fera_advance_rank_renown_power: "#clickable $POD_fera_renown_power$:#!\n#medium $BULLET_WITH_TAB$Winning wars.\n$BULLET_WITH_TAB$Winning duels.\n$BULLET_WITH_TAB$Increasing your [prestige_level|E].#!\n$BULLET_WITH_TAB$Obtaining Physical [urgetaints_lifestyle|E].\n"

 fera_advance_rank_renown_cunning: "#clickable $POD_fera_renown_cunning$:#!\n#medium $BULLET_WITH_TAB$Succeeding in an [infiltration|E].\n$BULLET_WITH_TAB$[blackmailing|E] another character.\n$BULLET_WITH_TAB$Succeeding in [GetScheme('abduct').GetTypeName] [schemes|E].#!\n"

 fera_advance_rank_renown_ferocity: "#clickable $POD_fera_renown_ferocity$:#!\n#medium $BULLET_WITH_TAB$Returning to your land with at least #P 50#! [raid|E] [loot|E].\n$BULLET_WITH_TAB$Gaining [trait_level_track_xp|E] in any [GetTrait('lifestyle_hunter').GetName(GetNullCharacter)] [trait_level_track|E].\n$BULLET_WITH_TAB$Training with your [GetPlayer.Custom('PODCoterie')].#!\n"

 fera_advance_rank_renown_infamy: "#clickable $POD_fera_renown_infamy$:#!\n#medium $BULLET_WITH_TAB$Succeeding in [GetScheme('fabricate_hook').GetTypeName] [schemes|E].\n$BULLET_WITH_TAB$Executing your own vassals of Duchy [title_rank|E] or higher without an [execute_reason|E].\n$BULLET_WITH_TAB$Usurping titles of Kingdom [rank|E] or higher.\n$BULLET_WITH_TAB$Breaking truces.#!\n$BULLET_WITH_TAB$Obtaining Mental [urgetaints_lifestyle|E].\n"


 fera_advance_rank_renown_bonuses: "\n#clickable Your [GetPlayer.Custom('PODFeraAuspiceType')] gives a bonus to [GetPlayer.Custom('PODFeraAuspiceRenownBoost')].#!"

