 ####Court Positions####
 hibernation_attendant_court_position: "Hibernation Attendant"
 hibernation_attendant_court_position_desc: "While in Mnesis, a Mokolé is vulnerable both in his dreams and in reality. The Hibernation Attendant defends his master and sees that nothing disturbs his dreams."
 wallow_warden_court_position: "Wallow Warden"
 wallow_warden_court_position_desc: "A Wallow is the heart of a Mokolé Clutch. It is a sanctuary, a school, and most importantly a home. Overseeing its construction and protection is a great honor, but an even greater responsibility."
 sun_herald_court_position: "Sun Herald"
 sun_herald_court_position_desc: "All Mokolé are able to commune with Father Sun, but it is the Herald that dedicates their time trying to truly understand Sun's wisdom."
 crested_purifier_court_position: "Crested Purifier"
 crested_purifier_court_position_desc: "Whether it be the undead, demons, or even other Changing Breeds, the Crested Purifier leads their fellow Mokolé against their foes."
 solar_salvager_court_position: "Solar Salvager"
 solar_salvager_court_position_desc: "The Mokolé are masters of their craft, their need for forging materials in unending. The Salvager is responsible for identifying and looting discarded equipment that can be reforged in the Mokolé Sun Forges."