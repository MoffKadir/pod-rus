 ####Dream the Beast####
 artifact_archator_name: "Archator"
 artifact_archator_description: "A large fusion of a dinosaur and the Mokolé Archid form. This great beast ferociously carries its Saurian companion into battle, where it can easily feed on those that stand in their way."
 artifact_dipelta_name: "Dipelta"
 artifact_dipelta_description: "Take the strongest and largest greatshield you can find, add legs to it, and you will have a Dipelta. This dinosaur will shrug off most attacks as it charges forward."
 artifact_avithon_name: "Avithon"
 artifact_avithon_description: "This flying feathered dinosaur will carry its rider across the skies, where they can easily avoid most dangers."
 artifact_dicravenator_name: "Dicravenator"
 artifact_dicravenator_description: "Not even the swiftest horses can hope to match a Dicravenator's speed. It will not stop until it has reached its prey."
 artifact_rhincanthus_name: "Rhincanthus"
 artifact_rhincanthus_description: "No matter how injured a Rhincanthus gets, it will never stop. A determined engine of destruction that will obliterate everything in its path."
 artifact_baroceratops_name: "Baroceratops"
 artifact_baroceratops_description: "Should the enemy cower behind their walls and bar their gates, simply create your own entrance with your Baroceratops."
 artifact_dracomus_name: "Dracomus"
 artifact_dracomus_description: "Inflict 1 fire [POD_aggravated_damage_with_box|E] to enemy [knights|E] and [commanders|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n\nA large draconic dinosaur that coats itself in a highly flammable mucus that it ignites by striking its claws together. A flaming monstrosity that should never have left the Mokolé's dreams."
 artifact_archeorex_name: "Archeorex"
 artifact_archeorex_description: "An apex predator brought to reality. A hulking beast of pure hunger and destruction. Should a Mokolé manage to dream of something even more dreadful, it would bring the Apocalypse."

