 RAVAGES_OF_THE_BEAST_PERK_EFFECT: "As a [bs_spell|E], make target $POD_splat_vampire$ Frenzy if possible\n#flavor Cause a target to Frenzy#!"
 WEIGHT_OF_THE_SUN_PERK_EFFECT: "As a [bs_spell|E], give target [GetModifier('weight_of_the_sun_modifier').GetNameWithTooltip] for 2 years\n#flavor Make a vampire feel the effects of being awake during the day#!"
 ABATED_TOOTH_PERK_EFFECT: "As a [bs_spell|E], give target [GetModifier('abated_tooth_modifier').GetNameWithTooltip] for 3 years\n#flavor Prevent a vampire's fangs from extending#!"
 TREACHEROUS_BONDS_PERK_EFFECT: "As a [bs_spell|E], make one random $POD_splat_ghoul$ of the target hates them\n#flavor Temporarily corrupt a blood bond, turning love to hate#!"
 THE_WITHERING_OF_AGES_PERK_EFFECT: "As a [bs_spell|E], give a [modifier|E] reducing [prowess|E] of a target scaling for every 10 years they have lived (duration of 2 years)\n#flavor Cause a vampire to decay to their true age#!"

