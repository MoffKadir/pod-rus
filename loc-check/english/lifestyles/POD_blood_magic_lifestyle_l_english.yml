 HUMILIATION_PERK_EFFECT: "As a [bs_spell|E], give the target [GetModifier('humiliation_modifier').GetNameWithTooltip] for 5 years\n#flavor Cause a victim to have bad luck in their next action#!"
 LOSS_PERK_EFFECT: "As a [bs_spell|E], destroy a random non-unique [artifact|E] of the target\n#flavor Cause a victim to lose a valued piece of property#!"
 PERIL_PERK_EFFECT: "As a [bs_spell|E], give the target [GetModifier('peril_modifier').GetNameWithTooltip] for 5 years\n#flavor Cause a victim to suffer a dangerous accident#!"
 ENEMY_PERK_EFFECT: "As a [bs_spell|E], force a random neighboring ruler/council member/courtier to become a [rival|E] of the target\n#flavor Cause a victim to lose allies#!"
 THE_EYE_THAT_WOUNDS_PERK_EFFECT: "#flavor Inflict damage on your target#!"

 ravages_of_the_beast_perk_name: "Ravages of the Beast"
