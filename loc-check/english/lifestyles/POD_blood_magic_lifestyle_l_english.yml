 sight_of_the_jackal_perk_name: "Sight of the Jackal"
 weigh_the_virtues_perk_name: "Weigh the Virtues"
 pharaohs_sentry_perk_name: "Pharaoh's Sentry"
 imbue_with_the_grace_of_anubis_perk_name: "Imbue with the Grace of Anubis"
 the_sorcery_of_life_perk_name: "The Sorcery of Life"
 
 SIGHT_OF_THE_JACKAL_PERK_EFFECT: "Can interact with characters on the other side of the Shroud.\n#flavor Become aware of wraiths around you#!"
 WEIGH_THE_VIRTUES_PERK_EFFECT: "As a [bs_spell|E], give imprisoned $POD_splat_wraith$ target [GetModifier('weigh_the_virtues_modifier').GetNameWithTooltip] allowing further [bs_spells|E] from this [bs_path|E]\n#flavor Learn about crimes or heroic deeds of a dead or undead#!"
 PHARAOHS_SENTRY_PERK_EFFECT: "As a [bs_spell|E], sacrifice a $POD_splat_wraith$ target with [GetModifier('weigh_the_virtues_modifier').GetNameWithTooltip] to summon an army of [GetMaA('pharaohs_sentry').GetName].\n#flavor Bind a fragment of a wraith into a corpse to act out one single command.#!"
 IMBUE_WITH_THE_GRACE_OF_ANUBIS_PERK_EFFECT: "#flavor Reanimate a corpse and imbue it with a singular purpose tied to its virtuous or villainous deeds#!"
 THE_SORCERY_OF_LIFE_PERK_EFFECT: "As a [bs_spell|E], convert a $POD_splat_wraith$ target with [GetModifier('weigh_the_virtues_modifier').GetNameWithTooltip] from a $POD_splat_wraith$ to a Bane $POD_splat_mummy$ with a cost of [GetModifier('the_sorcery_of_life_modifier').GetNameWithTooltip] for 20 years and a massive loss of [piety|E] if your [faith|E] doesn't allow $POD_splat_demon$\n#flavor A toned-down version of the Bane Rite, the sorcerer creates a sort of proto-Bane Mummy#!"

 bestowment_of_scales_perk_name: "Bestowment of Scales"
 suffer_for_jormungandr_perk_name: "Suffer for Jörmungandr"
 swallow_the_tail_perk_name: "Swallow the Tail"
 cycle_of_the_midgard_serpent_perk_name: "Cycle of the Midgard Serpent"
 apeps_transformation_perk_name: "$glossary_wyrm_apep$'s Transformation"
 
 BESTOWMENT_OF_SCALES_PERK_EFFECT: "As a [bs_spell|E], give target [POD_herd|E] member [GetModifier('bestowment_of_scales_modifier').GetNameWithTooltip] for 20 years\n#flavor Heal a ghoul faster by growing scaled skin across their wounds#!"
 SUFFER_FOR_JORMUNGANDR_PERK_EFFECT: "As a [bs_spell|E], give target [GetTrait('scaly').GetName(GetNullCharacter)] as well as [GetModifier('suffer_for_jormungandr_modifier').GetNameWithTooltip] while also increasing a random [skill|E] by 5\n#flavor Grant a ghoul reptilian features#!"
 SWALLOW_THE_TAIL_PERK_EFFECT: "As a [bs_spell|E], gain random amount from 1 to 4 blood points while wounding your entire [court|E]\n#flavor Draw shed blood from your surroundings to you#!"
 CYCLE_OF_THE_MIDGARD_SERPENT_PERK_EFFECT: "Decrease [lifestyle_experience|E] cost of teaching discipline by #p -100%#!\n#flavor Grant a ghoul the ability to use your disciplines#!"

 cycle_of_the_midgard_serpent_perk_tt: "Thanks to [GetPerk('cycle_of_the_midgard_serpent_perk').GetName(GetPlayer)], teaching $pod_discipline$ is free!"
 APEPS_TRANSFORMATION_PERK_EFFECT: "As a [bs_spell|E], sacrifice your $POD_splat_ghoul$ to gain stacking [GetModifier('apeps_transformation_modifier').GetNameWithTooltip]\n#flavor Transform a ghoul of yours into a great serpent capable of understanding human speech#!"


 saut_allah_perk_name: "Saut Allah"
 SAUT_ALLAH_PERK_EFFECT: "As a [bs_spell|E], reduce a targets stress and give them [GetModifier('saut_allah_modifier').GetNameWithTooltip] for 10 years.\n\n#weak The caster fortifies his fellow Ashirra for the rigors ahead.#!"
 nuzra_allah_perk_name: "Nuzra Allah"
 NUZRA_ALLAH_PERK_EFFECT: "Give [GetModifier('nuzra_allah_modifier').GetNameWithTooltip] to your foe during [single_combat_duel_plural|E].\n\n#weak A defensive power that shields the caster from visible harm.#!"
 ruh_allah_perk_name: "Ruh Allah"
 RUH_ALLAH_PERK_EFFECT: "[vassal|E] [faction_commitment|E]: #P -30#!\n\n#weak The Ruh Allah aids a Cainite in regaining control in themselves and those around them.#!"
 RUH_ALLAH_FACTION_REASON: "[GetPerk('ruh_allah_perk').GetName(GetPlayer)]: $VALUE|0+=$"
 ghadub_allah_perk_name: "Ghadub Allah"
 GHADUB_ALLAH_PERK_EFFECT: "Inflict every ruler on the opposing side with [GetModifier('ghadub_allah_modifier').GetNameWithTooltip] when starting a [war|E] as the primary attacker or defender.\nAs a [bs_spell|E], force a [white_peace|E] between yourself and the target.\n\n#weak Allows the halting of attacks without the need for eye contact.#!"
 kubda_allah_perk_name: "Kubda Allah"
 KUBDA_ALLAH_PERK_EFFECT: "As a [bs_spell|E], gain a [strong_hook|E] on the target and wound them if you fail.\n\n#weak Crush the unlife out of an opponent and force them to submit. The caster must be sufficiently restrained to use the power for good.#!"

 hikma_allah_perk_name: "Hikma min Allah"
 HIKMA_ALLAH_PERK_EFFECT: "#weak By means of a prolonged introspection, the Ashirra is able to focus their mind on solving problems.#!"
 idrak_allah_perk_name: "Idrak' min Allah"
 IDRAK_ALLAH_PERK_EFFECT: "As a [bs_spell|E], learn all [schemes|E] and [secrets|E] of a character.\n\n#weak Through the power of prayer, gain insights into your foes.#!"
 sultat_nabi_perk_name: "Sultat el-Nabi"
 SULTAT_NABI_PERK_EFFECT: "As a [bs_spell|E], force a character to randomly give you @gold_icon!, @prestige_icon!, a Common [inventory_artifact|E], or a Famed [inventory_artifact|E].\n\n#weak Compel the subject to obey a short phrase comprising no more than ten words.#!"
 sawt_nabi_perk_name: "Sawt el-Nabi"
 SAWT_NABI_PERK_EFFECT: "#weak The caster may communicate with any Cainite known to them irrespective of the distance.#!"
 nar_iman_perk_name: "Nar el-Iman"
 NAR_IMAN_PERK_EFFECT: "As a [bs_spell|E], wound a character 3 times and give them [GetModifier('nar_iman_modifier').GetNameWithTooltip] for 10 years.\n\n#weak Exploit the inherent weakness of vampires in matters of faith, undermining the target's resolve and inflicting both mental and physical injury.#!"

 eyes_of_the_earth_perk_name: "Eyes of the Earth"
 EYES_OF_THE_EARTH_PERK_EFFECT: "$countermeasures_unlocks_t2_all_seeing_eye$\n#flavor The vampire "sees" everything that goes on around their haven by utilizing the spirits of the grass, trees, rocks, and animals in the vicinity.#!"
 roots_of_power_perk_name: "Roots of Power"
 ROOTS_OF_POWER_PERK_EFFECT: "#flavor The Sielanic practitioner draws upon the power latent in the earth.#!"
 arbor_of_protection_perk_name: "Arbor of Protection"
 ARBOR_OF_PROTECTION_PERK_EFFECT: "#flavor The vampire seeks refuge within the living wood of trees.#!"
 course_of_the_beast_perk_name: "Course of the Beast"
 COURSE_OF_THE_BEAST_PERK_EFFECT: "Unlock various animal shapeshift forms.\n#flavor The vampire can assume the shape of any animal that exists within her domain.#!"
 way_of_the_stone_perk_name: "Way of the Stone"
 WAY_OF_THE_STONE_PERK_EFFECT: "Unlock [GetModifier('POD_shapeshift_form_stone_dolmen_modifier').GetNameWithTooltip] shapeshift option.\n#flavor The vampire transforms into a great stone dolmen. The legends of stones that walk and move about during the night come from the practice of this potent art.#!"

 see_the_dead_perk_name: "See the Dead"
 SEE_THE_DEAD_PERK_EFFECT: "$POD_can_summon_wraith_trigger_loca$\n#flavor Ghosts of the dead can be seen and recognized by the user.#!"
 repel_the_angry_dead_perk_name: "Repel the Angry Dead"
 REPEL_THE_ANGRY_DEAD_PERK_EFFECT: "Can [POD_banish|E] $POD_splat_wraith_plural$\nGive [GetModifier('repel_the_angry_dead_modifier').GetNameWithTooltip] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E] if they are a [GetTrait('wraith').GetName(GetPlayer)].\n#flavor With this power, hostile ghosts and wraiths can be banished from the area.#!"
 command_the_freshly_dead_perk_name: "Command the Freshly Dead"
 COMMAND_THE_FRESHLY_DEAD_PERK_EFFECT: "$POD_can_weaken_fetter_trigger_loca$\n$POD_can_bind_wraith_trigger_loca$\n$POD_can_command_wraith_trigger_loca$\n#flavor The user can command any ghost that she can see to obey her.#!"
 army_of_souls_perk_name: "Army of Souls"
 ARMY_OF_SOULS_PERK_EFFECT: "Can recruit [GetMaA('spectres').GetName] as [men_at_arms|E].\n#flavor The Sielanic practitioner uses this power to raise a spectral troop to act as defenders or to deliver warnings to her enemies.#!"
 walk_the_road_of_shadows_perk_name: "Walk the Road of Shadows"
 WALK_THE_ROAD_OF_SHADOWS_PERK_EFFECT: "#flavor The vampire can cross into the [UmbraGlossaryLocalized('shadowlands','Underworld')] and appear as a solid wraith.#!"