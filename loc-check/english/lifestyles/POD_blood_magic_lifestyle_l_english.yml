 BUREBISTAS_THRONE_PERK_EFFECT: "#flavor King Burebista, who terrorized the Greeks for centuries built a great throne atop a mountain peek from which he could survey all his lands and enemies. Burebista no longer needed his throne and passed it on to his Koldun childer.#!"
 pietrosus_hospitality_perk_name: "Pietrosu's Hospitality"
 PIETROSUS_HOSPITALITY_PERK_EFFECT: "#flavor Mount Pietrosu's biting winds and frigid temperatures will kill an unprotected man in mere moments. The Koldun summons these powerful and frigid winds to surround him, harming everyone nearby. This also makes him immune to cold and the force of winds.#!"
 the_banks_of_the_basca_perk_name: "The Banks of The Basca"
 THE_BANKS_OF_THE_BASCA_PERK_EFFECT: "Greatly increases chance to [imprison|E] [characters|E] after a successful [siege|E] or [raid|E] in coastal provinces.\n\n#flavor When the rains come, the Basca leaps its banks and whole villages are swept away, along with any person unwise enough to seek higher ground. The Koldun wielding this power carries with her the surging might of the Basca wherever she goes.#!"
 kupalas_exhalation_perk_name: "Kupala's Exhalation"
 KUPALAS_EXHALATION_PERK_EFFECT: "[bs_spell|E]: Give your location [GetModifier('kupalas_exhalation_modifier').GetNameWithTooltip] for 5 years.\n[kraina|E]: Give it [GetModifier('kupalas_exhalation_modifier2').GetNameWithTooltip] instead.\n\n#flavor The Koldun summons deadly cold gasses from the ground. Any flame can ignite these gases into a terrible explosion. These gases are believed to be the breath of Kupala.#!"
 restless_medias_perk_name: "Restless Medias"
 RESTLESS_MEDIAS_PERK_EFFECT: "[bs_spell|E]: Give your location [GetModifier('weather_magic_earthquake_modifier').GetNameWithTooltip] for 10 years.\n[kraina|E]: Give it to all surrounding counties as well.\n\n#flavor From time to time, the ground beneath the village of Medias will shake and roil, tearing buildings from their moorings. The locals blame the gods, but the Koldun know it is Kupala, restlessly stirring within his earthen tomb. Kolduns with the greatest skill know how to rouse his agitations.#!"

#Black Sea Kraina
 danubian_voices_perk_name: "Danubian Voices"
 DANUBIAN_VOICES_PERK_EFFECT: "#flavor The Koldun know the true value of the Danube. The spirits of the river speak to them, passing on what they know or delivering messages for the Koldun.#!"
 grave_of_the_marea_neagra_perk_name: "Grave of the Marea Neagra"
 GRAVE_OF_THE_MAREA_NEAGRA_PERK_EFFECT: "#flavor The Koldun may always descend safely into the lowest depths of the Black Sea, where she may rest comfortably, protected from the sun and the outside world.#!"
 pontos_euxeinos_perk_name: "Pontos Euxeinos"
 PONTOS_EUXEINOS_PERK_EFFECT: "[bs_spell|E]: Heal [POD_aggravated_damage|E] and non-permanent wounds.\n[kraina|E]: Additionally gain [GetModifier('pontos_euxeinos_modifier').GetNameWithTooltip] for 10 years.\n\n#flavor The Greeks once called the Black Sea Pontos Euxeinos, the Hospitable Sea. For the Koldun of the Black Sea, it truly can be, holding them in its embrace and healing them of even their worst injuries.#!"
 minions_of_deep_marmora_perk_name: "Minions of Deep Marmora"
 MINIONS_OF_DEEP_MARMORA_PERK_EFFECT: "[bs_spell|E]: Summon a regiment of [GetMaA('water_spirits').GetName] to assist you in a war.\n[kraina|E]: Summon an additional regiment.\n\n#flavor Legend says that the Koldun Cyzicus discovered that if he spilled his blood into the Sea of Marmora, strange beasts from the depths would emerge to do his bidding. Other Koldun have found that any body of water serves the same.#!"
 pontos_axeinos_perk_name: "Pontos Axeinos"
 PONTOS_AXEINOS_PERK_EFFECT: "[bs_spell|E]: Reduce a hostile disembarked army's [supplies|E] by #V 20%#!.\n[kraina|E]: Inflict casualties on the army as well.\n\n#flavor Before the Greeks settled its settled its southern shoreline, they called the Black Sea Pontus Axeinos, the Inhospitable Sea. For the enemies of the Koldun, it can be very inhospitable indeed.#!"


#Bialowieza Kraina
 domain_breach_perk_name: "Domain Breach"
 DOMAIN_BREACH_PERK_EFFECT: "#flavor The Koldun is so in tune with his domain that he is able to detect when an intruder makes her way within its borders.#!"
 fingers_of_bialowieza_perk_name: "Fingers of Białowieża"
 FINGERS_OF_BIALOWIEZA_PERK_EFFECT: "[imprison|E] chance: #P +10%#!\nCan recruit [GetMaA('animated_tree').GetName] as [men_at_arms|E].\n\n#flavor The Koldun with this power commands nearby plants and trees to ensnare and potentially immobilize their victims.#!"
 grondrskas_impasse_perk_name: "Grondrska's Impasse"
 GRONDRSKAS_IMPASSE_PERK_EFFECT: "#flavor The tale tells of a poacher who trespassed into Tzimisce lands. It wasn't long before he was fleeing in a dread panic. He thought he knew the forest, but the trees were moving around him, cutting off his exit, herding him directly to the waiting Koldun.#!"
 mouth_of_djabalek_perk_name: "Mouth of Djabalek"
 MOUTH_OF_DJABALEK_PERK_EFFECT: "At the start of battle, remove the lowest [prowess|E] enemy [knight|E] from the battle and feed on them.\n\n#flavor Djabelek is a terrifying Tzimisce buried somewhere within the Białowieza Forest. It is said that somehow he continues to feed despite his torpid state, opening his mouth while dreaming, consuming whatever falls in. The Koldun opens the earth under his victim, sending them down to feed Djabelek.#!"
 the_white_tower_perk_name: "The White Tower"
 THE_WHITE_TOWER_PERK_EFFECT: "#flavor The White Tower is the gift provided by the demons of the earth with whom Djabelek once made his pact. The bones of all the victims of the Białowieza kraina force their way from the earth and cocoon the Koldun in a tower of earth and bone.#!"

#Kraina of the Well
 call_the_children_perk_name: "Call the Children"
 CALL_THE_CHILDREN_PERK_EFFECT: "Can recruit [GetMaA('demonhound').GetName] as [men_at_arms|E].\n\n#flavor In order to command a thing, one should venture to know it. Demons, much like dogs, always endeavor to come when called by their masters.#!"
 heed_the_hell_bound_heart_perk_name: "Heed the Hell-bound Heart"
 HEED_THE_HELL_BOUND_HEART_PERK_EFFECT: "[bs_spell|E]: Give a [GetTrait('demon').GetName(GetPlayer)] or [GetTrait('witch').GetName(GetPlayer)] [GetModifier('heed_the_hell_bound_heart_modifier').GetNameWithTooltip] for 5 years.\n[kraina|E]: Give them [GetModifier('heed_the_hell_bound_heart_modifier2').GetNameWithTooltip] instead.\n\n#flavor Whether by blessing or familiarity, a Koldun who drinks from her Well gains a supernatural sense that alerts her when demonic influence is near.#!"
 aegis_alighieri_perk_name: "Aegis Alighieri"
 AEGIS_ALIGHIERI_PERK_EFFECT: "Gain strong mental defenses against [GetTrait('demon').GetName(GetPlayer)]s and [GetTrait('witch').GetName(GetPlayer)]s.\nGive [GetModifier('aegis_alighieri_modifier').GetNameWithTooltip] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E] if they are a [GetTrait('demon').GetName(GetPlayer)] or [GetTrait('witch').GetName(GetPlayer)].\n\n#flavor Aegis Alighieri shields the Koldun from violating onslaughts, predations, and defilement by demonic forces.#!"
 heave_the_host_of_hell_perk_name: "Heave the Host of Hell"
 HEAVE_THE_HOST_OF_HELL_PERK_EFFECT: "[bs_spell|E]: Inflict #V [EmptyScope.ScriptValue('POD_base_fire_damage')|V0] Fire#! damage to a [GetTrait('demon').GetName(GetPlayer)] or [GetTrait('witch').GetName(GetPlayer)]\n[kraina|E]: Inflict #V [EmptyScope.ScriptValue('POD_double_fire_damage')|V0] Fire#! damage instead.\n\n#flavor After learning to call, to sense, and then to defend against infernal marring, the Koldun may erase its scars entirely.#!"
 reap_the_well_perk_name: "Reap the Well"
 REAP_THE_WELL_PERK_EFFECT: "Can recruit [GetMaA('aughisky').GetName] as [men_at_arms|E].\n\n#flavor The Koldun summons bloodied hooked chains from their hands to bind a demon into his service.#!"


#Kraina of Enoch
 shroud_of_oblivion_perk_name: "Shroud of Oblivion"
 SHROUD_OF_OBLIVION_PERK_EFFECT: "Can interact with characters on the other side of the Shroud.\n\n#flavor The Koldun tears out a piece of the [UmbraGlossary('underworld')]'s fabric to saturate the area around him with its attributes.#!"
 spectral_cloak_perk_name: "Spectral Cloak"
 SPECTRAL_CLOAK_PERK_EFFECT: "#flavor By harnessing the sight of the dead, the Koldun aggrieves those in the vicinity with a glimpse of the world of the dead. The cloak conceals the Koldun and drives away observers in terror#!"
 pond_of_malevolent_dread_perk_name: "Pond of Malevolent Dread"
 POND_OF_MALEVOLENT_DREAD_PERK_EFFECT: "[bs_spell|E]: Summon two regiments of [GetMaA('spectres').GetName] to assist you in a war.\n[kraina|E]: Summon four regiments instead.\n\n#flavor Nestled just above the abyss in the Underworld, no place is more frigid, devoid of light, tenebrous, or bleak than the Sea of Shadows, an ocean of souls on the precipice of total annihilation. The Koldun forms a shaft to sup from the doom of this sea and release its flow.#!"
 wrath_of_the_tempest_perk_name: "Wrath of the Tempest"
 WRATH_OF_THE_TEMPEST_PERK_EFFECT: "[bs_spell|E]: Give a character [stress|E] scaling with how many characters you've killed.\n[kraina|E]: Additionally inflict #V [EmptyScope.ScriptValue('POD_base_lightning_damage')|V0] Lightning#! damage to them.\n\n#flavor The Koldun summons the death rattles of all whom she has vanquished, pricking a hole in the barrier between worlds to let bleed the metaphysical storm.#!"
 hunger_of_the_void_perk_name: "Hunger of the Void"
 HUNGER_OF_THE_VOID_PERK_EFFECT: "[bs_spell|E]: Give your location [GetModifier('hunger_of_the_void_modifier').GetNameWithTooltip] for 10 years.\n[kraina|E]: Additionally drain all [GetTrait('mortal').GetName(GetPlayer)]s in the province.\n\n#flavor The Koldun embodies the distortions of the Tempest, torturing his own soul to cleave a pit of perfect destruction into reality.#!"

#Genius Loci
 genius_loci_1_perk_name: "Minor Genius Loci"
 GENIUS_LOCI_1_PERK_EFFECT: "Increase the success chance of all [krainas|E] by #P +10%#!\n\n#flavor The Koldun extends his awareness through the land upon which he treads.#!\n@warning_icon!#warning Perks from this tree are automatically gained when finishing other [kraina|E] paths.#!"
 genius_loci_2_perk_name: "Standard Genius Loci"
 GENIUS_LOCI_2_PERK_EFFECT: "Increase the success chance of all [krainas|E] by #P +10%#!\nCan use [fetish|E] [artifacts|E].\n\n#flavor The Koldun further extends his awareness, improving his Koldunic powers.#!"
 genius_loci_3_perk_name: "Sustained Genius Loci"
 GENIUS_LOCI_3_PERK_EFFECT: "[krainas|E] and their [bs_rituals|E] cost 1 less @blood_icon! when cast from their empowered location.\n\n#flavor The Koldun's Loci becomes able to sustain itself.#!"
 genius_loci_4_perk_name: "High Genius Loci"
 GENIUS_LOCI_4_PERK_EFFECT: "Increase the success chance of all [krainas|E] by #P +15%#!\n$countermeasures_unlocks_t3_all_seeing_eye$\n\n#flavor The Koldun's Loci sees all.#!"
 genius_loci_5_perk_name: "Genius Loci of Legend"
 GENIUS_LOCI_5_PERK_EFFECT: "[krainas|E] and their [bs_rituals|E] gain an additional effect when cast from their empowered location.\n\n#flavor The Koldun and the land are one.#!"

#Way of Earth
 grasping_soil_perk_name: "Grasping Soil"
 GRASPING_SOIL_PERK_EFFECT: "Give enemy [rulers|E] [GetModifier('grasping_soil_modifier').GetNameWithTooltip] at the start of a [war|E].\n\n#flavor The Koldun commands the earth to rise in a spray of dirt and crawl up a victim's legs, rendering them immobile.#!"
 endurance_of_stone_perk_name: "Endurance of Stone"
 ENDURANCE_OF_STONE_PERK_EFFECT: "#flavor Drawing the essence of earth into himself, the Koldun may gain a measure of its preternatural resilience#!"
 hungry_earth_perk_name: "Hungry Earth"
 HUNGRY_EARTH_PERK_EFFECT: "#flavor The Koldun drags their victim into the earth and crushes them with its pitiless grip.#!"
 root_of_vitality_perk_name: "Root of Vitality"
 ROOT_OF_VITALITY_PERK_EFFECT: "#flavor A much less hostile usage of Hungry Earth, instead of crushing agony the target's body is enriched by the fertile essence of the earth.#!"
 kupalas_fury_perk_name: "Kupala's Fury"
 KUPALAS_FURY_PERK_EFFECT: "[bs_spell|E]: Remove a [holding|E] at your location.\n\n#flavor The Koldun rouses the taint of Kupala with his blood so that the eldritch force may gnaw at the roots of mountains and thrash beneath the land like the great dragon of Tzimisce heraldry.#!"

#Way of Wind
 breath_of_whispers_perk_name: "Breath of Whispers"
 BREATH_OF_WHISPERS_PERK_EFFECT: "#flavor Even in their absence, Koldun instill deep fear in their boyars. This power carries the vampire's words on a light breeze and returns with the target's reply.#!"
 biting_gale_perk_name: "Biting Gale"
 BITING_GALE_PERK_EFFECT: "Inflict #V [EmptyScope.ScriptValue('POD_base_wound_damage')|V0]#! [POD_superficial_damage|E] to enemy [knights|E] and [commanders|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n\n#flavor Vengeful Koldun invoke a cutting wind that slices an area of their choosing.#!"
 breeze_of_lethargy_perk_name: "Breeze of Lethargy"
 BREEZE_OF_LETHARGY_PERK_EFFECT: "Give [GetModifier('breeze_of_lethargy_modifier').GetNameWithTooltip] to enemy [knights|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n\n#flavor Although they cannot induce immediate sleep, the winds evoked by this power bring growing exhaustion and numbing weariness through every muscle.#!"
 ride_the_tempest_perk_name: "Ride the Tempest"
 RIDE_THE_TEMPEST_PERK_EFFECT: "#flavor A Koldun employing this power moves at incredible speeds riding along the winds. Instilling fear as they suddenly appear in the different villages of their domain.#!"
 fury_of_the_night_sky_perk_name: "Fury of the Night Sky"
 FURY_OF_THE_NIGHT_SKY_PERK_EFFECT: "[bs_spell|E]: Summon a [GetModifier('weather_magic_storm_modifier').GetNameWithTooltip] at a location.\n\n#flavor Applying fury magnified by blood and will, a Koldun may project the full measure of his anger into the night sky. Churning gray clouds blot out stars and moon, unleashing spiraling gusts and a driving downpour of freezing rain and lightning.#!"

#Way of Water
 pool_of_lies_perk_name: "Pool of Lies"
 POOL_OF_LIES_PERK_EFFECT: "#flavor This versatile power creates three-dimensional illusions along the surface of a water source. How it is used depends on the creativity of the Koldun.#!"
 watery_haven_perk_name: "Watery Haven"
 WATERY_HAVEN_PERK_EFFECT: "$countermeasures_unlocks_t2_supernatural_high_alert$\n\n#flavor The Koldun submerges his target into a deep pool of water to protect them from danger.#!"
 fog_over_sea_perk_name: "Fog over Sea"
 FOG_OVER_SEA_PERK_EFFECT: "#flavor Moving with the unnatural grace of a ghost, the Koldun strides across water as readily as land, leaving nary a ripple to mark his passing.#!"
 minions_of_the_deep_perk_name: "Minions of the Deep"
 MINIONS_OF_THE_DEEP_PERK_EFFECT: "Can recruit [GetMaA('water_elemental').GetName] as [men_at_arms|E].\n\n#flavor By dripping his blood into a body of water, a Koldun may summon or rouse embodied water elementals to serve him.#!"
 doom_tide_perk_name: "Doom Tide"
 DOOM_TIDE_PERK_EFFECT: "[bs_spell|E]: Give your target [GetModifier('doom_tide_modifier').GetNameWithTooltip].\n\n#flavor Many ships lie at the bottom of the seas, shattered by the whirlpools of the Koldun.#!"

#Way of Fire
 fiery_courage_perk_name: "Fiery Courage"
 FIERY_COURAGE_PERK_EFFECT: "#flavor No vampire can master an element he fears, so this power dims that fear to a mere ember.#!"
 combust_perk_name: "Combust"
 COMBUST_PERK_EFFECT: "#flavor The Koldun's eyes flash vivide orange with sorcerous power as superheated ait coils around the target.#!"
 wall_of_magma_perk_name: "Wall of Magma"
 WALL_OF_MAGMA_PERK_EFFECT: "#flavor The Koldun raises his hand and the earth splits, spraying a wall of glowing magma quickly hardens into any desired shape.#!"
 bs_heat_wave_perk_name: "Heat Wave"
 BS_HEAT_WAVE_PERK_EFFECT: "Inflict #V [EmptyScope.ScriptValue('POD_base_fire_damage')|V0] fire#! damage to enemy [knights|E] and [commanders|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n\n#flavor Acting as a conduit for steam geysers, the Koldun channels a blast of dessicating air at a victim within line of sight.#!"
 volcanic_blast_perk_name: "Volcanic Blast"
 VOLCANIC_BLAST_PERK_EFFECT: "#flavor Lava explodes from the ground in a huge geyser at the Koldun's command. The molten rock spews across a wide swath before crashing to earth and flowing in all directions.#!"

#Way of Sorrow
 the_frustrations_of_nestrecha_perk_name: "The Frustrations of Nestrecha"
 THE_FRUSTRATIONS_OF_NESTRECHA_PERK_EFFECT: "#flavor Named for the goddess of grief and failure, this power allows the Koldun to rob an opponent of his resolve.#!"
 the_insults_of_krivda_perk_name: "The Insults of Krivda"
 THE_INSULTS_OF_KRIVDA_PERK_EFFECT: "[bs_spell|E]: Give your target a [mental_break|E].\n\n#flavor With the power of Krivda - a goddess of hatred and bitterness - the Koldun's insults enrage his target.#!"
 the_weeping_of_kruchina_perk_name: "The Weeping of Kruchina"
 THE_WEEPING_OF_KRUCHINA_PERK_EFFECT: "Give 30[stress_i|E] to enemy [knights|E] and their [commander|E] when acting as a [commander|E] during the [combat_phase|E], or to your foe during [single_combat_duel_plural|E].\n\n#flavor The glare of a Koldun can make someone so miserable they do nothing but cry. This power does more than spill a few tears, it causes hysterical bawling, wailing, and gnashing of teeth.#!"
 the_misfortune_of_chernogolov_perk_name: "The Misfortune of Chernogolov"
 THE_MISFORTUNE_OF_CHERNOGOLOV_PERK_EFFECT: "Give [GetModifier('the_misfortune_of_chernogolov_modifier').GetNameWithTooltip] to the enemy [commander|E] when acting as a [commander|E] during the [combat_phase|E].\n\n#flavor With a declaration that a person is doomed or destined to fail, the Koldun summons the attention of Chernogolov, the silver-mustached god of misfortune to his victim.#!"
 the_starvation_of_marena_perk_name: "The Starvation of Marena"
 THE_STARVATION_OF_MARENA_PERK_EFFECT: "Inflict #V [EmptyScope.ScriptValue('POD_base_cold_damage')|V0] Cold#! damage to [character|E] and give their location a [GetModifier('weather_magic_blizzard_modifier').GetNameWithTooltip].\n\n#flavor By invoking the wife of Kupala, the Koldun summons the cold and starvation that is the domain of Marena. A frosty gale blasts the victim and leaves him emaciated as if he had just survived the coldest of winters.#!"



 confer_with_the_blade_perk_name: "Confer with the Blade"
 grasp_of_the_mountain_perk_name: "Grasp of the Mountain"
 pierce_steels_skin_perk_name: "Pierce Steel's Skin"
 razors_shield_perk_name: "Razor's Shield"
 strike_at_the_true_flesh_perk_name: "Strike at the True Flesh"

 CONFER_WITH_THE_BLADE_PERK_EFFECT: "As a [bs_spell|E], gain a [lifestyle|E] Experience modifier based on the rarity of your currently equipped weapon.\n#weak See events and informations that have transpired around a weapon.#!"
 GRASP_OF_THE_MOUNTAIN_PERK_EFFECT: "#weak Mystically enforce the grip on your weapon#!"
 PIERCE_STEELS_SKIN_PERK_EFFECT: "#weak Direct your weapon to destroy any protective measures of the enemy#!"
 RAZORS_SHIELD_PERK_EFFECT: "#weak Allows to parry projectiles#!"
 STRIKE_AT_THE_TRUE_FLESH_PERK_EFFECT: "#weak Bypass any supernatural protection in your attack#!"

 maskims_touch_perk_name: "Maskim's Touch"
 breath_of_ereshkigal_perk_name: "Breath of Ereshkigal"
 nergals_blessing_perk_name: "Nergal's Blessing"
 nergals_wrath_perk_name: "Nergal's Wrath"
 ill_wind_perk_name: "Ill Wind"

 MASKIMS_TOUCH_PERK_EFFECT: "As a [bs_spell|E], make the target [GetTrait('ill').GetName(GetPlayer)].\n#weak Cause symptoms of influenza in a target#!"
 BREATH_OF_ERESHKIGAL_PERK_EFFECT: "As a [bs_spell|E], give the target a random non-supernatural illness.\n#weak Breath upon a target, inflicting minor disease#!"
 NERGALS_BLESSING_PERK_EFFECT: "As a [bs_spell|E], remove an illness from the target.\n#weak Lessen the symptoms of a pathogenic illness#!"
 NERGALS_WRATH_PERK_EFFECT: "As a [bs_spell|E], give the target a more severe non-supernatural illness.\n#weak Inflict a disease of choice on a target#!"
 ILL_WIND_PERK_EFFECT: "When casting [GetPerk('nergals_wrath_perk').GetName(GetPlayer)] on yourself, spawn an epidemic in your current location.\n#weak Spread a disease simply through your nearby presence#!"

 abyssal_mysticism_level_1_perk_name: "Abyssal Mysticism 1"
 abyssal_mysticism_level_2_perk_name: "Abyssal Mysticism 2"
 abyssal_mysticism_level_3_perk_name: "Abyssal Mysticism 3"
 abyssal_mysticism_level_4_perk_name: "Abyssal Mysticism 4"
 abyssal_mysticism_level_5_perk_name: "Abyssal Mysticism 5"

 ABYSSAL_MYSTICISM_LEVEL_1_PERK_EFFECT: "#X @warning_icon! To get this [perk|E] you must sacrifice [GetTrait('obtenebration').GetName(GetNullCharacter)] level#weak (row)#! via a [decision|E]#!\nUnlock level 1 [bs_rituals|E] of Abyssal Mysticism"
 ABYSSAL_MYSTICISM_LEVEL_2_PERK_EFFECT: "#X @warning_icon! To get this [perk|E] you must sacrifice [GetTrait('obtenebration').GetName(GetNullCharacter)] level#weak (row)#! via a [decision|E]#!\nUnlock level 2 [bs_rituals|E] of Abyssal Mysticism"
 ABYSSAL_MYSTICISM_LEVEL_3_PERK_EFFECT: "#X @warning_icon! To get this [perk|E] you must sacrifice [GetTrait('obtenebration').GetName(GetNullCharacter)] level#weak (row)#! via a [decision|E]#!\nUnlock level 3 [bs_rituals|E] of Abyssal Mysticism"
 ABYSSAL_MYSTICISM_LEVEL_4_PERK_EFFECT: "#X @warning_icon! To get this [perk|E] you must sacrifice [GetTrait('obtenebration').GetName(GetNullCharacter)] level#weak (row)#! via a [decision|E]#!\nUnlock level 4 [bs_rituals|E] of Abyssal Mysticism"
 ABYSSAL_MYSTICISM_LEVEL_5_PERK_EFFECT: "#X @warning_icon! To get this [perk|E] you must sacrifice [GetTrait('obtenebration').GetName(GetNullCharacter)] level#weak (row)#! via a [decision|E]#!\nUnlock level 5 [bs_rituals|E] of Abyssal Mysticism"

 threads_of_the_past_perk_name: "Threads of the Past"
 weave_of_the_future_perk_name: "Weave of the Future"
 certain_fate_perk_name: "Certain Fate"
 past_lives_perk_name: "Past Lives"
 master_of_samsara_perk_name: "Master of Samsara"
 
 THREADS_OF_THE_PAST_PERK_EFFECT: "As a [bs_spell|E], learn a random secret of the target.\n#flavor Receive a vision from the target's past#!"
 WEAVE_OF_THE_FUTURE_PERK_EFFECT: "As a [bs_spell|E], give the target [GetModifier('weave_of_the_future_modifier').GetNameWithTooltip] for 5 years\n#flavor Receive omens of events to come#!"
 CERTAIN_FATE_PERK_EFFECT: "As a [bs_spell|E], give the target [GetModifier('certain_fate_modifier').GetNameWithTooltip] for 5 years\n#flavor Receive a certain vision of a future event#!"
 PAST_LIVES_PERK_EFFECT: "As a [bs_spell|E], give the target a [modifier|E] giving +4 to a random [skill|E]([GetModifier('past_lives_diplomacy_modifier').GetNameWithTooltip]) for 10 years\n#flavor Receive a moderately detailed biography of your previous incarnation#!"
 MASTER_OF_SAMSARA_PERK_EFFECT: "As a [bs_spell|E], increase a random [skill|E] by 1 with the cost of a permanent [modifier|E] ([GetModifier('master_of_samsara_penality_modifier').GetNameWithTooltip])\nWhen killed, give your killer [GetModifier('master_of_samsara_modifier').GetNameWithTooltip] for 50 years\n#flavor Gain limited power over the future incarnation of a target#!"

 hand_of_ptah_perk_name: "Hand of Ptah"
 hand_of_khnum_perk_name: "Hand of Khnum"
 hand_of_anubis_perk_name: "Hand of Anubis"
 hand_of_thoth_perk_name: "Hand of Thoth"
 hand_of_heka_perk_name: "Hand of Heka"
 
 HAND_OF_PTAH_PERK_EFFECT: "As a [bs_spell|E], damage a random [artifact|E] of the target. If cast on yourself, repair instead of damage\n#flavor Remotely damage or repair an object of 90 kg or less#!"
 HAND_OF_KHNUM_PERK_EFFECT: "As a [bs_spell|E], give a [GetTrait('mortal').GetName(GetNullCharacter)] target [GetTrait('maimed').GetName(GetNullCharacter)] or [GetTrait('wounded_3').GetName(GetNullCharacter)].\n#flavor Remotely damage or repair an animal, mortal, or object of 453 kg or less#!"
 HAND_OF_ANUBIS_PERK_EFFECT: "Improve [GetPerk('hand_of_khnum_perk').GetName(GetPlayer)] by allowing to target [splats|E] possessing material bodies\n#flavor Remotely damage or repair corporeal supernatural creatures or objects of 2 tons or less#!"
 HAND_OF_THOTH_PERK_EFFECT: "Improve [GetPerk('hand_of_khnum_perk').GetName(GetPlayer)] by lifting [character|E] limitations\n#flavor Remotely damage or repair incorporeal supernatural creatures or objects of 9 tons or less#!"
 HAND_OF_HEKA_PERK_EFFECT: "Improve [GetPerk('hand_of_khnum_perk').GetName(GetPlayer)] by increasing success chance\n#flavor Remotely apply a Discipline or other magical power to creatures or damage or repair objects of 45 ton or less#!"

