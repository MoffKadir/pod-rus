 ####### POD glossary

 glossary_clan_curse: "[Glossary('Clan Curse', 'glossary_clan_curse_tt')]"
 glossary_clan_curse_tt: "A Clan Curse is a supernatural limitation experienced by a $POD_splat_vampire$ based on their $pod_clan$.\n\nThese deficits have a deep psychological impact on the new vampire and often force them to reshape their nightly existence completely. Various Clans, however, rationalize their Curse away. Others interpret it as a hidden gift or the secondary effect of a great enlightenment or advantage to delude themselves.\n\nAccording to the Book of Nod, the Clan Curses are the result of Caine's wrath against the [GetTrait('vampgeneration3').GetName(GetNullCharacter)] after the destruction of the [GetTrait('vampgeneration2').GetName(GetNullCharacter)]."

 glossary_courts_of_love: "[Glossary('Courts of Love', 'glossary_courts_of_love_tt')]"
 glossary_courts_of_love_tt: "The Courts of Love is a [GetTrait('vampire').GetName(GetNullCharacter)] domain and feudal institution that was formed by the French [GetTrait('toreador').GetName(GetNullCharacter)]. It is comprised of many Courts of Love, each the domain of a powerful Toreador.\n\nThe most prominent and influential of these courts and their historical owners were:\n$BULLET_WITH_TAB$Valois held by the Matriarch Salianna\n$BULLET_WITH_TAB$Champagne held by Queen Helene 'la Juste'\n$BULLET_WITH_TAB$Poiters held by King Etienne de Poiters\n$BULLET_WITH_TAB$Anjou held by Queen Isouda de Blaise\n$BULLET_WITH_TAB$Toulouse held by Queen Esclaramonde"

 glossary_osirian_league: "[Glossary('Osirian League', 'glossary_osirian_league_tt')]"
 glossary_osirian_league_tt: "The Osirian League is a society dedicated to fighting [Glossary('Set','game_concept_antediluvian_desc')].\n\nIts members are:\n$BULLET_WITH_TAB$The [GetTrait('mokole').GetName(GetNullCharacter)] under Sobek.\n$BULLET_WITH_TAB$The #TOOLTIP:GAME_TRAIT,werewolf,[GetNullCharacter] #L Garou#! tribe of the Silent Striders.\n$BULLET_WITH_TAB$The Bubasti #TOOLTIP:GAME_TRAIT,bastet,[GetNullCharacter] #L werecats#!.\n$BULLET_WITH_TAB$The #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L vampiric#! Children of Osiris and Disciples of Anubis.\n$BULLET_WITH_TAB$The mortal wizard-priests of the Cult of Isis.\n$BULLET_WITH_TAB$The wandering [GetTrait('eshu').GetName(GetNullCharacter)].\n$BULLET_WITH_TAB$The [GetTrait('shemsuheru').GetName(GetNullCharacter)] themselves."


 glossary_khitta: "[Glossary('Khitta', 'glossary_khitta_tt')]"
 glossary_khittas: "[Glossary('Khittas', 'glossary_khitta_tt')]"
 glossary_khitta_tt: "Cairo is home to several factions organized into Khittas, loosely defined districts that are the domain of a particular $pod_clan$ or lineage. These domains are usually self-governed, but all answer to the Sultan or Prince in the end. While Cairo is predominately Muslim, only a few of the Khittas are aligned with the [Glossary('Ashirra','game_concept_ashirra_desc')].\n\nAshirra Khittas:\n$BULLET_WITH_TAB$Banu al-Lam'a: The Lasombra district.\n$BULLET_WITH_TAB$Banu Yashkur: The Assamite district.\n$BULLET_WITH_TAB$Banu al-Hajj: The Nosferatu district.\n$BULLET_WITH_TAB$Banu al-Fen: The Toreador district. This Khitta is canonically known as Banu Duval and was only founded when a Toreador arrived alongside Napolean in Cairo in 1798.\n\nOther Khittas:\n$BULLET_WITH_TAB$Banu Ahl ar-Raya: The True Brujah district.\n$BULLET_WITH_TAB$Banu al as-Sa'idi: The Setite district.\n$BULLET_WITH_TAB$Banu Zamalek: A free district where various other vampires make their home.\n$BULLET_WITH_TAB$Banu al-Azraq: The Ventrue district led by Antonius and his descendents.\n$BULLET_WITH_TAB$Banu al-Giza: The Disciples of Anubis district located just outside Cairo itself."

 ###############
 #### Fera #####
 ###############
 glossary_fera: "[Glossary('Fera', 'glossary_fera_tt')]"
 glossary_fera_tt: "#bold Fera#! are a spiritual people with the ability to shapeshift into animal forms. $POD_splat_werewolf_plural$ are the most numerous and well-known, but there are many other kinds.\n\nAccording to Fera mythology, they were created by Gaia, the Mother Goddess of all living things, each given their own role in safeguarding her creations. However, many have strayed from their task, whether through apathy, cynicism, or bloody inter-tribe conflicts, and Gaia is growing ever more distant.\n\nThe following Fera are playable in [princes_of_darkness|E]:\n$BULLET_WITH_TAB$#TOOLTIP:GAME_TRAIT,werewolf,[GetNullCharacter] #L;bold Garou#!#! #weak (Werewolves)#!\n$BULLET_WITH_TAB$#bold [GetTrait('bastet').GetName(GetNullCharacter)]#! #weak (Werecats)#!\n$BULLET_WITH_TAB$#bold [GetTrait('mokole').GetName(GetNullCharacter)]#! #weak (Werecrocodiles and Weredragons)#!"

 glossary_triat: "[Glossary('Triat', 'glossary_triat_tt')]"
 glossary_triat_tt: "The Triat are three of the greatest entities in the spiritual hierarchy: the $glossary_wyld$, the $glossary_weaver$, and the $glossary_wyrm$.\n\nOriginally the Triat were in balance. The Wyld created raw matter, life, and spirit while the Weaver gave these creations form and function, and the Wyrm destroyed them to make room for new creations.\n\nThe Triat however are no longer in balance. The Weaver draws on the strength of humanity - its cities, technology, industry, and science - and is stronger than ever before. The Wyld's influence retreats as natural resources are plundered, the wild places of the world destroyed, and nature forced to do man's bidding. Most dangerous of all, however, is the Wyrm - it feeds on evil and destroys without distinction. "

 glossary_wyld: "[Glossary('Wyld', 'glossary_wyld_tt')]"
 glossary_wyld_tt: "The #bold Wyld#! is one of the three incalculably powerful spirits comprising the $glossary_triat$.\n\nThe Wyld is a generative force: it creates absolute Chaos, which is given order by the $glossary_weaver$ before it is destroyed and returned to chaos by the $glossary_wyrm$. Where the other two of the Triat went insane, the Wyld is diminishing, being squashed out by the Weaver, and destroyed recklessly by the Wyrm.\n\nThe Wyld's domain is nature and its rampant growth, which is slowly being destroyed by mankind."

 glossary_weaver: "[Glossary('Weaver', 'glossary_weaver_tt')]"
 glossary_weaver_tt: "The #bold Weaver#! is one of the three incalculably powerful spirits comprising the $glossary_triat$.\nThe Weaver's function was to make order from the creations of the $glossary_wyld$, giving them form and function for the duration of their existence before they were destroyed by the $glossary_wyrm$, maintaining a balance between creation and destruction.\n\nIt is believed that the Weaver is primarily to blame for the imbalance in the Triat; the Weaver grew tired of its order being destroyed by the Wyrm, and spun its webs to imprison the Wyrm and end its destruction. This imprisonment drove the Wyrm mad, and caused it to begin destroying everything, rather than just those things whose time had ended.\n\nThe Weaver's avatars and children often take the form of spiders, or sometimes insects. It is a patron of law, order, science, and technology. As humanity advances, so too does the Weaver."

 glossary_wyrm: "[Glossary('Wyrm', 'glossary_wyrm_tt')]"
 glossary_wyrm_triatic: "[Glossary('Triatic Wyrm', 'glossary_wyrm_tt')]"
 glossary_wyrm_apep: "[Glossary('Apep', 'glossary_wyrm_tt')]"
 glossary_wyrm_apophis: "[Glossary('Apophis', 'glossary_wyrm_tt')]"
 glossary_wyrm_tt: "The #bold Wyrm#! is one of the three incalculably powerful spirits comprising the $glossary_triat$.\n\nThe Wyrm's purpose was to cleanse and rectify all of Creation, furthering its descent into Entropy. It achieved this by eliminating that which the $glossary_wyld$ creates and the $glossary_weaver$ structures, completing the eternal cycle of birth to death. It was the second member of the $glossary_triat$ to go insane. When the $glossary_weaver$ went mad and began encasing everything in webs to prevent the destruction of its creations, the Wyrm was progressively constrained until it could no longer fulfil its purpose as it wished. Denied the opportunity to do as it had been created to do, it was driven into a state of pure rage and madness, hellbent on destroying everything regardless of whether it's appointed time had come or not.\n\nNow, the Wyrm exists as a Dark God of [Glossary('Calamity', 'glossary_wyrm_calamity_tt')], [Glossary('Consumption', 'glossary_wyrm_consumption_tt')], and [Glossary('Corruption', 'glossary_wyrm_corruption_tt')]."

 glossary_wyrm_calamity: "[Glossary('Beast of War', 'glossary_wyrm_calamity_tt')]"
 glossary_wyrm_calamity_tt: "The #bold Beast of War#! or #bold Wyrm of Calamity#! is the first of the three heads of the $glossary_wyrm_triatic$.\n\nIt is a monster of senseless rage, ready to destroy all in its path. Limitless rage fuels it, and destructive instincts guide it. Its minions range from self-destructive shock troops that hurl themselves into battle to hulking brutes who delight in overpowering and annihilating their victims.\n\nThis head is analogous to the $glossary_wyld$'s love of chaos, but here it is a chaos achieved via destructive terror."

 glossary_wyrm_consumption: "[Glossary('Eater of Souls', 'glossary_wyrm_consumption_tt')]"
 glossary_wyrm_consumption_tt: "The #bold Eater of Souls#! or #bold Wyrm of Consumption#! is the second of the three heads of the $glossary_wyrm_triatic$.\n\nIt is the embodiment of the gnawing hungers of greed, lust, and gluttony. Some of its minions have surrendered all willpower; others are single-minded murderers who stalk what they foolishly think will complete them. The Eater of Souls' hatred festers as virulently as a disease that inexorably ravages infected flesh and erodes troubled sanity.\n\nThis head is analogous to the $glossary_weaver$'s desire to unify, but that which is done here is little more than unification through consumption and eventual digestion."

 glossary_wyrm_corruption: "[Glossary('Defiler Wyrm', 'glossary_wyrm_corruption_tt')]"
 glossary_wyrm_corruption_tt: "The #bold Defiler Wyrm#! or #bold Wyrm of Corruption#! is the third of the three heads of the $glossary_wyrm_triatic$.\n\nIt is a manifestation of every corrupting impulse and instinct in existence. Insidiously, the Defiler Wyrm seduces its victims silently from within, whispering temptations that lead its prey willingly into its maw. It's the serpent in the Garden of Eden, the foolish ambition of a fallen angel, the hubris of a [GetTrait('mage').GetName(GetNullCharacter)] who summons up more power than he can control, or the arrogance of a $glossary_fera$ who thinks he can master the very spiritual forces that will inevitably condemn him to damnation.\n\nThis head is analogous to the Wyrm's original purgative function, but in the mortal world it is a being that is restricted to only being able to eat away at its victims intangibly, subtly, and from within, until all that remains is a darkened husk too corrupted to live."



