l_english:
 POD_story_pact: "#glow_color:{0.5,0,0,1} Demonic Pact#!"
 POD_story_pact_desc: "You bargained for power.\nWas it worth it?"

 #POD_story_pact_demon: "@demon_icon! Demon"
 POD_story_pact_custom_string: "#font:TitleFont;size:19;glow_color:{0.5,0,0,1} Pact signed with [Story.MakeScope.Var('demon').Char.GetFirstName]#!\n#glow_color:{0.25,0,0,75} [demonic_pact_obligation|E]: [Localize(Concatenate('POD_obligation_', Story.MakeScope.GetVariable('obligation').GetFlagKey))|U]\n[GuiScope.SetRoot(Story.GetOwner.MakeScope).AddScope('story',Story.MakeScope).Custom('PODPactFrequencyAndStatus')]\nIf you #X break#! the pact:\n[GetScriptedGui('POD_sidebar_show_demonic_pacts').BuildTooltip(GuiScope.SetRoot(Story.GetOwner.MakeScope).AddScope('obligation', MakeScopeFlag(Story.MakeScope.GetVariable('obligation').GetFlagKey)).AddScope('consequence', MakeScopeFlag(Story.MakeScope.GetVariable('consequence').GetFlagKey)).End)]\nThis [demonic_pact|E] is worth [Story.MakeScope.GetVariable('perk_points_gained').GetValue|0V] [investiture_lifestyle|E] [perk|E] [Select_CString( EqualTo_CFixedPoint( Story.MakeScope.GetVariable('perk_points_gained').GetValue, '(CFixedPoint)1' ), 'point', 'points' )]#!"

 POD_story_pact_prohibitory: "Status: #X Prohibitory#!"
 POD_story_pact_frequency_completed: "[demonic_pact_frequency|E]: Every [story.MakeScope.GetVariable('frequency').GetValue|0V] years#!\nStatus: #P Completed#!"
 POD_story_pact_frequency_notcompleted: "[demonic_pact_frequency|E]: Every [story.MakeScope.GetVariable('frequency').GetValue|0V] years#!\nStatus: #N Pending#!"