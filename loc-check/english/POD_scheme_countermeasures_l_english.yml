l_english: 
 # Boilerplate copy for the standard countermeasures.
 scheme_countermeasure_type_all_seeing_eye: "All-Seeing Eye"
 scheme_countermeasure_type_all_seeing_eye_desc: "#WEAK Supernatural powers of precognition can go a long way towards protecting one self from undue attention.#!"

 scheme_countermeasure_type_all_seeing_eye_t1: "$scheme_countermeasure_type_all_seeing_eye$"
 scheme_countermeasure_type_all_seeing_eye_t1_desc: "$scheme_countermeasure_type_all_seeing_eye_desc$"
 scheme_countermeasure_type_all_seeing_eye_t2: "$scheme_countermeasure_type_all_seeing_eye$"
 scheme_countermeasure_type_all_seeing_eye_t2_desc: "$scheme_countermeasure_type_all_seeing_eye_desc$"
 scheme_countermeasure_type_all_seeing_eye_t3: "$scheme_countermeasure_type_all_seeing_eye$"
 scheme_countermeasure_type_all_seeing_eye_t3_desc: "$scheme_countermeasure_type_all_seeing_eye_desc$"

 countermeasures_unlocks_t1_all_seeing_eye: "Unlocks the #V $scheme_countermeasure_type_all_seeing_eye$#! [scheme_countermeasure_countermeasure|E] #weak (Tier 1)#!"
 countermeasures_unlocks_t2_all_seeing_eye: "Unlocks the #V $scheme_countermeasure_type_all_seeing_eye$#! [scheme_countermeasure_countermeasure|E] #weak (Tier 2)#!"
 countermeasures_unlocks_t3_all_seeing_eye: "Unlocks the #V $scheme_countermeasure_type_all_seeing_eye$#! [scheme_countermeasure_countermeasure|E] #weak (Tier 3)#!"
 countermeasures_unlocks_t4_all_seeing_eye: "Unlocks the #V $scheme_countermeasure_type_all_seeing_eye$#! [scheme_countermeasure_countermeasure|E] #weak (Tier 4)#!"
 countermeasures.desc.all_seeing_eye: "$EFFECT_LIST_BULLET$New [scheme_countermeasure_countermeasure|E]: $scheme_countermeasure_type_all_seeing_eye$\n$EFFECT_LIST_BULLET$[secrecy|E] reduced"

