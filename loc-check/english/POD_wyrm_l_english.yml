 POD_wyrm.1.t: "Communing with the Ruby"
 POD_wyrm.1.desc: "The Soul Ruby's hums increase as you pour energy into it. Soon the Black Spiral Dancer's voice invades your mind, asking what you request in exchange for all that energy. Although you're sure the spirit appreciates the energy, it does sound irritated at its current predicament."
 POD_wyrm.1.option.a: "Give me power!"
 POD_wyrm.1.option.b: "Teach me your [ancestral_tongue|E]."
 POD_wyrm.1.option.c: "Bless me with the $glossary_wyrm$'s power!"
 POD_wyrm.1.option.d: "Tell me more about this ruby."
 POD_wyrm.1.option.e: "Nothing at this time."

 POD_wyrm.101.t: "Enthralled by the Wyrm"
 POD_wyrm.101.desc: "From the moment you could understand the world you were taught of the evil that is the $glossary_wyrm$. Everyday you were told to fight against its minions, beware its agents, and resist its influence.\nIt seems you have failed spectacularly.\n\n#I Those fools were wrong. The $glossary_wyrm$ is the truth, and your eyes have finally been opened.#!"
 POD_wyrm.101.option.a: "I serve the Dark One..."


 temple_obscura_rooms_intro: "The Temple Obscura is a colossal temple made of dark, green-veined marble. The exterior is a strange and discordant mixture of warped and abberant symbols along with carvings symbolizing pain and degradation. Inside the temple, the light comes from small balefires mounted in living sconces made from the severed arms of prisoners, and from the dim green glow of stained glass windows in the ceiling. The temple itself consists of nine rooms, arranged one after the other. Each room contains statues and murals pertaining to the torments and tests awaiting any who dare enter. Some return somewhat lucid; many mostly functional. None return sane."

 POD_wyrm.501.t: "Room of Personal Failings"
 POD_wyrm.501.desc: "$temple_obscura_rooms_intro$\n\nThe first room of the temple lies before you. Visions of your past flood your mind as soon as you enter. You remember every failure, every bad decision, and every consequence of your past actions. The roots of deppression start taking hold, but you must resist."
 POD_wyrm.501.option.a: "Memories I try to forget..."
 POD_wyrm.501.option.b: "Weakness must be purged."

 POD_wyrm.502.t: "Room of Rage"
 POD_wyrm.502.desc: "$temple_obscura_rooms_intro$\n\nAs you enter the second room, you feel overcome with rage. Whether it is your own or the whisperings of the $glossary_wyrm$, you cannot say. You do not understand why you are here, or why you are angry, only that you must destroy."
 POD_wyrm.502.option.a: "I must break something!"
 POD_wyrm.502.option.list1: "You punch one of the pillars with your hands"
 POD_wyrm.502.option.list2: "You attack a [balefire|E] brazier"

 POD_wyrm.503.t: "Room of Anguish"
 POD_wyrm.503.desc: "$temple_obscura_rooms_intro$\n\nPain courses through you as you enter the third room. As your body endures the assault, your mind is once again flooded with visions of your past failures. Only this time the visions reveal to you that the $glossary_wyrm$ is your salvation, only through it can you achieve victory."
 POD_wyrm.503.option.a: "These visions give me insight."
 POD_wyrm.503.option.b: "I pledge myself to the great $glossary_wyrm$."
 POD_wyrm.503.option.c: "The $glossary_wyrm$ has blessed me!"

 POD_wyrm.504.t: "Room of Cunning"
 POD_wyrm.504.desc: "$temple_obscura_rooms_intro$\n\nYou find a Bane waiting for you in the fourth room. This Bane is particulary crafty and you must defeat it in a battle of wits before it will allow you to proceed."
 POD_wyrm.504.option.a: "My wits against yours."
 POD_wyrm.504.option.b: "Truth is a lie."
 POD_wyrm.504.option.list1: "Crushing victory"
 POD_wyrm.504.option.list2: "Barely victorious"

 POD_wyrm.505.t: "Room of Battle"
 POD_wyrm.505.desc: "$temple_obscura_rooms_intro$\n\nThe sounds of battle reach you before you manage to enter the fifth room. A legion of Banes, Fomori, and other servants of the $glossary_wyrm$ stand before you. It is clear what you must do."
 POD_wyrm.505.option.a: "To battle!"

 POD_wyrm.506.t: "Room of Corruption"
 POD_wyrm.506.desc: "$temple_obscura_rooms_intro$\n\nFrom the moment you enter the sixth room, a wave of corruption washes over you. Your senses are bombarded with pure malice, your body getting filled with dark energy. The $glossary_wyrm$ bestows you with its gift, now you need only survive."
 POD_wyrm.506.option.a: "Power overwhelming..."

 POD_wyrm.507.t: "Room of Loyalty"
 POD_wyrm.507.desc: "$temple_obscura_rooms_intro$\n\nThe seventh room holds no elaborate tests, riddles, or foes. Only a single plaque stands in the middle.\nProve your loyalty to the $glossary_wyrm$ through great sacrifice.\nNow, what will you offer?"
 POD_wyrm.507.option.a: "The life of [sacrifice.GetFirstName]."
 POD_wyrm.507.option.b: "My own flesh."
 POD_wyrm.507.option.c: "My material wealth."
 POD_wyrm.507.option.d: "The lives of my subjects."

 POD_wyrm.508.t: "Room of Riddles"
 POD_wyrm.508.desc: "$temple_obscura_rooms_intro$\n\nThe eighth room is enveloped in darkness. Nothing can be seen or heard within it, not even your own footsteps. The eerie silence is only broken by a voice whispering questions into your mind. You answer as more and more questions are asked, and slowly your consciousness begins to slip."
 POD_wyrm.508.option.a: "So many interesting questions..."
 POD_wyrm.508.option.b: "I must flee!"
 POD_wyrm.508.tooltip: "@warning_icon!#X  You will have to retry this room later in order to progress to the last room.#!"

 POD_wyrm.509.t: "Room of Mystery"
 POD_wyrm.509.desc: "$temple_obscura_rooms_intro$\n\nAt long last the final room of the temple lies before you. A towering werewolf sits on a shadowy steed at the center of the room. His armor is of a design that seems to defy reality, his sword and mount immolated with the great balefires of the $glossary_wyrm$. He utters a single sentence before charging at you.\n"You are not prepared."
 POD_wyrm.509.option.a: "My final test..."
 POD_wyrm.509.option.b: "I am not prepared. Run!"
 POD_wyrm.509.tooltip: "#help The $glossary_wyrm$ laughs at your weakness.#!\n@warning_icon!#X  You will have to retry this room later.#!"

 POD_wyrm.510.t: "Balefire Dance"
 POD_wyrm.510.desc.a: "After a battle that seemed to last days, you manage to finally strike down the monstrosity. As his body crumbles, his steed teleports a short distance behind the corpse. For a moment you think the flaming horse is going to avenge its master. Instead it engulfs the corpse in raging balefires, then slowly approaches you.\nThis terrifying horse brimming with the $glossary_wyrm$'s power seems to accept you as its new master."
 POD_wyrm.510.desc.b: "Your opponent spoke true, you were not prepared. Most of your attacks were shrugged off, some missed completely. His attacks on the other hand were accurate, powerful, and most devastating. Your only hope now is to escape.\nThe sin is not in being outmatched, but in failing to recognize it."
 POD_wyrm.510.option.a: "Now I am the master."
 POD_wyrm.510.option.b: "I cannot die here..."
 POD_wyrm.510.tooltip: "@warning_icon!#X  You will have to retry this room later...if you survive.#!"