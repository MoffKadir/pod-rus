 ############################
 # Non-procedural artifacts #
 ############################

 artifact_book_of_nod_name: "Book of Nod"
 artifact_book_of_nod_description: "A collection of ancient texts, viewed as sacred to Noddist $pod_cainites$. It consists of multiple recensions and fragments that have been reassembled by various scholars. Traditionally, the primary transmission of Caine's story is oral, while the texts with the most important events in Cainite history are heavily guarded to protect the Masquerade.\n\nThere are numerous open questions concerning the history of the Book of Nod. Its author is unknown, though Malkav, Saulot, and even Caine are often cited to have written parts of it, if not the whole thing. While the veracity of its content is often put into doubt, it is still the most agreed upon early history account of the $pod_cainites$."
 artifact_chronicle_of_caine_name: "Chronicle of Caine"
 artifact_chronicle_of_caine_description: "A Chronicle of 'The Book of Nod'. This tome comprises the following fragments: The First of Times, The Coming of Lilith, Lilith's Magick, The Temptation of Caine, Zillah's Tale, The Tale of the Crone, and The Tale of the First City. Although Caine is identified with the 'Cain' mentioned in the Book of Genesis, these Tales are not to be comparatively accurate with standard biblical canon.\n\nIn his own words, Caine relates what his motives were that led to his curse, giving his personal viewpoints of the events that surrounded the days after the Fall of Man, and his history of being the Dark Father."
 artifact_chronicle_of_shadows_name: "Chronicle of Shadows"
 artifact_chronicle_of_shadows_description: "A Chronicle of 'The Book of Nod'. A collection of pieces and fragments that are debated to even be part of the Book of Nod. There are analysts who claim that this section had been diluted by the scholars and writers of Carthage, who took poetic license to write down 'Caine’s Laws.' It has even been said that the Chronicle of Shadows is just a collection of propaganda created by the Camarilla to support its tyrannical reign. While some believe this to be an elaborate Malkavian prank, others believe these texts came straight from the Dark Father himself, especially the thirteen commandments that were provided on authentically aged tablets."
 artifact_chronicle_of_secrets_name: "Chronicle of Secrets"
 artifact_chronicle_of_secrets_description: "A Chronicle of 'The Book of Nod'. It contains prophecies and visions of an event called Gehenna. It seems to some, that the worries of this event have passed down from Generation to Generation and have caused a ripple of paranoia and fear that continue to reverberate through the Cainites and the Canaille." 
 artifact_first_of_times_name: "First of Times"
 artifact_first_of_times_description: "Caine explains that he sacrificed his brother, Abel, out of love. His 'Father' cast Caine out, to wander in darkness in the Land of Nod. Part of the 'Chronicle of Caine' in the 'Book of Nod'."
 artifact_coming_of_lilith_name: "Coming of Lilith"
 artifact_coming_of_lilith_description: "Caine explains that he sacrificed his brother, Abel, out of love. His 'Father' cast Caine out, to wander in darkness in the Land of Nod. Part of the 'Chronicle of Caine' in the 'Book of Nod'."
 artifact_liliths_magick_name: "Lilith's Magick"
 artifact_liliths_magick_description: "Cain wishes to have the gifts of power that Lilith has. After some persistence, the hesitant Lilith begins the Awakening ceremony by cutting herself with a knife and bleeding into a bowl for him to drink. Cain partakes. Part of the 'Chronicle of Caine' in the 'Book of Nod'."
 artifact_temptation_of_caine_name: "Temptation of Caine"
 artifact_temptation_of_caine_description: "Caine is visited by three angels who are agents of God. Each angel offers Cain a chance to repent for Abel's murder. By rejecting the Archangel Michael, Caine and his children are cursed with a weakness to fire. By rejecting Raphael, Caine and his children are cursed with the vulnerability to sunlight. By rejecting Uriel, Cain and his children are cursed with the Beast within for a thirst of blood. A fourth angel then appears, he who is Gabriel. This angel offers [golconda|E], the only way to 'light' by the mercy of God. Caine is 'Awakened' and develops with the [Glossary('Disciplines','game_concept_discipline_desc')]. With all these powers, he leaves Lilith. Part of the 'Chronicle of Caine' in the 'Book of Nod'."
 artifact_zillahs_tale_name: "Zillah's Tale"
 artifact_zillahs_tale_description: "Caine falls in love with Zillah and seeks to marry her. He does everything he can think of to make her desire him, yet she would not have him. Caine becomes so frustrated, that he tears at his hair. He finally seeks out the Crone's magick, who ultimately tricks him into a blood bond. This discovery of the Blood bond is what finally binds Zillah to Caine so that he could get her to marry him. Part of the 'Chronicle of Caine' in the 'Book of Nod'."
 artifact_tale_of_the_crone_name: "Tale of the Crone"
 artifact_tale_of_the_crone_description: "The blood bond that has Caine bound to the Crone, has him in her servitude. After a year of compliance and avoiding her blood, he asked the Crone how to be more powerful than his childer, for fear that they may take over. This inquiry was really part of a plan to use this information against her. She provides him a weapon of living gopher wood and explains how to use it. After accepting the weapon, Caine stabs her in the heart with it, breaking the blood bond. Part of the 'Chronicle of Caine' in the 'Book of Nod'."
 artifact_tale_of_the_first_city_name: "Tale of the First City"
 artifact_tale_of_the_first_city_description: "Caine expresses being in loneliness for an eon. He seeks to be with mortals again, and finds a city inhabited by the 'Children of Seth'. They accept him as king and he rules for some time, again feeling alone in his power. A young man named Enoch begs to be Caine's son. Despite Uriel's warning about having childer, Caine Embraces Enoch, his first childe. Caine then proclaims that this First City be known as the City of Enoch. His new childe Enoch, then begs for Kindred brethren. Caine agrees, and has Irad and Zillah embraced. They in turn, create more progeny. For fear of spreading his curse, Caine's orders that no more childer be made. They obey and the city prospers for ages, becoming a great Empire. Then the Deluge came and destroyed the City of Enoch and all of the 'Children of Seth'.\nPart of the 'Chronicle of Caine' in the 'Book of Nod'." 
 
 
 