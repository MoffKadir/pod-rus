l_english:
 POD_fleshcrafting_tutorial: "Each of the six body parts has two layers, #bold;clickable @flesh_icon!Flesh#! and #bold;clickable @bone_icon!Bone#!. Each body part can have only one modification per layer.\n\nEach modification has a #bold;clickable @vicissitude_icon! Complexity#! value. The success chance of changing modifications is determined by the total complexity of all body parts against your #bold;clickable [learning_i]Learning#! and any additional bonuses you may have.\n\nClick on one of the boxes to the left to begin."

 # lowercase f for "fleshcrafting" since it looks better with that specific font
 POD_fleshcrafting_title: "fleshcrafting: #bold [GetPlayer.MakeScope.Var('fleshcraft_target').Char.GetFirstNameNoTooltip]#!"

 fc_head: "Head"
 fc_torso: "Torso"
 fc_arm_r: "Right Arm"
 fc_arm_l: "Left Arm"
 fc_leg_r: "Right Leg"
 fc_leg_l: "Left Leg"
 fc_arms: "Arms"
 fc_legs: "Legs"

 fc_head_flesh: "Head, @flesh_icon!Flesh#!"
 fc_head_bone: "Head, @bone_icon!Bone#!"
 fc_torso_flesh: "Torso, @flesh_icon!Flesh#!"
 fc_torso_bone: "Torso, @bone_icon!Bone#!"
 fc_arm_r_flesh: "Right Arm, @flesh_icon!Flesh#!"
 fc_arm_r_bone: "Right Arm, @bone_icon!Bone#!"
 fc_arm_l_flesh: "Left Arm, @flesh_icon!Flesh#!"
 fc_arm_l_bone: "Left Arm, @bone_icon!Bone#!"
 fc_leg_r_flesh: "Right Leg, @flesh_icon!Flesh#!"
 fc_leg_r_bone: "Right Leg, @bone_icon!Bone#!"
 fc_leg_l_flesh: "Left Leg, @flesh_icon!Flesh#!"
 fc_leg_l_bone: "Left Leg, @bone_icon!Bone#!"

 POD_fleshcrafting_flesh_unassigned: "#italic Click to mold @flesh_icon!Flesh#!"
 POD_fleshcrafting_bone_unassigned: "#italic Click to mold @bone_icon!Bone#!"
 POD_fleshcraft_modify_layer: "#I Click to modify this layer\nRight-click to clear the selection#!"
 POD_fleshcrafting_selected_layer: "Modifying: [GetPlayer.MakeScope.Var('fc_selected_layer').GetFlagName]"
 POD_fleshcrafting_layer_confirm: "Select a modification to proceed"
 POD_fleshcrafting_button_clear: "#I Click to clear all selected modifications#!"
 # invisible bullet so that the text is aligned with the other invisible bullets from the custom_tooltips in POD_fleshcrafting_list_all_perk_effects_on_character
 # this necessary trust me bro
 POD_fleshcrafting_button_reset: "#color:{0.0,0.0,0.0,0.0} $EFFECT_LIST_BULLET$#!#I Click to reapply [GetPlayer.MakeScope.Var('fleshcraft_target').Char.GetFirstNamePossessive] current fleshcrafts#!\n\n#color:{0.0,0.0,0.0,0.0} [GetScriptedGui('POD_fleshcrafting_trait_tooltip').BuildTooltip( GuiScope.AddScope('character',GetPlayer.MakeScope.Var('fleshcraft_target').Char.MakeScope).End )]#!"

 POD_fleshcrafting_perk_name: "[Perk.GetNameNoTooltip( GetPlayer.MakeScope.Var('fleshcraft_target').Char.Self )]: @vicissitude_icon! #bold [EmptyScope.ScriptValue(Concatenate(Scope.GetFlagKey,'_complexity'))|0]#!"
 POD_fleshcrafting_perk_complexity: "@vicissitude_icon! #bold [EmptyScope.ScriptValue(Concatenate(Scope.GetFlagKey,'_complexity'))|0]#!"

 POD_fleshcrafting_total_complexity: "Total Complexity: @vicissitude_icon! [GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_current_complexity')|0]"
 # colors interpolated between red -> green as the success chance goes up
 POD_fleshcrafting_success_chance_tt: "Success Chance: #color:{[Lerp_CFixedPoint( '(CFixedPoint)1.0', '(CFixedPoint)0.2', GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_success_chance_decimal') )],[Lerp_CFixedPoint( '(CFixedPoint)0.2', '(CFixedPoint)0.7', GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_success_chance_decimal') )],0.2} [GetPlayer.MakeScope.ScriptValue('POD_fleshcrafting_success_chance')|0]% #!"

 POD_fleshcrafting_success: "On a success"
 POD_fleshcrafting_failure: "On failure"
 POD_fleshcrafting_success_message: "Fleshcrafting Successful"
 POD_fleshcrafting_failure_message: "Fleshcrafting Failure"
 POD_fleshcrafting_torture_consequences: "@warning_icon!#X Since [TARGET_CHARACTER.GetFirstName] isn't your [ghoul|E], [TARGET_CHARACTER.GetSheHe] will consider this [torture|E]#!"

 POD_fleshcrafting_confirm: "Fleshcraft"

 POD_fleshcrafting_need_to_select_perk: "You need to modify at least one body part"

 POD_fleshcraft_trait_tt_header: "#bold;clickable;glow_color:{0.0,0.0,0.0,1.0} [Localize(SCOPE.GetFlagName('saved_tooltip'))]:#!"
 POD_fleshcraft_trait_tt_no_perks: "#weak [character.GetFirstNameNoTooltip] currently has no [fleshcrafting|E] modifications#!"
