 dreaming_sands: "Dreaming Sands"
 dreaming_sands_adj: "Dreaming"
 dreaming_sands_adherent: "Dreamer"
 dreaming_sands_adherent_plural: "Dreamers"
 dreaming_sands_desc: "The twin seas of water and sand are opposed poles yet equal as sources of wisdom. Every grain of sand, every drop of water holds the memories of those who came before. It is in the Dreamtime where these memories are made clear.\n\nMost Dreamers live most of their lives in the deep deserts but make regular pilgrimages to the oceans and seas of the world. A journey made easier by following the Songlines; Mnesis pathways in the Dreamtime created by the Gumagan."


 dragons_zhong_guo: "Dragons of Zhong Guo"
 dragons_zhong_guo_adj: "Zhong Guo"
 dragons_zhong_guo_adherent: "Dragon"
 dragons_zhong_guo_adherent_plural: "Dragons"
 dragons_zhong_guo_desc: "The Zhong Lung, Dragons of the East, and Eldest of the Hengeyokai are the sages, scholars, and warriors of the Beast Courts. Along with the Emerald Mother (Gaia) and Sun they revere the Wani, their Dragon Ancestors.\n\nLike the Makara, they believe in the Balance, a supreme principal governing the entire universe. The Balance of yin and yang, light and dark, of the [Glossary('Devisor', 'glossary_wyld_tt')], [Glossary('Designer', 'glossary_weaver_tt')], and [Glossary('Dissolver', 'glossary_wyrm_tt')], is more important than the inherent goodness or badness of the [Glossary('Three', 'glossary_triat_tt')]."


 emerald_memory: "Emerald Memory"
 emerald_memory_adj: "Emerald"
 emerald_memory_adherent: "Keeper"
 emerald_memory_adherent_plural: "Keepers"
 emerald_memory_desc: "The Beast Courts contain many Mokolé other than the Zhong Lung. The Dragons have a very established role within the Courts; the Makara and Gumagan instead serve as their breed's intended purpose, being Gaia's memory. The Emerald Memory preserves and documents the history of the Beast Courts and the $glossary_fera$ as the Wheel of Ages ever turns. They also serve as advisors within the Courts so that the mistakes of the past won't be repeated, at least they hope so."


 eternal_breath: "Eternal Breath"
 eternal_breath_adj: "Eternal"
 eternal_breath_adherent: "Eternal"
 eternal_breath_adherent_plural: "Eternals"
 eternal_breath_desc: "Adherents of the Eternal Breath believe that only the Mokolé will survive until the world ceases to exist. Not the #TOOLTIP:GAME_TRAIT,vampire,[GetNullCharacter] #L;bold Blood-devils#!#!, nor the other $glossary_fera$, and especially not the #TOOLTIP:GAME_TRAIT,mortal,[GetNullCharacter] #L;bold Proudest Monkeys#!#!. The Beast Courts will fail, the other Changing Breeds have proven that they will never learn from the past. Only through their mastery of their own bodies and spirits will the Mokolé outlast everyone. They have already survived one Apocalypse, they will survive another."







