 holy_order_avengers_lost: "Avengers of the Lost"
 holy_order_army_scales: "The Army of Scales"


 saurian_religion: "@mokole_icon! Saurian"
 saurian_religion_adj: "Saurian"
 saurian_religion_adherent: "Saurian"
 saurian_religion_adherent_plural: "Saurians"
 saurian_religion_desc: "The Mokolé are werelizards, werecrocodilians, weresaurians, and weredragons. They are the descendants of the prehistoric Lizard Kings, the firstborn of the $glossary_fera$ and the chosen children of Helios. Their role is to be the memories of Gaia, a task they fulfill through the power of their Mnesis. With Mnesis, a Mokolé may remember thousands to millions of years into the past and delve through their ancestors' memories."



 children_sobek: "Children of Sobek"
 children_sobek_adj: "Sobek"
 children_sobek_adherent: "Redeemer"
 children_sobek_adherent_plural: "Redeemers"
 children_sobek_desc: "In the days when gods walked ancient Egypt lived Sobek, Chieftain of the Nile Mokolé. Great Sobek and his Clutch stood with the Osirians against Set and his vile serpents. Despite their combined might however, the Osirians suffered defeat. Set corrupted Sobek with his foul blood rituals and turned him into the first and only Mokolé Abomination.\nThe corrupted Sobek has been slumbering ever since in his hidden temple below ancient Crocodilopolis, his divine wrath restrained. His followers have not forgotten him, and seek to free him and Khem from the corruption of the Setites. If the Crocodile God can be saved and returned to Ma'at then woe to his enemies. If not, woe to creation itself."


 warriors_entoban: "Warriors of Entoban"
 warriors_entoban_adj: "Entoban"
 warriors_entoban_adherent: "Warrior"
 warriors_entoban_adherent_plural: "Warriors"
 warriors_entoban_desc: "Entoban, the African ark-continent, home of humanity, is also the home of the most ancient stream of Mokolé. Called the warriors of the Dragon Breed, they have been attacked endlessly in the Wars of Rage; their extreme hatred of the Garou is a mere reflection of the Garou's own mistreatment of them. Now they have taken up the task of safeguarding Entoban and protecting the other $glossary_fera$ breeds that remain there. The Garou's crimes will be avenged, and Mokolé never forget."


 cosmic_order: "Cosmic Order"
 cosmic_order_adj: "Cosmic"
 cosmic_order_adherent: "Seeker"
 cosmic_order_adherent_plural: "Seekers"
 cosmic_order_desc: "The Mokolé of India regard Sun as their source of enlightenment and Agni as their strength. They believe in Rta (the Cosmic Order) and that it came before Jya (Gaia) and will remain after her. Beneath Jya, they place the Trimurti composed of the Creator, Preserver and Destroyer. These unique beliefs were influenced by the mortal faiths within India, which the Mokolé have syncretized with.\nEverything has a purpose, they are here to seek theirs."

 cosmic_order_high_god_name: "Jya"
 cosmic_order_high_god_name_possessive: "Jya's"
