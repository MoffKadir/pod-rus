 ################


 #Common Bastet Localization
 karoush_high_god_name_alternate: "Nala"
 karoush_high_god_name_alternate_possessive: "Nala's"
 karoush_devil_name: "[Glossary('Cahlash', 'glossary_wyrm_tt')]"
 karoush_devil_name_possessive: "[Glossary('Cahlash', 'glossary_wyrm_tt')]'s"
 karoush_death_deity_name: "[Glossary('Cahlash', 'glossary_wyrm_tt')]"
 karoush_death_deity_name_possessive: "[Glossary('Cahlash', 'glossary_wyrm_tt')]'s"
 

 feline_religion: "@bastet_icon! Feline"
 feline_religion_adj: "Feline"
 feline_religion_adherent: "Feline"
 feline_religion_adherent_plural: "Felines"
 feline_religion_desc: "The Bastet are werecats that are obsessed with secret knowledge and are always pursuing and hoarding it. Many are great magicians, others are great warriors, but they are rarely pack animals and generally work alone. The Bastet were created by Luna (whom they call Seline). Rather than given a specific purpose, each tribe attempts to fill a gap where others didn't quite catch on."


 bagheera: "Bagheera"
 bagheera_adj: "Bagheera"
 bagheera_adherent: "Bagheera"
 bagheera_adherent_plural: "Bagheera"
 bagheera_desc: "Children of Saraam and feared as Kali's Executioners, Bagheera are Bastet who can assume the form of black panthers. The Bagheera claim that when Gaia was creating the Bastet, she hoped the Bagheera would be the lawgivers of catkind. This role never fully materialized, but traces of Gaia's intent linger still, filling them with a keen sense of justice and a spirit of righteous wrath that is terrible to behold."  
 
 bubasti: "Bubasti"
 bubasti_adj: "Bubasti"
 bubasti_adherent: "Bubasti"
 bubasti_adherent_plural: "Bubasti"
 bubasti_desc: "Also known as Shadowcats, they are the werecats of Egypt. The mystics of catkind, they are a shy and secretive race. The Bubasti were cursed long ago by the ancient vampire deity Set, and as a result, their lives are forever tied to the soils of Khem, their ancestral home. It is said that if all of the Bubasti of a given generation leave Egypt, that generation will be the last. None know the truth of this rumor, but none care to test it, either.\nDue to their war with Set, they are closely aligned with Horus' $glossary_osirian_league$ and their six leaders, the Kheper, have achieved immortality." 
 
 ceilican: "Ceilican"
 ceilican_adj: "Ceilican"
 ceilican_adherent: "Ceilican"
 ceilican_adherent_plural: "Ceilicans"
 ceilican_desc: "Also called Ring Dancers, they originated in northern Europe, and have strong ties to the fae but are not fae themselves. The Ceilican can trace their ancestry back to the maneless lions of northern Europe and are regarded as cousins to the Simba (although every Simba would be outraged to be compared with one of the Ring Dancers). During the terrors of the War of Rage that destroyed their kin, the surviving Ceilican pledged themselves to a lord of Faerie, who soon enslaved them and infected them with their mercurial mannerism and even their weakness against cold iron."
 
 khan_adj: "Khan"
 khan_adherent: "Khan"
 khan_adherent_plural: "Khans"
 khan_desc: "The Khan, also known as the Bright Kings, are weretigers, and are one of the nine remaining tribes of the Bastet. They see themselves as the bulwarks against the darkness, who are Gaia's most perfect creations and as such obliged to protect all who are lesser. While usually independent and unsocial as any werecat, many Khan are allied to the Beast Courts.\nAn honorable folk, the Khan evoke the respect the lions demand."
 
 simba: "Simba"
 simba_adj: "Simba"
 simba_adherent: "Simba"
 simba_adherent_plural: "Simbas"
 simba_desc: "Simba are werelions. They are also known as Lords of Sunlights or Dark Kings. The Simba represent the best Gaia has to offer, in that they are regal, proud, and powerful beyond compare. However, they are also arrogant, domineering, and malicious, even under the best of circumstances.\nThey believe things are simply out of order. When the balance is restored, when the humans know their place, and when cities become graveyards, the lions will be proven right. In the minds of the Simba, the demons of the dark ages can be traced to the end of Impergium and the laxity of the Changing Breeds. And they intend to put things in the right order: if that requires bloodshed, so be it. Warfare is the sport of kings." 

 swara: "Swara"
 swara_adj: "Swara"
 swara_adherent: "Swara"
 swara_adherent_plural: "Swara"
 swara_desc: "The werecheetahs of the Bastet tribes are also called the Silver Folk. Like their kin, they are extremely fast and travel much. They also have a unique link with the [umbra|E]. Of all tribes of the Bastet, the Swara are the least understood. This is a result of their very isolated culture. Swara are the only breed of Bastet able to step sideways, allowing them to travel to realms within the [umbra|E] that their brethren are unable to reach. Some speculate that this is a result of their strong relationship to Luna, who most Swara revere. Some legends claim that it was a Swara who first visited the moon during the time of the Impergium, and it was this that taught them the meaning and importance of the war against the $glossary_wyrm$ and how dire the situation is." 






