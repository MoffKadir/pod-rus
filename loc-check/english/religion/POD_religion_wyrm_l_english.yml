 hellcats: "Hellcats"
 hellcats_adj: "Hellcats"
 hellcats_adherent: "Hellcat"
 hellcats_adherent_plural: "Hellcats"
 hellcats_desc: "When the Black Spiral Dancers attacked the annual moot of the Ceilican Bastet in Scotland, they forced some of them in the [UmbraGlossary('black_spiral_labyrinth')] in order to turn them to the $glossary_wyrm$. Those who survived became the Hellcats, their usual genuine madness turned into self-destructing and mindless aggression. Awaiting the Apocalypse to honor their Dark Father, these tainted creatures bring with them their potent links to the illusionary gifts of the Fae and various Wyrm-fetishes they constructed with Bastet-like curiosity."

 holy_order_eyes_cahlash: "Eyes of Cahlash"

 
 mnetics: "Mnetics"
 mnetics_adj: "Mnetic"
 mnetics_adherent: "Mnetic"
 mnetics_adherent_plural: "Mnetics"
 mnetics_desc: "The Mnetics are the Eaters of Secrets. Their eyes have been opened to the truth that memories are ephemeral and malleable. While the other Mokolé spend years reliving the past through Mnesis, the Mnetics know that it is all a lie. If all Mokolé remember the past, then why is it so different for everyone? The Eaters of Secrets revel in twisting Mnesis with their lies and deception. Many Mokolé have fallen to the [Glossary('Dissolver', 'glossary_wyrm_tt')] believing his lies, and the Mnetics grow ever stronger as a result."

 holy_order_forgotten_nightmares: "The Forgotten Nightmares"