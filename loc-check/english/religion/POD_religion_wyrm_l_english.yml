 ##########################

 blackspiraldancer_religion: "@werewolf_icon! Black Spiral Dancers"
 blackspiraldancer_religion_adj: "Black Spiral Dancers"
 blackspiraldancer_religion_adherent: "Black Spiral Dancer"
 blackspiraldancer_religion_adherent_plural: "Black Spiral Dancers"
 blackspiraldancer_religion_desc: "Also known as the Lost Tribe, the dreaded Black Spiral Dancers are the Garou who turned to the $glossary_wyrm$. Once known as the White Howlers, they have been corrupted to the last after the tribe tried to take down the Wyrm by themselves."

 holy_order_death_spiral: "Death Spiral"
 holy_order_heralds_hydra: "Heralds of the Hydra"
 holy_order_bringers_apocalypse: "Bringers of the Apocalypse"
 holy_order_balefire_warriors: "Balefire Warriors"


 blackspiraldancer: "Black Spiral Dancers"
 blackspiraldancer_adj: "Black Spiral Dancers"
 blackspiraldancer_adherent: "Black Spiral Dancer"
 blackspiraldancer_adherent_plural: "Black Spiral Dancers"
 blackspiraldancer_desc: "Also known as the Lost Tribe, the dreaded Black Spiral Dancers are the Garou who turned to the $glossary_wyrm$. Once known as the White Howlers, they have been corrupted to the last after the tribe tried to take down the Wyrm by themselves."

 cluithi: "Cluithi"
 cluithi_adj: "Cluithi"
 cluithi_adherent: "Cluith"
 cluithi_adherent_plural: "Cluithi"
 cluithi_desc: "Within the Black Spiral tribe, however, one Camp has done its best to preserve the White Howler heritage. Cluithi still prowl the most desolate moors and forests of Scotland, imitating the appearance of their ancestors had centuries ago. They rend their clothing, proudly smear themselves with blue body paint and display Pictish tattoos. The rulers of this camp also have an elitist bent, considering themselves the nobility of the tribe. The Camp's name is a reference to the original rulers of the Pictish Kingdoms. Many Cluithi see themselves as the truest children of Cluid, the hero who first led the Picts to Caledonia."

 princesofruin: "Princes of Ruin"
 princesofruin_adj: "Ruin"
 princesofruin_adherent: "Prince of Ruin"
 princesofruin_adherent_plural: "Princes of Ruin"
 princesofruin_desc: "The Princes of Ruin maintain that the war for the Apocalypse is over and finished. They preach self-indulgence, claiming that the dying corpse of the world is now theirs to rule over and treat as they like. The triumphant champions of the Corrupter they claim indulging their own base instincts is categorically worship of the $glossary_wyrm$."

 seekersoftheancient: "Seekers of the Ancient"
 seekersoftheancient_adj: "Seekers"
 seekersoftheancient_adherent: "Seeker"
 seekersoftheancient_adherent_plural: "Seeker"
 seekersoftheancient_desc: "Dark druids of the land seeking to confer with the atmosphere and geomancy surrounding the Ancients. They don't extol the spirit itself, but call upon the virtues of its elements, invoking it indirectly to act through nature. This grants them insight and power indirectly, allowing them to develop and direct a Pit that has been bonded to the surrounding landscape. They serve as shamans, risking thralldom and insanity to commune with unthinkable spirits and gain insight directly."


 ##############
 #### Wyrm ####
 ##############


 wyrmbound: "Wyrm-bound"
 wyrmbound_adj: "Wyrm-bound"
 wyrmbound_adherent: "Corrupted"
 wyrmbound_adherent_plural: "Corrupted"
 wyrmbound_desc: "The $glossary_wyrm$ counts many among its servants. Some serve knowingly, some unknowingly. But their actions all serve the Wyrm's greater purpose of bringing about the Apocalypse; the end of Gaia. As such, all creatures who cause misery, indulge in depravity and/or partake in destruction, either willingly or unwillingly, knowingly or unknowingly, are servants of the Wyrm."
 
 
 #Bone Gnawers
 maneaters: "Man-eaters"
 maneaters_adj: "Man-eater"
 maneaters_adherent: "Man-eater"
 maneaters_adherent_plural: "Man-eaters"
 maneaters_desc: "This Bone Gnawer camp gains power by breaching the tenet of the Litany that forbids cannibalism of human flesh. Most of this camp's 'converts' were Garou who had succumbed to frenzy too often. They are few today and many of the remaining have allied with the similar Eaters of the Dead camp among the Silent Striders.\nThe occasional ghoulish tale of ravenous werewolves also gives credence to the existence of the Maneaters — after all, in times of hunger, it's all too tempting for a Gnawer to feed himself and remove a surplus hungry mouth or three at the same time."

 holy_order_butchers_men: "Butchers of Men"

 #Shadowlords
 masks: "Masks"
 masks_adj: "Masks"
 masks_adherent: "Mask"
 masks_adherent_plural: "Masks"
 masks_desc: "A secret Shadowlord society devoted to instilling fear in their enemies, the Masks' dedication to their dark arts is so fanatic that they purportedly practice ritualized mutilation upon themselves to inspire greater horror in their victims. Since the unknown is the playground of fear, no true Mask ever reveals their membership in the camp to outsiders, save for those who are targeted for indoctrination into their numbers." 

 #Shadowlords
 societyofnidhogg: "Society of Nidhogg"
 societyofnidhogg_adj: "Nidhogg"
 societyofnidhogg_adherent: "Nidhoggist"
 societyofnidhogg_adherent_plural: "Nidhoggists"
 societyofnidhogg_desc: "All Shadowlords understand the power of darkness, but none so deeply as the members of this secretive, mystic camp. So strong is their fanaticism that they claim that sunlight itself is a threat to the forces of Thunder, and seek to plunge the world into eternal darkness." 

 holy_order_writhing_shadows: "The Writhing Shadows"

 #Hakken
 ebon_centipede: "Ebon Centipede"
 ebon_centipede_adj: "Ebon"
 ebon_centipede_adherent: "Maze Seeker"
 ebon_centipede_adherent_plural: "Maze Seekers"
 ebon_centipede_desc: "When the shadows become too deep that despair or cruelty overwhelms one of the Hakken, they may subject themselves to the Ebon Maze and swear themselves to [Glossary('Centipede', 'glossary_wyrm_tt')]. Lone, wretched, and violent creatures, they are a bane to all that is spiritually good, much alike the degenerate #ONCLICK:FAITH,blackspiraldancer #TOOLTIP:FAITH,blackspiraldancer $Destroyer Werewolves|L$#!#! in the West." 

 ebon_centipede_high_god_name: "[Glossary('Centipede', 'glossary_wyrm_tt')]"
 ebon_centipede_high_god_name_possessive: "[Glossary('Centipede', 'glossary_wyrm_tt')]'s"
 ebon_centipede_high_god_name_alternate: "$ebon_centipede_high_god_name$"
 ebon_centipede_high_god_name_alternate_possessive: "$ebon_centipede_high_god_name_possessive$"
 ebon_centipede_creator_god_name: "$ebon_centipede_high_god_name$"
 ebon_centipede_creator_god_name_possessive: "$ebon_centipede_high_god_name_possessive$"

 holy_order_blackened_blades: "Blackened Blades"

 #Silent Striders
 eatersofthedead: "Eaters of the Dead"
 eatersofthedead_adj: "Eaters"
 eatersofthedead_adherent: "Eater"
 eatersofthedead_adherent_plural: "Eaters"
 eatersofthedead_desc: "A camp among the Silent Striders driven underground by the other Striders where they are rumored to practice their profane rite amongst the shadows. Consume the brain of your enemy and learn all of his secrets: a vile but useful ritual. All who consume the flesh of others slowly go insane and reek of the $glossary_wyrm$'s stench however. Some even develop an addiction to fresh brains, and will kill innocent and guilty alike in order to feast."

 holy_order_children_ammit: "Children of Ammit"

 #Star Gazers
 metasticbirth: "Metastic Birth"
 metasticbirth_adj: "Metastic"
 metasticbirth_adherent: "Midwife"
 metasticbirth_adherent_plural: "Midwives"
 metasticbirth_desc: "These Stargazers believe that the $glossary_wyrm$ is not caged, but in is a cocoon undergoing metamorphosis, preparing for a new reality being birthed by the $glossary_weaver$. Once it has finished its metamorphosis, it will burst from its chrysalis and usher in the new world. The Stargazers who follow this camp believe this is a good thing, and that the tribe should help others prepare for it, not fight it."

 #Star Gazers
 ouroboroans: "Ouroboroans"
 ouroboroans_adj: "Ouroboroans"
 ouroboroans_adherent: "Ouroboroan"
 ouroboroans_adherent_plural: "Ouroboroans"
 ouroboroans_desc: "They seek to free the $glossary_wyrm$ of Balance from the Web. Instead of striving against the $glossary_weaver$, they use their energies to seek out the Wyrm in all its forms in hopes of discovering the secret of freeing it. Only by following the Wyrm to its cave, rather than fighting its minions, do they feel they may truly influence the outcome of the Final War. Hence, some of these monks believe that the ways of the Wyrm must be used, not shunned."

 holy_order_unshacklers_corruption: "Unshacklers of Corruption"


 #Warders of Men
 boli_zouhisze: "Boli Zouhisze"
 boli_zouhisze_adj: "Zouhisze"
 boli_zouhisze_adherent: "Faithful"
 boli_zouhisze_adherent_plural: "Faithful"
 boli_zouhisze_desc: "A Chinese offshoot of the Warders of Men that split sometime before 2000 BCE, though they retained certain aspects of their parent tribe's culture, such as appreciation for human culture and veneration of the spirit Cockroach. The latter caused the native $glossary_fera$ of China to shun the Boli Zouhisze and exclude them from the Beast Courts, because insect imagery is heavily associated with the Wyrm among the Hengeyokai."

 holy_order_chaos_spinners: "Chaos Spinners"

