 POD_fera_shapeshift_interaction_homid: "Return to Homid form"
 POD_fera_shapeshift_interaction_beastform: "[GetPlayer.Custom('PODFeraBeastform')]"
 POD_fera_shapeshift_interaction_warform: "[GetPlayer.Custom('PODFeraWarform')]"
 POD_fera_shapeshift_interaction_primalhumanform: "[GetPlayer.Custom('PODFeraPrimalHumanform')]"
 POD_fera_shapeshift_interaction_primalbeastform: "[GetPlayer.Custom('PODFeraPrimalBeastform')]"
 POD_shapeshift_form_totem_form: "Totem form"



 POD_train_gift_interaction: "Train Gift"
 POD_train_gift_interaction_desc: "Teach [recipient.GetFirstName] one of your Gift"



 POD_fera_weather_magic_interaction: "Weather Magic"
 POD_fera_weather_magic_interaction_desc: "Unleash a natural disaster in [recipient.GetFirstNamePossessive] realm."
 POD_fera_weather_magic_interaction_options_heading: "Which natural hazard shall I invoke?"




 POD_spawn_flaying_plague_interaction: "Unleash the Flaying Plague"
 POD_spawn_flaying_plague_interaction_desc: "You have the terrible Flaying Plague at your disposal. With some specifics ingredients for the ritual, you would be able to unleash it upon the unsuspecting lupines once more."
 POD_spawn_flaying_plague_interaction.tt: "Inflict the Flaying Plague upon [recipient.GetFirstNamePossessive] location."
 POD_spawn_flaying_plague_actor_toast: "The Flaying Plague is running rampant through [recipient.GetFirstNamePossessive] location."
 POD_spawn_flaying_plague_actor_toast.desc: "Hopefully you won't come to regret this"
 POD_spawn_flaying_plague_failure_toast: "You failed to spread the Flaying Plague in [recipient.GetFirstNamePossessive] location"
 POD_spawn_flaying_plague_failure_toast.desc: "But there will be more opportunities in the future..."
 POD_spawn_flaying_plague_interaction_success: "The Flaying Plague will break out in [recipient.GetFirstNamePossessive] location and spread from there over time."
 POD_spawn_flaying_plague_interaction_failure: "The Flaying Plague fails to take hold."
 POD_inflict_flaying_plague_interaction: "Inflict the Flaying Plague"
 POD_inflict_flaying_plague_interaction_desc: "Infest [recipient.GetFirstName] with the Flaying Plague, weakening their defenses. If they are able to become an [GetTrait('abomination').GetName(GetNullCharacter)], this will ensure the success of the $pod_Embrace$."


###Planetary Gifts interactions
 POD_ebon_binding_interaction: "Ebon Binding"
 POD_ebon_binding_interaction_desc: "Bind a fitting punishment to [recipient.GetFirstName]. [recipient.GetFirstName] will suffer crippling pain when [recipient.GetSheHe] thinks of indulging in the forbidden action."
 ebon_binding_modifier: "Ebon Binding"
 
 
 POD_savagery_of_the_taloned_hunter_interaction: "Savagery of the Taloned Hunter"
 POD_savagery_of_the_taloned_hunter_interaction_desc: "Spend 1 $POD_energy_gnosis$ and willpower to gain 2 $POD_energy_gnosis$."
 
 POD_burden_of_knowledge_interaction: "Burden of Knowledge"
 POD_burden_of_knowledge_interaction_desc: "Making the [recipient.GetFirstName] gain [GetModifier('murderous_frenzy_modifier').GetNameWithTooltip], [GetModifier('change_for_better_modifier').GetNameWithTooltip] or suicide"
 
 POD_essential_transformation_interaction: "Essential Transformation"
 POD_essential_transformation_interaction_desc: "Increase wounds to gain $POD_energy_gnosis$."
