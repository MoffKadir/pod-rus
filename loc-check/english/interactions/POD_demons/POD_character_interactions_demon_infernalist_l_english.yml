l_english:
 POD_investiture_shapeshift_interaction: "Shapeshift"
 POD_investiture_shapeshift_interaction_desc: "Use the gifts given by your demonic patron to change your form."

 POD_request_pact_interaction: "Sign Demonic Pact"
 POD_request_pact_interaction_desc: "Draft a demonic [demonic_pact|E] with [recipient.GetFirstName] to gain access to [investiture_lifestyle|E]"

 POD_banish_demon_interaction: "Banish Demon"
 POD_banish_demon_interaction_desc: "[POD_banish|E] [recipient.GetFirstName] to the [UmbraGlossary('abyss')]."

 POD_initiate_demonology_interaction: "Initiate Demonology"
 POD_initiate_demonology_interaction_desc: "Teach [recipient.GetFirstName] demonology."

 POD_summon_demon_demonology_interaction: "Perform Demonic Summoning"
 POD_summon_demon_demonology_interaction_desc: "Sacrifice the lives of your [prisoners|E] in the hopes of summoning a $POD_splat_demon$ from the [UmbraGlossary('abyss')]"
 POD_summon_demon_demonology_interaction_valid: "You do #bold not#! have any non-resurrecting [prisoners|E]"
 POD_summon_demon_demonology_interaction_effect1: "You will execute up to 10 non-resurrecting [prisoners|E]. Each [prisoner|E] sacrificed increases the success chance by #V 10%#!"
 POD_summon_demon_demonology_interaction_success: "The summoning was successful!"
 
 POD_bind_demon_interaction: "Bind Demon"
 POD_bind_demon_interaction_desc: "Bind [recipient.GetFirstName] with [recipient.GetHerHis] [Glossary('True Name','podgloss.truename')]."

 POD_weaken_demon_interaction: "Weaken Demon"
 POD_weaken_demon_interaction_desc: "Weaken [recipient.GetShortUIName] by evoking [recipient.GetHerHis] memories of the Fall."

 POD_serpent_skin_interaction: "Serpent Skin"
 POD_serpent_skin_interaction_desc: "Damage yourself to shed your skin and escape imprisonment."

 POD_devils_eyes_interaction: "Devil's Eyes"
 POD_devils_eyes_interaction_desc: "Start a [epidemic|E] at [recipient.GetShortUINamePossessive] location."

 POD_apportation_interaction: "Apportation"
 POD_apportation_interaction_desc: "Teleport one of [recipient.GetShortUINamePossessive] [artifacts|E] into the hands of someone who deserves it more: yours."

 POD_teleportation_interaction: "Teleportation"
 POD_teleportation_interaction_desc: "Cross great distances to appear in a cloud of sulphur."

 POD_bond_breaking_interaction: "Bond-Breaking"
 POD_bond_breaking_interaction_desc: "Make [recipient.GetShortUIName] lose all [recipient.GetHerHis] [hooks|E]."

 POD_mammons_gift_interaction: "Mammon's Gift"
 POD_mammons_gift_interaction_desc: "Turn one of your [artifacts|E] into solid gold."

 POD_talons_of_the_plague_crow_interaction: "Talons of the Plague-Crow"
 POD_talons_of_the_plague_crow_interaction_desc: "Invest your infernal power into a set of noxious claws."

 POD_army_of_the_damned_interaction: "Army of the Damned"
 POD_army_of_the_damned_interaction_desc: "Call upon the forces of Hell for the duration of a [war|E]."


 POD_pact_sacrifice_of_gold_interaction: "Sacrifice of Gold"
 POD_pact_sacrifice_of_gold_interaction_desc: "Fulfill the terms of your [demonic_pact|E] by offering your [gold|E]."

 POD_pact_infernal_prayer_interaction: "Infernal Prayer"
 POD_pact_infernal_prayer_interaction_desc: "Fulfill the terms of your [demonic_pact|E] by offering your [piety|E]."

 POD_pact_show_of_submission_interaction: "Show of Submission"
 POD_pact_show_of_submission_interaction_desc: "Fulfill the terms of your [demonic_pact|E] by offering your [prestige|E]."

 POD_pact_offering_of_artifact_interaction: "Offering of Artifact"
 POD_pact_offering_of_artifact_interaction_desc: "Fulfill the terms of your [demonic_pact|E] by offering one your [artifacts|E]."


 POD_black_whispers_interaction: "Black Whispers"
 POD_black_whispers_interaction_desc: "Purchase knowledge from [Glossary('Yama Kings','podgloss.yamaking')], allow you learn every secret and scheme of [recipient.GetFirstName]."